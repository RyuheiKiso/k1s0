# portal app の nginx 設定。
#
# - SPA: クライアントルーティングのため未存在パスは index.html に fallback
# - ハッシュ付き静的アセットは長期キャッシュ
# - 非 root 実行のため listen 8080 / pid /tmp/nginx.pid

pid /tmp/nginx.pid;

server {
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: クライアントルーティングのため未存在パスは index.html に fallback。
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ハッシュ付き静的アセットは長期キャッシュ。
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
