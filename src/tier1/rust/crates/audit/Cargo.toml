[package]
name = "k1s0-tier1-audit"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "k1s0 tier1 t1-audit Pod (WORM audit log)"

# Pod バイナリ。
[[bin]]
name = "t1-audit"
path = "src/main.rs"

[dependencies]
# 公開 API（AuditService）の Service trait。
k1s0-sdk-proto = { workspace = true }
# tonic / tokio / prost は workspace 共通設定を継承。
tonic = { workspace = true }
tokio = { workspace = true }
prost = { workspace = true }
