# t1-decision Pod の crate。ZEN Engine ベースの JDM 評価 Pod。
#
# docs 正典:
#   docs/04_概要設計/20_ソフトウェア方式設計/01_コンポーネント方式設計/01_tier1全体コンポーネント俯瞰.md
#     - DS-SW-COMP-008（t1-decision Pod）
#   docs/03_要件定義/20_機能要件/40_tier1_API契約IDL/09_Decision_API.md
#   docs/02_構想設計/adr/ADR-RULE-001-zen-engine.md
#
# 役割（リリース時点 最小骨格）:
#   tonic server を :50001 で起動し DecisionService（Evaluate / BatchEvaluate）と
#   DecisionAdminService（RegisterRule / ListVersions / GetRule）を登録する。
#   全 RPC は Status::unimplemented を返却。実 ZEN Engine 結線は plan 04-08 で実装。

[package]
name = "k1s0-tier1-decision"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "k1s0 tier1 t1-decision Pod (ZEN Engine JDM evaluation)"

# Pod バイナリ。`cargo build -p k1s0-tier1-decision` で `t1-decision` を生成する。
[[bin]]
name = "t1-decision"
path = "src/main.rs"

[dependencies]
# 公開 API（DecisionService / DecisionAdminService）の Service trait。
k1s0-sdk-proto = { workspace = true }
# tonic / tokio / prost は workspace 共通設定を継承。
tonic = { workspace = true }
tokio = { workspace = true }
prost = { workspace = true }
