# t1-decision Pod の crate。ZEN Engine ベースの JDM 評価 Pod。
#
# docs 正典:
#   docs/04_概要設計/20_ソフトウェア方式設計/01_コンポーネント方式設計/01_tier1全体コンポーネント俯瞰.md
#     - DS-SW-COMP-008（t1-decision Pod）
#   docs/03_要件定義/20_機能要件/40_tier1_API契約IDL/09_Decision_API.md
#   docs/02_構想設計/adr/ADR-RULE-001-zen-engine.md
#
# 役割:
#   tonic server を :50001（LISTEN_ADDR で上書き可）で起動し、DecisionService
#   （Evaluate / BatchEvaluate）と DecisionAdminService（RegisterRule / ListVersions /
#   GetRule）を ZEN Engine ベースの実装で登録する。JDM 評価は zen-engine の DecisionEngine
#   に委譲し、include_trace=true でノード単位の評価トレースを返す。

[package]
name = "k1s0-tier1-decision"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "k1s0 tier1 t1-decision Pod (ZEN Engine JDM evaluation)"

# Pod バイナリ。`cargo build -p k1s0-tier1-decision` で `t1-decision` を生成する。
[[bin]]
name = "t1-decision"
path = "src/main.rs"

[dependencies]
# 公開 API（DecisionService / DecisionAdminService）の Service trait。
k1s0-sdk-proto = { workspace = true }
# 共通 HealthService 実装（Liveness / Readiness 2 RPC）。
k1s0-tier1-health = { workspace = true }
# 共通 interceptor / runtime helper。
k1s0-tier1-common = { workspace = true }
# tonic / tokio / prost は workspace 共通設定を継承。
tonic = { workspace = true }
tokio = { workspace = true }
prost = { workspace = true }
# 評価入出力の JSON ペイロード。
serde_json = "1"
# ADR-RULE-001 の決定に従い、ZEN Engine + JDM フォーマットを採用。
# zen-engine は内部で rquickjs（QuickJS の Rust binding、C ソース埋込）を依存に持つため、
# ビルド環境に C/C++ コンパイラが必要。production イメージはマルチステージビルドで builder
# ステージにのみ cc を入れる運用。
zen-engine = "0.55.0"
tonic-reflection = "0.12"

[lib]
name = "k1s0_tier1_decision"
path = "src/lib.rs"
