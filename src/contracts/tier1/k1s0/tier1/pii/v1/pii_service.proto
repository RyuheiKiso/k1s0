// 本ファイルは tier1 公開 PII API の正式 proto。
// PII（個人情報）の検出（Classify）とマスキング（Mask）を提供する。
//
// 設計正典:
//   docs/03_要件定義/20_機能要件/40_tier1_API契約IDL/10_Audit_Pii_API.md（PiiService 部）
//   docs/03_要件定義/20_機能要件/10_tier1_API要件/10_Audit_Pii_API.md
//
// 関連要件: FR-T1-PII-001〜002
//
// 担当 Pod: t1-pii（Rust 純関数実装、ステートレス、DS-SW-COMP-009）
//
// 注: 正典 IDL では AuditService と PiiService を 1 ファイル（package
//     k1s0.tier1.audit.v1）にまとめているが、ディレクトリ設計と Pod 構成に従い、
//     本リポジトリでは pii.v1 パッケージに分離する。
// proto 構文宣言（proto3）
syntax = "proto3";

// パッケージ命名規約: k1s0.tier1.<api>.v<n>
package k1s0.tier1.pii.v1;

// 共通型（TenantContext / ErrorDetail）の import
import "k1s0/tier1/common/v1/common.proto";
// google.api.http annotation（HTTP/JSON gateway 経路を OpenAPI に出すため）
import "google/api/annotations.proto";

// PII API。t1-pii Pod は純関数（ステートレス）で副作用なし。
service PiiService {
  // PII 種別の検出（テキスト → findings 列）
  rpc Classify(ClassifyRequest) returns (ClassifyResponse) {
    option (google.api.http) = {
      post: "/k1s0/pii/classify"
      body: "*"
    };
  }
  // マスキング（テキスト → 置換後テキスト + findings）
  rpc Mask(MaskRequest) returns (MaskResponse) {
    option (google.api.http) = {
      post: "/k1s0/pii/mask"
      body: "*"
    };
  }
  // 仮名化（FR-T1-PII-002）。HMAC-SHA256(salt, value) を URL-safe base64 で返す。
  // 同一 salt + 同一入力で同一出力（決定論的）。salt は OpenBao 等で管理し直接露出しない。
  rpc Pseudonymize(PseudonymizeRequest) returns (PseudonymizeResponse) {
    option (google.api.http) = {
      post: "/k1s0/pii/pseudonymize"
      body: "*"
    };
  }
}

// Classify リクエスト
message ClassifyRequest {
  // 判定対象テキスト
  string text = 1;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 2;
}

// PII 検出結果の 1 件
message PiiFinding {
  // 検出された PII 種別（NAME / EMAIL / PHONE / MYNUMBER / CREDITCARD 等）
  string type = 1;
  // 文字列内の開始位置（0 始まり、UTF-8 byte 単位ではなく文字単位）
  int32 start = 2;
  // 文字列内の終了位置（exclusive）
  int32 end = 3;
  // 信頼度（0.0〜1.0）
  double confidence = 4;
}

// Classify 応答
message ClassifyResponse {
  // 検出された PII 一覧（位置順）
  repeated PiiFinding findings = 1;
  // PII を含むか（findings が空でなければ true）
  bool contains_pii = 2;
}

// Mask リクエスト
message MaskRequest {
  // マスキング対象テキスト
  string text = 1;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 2;
}

// Mask 応答
message MaskResponse {
  // マスク後のテキスト（氏名 → [NAME]、メール → [EMAIL] 等）
  string masked_text = 1;
  // 検出された PII 一覧（マスキング前の位置情報）
  repeated PiiFinding findings = 2;
}

// Pseudonymize リクエスト（FR-T1-PII-002）。
message PseudonymizeRequest {
  // 仮名化対象の PII 種別（NAME / EMAIL / PHONE / MYNUMBER / ADDRESS / CREDITCARD / IPV4 等）。
  // 種別ごとに独立な仮名空間を持たせるため、HMAC 入力に prefix として混入する。
  string field_type = 1;
  // 仮名化対象の生値。
  string value = 2;
  // 仮名空間を分離する salt。本番運用では OpenBao 等で管理し、
  // クライアントは salt 識別子のみを送る運用も許容する。空文字は不可。
  string salt = 3;
  // 呼出元コンテキスト（テナント境界の検証に必須）。
  k1s0.tier1.common.v1.TenantContext context = 4;
}

// Pseudonymize 応答。
message PseudonymizeResponse {
  // 仮名化された値（URL-safe base64、padding 無し）。
  string pseudonym = 1;
}
