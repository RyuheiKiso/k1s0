// 本ファイルは tier1 公開 12 API のうち **PII API** の最小 stub。
//
// **scope**: plan 03-02 のフル実装は要件定義（docs/03_要件定義/20_機能要件/40_tier1_API契約IDL/）の
//            精緻読込を要するため、本セッションでは service + 1 RPC の placeholder 構造のみ配置する。
//            詳細 RPC（Classify / Mask 等）/ message / フィールド / google.api.http annotation /
//            google.rpc.Status の正式定義は次セッション以降の plan 03-02 で展開する。
//
// 担当 Pod（docs 正典）: t1-pii（Rust）。docs/05_実装/00_ディレクトリ設計/20_tier1レイアウト/01_tier1全体配置.md
//
// 関連:
//   docs/03_要件定義/20_機能要件/40_tier1_API契約IDL/10_Audit_Pii_API.md（Audit + PII 共通 IDL、PiiService 部）
//   docs/02_構想設計/02_tier1設計/（論理仕様）
//   plan/03_Contracts実装/02_tier1_proto定義.md
syntax = "proto3";

// パッケージ命名規約: k1s0.tier1.<api>.v1
package k1s0.tier1.pii.v1;

// PiiService: tier1 公開 PII API の最小 stub。
// 本 service は plan 03-02 のフル実装で Classify（判定のみ）/ Mask（置換後テキスト返却）等の RPC に拡張される。
service PiiService {
  // PlaceholderCall: フル実装前の最小 RPC。本 RPC は plan 03-02 で実 RPC 群に置換される。
  // 関連要件: FR-T1-PII-001（マスキング）/ FR-T1-PII-002（仮名化）
  rpc PlaceholderCall(PlaceholderCallRequest) returns (PlaceholderCallResponse);
}

// PlaceholderCallRequest: フル実装前の最小 message。
message PlaceholderCallRequest {
  // フル実装前の placeholder field
  string note = 1;
}

// PlaceholderCallResponse: フル実装前の最小 message。
message PlaceholderCallResponse {
  // 本 RPC 自体は dummy で、応答も placeholder
  string message = 1;
}
