// 本ファイルは tier1 公開 Audit API の正式 proto。
// 監査イベントの WORM ストア記録と検索を提供する。
// PII API（Classify / Mask）は別ファイル（pii/v1/pii_service.proto）に分離。
//
// 設計正典:
//   docs/03_要件定義/20_機能要件/40_tier1_API契約IDL/10_Audit_Pii_API.md（AuditService 部）
//   docs/03_要件定義/20_機能要件/10_tier1_API要件/10_Audit_Pii_API.md
//
// 関連要件: FR-T1-AUDIT-001〜003
//
// 注: 正典 IDL では AuditService と PiiService を 1 ファイル（package
//     k1s0.tier1.audit.v1）にまとめているが、ディレクトリ設計（DS-DIR-* /
//     IMP-DIR-*）と Pod 構成（t1-audit / t1-pii の 2 Pod 独立）に従い、
//     本リポジトリでは 2 ファイル / 2 パッケージに分割する。
//     RPC / message / フィールドは IDL と完全一致。
// proto 構文宣言（proto3）
syntax = "proto3";

// パッケージ命名規約: k1s0.tier1.<api>.v<n>
package k1s0.tier1.audit.v1;

// Timestamp 型の import
import "google/protobuf/timestamp.proto";
// 共通型（TenantContext / ErrorDetail）の import
import "k1s0/tier1/common/v1/common.proto";
// google.api.http annotation（HTTP/JSON gateway 経路を OpenAPI に出すため）
import "google/api/annotations.proto";

// Audit API。WORM ストア（Postgres + immutable view）に追記専用で記録する。
service AuditService {
  // 監査イベント記録（成功時は audit_id を返す、改竄不可）
  rpc Record(RecordAuditRequest) returns (RecordAuditResponse) {
    option (google.api.http) = {
      post: "/k1s0/audit/record"
      body: "*"
    };
  }
  // 監査イベント検索（範囲 + フィルタ、出力には PII Mask が自動適用）
  rpc Query(QueryAuditRequest) returns (QueryAuditResponse) {
    option (google.api.http) = {
      post: "/k1s0/audit/query"
      body: "*"
    };
  }
  // ハッシュチェーン整合性検証（FR-T1-AUDIT-002）。
  // テナント配下の全イベントの prev_hash / event_hash の連鎖を検証する。
  // 改ざん検知時は valid=false で先頭の不整合 sequence_number と reason を返す。
  rpc VerifyChain(VerifyChainRequest) returns (VerifyChainResponse) {
    option (google.api.http) = {
      post: "/k1s0/audit/verifychain"
      body: "*"
    };
  }
  // 監査ログのテナント単位エクスポート（FR-T1-AUDIT-002 疑似 IF "Audit.Export"）。
  // server-streaming で範囲内の events を batch（chunk）に分けて配信し、
  // 大量レコードでもメモリを圧迫しない。format で CSV / JSON / NDJSON を選択する。
  // server-streaming のため HTTP/JSON gateway 経由非対応（gRPC で直接呼出す運用）。
  rpc Export(ExportAuditRequest) returns (stream ExportAuditChunk);
}

// 監査イベント
message AuditEvent {
  // 発生時刻（UTC）
  google.protobuf.Timestamp timestamp = 1;
  // 操作主体（user_id / workload_id）
  string actor = 2;
  // 操作種別（CREATE / READ / UPDATE / DELETE / LOGIN / EXPORT）
  string action = 3;
  // 対象リソース（URN 形式: k1s0:tenant:<tid>:resource:<type>/<id>）
  string resource = 4;
  // 操作結果（SUCCESS / DENIED / ERROR）
  string outcome = 5;
  // 追加コンテキスト（ip / user_agent / request_id 等）
  map<string, string> attributes = 6;
}

// Record リクエスト
message RecordAuditRequest {
  // 記録対象イベント
  AuditEvent event = 1;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 2;
  // 冪等性キー（共通規約 §「冪等性と再試行」: 24h TTL の dedup）
  // 重複 audit event 書込を防ぐ（hash chain 整合性が乱れないよう）。
  // 同一キーでの再試行は副作用を重複させず初回 audit_id を返す。
  string idempotency_key = 3;
}

// Record 応答
message RecordAuditResponse {
  // WORM ストアでの固有 ID（再現性のあるハッシュ含む）
  string audit_id = 1;
}

// Query リクエスト
message QueryAuditRequest {
  // 範囲開始
  google.protobuf.Timestamp from = 1;
  // 範囲終了
  google.protobuf.Timestamp to = 2;
  // フィルタ（任意の attributes 等価一致、AND 結合）
  map<string, string> filters = 3;
  // 件数上限（既定 100、最大 1000）
  int32 limit = 4;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 5;
}

// Query 応答
message QueryAuditResponse {
  // 検索結果（時刻昇順、出力時に PII Mask 自動適用）
  repeated AuditEvent events = 1;
}

// VerifyChain リクエスト（FR-T1-AUDIT-002）
message VerifyChainRequest {
  // 範囲開始（任意）。未指定（zero）はテナント配下の全履歴を対象。
  google.protobuf.Timestamp from = 1;
  // 範囲終了（任意）。未指定（zero）は最新まで。
  google.protobuf.Timestamp to = 2;
  // 呼出元コンテキスト（テナント境界の検証に必須）
  k1s0.tier1.common.v1.TenantContext context = 3;
}

// VerifyChain 応答
message VerifyChainResponse {
  // チェーン全体の整合性が取れていれば true。
  bool valid = 1;
  // 検証対象だったイベント件数（valid に関わらず set される）。
  int64 checked_count = 2;
  // valid=false 時のみ意味あり。最初に不整合を検出した sequence_number。
  // valid=true 時は 0。
  int64 first_bad_sequence = 3;
  // 不整合の理由（"prev_hash mismatch" / "event_hash mismatch" / "tenant boundary" 等）。
  // valid=true 時は空文字。
  string reason = 4;
}

// Export のフォーマット種別。
enum ExportFormat {
  // 既定（指定なし）。サーバが NDJSON にフォールバックする。
  EXPORT_FORMAT_UNSPECIFIED = 0;
  // CSV（RFC 4180、ヘッダ行を最初の chunk に出力）。
  EXPORT_FORMAT_CSV = 1;
  // 改行区切り JSON（1 行 = 1 event）。Splunk / fluentd 取り込み向け。
  EXPORT_FORMAT_NDJSON = 2;
  // 単一 JSON 配列（小規模向け、最後の chunk で `]` を閉じる）。
  EXPORT_FORMAT_JSON_ARRAY = 3;
}

// Export リクエスト（FR-T1-AUDIT-002 疑似 IF "Audit.Export"）
message ExportAuditRequest {
  // 範囲開始（任意）。未指定（zero）は全履歴の先頭。
  google.protobuf.Timestamp from = 1;
  // 範囲終了（任意）。未指定（zero）は最新まで。
  google.protobuf.Timestamp to = 2;
  // 出力フォーマット。EXPORT_FORMAT_UNSPECIFIED は NDJSON 扱い。
  ExportFormat format = 3;
  // 1 chunk あたりの最大バイト数（既定 65536、上限 1048576）。
  int32 chunk_bytes = 4;
  // 呼出元コンテキスト（テナント境界の検証に必須）。
  k1s0.tier1.common.v1.TenantContext context = 5;
}

// Export 応答（server-streaming）の 1 チャンク
message ExportAuditChunk {
  // フォーマット済みデータの 1 部分（バイナリ透過、UTF-8 を想定）。
  bytes data = 1;
  // 0 起点のチャンク連番（再構成 / 監査時の参照用）。
  int64 sequence = 2;
  // この chunk に含まれる event 数（chunk_bytes ベースの場合は variable）。
  int64 event_count = 3;
  // ストリーム末尾の chunk なら true。最後の "]" や EOF newline を含む。
  bool is_last = 4;
}
