// 本ファイルは tier1 公開 Audit API の正式 proto。
// 監査イベントの WORM ストア記録と検索を提供する。
// PII API（Classify / Mask）は別ファイル（pii/v1/pii_service.proto）に分離。
//
// 設計正典:
//   docs/03_要件定義/20_機能要件/40_tier1_API契約IDL/10_Audit_Pii_API.md（AuditService 部）
//   docs/03_要件定義/20_機能要件/10_tier1_API要件/10_Audit_Pii_API.md
//
// 関連要件: FR-T1-AUDIT-001〜003
//
// 注: 正典 IDL では AuditService と PiiService を 1 ファイル（package
//     k1s0.tier1.audit.v1）にまとめているが、ディレクトリ設計（DS-DIR-* /
//     IMP-DIR-*）と Pod 構成（t1-audit / t1-pii の 2 Pod 独立）に従い、
//     本リポジトリでは 2 ファイル / 2 パッケージに分割する。
//     RPC / message / フィールドは IDL と完全一致。
// proto 構文宣言（proto3）
syntax = "proto3";

// パッケージ命名規約: k1s0.tier1.<api>.v<n>
package k1s0.tier1.audit.v1;

// Timestamp 型の import
import "google/protobuf/timestamp.proto";
// 共通型（TenantContext / ErrorDetail）の import
import "k1s0/tier1/common/v1/common.proto";

// Audit API。WORM ストア（Postgres + immutable view）に追記専用で記録する。
service AuditService {
  // 監査イベント記録（成功時は audit_id を返す、改竄不可）
  rpc Record(RecordAuditRequest) returns (RecordAuditResponse);
  // 監査イベント検索（範囲 + フィルタ、出力には PII Mask が自動適用）
  rpc Query(QueryAuditRequest) returns (QueryAuditResponse);
}

// 監査イベント
message AuditEvent {
  // 発生時刻（UTC）
  google.protobuf.Timestamp timestamp = 1;
  // 操作主体（user_id / workload_id）
  string actor = 2;
  // 操作種別（CREATE / READ / UPDATE / DELETE / LOGIN / EXPORT）
  string action = 3;
  // 対象リソース（URN 形式: k1s0:tenant:<tid>:resource:<type>/<id>）
  string resource = 4;
  // 操作結果（SUCCESS / DENIED / ERROR）
  string outcome = 5;
  // 追加コンテキスト（ip / user_agent / request_id 等）
  map<string, string> attributes = 6;
}

// Record リクエスト
message RecordAuditRequest {
  // 記録対象イベント
  AuditEvent event = 1;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 2;
}

// Record 応答
message RecordAuditResponse {
  // WORM ストアでの固有 ID（再現性のあるハッシュ含む）
  string audit_id = 1;
}

// Query リクエスト
message QueryAuditRequest {
  // 範囲開始
  google.protobuf.Timestamp from = 1;
  // 範囲終了
  google.protobuf.Timestamp to = 2;
  // フィルタ（任意の attributes 等価一致、AND 結合）
  map<string, string> filters = 3;
  // 件数上限（既定 100、最大 1000）
  int32 limit = 4;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 5;
}

// Query 応答
message QueryAuditResponse {
  // 検索結果（時刻昇順、出力時に PII Mask 自動適用）
  repeated AuditEvent events = 1;
}
