// 本ファイルは tier1 公開 Workflow API の正式 proto。
// 短期 Dapr Workflow / 長期 Temporal の双方を抽象化した Workflow ライフサイクル API。
//
// 設計正典:
//   docs/03_要件定義/20_機能要件/40_tier1_API契約IDL/06_Workflow_API.md
//   docs/03_要件定義/20_機能要件/10_tier1_API要件/06_Workflow_API.md
//
// 関連要件: FR-T1-WORKFLOW-001〜005
// proto 構文宣言（proto3）
syntax = "proto3";

// パッケージ命名規約: k1s0.tier1.<api>.v<n>
package k1s0.tier1.workflow.v1;

// 共通型（TenantContext / ErrorDetail）の import
import "k1s0/tier1/common/v1/common.proto";
// google.api.http annotation（HTTP/JSON gateway 経路を OpenAPI に出すため）
import "google/api/annotations.proto";

// Workflow API。tier2 がワークフロー種別をコード登録し、tier1 経由で実行操作する。
service WorkflowService {
  // ワークフロー開始
  rpc Start(StartRequest) returns (StartResponse) {
    option (google.api.http) = {
      post: "/k1s0/workflow/start"
      body: "*"
    };
  }
  // シグナル送信（ワークフローへの入力イベント）
  rpc Signal(SignalRequest) returns (SignalResponse) {
    option (google.api.http) = {
      post: "/k1s0/workflow/signal"
      body: "*"
    };
  }
  // クエリ（ワークフロー状態の読取り、副作用なし）
  rpc Query(QueryRequest) returns (QueryResponse) {
    option (google.api.http) = {
      post: "/k1s0/workflow/query"
      body: "*"
    };
  }
  // 正常終了の依頼（キャンセル）
  rpc Cancel(CancelRequest) returns (CancelResponse) {
    option (google.api.http) = {
      post: "/k1s0/workflow/cancel"
      body: "*"
    };
  }
  // 強制終了
  rpc Terminate(TerminateRequest) returns (TerminateResponse) {
    option (google.api.http) = {
      post: "/k1s0/workflow/terminate"
      body: "*"
    };
  }
  // 状態取得
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse) {
    option (google.api.http) = {
      post: "/k1s0/workflow/getstatus"
      body: "*"
    };
  }
}

// バックエンド種別（FR-T1-WORKFLOW-001 の "短期は Dapr Workflow、長期実行は Temporal" 対応）。
// SDK の RunShort / RunLong は本 enum を BACKEND_DAPR / BACKEND_TEMPORAL に固定する。
// 注: zero 値は AUTO（明示指定なし、tier1 が workflow_type / 期待実行時間で振り分け）。
// buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
enum WorkflowBackend {
  // 既定値: tier1 が workflow_type / 期待実行時間に基づいて自動選択する。
  BACKEND_AUTO = 0;
  // 短期ワークフロー向け（Dapr Workflow building block、上限 7 日）。
  BACKEND_DAPR = 1;
  // 長期ワークフロー向け（Temporal、上限なし）。
  BACKEND_TEMPORAL = 2;
}

// Start リクエスト
message StartRequest {
  // ワークフロー種別（tier2 で登録されたコード名）
  string workflow_type = 1;
  // 実行 ID（指定なければ tier1 が UUID を生成）
  string workflow_id = 2;
  // 初期入力（任意 bytes、エンコーディングは tier2 側合意）
  bytes input = 3;
  // 冪等性（同一 workflow_id の重複開始は既存実行を返す）
  bool idempotent = 4;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 5;
  // バックエンド hint（BACKEND_AUTO で tier1 が自動選択）。
  WorkflowBackend backend = 6;
  // 冪等性キー（共通規約 §「冪等性と再試行」: 24h TTL の dedup）
  // 同一キーでの再試行は副作用を重複させず初回 StartResponse を返す
  string idempotency_key = 7;
}

// Start 応答
message StartResponse {
  // ワークフロー ID（リクエストの workflow_id か、tier1 採番の UUID）
  string workflow_id = 1;
  // 実行 ID（リトライや継続実行時に新しい値が割当）
  string run_id = 2;
  // 実際に選択された backend（AUTO で起動された場合の解決結果が入る）。
  WorkflowBackend backend = 3;
}

// Signal リクエスト
message SignalRequest {
  // 対象ワークフロー ID
  string workflow_id = 1;
  // シグナル名（tier2 ワークフロー実装が listen している名前）
  string signal_name = 2;
  // ペイロード（任意 bytes）
  bytes payload = 3;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 4;
}

// Signal 応答（フィールド無し、成功は OK gRPC ステータスで表現）
message SignalResponse {}

// Query リクエスト
message QueryRequest {
  // 対象ワークフロー ID
  string workflow_id = 1;
  // クエリ名（tier2 ワークフロー実装が register しているクエリハンドラ名）
  string query_name = 2;
  // ペイロード
  bytes payload = 3;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 4;
}

// Query 応答
message QueryResponse {
  // クエリ結果
  bytes result = 1;
}

// Cancel リクエスト
message CancelRequest {
  // 対象ワークフロー ID
  string workflow_id = 1;
  // キャンセル理由（監査用、自由記述）
  string reason = 2;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 3;
}

// Cancel 応答
message CancelResponse {}

// Terminate リクエスト
message TerminateRequest {
  // 対象ワークフロー ID
  string workflow_id = 1;
  // 強制終了理由（監査用、自由記述）
  string reason = 2;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 3;
}

// Terminate 応答
message TerminateResponse {}

// GetStatus リクエスト
message GetStatusRequest {
  // 対象ワークフロー ID
  string workflow_id = 1;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 2;
}

// 実行状態の列挙。
// 注: 正典 IDL は本 enum の zero value を `RUNNING = 0` と定義しているため、
//     buf STANDARD lint の ENUM_ZERO_VALUE_SUFFIX / ENUM_VALUE_PREFIX を ignore する。
// buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
// buf:lint:ignore ENUM_VALUE_PREFIX
enum WorkflowStatus {
  // 実行中（既定値、Start 直後の状態）
  RUNNING = 0;
  // 正常完了
  COMPLETED = 1;
  // 失敗終了
  FAILED = 2;
  // Cancel による正常停止
  CANCELED = 3;
  // Terminate による強制停止
  TERMINATED = 4;
  // Continue-as-New（長期ワークフローの履歴ローテーション）
  CONTINUED_AS_NEW = 5;
}

// GetStatus 応答
message GetStatusResponse {
  // 現在状態
  WorkflowStatus status = 1;
  // 直近の実行 ID（Continue-as-New 後は新 run_id を返す）
  string run_id = 2;
  // 完了時の出力（status = COMPLETED の時のみ）
  bytes output = 3;
  // 失敗時のエラー詳細（status = FAILED の時のみ）
  k1s0.tier1.common.v1.ErrorDetail error = 4;
}
