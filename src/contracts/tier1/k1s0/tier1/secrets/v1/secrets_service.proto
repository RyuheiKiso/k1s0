// 本ファイルは tier1 公開 Secrets API の正式 proto。
// OpenBao 経由でテナントスコープのシークレットを取得・ローテーションする。
//
// 設計正典:
//   docs/03_要件定義/20_機能要件/40_tier1_API契約IDL/04_Secrets_API.md
//   docs/03_要件定義/20_機能要件/10_tier1_API要件/04_Secrets_API.md
//
// 関連要件: FR-T1-SECRETS-001〜004
// proto 構文宣言（proto3）
syntax = "proto3";

// パッケージ命名規約: k1s0.tier1.<api>.v<n>
package k1s0.tier1.secrets.v1;

// 共通型（TenantContext / ErrorDetail）の import
import "k1s0/tier1/common/v1/common.proto";
// google.api.http annotation（HTTP/JSON gateway 経路を OpenAPI に出すため）
import "google/api/annotations.proto";

// Secrets API。OpenBao をバックエンドとし、tier1 が PII / アクセス制御を強制する。
service SecretsService {
  // 単一シークレット取得（テナント越境参照は即 PermissionDenied、FR-T1-SECRETS-001）
  rpc Get(GetSecretRequest) returns (GetSecretResponse) {
    option (google.api.http) = {
      post: "/k1s0/secrets/get"
      body: "*"
    };
  }
  // 一括取得（テナントに割当された全シークレット）
  rpc BulkGet(BulkGetSecretRequest) returns (BulkGetSecretResponse) {
    option (google.api.http) = {
      post: "/k1s0/secrets/bulkget"
      body: "*"
    };
  }
  // 動的シークレット発行（FR-T1-SECRETS-002）。
  // engine="postgres" 等の Database Engine から TTL 付き credential を都度発行する。
  // TTL 経過後は OpenBao が backend ユーザを自動失効（drop）させる。
  rpc GetDynamic(GetDynamicSecretRequest) returns (GetDynamicSecretResponse) {
    option (google.api.http) = {
      post: "/k1s0/secrets/getdynamic"
      body: "*"
    };
  }
  // ローテーション実行（FR-T1-SECRETS-004）
  // 成功時は new_version を返し、旧バージョンは grace_period_sec まで Get 可能。
  // 失敗時は K1s0Error を返し OpenBao 側は不変（トランザクショナル）。
  rpc Rotate(RotateSecretRequest) returns (RotateSecretResponse) {
    option (google.api.http) = {
      post: "/k1s0/secrets/rotate"
      body: "*"
    };
  }
  // Transit 暗号化（FR-T1-SECRETS-003）。AES-256-GCM 固定。
  // 鍵名は tier1 が <tenant_id>.<key_label> で自動 prefix する。
  // 鍵バージョンは ciphertext に埋め込まれ、Decrypt 時に自動的に正しい版で復号される。
  rpc Encrypt(EncryptRequest) returns (EncryptResponse) {
    option (google.api.http) = {
      post: "/k1s0/secrets/encrypt"
      body: "*"
    };
  }
  // Transit 復号（FR-T1-SECRETS-003）。
  // ciphertext から鍵バージョンを取り出し、対応する鍵で復号する。
  // ローテーション後の旧版 ciphertext も自動で復号できる。
  rpc Decrypt(DecryptRequest) returns (DecryptResponse) {
    option (google.api.http) = {
      post: "/k1s0/secrets/decrypt"
      body: "*"
    };
  }
  // Transit 鍵ローテーション（FR-T1-SECRETS-003 受け入れ基準「鍵バージョン管理が自動」）。
  // 新バージョン鍵を生成して current にする。以降の Encrypt は新版で行うが、
  // 旧版 ciphertext は引き続き Decrypt 可能（旧版鍵を保持）。
  rpc RotateKey(RotateKeyRequest) returns (RotateKeyResponse) {
    option (google.api.http) = {
      post: "/k1s0/secrets/rotatekey"
      body: "*"
    };
  }
}

// Get リクエスト
message GetSecretRequest {
  // シークレット名（テナント境界を超えた参照は即 PermissionDenied）
  string name = 1;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 2;
  // 省略時は最新、明示で旧バージョン取得可（grace_period 中のみ）
  optional int32 version = 3;
}

// Get 応答
message GetSecretResponse {
  // 値（Base64 エンコード必要時はクライアント側で判断、複数キーの key=value マップ）
  map<string, string> values = 1;
  // バージョン（ローテーション追跡用）
  int32 version = 2;
}

// BulkGet リクエスト
message BulkGetSecretRequest {
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 1;
}

// BulkGet 応答
message BulkGetSecretResponse {
  // 結果マップ（シークレット名 → GetSecretResponse）
  map<string, GetSecretResponse> results = 1;
}

// Rotate リクエスト
message RotateSecretRequest {
  // ローテーション対象シークレット名
  string name = 1;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 2;
  // 旧バージョンの猶予時間（0 は即無効、既定 3600 秒）
  // tier2 側の接続プール drain 時間を想定
  int32 grace_period_sec = 3;
  // 動的シークレット（DB 資格情報等）の場合の発行ポリシー名
  optional string policy = 4;
  // 冪等性キー（同一キーでの再試行は同じ new_version を返す）
  string idempotency_key = 5;
}

// Rotate 応答
message RotateSecretResponse {
  // ローテーション後の新バージョン
  int32 new_version = 1;
  // 旧バージョン（grace_period_sec まで Get 可能）
  int32 previous_version = 2;
  // 新バージョン発効時刻（Unix epoch ミリ秒）
  int64 rotated_at_ms = 3;
  // 動的シークレット時の TTL（静的シークレットでは 0）
  int32 ttl_sec = 4;
}

// GetDynamic リクエスト（FR-T1-SECRETS-002）
message GetDynamicSecretRequest {
  // 呼出元コンテキスト（テナント境界の検証に必須）
  k1s0.tier1.common.v1.TenantContext context = 1;
  // 発行エンジン名（"postgres" / "mysql" / "kafka" 等、OpenBao の database engine 種別）
  string engine = 2;
  // OpenBao 側で予め定義されたロール名（tenant_id でスコープされた role）
  string role = 3;
  // TTL 秒数（0 = 既定 3600 秒 = 1 時間、最大 86400 秒 = 24 時間）
  int32 ttl_sec = 4;
}

// GetDynamic 応答
message GetDynamicSecretResponse {
  // 発行された credential 一式（"username" / "password" 等の key=value）
  map<string, string> values = 1;
  // OpenBao 側 lease ID（renewal / revoke 用、削除時に呼び返す）
  string lease_id = 2;
  // 実際に付与された TTL 秒数（要求値が ceiling を超えたら短縮される）
  int32 ttl_sec = 3;
  // 発効時刻（Unix epoch ミリ秒）
  int64 issued_at_ms = 4;
}

// Encrypt リクエスト（FR-T1-SECRETS-003）。
message EncryptRequest {
  // 呼出元コンテキスト（テナント境界の検証に必須）。
  k1s0.tier1.common.v1.TenantContext context = 1;
  // 鍵ラベル（tier1 が <tenant_id>.<key_label> で自動 prefix する）。
  // 同一 tenant 内で鍵空間を分離するため、key_label は業務ドメイン名等で命名する。
  string key_name = 2;
  // 暗号化対象の平文 bytes。
  bytes plaintext = 3;
  // AAD（Associated Authenticated Data）。GCM の追加認証データに渡す。
  // 通常は tenant_id + RPC 名 等を JSON encoded で詰める運用想定。空でも良い。
  bytes aad = 4;
}

// Encrypt 応答。
message EncryptResponse {
  // 暗号文。フォーマット: [version:4 BE][nonce:12][ciphertext+tag]。
  // 鍵バージョン管理は ciphertext に埋め込まれ、Decrypt 時に自動的に解決される。
  bytes ciphertext = 1;
  // 暗号化に使用した鍵バージョン（observability / audit 用）。
  int32 key_version = 2;
}

// Decrypt リクエスト（FR-T1-SECRETS-003）。
message DecryptRequest {
  // 呼出元コンテキスト（テナント境界の検証に必須）。
  k1s0.tier1.common.v1.TenantContext context = 1;
  // 鍵ラベル（Encrypt 時と同じ key_label を渡す）。
  string key_name = 2;
  // 暗号文（Encrypt の出力をそのまま渡す）。
  bytes ciphertext = 3;
  // AAD（Encrypt 時と同じ値が必須、GCM の整合性検証に使用）。
  bytes aad = 4;
}

// Decrypt 応答。
message DecryptResponse {
  // 復号された平文。
  bytes plaintext = 1;
  // 復号に使用した鍵バージョン（旧版鍵で暗号化された場合の追跡用）。
  int32 key_version = 2;
}

// RotateKey リクエスト（FR-T1-SECRETS-003 受け入れ基準「鍵バージョン管理が自動」）。
message RotateKeyRequest {
  // 呼出元コンテキスト。
  k1s0.tier1.common.v1.TenantContext context = 1;
  // 鍵ラベル（tier1 が <tenant_id>.<key_label> で自動 prefix する）。
  string key_name = 2;
}

// RotateKey 応答。
message RotateKeyResponse {
  // ローテーション後の新バージョン番号（既存版は保持される、Decrypt 引き続き可）。
  int32 new_version = 1;
  // ローテーション直前の旧バージョン（最大 = new_version - 1）。
  int32 previous_version = 2;
  // ローテーション時刻（Unix epoch ミリ秒）。
  int64 rotated_at_ms = 3;
}
