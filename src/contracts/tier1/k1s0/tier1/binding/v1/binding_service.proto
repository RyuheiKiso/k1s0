// 本ファイルは tier1 公開 Binding API の正式 proto。
// 外部システム（HTTP / SMTP / S3 等）への出力バインディング呼出を提供する。
//
// 設計正典:
//   docs/03_要件定義/20_機能要件/40_tier1_API契約IDL/05_Binding_API.md
//   docs/03_要件定義/20_機能要件/10_tier1_API要件/05_Binding_API.md
//
// 関連要件: FR-T1-BINDING-001〜004
// proto 構文宣言（proto3）
syntax = "proto3";

// パッケージ命名規約: k1s0.tier1.<api>.v<n>
package k1s0.tier1.binding.v1;

// 共通型（TenantContext / ErrorDetail）の import
import "k1s0/tier1/common/v1/common.proto";

// Binding API。バインディング名は運用側で事前設定（s3-archive / smtp-notify 等）。
service BindingService {
  // 出力バインディング呼出（tier1 → 外部システムへ送信）
  rpc Invoke(InvokeBindingRequest) returns (InvokeBindingResponse);
}

// Invoke リクエスト
message InvokeBindingRequest {
  // バインディング名（運用側で事前設定、例: s3-archive / smtp-notify）
  string name = 1;
  // 操作種別（create / get / list / delete / send 等、バインディング型依存）
  string operation = 2;
  // 操作データ本文
  bytes data = 3;
  // メタデータ（content-type / to / subject 等、バインディング型依存）
  map<string, string> metadata = 4;
  // 呼出元コンテキスト
  k1s0.tier1.common.v1.TenantContext context = 5;
  // 冪等性キー（共通規約 §「冪等性と再試行」: 24h TTL の dedup）
  // 外部送信（SMTP / S3 等）の重複防止に必須。同一キーでの再試行は初回 response を返す。
  string idempotency_key = 6;
}

// Invoke 応答
message InvokeBindingResponse {
  // 応答本文（操作種別とバインディング型に依存）
  bytes data = 1;
  // メタデータ（外部システムから返るヘッダ等）
  map<string, string> metadata = 2;
}
