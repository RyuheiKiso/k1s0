# docker-compose.dev.yaml — ローカル開発専用のオーバーライド設定
#
# 使用方法: docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
#   または: just local-up-dev
#
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# !! WARNING: このファイルは開発環境専用です。                  !!
# !! 認証バイパスやセキュリティ緩和設定が含まれています。       !!
# !! 本番環境や CI では絶対に使用しないでください。             !!
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
#
# このファイルは docker-compose.override.yaml から名前を変更しました。
# Docker Compose の自動マージを防止し、明示的な -f 指定が必要です。
# これにより `docker compose up` のデフォルト動作では認証バイパスが無効になります。
#
# CARGO_FEATURES ビルド引数で dev-auth-bypass フィーチャーを有効化し、
# ALLOW_INSECURE_NO_AUTH=true 環境変数でランタイム時に認証バイパスを発動させる。
# 本番 Dockerfile ではビルド引数を指定しないため、バイパスコードはバイナリに含まれない。
#
# 新しいサービスを追加する場合は <<: *dev-auth-bypass の2行を追加するだけでよい。

# 認証バイパスの共通設定を YAML アンカーで定義する。
# 全サービスで同一設定を使用するため、ここで一元管理する。
x-dev-auth-bypass: &dev-auth-bypass
  build:
    args:
      CARGO_FEATURES: "k1s0-server-common/dev-auth-bypass"
  environment:
    - ALLOW_INSECURE_NO_AUTH=true

services:
  # ============================================================
  # インフラ — ローカル開発用デフォルト認証情報
  # 本番用 docker-compose.yaml では :? でデフォルト値なし必須化しているため、
  # ローカル開発時はここで dev 用デフォルト値を提供する。
  # ============================================================
  postgres:
    environment:
      POSTGRES_PASSWORD: dev

  redis:
    environment:
      REDIS_PASSWORD: dev

  redis-session:
    environment:
      REDIS_SESSION_PASSWORD: dev

  keycloak:
    environment:
      KC_DB_PASSWORD: dev
      # docker-compose.yaml の ${KEYCLOAK_ADMIN_PASSWORD:?...} を満たすためのローカル開発用デフォルト値。
      # C-03監査対応: .env.example のコメントアウトによりこの変数が未設定になり起動失敗していた問題を修正。
      KEYCLOAK_ADMIN_PASSWORD: dev
      KC_BOOTSTRAP_ADMIN_PASSWORD: dev
      KC_BFF_CLIENT_SECRET: dev-bff-secret
      KC_SERVICE_CLIENT_SECRET: dev-service-secret
      KC_TEST_ADMIN_PASSWORD: admin123
      KC_TEST_USER_PASSWORD: user123
      KC_TEST_TASK_MGR_PASSWORD: task123

  # Vault dev モード用ルートトークン。
  # docker-compose.yaml では :? で必須化しているため、ローカル開発時はここでデフォルト値を提供する。
  # 本番環境や CI では絶対にこのファイルを使用しないこと。
  vault:
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-token

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: dev

  # ============================================================
  # API Gateway — Admin API をループバックインターフェースのみに制限
  # C-04監査対応: 開発環境でも Admin API を 0.0.0.0（全NIC）に公開せず、
  # 127.0.0.1（ループバック）にバインドすることで、同一マシン外からの
  # 不正アクセスリスクを排除する
  # ============================================================
  kong:
    ports:
      - "127.0.0.1:${KONG_ADMIN_HOST_PORT:-8001}:8001"    # Admin API（開発用: ループバックのみ公開）

  # ============================================================
  # System プロファイル — 認証バイパス有効化
  # ============================================================
  config-rust:
    <<: *dev-auth-bypass

  saga-rust:
    <<: *dev-auth-bypass

  dlq-manager:
    <<: *dev-auth-bypass

  featureflag-rust:
    <<: *dev-auth-bypass

  ratelimit-rust:
    <<: *dev-auth-bypass

  tenant-rust:
    <<: *dev-auth-bypass

  vault-rust:
    <<: *dev-auth-bypass

  api-registry-rust:
    <<: *dev-auth-bypass

  app-registry-rust:
    <<: *dev-auth-bypass

  event-monitor-rust:
    <<: *dev-auth-bypass

  event-store-rust:
    <<: *dev-auth-bypass

  file-rust:
    <<: *dev-auth-bypass

  master-maintenance-rust:
    <<: *dev-auth-bypass

  navigation-rust:
    <<: *dev-auth-bypass

  notification-rust:
    <<: *dev-auth-bypass

  policy-rust:
    <<: *dev-auth-bypass

  quota-rust:
    <<: *dev-auth-bypass

  rule-engine-rust:
    <<: *dev-auth-bypass

  scheduler-rust:
    <<: *dev-auth-bypass

  search-rust:
    <<: *dev-auth-bypass

  service-catalog-rust:
    <<: *dev-auth-bypass

  session-rust:
    <<: *dev-auth-bypass

  workflow-rust:
    <<: *dev-auth-bypass

  # GraphQL Gateway — 認証バイパス有効化
  graphql-gateway-rust:
    <<: *dev-auth-bypass

  ai-gateway-rust:
    <<: *dev-auth-bypass

  ai-agent-rust:
    <<: *dev-auth-bypass
