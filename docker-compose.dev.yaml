# docker-compose.dev.yaml — ローカル開発専用のオーバーライド設定
#
# 使用方法:
#   just local-up   （推奨: .env.dev が自動適用される）
#   または手動:
#   docker compose --env-file .env.dev \
#     -f docker-compose.yaml -f docker-compose.dev.yaml \
#     --profile infra --profile system up -d
#
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# !! WARNING: このファイルは開発環境専用です。                          !!
# !!                                                                   !!
# !! 【セキュリティリスク一覧】                                          !!
# !!                                                                   !!
# !! 1. 認証バイパス (ALLOW_INSECURE_NO_AUTH=true)                      !!
# !!    → 全エンドポイントが認証なしでアクセス可能になる               !!
# !!                                                                   !!
# !! 2. PostgreSQL superuser (POSTGRES_USER=dev / POSTGRES_PASSWORD=dev) !!
# !!    → dev ユーザーが superuser 権限を持ち、全 DB を操作可能        !!
# !!    → 本番では最小権限ロール（読み取り専用・特定スキーマのみ）を使用 !!
# !!    → ADR-0027 参照: docs/architecture/adr/0027-db-app-user-role-separation.md !!
# !!                                                                   !!
# !! 3. Vault dev モード (VAULT_DEV_ROOT_TOKEN_ID)                      !!
# !!    → インメモリストレージ。再起動でシークレットが消失する           !!
# !!    → Root Token が使用されるため全シークレットへのアクセスが可能   !!
# !!                                                                   !!
# !! 4. Keycloak start-dev                                              !!
# !!    → TLS なし・H2 インメモリDB。本番では start + TLS 必須         !!
# !!                                                                   !!
# !! 本番環境・CI・ステージング環境では絶対に使用しないでください。      !!
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
#
# 【ファイルの役割分担】
#
#   .env.dev               ホスト環境変数を提供 → docker-compose.yaml の ${VAR:?...} interpolation を解決
#   docker-compose.dev.yaml  コンテナ設定のオーバーライド → 認証バイパス・Admin API 公開設定
#
# 【設計上の背景】
#   docker-compose.yaml の ${VAR:?error} 構文はファイルマージより先に（ホスト環境変数から）評価されるため、
#   このオーバーライドファイルの environment セクションでは解決できません。
#   パスワード等の開発用デフォルト値は .env.dev で一元管理し、--env-file で渡します。
#
# CARGO_FEATURES ビルド引数で dev-auth-bypass フィーチャーを有効化し、
# ALLOW_INSECURE_NO_AUTH=true 環境変数でランタイム時に認証バイパスを発動させる。
# 本番 Dockerfile ではビルド引数を指定しないため、バイパスコードはバイナリに含まれない。
#
# 新しいサービスを追加する場合は <<: *dev-auth-bypass の2行を追加するだけでよい。

# LOW-002 対応: --env-file .env.dev を省略した場合に即時エラーを発生させるガード変数。
# Docker Compose の ${VAR:?err} 演算子はファイルパース時にすべての文字列値で評価される（Compose Spec 変数補間仕様）。
# DEV_ENV_GUARD が .env.dev から注入されていない場合、Docker Compose はパースを中断してエラーを返す。
# このフィールドは Extension Field（x-*）として定義するため、コンテナ環境変数には渡されない。
# ネストしたオブジェクト（旧: x-dev-env-validate._guard）より、スカラー値のフラット形式が
# Docker Compose 変数補間エンジンの評価対象として明確に保証されるため、この形式を採用する。
x-dev-env-guard: "${DEV_ENV_GUARD:?'[ERROR] .env.dev が読み込まれていません。docker compose に --env-file .env.dev を指定するか、just local-up を使用してください。詳細: docs/infrastructure/devenv/troubleshooting.md'}"

# 認証バイパスの共通設定を YAML アンカーで定義する。
# 全サービスで同一設定を使用するため、ここで一元管理する。
# 注意: config.docker.yaml の "${DB_PASSWORD:-dev}" は serde_yaml がシェル展開しないため
# DATABASE_URL を各サービスに個別設定して startup.rs の優先パスを利用する。
x-dev-auth-bypass: &dev-auth-bypass
  build:
    args:
      CARGO_FEATURES: "k1s0-server-common/dev-auth-bypass"
  environment:
    - ALLOW_INSECURE_NO_AUTH=true

services:
  # ============================================================
  # API Gateway — Admin API をループバックインターフェースのみに制限
  # C-04監査対応: 開発環境でも Admin API を 0.0.0.0（全NIC）に公開せず、
  # 127.0.0.1（ループバック）にバインドすることで、同一マシン外からの
  # 不正アクセスリスクを排除する
  # ============================================================
  kong:
    # HIGH-005 監査対応: KONG_ADMIN_LISTEN を 0.0.0.0 にしないと Docker Desktop では
    # ホストから 127.0.0.1:8001 のポートフォワードが機能しない
    environment:
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
    ports:
      - "127.0.0.1:${KONG_ADMIN_HOST_PORT:-8001}:8001"    # Admin API（開発用: ループバックのみ公開）

  # ============================================================
  # System プロファイル — 認証バイパス有効化
  # ============================================================
  # 注意: DATABASE_URL を設定して config.docker.yaml の ${DB_PASSWORD:-dev} 未展開問題を回避する。
  # serde_yaml はシェル変数展開を行わないため、startup.rs の DATABASE_URL 優先パスを利用する。
  # 開発環境専用: sslmode=disable は開発効率のため。本番環境では sslmode=require または sslmode=verify-full を使用（HIGH-SEC-08 監査対応）
  auth-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/auth_db?sslmode=disable
      # HIGH-02 監査対応: API キー HMAC-SHA256 ハッシュ生成に使用するペッパー値をホスト環境変数から注入する。
      # .env.dev で定義されたローカル開発用固定値を使用する。本番環境では Vault から注入すること。
      - API_KEY_PEPPER=${API_KEY_PEPPER}

  config-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # config スキーマのテーブルに直接アクセスするため search_path を設定する（database.rs と同様）
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/config_db?sslmode=disable&options=-c%20search_path%3Dconfig,public

  saga-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # CRIT-01 監査対応: ADR-0060 で saga は k1s0_saga 専用 DB に移行済みのため修正する。
      # 誤った k1s0_system への接続を防ぎ、config.docker.yaml の database.name と一致させる。
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/k1s0_saga?sslmode=disable

  dlq-manager:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # init-db/05-dlq-schema.sql が dlq_db に dlq スキーマを作成するため接続先を dlq_db に修正する（H-6 監査対応）
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/dlq_db?sslmode=disable

  featureflag-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/featureflag_db?sslmode=disable

  ratelimit-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/ratelimit_db?sslmode=disable
      # serde_yaml が redis.url の "${REDIS_PASSWORD:-dev}" を展開しないため REDIS_URL で直接指定する（C-4 監査対応）
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - REDIS_URL=redis://:${REDIS_PASSWORD:-dev}@redis:6379

  # テナントサービス: config.docker.yaml に database セクションがないため DATABASE_URL で設定する
  tenant-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/tenant_db?sslmode=disable

  # Vault サービス: DATABASE_URL で接続設定を直接指定する
  vault-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/vault_db?sslmode=disable

  # API Registry: DATABASE_URL で接続設定を直接指定する
  api-registry-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/api_registry_db?sslmode=disable

  app-registry-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/app_registry_db?sslmode=disable

  event-monitor-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # event_monitor スキーマは k1s0_event_monitor 専用 DB 内に配置する（18-event-monitor-schema.sql 参照）
      # CRIT-001 監査対応: k1s0_system から k1s0_event_monitor に分離済み。k1s0_system への誤接続を修正。
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/k1s0_event_monitor?sslmode=disable

  event-store-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/event_store_db?sslmode=disable

  file-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/file_db?sslmode=disable

  master-maintenance-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/k1s0_system?sslmode=disable

  navigation-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # navigation-rust は YAML 設定ファイルからルートデータを読み込む実装のため DB 不使用（LOW-4 監査対応）

  notification-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/notification_db?sslmode=disable

  policy-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/policy_db?sslmode=disable

  quota-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/quota_db?sslmode=disable

  rule-engine-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/rule_engine_db?sslmode=disable
      # DOCKER-MED-003 対応: rule-engine の in-memory バックエンドを解消するため Kafka 設定を追加
      - KAFKA_BROKERS=kafka:9092

  scheduler-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/scheduler_db?sslmode=disable

  search-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/search_db?sslmode=disable

  service-catalog-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/service_catalog_db?sslmode=disable

  session-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/session_db?sslmode=disable

  workflow-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://${DEV_DB_USER:-dev}:${DEV_DB_PASSWORD:-dev}@postgres:5432/workflow_db?sslmode=disable

  # GraphQL Gateway — 認証バイパス有効化
  graphql-gateway-rust:
    <<: *dev-auth-bypass

  ai-gateway-rust:
    <<: *dev-auth-bypass

  ai-agent-rust:
    <<: *dev-auth-bypass

  # ============================================================
  # Service プロファイル — 認証バイパス有効化 + DATABASE_URL
  # C-01 監査対応: サービスティアは docker-compose.dev.yaml に記載がなかったため
  # dev-auth-bypass と DATABASE_URL を明示的に設定する。
  # k1s0 ユーザーのパスワードは init-db/00-create-app-user.sh のデフォルト値と一致させる。
  # ============================================================
  task-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # search_path を指定しないと sqlx が public スキーマに _sqlx_migrations を作成しようとして権限エラーになる
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://k1s0:${K1S0_DB_PASSWORD:-dev-k1s0-local}@postgres:5432/k1s0_service?sslmode=disable&options=--search_path%3Dtask_service

  board-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # search_path を指定しないと sqlx が public スキーマに _sqlx_migrations を作成しようとして権限エラーになる
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://k1s0:${K1S0_DB_PASSWORD:-dev-k1s0-local}@postgres:5432/k1s0_service?sslmode=disable&options=--search_path%3Dboard_service

  activity-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # search_path を指定しないと sqlx が public スキーマに _sqlx_migrations を作成しようとして権限エラーになる
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://k1s0:${K1S0_DB_PASSWORD:-dev-k1s0-local}@postgres:5432/k1s0_service?sslmode=disable&options=--search_path%3Dactivity_service

  # ============================================================
  # Business プロファイル — 認証バイパス有効化 + DATABASE_URL
  # ============================================================
  project-master-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # search_path を指定しないと sqlx が public スキーマに _sqlx_migrations を作成しようとして権限エラーになる
      # INFRA-HIGH-003 対応: パスワードを .env.dev で一元管理する
      - DATABASE_URL=postgres://k1s0:${K1S0_DB_PASSWORD:-dev-k1s0-local}@postgres:5432/k1s0_business?sslmode=disable&options=--search_path%3Dproject_master

  # ============================================================
  # Vault — 開発環境専用の dev モード設定（L-13 監査対応）
  # ============================================================
  # Vault dev モード設定（L-04 監査対応）
  #
  # !! WARNING: dev モードのリスク一覧 !!
  #
  # 1. インメモリストレージ
  #    - コンテナ再起動でシークレットがすべて消失する
  #    - `vault kv put` で設定したシークレットはコンテナ停止で削除される
  #    - 開発作業前に .env.dev の VAULT_DEV_ROOT_TOKEN_ID を確認して再初期化する
  #
  # 2. Root Token の使用
  #    - VAULT_DEV_ROOT_TOKEN_ID が Root Token として設定される
  #    - Root Token は全 Vault リソースへのフルアクセス権限を持つ
  #    - 本番環境では Root Token を無効化し、最小権限のポリシーを使用すること
  #
  # 3. 封印なし（Unseal 不要）
  #    - dev モードは常にアンシールされた状態で起動する
  #    - 本番環境では Shamir Secret Sharing または Auto-Unseal (KMS) が必要
  #
  # 4. TLS なし
  #    - dev モードは HTTP で動作する（VAULT_ADDR=http://127.0.0.1:8200）
  #    - 本番環境では必ず TLS を有効化し、VAULT_ADDR=https://... を使用すること
  #
  # VAULT_DEV_ROOT_TOKEN_ID は dev モードを有効化する環境変数。
  # 本番 Vault は infra/terraform/modules/vault/ で管理し、Docker Compose を使用しない。
  vault:
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_DEV_ROOT_TOKEN_ID:?VAULT_DEV_ROOT_TOKEN_ID must be set in .env.dev for Vault dev mode}

  # ============================================================
  # Keycloak — 開発環境専用の起動コマンド
  # ============================================================
  # start-dev は開発環境のみで使用するコマンド。
  # 本番環境では "start" コマンドを使用すること（TLS終端・クラスター設定が必要）。
  # --import-realm: 起動時に /opt/keycloak/data/import 内の realm 設定を自動インポートする
  keycloak:
    command: ["start-dev", "--import-realm"]

  # ============================================================
  # bff-proxy — セッション暗号化キー設定（MED-8 監査対応）
  # ============================================================
  # SESSION_ENCRYPTION_KEY が未設定の場合、セッションデータが Redis に平文で保存される。
  # .env.dev の SESSION_ENCRYPTION_KEY（開発用ダミー値）を渡して平文保存を防止する。
  bff-proxy:
    environment:
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY:?SESSION_ENCRYPTION_KEY must be set in .env.dev}
