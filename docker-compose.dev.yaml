# docker-compose.dev.yaml — ローカル開発専用のオーバーライド設定
#
# 使用方法: docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
#   または: just local-up-dev
#
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# !! WARNING: このファイルは開発環境専用です。                  !!
# !! 認証バイパスやセキュリティ緩和設定が含まれています。       !!
# !! 本番環境や CI では絶対に使用しないでください。             !!
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
#
# このファイルは docker-compose.override.yaml から名前を変更しました。
# Docker Compose の自動マージを防止し、明示的な -f 指定が必要です。
# これにより `docker compose up` のデフォルト動作では認証バイパスが無効になります。
#
# CARGO_FEATURES ビルド引数で dev-auth-bypass フィーチャーを有効化し、
# ALLOW_INSECURE_NO_AUTH=true 環境変数でランタイム時に認証バイパスを発動させる。
# 本番 Dockerfile ではビルド引数を指定しないため、バイパスコードはバイナリに含まれない。
#
# 新しいサービスを追加する場合は <<: *dev-auth-bypass の2行を追加するだけでよい。

# 認証バイパスの共通設定を YAML アンカーで定義する。
# 全サービスで同一設定を使用するため、ここで一元管理する。
x-dev-auth-bypass: &dev-auth-bypass
  build:
    args:
      CARGO_FEATURES: "k1s0-server-common/dev-auth-bypass"
  environment:
    - ALLOW_INSECURE_NO_AUTH=true

services:
  # ============================================================
  # API Gateway — Admin API をローカルネットワーク全体に公開
  # ============================================================
  kong:
    ports:
      - "${KONG_ADMIN_HOST_PORT:-8001}:8001"    # Admin API（開発用: 全インターフェースに公開）

  # ============================================================
  # System プロファイル — 認証バイパス有効化
  # ============================================================
  config-rust:
    <<: *dev-auth-bypass

  saga-rust:
    <<: *dev-auth-bypass

  dlq-manager:
    <<: *dev-auth-bypass

  featureflag-rust:
    <<: *dev-auth-bypass

  ratelimit-rust:
    <<: *dev-auth-bypass

  tenant-rust:
    <<: *dev-auth-bypass

  vault-rust:
    <<: *dev-auth-bypass

  api-registry-rust:
    <<: *dev-auth-bypass

  app-registry-rust:
    <<: *dev-auth-bypass

  event-monitor-rust:
    <<: *dev-auth-bypass

  event-store-rust:
    <<: *dev-auth-bypass

  file-rust:
    <<: *dev-auth-bypass

  master-maintenance-rust:
    <<: *dev-auth-bypass

  navigation-rust:
    <<: *dev-auth-bypass

  notification-rust:
    <<: *dev-auth-bypass

  policy-rust:
    <<: *dev-auth-bypass

  quota-rust:
    <<: *dev-auth-bypass

  rule-engine-rust:
    <<: *dev-auth-bypass

  scheduler-rust:
    <<: *dev-auth-bypass

  search-rust:
    <<: *dev-auth-bypass

  service-catalog-rust:
    <<: *dev-auth-bypass

  session-rust:
    <<: *dev-auth-bypass

  workflow-rust:
    <<: *dev-auth-bypass

  # GraphQL Gateway — 認証バイパス有効化
  graphql-gateway-rust:
    <<: *dev-auth-bypass

  ai-gateway-rust:
    <<: *dev-auth-bypass

  ai-agent-rust:
    <<: *dev-auth-bypass
