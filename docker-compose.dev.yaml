# docker-compose.dev.yaml — ローカル開発専用のオーバーライド設定
#
# 使用方法:
#   just local-up   （推奨: .env.dev が自動適用される）
#   または手動:
#   docker compose --env-file .env.dev \
#     -f docker-compose.yaml -f docker-compose.dev.yaml \
#     --profile infra --profile system up -d
#
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# !! WARNING: このファイルは開発環境専用です。                  !!
# !! 認証バイパスやセキュリティ緩和設定が含まれています。       !!
# !! 本番環境や CI では絶対に使用しないでください。             !!
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
#
# 【ファイルの役割分担】
#
#   .env.dev               ホスト環境変数を提供 → docker-compose.yaml の ${VAR:?...} interpolation を解決
#   docker-compose.dev.yaml  コンテナ設定のオーバーライド → 認証バイパス・Admin API 公開設定
#
# 【設計上の背景】
#   docker-compose.yaml の ${VAR:?error} 構文はファイルマージより先に（ホスト環境変数から）評価されるため、
#   このオーバーライドファイルの environment セクションでは解決できません。
#   パスワード等の開発用デフォルト値は .env.dev で一元管理し、--env-file で渡します。
#
# CARGO_FEATURES ビルド引数で dev-auth-bypass フィーチャーを有効化し、
# ALLOW_INSECURE_NO_AUTH=true 環境変数でランタイム時に認証バイパスを発動させる。
# 本番 Dockerfile ではビルド引数を指定しないため、バイパスコードはバイナリに含まれない。
#
# 新しいサービスを追加する場合は <<: *dev-auth-bypass の2行を追加するだけでよい。

# 認証バイパスの共通設定を YAML アンカーで定義する。
# 全サービスで同一設定を使用するため、ここで一元管理する。
# 注意: config.docker.yaml の "${DB_PASSWORD:-dev}" は serde_yaml がシェル展開しないため
# DATABASE_URL を各サービスに個別設定して startup.rs の優先パスを利用する。
x-dev-auth-bypass: &dev-auth-bypass
  build:
    args:
      CARGO_FEATURES: "k1s0-server-common/dev-auth-bypass"
  environment:
    - ALLOW_INSECURE_NO_AUTH=true

services:
  # ============================================================
  # API Gateway — Admin API をループバックインターフェースのみに制限
  # C-04監査対応: 開発環境でも Admin API を 0.0.0.0（全NIC）に公開せず、
  # 127.0.0.1（ループバック）にバインドすることで、同一マシン外からの
  # 不正アクセスリスクを排除する
  # ============================================================
  kong:
    ports:
      - "127.0.0.1:${KONG_ADMIN_HOST_PORT:-8001}:8001"    # Admin API（開発用: ループバックのみ公開）

  # ============================================================
  # System プロファイル — 認証バイパス有効化
  # ============================================================
  # 注意: DATABASE_URL を設定して config.docker.yaml の ${DB_PASSWORD:-dev} 未展開問題を回避する。
  # serde_yaml はシェル変数展開を行わないため、startup.rs の DATABASE_URL 優先パスを利用する。
  # 開発環境専用: sslmode=disable は開発効率のため。本番環境では sslmode=require または sslmode=verify-full を使用（HIGH-SEC-08 監査対応）
  auth-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/auth_db?sslmode=disable

  config-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/config_db?sslmode=disable

  saga-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/k1s0_system?sslmode=disable

  dlq-manager:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # init-db/05-dlq-schema.sql が dlq_db に dlq スキーマを作成するため接続先を dlq_db に修正する（H-6 監査対応）
      - DATABASE_URL=postgres://dev:dev@postgres:5432/dlq_db?sslmode=disable

  featureflag-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/featureflag_db?sslmode=disable

  ratelimit-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/ratelimit_db?sslmode=disable
      # serde_yaml が redis.url の "${REDIS_PASSWORD:-dev}" を展開しないため REDIS_URL で直接指定する（C-4 監査対応）
      - REDIS_URL=redis://:dev@redis:6379

  # テナントサービス: config.docker.yaml に database セクションがないため DATABASE_URL で設定する
  tenant-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/tenant_db?sslmode=disable

  # Vault サービス: DATABASE_URL で接続設定を直接指定する
  vault-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/vault_db?sslmode=disable

  # API Registry: DATABASE_URL で接続設定を直接指定する
  api-registry-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/api_registry_db?sslmode=disable

  app-registry-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/app_registry_db?sslmode=disable

  event-monitor-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # event_monitor スキーマは k1s0_system 内に配置する（18-event-monitor-schema.sql で作成）
      - DATABASE_URL=postgres://k1s0:dev-k1s0-local@postgres:5432/k1s0_system?sslmode=disable

  event-store-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/event_store_db?sslmode=disable

  file-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/file_db?sslmode=disable

  master-maintenance-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/k1s0_system?sslmode=disable

  navigation-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # navigation-rust は YAML 設定ファイルからルートデータを読み込む実装のため DB 不使用（LOW-4 監査対応）

  notification-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/notification_db?sslmode=disable

  policy-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/policy_db?sslmode=disable

  quota-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/quota_db?sslmode=disable

  rule-engine-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/rule_engine_db?sslmode=disable

  scheduler-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/scheduler_db?sslmode=disable

  search-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/search_db?sslmode=disable

  service-catalog-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/service_catalog_db?sslmode=disable

  session-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/session_db?sslmode=disable

  workflow-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      - DATABASE_URL=postgres://dev:dev@postgres:5432/workflow_db?sslmode=disable

  # GraphQL Gateway — 認証バイパス有効化
  graphql-gateway-rust:
    <<: *dev-auth-bypass

  ai-gateway-rust:
    <<: *dev-auth-bypass

  ai-agent-rust:
    <<: *dev-auth-bypass

  # ============================================================
  # Service プロファイル — 認証バイパス有効化 + DATABASE_URL
  # C-01 監査対応: サービスティアは docker-compose.dev.yaml に記載がなかったため
  # dev-auth-bypass と DATABASE_URL を明示的に設定する。
  # k1s0 ユーザーのパスワードは init-db/00-create-app-user.sh のデフォルト値と一致させる。
  # ============================================================
  task-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # search_path を指定しないと sqlx が public スキーマに _sqlx_migrations を作成しようとして権限エラーになる
      - DATABASE_URL=postgres://k1s0:dev-k1s0-local@postgres:5432/k1s0_service?sslmode=disable&options=--search_path%3Dtask_service

  board-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # search_path を指定しないと sqlx が public スキーマに _sqlx_migrations を作成しようとして権限エラーになる
      - DATABASE_URL=postgres://k1s0:dev-k1s0-local@postgres:5432/k1s0_service?sslmode=disable&options=--search_path%3Dboard_service

  activity-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # search_path を指定しないと sqlx が public スキーマに _sqlx_migrations を作成しようとして権限エラーになる
      - DATABASE_URL=postgres://k1s0:dev-k1s0-local@postgres:5432/k1s0_service?sslmode=disable&options=--search_path%3Dactivity_service

  # ============================================================
  # Business プロファイル — 認証バイパス有効化 + DATABASE_URL
  # ============================================================
  project-master-rust:
    <<: *dev-auth-bypass
    environment:
      - ALLOW_INSECURE_NO_AUTH=true
      # search_path を指定しないと sqlx が public スキーマに _sqlx_migrations を作成しようとして権限エラーになる
      - DATABASE_URL=postgres://k1s0:dev-k1s0-local@postgres:5432/k1s0_business?sslmode=disable&options=--search_path%3Dproject_master

  # ============================================================
  # Vault — 開発環境専用の dev モード設定（L-13 監査対応）
  # ============================================================
  # VAULT_DEV_ROOT_TOKEN_ID は dev モードを有効化する環境変数。
  # dev モードはインメモリストレージのため再起動でデータが消失する。
  # 本番 Vault は infra/terraform/modules/vault/ で管理し、Docker Compose を使用しない。
  vault:
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_DEV_ROOT_TOKEN_ID:?VAULT_DEV_ROOT_TOKEN_ID must be set in .env.dev for Vault dev mode}

  # ============================================================
  # Keycloak — 開発環境専用の起動コマンド
  # ============================================================
  # start-dev は開発環境のみで使用するコマンド。
  # 本番環境では "start" コマンドを使用すること（TLS終端・クラスター設定が必要）。
  # --import-realm: 起動時に /opt/keycloak/data/import 内の realm 設定を自動インポートする
  keycloak:
    command: ["start-dev", "--import-realm"]

  # ============================================================
  # bff-proxy — セッション暗号化キー設定（MED-8 監査対応）
  # ============================================================
  # SESSION_ENCRYPTION_KEY が未設定の場合、セッションデータが Redis に平文で保存される。
  # .env.dev の SESSION_ENCRYPTION_KEY（開発用ダミー値）を渡して平文保存を防止する。
  bff-proxy:
    environment:
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY:?SESSION_ENCRYPTION_KEY must be set in .env.dev}
