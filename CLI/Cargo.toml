[workspace]
resolver = "2"
members = [
    "crates/k1s0-cli",
    "crates/k1s0-generator",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"
repository = "https://github.com/your-org/k1s0"

[workspace.dependencies]
# CLI
clap = { version = "4.5", features = ["derive", "env"] }
clap_complete = "4.5"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Async
tokio = { version = "1.0", features = ["full"] }

# File system
walkdir = "2.5"
glob = "0.3"

# Hashing
sha2 = "0.10"

# Templating
tera = "1.19"

# Console output
console = "0.15"
indicatif = "0.17"

# Lazy initialization
once_cell = "1.21"

# Date/Time
chrono = { version = "0.4", features = ["serde"] }

# Internal crates
k1s0-generator = { path = "crates/k1s0-generator" }
