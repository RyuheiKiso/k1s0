[workspace]
resolver = "2"
members = [
    "crates/k1s0-cli",
    "crates/k1s0-generator",
    "crates/k1s0-lsp",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"
repository = "https://github.com/your-org/k1s0"

[workspace.dependencies]
# CLI
clap = { version = "4.5", features = ["derive", "env"] }
clap_complete = "4.5"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Async
tokio = { version = "1.0", features = ["full"] }

# File system
walkdir = "2.5"
glob = "0.3"

# Hashing
sha2 = "0.10"

# Templating
tera = "1.19"

# Console output
console = "0.15"
indicatif = "0.17"
inquire = "0.7"

# Lazy initialization
once_cell = "1.21"

# Date/Time
chrono = { version = "0.4", features = ["serde"] }

# Directories
dirs = "5.0"

# JSON Schema validation
jsonschema = "0.29"

# Semantic versioning
semver = "1.0"

# Graph data structures
petgraph = "0.6"

# AST parsing
tree-sitter = "0.25"
tree-sitter-rust = "0.24"
tree-sitter-go = "0.23"
tree-sitter-typescript = "0.23"
tree-sitter-python = "0.23"
tree-sitter-c-sharp = "0.23"
tree-sitter-kotlin-ng = "1.0"

# File watching
notify = "8.0"
notify-debouncer-mini = "0.6"

# LSP
tower-lsp = "0.20"

# Internal crates
k1s0-generator = { path = "crates/k1s0-generator" }
