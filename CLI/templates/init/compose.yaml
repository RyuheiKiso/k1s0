# k1s0 root-level infrastructure services
# Generated by `k1s0 init`
# This file provides shared infrastructure for local development.

services:
  postgres:
    image: postgres:16-alpine
    container_name: k1s0-postgres
    environment:
      POSTGRES_USER: k1s0
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U k1s0"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - k1s0-network

  redis:
    image: redis:7-alpine
    container_name: k1s0-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - k1s0-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: k1s0-otel
    volumes:
      - ./deploy/docker/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    command: ["--config", "/etc/otel/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    profiles:
      - observability
    networks:
      - k1s0-network

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: k1s0-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles:
      - observability
    networks:
      - k1s0-network

volumes:
  postgres-data:
  redis-data:

secrets:
  db_password:
    file: ./secrets/db_password

networks:
  k1s0-network:
    driver: bridge
