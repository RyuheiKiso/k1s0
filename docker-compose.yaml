    profiles: [system]
    ports:
      - "${SESSION_REST_HOST_PORT:-8106}:8080"
      - "${SESSION_GRPC_HOST_PORT:-50065}:50051"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - ALLOW_INSECURE_NO_AUTH=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./regions/system/server/rust/session/config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  workflow-rust:
    build:
      context: ./regions/system
      dockerfile: ./server/rust/workflow/Dockerfile
    profiles: [system]
    ports:
      - "${WORKFLOW_REST_HOST_PORT:-8107}:8080"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - ALLOW_INSECURE_NO_AUTH=true
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./regions/system/server/rust/workflow/config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  graphql-gateway-rust:
    build:
      context: .
      dockerfile: ./regions/system/server/rust/graphql-gateway/Dockerfile
    profiles: [system]
    ports:
      - "${GRAPHQL_GW_HOST_PORT:-8092}:8080"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      auth-rust:
        condition: service_healthy
      tenant-rust:
        condition: service_healthy
      featureflag-rust:
        condition: service_healthy
      config-rust:
        condition: service_healthy
    volumes:
      - ./regions/system/server/rust/graphql-gateway/config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  bff-proxy:
    build:
      context: ./regions/system/server/go/bff-proxy
      dockerfile: Dockerfile
    profiles: [system]
    ports:
      - "${BFF_PROXY_HOST_PORT:-8082}:8080"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      keycloak:
        condition: service_healthy
      redis-session:
        condition: service_healthy
    volumes:
      - ./regions/system/server/go/bff-proxy/config:/app/config

  # ============================================================
  # Business プロファイル
  # ============================================================
  domain-master-rust:
    build:
      context: .
      dockerfile: ./regions/business/accounting/server/rust/domain-master/Dockerfile
    profiles: [business]
    ports:
      - "${DOMAIN_MASTER_REST_HOST_PORT:-8210}:8080"
      - "${DOMAIN_MASTER_GRPC_HOST_PORT:-9210}:50051"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-rust:
        condition: service_healthy
    volumes:
      - ./regions/business/accounting/server/rust/domain-master/config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Kafka トピック自動作成
  # ============================================================
  kafka-init:
    image: apache/kafka:3.8.0
    profiles: [infra]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
      KAFKA_REPLICATION_FACTOR: "1"
      PATH: "/opt/kafka/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    volumes:
      - ./infra/messaging/kafka/create-topics.sh:/scripts/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/scripts/create-topics.sh"]
    restart: "no"

  # ============================================================
  # 可観測性
  # NOTE: ローカル開発環境では Promtail を省略している。
  # Kubernetes 環境では Promtail（DaemonSet）がログを収集し Loki に転送するが、
  # ローカルでは各コンテナの stdout を直接 docker compose logs で確認する。
  # ============================================================
  jaeger:
    image: jaegertracing/all-in-one:1.62
    profiles: [observability]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_HOST_PORT:-16686}:16686"          # UI
      - "${JAEGER_OTLP_GRPC_HOST_PORT:-4317}:4317"    # OTLP gRPC
      - "${JAEGER_OTLP_HTTP_HOST_PORT:-4318}:4318"    # OTLP HTTP

  prometheus:
    image: prom/prometheus:v2.55
    profiles: [observability]
    volumes:
      - ./infra/docker/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./infra/docker/prometheus/recording_rules.yaml:/etc/prometheus/recording_rules.yaml:ro
      - ./infra/docker/prometheus/alerting_rules.yaml:/etc/prometheus/alerting_rules.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"

  loki:
    image: grafana/loki:3.3
    profiles: [observability]
    volumes:
      - ./infra/docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"

  promtail:
    image: grafana/promtail:2.9.0
    profiles: [observability]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/docker/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3
    profiles: [observability]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: dev
    ports:
      - "${GRAFANA_HOST_PORT:-3200}:3000"   # ホストポート 3200 を使用（3000 はフロントエンド開発サーバー等とのポート競合を回避するため）
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - jaeger

volumes:
  postgres-data:
  mysql-data:
  redis-data:
  redis-session-data:
  kafka-data:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  default:
    name: ${COMPOSE_NETWORK_NAME:-k1s0-network}
