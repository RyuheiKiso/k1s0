      auth-rust:
        condition: service_healthy
    volumes:
      - ./regions/business/accounting/server/rust/domain-master/config:/app/config
    healthcheck: *rust-healthcheck

  # ============================================================
  # Service プロファイル
  # ============================================================
  order-rust:
    build:
      context: .
      dockerfile: ./regions/service/order/server/rust/order/Dockerfile
    profiles: [service]
    # リソース制限: アプリケーションサービスの標準リソース
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除。読み取り専用ファイルシステムで実行
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${ORDER_REST_HOST_PORT:-8310}:8080"
      - "${ORDER_GRPC_HOST_PORT:-9310}:50051"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./regions/service/order/server/rust/order/config:/app/config
    healthcheck: *rust-healthcheck

  # ============================================================
  # Kafka トピック自動作成
  # ============================================================
  kafka-init:
    image: apache/kafka:3.8.0
    profiles: [infra]
    # リソース制限: 初期化タスクは軽量（一時的に実行されるだけ）
    mem_limit: 256m
    cpus: 0.25
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除。読み取り専用ファイルシステムで実行
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
      KAFKA_REPLICATION_FACTOR: "1"
      PATH: "/opt/kafka/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    volumes:
      - ./infra/messaging/kafka/create-topics.sh:/scripts/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/scripts/create-topics.sh"]
    restart: "no"

  # ============================================================
  # 可観測性
  # NOTE: ローカル開発環境では Promtail を省略している。
  # Kubernetes 環境では Promtail（DaemonSet）がログを収集し Loki に転送するが、
  # ローカルでは各コンテナの stdout を直接 docker compose logs で確認する。
  # ============================================================
  jaeger:
    image: jaegertracing/all-in-one:1.62
    profiles: [observability]
    # リソース制限: トレーシングサービスは中程度のリソースを使用
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_HOST_PORT:-16686}:16686"          # UI
      - "${JAEGER_OTLP_GRPC_HOST_PORT:-4317}:4317"    # OTLP gRPC
      - "${JAEGER_OTLP_HTTP_HOST_PORT:-4318}:4318"    # OTLP HTTP

  prometheus:
    image: prom/prometheus:v2.55
    profiles: [observability]
    # リソース制限: メトリクス収集サービスは中程度のリソースを使用
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./infra/docker/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./infra/docker/prometheus/recording_rules.yaml:/etc/prometheus/recording_rules.yaml:ro
      - ./infra/docker/prometheus/alerting_rules.yaml:/etc/prometheus/alerting_rules.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"

  loki:
    image: grafana/loki:3.3
    profiles: [observability]
    # リソース制限: ログ集約サービスは中程度のリソースを使用
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./infra/docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"

  promtail:
    image: grafana/promtail:2.9.0
    profiles: [observability]
    # リソース制限: ログ転送サービスは軽量
    mem_limit: 256m
    cpus: 0.25
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/docker/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3
    profiles: [observability]
    # リソース制限: ダッシュボード UI は中程度のリソースを使用
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-dev}
    ports:
      - "${GRAFANA_HOST_PORT:-3200}:3000"   # ホストポート 3200 を使用（3000 はフロントエンド開発サーバー等とのポート競合を回避するため）
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - jaeger

volumes:
  postgres-data:
  mysql-data:
  redis-data:
  redis-session-data:
  kafka-data:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  default:
    name: ${COMPOSE_NETWORK_NAME:-k1s0-network}
