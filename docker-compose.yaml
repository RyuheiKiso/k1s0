# docker-compose.yaml — 安全なベース設定
#
# ⚠️ セキュリティ注意: このファイルのパスワード・トークンは開発環境専用です。
# 本番環境では Vault / Kubernetes Secrets 等のシークレット管理サービスを使用してください。
# 詳細: docs/architecture/conventions/設定管理方針.md
#
# このファイルは本番/CI 環境でも安全に使用できるベース設定です。
# 認証バイパスやセキュリティ緩和設定は含まれていません。
#
# ポート環境変数: 全ホストポートは ${VAR:-default} 形式で外部から変更可能。
# .env.example を .env にコピーして設定する。.env がない場合はデフォルト値が使われる。
# 共用開発サーバーでは COMPOSE_PROJECT_NAME でコンテナ・ボリューム・ネットワークを分離する。
# 詳細: docs/infrastructure/devenv/共用開発サーバー設計.md
#
# 開発時の認証バイパス設定は docker-compose.dev.yaml に分離されています。
# 開発環境では明示的に -f で指定してください:
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
# `docker compose up` のデフォルト動作では認証バイパスは無効です。

x-rust-healthcheck: &rust-healthcheck
  test: ["CMD", "/busybox", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
  interval: 10s
  timeout: 5s
  retries: 5

services:
  # ============================================================
  # インフラ
  # ============================================================
  postgres:
    image: postgres:17
    profiles: [infra]
    # リソース制限: DBサービスには大きめのメモリ・CPU を割り当てる
    mem_limit: 1g
    cpus: 1.0
    # セキュリティ強化: 全権限を削除し、DB運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    ports:
      - "${PG_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev}"]
      interval: 5s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.4
    profiles: [infra]
    # リソース制限: DBサービスには大きめのメモリ・CPU を割り当てる
    mem_limit: 1g
    cpus: 1.0
    # セキュリティ強化: 全権限を削除し、DB運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dev}
      MYSQL_USER: ${MYSQL_USER:-dev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    profiles: [infra]
    # リソース制限: Redis はメモリ使用量を制限する
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 全権限を削除し、Redis運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    # Redis 認証: 環境変数 REDIS_PASSWORD を参照してパスワード保護を有効化する。
    # コマンドライン引数での --requirepass 指定を避け、/proc 経由でのパスワード露出を防止する。
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dev}
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # NOTE: ローカル開発では PLAINTEXT を使用（開発効率優先）。
  # staging/prod では SASL_SSL を使用し、Strimzi Operator が証明書管理を行う。
  # ローカルと staging/prod でセキュリティプロトコルが異なるため、
  # 接続設定は必ず config.yaml 経由で環境ごとに切り替えること。
  kafka:
    image: apache/kafka:3.8.0
    profiles: [infra]
    # リソース制限: Kafka はメッセージブローカーのため大きめのリソースを割り当てる
    mem_limit: 1g
    cpus: 1.0
    # セキュリティ強化: 全権限を削除し、Kafka運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    # バージョン固定: latest タグを避け再現性を確保する
    image: provectuslabs/kafka-ui:v0.7.2
    profiles: [infra]
    # リソース制限: UI サービスは軽量
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除。読み取り専用ファイルシステムで実行
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    ports:
      - "${KAFKA_UI_HOST_PORT:-8090}:8080"
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    profiles: [infra]
    # リソース制限: Schema Registry は中程度のリソースを使用
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 全権限を削除し、Schema Registry運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_REGISTRY_LEADER_CONNECT_TIMEOUT_MS: 120000
    ports:
      - "${SCHEMA_REGISTRY_HOST_PORT:-8081}:8081"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    profiles: [infra]
    # リソース制限: Keycloak は認証基盤のため大きめのリソースを割り当てる
    mem_limit: 1g
    cpus: 1.0
    # セキュリティ強化: 全権限を削除し、Keycloak運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-dev}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-dev}
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-dev}
      # Realm JSONのenvsubst用シークレット変数
      KC_BFF_CLIENT_SECRET: ${KC_BFF_CLIENT_SECRET:-dev-bff-secret}
      KC_SERVICE_CLIENT_SECRET: ${KC_SERVICE_CLIENT_SECRET:-dev-service-secret}
      KC_TEST_ADMIN_PASSWORD: ${KC_TEST_ADMIN_PASSWORD:-admin123}
      KC_TEST_USER_PASSWORD: ${KC_TEST_USER_PASSWORD:-user123}
      KC_TEST_ORDER_MGR_PASSWORD: ${KC_TEST_ORDER_MGR_PASSWORD:-order123}
    entrypoint: ["/bin/bash", "/opt/keycloak/data/import/docker-entrypoint-wrapper.sh"]
    command: ["start-dev", "--import-realm"]
    ports:
      - "${KEYCLOAK_HOST_PORT:-8180}:8080"
      - "${KEYCLOAK_MGMT_HOST_PORT:-9000}:9000"
    volumes:
      - ./infra/docker/keycloak:/opt/keycloak/data/import    # realm k1s0 の初期設定。config.dev.yaml の auth.jwt.issuer（realms/k1s0）と一致させること
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  redis-session:
    image: redis:7
    profiles: [infra]
    # リソース制限: セッション用 Redis はメモリ使用量を制限する
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 全権限を削除し、Redis運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    # Redis 認証: 環境変数 REDIS_PASSWORD を参照してパスワード保護を有効化する。
    # コマンドライン引数での --requirepass 指定を避け、/proc 経由でのパスワード露出を防止する。
    environment:
      REDIS_PASSWORD: ${REDIS_SESSION_PASSWORD:-dev}
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    ports:
      - "${REDIS_SESSION_HOST_PORT:-6380}:6379"
    volumes:
      - redis-session-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault:
    image: hashicorp/vault:1.17
    profiles: [infra]
    # リソース制限: Vault は軽量
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 全権限を削除し、Vault運用に必要な最小限のみ付与（IPC_LOCKはメモリロックに必須）
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
      - SETGID
      - SETUID
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-token}
      # ヘルスチェックで vault status を実行するために必要な接続先設定
      VAULT_ADDR: "http://127.0.0.1:8200"
    ports:
      - "${VAULT_HOST_PORT:-8200}:8200"
    # Vault のシールド状態と初期化状態を確認するヘルスチェック
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # API Gateway
  # ============================================================
  kong:
    image: kong:3.8
    profiles: [infra]
    # リソース制限: API Gateway は中程度のリソースを使用
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 全権限を削除し、Kong運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yaml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: info
    volumes:
      - ./infra/kong/kong.dev.yaml:/etc/kong/kong.yaml:ro
    ports:
      - "${KONG_PROXY_HOST_PORT:-8000}:8000"    # Proxy
      # Admin API ポートは docker-compose.dev.yaml で定義（開発時のみ公開）
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================
  # System プロファイル
  # ============================================================
  auth-rust:
    build:
      context: ./regions/system
      dockerfile: ./server/rust/auth/Dockerfile
    profiles: [system]
    # リソース制限: アプリケーションサービスの標準リソース
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除。読み取り専用ファイルシステムで実行
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${AUTH_REST_HOST_PORT:-8083}:8080"
      - "${AUTH_GRPC_HOST_PORT:-50052}:50051"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ./regions/system/server/rust/auth/config:/app/config
    healthcheck: *rust-healthcheck

  config-rust:
    build:
      context: ./regions/system
      dockerfile: ./server/rust/config/Dockerfile
    profiles: [system]
    # リソース制限: アプリケーションサービスの標準リソース
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除。読み取り専用ファイルシステムで実行
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${CONFIG_REST_HOST_PORT:-8084}:8080"
      - "${CONFIG_GRPC_HOST_PORT:-50054}:50051"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ./regions/system/server/rust/config/config:/app/config
    healthcheck: *rust-healthcheck

  saga-rust:
    build:
      context: ./regions/system
      dockerfile: ./server/rust/saga/Dockerfile
    profiles: [system]
    # リソース制限: アプリケーションサービスの標準リソース
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除。読み取り専用ファイルシステムで実行
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${SAGA_REST_HOST_PORT:-8085}:8080"
      - "${SAGA_GRPC_HOST_PORT:-50055}:50051"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ./regions/system/server/rust/saga/config:/app/config
    healthcheck: *rust-healthcheck

  dlq-manager:
    build:
      context: ./regions/system
      dockerfile: ./server/rust/dlq-manager/Dockerfile
    profiles: [system]
    # リソース制限: アプリケーションサービスの標準リソース
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除。読み取り専用ファイルシステムで実行
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${DLQ_REST_HOST_PORT:-8086}:8080"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./regions/system/server/rust/dlq-manager/config:/app/config
    healthcheck: *rust-healthcheck

  featureflag-rust:
    build:
      context: ./regions/system
      dockerfile: ./server/rust/featureflag/Dockerfile
    profiles: [system]
    # リソース制限: アプリケーションサービスの標準リソース
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除。読み取り専用ファイルシステムで実行
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${FEATUREFLAG_REST_HOST_PORT:-8087}:8080"
      - "${FEATUREFLAG_GRPC_HOST_PORT:-50056}:50051"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./regions/system/server/rust/featureflag/config:/app/config
    healthcheck: *rust-healthcheck

  ratelimit-rust:
    build:
      context: ./regions/system
      dockerfile: ./server/rust/ratelimit/Dockerfile
    profiles: [system]
    # リソース制限: アプリケーションサービスの標準リソース
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除。読み取り専用ファイルシステムで実行
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${RATELIMIT_REST_HOST_PORT:-8088}:8080"
      - "${RATELIMIT_GRPC_HOST_PORT:-50057}:50051"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./regions/system/server/rust/ratelimit/config:/app/config
    healthcheck: *rust-healthcheck

  tenant-rust:
    build:
      context: ./regions/system
      dockerfile: ./server/rust/tenant/Dockerfile
    profiles: [system]
    # リソース制限: アプリケーションサービスの標準リソース
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除。読み取り専用ファイルシステムで実行
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${TENANT_REST_HOST_PORT:-8089}:8080"
      - "${TENANT_GRPC_HOST_PORT:-50058}:50051"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ./regions/system/server/rust/tenant/config:/app/config
    healthcheck: *rust-healthcheck

  vault-rust:
    build:
      context: ./regions/system
      dockerfile: ./server/rust/vault/Dockerfile
    profiles: [system]
    # リソース制限: アプリケーションサービスの標準リソース
    mem_limit: 512m
    cpus: 0.5
