    <<: *app-service-defaults
    ports:
      - "127.0.0.1:${AUTH_REST_HOST_PORT:-8083}:8080"
      - "127.0.0.1:${AUTH_GRPC_HOST_PORT:-50052}:50051"
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      # HIGH-001/MEDIUM-001 対応: Windows Docker Desktop でのヘルスチェックタイムアウト問題を避けるため service_started を使用
      jaeger:
        condition: service_started
    volumes:
      - ./regions/system/server/rust/auth/config:/app/config
    healthcheck: *rust-healthcheck

