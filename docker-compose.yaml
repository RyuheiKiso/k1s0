# docker-compose.yaml — 安全なベース設定
#
# ⚠️ セキュリティ注意: このファイルのパスワード・トークンは開発環境専用です。
# 本番環境では Vault / Kubernetes Secrets 等のシークレット管理サービスを使用してください。
# 詳細: docs/architecture/conventions/設定管理方針.md
#
# このファイルは本番/CI 環境でも安全に使用できるベース設定です。
# 認証バイパスやセキュリティ緩和設定は含まれていません。
#
# ポート環境変数: 全ホストポートは ${VAR:-default} 形式で外部から変更可能。
# 共用開発サーバーでは COMPOSE_PROJECT_NAME でコンテナ・ボリューム・ネットワークを分離する。
# 詳細: docs/infrastructure/devenv/共用開発サーバー設計.md
#
# 開発環境の起動方法:
#   just local-up  （推奨: .env.dev を --env-file で自動適用）
#   または手動:
#   docker compose --env-file .env.dev -f docker-compose.yaml -f docker-compose.dev.yaml \
#     --profile infra --profile system up -d
#
# 【重要】${VAR:?error} と docker-compose.dev.yaml の関係:
#   このファイルの ${VAR:?...} 構文はホスト環境変数から評価されます（ファイルマージより先）。
#   開発用デフォルト値は .env.dev で管理し、--env-file で渡してください。
#   docker-compose.dev.yaml の environment セクションはコンテナ変数であり interpolation を解決できません。
#
# `docker compose up` のデフォルト動作では認証バイパスは無効かつ必須変数が未設定でエラーになります。

x-app-service: &app-service-defaults
  # アプリケーションサービス共通設定: 全アプリサービスで共有するセキュリティ・リソース・再起動ポリシー
  restart: unless-stopped
  mem_limit: 512m
  cpus: 0.5
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp

x-rust-healthcheck: &rust-healthcheck
  # CRITICAL-003 監査対応: /readyz はサービスが実際に稼働可能かを確認する（DB・依存サービス確認込み）。
  # /healthz は liveness probe（プロセス死活確認）として常に ok を返すため Docker Compose 向きでない。
  # /readyz を使うことで DB 未起動・マイグレーション未実行の状態を確実に検出できる。
  test: ["CMD", "/busybox", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
  interval: 10s
  timeout: 5s
  retries: 5
  # INFRA-02 監査対応: start_period は healthcheck の猶予期間であり、
  # DB マイグレーション自動実行の保証ではない。
  # スタレイメージ使用時は `docker compose build` でイメージを再ビルドすること。
  # start_period 内の失敗はカウントせず、起動完了後から retries を適用する（M-22対応）
  start_period: 30s

services:
  # ============================================================
  # インフラ
  # ============================================================
  postgres:
    # パッチバージョン固定: 意図しない自動アップグレードを防止する（L-07）
    image: postgres:17.4
    profiles: [infra]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # リソース制限: DBサービスには大きめのメモリ・CPU を割り当てる
    mem_limit: 1g
    cpus: 1.0
    # セキュリティ強化: 全権限を削除し、DB運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      # 本番環境では必ず強力なパスワードを設定すること。ローカル開発は docker-compose.dev.yaml で値を提供する。
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set. For local dev use docker-compose.dev.yaml}
      # アプリケーションユーザー k1s0 のパスワード（00-create-app-user.sh が参照する）
      # init-db スクリプトはコンテナ内で実行されるため、ホスト環境変数を環境変数として明示的に渡す必要がある
      K1S0_DB_PASSWORD: ${K1S0_DB_PASSWORD:?K1S0_DB_PASSWORD must be set. For local dev use docker-compose.dev.yaml}
    # 共用開発サーバーでの LAN 経由アクセスを防ぐため 127.0.0.1 にバインドする
    ports:
      - "127.0.0.1:${PG_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MySQL サービスは削除済み（H-6 対応）
  # 調査の結果、プロジェクト全サービスが PostgreSQL を使用しており MySQL を使用するサービスが
  # 存在しないため、不要なリソース消費（メモリ 1GB・CPU 1.0）を排除した。
  # 削除前に既存の mysql-data ボリュームがある場合は以下で手動削除すること:
  #   docker volume rm k1s0_mysql-data

  redis:
    # パッチバージョン固定: 意図しない自動アップグレードを防止する（L-07）
    image: redis:7.4.2
    profiles: [infra]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # リソース制限: Redis はメモリ使用量を制限する
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 全権限を削除し、Redis運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    # H-11 監査対応: Redis パスワードをコマンドライン引数に渡すと /proc/[pid]/cmdline から
    # 参照可能になる問題を修正する。printf（shell builtin）で /tmp/redis.conf を生成してから
    # redis-server にファイルパスのみを渡すことで、redis-server のコマンドライン引数に
    # パスワードを含めない設計にする。/tmp はデフォルトで tmpfs 相当の揮発性領域。
    environment:
      # 本番環境では必ず強力なパスワードを設定すること。ローカル開発は docker-compose.dev.yaml で値を提供する。
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set. For local dev use docker-compose.dev.yaml}
    # $$ でCompose変数展開を抑止し、コンテナ内シェルで REDIS_PASSWORD 環境変数を展開させる
    # printf は shell builtin のため別プロセスが生成されずパスワードがプロセスリストに露出しない
    # exec でシェルを redis-server に置き換え PID 1 として動作させる
    # L-008 監査対応: maxmemory を 256mb に制限し、eviction policy を allkeys-lru に設定する
    # デフォルト noeviction はメモリ枯渇時に書き込みエラーを引き起こすリスクがある
    # allkeys-lru は最近最も使われていないキーを優先的に削除し、メモリ枯渇を防止する（開発環境向け設定）
    command: ["sh", "-c", "printf 'requirepass %s\\nmaxmemory 256mb\\nmaxmemory-policy allkeys-lru\\n' \"$$REDIS_PASSWORD\" > /tmp/redis.conf && exec redis-server /tmp/redis.conf"]
    # 共用開発サーバーでの LAN 経由アクセスを防ぐため 127.0.0.1 にバインドする
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    # L-7 監査対応: cap_drop ALL + cap_add SETGID/SETUID の制限環境で named volume の
    # /data ディレクトリへの書き込みが拒否される問題を修正。tmpfs を使用することで
    # カーネルが自動的に適切なパーミッションを設定し、Redis がデータを書き込める。
    # 開発環境ではデータ永続性より起動安定性を優先するため tmpfs で代替する。
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # NOTE: ローカル開発では PLAINTEXT を使用（開発効率優先）。
  # staging/prod では SASL_SSL を使用し、Strimzi Operator が証明書管理を行う。
  # ローカルと staging/prod でセキュリティプロトコルが異なるため、
  # 接続設定は必ず config.yaml 経由で環境ごとに切り替えること。
  # 監査対応: apache/kafka:3.6.1 は Docker Hub に存在しないため 3.8.0 に更新。
  # Strimzi 内部バージョンと Docker Hub 公開バージョンは別管理であることに注意。
  kafka:
    image: apache/kafka:3.8.0
    profiles: [infra]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # リソース制限: Kafka はメッセージブローカーのため大きめのリソースを割り当てる
    mem_limit: 1g
    cpus: 1.0
    # セキュリティ強化: 全権限を削除し、Kafka運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      # L-11 監査対応: CLUSTER_ID は KRaft クラスター識別子。
      # 開発環境では固定値を使用（コンテナ再起動後もトピック/オフセットを引き継ぐため一定値が必要）。
      # 本番 K8s 環境は Strimzi Operator が自動生成するため、この値は開発専用。
      # チームで共通の CLUSTER_ID を使うことでローカル環境間のデータ互換性を維持する。
      # INFRA-LOW-002 対応: バージョン参照を実際のイメージバージョン 3.8.0 に合わせる
      # 新しい CLUSTER_ID が必要な場合: docker run --rm apache/kafka:3.8.0 /opt/kafka/bin/kafka-storage.sh random-uuid
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # 開発環境向けJVMヒープ制限: 未設定だとJVMがシステムRAMの1/4〜1/2を確保しようとするため、
      # 開発用途に十分な512mに制限してメモリ過剰消費を防止する。
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    ports:
      # ホストのループバックインターフェースのみにバインドし、外部ネットワークからのアクセスを防止する（MED-5 監査対応）
      - "127.0.0.1:${KAFKA_HOST_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka
    healthcheck:
      # DOCKER-003 監査対応: タイムアウトを 5s → 15s に延長し、起動待機期間を追加する。
      # Kafka ブローカーはリーダー選出に時間がかかるため、起動直後のヘルスチェックが
      # タイムアウトして不要な再起動が発生していた。start_period で起動猶予を確保する。
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 60s

  kafka-ui:
    # バージョン固定: latest タグを避け再現性を確保する
    image: provectuslabs/kafka-ui:v0.7.2
    profiles: [infra]
    <<: *app-service-defaults
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      # HIGH-11 監査対応: mem_limit 512m（app-service-defaults継承）に対してJVMヒープを削減する
      # -Xmx256m ではメタスペース・スレッドスタック等の非ヒープ領域を加えると 512m で OOM の可能性あり
      # -Xmx192m に削減して非ヒープ領域に 320MB 以上の余裕を確保する
      JAVA_TOOL_OPTIONS: "-Xms96m -Xmx192m"
    ports:
      - "127.0.0.1:${KAFKA_UI_HOST_PORT:-8090}:8080"
    # ヘルスチェック: Kafka UI の actuator エンドポイントで起動完了を確認する（M-4 対応）
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    profiles: [infra]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # リソース制限: Schema Registry は中程度のリソースを使用
    # MED-005 監査対応: schema-registry が 87% 到達（512MiB）のためスキーマ数増加に備えて 1g に引き上げ
    mem_limit: 1g
    cpus: 0.5
    # セキュリティ強化: 全権限を削除し、Schema Registry運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      # M-01監査対応: 0.0.0.0 バインドは Docker ネットワーク内の他コンテナ（kafka-connect等）からアクセスするために必要な設計。
      # ホスト側は下記 ports 設定で 127.0.0.1:${SCHEMA_REGISTRY_HOST_PORT:-8081}:8081 に限定しており、外部ネットワークへの露出は発生しない。
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_REGISTRY_LEADER_CONNECT_TIMEOUT_MS: 120000
      # 開発環境向けJVMヒープ制限: 未設定だとJVMがシステムRAMの1/4〜1/2を確保しようとするため、
      # 開発用途に十分な256mに制限してメモリ過剰消費を防止する。
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xms128m -Xmx256m"
    ports:
      # ローカルホストのみにバインドし、共用開発サーバーでの外部アクセスを防止する（H-5 対応）
      - "127.0.0.1:${SCHEMA_REGISTRY_HOST_PORT:-8081}:8081"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      # INFRA-LOW-003 対応: ヘルスチェックを wget に統一する（他サービスと同じ方法で curl 依存を排除）
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak:
    # パッチバージョン固定: 意図しない自動アップグレードを防止する（L-07）
    image: quay.io/keycloak/keycloak:26.0.7
    profiles: [infra]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # リソース制限: Keycloak は認証基盤のため大きめのリソースを割り当てる
    mem_limit: 1g
    cpus: 1.0
    # セキュリティ強化: 全権限を削除し、Keycloak運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-dev}
      # 本番環境では必ず強力なパスワード/シークレットを設定すること。ローカル開発は docker-compose.dev.yaml で値を提供する。
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD must be set. For local dev use docker-compose.dev.yaml}
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set. For local dev use docker-compose.dev.yaml}
      # Realm JSONのenvsubst用シークレット変数
      KC_BFF_CLIENT_SECRET: ${KC_BFF_CLIENT_SECRET:?KC_BFF_CLIENT_SECRET must be set. For local dev use docker-compose.dev.yaml}
      KC_SERVICE_CLIENT_SECRET: ${KC_SERVICE_CLIENT_SECRET:?KC_SERVICE_CLIENT_SECRET must be set. For local dev use docker-compose.dev.yaml}
      KC_TEST_ADMIN_PASSWORD: ${KC_TEST_ADMIN_PASSWORD:?KC_TEST_ADMIN_PASSWORD must be set. For local dev use docker-compose.dev.yaml}
      KC_TEST_USER_PASSWORD: ${KC_TEST_USER_PASSWORD:?KC_TEST_USER_PASSWORD must be set. For local dev use docker-compose.dev.yaml}
      KC_TEST_TASK_MGR_PASSWORD: ${KC_TEST_TASK_MGR_PASSWORD:?KC_TEST_TASK_MGR_PASSWORD must be set. For local dev use docker-compose.dev.yaml}
      # 開発環境向けJVMヒープ制限: 未設定だとJVMがシステムRAMの1/4〜1/2を確保しようとするため、
      # 開発用途に十分な512mに制限してメモリ過剰消費を防止する。
      JAVA_OPTS_APPEND: "-Xms256m -Xmx512m"
    entrypoint: ["/bin/bash", "/opt/keycloak/data/import/docker-entrypoint-wrapper.sh"]
    # start コマンドは docker-compose.dev.yaml の keycloak セクションで上書きされる。
    # 本番では "start" コマンドを使用する（TLS終端・クラスター設定が必要）。
    # 共用開発サーバーでの LAN 経由アクセスを防ぐため 127.0.0.1 にバインドする
    ports:
      - "127.0.0.1:${KEYCLOAK_HOST_PORT:-8180}:8080"
      - "127.0.0.1:${KEYCLOAK_MGMT_HOST_PORT:-9000}:9000"
    volumes:
      - ./infra/docker/keycloak:/opt/keycloak/data/import    # realm k1s0 の初期設定。config.dev.yaml の auth.jwt.issuer（realms/k1s0）と一致させること
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Keycloak 26.x では /health がプライマリエンドポイント（/health/ready はサブエンドポイント）
      # L-04 監査対応: /health/ready → /health に統一する
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  redis-session:
    # パッチバージョン固定: 意図しない自動アップグレードを防止する（L-07）
    image: redis:7.4.2
    profiles: [infra]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # リソース制限: セッション用 Redis はメモリ使用量を制限する
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 全権限を削除し、Redis運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    # H-11 監査対応: Redis パスワードをコマンドライン引数に渡すと /proc/[pid]/cmdline から
    # 参照可能になる問題を修正する。printf（shell builtin）で /tmp/redis.conf を生成してから
    # redis-server にファイルパスのみを渡すことで、redis-server のコマンドライン引数に
    # パスワードを含めない設計にする。/tmp はデフォルトで tmpfs 相当の揮発性領域。
    environment:
      # 本番環境では必ず強力なパスワードを設定すること。ローカル開発は docker-compose.dev.yaml で値を提供する。
      REDIS_PASSWORD: ${REDIS_SESSION_PASSWORD:?REDIS_SESSION_PASSWORD must be set. For local dev use docker-compose.dev.yaml}
    # $$ でCompose変数展開を抑止し、コンテナ内シェルで REDIS_PASSWORD 環境変数を展開させる
    # printf は shell builtin のため別プロセスが生成されずパスワードがプロセスリストに露出しない
    # exec でシェルを redis-server に置き換え PID 1 として動作させる
    # L-008 監査対応: maxmemory を 256mb に制限し、eviction policy を allkeys-lru に設定する
    # セッション用 Redis も同様にメモリ上限を設定し、メモリ枯渇によるサービス停止を防止する（開発環境向け設定）
    command: ["sh", "-c", "printf 'requirepass %s\\nmaxmemory 256mb\\nmaxmemory-policy allkeys-lru\\n' \"$$REDIS_PASSWORD\" > /tmp/redis.conf && exec redis-server /tmp/redis.conf"]
    ports:
      # ホストのループバックインターフェースのみにバインドし、外部ネットワークからのアクセスを防止する（MED-4 監査対応）
      - "127.0.0.1:${REDIS_SESSION_HOST_PORT:-6380}:6379"
    # L-7 監査対応: cap_drop ALL + cap_add SETGID/SETUID の制限環境で named volume の
    # /data ディレクトリへの書き込みが拒否される問題を修正。tmpfs を使用することで
    # カーネルが自動的に適切なパーミッションを設定し、Redis がデータを書き込める。
    # 開発環境ではデータ永続性より起動安定性を優先するため tmpfs で代替する。
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault:
    # H-20 監査対応: Vault バージョンを 1.19 に統一する
    # 旧バージョン 1.17.6 は既知のセキュリティ脆弱性が修正された 1.19 系に更新する
    # INFRA-MED-006 対応: パッチバージョンを固定して意図しない自動アップグレードを防止
    image: hashicorp/vault:1.19.5
    profiles: [infra]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # リソース制限: Vault は軽量
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 全権限を削除し、Vault運用に必要な最小限のみ付与（IPC_LOCKはメモリロックに必須）
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
      - SETGID
      - SETUID
    environment:
      # ================================================================
      # VAULT_DEV_ROOT_TOKEN_ID はここに記載しない。
      # dev モードはローカル開発専用であり、docker-compose.dev.yaml で設定する。
      # 本番用 Vault 設定は infra/terraform/modules/vault/ で管理する。
      # ================================================================
      # ヘルスチェックで vault status を実行するために必要な接続先設定
      VAULT_ADDR: "http://127.0.0.1:8200"
      # no-new-privileges + CAP_DROP:ALL 環境での setcap 失敗を回避する
      SKIP_SETCAP: "true"
    # 共用開発サーバーでの LAN 経由アクセスを防ぐため 127.0.0.1 にバインドする
    ports:
      - "127.0.0.1:${VAULT_HOST_PORT:-8200}:8200"
    # Vault のシールド状態と初期化状態を確認するヘルスチェック
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # API Gateway
  # ============================================================
  kong:
    # パッチバージョン固定: 意図しない自動アップグレードを防止する（L-07）
    image: kong:3.9.1
    profiles: [infra]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # HIGH-001 監査対応: Kong worker プロセスが 1.5GiB で99%に到達しOOMリスクがあるため 2g に引き上げる
    mem_limit: 2g
    cpus: 0.5
    # セキュリティ強化: 全権限を削除し、Kong運用に必要な最小限のみ付与
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yaml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      # Admin API はコンテナ内 localhost のみにバインドし、外部ネットワークからの直接アクセスを防止する（C-02対応）
      KONG_ADMIN_LISTEN: "127.0.0.1:8001"
      # H-01監査対応: Status API を専用ポート 8100 で全NIC公開し、Prometheus からメトリクスを収集できるようにする。
      # Admin API（8001）と異なり Status API はメトリクス・ヘルスチェックのみを提供し、設定変更機能を持たないため全NICバインドが安全。
      KONG_STATUS_LISTEN: "0.0.0.0:8100"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: info
      # MED-002: worker event broker タイムアウト対策
      # worker_state_update_frequency を延ばすことで "failed to receive the header bytes: timeout" の多発を抑制する
      # Kong 3.x でサポートされる環境変数（デフォルト: 5秒）
      KONG_WORKER_STATE_UPDATE_FREQUENCY: "10"
      # post-function プラグインでの JWT claims デコードに cjson.safe が必要なため許可リストに追加する
      # Kong のデフォルト sandbox モードでは require が制限されているが、
      # ngx.decode_base64 + cjson.safe による JWT payload デコードは安全な操作であるため許可する
      KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES: "cjson.safe"
    volumes:
      - ./infra/kong/kong.dev.yaml:/etc/kong/kong.yaml:ro
    ports:
      - "127.0.0.1:${KONG_PROXY_HOST_PORT:-8000}:8000"    # Proxy (C-04 監査対応: 開発環境ではホスト側を 127.0.0.1 に制限する)
      # Admin API ポートは docker-compose.dev.yaml で定義（開発時のみ公開）
      # Kong Status ポート（8100）はホストにマッピングしない。
      # Prometheus が同一 Docker ネットワーク内から直接 http://kong:8100/metrics にアクセスするため、
      # ホストへの公開は不要であり、外部からのメトリクスエンドポイント露出を防止する。
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================
  # System プロファイル
  # ============================================================
  # system プロファイルのサービスは infra プロファイルの postgres/kafka/keycloak に depends_on する
  # そのため単独の --profile system ではなく --profile infra --profile system を同時に指定する必要がある
  # 推奨: just local-up を使用
  auth-rust:
    build:
      context: ./regions/system
      dockerfile: ./server/rust/auth/Dockerfile
