  # ============================================================
  # Kafka トピック自動作成
  # ============================================================
  # L-07 対応: ローカル開発用 create-topics.sh と Kubernetes 用 topics.yaml の対応関係
  #
  # [System Tier]
  #   k1s0.system.auth.login.v1                  → topics.yaml: k1s0.system.auth.login.v1
  #   k1s0.system.auth.audit.v1                  → topics.yaml: k1s0.system.auth.audit.v1
  #   k1s0.system.auth.token_validate.v1         → topics.yaml: k1s0.system.auth.token_validate.v1
  #   k1s0.system.auth.permission_denied.v1      → topics.yaml: k1s0.system.auth.permission_denied.v1
  #   k1s0.system.config.changed.v1              → topics.yaml: k1s0.system.config.changed.v1
  #   k1s0.system.apiregistry.schema_updated.v1  → topics.yaml: k1s0.system.apiregistry.schema_updated.v1
  #   k1s0.system.mastermaintenance.data_changed.v1 → topics.yaml: k1s0.system.mastermaintenance.data_changed.v1
  #   k1s0.system.saga.state_changed.v1          → topics.yaml: k1s0.system.saga.state_changed.v1
  #   k1s0.system.featureflag.changed.v1         → topics.yaml: 未定義（ローカル開発専用トピック）
  #   k1s0.system.file.uploaded.v1               → topics.yaml: 未定義（ローカル開発専用トピック）
  #   k1s0.system.file.deleted.v1                → topics.yaml: 未定義（ローカル開発専用トピック）
  #   k1s0.system.vault.secret_rotated.v1        → topics.yaml: 未定義（ローカル開発専用トピック）
  #   k1s0.system.notification.requested.v1      → topics.yaml: 未定義（ローカル開発専用トピック）
  #   k1s0.system.quota.exceeded.v1              → topics.yaml: 未定義（ローカル開発専用トピック）
  # [Service Tier]
  #   k1s0.service.task.created.v1               → topics.yaml: k1s0.service.task.created.v1
  #   k1s0.service.task.updated.v1               → topics.yaml: k1s0.service.task.updated.v1
  #   k1s0.service.task.cancelled.v1             → topics.yaml: k1s0.service.task.cancelled.v1
  #   k1s0.service.board.column_updated.v1       → topics.yaml: k1s0.service.board.column_updated.v1
  #   k1s0.service.activity.created.v1           → topics.yaml: k1s0.service.activity.created.v1
  #   k1s0.service.activity.approved.v1          → topics.yaml: k1s0.service.activity.approved.v1
  # [Business Tier]
  #   k1s0.business.taskmanagement.projectmaster.project_type_changed.v1       → topics.yaml: 同名
  #   k1s0.business.taskmanagement.projectmaster.status_definition_changed.v1  → topics.yaml: 同名
  # 監査対応: apache/kafka:3.6.1 は Docker Hub に存在しないため 3.8.0 に更新（kafka サービスと同一バージョン）。
  kafka-init:
    image: apache/kafka:3.8.0
    profiles: [infra]
    # リソース制限: kafka-topics.sh を並列実行するため JVM プロセスが複数起動する。
    # DOCKER-001 監査対応: 256m では OOM Kill が発生し 44 トピック中 37 件が未作成になるため 1g に引き上げ。
    # DOCKER-MED-002 対応: 並列 JVM プロセスによる OOM Kill を防ぐためメモリを 1g → 1.5g に増加
    mem_limit: 1.5g
    # CRIT-004 監査対応: 57トピックを並列JVMプロセスで作成する際、cpus: 0.25 ではJVMがSIGKILLされトピック作成が断続的に失敗するため 1.0 に引き上げ。
    cpus: 1.0
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除。読み取り専用ファイルシステムで実行
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:exec
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
      KAFKA_REPLICATION_FACTOR: "1"
      PATH: "/opt/kafka/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      # DOCKER-MED-002 対応: JVM ヒープを明示的に制限し、コンテナのメモリ上限内に収める
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - ./infra/messaging/kafka/create-topics.sh:/scripts/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/scripts/create-topics.sh"]
    # トピック作成失敗時にリトライする（Kafka ブローカーの一時的な未準備に対応）
    # HIGH-004 監査対応: --if-not-exists 使用で冪等なため3回で十分（以前の10回は過剰だった）
    restart: "on-failure:3"

  # ============================================================
  # 可観測性
  # NOTE: ローカル開発環境では Promtail を省略している。
  # Kubernetes 環境では Promtail（DaemonSet）がログを収集し Loki に転送するが、
  # ローカルでは各コンテナの stdout を直接 docker compose logs で確認する。
  # ============================================================
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    # H-01 監査対応: system プロファイルでも jaeger が起動するよう profiles に system を追加する
    # system サービス群が depends_on: jaeger (service_started) を持つため、
    # --profile system 単独起動時に jaeger が見つからず依存解決に失敗する問題を修正する
    # HIGH-001/MEDIUM-001 対応: Windows Docker Desktop ヘルスチェックタイムアウト問題を避けるため
    # jaeger 依存条件を service_healthy → service_started に変更済み
    profiles: [system, observability]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # リソース制限: トレーシングサービスは中程度のリソースを使用
    # MED-005 監査対応: Jaeger が 78% 到達（512MiB）のためトレース蓄積に備えて 768m に引き上げ
    mem_limit: 768m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:${JAEGER_UI_HOST_PORT:-16686}:16686"          # UI
      - "127.0.0.1:${JAEGER_OTLP_GRPC_HOST_PORT:-4317}:4317"    # OTLP gRPC
      - "127.0.0.1:${JAEGER_OTLP_HTTP_HOST_PORT:-4318}:4318"    # OTLP HTTP
    # ヘルスチェック: Jaeger の管理エンドポイントで起動完了を確認する（M-4 対応）
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: [observability]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # リソース制限: メトリクス収集サービスは中程度のリソースを使用
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./infra/docker/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./infra/docker/prometheus/recording_rules.yaml:/etc/prometheus/recording_rules.yaml:ro
      - ./infra/docker/prometheus/alerting_rules.yaml:/etc/prometheus/alerting_rules.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    # ヘルスチェック: Prometheus の ready エンドポイントで起動完了を確認する（M-4 対応）
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  loki:
    image: grafana/loki:3.3.2
    profiles: [observability]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # リソース制限: ログ集約サービスは中程度のリソースを使用
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./infra/docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "127.0.0.1:${LOKI_HOST_PORT:-3100}:3100"
    # ヘルスチェック: Loki の ready エンドポイントで起動完了を確認する（M-4 対応）
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  promtail:
    # INFRA-HIGH-004 対応: 2.9.0 (2023年, 非推奨) → 3.3.2 に更新
    image: grafana/promtail:3.3.2
    profiles: [observability]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # リソース制限: ログ転送サービスは軽量
    mem_limit: 256m
    cpus: 0.25
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      # docker.sock を廃止し /var/lib/docker/containers を直接マウントする（SC-2/M-5 監査対応）
      # docker.sock はホスト Docker デーモンへの完全アクセス権を持つため使用しない。
      # /var/lib/docker/containers は Docker Desktop on Windows（Linux VM 内）でも利用可能であり
      # Windows 環境で /var/log/containers が存在しない問題も同時に解消する。
      # 詳細は docs/architecture/adr/0036-promtail-log-collection-strategy.md を参照。
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infra/docker/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    # H-02監査対応: grafana/promtail:2.9.0 イメージに wget も nc も含まれていないため、
    # bash の /dev/tcp 組み込み機能でヘルスチェックを実装する。
    # /ready エンドポイントが 200 を返せばヘルシー判定する。
    # M-027 監査対応: Windows Docker Desktop 既知問題と回避策
    # ※ Windows Docker Desktop 環境では /var/lib/docker/containers のパスが
    #    Linux VM 内パスと異なるため /ready が 500 を返す場合がある。
    # 回避策: promtail-config.yaml の __path__ を Windows VM のパスに合わせて変更するか、
    #         `docker compose --profile observability up --no-deps loki grafana` で
    #         promtail をスキップして起動すること（ログ収集なしでも監視 UI は使用可能）。
    # 詳細: docs/architecture/adr/0036-promtail-log-collection-strategy.md
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9080 && printf \"GET /ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # KONG-02 監査対応: loki の healthcheck 完了後に promtail を起動する（service_healthy）
    # loki が起動していない状態で promtail がログ転送を試みると接続エラーが発生するため
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.2
    profiles: [observability]
    # 再起動ポリシー: クラッシュ時に自動復旧する（明示的に停止するまで再起動）
    restart: unless-stopped
    # リソース制限: ダッシュボード UI は中程度のリソースを使用
    mem_limit: 512m
    cpus: 0.5
    # セキュリティ強化: 権限昇格を禁止し、全Linuxケーパビリティを削除
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      # 本番環境では必ず強力なパスワードを設定すること。ローカル開発は docker-compose.dev.yaml で値を提供する。
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set. For local dev use docker-compose.dev.yaml}
      # M-024 監査対応 / M-11 対応: ローカル開発は SQLite（デフォルト）を使用する。
      # 本番環境では以下の環境変数を設定して PostgreSQL に移行すること:
      #   GF_DATABASE_TYPE: postgres
      #   GF_DATABASE_HOST: <postgres-host>:5432
      #   GF_DATABASE_NAME: grafana
      #   GF_DATABASE_USER: grafana
      #   GF_DATABASE_PASSWORD: <secret>
      #   GF_DATABASE_SSL_MODE: require
      # Helm values での設定先: infra/helm/services/system/grafana/values-prod.yaml（または values.yaml）
      # 移行手順: https://grafana.com/docs/grafana/latest/setup-grafana/set-up-grafana-monitoring/
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3200}:3000"   # ホストポート 3200 を使用（3000 はフロントエンド開発サーバー等とのポート競合を回避するため）
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    # ヘルスチェック: Grafana の API ヘルスエンドポイントで起動完了を確認する（M-4 対応）
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # KONG-02 監査対応: 各依存サービスの healthcheck 完了後に grafana を起動する（service_healthy）
    # prometheus/loki/jaeger が起動完了前に grafana が起動するとデータソース接続エラーが発生するため
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      # HIGH-001/MEDIUM-001 対応: Windows Docker Desktop でのヘルスチェックタイムアウト問題を避けるため service_started を使用
      jaeger:
        condition: service_started

volumes:
  postgres-data:
  # redis-data, redis-session-data は L-7 監査対応で tmpfs に移行済みのため削除
  kafka-data:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  default:
    name: ${COMPOSE_NETWORK_NAME:-k1s0-network}
