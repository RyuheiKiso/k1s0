// k1s0 サービスカタログ gRPC 定義。
// マイクロサービスの登録・検索・ヘルスチェック集約を提供する。
syntax = "proto3";

package k1s0.system.servicecatalog.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/servicecatalog/v1;servicecatalogv1";

import "k1s0/system/common/v1/types.proto";

// ServiceCatalogService はサービスカタログの CRUD とヘルスチェックを提供する。
service ServiceCatalogService {
  // サービス登録
  rpc RegisterService(RegisterServiceRequest) returns (RegisterServiceResponse);

  // サービス取得
  rpc GetService(GetServiceRequest) returns (GetServiceResponse);

  // サービス一覧取得
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);

  // サービス更新
  rpc UpdateService(UpdateServiceRequest) returns (UpdateServiceResponse);

  // サービス削除
  rpc DeleteService(DeleteServiceRequest) returns (DeleteServiceResponse);

  // ヘルスチェック
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ============================================================
// サービス情報
// ============================================================

// ServiceInfo はカタログに登録されたサービスの情報。
message ServiceInfo {
  // サービス UUID
  string id = 1;
  // サービス名（例: auth, tenant, task）
  string name = 2;
  // 表示名
  string display_name = 3;
  // サービスの説明
  string description = 4;
  // Tier（system, business, service）
  string tier = 5;
  // バージョン（例: v1.2.3）
  string version = 6;
  // ベース URL（例: http://auth-rust:8080）
  string base_url = 7;
  // gRPC エンドポイント（例: auth-rust:50051）
  optional string grpc_endpoint = 8;
  // ヘルスチェック URL（例: http://auth-rust:8080/healthz）
  string health_url = 9;
  // サービスの現在のステータス（HEALTHY, UNHEALTHY, UNKNOWN）
  string status = 10;
  // メタデータ（任意の key-value）
  map<string, string> metadata = 11;
  // 登録日時
  k1s0.system.common.v1.Timestamp created_at = 12;
  // 更新日時
  k1s0.system.common.v1.Timestamp updated_at = 13;
}

// ============================================================
// サービス登録
// ============================================================

// RegisterServiceRequest はサービス登録リクエスト。
message RegisterServiceRequest {
  string name = 1;
  string display_name = 2;
  string description = 3;
  string tier = 4;
  string version = 5;
  string base_url = 6;
  optional string grpc_endpoint = 7;
  string health_url = 8;
  map<string, string> metadata = 9;
}

// RegisterServiceResponse はサービス登録レスポンス。
message RegisterServiceResponse {
  ServiceInfo service = 1;
}

// ============================================================
// サービス取得
// ============================================================

// GetServiceRequest はサービス取得リクエスト。
message GetServiceRequest {
  // サービス UUID または名前
  string service_id = 1;
}

// GetServiceResponse はサービス取得レスポンス。
message GetServiceResponse {
  ServiceInfo service = 1;
}

// ============================================================
// サービス一覧取得
// ============================================================

// ListServicesRequest はサービス一覧取得リクエスト。
message ListServicesRequest {
  k1s0.system.common.v1.Pagination pagination = 1;
  // Tier フィルタ（system, business, service）
  optional string tier = 2;
  // ステータスフィルタ（HEALTHY, UNHEALTHY, UNKNOWN）
  optional string status = 3;
  // 名前・表示名で部分一致検索
  optional string search = 4;
}

// ListServicesResponse はサービス一覧取得レスポンス。
message ListServicesResponse {
  repeated ServiceInfo services = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

// ============================================================
// サービス更新
// ============================================================

// UpdateServiceRequest はサービス更新リクエスト。
message UpdateServiceRequest {
  string service_id = 1;
  optional string display_name = 2;
  optional string description = 3;
  optional string version = 4;
  optional string base_url = 5;
  optional string grpc_endpoint = 6;
  optional string health_url = 7;
  map<string, string> metadata = 8;
}

// UpdateServiceResponse はサービス更新レスポンス。
message UpdateServiceResponse {
  ServiceInfo service = 1;
}

// ============================================================
// サービス削除
// ============================================================

// DeleteServiceRequest はサービス削除リクエスト。
message DeleteServiceRequest {
  string service_id = 1;
}

// DeleteServiceResponse はサービス削除レスポンス。
message DeleteServiceResponse {
  // 削除成功
  bool success = 1;
}

// ============================================================
// ヘルスチェック
// ============================================================

// HealthCheckRequest はヘルスチェックリクエスト。
message HealthCheckRequest {
  // 空の場合は全サービスのヘルスを返す。指定した場合はそのサービスのみ。
  optional string service_id = 1;
}

// HealthCheckResponse はヘルスチェックレスポンス。
message HealthCheckResponse {
  repeated ServiceHealth services = 1;
}

// ServiceHealth は個別サービスのヘルスチェック結果。
message ServiceHealth {
  string service_id = 1;
  string service_name = 2;
  // HEALTHY, UNHEALTHY, UNKNOWN
  string status = 3;
  // レスポンスタイム（ミリ秒）
  optional int64 response_time_ms = 4;
  // エラーメッセージ（UNHEALTHY の場合）
  optional string error_message = 5;
  // チェック実行日時
  k1s0.system.common.v1.Timestamp checked_at = 6;
}
