// k1s0 Saga オーケストレーターサービス gRPC 定義。
// 分散トランザクションの開始・追跡・補償・ワークフロー管理を提供する。
syntax = "proto3";

package k1s0.system.saga.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/saga/v1;sagav1";

// ==========================================================================
// deprecated フィールド削除タイムライン（HIGH-CODE-03 監査対応）
// [deprecated = true] アノテーションが付与されたフィールドは enum 型フィールドへの移行期間中。
// 全コンシューマーが enum フィールドに移行完了後に削除する。
// 移行状況は docs/architecture/adr/0018-messaging-abstraction-unification.md で追跡。
// ==========================================================================

import "k1s0/system/common/v1/types.proto";
import "google/protobuf/struct.proto";
// M-22 監査対応（ADR-0022 Phase 2）: buf validate によるメッセージレベルバリデーション
import "buf/validate/validate.proto";

// MED-025 監査対応: SagaStepAction / SagaStepStatus enum を追加。
// SagaStepLogProto の string action/status を型安全な enum フィールドに移行する。

// SagaStepAction はステップアクションの種別。
enum SagaStepAction {
  // SAGA_STEP_ACTION_UNSPECIFIED は未指定（デフォルト値）。
  SAGA_STEP_ACTION_UNSPECIFIED = 0;
  // SAGA_STEP_ACTION_EXECUTE は通常実行。
  SAGA_STEP_ACTION_EXECUTE = 1;
  // SAGA_STEP_ACTION_COMPENSATE は補償実行（ロールバック）。
  SAGA_STEP_ACTION_COMPENSATE = 2;
}

// SagaStepStatus はステップ実行結果のステータス。
enum SagaStepStatus {
  // SAGA_STEP_STATUS_UNSPECIFIED は未指定（デフォルト値）。
  SAGA_STEP_STATUS_UNSPECIFIED = 0;
  // SAGA_STEP_STATUS_SUCCESS は成功。
  SAGA_STEP_STATUS_SUCCESS = 1;
  // SAGA_STEP_STATUS_FAILED は失敗。
  SAGA_STEP_STATUS_FAILED = 2;
  // SAGA_STEP_STATUS_TIMEOUT はタイムアウト。
  SAGA_STEP_STATUS_TIMEOUT = 3;
  // SAGA_STEP_STATUS_SKIPPED はスキップ。
  SAGA_STEP_STATUS_SKIPPED = 4;
}

// SagaStatus は Saga の実行ステータス。
enum SagaStatus {
  SAGA_STATUS_UNSPECIFIED = 0;
  SAGA_STATUS_RUNNING = 1;
  SAGA_STATUS_COMPLETED = 2;
  SAGA_STATUS_FAILED = 3;
  SAGA_STATUS_COMPENSATING = 4;
  SAGA_STATUS_COMPENSATED = 5;
}

// SagaService は Saga オーケストレーション機能を提供する。
service SagaService {
  // Saga 開始（非同期実行）
  rpc StartSaga(StartSagaRequest) returns (StartSagaResponse);

  // Saga 詳細取得（ステップログ含む）
  rpc GetSaga(GetSagaRequest) returns (GetSagaResponse);

  // Saga 一覧取得
  rpc ListSagas(ListSagasRequest) returns (ListSagasResponse);

  // Saga キャンセル
  rpc CancelSaga(CancelSagaRequest) returns (CancelSagaResponse);

  // Saga 補償実行
  rpc CompensateSaga(CompensateSagaRequest) returns (CompensateSagaResponse);

  // ワークフロー登録（YAML 文字列）
  rpc RegisterWorkflow(RegisterWorkflowRequest) returns (RegisterWorkflowResponse);

  // ワークフロー一覧取得
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
}

// ============================================================
// Saga State
// ============================================================

// SagaStateProto は Saga の状態情報。
message SagaStateProto {
  // M-013 監査対応: 削除予定フィールドのフィールド番号・名前を reserved で保護する準備
  // 将来このフィールド番号が再利用されるとワイヤフォーマット互換性が破壊される
  // TODO(2026-06): deprecated フィールド削除時に以下の reserved 宣言を有効化すること
  // reserved 4;
  // reserved "status";

  // M-014 監査対応: 削除期限 2026-06（saga.proto 内の全 deprecated フィールド共通）
  // 削除時はこのフィールドのフィールド番号と名前を reserved に追記すること

  // Saga UUID
  string id = 1;
  // ワークフロー名
  string workflow_name = 2;
  // 現在のステップインデックス
  int32 current_step = 3;
  // Deprecated: use status_enum instead.
  // ステータス: STARTED, RUNNING, COMPLETED, COMPENSATING, FAILED, CANCELLED
  // [deprecated = true] アノテーションを追加: enum 型フィールドへ移行（A-4 対応）
  string status = 4 [deprecated = true];
  // 各ステップに渡す JSON ペイロード
  google.protobuf.Struct payload = 5;
  // 業務相関 ID
  optional string correlation_id = 6;
  // 呼び出し元サービス名
  optional string initiated_by = 7;
  // エラーメッセージ（失敗時）
  optional string error_message = 8;
  k1s0.system.common.v1.Timestamp created_at = 9;
  k1s0.system.common.v1.Timestamp updated_at = 10;
  // Saga ステータスの enum 版（status の型付き版）。
  SagaStatus status_enum = 11;
}

// SagaStepLogProto は Saga の各ステップ実行ログ。
message SagaStepLogProto {
  // ステップログ UUID
  string id = 1;
  // 親 Saga UUID
  string saga_id = 2;
  // ステップインデックス（0 始まり）
  int32 step_index = 3;
  // ステップ名
  string step_name = 4;
  // Deprecated: use action_enum instead. 後方互換性のため削除しない。
  // アクション種別: EXECUTE, COMPENSATE
  string action = 5 [deprecated = true];
  // Deprecated: use status_enum instead. 後方互換性のため削除しない。
  // 実行結果: SUCCESS, FAILED, TIMEOUT, SKIPPED
  string status = 6 [deprecated = true];
  // リクエストペイロード
  google.protobuf.Struct request_payload = 7;
  // レスポンスペイロード
  google.protobuf.Struct response_payload = 8;
  // エラーメッセージ（失敗時）
  optional string error_message = 9;
  k1s0.system.common.v1.Timestamp started_at = 10;
  optional k1s0.system.common.v1.Timestamp completed_at = 11;
  // MED-025 監査対応: アクション種別の enum 版（action の型付き版）。
  SagaStepAction action_enum = 12;
  // MED-025 監査対応: 実行結果ステータスの enum 版（status の型付き版）。
  SagaStepStatus status_enum = 13;
}

// WorkflowSummary はワークフローの概要情報。
message WorkflowSummary {
  // ワークフロー名
  string name = 1;
  // ステップ数
  int32 step_count = 2;
  // ステップ名一覧
  repeated string step_names = 3;
}

// ============================================================
// StartSaga
// ============================================================

// StartSagaRequest は Saga 開始リクエスト。
message StartSagaRequest {
  // 実行するワークフロー名（1文字以上128文字以下）
  string workflow_name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  // 各ステップに渡す JSON ペイロード
  google.protobuf.Struct payload = 2;
  // 業務相関 ID（任意）
  string correlation_id = 3;
  // 呼び出し元サービス名（任意）
  string initiated_by = 4;
}

// StartSagaResponse は Saga 開始レスポンス。
message StartSagaResponse {
  // 発行された Saga UUID
  string saga_id = 1;
  // 初期ステータス（常に "STARTED"）
  string status = 2;
}

// ============================================================
// GetSaga
// ============================================================

// GetSagaRequest は Saga 詳細取得リクエスト。
message GetSagaRequest {
  // Saga IDは1文字以上であること
  string saga_id = 1 [(buf.validate.field).string.min_len = 1];
}

// GetSagaResponse は Saga 詳細取得レスポンス。
message GetSagaResponse {
  SagaStateProto saga = 1;
  repeated SagaStepLogProto step_logs = 2;
}

// ============================================================
// ListSagas
// ============================================================

// ListSagasRequest は Saga 一覧取得リクエスト。
message ListSagasRequest {
  k1s0.system.common.v1.Pagination pagination = 1;
  // ワークフロー名フィルタ（任意）
  optional string workflow_name = 2;
  // ステータスフィルタ（任意）
  optional string status = 3;
  // 相関 ID フィルタ（任意）
  optional string correlation_id = 4;
}

// ListSagasResponse は Saga 一覧取得レスポンス。
message ListSagasResponse {
  repeated SagaStateProto sagas = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

// ============================================================
// CancelSaga
// ============================================================

// CancelSagaRequest は Saga キャンセルリクエスト。
message CancelSagaRequest {
  // Saga IDは1文字以上であること
  string saga_id = 1 [(buf.validate.field).string.min_len = 1];
}

// CancelSagaResponse は Saga キャンセルレスポンス。
message CancelSagaResponse {
  bool success = 1;
  string message = 2;
}

// CompensateSagaRequest は Saga 補償実行リクエスト。
message CompensateSagaRequest {
  // Saga IDは1文字以上であること
  string saga_id = 1 [(buf.validate.field).string.min_len = 1];
}

// CompensateSagaResponse は Saga 補償実行レスポンス。
message CompensateSagaResponse {
  bool success = 1;
  string status = 2;
  string message = 3;
  string saga_id = 4;
}

// ============================================================
// RegisterWorkflow
// ============================================================

// RegisterWorkflowRequest はワークフロー登録リクエスト。
message RegisterWorkflowRequest {
  // YAML 形式のワークフロー定義文字列（1文字以上）
  string workflow_yaml = 1 [(buf.validate.field).string.min_len = 1];
}

// RegisterWorkflowResponse はワークフロー登録レスポンス。
message RegisterWorkflowResponse {
  // 登録されたワークフロー名
  string name = 1;
  // ステップ数
  int32 step_count = 2;
}

// ============================================================
// ListWorkflows
// ============================================================

// ListWorkflowsRequest はワークフロー一覧取得リクエスト（フィールドなし）。
message ListWorkflowsRequest {}

// ListWorkflowsResponse はワークフロー一覧取得レスポンス。
message ListWorkflowsResponse {
  repeated WorkflowSummary workflows = 1;
}
