// k1s0 共通メッセージ型定義。
// 全 Tier で共有するページネーション・タイムスタンプ等の型を定義する。
syntax = "proto3";

package k1s0.system.common.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/common/v1;commonv1";

// Pagination はページネーションリクエストパラメータ。
message Pagination {
  // ページ番号（1始まり）
  int32 page = 1;
  // 1ページあたりの件数
  int32 page_size = 2;
}

// PaginationResult はページネーション結果。
message PaginationResult {
  // 全件数（大規模データ対応のため int64 を使用）
  int64 total_count = 1;
  // 現在のページ番号
  int32 page = 2;
  // 1ページあたりの件数
  int32 page_size = 3;
  // 次ページの有無
  bool has_next = 4;
}

// Timestamp は時刻情報。google.protobuf.Timestamp と互換性のある独自型。
//
// 【移行計画】将来的に google.protobuf.Timestamp への段階的移行を予定している。
// 現時点では Well-Known Types への追加依存を避けるために独自型を維持する。
// 移行の詳細は docs/architecture/api/proto設計.md を参照すること。
//
// フィールド定義は google.protobuf.Timestamp と同一であり、
// seconds/nanos の意味・範囲・精度も Google の仕様に準拠する。
message Timestamp {
  // Unix epoch からの秒数
  int64 seconds = 1;
  // ナノ秒（0-999999999）
  int32 nanos = 2;
}

// ChangeType は設定・フラグ変更操作の種別。
enum ChangeType {
  // CHANGE_TYPE_UNSPECIFIED は未指定（デフォルト値）。
  CHANGE_TYPE_UNSPECIFIED = 0;
  // CHANGE_TYPE_CREATED は新規作成。
  CHANGE_TYPE_CREATED = 1;
  // CHANGE_TYPE_UPDATED は更新。
  CHANGE_TYPE_UPDATED = 2;
  // CHANGE_TYPE_DELETED は削除。
  CHANGE_TYPE_DELETED = 3;
}
