// k1s0 イベントタイプレジストリ（M-11）。
// システム全体で使用されるイベント種別を一元管理する enum を定義する。
// 新しいイベントを追加する際はこの enum に追記すること。
syntax = "proto3";

package k1s0.system.common.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/common/v1;commonv1";

// EventType はシステム全体で使用されるイベント種別の列挙型。
// 各ドメインのイベントを一元的に管理し、型安全なイベントルーティングを実現する。
enum EventType {
  // 未指定（デフォルト値）
  EVENT_TYPE_UNSPECIFIED = 0;

  // === 認証系イベント (100-199) ===
  // ログイン成功/失敗イベント
  EVENT_TYPE_AUTH_LOGIN = 100;
  // トークン検証結果イベント
  EVENT_TYPE_AUTH_TOKEN_VALIDATION = 101;
  // パーミッション確認結果イベント
  EVENT_TYPE_AUTH_PERMISSION_CHECK = 102;
  // 監査ログ記録イベント
  EVENT_TYPE_AUTH_AUDIT_LOG_RECORDED = 103;

  // === 設定管理系イベント (200-299) ===
  // 設定値変更イベント
  EVENT_TYPE_CONFIG_CHANGED = 200;

  // === タスク管理系イベント (300-399) ===
  // プロジェクトタイプ変更イベント
  EVENT_TYPE_TASKMANAGEMENT_PROJECT_TYPE_CHANGED = 300;
  // ステータス定義変更イベント
  EVENT_TYPE_TASKMANAGEMENT_STATUS_DEFINITION_CHANGED = 301;

  // === タスク系イベント (400-499) ===
  // タスク作成イベント
  EVENT_TYPE_TASK_CREATED = 400;
  // タスクステータス変更イベント
  EVENT_TYPE_TASK_STATUS_CHANGED = 401;
  // タスクキャンセルイベント
  EVENT_TYPE_TASK_CANCELLED = 402;

  // === ボード系イベント (500-599) ===
  // ボードカラムインクリメントイベント
  EVENT_TYPE_BOARD_COLUMN_INCREMENTED = 500;
  // ボードカラムデクリメントイベント
  EVENT_TYPE_BOARD_COLUMN_DECREMENTED = 501;

  // === アクティビティ系イベント (600-699) ===
  // アクティビティ作成イベント
  EVENT_TYPE_ACTIVITY_CREATED = 600;
  // アクティビティ承認イベント
  EVENT_TYPE_ACTIVITY_APPROVED = 601;
  // アクティビティ却下イベント
  EVENT_TYPE_ACTIVITY_REJECTED = 602;
  // アクティビティ削除イベント
  EVENT_TYPE_ACTIVITY_DELETED = 603;
}
