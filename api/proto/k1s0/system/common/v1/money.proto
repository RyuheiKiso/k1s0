// api/proto/k1s0/system/common/v1/money.proto
// Money 型：通貨金額を表す共通型。金融計算の精度を保証するため整数で表現する。
syntax = "proto3";

package k1s0.system.common.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/common/v1;commonv1";

// MED-024 監査対応: buf.validate によるメッセージレベルバリデーションを追加。
// currency_code は ISO 4217 準拠の3文字大文字アルファベット（例: JPY, USD）のみ許可する。
import "buf/validate/validate.proto";

// Money は通貨金額を表す。
// amount は最小通貨単位（例: 円の場合は1円単位、ドルの場合はセント単位）で表現する。
message Money {
  // amount は金額（最小通貨単位）。負の値は返金・クレジットを表す。
  int64 amount = 1;
  // currency_code は ISO 4217 準拠の3文字大文字アルファベット通貨コード（例: JPY, USD）。
  // buf.validate で長さと形式を強制する。
  // 参考: https://www.iso.org/iso-4217-currency-codes.html
  // len: 3 で min_len + max_len の重複を避ける（buf lint 推奨）
  string currency_code = 2 [(buf.validate.field).string = {len: 3, pattern: "^[A-Z]{3}$"}];
}
