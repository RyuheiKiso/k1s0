// api/proto/k1s0/system/common/v1/money.proto
// Money 型：通貨金額を表す共通型。金融計算の精度を保証するため整数で表現する。
syntax = "proto3";

package k1s0.system.common.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/common/v1;commonv1";

// Money は通貨金額を表す。
// amount は最小通貨単位（例: 円の場合は1円単位、ドルの場合はセント単位）で表現する。
message Money {
  // amount は金額（最小通貨単位）。負の値は返金・クレジットを表す。
  int64 amount = 1;
  // currency_code は ISO 4217 準拠の3文字通貨コード（例: JPY, USD）を指定すること。
  // 実装側でバリデーションが必要: 空文字・3文字以外・ISO 4217 非準拠コードは拒否すること。
  // 参考: https://www.iso.org/iso-4217-currency-codes.html
  // L-24 対応: バリデーション要件をコメントで明示し、実装漏れを防止する。
  string currency_code = 2;
}
