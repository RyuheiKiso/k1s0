syntax = "proto3";

package k1s0.system.ratelimit.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/ratelimit/v1;ratelimitv1";

// ==========================================================================
// deprecated フィールド削除タイムライン（HIGH-CODE-03 監査対応）
// [deprecated = true] アノテーションが付与されたフィールドは enum 型フィールドへの移行期間中。
// 全コンシューマーが enum フィールドに移行完了後に削除する。
// 移行状況は docs/architecture/adr/0018-messaging-abstraction-unification.md で追跡。
// ==========================================================================

import "k1s0/system/common/v1/types.proto";
// M-22 監査対応（ADR-0022 Phase 2）: buf validate によるメッセージレベルバリデーション
import "buf/validate/validate.proto";

// RateLimitAlgorithm はレートリミットのアルゴリズム種別。
enum RateLimitAlgorithm {
  // RATE_LIMIT_ALGORITHM_UNSPECIFIED は未指定（デフォルト値）。
  RATE_LIMIT_ALGORITHM_UNSPECIFIED = 0;
  // RATE_LIMIT_ALGORITHM_SLIDING_WINDOW はスライディングウィンドウアルゴリズム。
  RATE_LIMIT_ALGORITHM_SLIDING_WINDOW = 1;
  // RATE_LIMIT_ALGORITHM_TOKEN_BUCKET はトークンバケットアルゴリズム。
  RATE_LIMIT_ALGORITHM_TOKEN_BUCKET = 2;
  // RATE_LIMIT_ALGORITHM_FIXED_WINDOW は固定ウィンドウアルゴリズム。
  RATE_LIMIT_ALGORITHM_FIXED_WINDOW = 3;
  // RATE_LIMIT_ALGORITHM_LEAKY_BUCKET はリーキーバケットアルゴリズム。
  RATE_LIMIT_ALGORITHM_LEAKY_BUCKET = 4;
}

// RateLimitService は API レート制限サービス。
// スライディングウィンドウ・トークンバケット等のアルゴリズムをサポートする。
service RateLimitService {
  // CheckRateLimit はリクエストがレートリミットに引っかかるか確認する。
  rpc CheckRateLimit(CheckRateLimitRequest) returns (CheckRateLimitResponse);
  // CreateRule は新しいレートリミットルールを作成する。
  rpc CreateRule(CreateRuleRequest) returns (CreateRuleResponse);
  // GetRule はルールIDでルール情報を取得する。
  rpc GetRule(GetRuleRequest) returns (GetRuleResponse);
  // UpdateRule はルールを更新する。
  rpc UpdateRule(UpdateRuleRequest) returns (UpdateRuleResponse);
  // DeleteRule はルールを削除する。
  rpc DeleteRule(DeleteRuleRequest) returns (DeleteRuleResponse);
  // ListRules はルール一覧を取得する。
  rpc ListRules(ListRulesRequest) returns (ListRulesResponse);
  // GetUsage はレートリミットの使用状況を取得する。
  rpc GetUsage(GetUsageRequest) returns (GetUsageResponse);
  // ResetLimit はレートリミットの状態をリセットする。
  rpc ResetLimit(ResetLimitRequest) returns (ResetLimitResponse);
}

message CheckRateLimitRequest {
  // スコープは1文字以上128文字以下であること
  string scope = 1 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  // 識別子は1文字以上256文字以下であること
  string identifier = 2 [(buf.validate.field).string = {min_len: 1, max_len: 256}];
  int64 window = 3;
  // CRITICAL-ARCH-001 監査対応: テナント分離のために追加したテナント識別子。
  // gRPC クライアントは JWT Claims から取得した tenant_id を設定すること。
  string tenant_id = 4;
}

message CheckRateLimitResponse {
  bool allowed = 1;
  int64 remaining = 2;
  int64 reset_at = 3;
  string reason = 4;
  int64 limit = 5;
  string scope = 6;
  string identifier = 7;
  int64 used = 8;
  string rule_id = 9;
}

message CreateRuleRequest {
  // スコープは1文字以上128文字以下であること
  string scope = 1 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  // 識別子パターンは1文字以上256文字以下であること
  string identifier_pattern = 2 [(buf.validate.field).string = {min_len: 1, max_len: 256}];
  int64 limit = 3;
  int64 window_seconds = 4;
  bool enabled = 5;
}

message CreateRuleResponse {
  RateLimitRule rule = 1;
}

message GetRuleRequest {
  // ルールIDは1文字以上であること
  string rule_id = 1 [(buf.validate.field).string.min_len = 1];
}

message GetRuleResponse {
  RateLimitRule rule = 1;
}

message UpdateRuleRequest {
  // ルールIDは1文字以上であること
  string rule_id = 1 [(buf.validate.field).string.min_len = 1];
  // スコープは1文字以上128文字以下であること
  string scope = 2 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  // 識別子パターンは1文字以上256文字以下であること
  string identifier_pattern = 3 [(buf.validate.field).string = {min_len: 1, max_len: 256}];
  int64 limit = 4;
  int64 window_seconds = 5;
  bool enabled = 6;
}

message UpdateRuleResponse {
  RateLimitRule rule = 1;
}

message DeleteRuleRequest {
  // ルールIDは1文字以上であること
  string rule_id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteRuleResponse {
  bool success = 1;
}

message ListRulesRequest {
  string scope = 1;
  optional bool enabled_only = 2;
  // ページネーションパラメータを共通型に統一
  k1s0.system.common.v1.Pagination pagination = 3;
  // フィールド番号 4 は旧 page_size（Pagination に統一済み）
  reserved 4;
  reserved "page_size";
}

message ListRulesResponse {
  repeated RateLimitRule rules = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

message RateLimitRule {
  string id = 1;
  string scope = 2;
  string identifier_pattern = 3;
  int64 limit = 4;
  int64 window_seconds = 5;
  // Deprecated: use algorithm_enum instead.
  // [deprecated = true] アノテーションを追加: enum 型フィールドへ移行（A-4 対応）
  string algorithm = 6 [deprecated = true];
  bool enabled = 7;
  k1s0.system.common.v1.Timestamp created_at = 8;
  k1s0.system.common.v1.Timestamp updated_at = 9;
  string name = 10;
  // レートリミットアルゴリズムの enum 版（algorithm の型付き版）。
  RateLimitAlgorithm algorithm_enum = 11;
}

message GetUsageRequest {
  // ルールIDは1文字以上であること
  string rule_id = 1 [(buf.validate.field).string.min_len = 1];
  // CRITICAL-ARCH-001 監査対応: テナント分離のために追加したテナント識別子。
  string tenant_id = 2;
}

message GetUsageResponse {
  string rule_id = 1;
  string rule_name = 2;
  int64 limit = 3;
  int64 window_seconds = 4;
  // Deprecated: use algorithm_enum instead.
  // [deprecated = true] アノテーションを追加: enum 型フィールドへ移行（A-4 対応）
  string algorithm = 5 [deprecated = true];
  bool enabled = 6;
  optional int64 used = 7;
  optional int64 remaining = 8;
  optional int64 reset_at = 9;
  // レートリミットアルゴリズムの enum 版（algorithm の型付き版）。
  RateLimitAlgorithm algorithm_enum = 10;
}

message ResetLimitRequest {
  // スコープは1文字以上128文字以下であること
  string scope = 1 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  // 識別子は1文字以上256文字以下であること
  string identifier = 2 [(buf.validate.field).string = {min_len: 1, max_len: 256}];
  // CRITICAL-ARCH-001 監査対応: テナント分離のために追加したテナント識別子。
  string tenant_id = 3;
}

message ResetLimitResponse {
  bool success = 1;
}
