// k1s0 セッション管理サービス gRPC 定義。
// ユーザーセッションのライフサイクル管理を提供する。
syntax = "proto3";

package k1s0.system.session.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/session/v1;sessionv1";

import "k1s0/system/common/v1/types.proto";
// L-02 監査対応（ADR-0022 Phase 2）: buf validate によるメッセージレベルバリデーション
import "buf/validate/validate.proto";

// SessionStatus はセッションの状態を表す enum。
// string 型の代わりに使用することで型安全性を確保する。
enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_ACTIVE = 1;
  SESSION_STATUS_REVOKED = 2;
}

service SessionService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc RefreshSession(RefreshSessionRequest) returns (RefreshSessionResponse);
  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse);
  rpc RevokeAllSessions(RevokeAllSessionsRequest) returns (RevokeAllSessionsResponse);
  rpc ListUserSessions(ListUserSessionsRequest) returns (ListUserSessionsResponse);
}

// CreateSessionRequest はセッション作成リクエスト。
message CreateSessionRequest {
  // ユーザー UUID（必須）
  string user_id = 1 [(buf.validate.field).string.uuid = true];
  // デバイス識別子（1〜256 文字）
  string device_id = 2 [(buf.validate.field).string = {min_len: 1, max_len: 256}];
  optional string device_name = 3;
  optional string device_type = 4;
  optional string user_agent = 5;
  optional string ip_address = 6;
  optional uint32 ttl_seconds = 7;
  optional int32 max_devices = 8;
  map<string, string> metadata = 9;
}

message CreateSessionResponse {
  string session_id = 1;
  string user_id = 2;
  string device_id = 3;
  k1s0.system.common.v1.Timestamp expires_at = 4;
  k1s0.system.common.v1.Timestamp created_at = 5;
  string token = 6;
  map<string, string> metadata = 7;
  optional string device_name = 8;
  optional string device_type = 9;
  optional string user_agent = 10;
  optional string ip_address = 11;
  // セッション状態（SESSION_STATUS_ACTIVE / SESSION_STATUS_REVOKED）
  SessionStatus status = 12;
}

// GetSessionRequest はセッション取得リクエスト。
message GetSessionRequest {
  // セッション UUID（必須）
  string session_id = 1 [(buf.validate.field).string.uuid = true];
}

message GetSessionResponse {
  Session session = 1;
}

// RefreshSessionRequest はセッション更新リクエスト。
message RefreshSessionRequest {
  // セッション UUID（必須）
  string session_id = 1 [(buf.validate.field).string.uuid = true];
  optional uint32 ttl_seconds = 2;
}

message RefreshSessionResponse {
  string session_id = 1;
  k1s0.system.common.v1.Timestamp expires_at = 2;
  string user_id = 3;
  string token = 4;
  string device_id = 5;
  optional string device_name = 6;
  optional string device_type = 7;
  optional string user_agent = 8;
  optional string ip_address = 9;
  map<string, string> metadata = 10;
  k1s0.system.common.v1.Timestamp created_at = 11;
  optional k1s0.system.common.v1.Timestamp last_accessed_at = 12;
  // セッション状態（SESSION_STATUS_ACTIVE / SESSION_STATUS_REVOKED）
  SessionStatus status = 13;
}

// RevokeSessionRequest はセッション無効化リクエスト。
message RevokeSessionRequest {
  // セッション UUID（必須）
  string session_id = 1 [(buf.validate.field).string.uuid = true];
}

message RevokeSessionResponse {
  bool success = 1;
}

// RevokeAllSessionsRequest はユーザーの全セッション無効化リクエスト。
message RevokeAllSessionsRequest {
  // ユーザー UUID（必須）
  string user_id = 1 [(buf.validate.field).string.uuid = true];
}

message RevokeAllSessionsResponse {
  uint32 revoked_count = 1;
}

// ListUserSessionsRequest はユーザーのセッション一覧取得リクエスト。
message ListUserSessionsRequest {
  // ユーザー UUID（必須）
  string user_id = 1 [(buf.validate.field).string.uuid = true];
}

message ListUserSessionsResponse {
  repeated Session sessions = 1;
  uint32 total_count = 2;
}

message Session {
  string session_id = 1;
  string user_id = 2;
  string device_id = 3;
  optional string device_name = 4;
  optional string device_type = 5;
  optional string user_agent = 6;
  optional string ip_address = 7;
  // セッション状態（SESSION_STATUS_ACTIVE / SESSION_STATUS_REVOKED）
  SessionStatus status = 8;
  k1s0.system.common.v1.Timestamp expires_at = 9;
  k1s0.system.common.v1.Timestamp created_at = 10;
  optional k1s0.system.common.v1.Timestamp last_accessed_at = 11;
  string token = 12;
}
