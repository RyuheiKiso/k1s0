syntax = "proto3";

package k1s0.system.dlq.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/dlq/v1;dlqv1";

// ==========================================================================
// deprecated フィールド削除タイムライン（HIGH-CODE-03 監査対応）
// [deprecated = true] アノテーションが付与されたフィールドは enum 型フィールドへの移行期間中。
// 全コンシューマーが enum フィールドに移行完了後に削除する。
// 移行状況は docs/architecture/adr/0018-messaging-abstraction-unification.md で追跡。
// ==========================================================================

import "k1s0/system/common/v1/types.proto";
// M-22 監査対応（ADR-0022 Phase 2）: buf validate によるメッセージレベルバリデーション
import "buf/validate/validate.proto";

// DlqMessageStatus は DLQ メッセージのステータス。
enum DlqMessageStatus {
  DLQ_MESSAGE_STATUS_UNSPECIFIED = 0;
  DLQ_MESSAGE_STATUS_PENDING = 1;
  DLQ_MESSAGE_STATUS_RETRYING = 2;
  DLQ_MESSAGE_STATUS_SUCCEEDED = 3;
  DLQ_MESSAGE_STATUS_FAILED = 4;
}

// DlqService は DLQ メッセージ管理サービス。
service DlqService {
  // DLQ メッセージ一覧取得
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
  // DLQ メッセージ取得
  rpc GetMessage(GetMessageRequest) returns (GetMessageResponse);
  // DLQ メッセージのリトライ
  rpc RetryMessage(RetryMessageRequest) returns (RetryMessageResponse);
  // DLQ メッセージ削除
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  // DLQ メッセージ一括リトライ
  rpc RetryAll(RetryAllRequest) returns (RetryAllResponse);
}

// DlqMessage は DLQ メッセージ。
message DlqMessage {
  string id = 1;
  string original_topic = 2;
  string error_message = 3;
  int32 retry_count = 4;
  int32 max_retries = 5;
  // JSON-encoded payload bytes.
  bytes payload = 6;
  // Deprecated: use status_enum instead.
  // [deprecated = true] アノテーションを追加: enum 型フィールドへ移行（A-4 対応）
  string status = 7 [deprecated = true];
  k1s0.system.common.v1.Timestamp created_at = 8;
  k1s0.system.common.v1.Timestamp updated_at = 9;
  optional k1s0.system.common.v1.Timestamp last_retry_at = 10;
  // メッセージステータスの enum 版（status の型付き版）。
  DlqMessageStatus status_enum = 11;
}

// ListMessagesRequest は一覧取得リクエスト。
message ListMessagesRequest {
  string topic = 1;
  // ページネーションパラメータを共通型に統一
  k1s0.system.common.v1.Pagination pagination = 2;
  // フィールド番号 3 は旧 page_size（Pagination に統一済み）
  reserved 3;
  reserved "page_size";
}

// ListMessagesResponse は一覧取得レスポンス。
message ListMessagesResponse {
  repeated DlqMessage messages = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

// GetMessageRequest はメッセージ取得リクエスト。
message GetMessageRequest {
  // メッセージIDは1文字以上であること
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// GetMessageResponse はメッセージ取得レスポンス。
message GetMessageResponse {
  DlqMessage message = 1;
}

// RetryMessageRequest はリトライリクエスト。
message RetryMessageRequest {
  // メッセージIDは1文字以上であること
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// RetryMessageResponse はリトライレスポンス。
message RetryMessageResponse {
  DlqMessage message = 1;
}

// DeleteMessageRequest は削除リクエスト。
message DeleteMessageRequest {
  // メッセージIDは1文字以上であること
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// DeleteMessageResponse は削除レスポンス。
message DeleteMessageResponse {
  string id = 1;
}

// RetryAllRequest は一括リトライリクエスト。
message RetryAllRequest {
  string topic = 1;
}

// RetryAllResponse は一括リトライレスポンス。
message RetryAllResponse {
  int32 retried_count = 1;
  string message = 2;
}
