// k1s0 フィーチャーフラグサービス gRPC 定義。
// フラグの評価・取得・作成・更新を提供する。
syntax = "proto3";

package k1s0.system.featureflag.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/featureflag/v1;featureflagv1";

import "k1s0/system/common/v1/types.proto";

// Operator はフラグルールの比較演算子を表す enum。
// string 型の代わりに使用することで型安全性と一貫性を確保する。
enum Operator {
  OPERATOR_UNSPECIFIED = 0;
  OPERATOR_EQ = 1;
  OPERATOR_NE = 2;
  OPERATOR_CONTAINS = 3;
  OPERATOR_GT = 4;
  OPERATOR_LT = 5;
}

service FeatureFlagService {
  rpc EvaluateFlag(EvaluateFlagRequest) returns (EvaluateFlagResponse);
  rpc GetFlag(GetFlagRequest) returns (GetFlagResponse);
  rpc ListFlags(ListFlagsRequest) returns (ListFlagsResponse);
  rpc CreateFlag(CreateFlagRequest) returns (CreateFlagResponse);
  rpc UpdateFlag(UpdateFlagRequest) returns (UpdateFlagResponse);
  rpc DeleteFlag(DeleteFlagRequest) returns (DeleteFlagResponse);
  // WatchFeatureFlag はフラグ変更の監視（Server-Side Streaming）。
  rpc WatchFeatureFlag(WatchFeatureFlagRequest) returns (stream WatchFeatureFlagResponse);
}

message EvaluateFlagRequest {
  string flag_key = 1;
  EvaluationContext context = 2;
}

message EvaluateFlagResponse {
  string flag_key = 1;
  bool enabled = 2;
  optional string variant = 3;
  string reason = 4;
}

message EvaluationContext {
  optional string user_id = 1;
  optional string tenant_id = 2;
  map<string, string> attributes = 3;
}

message GetFlagRequest {
  string flag_key = 1;
}

message GetFlagResponse {
  FeatureFlag flag = 1;
}

// ListFlagsRequest はフラグ一覧取得リクエスト。
// ページネーションにより大量のフラグを効率的に取得できる。
message ListFlagsRequest {
  // 1ページあたりの取得件数（0 の場合はサーバーデフォルト値を使用）
  int32 page_size = 1;
  // ページトークン（前回レスポンスの next_page_token を指定）
  string page_token = 2;
}

message ListFlagsResponse {
  repeated FeatureFlag flags = 1;
}

message CreateFlagRequest {
  string flag_key = 1;
  string description = 2;
  bool enabled = 3;
  repeated FlagVariant variants = 4;
}

message CreateFlagResponse {
  FeatureFlag flag = 1;
}

message UpdateFlagRequest {
  string flag_key = 1;
  optional bool enabled = 2;
  optional string description = 3;
  repeated FlagVariant variants = 4;
  repeated FlagRule rules = 5;
}

message UpdateFlagResponse {
  FeatureFlag flag = 1;
}

message DeleteFlagRequest {
  string flag_key = 1;
}

message DeleteFlagResponse {
  bool success = 1;
  string message = 2;
}

message FeatureFlag {
  string id = 1;
  string flag_key = 2;
  string description = 3;
  bool enabled = 4;
  repeated FlagVariant variants = 5;
  k1s0.system.common.v1.Timestamp created_at = 6;
  k1s0.system.common.v1.Timestamp updated_at = 7;
  repeated FlagRule rules = 8;
}

message FlagVariant {
  string name = 1;
  string value = 2;
  int32 weight = 3;
}

message FlagRule {
  string attribute = 1;
  // 比較演算子（OPERATOR_EQ / OPERATOR_NE / OPERATOR_CONTAINS / OPERATOR_GT / OPERATOR_LT）
  Operator operator = 2;
  string value = 3;
  string variant = 4;
}

// ============================================================
// WatchFeatureFlag（Server-Side Streaming）
// ============================================================

// WatchFeatureFlagRequest はフラグ変更監視リクエスト。
message WatchFeatureFlagRequest {
  // 監視対象のフラグキー（空の場合は全フラグの変更を受け取る）
  string flag_key = 1;
}

// WatchFeatureFlagResponse はフラグ変更の監視レスポンス（ストリーミング）。
message WatchFeatureFlagResponse {
  string flag_key = 1;
  // Deprecated: use change_type_enum instead.
  // CREATED, UPDATED, DELETED
  // [deprecated = true] アノテーションを追加: enum 型フィールドへ移行（A-4 対応）
  string change_type = 2 [deprecated = true];
  FeatureFlag flag = 3;
  k1s0.system.common.v1.Timestamp changed_at = 4;
  // 変更操作の種別（change_type の enum 版）。
  k1s0.system.common.v1.ChangeType change_type_enum = 5;
}
