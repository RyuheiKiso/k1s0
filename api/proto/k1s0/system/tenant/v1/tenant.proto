// k1s0 テナント管理サービス gRPC 定義。
// マルチテナントのライフサイクル管理・メンバー管理を提供する。
syntax = "proto3";

package k1s0.system.tenant.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/tenant/v1;tenantv1";

import "k1s0/system/common/v1/types.proto";
// L-02 監査対応（ADR-0022 Phase 2）: buf validate によるメッセージレベルバリデーション
import "buf/validate/validate.proto";

// TenantService はマルチテナント管理サービス。
// Keycloak realm プロビジョニングおよびメンバー管理を担当する。
service TenantService {
  // CreateTenant は新しいテナントを作成し、Keycloak realm をプロビジョニングする。
  rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse);
  // GetTenant はテナントIDでテナント情報を取得する。
  rpc GetTenant(GetTenantRequest) returns (GetTenantResponse);
  // ListTenants は全テナントの一覧をページネーション付きで返す。
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);
  // UpdateTenant はテナント情報を更新する。
  rpc UpdateTenant(UpdateTenantRequest) returns (UpdateTenantResponse);
  // SuspendTenant はアクティブなテナントを停止する。
  rpc SuspendTenant(SuspendTenantRequest) returns (SuspendTenantResponse);
  // ActivateTenant は停止中のテナントを再開する。
  rpc ActivateTenant(ActivateTenantRequest) returns (ActivateTenantResponse);
  // DeleteTenant はテナントを論理削除する。
  rpc DeleteTenant(DeleteTenantRequest) returns (DeleteTenantResponse);
  // AddMember はテナントにメンバーを追加する。
  rpc AddMember(AddMemberRequest) returns (AddMemberResponse);
  // ListMembers はテナントのメンバー一覧を取得する。
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  // RemoveMember はテナントからメンバーを削除する。
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);
  // UpdateMemberRole はテナントメンバーのロールを更新する。
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (UpdateMemberRoleResponse);
  // GetProvisioningStatus はテナントプロビジョニングジョブのステータスを返す。
  rpc GetProvisioningStatus(GetProvisioningStatusRequest) returns (GetProvisioningStatusResponse);
  // WatchTenant はテナント変更の監視（Server-Side Streaming）。
  rpc WatchTenant(WatchTenantRequest) returns (stream WatchTenantResponse);
}

// CreateTenantRequest は新規テナント作成リクエスト。
message CreateTenantRequest {
  // テナント識別名（1〜128 文字の英数字・ハイフン）
  string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  // テナント表示名（1〜256 文字）
  string display_name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 256}];
  // オーナーユーザー UUID（必須）
  string owner_id = 3 [(buf.validate.field).string.uuid = true];
  // プラン名（free, standard, enterprise 等）
  string plan = 4 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
}

message CreateTenantResponse {
  Tenant tenant = 1;
}

// GetTenantRequest はテナント情報取得リクエスト。
message GetTenantRequest {
  // テナント UUID（必須）
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
}

message GetTenantResponse {
  Tenant tenant = 1;
}

message ListTenantsRequest {
  k1s0.system.common.v1.Pagination pagination = 1;
}

message ListTenantsResponse {
  repeated Tenant tenants = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

// UpdateTenantRequest はテナント情報更新リクエスト。
message UpdateTenantRequest {
  // テナント UUID（必須）
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
  // テナント表示名（1〜256 文字）
  string display_name = 2 [(buf.validate.field).string = {min_len: 0, max_len: 256}];
  // プラン名（free, standard, enterprise 等）
  string plan = 3 [(buf.validate.field).string = {min_len: 0, max_len: 64}];
}

message UpdateTenantResponse {
  Tenant tenant = 1;
}

// SuspendTenantRequest はテナント停止リクエスト。
message SuspendTenantRequest {
  // テナント UUID（必須）
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
}

message SuspendTenantResponse {
  Tenant tenant = 1;
}

// ActivateTenantRequest はテナント再開リクエスト。
message ActivateTenantRequest {
  // テナント UUID（必須）
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
}

message ActivateTenantResponse {
  Tenant tenant = 1;
}

// DeleteTenantRequest はテナント削除リクエスト。
message DeleteTenantRequest {
  // テナント UUID（必須）
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteTenantResponse {
  Tenant tenant = 1;
}

// AddMemberRequest はテナントへのメンバー追加リクエスト。
message AddMemberRequest {
  // テナント UUID（必須）
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
  // ユーザー UUID（必須）
  string user_id = 2 [(buf.validate.field).string.uuid = true];
  // ロール名（owner, admin, member, viewer）
  string role = 3 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
}

message AddMemberResponse {
  TenantMember member = 1;
}

// ListMembersRequest はテナントメンバー一覧取得リクエスト。
message ListMembersRequest {
  // テナント UUID（必須）
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
}

message ListMembersResponse {
  repeated TenantMember members = 1;
}

// RemoveMemberRequest はテナントからのメンバー削除リクエスト。
message RemoveMemberRequest {
  // テナント UUID（必須）
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
  // ユーザー UUID（必須）
  string user_id = 2 [(buf.validate.field).string.uuid = true];
}

message RemoveMemberResponse {
  bool success = 1;
}

// UpdateMemberRoleRequest はテナントメンバーのロール更新リクエスト。
// 有効なロール: owner, admin, member, viewer
message UpdateMemberRoleRequest {
  // テナント UUID（必須）
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
  // ユーザー UUID（必須）
  string user_id = 2 [(buf.validate.field).string.uuid = true];
  // ロール名（owner, admin, member, viewer）
  string role = 3 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
}

// UpdateMemberRoleResponse はテナントメンバーのロール更新レスポンス。
message UpdateMemberRoleResponse {
  TenantMember member = 1;
}

// GetProvisioningStatusRequest はプロビジョニングジョブステータス取得リクエスト。
message GetProvisioningStatusRequest {
  // ジョブ UUID（必須）
  string job_id = 1 [(buf.validate.field).string.uuid = true];
}

message GetProvisioningStatusResponse {
  ProvisioningJob job = 1;
}

message Tenant {
  string id = 1;
  string name = 2;
  string display_name = 3;
  string status = 4;
  string plan = 5;
  k1s0.system.common.v1.Timestamp created_at = 6;
  string owner_id = 7;
  string settings = 8;
  string db_schema = 9;
  k1s0.system.common.v1.Timestamp updated_at = 10;
  string keycloak_realm = 11;
}

message TenantMember {
  string id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string role = 4;
  k1s0.system.common.v1.Timestamp joined_at = 5;
}

message ProvisioningJob {
  string id = 1;
  string tenant_id = 2;
  string status = 3;
  string current_step = 4;
  string error_message = 5;
  k1s0.system.common.v1.Timestamp created_at = 6;
  k1s0.system.common.v1.Timestamp updated_at = 7;
}

// ============================================================
// WatchTenant（Server-Side Streaming）
// ============================================================

// WatchTenantRequest はテナント変更監視リクエスト。
message WatchTenantRequest {
  // 監視対象のテナント ID（空の場合は全テナントの変更を受け取る）
  string tenant_id = 1;
}

// WatchTenantResponse はテナント変更の監視レスポンス（ストリーミング）。
message WatchTenantResponse {
  string tenant_id = 1;
  // Deprecated: change_type_enum を使用すること。文字列型では型安全性がない。
  // HIGH-019 監査対応: 他サービス（featureflag, config）と同様に enum 型フィールドへ移行する
  string change_type = 2 [deprecated = true];
  Tenant tenant = 3;
  k1s0.system.common.v1.Timestamp changed_at = 4;
  // HIGH-019 監査対応: change_type の enum 版（他サービスの change_type_enum と統一）
  // CREATED, UPDATED, SUSPENDED, ACTIVATED, DELETED は ChangeType enum で表現する
  k1s0.system.common.v1.ChangeType change_type_enum = 5;
}
