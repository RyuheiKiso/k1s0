syntax = "proto3";
package k1s0.system.file.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/file/v1;filev1";

import "k1s0/system/common/v1/types.proto";
// M-22 監査対応（ADR-0022 Phase 2）: buf validate によるメッセージレベルバリデーション
import "buf/validate/validate.proto";

service FileService {
  rpc GetFileMetadata(GetFileMetadataRequest) returns (GetFileMetadataResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc GenerateUploadUrl(GenerateUploadUrlRequest) returns (GenerateUploadUrlResponse);
  rpc CompleteUpload(CompleteUploadRequest) returns (CompleteUploadResponse);
  rpc GenerateDownloadUrl(GenerateDownloadUrlRequest) returns (GenerateDownloadUrlResponse);
  rpc UpdateFileTags(UpdateFileTagsRequest) returns (UpdateFileTagsResponse);
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);
}

message FileMetadata {
  string id = 1;
  string filename = 2;
  string content_type = 3;
  int64 size_bytes = 4;
  string tenant_id = 5;
  string uploaded_by = 6;
  string status = 7;
  // Timestamp型統一: string から共通 Timestamp 型へ移行（CRIT-006 対応）
  k1s0.system.common.v1.Timestamp created_at = 8;
  // Timestamp型統一: string から共通 Timestamp 型へ移行（CRIT-006 対応）
  k1s0.system.common.v1.Timestamp updated_at = 9;
  map<string, string> tags = 10;
  string storage_key = 11;
  optional string checksum_sha256 = 12;
}

message GetFileMetadataRequest {
  // ファイルIDは1文字以上であること
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message GetFileMetadataResponse {
  FileMetadata metadata = 1;
}

message ListFilesRequest {
  // テナントIDはUUID形式であること
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
  // ページネーションパラメータを共通型に統一
  k1s0.system.common.v1.Pagination pagination = 2;
  // フィールド番号 3 は旧 page_size（Pagination に統一済み）
  reserved 3;
  reserved "page_size";
  optional string uploaded_by = 4;
  optional string mime_type = 5;
  optional string tag = 6;
}

message ListFilesResponse {
  repeated FileMetadata files = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

message GenerateUploadUrlRequest {
  // ファイル名は1文字以上512文字以下であること
  string filename = 1 [(buf.validate.field).string = {min_len: 1, max_len: 512}];
  // コンテンツタイプは1文字以上128文字以下であること
  string content_type = 2 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  // テナントIDはUUID形式であること
  string tenant_id = 3 [(buf.validate.field).string.uuid = true];
  // アップロード者IDは1文字以上であること
  string uploaded_by = 4 [(buf.validate.field).string.min_len = 1];
  map<string, string> tags = 5;
  optional uint32 expires_in_seconds = 6;
  int64 size_bytes = 7;
}

message GenerateUploadUrlResponse {
  string file_id = 1;
  string upload_url = 2;
  uint32 expires_in_seconds = 3;
}

message CompleteUploadRequest {
  // ファイルIDは1文字以上であること
  string file_id = 1 [(buf.validate.field).string.min_len = 1];
  optional string checksum_sha256 = 3;
}

message CompleteUploadResponse {
  FileMetadata metadata = 1;
}

message GenerateDownloadUrlRequest {
  // ファイルIDは1文字以上であること
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message GenerateDownloadUrlResponse {
  string download_url = 1;
  int32 expires_in_seconds = 2;
}

message UpdateFileTagsRequest {
  // ファイルIDは1文字以上であること
  string id = 1 [(buf.validate.field).string.min_len = 1];
  map<string, string> tags = 2;
}

message UpdateFileTagsResponse {
  FileMetadata metadata = 1;
}

message DeleteFileRequest {
  // ファイルIDは1文字以上であること
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteFileResponse {}
