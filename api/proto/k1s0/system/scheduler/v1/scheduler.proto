// k1s0 スケジューラーサービス gRPC 定義。
// cron 式によるジョブのトリガーおよび実行履歴取得を提供する。
// gRPC ポート 50051（設定で上書き可能）
syntax = "proto3";

package k1s0.system.scheduler.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/scheduler/v1;schedulerv1";

import "k1s0/system/common/v1/types.proto";
import "google/protobuf/struct.proto";
// M-22 監査対応（ADR-0022 Phase 2）: buf validate によるメッセージレベルバリデーション
import "buf/validate/validate.proto";

// ==========================================================================
// MED-025 監査対応: string status → enum 型フィールドへの移行
// 後方互換性のため deprecated string フィールドは削除せず enum フィールドを追加する。
// 全コンシューマーが enum フィールドに移行完了後に string フィールドを削除する。
// ==========================================================================

// JobStatus はジョブのステータス。
enum JobStatus {
  // JOB_STATUS_UNSPECIFIED は未指定（デフォルト値）。
  JOB_STATUS_UNSPECIFIED = 0;
  // JOB_STATUS_ACTIVE はジョブが有効で次回実行を待機中。
  JOB_STATUS_ACTIVE = 1;
  // JOB_STATUS_PAUSED はジョブが一時停止中。
  JOB_STATUS_PAUSED = 2;
  // JOB_STATUS_DISABLED はジョブが無効化されている。
  JOB_STATUS_DISABLED = 3;
}

// JobExecutionStatus はジョブ実行のステータス。
enum JobExecutionStatus {
  // JOB_EXECUTION_STATUS_UNSPECIFIED は未指定（デフォルト値）。
  JOB_EXECUTION_STATUS_UNSPECIFIED = 0;
  // JOB_EXECUTION_STATUS_RUNNING は実行中。
  JOB_EXECUTION_STATUS_RUNNING = 1;
  // JOB_EXECUTION_STATUS_SUCCEEDED は成功完了。
  JOB_EXECUTION_STATUS_SUCCEEDED = 2;
  // JOB_EXECUTION_STATUS_FAILED は失敗。
  JOB_EXECUTION_STATUS_FAILED = 3;
}

service SchedulerService {
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc UpdateJob(UpdateJobRequest) returns (UpdateJobResponse);
  rpc DeleteJob(DeleteJobRequest) returns (DeleteJobResponse);
  rpc PauseJob(PauseJobRequest) returns (PauseJobResponse);
  rpc ResumeJob(ResumeJobRequest) returns (ResumeJobResponse);
  rpc TriggerJob(TriggerJobRequest) returns (TriggerJobResponse);
  rpc GetJobExecution(GetJobExecutionRequest) returns (GetJobExecutionResponse);
  rpc ListExecutions(ListExecutionsRequest) returns (ListExecutionsResponse);
}

message Job {
  string id = 1;
  string name = 2;
  string description = 3;
  string cron_expression = 4;
  string timezone = 5;
  string target_type = 6;
  string target = 7;
  google.protobuf.Struct payload = 8;
  // Deprecated: use status_enum instead. 後方互換性のため削除しない。
  string status = 9 [deprecated = true];
  optional k1s0.system.common.v1.Timestamp next_run_at = 10;
  optional k1s0.system.common.v1.Timestamp last_run_at = 11;
  k1s0.system.common.v1.Timestamp created_at = 12;
  k1s0.system.common.v1.Timestamp updated_at = 13;
  // MED-025 監査対応: ジョブステータスの enum 版（status の型付き版）。
  JobStatus status_enum = 14;
}

message CreateJobRequest {
  // ジョブ名は1文字以上128文字以下であること
  string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  string description = 2;
  // cron 式は1文字以上128文字以下であること
  string cron_expression = 3 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  // タイムゾーンは1文字以上64文字以下であること（例: Asia/Tokyo）
  string timezone = 4 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
  // ターゲット種別は1文字以上64文字以下であること（例: http, kafka）
  string target_type = 5 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
  // ターゲットは1文字以上512文字以下であること（URL 等）
  string target = 6 [(buf.validate.field).string = {min_len: 1, max_len: 512}];
  google.protobuf.Struct payload = 7;
}

message CreateJobResponse {
  Job job = 1;
}

message GetJobRequest {
  // ジョブIDは1文字以上であること
  string job_id = 1 [(buf.validate.field).string.min_len = 1];
}

message GetJobResponse {
  Job job = 1;
}

message ListJobsRequest {
  // Deprecated: use status_enum instead. 後方互換性のため削除しない。
  string status = 1 [deprecated = true];
  k1s0.system.common.v1.Pagination pagination = 2;
  // MED-025 監査対応: enum 型フィルター（status の型付き版）。
  optional JobStatus status_enum = 3;
}

message ListJobsResponse {
  repeated Job jobs = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

message UpdateJobRequest {
  // ジョブIDは1文字以上であること
  string job_id = 1 [(buf.validate.field).string.min_len = 1];
  string name = 2;
  string description = 3;
  string cron_expression = 4;
  string timezone = 5;
  string target_type = 6;
  string target = 7;
  google.protobuf.Struct payload = 8;
}

message UpdateJobResponse {
  Job job = 1;
}

message DeleteJobRequest {
  // ジョブIDは1文字以上であること
  string job_id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteJobResponse {
  bool success = 1;
  string message = 2;
}

message PauseJobRequest {
  // ジョブIDは1文字以上であること
  string job_id = 1 [(buf.validate.field).string.min_len = 1];
}

message PauseJobResponse {
  Job job = 1;
}

message ResumeJobRequest {
  // ジョブIDは1文字以上であること
  string job_id = 1 [(buf.validate.field).string.min_len = 1];
}

message ResumeJobResponse {
  Job job = 1;
}

message TriggerJobRequest {
  // ジョブIDは1文字以上であること
  string job_id = 1 [(buf.validate.field).string.min_len = 1];
}

message TriggerJobResponse {
  string execution_id = 1;
  string job_id = 2;
  // 実行状態（running / succeeded / failed）
  string status = 3;
  k1s0.system.common.v1.Timestamp triggered_at = 4;
}

message GetJobExecutionRequest {
  // 実行IDは1文字以上であること
  string execution_id = 1 [(buf.validate.field).string.min_len = 1];
}

message GetJobExecutionResponse {
  JobExecution execution = 1;
}

message ListExecutionsRequest {
  // ジョブIDは1文字以上であること
  string job_id = 1 [(buf.validate.field).string.min_len = 1];
  k1s0.system.common.v1.Pagination pagination = 2;
  optional string status = 3;
  optional k1s0.system.common.v1.Timestamp from = 4;
  optional k1s0.system.common.v1.Timestamp to = 5;
}

message ListExecutionsResponse {
  repeated JobExecution executions = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

message JobExecution {
  string id = 1;
  string job_id = 2;
  // Deprecated: use status_enum instead. 後方互換性のため削除しない。
  // 実行状態（running / succeeded / failed）
  string status = 3 [deprecated = true];
  // 実行トリガー（scheduler / manual）
  string triggered_by = 4;
  k1s0.system.common.v1.Timestamp started_at = 5;
  optional k1s0.system.common.v1.Timestamp finished_at = 6;
  // 実行時間（ミリ秒）
  optional uint64 duration_ms = 7;
  optional string error_message = 8;
  // MED-025 監査対応: 実行ステータスの enum 版（status の型付き版）。
  JobExecutionStatus status_enum = 9;
}

