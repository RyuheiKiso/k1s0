// k1s0 Vault シークレット管理サービス gRPC 定義。
// シークレットの取得・設定・削除・一覧取得を提供する。
syntax = "proto3";

package k1s0.system.vault.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/vault/v1;vaultv1";

import "k1s0/system/common/v1/types.proto";

service VaultService {
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
  rpc SetSecret(SetSecretRequest) returns (SetSecretResponse);
  rpc RotateSecret(RotateSecretRequest) returns (RotateSecretResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
  rpc GetSecretMetadata(GetSecretMetadataRequest) returns (GetSecretMetadataResponse);
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);
}

message GetSecretRequest {
  string path = 1;
  int64 version = 2;
}

message GetSecretResponse {
  map<string, string> data = 1;
  int64 version = 2;
  k1s0.system.common.v1.Timestamp created_at = 3;
  k1s0.system.common.v1.Timestamp updated_at = 4;
  string path = 5;
}

message SetSecretRequest {
  string path = 1;
  map<string, string> data = 2;
}

message SetSecretResponse {
  int64 version = 1;
  k1s0.system.common.v1.Timestamp created_at = 2;
  string path = 3;
}

message RotateSecretRequest {
  string path = 1;
  map<string, string> data = 2;
}

message RotateSecretResponse {
  string path = 1;
  int64 new_version = 2;
  bool rotated = 3;
}

message DeleteSecretRequest {
  string path = 1;
  repeated int64 versions = 2;
}

message DeleteSecretResponse {
  bool success = 1;
}

message GetSecretMetadataRequest {
  string path = 1;
}

message GetSecretMetadataResponse {
  string path = 1;
  int64 current_version = 2;
  int32 version_count = 3;
  k1s0.system.common.v1.Timestamp created_at = 4;
  k1s0.system.common.v1.Timestamp updated_at = 5;
}

message ListSecretsRequest {
  string prefix = 1;
  // ページネーションパラメータを共通型に統一
  k1s0.system.common.v1.Pagination pagination = 2;
}

message ListSecretsResponse {
  repeated string keys = 1;
  // ページネーション結果
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

message ListAuditLogsRequest {
  // ページネーションパラメータを共通型に統一
  k1s0.system.common.v1.Pagination pagination = 3;
  // LOW-12 監査対応: keyset ページネーション用カーソル（前ページの最後のアイテムの UUID 文字列）。
  // 省略または空文字の場合は先頭ページを返す。
  string after_cursor = 4;
  // フィールド番号 1, 2 は旧 offset, limit（Pagination に統一済み）
  reserved 1, 2;
  reserved "offset", "limit";
}

message ListAuditLogsResponse {
  repeated AuditLogEntry logs = 1;
  // ページネーション結果
  k1s0.system.common.v1.PaginationResult pagination = 2;
  // LOW-12 監査対応: 次ページカーソル（最後のアイテムの UUID 文字列）。空文字なら最終ページ。
  string next_cursor = 3;
}

message AuditLogEntry {
  string id = 1;
  string key_path = 2;
  string action = 3;
  string actor_id = 4;
  string ip_address = 5;
  bool success = 6;
  optional string error_msg = 7;
  k1s0.system.common.v1.Timestamp created_at = 8;
}
