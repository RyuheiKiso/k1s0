// k1s0 ワークフローオーケストレーションサービス gRPC 定義。
// 人間タスク・承認フロー込みのワークフローインスタンス管理を提供する。
// gRPC ポート 50051（設定で上書き可能）
syntax = "proto3";

package k1s0.system.workflow.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/workflow/v1;workflowv1";

// ==========================================================================
// deprecated フィールド削除タイムライン（HIGH-CODE-03 監査対応）
// [deprecated = true] アノテーションが付与されたフィールドは enum 型フィールドへの移行期間中。
// 全コンシューマーが enum フィールドに移行完了後に削除する。
// 移行状況は docs/architecture/adr/0018-messaging-abstraction-unification.md で追跡。
// ==========================================================================

import "k1s0/system/common/v1/types.proto";
// M-22 監査対応（ADR-0022 Phase 2）: buf validate によるメッセージレベルバリデーション
import "buf/validate/validate.proto";

// MED-025 監査対応: WorkflowInstanceStatus / WorkflowTaskStatus enum を追加。
// 後方互換性のため deprecated string フィールドは削除しない。

// WorkflowInstanceStatus はワークフローインスタンスのステータス。
enum WorkflowInstanceStatus {
  // WORKFLOW_INSTANCE_STATUS_UNSPECIFIED は未指定（デフォルト値）。
  WORKFLOW_INSTANCE_STATUS_UNSPECIFIED = 0;
  // WORKFLOW_INSTANCE_STATUS_PENDING は開始待機中。
  WORKFLOW_INSTANCE_STATUS_PENDING = 1;
  // WORKFLOW_INSTANCE_STATUS_RUNNING は実行中。
  WORKFLOW_INSTANCE_STATUS_RUNNING = 2;
  // WORKFLOW_INSTANCE_STATUS_COMPLETED は完了。
  WORKFLOW_INSTANCE_STATUS_COMPLETED = 3;
  // WORKFLOW_INSTANCE_STATUS_CANCELLED はキャンセル済み。
  WORKFLOW_INSTANCE_STATUS_CANCELLED = 4;
  // WORKFLOW_INSTANCE_STATUS_FAILED は失敗。
  WORKFLOW_INSTANCE_STATUS_FAILED = 5;
}

// WorkflowTaskStatus はワークフロータスクのステータス。
enum WorkflowTaskStatus {
  // WORKFLOW_TASK_STATUS_UNSPECIFIED は未指定（デフォルト値）。
  WORKFLOW_TASK_STATUS_UNSPECIFIED = 0;
  // WORKFLOW_TASK_STATUS_PENDING は承認待機中。
  WORKFLOW_TASK_STATUS_PENDING = 1;
  // WORKFLOW_TASK_STATUS_APPROVED は承認済み。
  WORKFLOW_TASK_STATUS_APPROVED = 2;
  // WORKFLOW_TASK_STATUS_REJECTED は却下済み。
  WORKFLOW_TASK_STATUS_REJECTED = 3;
  // WORKFLOW_TASK_STATUS_CANCELLED はキャンセル済み。
  WORKFLOW_TASK_STATUS_CANCELLED = 4;
}

// WorkflowStepType はワークフローステップの種別。
enum WorkflowStepType {
  // WORKFLOW_STEP_TYPE_UNSPECIFIED は未指定（デフォルト値）。
  WORKFLOW_STEP_TYPE_UNSPECIFIED = 0;
  // WORKFLOW_STEP_TYPE_APPROVAL は人間による承認タスク。
  WORKFLOW_STEP_TYPE_APPROVAL = 1;
  // WORKFLOW_STEP_TYPE_AUTOMATED は自動実行タスク。
  WORKFLOW_STEP_TYPE_AUTOMATED = 2;
  // WORKFLOW_STEP_TYPE_NOTIFICATION は通知のみのタスク。
  WORKFLOW_STEP_TYPE_NOTIFICATION = 3;
}

service WorkflowService {
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc CreateWorkflow(CreateWorkflowRequest) returns (CreateWorkflowResponse);
  rpc GetWorkflow(GetWorkflowRequest) returns (GetWorkflowResponse);
  rpc UpdateWorkflow(UpdateWorkflowRequest) returns (UpdateWorkflowResponse);
  rpc DeleteWorkflow(DeleteWorkflowRequest) returns (DeleteWorkflowResponse);
  rpc StartInstance(StartInstanceRequest) returns (StartInstanceResponse);
  rpc GetInstance(GetInstanceRequest) returns (GetInstanceResponse);
  rpc ListInstances(ListInstancesRequest) returns (ListInstancesResponse);
  rpc CancelInstance(CancelInstanceRequest) returns (CancelInstanceResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc ReassignTask(ReassignTaskRequest) returns (ReassignTaskResponse);
  rpc ApproveTask(ApproveTaskRequest) returns (ApproveTaskResponse);
  rpc RejectTask(RejectTaskRequest) returns (RejectTaskResponse);
}

message WorkflowStep {
  // M-013 監査対応: 削除予定フィールドのフィールド番号・名前を reserved で保護する準備
  // 将来このフィールド番号が再利用されるとワイヤフォーマット互換性が破壊される
  // TODO(2026-06): deprecated フィールド削除時に以下の reserved 宣言を有効化すること
  // reserved 3;
  // reserved "step_type";

  // M-014 監査対応: 削除期限 2026-06（workflow.proto 内の全 deprecated フィールド共通）
  // 削除時はこのフィールドのフィールド番号と名前を reserved に追記すること

  string step_id = 1;
  string name = 2;
  // Deprecated: use step_type_enum instead.
  // [deprecated = true] アノテーションを追加: enum 型フィールドへ移行（A-4 対応）
  string step_type = 3 [deprecated = true];
  optional string assignee_role = 4;
  optional uint32 timeout_hours = 5;
  optional string on_approve = 6;
  optional string on_reject = 7;
  // ステップ種別の enum 版（step_type の型付き版）。
  WorkflowStepType step_type_enum = 8;
}

message WorkflowDefinition {
  string id = 1;
  string name = 2;
  string description = 3;
  uint32 version = 4;
  bool enabled = 5;
  repeated WorkflowStep steps = 6;
  k1s0.system.common.v1.Timestamp created_at = 7;
  k1s0.system.common.v1.Timestamp updated_at = 8;
}

message ListWorkflowsRequest {
  bool enabled_only = 1;
  k1s0.system.common.v1.Pagination pagination = 2;
}

message ListWorkflowsResponse {
  repeated WorkflowDefinition workflows = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

message CreateWorkflowRequest {
  // ワークフロー名は1文字以上128文字以下であること
  string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  string description = 2;
  bool enabled = 3;
  repeated WorkflowStep steps = 4;
}

message CreateWorkflowResponse {
  WorkflowDefinition workflow = 1;
}

message GetWorkflowRequest {
  // ワークフローIDは1文字以上であること
  string workflow_id = 1 [(buf.validate.field).string.min_len = 1];
}

message GetWorkflowResponse {
  WorkflowDefinition workflow = 1;
}

message WorkflowSteps {
  repeated WorkflowStep items = 1;
}

message UpdateWorkflowRequest {
  // ワークフローIDは1文字以上であること
  string workflow_id = 1 [(buf.validate.field).string.min_len = 1];
  optional string name = 2;
  optional string description = 3;
  optional bool enabled = 4;
  optional WorkflowSteps steps = 5;
}

message UpdateWorkflowResponse {
  WorkflowDefinition workflow = 1;
}

message DeleteWorkflowRequest {
  // ワークフローIDは1文字以上であること
  string workflow_id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteWorkflowResponse {
  bool success = 1;
  string message = 2;
}

message StartInstanceRequest {
  // ワークフローIDは1文字以上であること
  string workflow_id = 1 [(buf.validate.field).string.min_len = 1];
  // タイトルは1文字以上256文字以下であること
  string title = 2 [(buf.validate.field).string = {min_len: 1, max_len: 256}];
  // 開始者IDは1文字以上であること
  string initiator_id = 3 [(buf.validate.field).string.min_len = 1];
  // ワークフロー実行コンテキスト（JSON バイト列）
  bytes context_json = 4;
}

message StartInstanceResponse {
  string instance_id = 1;
  // インスタンス状態（pending / running / completed / cancelled / failed）
  string status = 2;
  optional string current_step_id = 3;
  k1s0.system.common.v1.Timestamp started_at = 4;
  string workflow_id = 5;
  string workflow_name = 6;
  string title = 7;
  string initiator_id = 8;
  bytes context_json = 9;
}

message GetInstanceRequest {
  // インスタンスIDは1文字以上であること
  string instance_id = 1 [(buf.validate.field).string.min_len = 1];
}

message GetInstanceResponse {
  WorkflowInstance instance = 1;
}

message ListInstancesRequest {
  string status = 1;
  string workflow_id = 2;
  string initiator_id = 3;
  k1s0.system.common.v1.Pagination pagination = 4;
}

message ListInstancesResponse {
  repeated WorkflowInstance instances = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

message CancelInstanceRequest {
  // インスタンスIDは1文字以上であること
  string instance_id = 1 [(buf.validate.field).string.min_len = 1];
  optional string reason = 2;
}

message CancelInstanceResponse {
  WorkflowInstance instance = 1;
}

message WorkflowTask {
  string id = 1;
  string instance_id = 2;
  string step_id = 3;
  string step_name = 4;
  optional string assignee_id = 5;
  // Deprecated: use status_enum instead. 後方互換性のため削除しない。
  string status = 6 [deprecated = true];
  optional k1s0.system.common.v1.Timestamp due_at = 7;
  optional string comment = 8;
  optional string actor_id = 9;
  optional k1s0.system.common.v1.Timestamp decided_at = 10;
  k1s0.system.common.v1.Timestamp created_at = 11;
  k1s0.system.common.v1.Timestamp updated_at = 12;
  // MED-025 監査対応: タスクステータスの enum 版。
  WorkflowTaskStatus status_enum = 13;
}

message ListTasksRequest {
  string assignee_id = 1;
  string status = 2;
  string instance_id = 3;
  bool overdue_only = 4;
  k1s0.system.common.v1.Pagination pagination = 5;
}

message ListTasksResponse {
  repeated WorkflowTask tasks = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

message ReassignTaskRequest {
  // タスクIDは1文字以上であること
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  // 新しい担当者IDは1文字以上であること
  string new_assignee_id = 2 [(buf.validate.field).string.min_len = 1];
  optional string reason = 3;
  // 操作者IDは1文字以上であること
  string actor_id = 4 [(buf.validate.field).string.min_len = 1];
}

message ReassignTaskResponse {
  WorkflowTask task = 1;
  optional string previous_assignee_id = 2;
}

message WorkflowInstance {
  string id = 1;
  string workflow_id = 2;
  string workflow_name = 3;
  string title = 4;
  string initiator_id = 5;
  optional string current_step_id = 6;
  // Deprecated: use status_enum instead. 後方互換性のため削除しない。
  // インスタンス状態（pending / running / completed / cancelled / failed）
  string status = 7 [deprecated = true];
  // ワークフロー実行コンテキスト（JSON バイト列）
  bytes context_json = 8;
  k1s0.system.common.v1.Timestamp started_at = 9;
  optional k1s0.system.common.v1.Timestamp completed_at = 10;
  optional k1s0.system.common.v1.Timestamp created_at = 11;
  // MED-025 監査対応: インスタンスステータスの enum 版。
  WorkflowInstanceStatus status_enum = 12;
}

message ApproveTaskRequest {
  // タスクIDは1文字以上であること
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  // 操作者IDは1文字以上であること
  string actor_id = 2 [(buf.validate.field).string.min_len = 1];
  optional string comment = 3;
}

message ApproveTaskResponse {
  string task_id = 1;
  // タスク状態（approved）
  string status = 2;
  optional string next_task_id = 3;
  // インスタンス状態（running / completed）
  string instance_status = 4;
}

message RejectTaskRequest {
  // タスクIDは1文字以上であること
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  // 操作者IDは1文字以上であること
  string actor_id = 2 [(buf.validate.field).string.min_len = 1];
  optional string comment = 3;
}

message RejectTaskResponse {
  string task_id = 1;
  // タスク状態（rejected）
  string status = 2;
  optional string next_task_id = 3;
  // インスタンス状態（running / failed）
  string instance_status = 4;
}

