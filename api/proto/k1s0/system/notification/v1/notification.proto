// k1s0 通知サービス gRPC 定義。
// 通知の即時送信と配信履歴取得を提供する。
syntax = "proto3";

package k1s0.system.notification.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/notification/v1;notificationv1";

import "k1s0/system/common/v1/types.proto";

// NotificationStatus は通知配信のステータス。
enum NotificationStatus {
  // NOTIFICATION_STATUS_UNSPECIFIED は未指定（デフォルト値）。
  NOTIFICATION_STATUS_UNSPECIFIED = 0;
  // NOTIFICATION_STATUS_PENDING は送信待ち。
  NOTIFICATION_STATUS_PENDING = 1;
  // NOTIFICATION_STATUS_SENT は送信済み。
  NOTIFICATION_STATUS_SENT = 2;
  // NOTIFICATION_STATUS_FAILED は送信失敗。
  NOTIFICATION_STATUS_FAILED = 3;
  // NOTIFICATION_STATUS_RETRYING はリトライ中。
  NOTIFICATION_STATUS_RETRYING = 4;
}

service NotificationService {
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
  rpc GetNotification(GetNotificationRequest) returns (GetNotificationResponse);
  rpc RetryNotification(RetryNotificationRequest) returns (RetryNotificationResponse);
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
  rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);
  rpc GetChannel(GetChannelRequest) returns (GetChannelResponse);
  rpc UpdateChannel(UpdateChannelRequest) returns (UpdateChannelResponse);
  rpc DeleteChannel(DeleteChannelRequest) returns (DeleteChannelResponse);
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  rpc CreateTemplate(CreateTemplateRequest) returns (CreateTemplateResponse);
  rpc GetTemplate(GetTemplateRequest) returns (GetTemplateResponse);
  rpc UpdateTemplate(UpdateTemplateRequest) returns (UpdateTemplateResponse);
  rpc DeleteTemplate(DeleteTemplateRequest) returns (DeleteTemplateResponse);
}

message SendNotificationRequest {
  string channel_id = 1;
  optional string template_id = 2;
  map<string, string> template_variables = 3;
  string recipient = 4;
  optional string subject = 5;
  optional string body = 6;
}

message SendNotificationResponse {
  string notification_id = 1;
  string status = 2;
  // Deprecated: created_at_ts を使用すること。
  string created_at = 3;
  // created_at_ts は created_at の Timestamp 型。
  k1s0.system.common.v1.Timestamp created_at_ts = 4;
}

message GetNotificationRequest {
  string notification_id = 1;
}

message GetNotificationResponse {
  NotificationLog notification = 1;
}

message RetryNotificationRequest {
  string notification_id = 1;
}

message RetryNotificationResponse {
  NotificationLog notification = 1;
}

message ListNotificationsRequest {
  optional string channel_id = 1;
  optional string status = 2;
  // ページネーションパラメータを共通型に統一
  k1s0.system.common.v1.Pagination pagination = 3;
  // フィールド番号 4 は旧 page_size（Pagination に統一済み）
  reserved 4;
  reserved "page_size";
}

message ListNotificationsResponse {
  repeated NotificationLog notifications = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

message NotificationLog {
  string id = 1;
  string channel_id = 2;
  string channel_type = 3;
  optional string template_id = 4;
  string recipient = 5;
  optional string subject = 6;
  string body = 7;
  // Deprecated: use status_enum instead.
  string status = 8;
  uint32 retry_count = 9;
  optional string error_message = 10;
  // Deprecated: sent_at_ts を使用すること。
  optional string sent_at = 11;
  // Deprecated: created_at_ts を使用すること。
  string created_at = 12;
  // 通知ステータスの enum 版（status の型付き版）。
  NotificationStatus status_enum = 13;
  // sent_at_ts は sent_at の Timestamp 型。
  optional k1s0.system.common.v1.Timestamp sent_at_ts = 14;
  // created_at_ts は created_at の Timestamp 型。
  k1s0.system.common.v1.Timestamp created_at_ts = 15;
}

message Channel {
  string id = 1;
  string name = 2;
  string channel_type = 3;
  string config_json = 4;
  bool enabled = 5;
  // Deprecated: created_at_ts を使用すること。
  string created_at = 6;
  // Deprecated: updated_at_ts を使用すること。
  string updated_at = 7;
  // created_at_ts は created_at の Timestamp 型。
  k1s0.system.common.v1.Timestamp created_at_ts = 8;
  // updated_at_ts は updated_at の Timestamp 型。
  k1s0.system.common.v1.Timestamp updated_at_ts = 9;
}

message ListChannelsRequest {
  optional string channel_type = 1;
  bool enabled_only = 2;
  // ページネーションパラメータを共通型に統一
  k1s0.system.common.v1.Pagination pagination = 3;
  // フィールド番号 4 は旧 page_size（Pagination に統一済み）
  reserved 4;
  reserved "page_size";
}

message ListChannelsResponse {
  repeated Channel channels = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

message CreateChannelRequest {
  string name = 1;
  string channel_type = 2;
  string config_json = 3;
  bool enabled = 4;
}

message CreateChannelResponse {
  Channel channel = 1;
}

message GetChannelRequest {
  string id = 1;
}

message GetChannelResponse {
  Channel channel = 1;
}

message UpdateChannelRequest {
  string id = 1;
  optional string name = 2;
  optional bool enabled = 3;
  optional string config_json = 4;
}

message UpdateChannelResponse {
  Channel channel = 1;
}

message DeleteChannelRequest {
  string id = 1;
}

message DeleteChannelResponse {
  bool success = 1;
  string message = 2;
}

message Template {
  string id = 1;
  string name = 2;
  string channel_type = 3;
  optional string subject_template = 4;
  string body_template = 5;
  // Deprecated: created_at_ts を使用すること。
  string created_at = 6;
  // Deprecated: updated_at_ts を使用すること。
  string updated_at = 7;
  // created_at_ts は created_at の Timestamp 型。
  k1s0.system.common.v1.Timestamp created_at_ts = 8;
  // updated_at_ts は updated_at の Timestamp 型。
  k1s0.system.common.v1.Timestamp updated_at_ts = 9;
}

message ListTemplatesRequest {
  optional string channel_type = 1;
  // ページネーションパラメータを共通型に統一
  k1s0.system.common.v1.Pagination pagination = 2;
  // フィールド番号 3 は旧 page_size（Pagination に統一済み）
  reserved 3;
  reserved "page_size";
}

message ListTemplatesResponse {
  repeated Template templates = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

message CreateTemplateRequest {
  string name = 1;
  string channel_type = 2;
  optional string subject_template = 3;
  string body_template = 4;
}

message CreateTemplateResponse {
  Template template = 1;
}

message GetTemplateRequest {
  string id = 1;
}

message GetTemplateResponse {
  Template template = 1;
}

message UpdateTemplateRequest {
  string id = 1;
  optional string name = 2;
  optional string subject_template = 3;
  optional string body_template = 4;
}

message UpdateTemplateResponse {
  Template template = 1;
}

message DeleteTemplateRequest {
  string id = 1;
}

message DeleteTemplateResponse {
  bool success = 1;
  string message = 2;
}
