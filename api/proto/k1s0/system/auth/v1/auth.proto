// k1s0 認証サービス gRPC 定義。
// JWT トークン検証・ユーザー情報管理・パーミッション確認・監査ログを提供する。
syntax = "proto3";

package k1s0.system.auth.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/system/auth/v1;authv1";

// ==========================================================================
// deprecated フィールド削除タイムライン（HIGH-CODE-03 監査対応）
// [deprecated = true] アノテーションが付与されたフィールドは enum 型フィールドへの移行期間中。
// 全コンシューマーが enum フィールドに移行完了後に削除する。
// 移行状況は docs/architecture/adr/0018-messaging-abstraction-unification.md で追跡。
// ==========================================================================

import "k1s0/system/common/v1/types.proto";
import "google/protobuf/struct.proto";
// H-15 監査対応（ADR-0022 Phase 1）: buf validate によるメッセージレベルバリデーション
import "buf/validate/validate.proto";

// AuthService は JWT トークン検証・ユーザー情報管理・パーミッション確認を提供する。
service AuthService {
  // JWT トークン検証
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // ユーザー情報取得
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  // ユーザー一覧取得
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // ユーザーロール取得
  rpc GetUserRoles(GetUserRolesRequest) returns (GetUserRolesResponse);

  // パーミッション確認
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
}

// AuditService は監査ログの記録・検索を提供する。
service AuditService {
  // 監査ログ記録
  rpc RecordAuditLog(RecordAuditLogRequest) returns (RecordAuditLogResponse);

  // 監査ログ検索
  rpc SearchAuditLogs(SearchAuditLogsRequest) returns (SearchAuditLogsResponse);
}

// ============================================================
// Token Validation
// ============================================================

// ValidateTokenRequest はトークン検証リクエスト。
message ValidateTokenRequest {
  // JWT Bearer トークン文字列（必須）
  string token = 1 [(buf.validate.field).string.min_len = 1];
}

// ValidateTokenResponse はトークン検証レスポンス。
message ValidateTokenResponse {
  bool valid = 1;
  TokenClaims claims = 2;
  // valid == false の場合のエラー理由
  string error_message = 3;
}

// TokenClaims は JWT トークンのクレーム情報。
message TokenClaims {
  // ユーザー UUID
  string sub = 1;
  // Issuer
  string iss = 2;
  // Audience（JWT spec では配列型。複数 audience に対応するため repeated を使用する）
  repeated string aud = 3;
  // 有効期限（Unix epoch）
  int64 exp = 4;
  // 発行日時（Unix epoch）
  int64 iat = 5;
  // Token ID
  string jti = 6;
  // ユーザー名
  string preferred_username = 7;
  // メールアドレス
  string email = 8;
  // グローバルロール
  RealmAccess realm_access = 9;
  // サービス固有ロール
  map<string, ClientRoles> resource_access = 10;
  // アクセス可能 Tier
  repeated string tier_access = 11;
  // OAuth2 scope（スペース区切り）
  string scope = 12;
  // トークン種別（例: Bearer）
  optional string typ = 13;
  // 認可されたクライアント ID
  optional string azp = 14;
}

// RealmAccess はグローバルロール一覧。
message RealmAccess {
  repeated string roles = 1;
}

// ClientRoles はクライアント固有ロール一覧。
message ClientRoles {
  repeated string roles = 1;
}

// ============================================================
// User
// ============================================================

// GetUserRequest はユーザー情報取得リクエスト。
message GetUserRequest {
  // ユーザー UUID（必須）
  string user_id = 1 [(buf.validate.field).string.uuid = true];
}

// GetUserResponse はユーザー情報取得レスポンス。
message GetUserResponse {
  User user = 1;
}

// ListUsersRequest はユーザー一覧取得リクエスト。
message ListUsersRequest {
  k1s0.system.common.v1.Pagination pagination = 1;
  // ユーザー名・メールで部分一致検索
  string search = 2;
  // 有効/無効フィルタ
  optional bool enabled = 3;
}

// ListUsersResponse はユーザー一覧取得レスポンス。
message ListUsersResponse {
  repeated User users = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

// User はユーザー情報。
message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  bool enabled = 6;
  bool email_verified = 7;
  k1s0.system.common.v1.Timestamp created_at = 8;
  // カスタム属性（部署, 社員番号等）
  map<string, StringList> attributes = 9;
}

// StringList は文字列のリスト（map の値型として使用）。
message StringList {
  repeated string values = 1;
}

// ============================================================
// Roles
// ============================================================

// GetUserRolesRequest はユーザーロール取得リクエスト。
message GetUserRolesRequest {
  // ユーザー UUID（必須）
  string user_id = 1 [(buf.validate.field).string.uuid = true];
}

// GetUserRolesResponse はユーザーロール取得レスポンス。
message GetUserRolesResponse {
  string user_id = 1;
  // グローバルロール一覧
  repeated Role realm_roles = 2;
  // クライアント別ロール
  map<string, RoleList> client_roles = 3;
}

// Role はロール情報。
message Role {
  string id = 1;
  string name = 2;
  string description = 3;
}

// RoleList はロールのリスト（map の値型として使用）。
message RoleList {
  repeated Role roles = 1;
}

// ============================================================
// Permission Check
// ============================================================

// CheckPermissionRequest はパーミッション確認リクエスト。
message CheckPermissionRequest {
  // ユーザー UUID（省略可、JWT から自動取得する場合）
  optional string user_id = 1 [(buf.validate.field).string.uuid = true];
  // 権限種別: read, write, delete, admin（必須）
  string permission = 2 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
  // リソース名: users, auth_config, audit_logs 等（必須）
  string resource = 3 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  // JWT Claims から取得したロール一覧
  repeated string roles = 4;
}

// CheckPermissionResponse はパーミッション確認レスポンス。
message CheckPermissionResponse {
  bool allowed = 1;
  // 拒否理由（allowed == false の場合）
  string reason = 2;
}

// ============================================================
// Audit Log
// ============================================================

// AuditEventType は監査イベントの種別。
// C-004 監査対応: GraphQL スキーマの AuditEventType と双方向整合させる。
// GraphQL に存在するが proto に欠落していた CREATE/UPDATE/DELETE/READ/PERMISSION_DENIED/SECRET_ACCESSED/SECRET_ROTATED を追加する。
enum AuditEventType {
  AUDIT_EVENT_TYPE_UNSPECIFIED = 0;
  AUDIT_EVENT_TYPE_LOGIN = 1;
  AUDIT_EVENT_TYPE_LOGOUT = 2;
  AUDIT_EVENT_TYPE_TOKEN_REFRESH = 3;
  AUDIT_EVENT_TYPE_PERMISSION_CHECK = 4;
  AUDIT_EVENT_TYPE_API_KEY_CREATED = 5;
  AUDIT_EVENT_TYPE_API_KEY_REVOKED = 6;
  // C-004 監査対応: GraphQL スキーマに存在する汎用 CRUD 操作イベント種別を追加
  AUDIT_EVENT_TYPE_CREATE = 7;
  AUDIT_EVENT_TYPE_UPDATE = 8;
  AUDIT_EVENT_TYPE_DELETE = 9;
  AUDIT_EVENT_TYPE_READ = 10;
  // C-004 監査対応: GraphQL スキーマに存在するセキュリティイベント種別を追加
  AUDIT_EVENT_TYPE_PERMISSION_DENIED = 11;
  AUDIT_EVENT_TYPE_SECRET_ACCESSED = 12;
  AUDIT_EVENT_TYPE_SECRET_ROTATED = 13;
}

// AuditResult は監査イベントの結果。
// C-010 監査対応: GraphQL スキーマの AuditResult.PARTIAL に対応する AUDIT_RESULT_PARTIAL を追加する。
enum AuditResult {
  AUDIT_RESULT_UNSPECIFIED = 0;
  AUDIT_RESULT_SUCCESS = 1;
  AUDIT_RESULT_FAILURE = 2;
  // C-010 監査対応: GraphQL の PARTIAL に対応（部分成功を表す）
  AUDIT_RESULT_PARTIAL = 3;
}

// RecordAuditLogRequest は監査ログ記録リクエスト。
// HIGH-014 監査対応: deprecated string フィールド削除・reserved 有効化（全クライアントが enum 移行済み）
message RecordAuditLogRequest {
  // フィールド番号 1(event_type), 7(result) は削除済み。ワイヤフォーマット互換性のため reserved で保護する。
  reserved 1, 7;
  reserved "event_type", "result";

  string user_id = 2;
  string ip_address = 3;
  string user_agent = 4;
  // アクセス対象リソース
  string resource = 5;
  // HTTP メソッドまたは gRPC メソッド名
  string action = 6;
  // 操作の詳細情報（client_id, grant_type 等）
  google.protobuf.Struct detail = 8;
  // 操作対象リソースの ID
  string resource_id = 9;
  // OpenTelemetry トレース ID
  string trace_id = 10;
  // 監査イベント種別（enum）
  AuditEventType event_type_enum = 11;
  // 監査イベント結果（enum）
  AuditResult result_enum = 12;
}

// RecordAuditLogResponse は監査ログ記録レスポンス。
message RecordAuditLogResponse {
  // 監査ログ UUID
  string id = 1;
  k1s0.system.common.v1.Timestamp created_at = 2;
}

// SearchAuditLogsRequest は監査ログ検索リクエスト。
// HIGH-014 監査対応: deprecated string フィールド削除・reserved 有効化（全クライアントが enum 移行済み）
message SearchAuditLogsRequest {
  // フィールド番号 3(event_type), 6(result) は削除済み。ワイヤフォーマット互換性のため reserved で保護する。
  reserved 3, 6;
  reserved "event_type", "result";

  k1s0.system.common.v1.Pagination pagination = 1;
  string user_id = 2;
  k1s0.system.common.v1.Timestamp from = 4;
  k1s0.system.common.v1.Timestamp to = 5;
  // 監査イベント種別フィルタ（enum）
  AuditEventType event_type_enum = 7;
  // 監査イベント結果フィルタ（enum）
  AuditResult result_enum = 8;
}

// SearchAuditLogsResponse は監査ログ検索レスポンス。
message SearchAuditLogsResponse {
  repeated AuditLog logs = 1;
  k1s0.system.common.v1.PaginationResult pagination = 2;
}

// AuditLog は監査ログエントリ。
// HIGH-014 監査対応: deprecated string フィールド削除・reserved 有効化（全クライアントが enum 移行済み）
message AuditLog {
  // フィールド番号 2(event_type), 8(result) は削除済み。ワイヤフォーマット互換性のため reserved で保護する。
  reserved 2, 8;
  reserved "event_type", "result";

  string id = 1;
  string user_id = 3;
  string ip_address = 4;
  string user_agent = 5;
  string resource = 6;
  string action = 7;
  // 操作の詳細情報（変更前後の値等）
  google.protobuf.Struct detail = 9;
  k1s0.system.common.v1.Timestamp created_at = 10;
  // 操作対象リソースの ID
  string resource_id = 11;
  // OpenTelemetry トレース ID
  string trace_id = 12;
  // 監査イベント種別（enum）
  AuditEventType event_type_enum = 13;
  // 監査イベント結果（enum）
  AuditResult result_enum = 14;
}
