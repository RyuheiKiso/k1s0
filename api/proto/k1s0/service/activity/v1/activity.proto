// k1s0 アクティビティサービス gRPC 定義。
// タスクに対するコメント・作業時間・ステータス変更等の操作履歴管理（作成・取得・一覧・承認・却下・提出）を提供する。
// Timestamp 型を k1s0.system.common.v1.Timestamp に統一。
syntax = "proto3";

package k1s0.service.activity.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/service/activity/v1;activityv1";

import "google/protobuf/struct.proto";
import "k1s0/system/common/v1/types.proto";

service ActivityService {
  // アクティビティ作成（冪等: idempotency_key 指定で重複防止）
  rpc CreateActivity(CreateActivityRequest) returns (CreateActivityResponse);
  // アクティビティ取得
  rpc GetActivity(GetActivityRequest) returns (GetActivityResponse);
  // アクティビティ一覧
  rpc ListActivities(ListActivitiesRequest) returns (ListActivitiesResponse);
  // アクティビティ提出（承認待ち状態へ遷移）
  rpc SubmitActivity(SubmitActivityRequest) returns (SubmitActivityResponse);
  // アクティビティ承認（time_entry の承認フロー）
  rpc ApproveActivity(ApproveActivityRequest) returns (ApproveActivityResponse);
  // アクティビティ却下
  rpc RejectActivity(RejectActivityRequest) returns (RejectActivityResponse);
}

// ---------- Enum ----------

// ActivityStatus はアクティビティのステータス。
enum ActivityStatus {
  ACTIVITY_STATUS_UNSPECIFIED = 0;
  ACTIVITY_STATUS_ACTIVE = 1;
  ACTIVITY_STATUS_SUBMITTED = 2;
  ACTIVITY_STATUS_APPROVED = 3;
  ACTIVITY_STATUS_REJECTED = 4;
}

// ActivityType はアクティビティの種別。
enum ActivityType {
  ACTIVITY_TYPE_UNSPECIFIED = 0;
  ACTIVITY_TYPE_COMMENT = 1;
  ACTIVITY_TYPE_TIME_ENTRY = 2;
  ACTIVITY_TYPE_STATUS_CHANGE = 3;
  ACTIVITY_TYPE_ASSIGNMENT = 4;
}

// ---------- メッセージ型 ----------

// アクティビティ（タスクに対する操作履歴）
message Activity {
  string id = 1;
  string task_id = 2;
  string actor_id = 3;
  ActivityType activity_type = 4;
  optional string content = 5;
  optional int32 duration_minutes = 6;
  ActivityStatus status = 7;
  optional google.protobuf.Struct metadata = 8;
  optional string idempotency_key = 9;
  int32 version = 10;
  k1s0.system.common.v1.Timestamp created_at = 11;
  k1s0.system.common.v1.Timestamp updated_at = 12;
}

// ---------- リクエスト/レスポンス ----------

message CreateActivityRequest {
  string task_id = 1;
  ActivityType activity_type = 2;
  optional string content = 3;
  optional int32 duration_minutes = 4;
  optional google.protobuf.Struct metadata = 5;
  optional string idempotency_key = 6;
}

message CreateActivityResponse {
  Activity activity = 1;
}

message GetActivityRequest {
  string activity_id = 1;
}

message GetActivityResponse {
  Activity activity = 1;
}

message ListActivitiesRequest {
  optional string task_id = 1;
  optional string actor_id = 2;
  optional ActivityType activity_type = 3;
  // Deprecated: status_enum を使用すること。
  optional string status = 4 [deprecated = true];
  k1s0.system.common.v1.Pagination pagination = 5;
  // アクティビティステータスフィルタ（enum）
  optional ActivityStatus status_enum = 6;
}

message ListActivitiesResponse {
  repeated Activity activities = 1;
  // total_count は PaginationResult.total_count に統一（重複削除）
  reserved 2;
  reserved "total_count";
  k1s0.system.common.v1.PaginationResult pagination = 3;
}

message SubmitActivityRequest {
  string activity_id = 1;
}

message SubmitActivityResponse {
  Activity activity = 1;
}

message ApproveActivityRequest {
  string activity_id = 1;
}

message ApproveActivityResponse {
  Activity activity = 1;
}

message RejectActivityRequest {
  string activity_id = 1;
  string reason = 2;
}

message RejectActivityResponse {
  Activity activity = 1;
}
