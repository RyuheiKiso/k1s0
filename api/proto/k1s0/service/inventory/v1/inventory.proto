// k1s0 在庫サービス gRPC 定義。
// 在庫の予約・解放・取得・一覧・更新を提供する。
syntax = "proto3";

package k1s0.service.inventory.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/service/inventory/v1;inventoryv1";

import "google/protobuf/timestamp.proto";
import "k1s0/system/common/v1/types.proto";

service InventoryService {
  // 在庫予約
  rpc ReserveStock(ReserveStockRequest) returns (ReserveStockResponse);
  // 在庫解放
  rpc ReleaseStock(ReleaseStockRequest) returns (ReleaseStockResponse);
  // 在庫取得
  rpc GetInventory(GetInventoryRequest) returns (GetInventoryResponse);
  // 在庫一覧
  rpc ListInventory(ListInventoryRequest) returns (ListInventoryResponse);
  // 在庫更新
  rpc UpdateStock(UpdateStockRequest) returns (UpdateStockResponse);
}

// ---------- メッセージ型 ----------

// 在庫アイテム
message InventoryItem {
  string id = 1;
  string product_id = 2;
  string warehouse_id = 3;
  int32 qty_available = 4;
  int32 qty_reserved = 5;
  int32 version = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

// ---------- リクエスト/レスポンス ----------

message ReserveStockRequest {
  string order_id = 1;
  string product_id = 2;
  string warehouse_id = 3;
  int32 quantity = 4;
}

message ReserveStockResponse {
  InventoryItem item = 1;
}

message ReleaseStockRequest {
  string order_id = 1;
  string product_id = 2;
  string warehouse_id = 3;
  int32 quantity = 4;
  string reason = 5;
}

message ReleaseStockResponse {
  InventoryItem item = 1;
}

message GetInventoryRequest {
  string inventory_id = 1;
}

message GetInventoryResponse {
  InventoryItem item = 1;
}

message ListInventoryRequest {
  optional string product_id = 1;
  optional string warehouse_id = 2;
  k1s0.system.common.v1.Pagination pagination = 3;
}

message ListInventoryResponse {
  repeated InventoryItem items = 1;
  int64 total_count = 2;
  k1s0.system.common.v1.PaginationResult pagination = 3;
}

message UpdateStockRequest {
  string inventory_id = 1;
  int32 qty_available = 2;
  int32 expected_version = 3;
}

message UpdateStockResponse {
  InventoryItem item = 1;
}
