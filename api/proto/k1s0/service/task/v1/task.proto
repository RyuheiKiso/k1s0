// k1s0 タスクサービス gRPC 定義。
// タスクの作成・取得・一覧・ステータス更新を提供する。
// Timestamp 型を k1s0.system.common.v1.Timestamp に統一。
syntax = "proto3";

package k1s0.service.task.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/service/task/v1;taskv1";

import "k1s0/system/common/v1/types.proto";
// H-15 監査対応（ADR-0022 Phase 1）: buf validate によるメッセージレベルバリデーション
import "buf/validate/validate.proto";

service TaskService {
  // タスク作成
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  // タスク取得
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  // タスク一覧
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  // タスクステータス更新
  rpc UpdateTaskStatus(UpdateTaskStatusRequest) returns (UpdateTaskStatusResponse);
}

// ---------- Enum ----------

// TaskStatus はタスクのステータス。
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_OPEN = 1;
  TASK_STATUS_IN_PROGRESS = 2;
  TASK_STATUS_REVIEW = 3;
  TASK_STATUS_DONE = 4;
  TASK_STATUS_CANCELLED = 5;
}

// TaskPriority はタスクの優先度。
enum TaskPriority {
  TASK_PRIORITY_UNSPECIFIED = 0;
  TASK_PRIORITY_LOW = 1;
  TASK_PRIORITY_MEDIUM = 2;
  TASK_PRIORITY_HIGH = 3;
  TASK_PRIORITY_CRITICAL = 4;
}

// ---------- メッセージ型 ----------

// タスク
message Task {
  string id = 1;
  string project_id = 2;
  string title = 3;
  optional string description = 4;
  TaskStatus status = 5;
  TaskPriority priority = 6;
  optional string assignee_id = 7;
  string reporter_id = 8;
  optional k1s0.system.common.v1.Timestamp due_date = 9;
  repeated string labels = 10;
  string created_by = 11;
  optional string updated_by = 12;
  int32 version = 13;
  repeated TaskChecklistItem checklist = 14;
  k1s0.system.common.v1.Timestamp created_at = 15;
  k1s0.system.common.v1.Timestamp updated_at = 16;
}

// タスクチェックリスト項目
message TaskChecklistItem {
  string id = 1;
  string task_id = 2;
  string title = 3;
  bool is_completed = 4;
  int32 sort_order = 5;
  k1s0.system.common.v1.Timestamp created_at = 6;
}

// ---------- リクエスト/レスポンス ----------

message CreateTaskRequest {
  // プロジェクト UUID（必須）
  string project_id = 1 [(buf.validate.field).string.uuid = true];
  // タスクタイトル（必須、1〜255文字）
  string title = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  // タスク詳細（省略可、最大4000文字）
  optional string description = 3 [(buf.validate.field).string.max_len = 4000];
  optional TaskPriority priority = 4;
  // 担当者 UUID（省略可）
  optional string assignee_id = 5 [(buf.validate.field).string.uuid = true];
  optional k1s0.system.common.v1.Timestamp due_date = 6;
  repeated string labels = 7;
  repeated CreateChecklistItemRequest checklist = 8;
}

message CreateChecklistItemRequest {
  // チェックリスト項目タイトル（必須、1〜255文字）
  string title = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  optional int32 sort_order = 2;
}

message CreateTaskResponse {
  Task task = 1;
}

message GetTaskRequest {
  // タスク UUID（必須）
  string task_id = 1 [(buf.validate.field).string.uuid = true];
}

message GetTaskResponse {
  Task task = 1;
}

message ListTasksRequest {
  optional string project_id = 1;
  optional string assignee_id = 2;
  optional TaskStatus status = 3;
  optional TaskPriority priority = 4;
  k1s0.system.common.v1.Pagination pagination = 5;
}

message ListTasksResponse {
  repeated Task tasks = 1;
  // total_count は PaginationResult.total_count に統一（重複削除）
  reserved 2;
  reserved "total_count";
  k1s0.system.common.v1.PaginationResult pagination = 3;
}

// UpdateTaskStatusRequest はタスクステータス更新リクエスト。
// expected_version により楽観的ロックを実現し、同時更新による競合を検出する。
message UpdateTaskStatusRequest {
  // タスク UUID（必須）
  string task_id = 1 [(buf.validate.field).string.uuid = true];
  // 更新後ステータス（UNSPECIFIED 不可）
  TaskStatus status = 2 [(buf.validate.field).enum.defined_only = true];
  // 楽観的ロックのバージョン番号。クライアントが保持しているバージョンと一致しない場合はエラーを返す。
  int32 expected_version = 3 [(buf.validate.field).int32.gte = 0];
}

message UpdateTaskStatusResponse {
  Task task = 1;
}
