// k1s0 ボードサービス gRPC 定義。
// Kanbanボードのカラム管理（WIP制限・タスクカウント増減・取得・一覧・更新）を提供する。
// Timestamp 型を k1s0.system.common.v1.Timestamp に統一。
syntax = "proto3";

package k1s0.service.board.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/service/board/v1;boardv1";

import "k1s0/system/common/v1/types.proto";

service BoardService {
  // タスク追加によるカラムカウント増加（在庫予約に相当）
  rpc IncrementColumn(IncrementColumnRequest) returns (IncrementColumnResponse);
  // タスク移動/完了によるカラムカウント減少（在庫解放に相当）
  rpc DecrementColumn(DecrementColumnRequest) returns (DecrementColumnResponse);
  // ボードカラム取得
  rpc GetBoardColumn(GetBoardColumnRequest) returns (GetBoardColumnResponse);
  // ボードカラム一覧
  rpc ListBoardColumns(ListBoardColumnsRequest) returns (ListBoardColumnsResponse);
  // WIP制限更新
  rpc UpdateWipLimit(UpdateWipLimitRequest) returns (UpdateWipLimitResponse);
}

// ---------- メッセージ型 ----------

// ボードカラム（プロジェクト × ステータスコードのカラム管理）
message BoardColumn {
  string id = 1;
  string project_id = 2;
  string status_code = 3;
  int32 wip_limit = 4;
  int32 task_count = 5;
  int32 version = 6;
  k1s0.system.common.v1.Timestamp created_at = 7;
  k1s0.system.common.v1.Timestamp updated_at = 8;
}

// ---------- リクエスト/レスポンス ----------

message IncrementColumnRequest {
  string task_id = 1;
  string project_id = 2;
  string status_code = 3;
}

message IncrementColumnResponse {
  BoardColumn column = 1;
}

message DecrementColumnRequest {
  string task_id = 1;
  string project_id = 2;
  string status_code = 3;
  string reason = 4;
}

message DecrementColumnResponse {
  BoardColumn column = 1;
}

message GetBoardColumnRequest {
  string column_id = 1;
}

message GetBoardColumnResponse {
  BoardColumn column = 1;
}

message ListBoardColumnsRequest {
  optional string project_id = 1;
  optional string status_code = 2;
  k1s0.system.common.v1.Pagination pagination = 3;
}

message ListBoardColumnsResponse {
  repeated BoardColumn columns = 1;
  // total_count は PaginationResult.total_count に統一（重複削除）
  reserved 2;
  reserved "total_count";
  k1s0.system.common.v1.PaginationResult pagination = 3;
}

message UpdateWipLimitRequest {
  string column_id = 1;
  int32 wip_limit = 2;
  int32 expected_version = 3;
}

message UpdateWipLimitResponse {
  BoardColumn column = 1;
}
