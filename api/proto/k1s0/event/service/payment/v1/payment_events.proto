// k1s0 決済イベント定義。
// Timestamp 型を k1s0.system.common.v1.Timestamp に統一（google.protobuf.Timestamp から移行）。
syntax = "proto3";
package k1s0.event.service.payment.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/event/service/payment/v1;paymenteventv1";

import "k1s0/system/common/v1/types.proto";
import "k1s0/system/common/v1/event_metadata.proto";

message PaymentInitiatedEvent {
  k1s0.system.common.v1.EventMetadata metadata = 1;
  string payment_id = 2;
  string order_id = 3;
  string customer_id = 4;
  int64 amount = 5;            // 最小通貨単位（円）
  string currency = 6;
  string payment_method = 7;
  k1s0.system.common.v1.Timestamp initiated_at = 8;
}

message PaymentCompletedEvent {
  k1s0.system.common.v1.EventMetadata metadata = 1;
  string payment_id = 2;
  string order_id = 3;
  int64 amount = 4;
  string currency = 5;
  string transaction_id = 6;
  k1s0.system.common.v1.Timestamp completed_at = 7;
}

message PaymentFailedEvent {
  k1s0.system.common.v1.EventMetadata metadata = 1;
  string payment_id = 2;
  string order_id = 3;
  string reason = 4;
  string error_code = 5;
  k1s0.system.common.v1.Timestamp failed_at = 6;
}

message PaymentRefundedEvent {
  k1s0.system.common.v1.EventMetadata metadata = 1;
  string payment_id = 2;
  string order_id = 3;
  int64 refund_amount = 4;
  string currency = 5;
  string reason = 6;
  k1s0.system.common.v1.Timestamp refunded_at = 7;
}
