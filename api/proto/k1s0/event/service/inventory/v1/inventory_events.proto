// k1s0 在庫イベント定義。
// Timestamp 型を k1s0.system.common.v1.Timestamp に統一（google.protobuf.Timestamp から移行）。
syntax = "proto3";
package k1s0.event.service.inventory.v1;

option go_package = "github.com/k1s0-platform/api/gen/go/k1s0/event/service/inventory/v1;inventoryeventv1";

import "k1s0/system/common/v1/types.proto";
import "k1s0/system/common/v1/event_metadata.proto";

message InventoryReservedEvent {
  k1s0.system.common.v1.EventMetadata metadata = 1;
  string order_id = 2;
  string product_id = 3;
  int32 quantity = 4;
  string warehouse_id = 5;
  k1s0.system.common.v1.Timestamp reserved_at = 6;
}

message InventoryReleasedEvent {
  k1s0.system.common.v1.EventMetadata metadata = 1;
  string order_id = 2;
  string product_id = 3;
  int32 quantity = 4;
  string warehouse_id = 5;
  string reason = 6;
  k1s0.system.common.v1.Timestamp released_at = 7;
}
