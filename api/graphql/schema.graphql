# =============================================================================
# MED-014 監査対応: 手動管理参照スキーマ（自動生成ではない）
#
# このファイルは api/graphql/schema.graphql が参照用スキーマ。
# 実装は async-graphql のコードファーストアプローチで graphql_handler.rs に定義されている。
#
# 【重要】このファイルは手動管理であり、実装コードから自動生成されない。
# 実装を変更した場合は必ずこのファイルを手動で同期すること。
#
# 更新手順:
#   1. graphql-gateway の graphql_handler.rs を変更する
#   2. このファイルを同じ内容に合わせて手動更新する
#   3. TODO: 将来的に CI で `cargo run --bin schema-gen > api/graphql/schema.graphql`
#            を実行して差分があれば CI 失敗とする自動化を検討する（MED-014）
#
# 最終更新: 2026-03-27（外部監査 C-9 対応: AuditEventType/AuditResult enum 追加・M-3 対応: navigation bearerToken 引数除去）
# L-15 監査対応: DateTime スカラー型を追加。RFC 3339 形式（例: "2026-03-27T12:00:00Z"）で表現する。
# createdAt / updatedAt 等の日時フィールドは String! ではなく DateTime! を使用すること。
# =============================================================================

# L-15 監査対応: DateTime カスタムスカラー定義。
# ISO 8601 / RFC 3339 形式の日時文字列（例: "2026-03-27T12:34:56Z"）を表す。
# async-graphql の実装側では chrono::DateTime<Utc> にマッピングされる。
scalar DateTime

type Query {
  # --- Tenant ---
  tenant(id: ID!): Tenant
  # first: ページあたりの最大件数（デフォルト: 50, 最大: 100）
  tenants(first: Int, after: String): TenantConnection!

  # --- FeatureFlag ---
  featureFlag(key: String!): FeatureFlag
  featureFlags(environment: String): [FeatureFlag!]!

  # --- Config ---
  config(key: String!): ConfigEntry

  # --- Navigation ---
  """
  ナビゲーション情報を返す。
  M-3 監査対応: bearerToken 引数を除去。認証はHTTPヘッダー（Authorization: Bearer ...）で行うこと。
  クエリ引数にトークンを含めるとアクセスログ・サーバーログに記録される危険性がある。
  """
  navigation: Navigation!

  # --- ServiceCatalog ---
  catalogService(id: ID!): CatalogService
  # first: ページあたりの最大件数（デフォルト: 50, 最大: 100）
  catalogServices(first: Int, tier: String, status: String, search: String): CatalogServiceConnection!
  serviceHealth(serviceId: String): [ServiceHealth!]!

  # --- Auth ---
  user(userId: ID!): User
  # first: ページあたりの最大件数（デフォルト: 50, 最大: 100）
  users(first: Int, after: Int, search: String, enabled: Boolean): [User!]!
  userRoles(userId: ID!): [Role!]!
  checkPermission(permission: String!, resource: String!, roles: [String!]!, userId: String): PermissionCheck!
  # L-2 監査対応: eventType/result 引数は C-9 対応で追加された AuditEventType/AuditResult enum への移行を推奨する。
  # 新規クライアントは eventTypeEnum/resultEnum フィールドを使用すること（searchAuditLogs は引数変更予定）。
  # 現在は後方互換性のため文字列引数を維持するが、将来のメジャーバージョンで enum 型引数に変更される予定。
  # first: ページあたりの最大件数（デフォルト: 50, 最大: 100）
  searchAuditLogs(first: Int, after: Int, userId: String, eventType: String, result: String): AuditLogConnection!

  # --- Session ---
  session(sessionId: ID!): Session
  userSessions(userId: ID!): [Session!]!

  # --- Vault ---
  secretMetadata(path: String!): SecretMetadata
  secrets(prefix: String): [String!]!
  # limit: ページあたりの最大件数（デフォルト: 50, 最大: 100）
  vaultAuditLogs(offset: Int, limit: Int): [VaultAuditLogEntry!]!

  # --- Scheduler ---
  job(jobId: ID!): Job
  jobs(status: String, first: Int, after: Int): [Job!]!
  jobExecution(executionId: ID!): JobExecution
  jobExecutions(jobId: ID!, first: Int, after: Int, status: String): [JobExecution!]!

  # --- Notification ---
  notification(notificationId: ID!): NotificationLog
  notifications(channelId: String, status: String, page: Int, pageSize: Int): [NotificationLog!]!
  notificationChannel(id: ID!): NotificationChannel
  notificationChannels(channelType: String, enabledOnly: Boolean, page: Int, pageSize: Int): [NotificationChannel!]!
  notificationTemplate(id: ID!): NotificationTemplate
  notificationTemplates(channelType: String, page: Int, pageSize: Int): [NotificationTemplate!]!

  # --- Workflow ---
  workflow(workflowId: ID!): WorkflowDefinition
  workflows(enabledOnly: Boolean, first: Int, after: Int): [WorkflowDefinition!]!
  workflowInstance(instanceId: ID!): WorkflowInstance
  workflowInstances(status: String, workflowId: String, initiatorId: String, first: Int, after: Int): [WorkflowInstance!]!
  workflowTasks(assigneeId: String, status: String, instanceId: String, overdueOnly: Boolean, first: Int, after: Int): [WorkflowTask!]!
}

type Mutation {
  # --- Tenant ---
  createTenant(input: CreateTenantInput!): CreateTenantPayload!
  updateTenant(id: ID!, input: UpdateTenantInput!): UpdateTenantPayload!

  # --- FeatureFlag ---
  setFeatureFlag(key: String!, input: SetFeatureFlagInput!): SetFeatureFlagPayload!

  # --- ServiceCatalog ---
  registerService(input: RegisterServiceInput!): RegisterServicePayload!
  updateService(id: ID!, input: UpdateServiceInput!): UpdateServicePayload!
  deleteService(id: ID!): DeleteServicePayload!

  # --- Auth ---
  recordAuditLog(input: RecordAuditLogInput!): RecordAuditLogPayload!

  # --- Session ---
  createSession(input: CreateSessionInput!): CreateSessionPayload!
  refreshSession(input: RefreshSessionInput!): RefreshSessionPayload!
  revokeSession(sessionId: ID!): RevokeSessionPayload!
  revokeAllSessions(userId: ID!): RevokeAllSessionsPayload!

  # --- Vault ---
  setSecret(input: SetSecretInput!): SetSecretPayload!
  rotateSecret(input: RotateSecretInput!): RotateSecretPayload!
  deleteSecret(path: String!, versions: [Int!]): DeleteSecretPayload!

  # --- Scheduler ---
  createJob(input: CreateJobInput!): CreateJobPayload!
  updateJob(jobId: ID!, input: UpdateJobInput!): UpdateJobPayload!
  deleteJob(jobId: ID!): DeleteJobPayload!
  pauseJob(jobId: ID!): PauseJobPayload!
  resumeJob(jobId: ID!): ResumeJobPayload!
  triggerJob(jobId: ID!): TriggerJobPayload!

  # --- Notification ---
  sendNotification(input: SendNotificationInput!): SendNotificationPayload!
  retryNotification(notificationId: ID!): RetryNotificationPayload!
  createChannel(input: CreateChannelInput!): CreateChannelPayload!
  updateChannel(id: ID!, input: UpdateChannelInput!): UpdateChannelPayload!
  deleteChannel(id: ID!): DeleteChannelPayload!
  createTemplate(input: CreateTemplateInput!): CreateTemplatePayload!
  updateTemplate(id: ID!, input: UpdateTemplateInput!): UpdateTemplatePayload!
  deleteTemplate(id: ID!): DeleteTemplatePayload!

  # --- Workflow ---
  createWorkflow(input: CreateWorkflowInput!): CreateWorkflowPayload!
  updateWorkflow(workflowId: ID!, input: UpdateWorkflowInput!): UpdateWorkflowPayload!
  deleteWorkflow(workflowId: ID!): DeleteWorkflowPayload!
  startWorkflowInstance(input: StartInstanceInput!): StartInstancePayload!
  cancelWorkflowInstance(instanceId: ID!, reason: String): CancelInstancePayload!
  reassignTask(input: ReassignTaskInput!): ReassignTaskPayload!
  approveTask(input: TaskDecisionInput!): ApproveTaskPayload!
  rejectTask(input: TaskDecisionInput!): RejectTaskPayload!
}

type Subscription {
  # --- Config ---
  configChanged(namespaces: [String!]): ConfigEntry!

  # --- Tenant ---
  tenantUpdated(tenantId: ID!): Tenant!

  # --- FeatureFlag ---
  featureFlagChanged(key: String!): FeatureFlag!
}

# ===========================================================================
# Tenant ドメイン型
# ===========================================================================

type Tenant {
  id: ID!
  name: String!
  # M-4 監査対応: proto の display_name, plan, owner_id, settings, db_schema, keycloak_realm を追加
  displayName: String!
  status: TenantStatus!
  plan: String!
  ownerId: String!
  # テナント設定を JSON 文字列で保持する（将来的に専用型に移行予定）
  settings: String
  # テナントごとの DB スキーマ名（マルチテナント DB 分離に使用）
  dbSchema: String
  # Keycloak realm 名（認証プロバイダー連携に使用）
  keycloakRealm: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum TenantStatus {
  ACTIVE
  SUSPENDED
  DELETED
}

type TenantConnection {
  nodes: [Tenant!]!
  totalCount: Int!
  hasNext: Boolean!
}

