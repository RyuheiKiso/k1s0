enum SessionStatus {
  ACTIVE
  REVOKED
}

type Session {
  sessionId: String!
  userId: String!
  deviceId: String!
  deviceName: String
  deviceType: String
  userAgent: String
  ipAddress: String
  status: SessionStatus!
  # L-19 監査対応: 日時フィールドを String から DateTime に変更する。
  # String 型では ISO 8601 フォーマットの強制がなく、クライアント側でのパースが不安定になる。
  # DateTime スカラー型を使用することで型安全性を確保し、クライアントコードの品質を向上させる。
  expiresAt: DateTime!
  createdAt: DateTime!
  lastAccessedAt: DateTime
}

