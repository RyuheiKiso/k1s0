"""
監査ログのイベント種別（C-9 監査対応: 文字列フィールドを型安全な enum に移行）。
新規クライアントは eventType（文字列）の代わりにこの enum を使用すること。
"""
enum AuditEventType {
  LOGIN
  LOGOUT
  CREATE
  UPDATE
  DELETE
  READ
  PERMISSION_DENIED
  API_KEY_CREATED
  API_KEY_REVOKED
  SECRET_ACCESSED
  SECRET_ROTATED
}

"""
監査ログの実行結果（C-9 監査対応: 文字列フィールドを型安全な enum に移行）。
新規クライアントは result（文字列）の代わりにこの enum を使用すること。
"""
enum AuditResult {
  SUCCESS
  FAILURE
  PARTIAL
}

type AuditLog {
  id: String!
  # M-4 監査対応: proto の event_type は enum 型フィールドへ移行済みのため @deprecated を付与
  eventType: String! @deprecated(reason: "enum 型の eventTypeEnum フィールドへ移行してください（C-9 対応）")
  userId: String!
  ipAddress: String!
  userAgent: String!
  resource: String!
  action: String!
  # M-4 監査対応: proto の result は enum 型フィールドへ移行済みのため @deprecated を付与
  result: String! @deprecated(reason: "enum 型の resultEnum フィールドへ移行してください（C-9 対応）")
  resourceId: String!
  traceId: String!
  createdAt: DateTime!
  """
  C-9 監査対応: eventType の型安全な enum バージョン。
  eventType（文字列）から移行する。新規クライアントはこのフィールドを使用すること。
  """
  eventTypeEnum: AuditEventType
  """
  C-9 監査対応: result の型安全な enum バージョン。
  result（文字列）から移行する。新規クライアントはこのフィールドを使用すること。
  """
  resultEnum: AuditResult
}

type AuditLogConnection {
  logs: [AuditLog!]!
  totalCount: Int!
  hasNext: Boolean!
}

