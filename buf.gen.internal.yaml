# =============================================================================
# k1s0 buf generate configuration（internal module 専用）
#
# 設計正典:
#   docs/02_構想設計/adr/ADR-TIER1-003-language-opacity.md（tier1 内部言語不可視）
#   docs/05_実装/20_コード生成設計/10_buf_Protobuf/01_buf_Protobuf生成パイプライン.md
#     - tier1 サーバ生成先: Go = src/tier1/go/internal/proto/v1/、
#                            Rust = src/tier1/rust/crates/proto-gen/src/
#
# **重要**: internal proto は tier2/tier3 不可視。SDK 配下に出さず、tier1 配下の
# 限定的な path にのみ生成する。Go / Rust のみが対象（C# / TypeScript には出さない）。
#
# 利用:
#   buf generate --template buf.gen.internal.yaml src/contracts/internal
#   tools/codegen/buf/run.sh （内部で両 yaml を呼ぶ）
# =============================================================================
version: v2

inputs:
  - directory: src/contracts/internal

managed:
  enabled: true
  override:
    # tier1 Go module（github.com/k1s0/k1s0/src/tier1/go）の internal/proto/v1 サブパスに配置。
    # 出力先 src/tier1/go/internal/proto/v1 + paths=source_relative により、
    # 実体は src/tier1/go/internal/proto/v1/k1s0/internal/v1/*.pb.go となる。
    - file_option: go_package_prefix
      value: github.com/k1s0/k1s0/src/tier1/go/internal/proto/v1

plugins:
  # ---------------------------------------------------------------------------
  # Go: Dapr ファサード側で internal RPC stub を消費
  # 生成先（docs 正典）: src/tier1/go/internal/proto/v1/
  # ---------------------------------------------------------------------------
  - remote: buf.build/protocolbuffers/go:v1.34.2
    out: src/tier1/go/internal/proto/v1
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: src/tier1/go/internal/proto/v1
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # ---------------------------------------------------------------------------
  # Rust: tonic ベースの core 側で internal RPC server を実装
  # 生成先（docs 正典）: src/tier1/rust/crates/proto-gen/src/
  # ---------------------------------------------------------------------------
  - remote: buf.build/community/neoeinstein-prost:v0.4.0
    out: src/tier1/rust/crates/proto-gen/src
  - remote: buf.build/community/neoeinstein-tonic:v0.4.0
    out: src/tier1/rust/crates/proto-gen/src

  # **C# / TypeScript への出力は意図的に省略**（tier2/tier3 不可視原則、ADR-TIER1-003）
