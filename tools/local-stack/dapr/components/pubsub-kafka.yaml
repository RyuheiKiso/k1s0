# Dapr pub-sub: Kafka (Strimzi)
# name は docs/05_実装/00_ディレクトリ設計/50_infraレイアウト/04_Dapr_Component配置.md
# の正典 `kafka-pubsub` に揃える（旧 `k1s0-pubsub` は tier1 facade のハードコードと
# 齟齬があり Publish が "pubsub <X> is not found" で失敗していた）。
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kafka-pubsub
  namespace: default
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      value: "k1s0-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
    - name: consumerGroup
      value: "k1s0"
    - name: authType
      value: "none"
    - name: disableTls
      value: "true"
