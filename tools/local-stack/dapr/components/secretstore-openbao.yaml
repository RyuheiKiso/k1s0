# Dapr secret-store: OpenBao (dev mode)
# tier1/tier2 が認証情報・トークンを取り出す経路。本番は ExternalSecrets / vault auth method 経由。
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: k1s0-secrets
  namespace: default
spec:
  type: secretstores.hashicorp.vault
  version: v1
  metadata:
    - name: vaultAddr
      value: "http://openbao.openbao.svc.cluster.local:8200"
    - name: vaultToken
      value: "dev-root-token"
    - name: vaultKVPrefix
      value: "secret"
    - name: skipVerify
      value: "true"
