# Istio Ambient Mesh (CNI + ztunnel) IstioOperator 定義
# 設計書 / ADR: 02_構想設計/05_アーキテクチャ詳細/03_セキュリティ/ で Ambient mode を採用。
#
# 用途: `istioctl install --set profile=ambient -f <this>` の -f に渡される。
# 注意: kind: IstioOperator + apiVersion ヘッダがないと istioctl が
# "Object 'Kind' is missing" で失敗する（ADR-POL-002 P4 で実証済み）。
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
spec:
  profile: ambient
  components:
    pilot:
      k8s:
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
    ingressGateways: []
    egressGateways: []
  meshConfig:
    defaultConfig:
      proxyMetadata:
        ISTIO_META_DNS_CAPTURE: "true"
    enableTracing: true
    defaultProviders:
      tracing: []
