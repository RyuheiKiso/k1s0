# Kyverno (ADR-POL-001: Kyverno 二重オーナー)
# helm repo add kyverno https://kyverno.github.io/kyverno/
# helm install kyverno kyverno/kyverno -n kyverno --version 3.5.1 -f values.yaml
#
# 設計: chart 3.x は admissionController / backgroundController / cleanupController /
# reportsController / crds / global がトップレベル。crds.install は root level。

crds:
  install: true
  groups:
    kyverno:
      clusterpolicies: true
      policies: true
      policyexceptions: true
      updaterequests: true
    wgpolicyk8sv1alpha2:
      policyreports: true
      clusterpolicyreports: true
    reports:
      clusterephemeralreports: true
      ephemeralreports: true

admissionController:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

backgroundController:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

cleanupController:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

reportsController:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

features:
  policyExceptions:
    enabled: true
