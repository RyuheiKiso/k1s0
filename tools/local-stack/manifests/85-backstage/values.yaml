# Backstage (ADR-BS-001) ローカル開発用
# helm repo add backstage https://backstage.github.io/charts
# helm install backstage backstage/backstage -n backstage --version 2.6.3 -f values.yaml
#
# 設計: chart 2.6.x は backstage / postgresql / ingress / service / global がトップレベル。
# 内蔵 PostgreSQL (postgresql.enabled) を切り、CNPG の k1s0-postgres-rw を参照する。
# image.tag は latest を避けて固定する（dev でも mutable tag は脆弱性レビュー追跡に支障）。
#
# 注意: Backstage chart はアプリケーションの実 image を提供しない。
#       本番運用ではユーザーが自前で `npx @backstage/create-app` 由来 image を build/push し、
#       backstage.image.repository / tag を上書きする。
#       本値はローカル疎通確認用に Backstage 公式の "showcase" image を仮配置する。

backstage:
  image:
    repository: ghcr.io/backstage/backstage
    tag: "1.43.4"  # 直近の stable showcase image。実プロダクトでは差替える
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
  # ADR-POL-002 P4 finishing で発覚: backstage namespace は Kubernetes 1.31+ の
  # Pod Security Admission で `restricted:latest` profile が enforce されており、
  # 4 要件 (allowPrivilegeEscalation=false / drop ALL caps / runAsNonRoot=true /
  # seccompProfile=RuntimeDefault) を満たす必要がある。Pod / Container の両方に
  # securityContext を設定して admission を通す。
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false  # backstage は /tmp や cache に書込みあり
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  appConfig:
    app:
      title: k1s0 (local)
      baseUrl: http://localhost:30700
    organization:
      name: k1s0-local
    backend:
      baseUrl: http://localhost:30700
      listen:
        port: 7007
        host: 0.0.0.0
      cors:
        origin: http://localhost:30700
      database:
        client: pg
        connection:
          host: k1s0-postgres-rw.cnpg-system.svc.cluster.local
          port: 5432
          user: k1s0
          password: k1s0-local-dev-password
    auth:
      providers:
        guest: {}
    catalog:
      rules:
        - allow: [Component, System, API, Resource, Location, Domain, User, Group]

service:
  # ADR-POL-002 P4 で発覚: backstage chart 2.6.3 の schema 制約:
  #   - service.nodePort トップレベル → 不可
  #   - service.ports.backend: object → 不可（integer のみ）
  # NodePort 30700 は kind extraPortMappings で host:30700 → cluster:30700 として
  # 公開されるため、Service が NodePort タイプであれば自動 allocate でもアクセスできる
  # （ただし host:30700 → service の routing は targetPort 一致が必要）。
  # 現状の chart 制約上、nodePort 固定割当は ingress 経由が推奨。
  type: NodePort
  ports:
    name: http-backend
    backend: 7007

ingress:
  enabled: false

postgresql:
  enabled: false  # CNPG を再利用するため内蔵 PG は無効化

global: {}
