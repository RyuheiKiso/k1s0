# k1s0 開発用 Kafka クラスタ (Strimzi, KRaft 単一ノード)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: kafka
  labels:
    strimzi.io/cluster: k1s0-kafka
spec:
  replicas: 1
  roles: [controller, broker]
  storage:
    type: persistent-claim
    size: 5Gi
    deleteClaim: true
    # local-stack は kind の rancher.io/local-path（標準名 "standard"）を採用する。
    # 旧設定は class 未指定で両 default StorageClass が混在し PVC が Pending に詰まった
    # （k1s0-default は PLACEHOLDER_csi_provisioner で実 provisioner なし）。
    class: standard
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: k1s0-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    # Strimzi 0.51.0 が dropするため Kafka 3.9.0 → 4.1.0 に追従。サポート集合は
    # [4.1.0, 4.1.1, 4.2.0]（kubectl logs strimzi-cluster-operator で確認）。
    # metadataVersion は Kafka 4.1 系の安定版 4.1-IV0 を採用する。
    version: 4.1.0
    metadataVersion: 4.1-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
