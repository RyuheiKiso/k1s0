# Strimzi Kafka operator (ADR-DATA-002)
# helm repo add strimzi https://strimzi.io/charts/
# helm install strimzi strimzi/strimzi-kafka-operator -n kafka --version 0.51.0 -f strimzi-values.yaml

replicas: 1
resources:
  requests:
    cpu: 50m
    memory: 256Mi
watchAnyNamespace: false
watchNamespaces:
  - kafka
