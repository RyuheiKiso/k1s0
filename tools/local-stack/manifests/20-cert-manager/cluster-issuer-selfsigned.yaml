# ローカル開発用の自己署名 ClusterIssuer（k1s0-local cluster 専用）
# 本番では Let's Encrypt + DNS-01 / OIDC 経由で発行を別 ADR で管理する。
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: k1s0-selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: k1s0-ca
spec:
  ca:
    secretName: k1s0-ca-key-pair
