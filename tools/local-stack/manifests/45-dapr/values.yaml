# Dapr operator + control-plane
# helm repo add dapr https://dapr.github.io/helm-charts/
# helm install dapr dapr/dapr -n dapr-system --version 1.17.5 -f values.yaml
#
# 設計: ローカル開発では HA を切り replica=1。mTLS は Dapr 内蔵の sentry が
# trust bundle を自動発行するため SPIRE 連携無しで動作する（SPIRE 統合は別 ADR で扱う）。

global:
  ha:
    enabled: false
  mtls:
    enabled: true
    workloadCertTTL: "24h"
    allowedClockSkew: "15m"
  prometheus:
    enabled: false
  logAsJson: true

dapr_operator:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

dapr_placement:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

dapr_sentry:
  replicaCount: 1

dapr_sidecar_injector:
  replicaCount: 1

dapr_dashboard:
  enabled: true
  replicaCount: 1
