# k1s0 開発用 Postgres クラスタ (CNPG)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: k1s0-postgres
  namespace: cnpg-system
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: k1s0
      owner: k1s0
      secret:
        name: k1s0-postgres-credentials
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
---
apiVersion: v1
kind: Secret
metadata:
  name: k1s0-postgres-credentials
  namespace: cnpg-system
type: kubernetes.io/basic-auth
stringData:
  username: k1s0
  password: k1s0-local-dev-password
