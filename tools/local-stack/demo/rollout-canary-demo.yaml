# ADR-POL-002: on-demand demo
# 用途: argo-rollouts の canary 動作検証用デモ。
# 常駐対象から外したため必要時のみ kubectl apply で起動する。
#
# 起動: kubectl apply -f tools/local-stack/demo/rollout-canary-demo.yaml
# 削除: kubectl delete -f tools/local-stack/demo/rollout-canary-demo.yaml
#
# 検証:
#   kubectl argo rollouts get rollout rollout-canary-demo --watch
#   kubectl argo rollouts set image rollout-canary-demo app=busybox:1.37
#   → canary が 25% → 50% → 75% で進行することを確認
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rollout-canary-demo
  namespace: default
  labels:
    k1s0.io/component: rollout-demo
    k1s0.io/on-demand: "true"
spec:
  replicas: 4
  selector:
    matchLabels:
      app: canary-demo
  strategy:
    canary:
      maxSurge: 25%
      maxUnavailable: 0
      steps:
        - setWeight: 25
        - pause: { duration: 5s }
        - setWeight: 50
        - pause: { duration: 5s }
        - setWeight: 75
        - pause: { duration: 5s }
  template:
    metadata:
      labels:
        app: canary-demo
        k1s0.io/component: rollout-demo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: app
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests: { cpu: 5m, memory: 8Mi }
            limits: { cpu: 50m, memory: 32Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
