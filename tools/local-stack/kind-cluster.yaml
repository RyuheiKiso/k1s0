# kind cluster 定義（k1s0 ローカル本番再現用）
#
# 設計書: docs/05_実装/50_開発者体験設計/10_DevContainer_10役/01_DevContainer_10役設計.md
#         docs/05_実装/50_開発者体験設計/00_方針/01_開発者体験原則.md (IMP-DEV-POL-006)
# ADR: ADR-DIR-003（10 役 cone）/ ADR-CICD-001（Argo CD）/ ADR-OBS-001（LGTM）
#
# 構成:
#   - control-plane: 1 ノード（API server, etcd）
#   - worker: 3 ノード（本番再現の Pod 群を分散配置）
#   - CNI: Calico（cloud-provider-kind 互換、kindnet を無効化して Calico を後から install）
#   - ingress: extraPortMappings で host の 80/443 を control-plane に bind
#                  ingress-nginx / Istio Gateway を後から配備
#   - 起動: tools/local-stack/up.sh が `kind create cluster --config` で消費

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k1s0-local
networking:
  # Calico を後から install するため kindnet を無効化
  disableDefaultCNI: true
  # cloud-provider-kind と互換
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
  # API server をホスト 6443 にも露出（必要時のみ）
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
nodes:
  - role: control-plane
    image: kindest/node:v1.31.4
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # ingress-nginx / Istio Gateway 用
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Argo CD UI（NodePort 30080 想定）
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # Backstage UI（NodePort 30700 想定）
      - containerPort: 30700
        hostPort: 30700
        protocol: TCP
      # Grafana UI（NodePort 30300 想定）
      - containerPort: 30300
        hostPort: 30300
        protocol: TCP
  - role: worker
    image: kindest/node:v1.31.4
    labels:
      k1s0.io/workload: data
  - role: worker
    image: kindest/node:v1.31.4
    labels:
      k1s0.io/workload: app
  - role: worker
    image: kindest/node:v1.31.4
    labels:
      k1s0.io/workload: ingress
# kubeadm patches
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        # OIDC を将来 Keycloak に向ける際に拡張する余地を残す
        anonymous-auth: "false"
    controllerManager:
      extraArgs:
        bind-address: "0.0.0.0"
    scheduler:
      extraArgs:
        bind-address: "0.0.0.0"
