# =============================================================================
# k1s0 OpenTelemetry Configuration for Go Services
# =============================================================================
# This config is consumed by the k1s0-observability Go package.
# The package reads this file via k1s0-config and initializes the
# go.opentelemetry.io/otel SDK automatically.
#
# Usage in code:
#   import "github.com/k1s0/framework/backend/go/k1s0-observability"
#
#   shutdown, err := observability.Init(ctx)
#   if err != nil { log.Fatal(err) }
#   defer shutdown(ctx)
#
# The k1s0-observability Go package uses:
#   - go.opentelemetry.io/otel for traces and metrics
#   - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracegrpc
#   - go.opentelemetry.io/otel/sdk for SDK configuration
# =============================================================================

observability:
  # Service identification (injected as OTEL resource attributes)
  service:
    name: "my-go-service"
    version: "0.1.0"
    environment: "dev"

  # OTLP exporter configuration
  exporter:
    # Protocol: grpc or http
    protocol: grpc
    # OTEL Collector endpoint (gRPC)
    endpoint: "localhost:4317"
    # Use TLS (set true for production)
    insecure: true
    # Export timeout in seconds
    timeout_s: 10
    # Headers (optional)
    # headers:
    #   Authorization: "Bearer <token>"

  # Tracing configuration
  traces:
    enabled: true
    # Sampler: always_on, always_off, trace_id_ratio, parent_based
    sampler: always_on
    # sampler_ratio: 0.1
    # Batch span processor settings
    batch:
      max_queue_size: 2048
      batch_timeout_ms: 5000
      max_export_batch_size: 512
      export_timeout_ms: 30000

  # Metrics configuration
  metrics:
    enabled: true
    # Periodic reader export interval in seconds
    export_interval_s: 60

  # Logging configuration (uses slog bridge)
  logs:
    enabled: true
    level: info

  # Additional resource attributes
  resource_attributes:
    deployment.environment: "dev"
    k1s0.layer: "feature"
