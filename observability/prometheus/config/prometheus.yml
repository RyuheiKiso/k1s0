global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/alerts.yml
  - /etc/prometheus/rules/recording.yml

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
    metrics_path: /metrics
    scrape_interval: 30s

