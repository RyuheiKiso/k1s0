groups:
  - name: k1s0_service_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_request_duration_milliseconds_count{http_response_status_code=~"5.."}[5m])) by (service_name)
            /
            sum(rate(http_server_request_duration_milliseconds_count[5m])) by (service_name)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate on {{ $labels.service_name }}"
          description: "Service {{ $labels.service_name }} has an error rate of {{ $value | humanizePercentage }} over the last 5 minutes."
          runbook_url: "https://docs.k1s0.dev/runbooks/high-error-rate"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_request_duration_milliseconds_bucket[5m])) by (le, service_name)
          ) > 2000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High P99 latency on {{ $labels.service_name }}"
          description: "Service {{ $labels.service_name }} P99 latency is {{ $value }}ms over the last 5 minutes."
          runbook_url: "https://docs.k1s0.dev/runbooks/high-latency"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "The service {{ $labels.job }} (instance {{ $labels.instance }}) has been unreachable for more than 1 minute."
          runbook_url: "https://docs.k1s0.dev/runbooks/service-down"

      - alert: HighMemoryUsage
        expr: |
          (
            process_resident_memory_bytes
            /
            machine_memory_bytes
          ) > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage on {{ $labels.service_name }}"
          description: "Service {{ $labels.service_name }} memory usage is above 85% for more than 5 minutes (current: {{ $value | humanizePercentage }})."
          runbook_url: "https://docs.k1s0.dev/runbooks/high-memory"
