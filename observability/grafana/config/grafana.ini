[server]
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
admin_user = admin
admin_password = admin

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[paths]
provisioning = /etc/grafana/provisioning

[log]
mode = console
level = info

[alerting]
enabled = false

[unified_alerting]
enabled = true

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/overview.json
