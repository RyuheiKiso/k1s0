name: 機能要望 / Feature request
description: 新機能 / 改善の提案
title: "[feat] "
labels: ["type/feature", "needs-triage"]
body:
    - type: markdown
      attributes:
          value: |
              機能要望ありがとうございます。構造的変更（新 API / 新 tier / アーキ変更）の場合は
              ADR 起票が必須です（CONTRIBUTING.md 参照）。本 Issue は議論のキックオフとして使えます。

    - type: dropdown
      id: area
      attributes:
          label: 影響領域
          multiple: true
          options:
              - tier1-go
              - tier1-rust
              - tier2
              - tier3-web
              - tier3-native
              - tier3-bff
              - sdk-dotnet
              - sdk-go
              - sdk-rust
              - sdk-typescript
              - contracts
              - infra
              - deploy
              - ops
              - tools
              - docs
              - その他
      validations:
          required: true

    - type: textarea
      id: motivation
      attributes:
          label: 動機 / 解決したい課題
          description: 何が困っているか、なぜ既存機能では不十分か
      validations:
          required: true

    - type: textarea
      id: proposal
      attributes:
          label: 提案する解決策
          description: 具体的なインターフェース案 / 動作例 / API 形状
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: 検討した代替案
          description: なぜその案を採らなかったか（ADR 検討肢 3 件以上の予備調査）

    - type: dropdown
      id: maturity
      attributes:
          label: 想定マチュリティ段階
          description: SHIP_STATUS.md のいずれの段階で実装したいか
          options:
              - リリース時点（v0.x で実装）
              - 採用初期（採用組織での POC〜本番初期に必要）
              - 採用後の運用拡大時（大規模化フェーズ）
      validations:
          required: true

    - type: checkboxes
      id: contribution
      attributes:
          label: コントリビューション意思
          options:
              - label: PR を自分で出す予定がある
              - label: 設計議論には参加するが実装は他者に任せる
              - label: 課題提起のみ
