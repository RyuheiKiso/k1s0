# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/_go-service-ci.yaml
# Go サービス用の再利用可能 CI ワークフロー
# 各サービス CI から workflow_call で呼び出される
name: _go-service-ci

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

on:
  workflow_call:
    inputs:
      # サービスのディレクトリパス（例: regions/system/server/go/bff-proxy）
      service-path:
        required: true
        type: string
      # Go バージョン（bff-proxy/go.mod と同期: go 1.26.1）
      go-version:
        required: false
        type: string
        default: "1.26.1"
      # golangci-lint バージョン
      golangci-lint-version:
        required: false
        type: string
        default: "v1.64.8"

jobs:
  # Go vet + golangci-lint 静的解析
  lint:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.service-path }}/go.sum
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@${{ inputs.golangci-lint-version }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Vet
        run: go vet ./...
        working-directory: ${{ inputs.service-path }}
      - name: Lint
        run: golangci-lint run ./...
        working-directory: ${{ inputs.service-path }}

  # ユニットテスト実行（race detector 有効、カバレッジ計測付き）
  test:
    needs: lint
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.service-path }}/go.sum
      # カバレッジ計測付きでテストを実行する（H-07 対応: カバレッジ未測定の指摘に対応）
      - name: テスト実行（カバレッジ計測付き）
        run: go test -coverprofile=coverage.out -covermode=atomic -race -count=1 ./...
        working-directory: ${{ inputs.service-path }}
      # カバレッジのトータル行をコンソールに出力して可視化する
      - name: カバレッジサマリ出力
        run: go tool cover -func=coverage.out | tail -1
        working-directory: ${{ inputs.service-path }}
      # カバレッジが 70% を下回る場合は CI をブロックする（QUALITY-001 監査対応）
      - name: カバレッジ基準チェック（70%）
        run: |
          # カバレッジが 70% を下回る場合は CI をブロックする（QUALITY-001 監査対応）
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          if [ -z "$COVERAGE" ]; then
            echo "WARNING: カバレッジデータが取得できませんでした"
            exit 0
          fi
          if awk "BEGIN { exit !($COVERAGE < 70.0) }"; then
            echo "ERROR: テストカバレッジ ${COVERAGE}% が基準値 70% を下回っています"
            exit 1
          fi
          echo "OK: テストカバレッジ ${COVERAGE}%"
        working-directory: ${{ inputs.service-path }}
      # カバレッジレポートを Artifact として保存し、後から参照できるようにする
      - name: カバレッジレポートをアップロード
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage-report
          path: ${{ inputs.service-path }}/coverage.out
          retention-days: 7

  # ビルド検証
  build:
    needs: test
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.service-path }}/go.sum
      - name: Build
        run: go build ./...
        working-directory: ${{ inputs.service-path }}
