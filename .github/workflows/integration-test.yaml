# .github/workflows/integration-test.yaml
# Postgres + Kafka + Keycloak を使った結合テスト（全ティア対応）
name: Integration Test

on:
  pull_request:
    branches: [main]
    paths:
      # system tier: ワークスペース内のサーバー・ライブラリ変更を検出
      - 'regions/system/server/rust/**'
      - 'regions/system/library/rust/**'
      - 'regions/system/Cargo.toml'
      - 'regions/system/Cargo.lock'
      # business tier: 各ドメインのサーバー変更を検出
      - 'regions/business/*/server/rust/**'
      # service tier: 各サービスのサーバー変更を検出
      - 'regions/service/*/server/rust/**'
      # DB migration 変更は結合テストで検証が必要なため起動する
      - 'regions/**/database/postgres/migrations/**'
      # DB 初期化スクリプト変更はテスト環境のスキーマに影響するため起動する
      - 'infra/docker/init-db/**'
      # CI スクリプト変更は結合テストの挙動に影響するため起動する
      - 'scripts/ci-list-integration-servers.sh'
      - 'scripts/list-modules.sh'

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

# Kafka クラスタ ID を一元管理し、各ジョブでの重複定義を排除する
env:
  KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

jobs:
  # ---------- system tier 結合テスト ----------

  # system tier 結合テスト対象サーバーの検出
  detect-servers-system:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Detect system tier integration test servers
        id: detect
        run: |
          chmod +x scripts/ci-list-integration-servers.sh
          # system 引数を明示して system tier サーバーのみを検出する
          matrix=$(scripts/ci-list-integration-servers.sh system)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Detected system servers: $matrix"

  # system tier 結合テストの実行（Postgres + Kafka + Keycloak）
  integration-test-system:
    needs: detect-servers-system
    if: needs.detect-servers-system.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.detect-servers-system.outputs.matrix) }}

    services:
      # NOTE: DB認証情報は平文で記載しているが、これはエフェメラルCIランナー上の
      # サービスコンテナ専用であり、テスト完了後に自動破棄される。
      # 本番環境の認証情報は GitHub Secrets / Vault 経由で管理する。
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: apache/kafka:3.8.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          # ワークフローレベルの env から Kafka クラスタ ID を参照（DRY 原則）
          CLUSTER_ID: ${{ env.KAFKA_CLUSTER_ID }}
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        ports:
          - 9092:9092

      # シークレット管理用 Vault（開発モード: テスト専用のルートトークンで起動）
      vault:
        image: hashicorp/vault:1.15
        env:
          VAULT_DEV_ROOT_TOKEN_ID: root
          VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
        ports:
          - 8200:8200
        options: >-
          --health-cmd="vault status"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93

      # system tier の Rust 依存キャッシュを有効化
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: regions/system

      - name: Initialize database schemas
        env:
          PGPASSWORD: dev
        run: |
          for sql in infra/docker/init-db/*.sql; do
            echo "=== Running $sql ==="
            psql -h localhost -U dev -d postgres -f "$sql"
          done

      - name: Derive schema name
        id: schema
        run: |
          # サーバーディレクトリ名からスキーマ名を導出（ハイフンをアンダースコアに変換）
          # 注: 現在の統合テストはスタブリポジトリを使用するため DB 接続は行われない
          # 将来 DB 依存テストを追加する場合は init-db/*.sql のスキーマ名と一致させること
          echo "name=$(echo '${{ matrix.server }}' | tr '-' '_')" >> "$GITHUB_OUTPUT"

      - name: Run integration tests (${{ matrix.server }})
        env:
          DATABASE_URL: "postgresql://dev:dev@localhost:5432/k1s0_system?options=-c%20search_path%3D${{ steps.schema.outputs.name }},public"
          KAFKA_BROKERS: "localhost:9092"
        run: |
          # workspace ルートからパッケージ単位で統合テストを実行
          # Cargo.toml に test-utils feature が定義されていれば有効化
          cd regions/system
          pkg_name=$(grep -m1 '^name' "server/rust/${{ matrix.server }}/Cargo.toml" | sed 's/.*"\(.*\)"/\1/')
          if grep -q '\[features\]' "server/rust/${{ matrix.server }}/Cargo.toml" && \
             grep -q 'test-utils' "server/rust/${{ matrix.server }}/Cargo.toml"; then
            cargo test -p "$pkg_name" --test integration_test --features "$pkg_name/test-utils"
          else
            cargo test -p "$pkg_name" --test integration_test
          fi

  # ---------- business tier 結合テスト ----------

  # business tier 結合テスト対象サーバーの検出
  detect-servers-business:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Detect business tier integration test servers
        id: detect
        run: |
          # business tier: regions/business/{domain}/server/rust/{service}/tests/integration_test.rs が存在するサーバーを検出
          servers=()
          for cargo_toml in regions/business/*/server/rust/*/Cargo.toml; do
            [ -f "$cargo_toml" ] || continue
            server_dir="$(dirname "$cargo_toml")"
            # 統合テストファイルが存在するサーバーのみを対象にする
            if [ -f "$server_dir/tests/integration_test.rs" ]; then
              servers+=("$(basename "$server_dir")")
            fi
          done
          # JSON 配列に変換して出力
          matrix=$(printf '%s\n' "${servers[@]}" | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Detected business servers: $matrix"

  # business tier 結合テストの実行（Postgres + Kafka）
  integration-test-business:
    needs: detect-servers-business
    if: needs.detect-servers-business.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.detect-servers-business.outputs.matrix) }}

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: apache/kafka:3.8.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          # ワークフローレベルの env から Kafka クラスタ ID を参照（DRY 原則）
          CLUSTER_ID: ${{ env.KAFKA_CLUSTER_ID }}
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        ports:
          - 9092:9092

      # シークレット管理用 Vault（開発モード: テスト専用のルートトークンで起動）
      vault:
        image: hashicorp/vault:1.15
        env:
          VAULT_DEV_ROOT_TOKEN_ID: root
          VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
        ports:
          - 8200:8200
        options: >-
          --health-cmd="vault status"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93

      # business tier の standalone Rust サーバーのキャッシュを有効化
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: regions/business/accounting/server/rust/domain-master

      - name: Initialize database schemas
        env:
          PGPASSWORD: dev
        run: |
          for sql in infra/docker/init-db/*.sql; do
            echo "=== Running $sql ==="
            psql -h localhost -U dev -d postgres -f "$sql"
          done

      - name: Derive schema name
        id: schema
        run: |
          # サーバー名からスキーマ名を導出（ハイフンをアンダースコアに変換）
          echo "name=$(echo '${{ matrix.server }}' | tr '-' '_')" >> "$GITHUB_OUTPUT"

      - name: Find server directory
        id: find-dir
        run: |
          # business tier のディレクトリ構成: regions/business/{domain}/server/rust/{service}
          server_dir=$(find regions/business -path "*/server/rust/${{ matrix.server }}" -type d | head -1)
          echo "path=$server_dir" >> "$GITHUB_OUTPUT"

      - name: Run integration tests (${{ matrix.server }})
        env:
          DATABASE_URL: "postgresql://dev:dev@localhost:5432/k1s0_business?options=-c%20search_path%3D${{ steps.schema.outputs.name }},public"
          KAFKA_BROKERS: "localhost:9092"
        run: |
          # standalone サーバーの統合テストを実行
          cd "${{ steps.find-dir.outputs.path }}"
          pkg_name=$(grep -m1 '^name' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          if grep -q '\[features\]' Cargo.toml && grep -q 'test-utils' Cargo.toml; then
            cargo test --test integration_test --features "test-utils"
          else
            cargo test --test integration_test
          fi

  # ---------- service tier 結合テスト ----------

  # service tier 結合テスト対象サーバーの検出
  detect-servers-service:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Detect service tier integration test servers
        id: detect
        run: |
          # service tier: regions/service/{service}/server/rust/{service}/tests/integration_test.rs が存在するサーバーを検出
          servers=()
          for cargo_toml in regions/service/*/server/rust/*/Cargo.toml; do
            [ -f "$cargo_toml" ] || continue
            server_dir="$(dirname "$cargo_toml")"
            # 統合テストファイルが存在するサーバーのみを対象にする
            if [ -f "$server_dir/tests/integration_test.rs" ]; then
              servers+=("$(basename "$server_dir")")
            fi
          done
          # JSON 配列に変換して出力
          matrix=$(printf '%s\n' "${servers[@]}" | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Detected service servers: $matrix"

  # service tier 結合テストの実行（Postgres + Kafka）
  integration-test-service:
    needs: detect-servers-service
    if: needs.detect-servers-service.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.detect-servers-service.outputs.matrix) }}

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: apache/kafka:3.8.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          # ワークフローレベルの env から Kafka クラスタ ID を参照（DRY 原則）
          CLUSTER_ID: ${{ env.KAFKA_CLUSTER_ID }}
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        ports:
          - 9092:9092

      # シークレット管理用 Vault（開発モード: テスト専用のルートトークンで起動）
      vault:
        image: hashicorp/vault:1.15
        env:
          VAULT_DEV_ROOT_TOKEN_ID: root
          VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
        ports:
          - 8200:8200
        options: >-
          --health-cmd="vault status"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93

      # service tier の standalone Rust サーバーのキャッシュを有効化
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            regions/service/order/server/rust/order
            regions/service/inventory/server/rust/inventory
            regions/service/payment/server/rust/payment

      - name: Initialize database schemas
        env:
          PGPASSWORD: dev
        run: |
          for sql in infra/docker/init-db/*.sql; do
            echo "=== Running $sql ==="
            psql -h localhost -U dev -d postgres -f "$sql"
          done

      - name: Derive schema name
        id: schema
        run: |
          # サーバー名からスキーマ名を導出（ハイフンをアンダースコアに変換）
          echo "name=$(echo '${{ matrix.server }}' | tr '-' '_')" >> "$GITHUB_OUTPUT"

      - name: Find server directory
        id: find-dir
        run: |
          # service tier のディレクトリ構成: regions/service/{service}/server/rust/{service}
          server_dir=$(find regions/service -path "*/server/rust/${{ matrix.server }}" -type d | head -1)
          echo "path=$server_dir" >> "$GITHUB_OUTPUT"

      - name: Run integration tests (${{ matrix.server }})
        env:
          DATABASE_URL: "postgresql://dev:dev@localhost:5432/k1s0_service?options=-c%20search_path%3D${{ steps.schema.outputs.name }},public"
          KAFKA_BROKERS: "localhost:9092"
        run: |
          # standalone サーバーの統合テストを実行
          cd "${{ steps.find-dir.outputs.path }}"
          pkg_name=$(grep -m1 '^name' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          if grep -q '\[features\]' Cargo.toml && grep -q 'test-utils' Cargo.toml; then
            cargo test --test integration_test --features "test-utils"
          else
            cargo test --test integration_test
          fi
