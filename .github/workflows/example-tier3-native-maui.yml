# 週次 E2E（examples/tier3-native-maui の build 検証）。
# 注: リリース時点 は net8.0 単独 build。採用初期で net8.0-android / net8.0-ios 等の
#     クロスプラットフォーム build に拡張する（MAUI workload インストール必要）。
name: example-tier3-native-maui

on:
  schedule:
    - cron: "0 3 * * 1"
  pull_request:
    paths:
      - "examples/tier3-native-maui/**"
      - "src/contracts/**"
      - "src/sdk/dotnet/**"
      - ".github/workflows/example-tier3-native-maui.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: dotnet restore
        run: dotnet restore examples/tier3-native-maui/ExampleNativeMaui.csproj
      - name: dotnet build
        run: dotnet build examples/tier3-native-maui/ExampleNativeMaui.csproj --no-restore -c Release
