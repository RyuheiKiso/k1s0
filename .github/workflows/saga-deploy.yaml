# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/saga-deploy.yaml
# Deploy pipeline for saga server（reusable workflow 経由）
name: saga-deploy

on:
  push:
    branches: [main]
    paths:
      - 'regions/system/server/rust/saga/**'

jobs:
  deploy:
    uses: ./.github/workflows/_service-deploy.yaml
    with:
      service-name: saga
      context-path: regions/system/server/rust/saga
      registry-project: k1s0-system
      helm-chart-path: system/saga
      namespace: k1s0-system
    secrets:
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
