# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/saga-deploy.yaml
# Deploy pipeline for saga server（reusable workflow 経由）
name: saga-deploy

on:
  push:
    branches: [main]
    paths:
      - 'regions/system/server/rust/saga/**'

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

# MED-013: デプロイの同時実行を防ぐ（進行中のデプロイを完了させてから次を実行する）
# cancel-in-progress: false により実行中のデプロイをキャンセルせず、次のデプロイをキューに入れる
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 再利用可能ワークフローを呼び出してデプロイ実行
  deploy:
    # コードの読み取り、パッケージの書き込み（Docker push）、OIDC トークン（Cosign 署名）が必要
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/_service-deploy.yaml
    with:
      service-name: saga
      context-path: regions/system/server/rust/saga
      registry-project: k1s0-system
      helm-chart-path: system/saga
      namespace: k1s0-system
    secrets:
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
