name: docker

on:
  push:
    branches: [main]
    paths:
      - '**/Dockerfile*'
      - '**/compose*.yaml'
      - '**/compose*.yml'
      - '**/.dockerignore'
      - '.hadolint.yaml'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/Dockerfile*'
      - '**/compose*.yaml'
      - '**/compose*.yml'
      - '**/.dockerignore'
      - '.hadolint.yaml'
      - '.github/workflows/docker.yml'

jobs:
  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find Dockerfiles
        id: dockerfiles
        run: |
          files=$(find . -name 'Dockerfile' -o -name 'Dockerfile.*' | grep -v '.tera$' | grep -v 'node_modules' | head -50)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run hadolint
        if: steps.dockerfiles.outputs.files != ''
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "Dockerfile"
          recursive: true
          config: .hadolint.yaml
          failure-threshold: warning

  build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: hadolint
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend-rust-template
            context: CLI/templates/backend-rust/feature
            dockerfile: CLI/templates/backend-rust/feature/Dockerfile.tera
            skip: true
          - name: backend-go-template
            context: CLI/templates/backend-go/feature
            dockerfile: CLI/templates/backend-go/feature/Dockerfile.tera
            skip: true
          - name: backend-csharp-template
            context: CLI/templates/backend-csharp/feature
            dockerfile: CLI/templates/backend-csharp/feature/Dockerfile.tera
            skip: true
          - name: backend-python-template
            context: CLI/templates/backend-python/feature
            dockerfile: CLI/templates/backend-python/feature/Dockerfile.tera
            skip: true
          - name: frontend-react-template
            context: CLI/templates/frontend-react/feature
            dockerfile: CLI/templates/frontend-react/feature/Dockerfile.tera
            skip: true
          - name: frontend-flutter-template
            context: CLI/templates/frontend-flutter/feature
            dockerfile: CLI/templates/frontend-flutter/feature/Dockerfile.tera
            skip: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: ${{ !matrix.skip }}
        uses: docker/setup-buildx-action@v3

      - name: Build image
        if: ${{ !matrix.skip }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.name }}:test

  multiarch:
    name: Multi-Architecture Build Test
    runs-on: ubuntu-latest
    needs: hadolint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-platform test image
        uses: docker/build-push-action@v5
        with:
          context: CLI/templates/backend-python/feature
          file: CLI/templates/backend-python/feature/Dockerfile.tera
          push: false
          platforms: linux/amd64,linux/arm64
          tags: k1s0-multiarch-test:latest
        continue-on-error: true

  trivy:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: hadolint
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'misconfig'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
