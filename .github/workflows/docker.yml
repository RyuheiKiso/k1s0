name: Docker

on:
  push:
    branches: [main, develop]
    paths:
      - 'CLI/templates/**/Dockerfile.tera'
      - 'CLI/templates/**/docker-compose.yml.tera'
      - 'CLI/templates/**/.dockerignore'
      - 'CLI/templates/**/nginx.conf.tera'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'CLI/templates/**/Dockerfile.tera'
      - 'CLI/templates/**/docker-compose.yml.tera'
      - 'CLI/templates/**/.dockerignore'
      - 'CLI/templates/**/nginx.conf.tera'
      - '.github/workflows/docker.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build-test:
    name: Docker Build Test (${{ matrix.template }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template:
          - backend-rust
          - backend-go
          - backend-csharp
          - backend-python
          - frontend-react
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: CLI -> target
          cache-on-failure: true

      - name: Build k1s0 CLI
        working-directory: CLI
        run: cargo build --release

      - name: Generate feature from template
        working-directory: CLI
        run: |
          ./target/release/k1s0 new-feature \
            --type ${{ matrix.template }} \
            --name docker-test \
            --yes \
            --skip-doctor

      - name: Verify Dockerfile exists
        run: |
          TEMPLATE=${{ matrix.template }}
          if [[ "$TEMPLATE" == frontend-* ]]; then
            LAYER="frontend"
            LANG="${TEMPLATE#frontend-}"
          else
            LAYER="backend"
            LANG="${TEMPLATE#backend-}"
          fi
          test -f "feature/${LAYER}/${LANG}/docker-test/Dockerfile"

      - name: Verify .dockerignore exists
        run: |
          TEMPLATE=${{ matrix.template }}
          if [[ "$TEMPLATE" == frontend-* ]]; then
            LAYER="frontend"
            LANG="${TEMPLATE#frontend-}"
          else
            LAYER="backend"
            LANG="${TEMPLATE#backend-}"
          fi
          test -f "feature/${LAYER}/${LANG}/docker-test/.dockerignore"

      - name: Verify docker-compose.yml exists
        run: |
          TEMPLATE=${{ matrix.template }}
          if [[ "$TEMPLATE" == frontend-* ]]; then
            LAYER="frontend"
            LANG="${TEMPLATE#frontend-}"
          else
            LAYER="backend"
            LANG="${TEMPLATE#backend-}"
          fi
          test -f "feature/${LAYER}/${LANG}/docker-test/docker-compose.yml"

  ci-success:
    name: Docker CI Success
    runs-on: ubuntu-latest
    needs: [docker-build-test]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.docker-build-test.result }}" != "success" ]]; then
            echo "Docker build test failed"
            exit 1
          fi
          echo "All Docker jobs passed!"
