# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/app-registry-ci.yaml
# Per-service CI pipeline for app-registry server（reusable workflow 経由）
name: app-registry-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'regions/system/server/rust/app-registry/**'

concurrency:
  group: app-registry-ci-${{ github.ref }}
  cancel-in-progress: true

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

jobs:
  # 再利用可能ワークフローを呼び出してCI実行
  ci:
    # コードの読み取りのみ必要
    permissions:
      contents: read
    uses: ./.github/workflows/_rust-service-ci.yaml
    with:
      service-path: regions/system/server/rust/app-registry
      package-name: k1s0-app-registry
      workspace-path: regions/system
