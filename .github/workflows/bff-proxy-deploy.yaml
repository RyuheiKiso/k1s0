# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/bff-proxy-deploy.yaml
# Deploy pipeline for BFF Proxy server（reusable workflow 経由）
# NOTE: Go distroless イメージのため port-forward 方式でヘルスチェック
name: bff-proxy-deploy

on:
  push:
    branches: [main]
    paths:
      - 'regions/system/server/go/bff-proxy/**'

jobs:
  deploy:
    uses: ./.github/workflows/_service-deploy.yaml
    with:
      service-name: bff-proxy
      context-path: regions/system/server/go/bff-proxy
      registry-project: k1s0-system
      helm-chart-path: system/bff-proxy
      namespace: k1s0-system
      prod-url: https://bff.k1s0.internal.example.com
      health-check-method: port-forward
    secrets:
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
