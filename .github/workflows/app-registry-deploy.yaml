# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/app-registry-deploy.yaml
# Deploy pipeline for app-registry server（reusable workflow 経由）
name: app-registry-deploy

on:
  push:
    branches: [main]
    paths:
      - 'regions/system/server/rust/app-registry/**'

jobs:
  deploy:
    uses: ./.github/workflows/_service-deploy.yaml
    with:
      service-name: app-registry
      context-path: regions/system/server/rust/app-registry
      registry-project: k1s0-system
      helm-chart-path: system/app-registry
      namespace: k1s0-system
    secrets:
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
