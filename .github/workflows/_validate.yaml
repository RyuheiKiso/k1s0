# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/_validate.yaml
# 設定・セキュリティ・整合性の検証ジョブを集約した再利用可能ワークフロー
# ci.yaml から workflow_call で呼び出す（detect 完了後に並行実行可能）
name: _validate

permissions: {}

on:
  workflow_call:
    inputs:
      helm:
        type: string
        required: false
        default: 'false'

jobs:
  # Helm チャートのリント
  # H-8対応: paths-filter 条件を廃止し、全PRで必ず Helm バリデーションを実行する。
  # Library Chart の変更はコンシューマーチャートに影響するため、Helm 変更がなくても常に検証が必要。
  helm-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: "3.16"
      - run: |
          for chart in infra/helm/services/*/* infra/helm/services/*/*/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              helm lint "$chart"
            fi
          done

  # INFRA-003 監査対応: k1s0-common（Library Chart）変更時に全コンシューマーチャートの
  # helm template 出力を検証し、テンプレートエラーや必須フィールド欠落を早期検知する
  # k1s0-common はサービスチャート全体に影響するため、単体リントだけでは不十分な場合がある
  helm-common-template-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: "3.16"
      - name: k1s0-common 依存チャートの helm template 出力を全サービス分検証する（INFRA-003）
        shell: bash
        run: |
          # k1s0-common を使用しているコンシューマーチャートを全て検出して helm template を実行する
          # テンプレートエラーや必須フィールド欠落を早期に検知することが目的であり、
          # 出力内容の正確性ではなくテンプレートエンジンのエラー有無のみを検証する
          failed=0
          checked=0
          for chart in infra/helm/services/*/* infra/helm/services/*/*/*; do
            if [ ! -f "$chart/Chart.yaml" ]; then
              continue
            fi
            # k1s0-common への依存を持つチャートのみを対象とする
            if ! grep -q 'k1s0-common' "$chart/Chart.yaml" 2>/dev/null; then
              continue
            fi
            # helm dependency update で Library Chart を取得してから template を実行する
            if ! helm dependency update "$chart" > /dev/null 2>&1; then
              echo "::warning::$chart: helm dependency update が失敗しました（OCI レジストリ未接続の可能性）"
              continue
            fi
            if helm template test-release "$chart" > /dev/null 2>&1; then
              echo "OK: $chart"
              checked=$((checked + 1))
            else
              echo "::error::$chart: helm template が失敗しました"
              helm template test-release "$chart" 2>&1 | head -20
              failed=$((failed + 1))
            fi
          done
          echo "helm template 検証完了: ${checked} チャート成功、${failed} チャート失敗"
          if [ "$failed" -gt 0 ]; then
            exit 1
          fi

  # LOW-003 対応: Kind クラスターを使った Helm Chart インテグレーションテスト。
  # helm lint / helm template による静的検証に加え、実際の K8s API サーバーに対して
  # kubectl apply --dry-run=server を実行することで以下を検証する:
  #   - K8s API バージョン互換性（deprecated API の検出）
  #   - リソーススペックの正確性（無効なフィールド名・型の検出）
  #   - RBAC / ServiceAccount 参照の整合性
  # helm lint / helm template では検出できない K8s API レベルの問題を CI で早期検知する。
  helm-k8s-dryrun:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: "3.16"
      # Kind クラスターを起動して K8s API サーバーを提供する（LOW-003 監査対応）
      # helm/kind-action サードパーティアクションを使用せず Kind バイナリを直接インストールする。
      # 理由: GitHub Actions のサプライチェーン攻撃防止のため SHA ピン留めが必要だが、
      #      helm/kind-action のリリースコミット SHA はリポジトリ外から機械的に検証できない。
      #      Kind は CNCF の公式ツール（kubernetes-sigs/kind）であり、公式 GitHub Releases から
      #      バージョン番号を明示して取得することでトレーサビリティと透明性を確保する。
      - name: Kind をインストールして Kind クラスターを作成する
        run: |
          # Kind v0.24.0 は kindest/node:v1.31.x に対応している（Kind 公式互換マトリクス参照）
          KIND_VERSION="v0.24.0"
          curl -Lo ./kind "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind --version
          # クラスター作成: --wait 60s でコントロールプレーンが Ready になるまで待機する
          kind create cluster \
            --name k1s0-helm-test \
            --image kindest/node:v1.31.0 \
            --wait 60s
      # 全サービス chart の Namespace を事前作成する（deploy マニフェストが Namespace 参照する場合の対応）
      - name: Namespace を事前作成する
        shell: bash
        run: |
          kubectl create namespace k1s0-system   --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace k1s0-business --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace k1s0-service  --dry-run=client -o yaml | kubectl apply -f -
      # 全サービス chart を values-dev.yaml でレンダリングし K8s API サーバーへの dry-run 適用を検証する
      - name: Helm Chart を K8s API サーバーに対して dry-run 検証する（LOW-003）
        shell: bash
        run: |
          failed=0
          checked=0
          for chart in infra/helm/services/*/* infra/helm/services/*/*/*; do
            if [ ! -f "$chart/Chart.yaml" ]; then
              continue
            fi
            chart_name=$(basename "$chart")
            values_file=""
            if [ -f "$chart/values-dev.yaml" ]; then
              values_file="--values $chart/values-dev.yaml"
            fi
            # helm dependency update で Library Chart を取得する
            if ! helm dependency update "$chart" > /dev/null 2>&1; then
              echo "::warning::$chart_name: helm dependency update が失敗（OCI レジストリ未接続の可能性）。スキップします。"
              continue
            fi
            # helm template でマニフェストを生成し kubectl apply --dry-run=server で K8s API 検証を実行する
            if helm template "test-${chart_name}" "$chart" $values_file 2>/dev/null \
               | kubectl apply --dry-run=server -f - > /dev/null 2>&1; then
              echo "OK: $chart_name"
              checked=$((checked + 1))
            else
              echo "::error::$chart_name: kubectl apply --dry-run=server が失敗しました"
              helm template "test-${chart_name}" "$chart" $values_file 2>/dev/null \
               | kubectl apply --dry-run=server -f - 2>&1 | head -20
              failed=$((failed + 1))
            fi
          done
          echo "Helm K8s dry-run 検証完了: ${checked} チャート成功、${failed} チャート失敗"
          if [ "$failed" -gt 0 ]; then
            exit 1
          fi

  # modules.yaml とディスク上のマニフェストの整合性検証
  validate-modules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # L-4 対応: modules.yaml と実際のディレクトリ構造の整合性を検証する
      - name: Verify modules.yaml consistency
        run: bash scripts/check-modules-consistency.sh
      - name: modules.yaml とディスク上マニフェストの整合性チェック
        shell: bash
        run: |
          chmod +x scripts/list-modules.sh
          registered=$(
            {
              scripts/list-modules.sh --lang rust --type workspace
              scripts/list-modules.sh --lang rust --type server
              scripts/list-modules.sh --lang rust --type library
              scripts/list-modules.sh --lang rust --type cli
              scripts/list-modules.sh --lang rust --type client
              scripts/list-modules.sh --lang go
              scripts/list-modules.sh --lang ts
              scripts/list-modules.sh --lang dart
            } | sort -u
          )
          disk_modules=$(
            {
              find regions CLI -name 'Cargo.toml' -not -path '*/target/*' 2>/dev/null | while read -r f; do dirname "$f"; done
              find regions CLI -name 'go.mod' -not -path '*/vendor/*' 2>/dev/null | while read -r f; do dirname "$f"; done
              find regions CLI -name 'package.json' -not -path '*/node_modules/*' 2>/dev/null | while read -r f; do dirname "$f"; done
              find regions CLI -name 'pubspec.yaml' 2>/dev/null | while read -r f; do dirname "$f"; done
            } | sort -u
          )
          unregistered=$(comm -23 <(echo "$disk_modules") <(echo "$registered"))
          if [ -n "$unregistered" ]; then
            echo "::error::以下のモジュールが modules.yaml に未登録です:"
            echo "$unregistered" | while read -r path; do echo "::error::  - $path"; done
            exit 1
          fi
          ghost=$(comm -13 <(echo "$disk_modules") <(echo "$registered"))
          if [ -n "$ghost" ]; then
            echo "::error::以下のモジュールが modules.yaml に登録されていますがディスクに存在しません:"
            echo "$ghost" | while read -r path; do echo "::error::  - $path"; done
            exit 1
          fi
          echo "modules.yaml とディスク上のマニフェストが双方向で一致しています"

  # Vault policy の広域 wildcard 検出
  validate-vault-policies:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Check for overly broad Vault wildcards
        shell: bash
        run: |
          if grep -rn 'secret/data/k1s0/.*\*' infra/vault/policies/ 2>/dev/null | grep -v '/common/\*'; then
            echo "::error::Vault policy に広域 wildcard が検出されました。共通パス (common/*) のみ許可されています。"
            exit 1
          fi

  # TypeScript パッケージの lockfile 存在チェック
  validate-ts-lockfiles:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Check package-lock.json exists for all TS packages
        shell: bash
        run: |
          missing=0
          for pkg in $(find regions CLI tests -name 'package.json' -not -path '*/node_modules/*' 2>/dev/null); do
            dir=$(dirname "$pkg")
            if [ ! -f "$dir/package-lock.json" ]; then
              echo "::error::$dir に package-lock.json がありません。npm install で生成してください。"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then exit 1; fi

  # リリースビルドに dev フィーチャーが含まれないことを検証
  # SEC-005 / RUST-003: dev-auth-bypass / dev-infra-bypass の本番バイナリへの混入を防止する
  verify-release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Dockerfile に dev フィーチャーのハードコードがないことを検証
        shell: bash
        run: |
          if grep -rn 'cargo build.*--release.*--features.*dev-' --include='Dockerfile' regions/ 2>/dev/null | grep -v 'CARGO_FEATURES'; then
            echo "::error::Dockerfile に dev フィーチャーがハードコードされています。CARGO_FEATURES ARG 経由でのみ指定してください。"
            exit 1
          fi
          echo "Dockerfile に dev フィーチャーのハードコードはありません"
      - name: CARGO_FEATURES ARG のデフォルト値が空文字であることを検証
        shell: bash
        run: |
          failed=0
          while IFS= read -r dockerfile; do
            default_val=$(grep -oP 'ARG CARGO_FEATURES="\K[^"]*' "$dockerfile" 2>/dev/null || echo "")
            if [ -n "$default_val" ]; then
              echo "::error::$dockerfile: CARGO_FEATURES のデフォルト値が空文字ではありません: '$default_val'"
              failed=1
            fi
          done < <(find regions/ -name 'Dockerfile' 2>/dev/null)
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "全 Dockerfile の CARGO_FEATURES デフォルト値は空文字です"

  # ティア間依存関係の検証（system → business → service の一方向性を強制する）
  check-tier-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: ティア間依存関係の検証
        shell: bash
        run: |
          failed=0
          while IFS= read -r cargo_toml; do
            if grep -qE 'path\s*=\s*"[^"]*regions/(business|service)' "$cargo_toml" 2>/dev/null; then
              echo "::error::$cargo_toml: system ティアから business/service ティアへの依存が検出されました（逆方向依存違反）"
              failed=1
            fi
          done < <(find regions/system -name 'Cargo.toml' -not -path '*/target/*' 2>/dev/null)
          while IFS= read -r cargo_toml; do
            if grep -qE 'path\s*=\s*"[^"]*regions/service' "$cargo_toml" 2>/dev/null; then
              echo "::error::$cargo_toml: business ティアから service ティアへの依存が検出されました（逆方向依存違反）"
              failed=1
            fi
          done < <(find regions/business -name 'Cargo.toml' -not -path '*/target/*' 2>/dev/null)
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "ティア間依存関係の検証が完了しました（逆方向依存なし）"

  # Terraform の構文・フォーマット検証
  iac-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef065 # v3
      - name: Terraform format check
        run: terraform fmt -check -recursive infra/terraform/
      - name: Terraform validate (dev)
        working-directory: infra/terraform/environments/dev
        # CI での HCL 構文検証のみ（-backend=false でバックエンド接続をスキップ）
        run: |
          terraform init -backend=false
          terraform validate
      - name: Terraform validate (prod)
        working-directory: infra/terraform/environments/prod
        # CI での HCL 構文検証のみ（-backend=false でバックエンド接続をスキップ）
        run: |
          terraform init -backend=false
          terraform validate

  # CRIT-5,6 監査対応: k8s マニフェストのプレースホルダー値が本番デプロイ前に除去されているか検証する
  # etcd 暗号化キー・Grafana API キー等が <REPLACE_WITH_...> のままデプロイされると本番環境のセキュリティが破綻する
  validate-k8s-placeholders:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: k8s マニフェストにプレースホルダー値が残存していないことを検証
        shell: bash
        run: bash scripts/check-placeholder-secrets.sh

  # CRIT-003 監査対応: SQLファイルへの UTF-8 BOM 混入を検出する
  # 過去に BOM 混入による sqlx マイグレーションエラーが発生したため、CI で継続的に検出する
  # python3 のバイナリ読み取りで BOM バイト列（0xEF 0xBB 0xBF）を確実に検出する
  validate-sql-bom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: BOM混入チェック（UTF-8 BOMを含むSQLファイルを検出する）
        run: |
          BOM_FILES=$(python3 -c "
          import sys, glob
          bom = b'\xef\xbb\xbf'
          found = []
          for f in glob.glob('regions/system/database/**/*.sql', recursive=True):
              with open(f, 'rb') as fh:
                  if fh.read(3) == bom:
                      found.append(f)
          print('\n'.join(found))
          ")
          if [ -n "$BOM_FILES" ]; then
              echo "ERROR: BOMが検出されました:"
              echo "$BOM_FILES"
              exit 1
          fi
          echo "BOMチェック: OK"

  # MED-005 監査対応: encryption-config プレースホルダー残存の警告チェック
  # ローカル開発環境では常にプレースホルダーのため warning のみ出力し exit 1 はしない
  # 本番デプロイパイプライン（deploy.yaml）では validate-k8s-placeholders がブロッカーとなる
  validate-encryption-config-placeholder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: encryption-configプレースホルダーチェック（本番鍵の未設定を検出する）
        run: |
          if grep -r '<REPLACE_WITH_BASE64_32BYTE_KEY>' infra/kubernetes/security/ 2>/dev/null; then
              echo "WARNING: encryption-config.yaml にプレースホルダーが残存しています"
              echo "本番デプロイ前に実際の暗号化キーを設定してください"
              # CI では warning のみ（deploy pipeline ではブロッカーとする）
          else
              echo "encryption-configチェック: OK"
          fi

  # セキュリティスキャン（Trivy）
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        with:
          scan-type: fs
          scan-ref: .
          # L-20 対応: security.yaml との整合性を保つため MEDIUM も含めてスキャンする
          # サプライチェーン攻撃は MEDIUM 脆弱性の悪用から始まることが多い（M-23対応）
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: 1

  # M-008 監査対応: kustomize build による k8s マニフェスト構文検証を CI に組み込む
  # Docker Desktop k8s がない環境でも、kustomize build でマニフェストの構文・参照整合性を確認する
  # H-003 対応: 実クラスターなしでのマニフェスト品質保証を自動化する
  # CRIT-005 対応: prod overlay の kustomize build を CI に追加し、audit-policy.yaml 等の
  #   非 K8s リソースが resources に混入して kustomize build が失敗する事態を防止する
  kustomize-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Setup kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35351b55f # v2
        with:
          kustomize-version: "5.4.3"
      - name: kustomize build でマニフェスト構文・参照整合性を検証する
        shell: bash
        run: |
          kustomize build infra/kubernetes/ > /dev/null
          echo "kustomize build: 成功（infra/kubernetes/）"
      - name: prod overlay の kustomize build を検証する（CRIT-005 再発防止）
        shell: bash
        run: |
          # CRIT-005: audit-policy.yaml / encryption-config.yaml は kube-apiserver 設定ファイルであり
          # Kubernetes API オブジェクトではないため、overlays/prod/kustomization.yaml の resources に含めない
          kustomize build infra/kubernetes/overlays/prod > /dev/null
          echo "kustomize build: 成功（infra/kubernetes/overlays/prod）"

  # INFRA-002 監査対応: Vault YAML と Terraform ロール定義の乖離を検出する
  # infra/vault/auth/*.yaml（ConfigMap形式）と infra/terraform/modules/vault/auth.tf の
  # ロール名・SA名・ポリシーの整合性を機械的に検証し、二重管理による設定ドリフトを早期検知する
  validate-vault-tf-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Vault YAML と Terraform ロール定義の整合性を検証する（INFRA-002）
        shell: bash
        run: |
          # Terraform auth.tf から定義済みロール名を抽出する
          # role_name = "xxx" の形式でロール名を取得する
          tf_roles=$(grep -oP 'role_name\s*=\s*"\K[^"]+' infra/terraform/modules/vault/auth.tf | sort -u)

          # Vault YAML ファイル（infra/vault/auth/）から role_name フィールドを抽出する
          # ConfigMap の vault-auth-config.json 内の role_name キーを対象とする
          yaml_roles=$(grep -rh '"role_name"' infra/vault/auth/ | grep -oP '"role_name"\s*:\s*"\K[^"]+' | sort -u)

          echo "=== Terraform で定義されているロール ==="
          echo "$tf_roles"
          echo ""
          echo "=== Vault YAML で参照されているロール ==="
          echo "$yaml_roles"
          echo ""

          # Vault YAML に存在するが Terraform に存在しないロールを検出する
          # （YAML が Terraform の権威情報に対して未定義のロールを参照していないか確認する）
          drift_yaml_only=$(comm -23 <(echo "$yaml_roles") <(echo "$tf_roles"))
          if [ -n "$drift_yaml_only" ]; then
            echo "::warning::以下のロールが Vault YAML に存在しますが Terraform に定義されていません:"
            echo "$drift_yaml_only" | while read -r r; do echo "::warning::  - $r"; done
            echo "ADR-0073 に基づき Terraform が権威情報です。YAML を更新するか Terraform にロールを追加してください。"
            # YAML は ConfigMap であり将来計画も含むため warning のみとし exit 1 はしない
          else
            echo "Vault YAML のロールは全て Terraform に定義されています: OK"
          fi

          echo "Vault-Terraform 同期検証: 完了"

  # ARCH-CRIT-001: GraphQL スキーマの自動生成差分検出を CI に追加する
  # schema-gen バイナリが実装コードから SDL を生成し、api/graphql/schema.graphql との差分を検出する。
  # 差分がある場合は CI が失敗し、schema.graphql の更新が必要であることを通知する。
  validate-graphql-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93
      - name: Rust キャッシュ
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d2 # v2
        with:
          workspaces: regions/system
      - name: schema-gen バイナリをビルドする
        shell: bash
        run: |
          cargo build --manifest-path regions/system/Cargo.toml \
            -p k1s0-graphql-gateway-server --bin schema-gen
      - name: 実装から SDL を生成して schema.graphql と差分検出する（ARCH-CRIT-001）
        shell: bash
        run: |
          # schema-gen バイナリで実装コードから SDL を生成する
          regions/system/target/debug/schema-gen > /tmp/generated.graphql
          # api/graphql/schema.graphql と差分を比較する
          if ! diff -u api/graphql/schema.graphql /tmp/generated.graphql; then
            echo ""
            echo "ERROR: api/graphql/schema.graphql が実装コードと乖離しています。"
            echo "以下のコマンドで schema.graphql を更新してください:"
            echo "  cargo run --manifest-path regions/system/Cargo.toml --bin schema-gen > api/graphql/schema.graphql"
            exit 1
          fi
          echo "GraphQL schema validation: OK (実装との差分なし)"

  # ARCH-HIGH-002 対応: HTTP レスポンスに日本語文字列が混入していないことを CI で自動検出する。
  # ADR-0005 では全 REST API エラーメッセージを英語で返すことが必須。
  # 対象: adapter/handler/ と adapter/middleware/ 配下の *.rs ファイル。
  # ログメッセージ（tracing::warn!/error!/info!）と test モジュールは対象外。
  validate-no-japanese-in-error-responses:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: HTTP レスポンスに日本語文字列が含まれないことを検証する（ADR-0005 / ARCH-HIGH-002）
        shell: bash
        run: |
          set -euo pipefail
          # adapter/handler/ と adapter/middleware/ 配下の *.rs から日本語文字列を検出する。
          # tracing::warn!/error!/info!/debug! ログ行と // コメント行は除外する。
          # #[cfg(test)] ブロック内のテストコードは除外する。
          VIOLATIONS=$(grep -rn --include="*.rs" \
            'ServiceError::\|bad_request\|unauthorized\|ErrorResponse::new\|Json(json' \
            regions/system/server/rust regions/service \
            2>/dev/null | \
            python3 -c "
          import sys, re
          count = 0
          for line in sys.stdin:
              parts = line.split(':', 2)
              if len(parts) < 3:
                  continue
              code = parts[2]
              # ログ行・コメント行・テストコードをスキップ
              if re.search(r'tracing::|warn!|info!|debug!|error!|// |#\[test\]|test_|assert|sample_', code):
                  continue
              # 日本語文字（ひらがな・カタカナ・漢字）が含まれる行を検出
              if re.search(r'[\u3040-\u30FF\u4E00-\u9FAF]', code):
                  print(line.rstrip())
                  count += 1
          sys.exit(1 if count > 0 else 0)
          ") || { echo ""; echo "ERROR: ADR-0005 違反 — HTTP レスポンス内に日本語文字列が検出されました。英語に修正してください。"; exit 1; }
          echo "Japanese character check in HTTP responses: OK"

  # --- 実験系 ai-* クレート（continue-on-error で可視性を維持） ---
  check-ai-experimental:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93
        with:
          components: clippy
      - name: Check ai-agent
        continue-on-error: true
        run: cargo check --manifest-path regions/system/server/rust/ai-agent/Cargo.toml --all-targets
      - name: Check ai-gateway
        continue-on-error: true
        run: cargo check --manifest-path regions/system/server/rust/ai-gateway/Cargo.toml --all-targets
      - name: Clippy ai-agent
        continue-on-error: true
        run: cargo clippy --manifest-path regions/system/server/rust/ai-agent/Cargo.toml --all-targets -- -D warnings
      - name: Clippy ai-gateway
        continue-on-error: true
        run: cargo clippy --manifest-path regions/system/server/rust/ai-gateway/Cargo.toml --all-targets -- -D warnings
