# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/order-ci.yaml
# Per-service CI pipeline for order server（reusable workflow 経由）
# NOTE: order は service tier のため独立した Cargo.toml を使用（standalone モード）
name: order-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'regions/service/order/**'

concurrency:
  group: order-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_rust-service-ci.yaml
    with:
      service-path: regions/service/order/server/rust/order
      package-name: k1s0-order-server
      workspace-path: regions/service/order/server/rust/order
      standalone: true
