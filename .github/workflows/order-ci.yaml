# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/order-ci.yaml
# Per-service CI pipeline for order server
name: order-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'regions/service/order/**'

concurrency:
  group: order-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93       # Dockerイメージ戦略.md / devcontainer設計.md と同期
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: regions/service/order/server/rust/order
      - name: Format check
        run: cargo fmt --manifest-path regions/service/order/server/rust/order/Cargo.toml --all -- --check
      - name: Clippy
        run: cargo clippy --manifest-path regions/service/order/server/rust/order/Cargo.toml --all-targets -- -D warnings

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: regions/service/order/server/rust/order
      - name: Run tests
        run: cargo test --manifest-path regions/service/order/server/rust/order/Cargo.toml --all

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: regions/service/order/server/rust/order
      - name: Build
        run: cargo build --manifest-path regions/service/order/server/rust/order/Cargo.toml --all-targets
