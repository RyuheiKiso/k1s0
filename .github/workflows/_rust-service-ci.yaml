# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/_rust-service-ci.yaml
# Rust サービス用の再利用可能 CI ワークフロー
# 各サービス CI から workflow_call で呼び出される
name: _rust-service-ci

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

on:
  workflow_call:
    inputs:
      # サービスのディレクトリパス（例: regions/system/server/rust/auth）
      service-path:
        required: true
        type: string
      # Cargo パッケージ名（例: k1s0-auth-server）
      package-name:
        required: true
        type: string
      # Cargo workspace のルートパス（例: regions/system）
      workspace-path:
        required: true
        type: string
      # Rust ツールチェインバージョン（Dockerイメージ戦略.md / devcontainer設計.md と同期）
      rust-version:
        required: false
        type: string
        default: "1.93"
      # ワークスペースの -p フラグを使わず、サービス独自の Cargo.toml でビルドするか
      standalone:
        required: false
        type: boolean
        default: false

jobs:
  # フォーマットチェック + Clippy 静的解析
  lint:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93
        with:
          toolchain: ${{ inputs.rust-version }}
          components: clippy, rustfmt
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ inputs.workspace-path }}
      - name: Format check
        run: cargo fmt --manifest-path ${{ inputs.service-path }}/Cargo.toml --all -- --check
      # standalone モード: サービスの Cargo.toml を直接使用
      - name: Clippy (standalone)
        if: inputs.standalone
        run: cargo clippy --manifest-path ${{ inputs.service-path }}/Cargo.toml --all-targets -- -D warnings
      # workspace モード: ワークスペースの Cargo.toml + -p でパッケージ指定
      - name: Clippy (workspace)
        if: ${{ !inputs.standalone }}
        run: cargo clippy --manifest-path ${{ inputs.workspace-path }}/Cargo.toml -p ${{ inputs.package-name }} --all-targets -- -D warnings
      # HIGH-001 監査対応: unwrap_used/expect_used の件数を報告する（段階的排除の進捗確認）
      # continue-on-error: true で CI をブロックしない（現在は情報収集フェーズ）
      # 四半期ごとに件数を確認し、0 件になったら -D clippy::unwrap_used に昇格する
      - name: Clippy unwrap_used 件数確認 (standalone)
        if: inputs.standalone
        continue-on-error: true
        run: |
          COUNT=$(cargo clippy --manifest-path ${{ inputs.service-path }}/Cargo.toml --all-targets \
            -- -W clippy::unwrap_used -W clippy::expect_used 2>&1 \
            | grep -c "warning\[clippy::unwrap_used\]\|warning\[clippy::expect_used\]" || echo 0)
          echo "unwrap/expect 件数: ${COUNT}"
          echo "HIGH-001: 0 件になったら -D clippy::unwrap_used に昇格予定"
      - name: Clippy unwrap_used 件数確認 (workspace)
        if: ${{ !inputs.standalone }}
        continue-on-error: true
        run: |
          COUNT=$(cargo clippy --manifest-path ${{ inputs.workspace-path }}/Cargo.toml \
            -p ${{ inputs.package-name }} --all-targets \
            -- -W clippy::unwrap_used -W clippy::expect_used 2>&1 \
            | grep -c "warning\[clippy::unwrap_used\]\|warning\[clippy::expect_used\]" || echo 0)
          echo "unwrap/expect 件数: ${COUNT}"
          echo "HIGH-001: 0 件になったら -D clippy::unwrap_used に昇格予定"

  # ユニットテスト実行
  test:
    needs: lint
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93
        with:
          toolchain: ${{ inputs.rust-version }}
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ inputs.workspace-path }}
      - name: Run tests (standalone)
        if: inputs.standalone
        run: cargo test --manifest-path ${{ inputs.service-path }}/Cargo.toml --all
      - name: Run tests (workspace)
        if: ${{ !inputs.standalone }}
        run: cargo test --manifest-path ${{ inputs.workspace-path }}/Cargo.toml -p ${{ inputs.package-name }} --all

  # テストカバレッジ計測（cargo-tarpaulin）
  # test ジョブ完了後にカバレッジを計測し、結果を Artifact として保存する
  coverage:
    needs: test
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93
        with:
          toolchain: ${{ inputs.rust-version }}
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ inputs.workspace-path }}
      # cargo-tarpaulin をプリビルドバイナリからインストールする（ビルド時間の削減）
      - name: cargo-tarpaulin インストール（プリビルドバイナリ）
        run: |
          TARPAULIN_VERSION="0.31.2"
          curl -sL "https://github.com/xd009642/tarpaulin/releases/download/${TARPAULIN_VERSION}/cargo-tarpaulin-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C "$HOME/.cargo/bin"
          chmod +x "$HOME/.cargo/bin/cargo-tarpaulin"
      # HIGH-004 監査対応: カバレッジ計測と閾値チェックを実行する（standalone / workspace モード対応）
      # --fail-under 65 で 65% 未満の場合に CI を失敗させる
      # 閾値は現行の最低カバレッジに合わせた控えめな値。_test.yaml の 75% に段階的に引き上げ予定
      - name: カバレッジ計測 (standalone)
        if: inputs.standalone
        run: |
          mkdir -p coverage
          cargo tarpaulin \
            --manifest-path ${{ inputs.service-path }}/Cargo.toml \
            --exclude-files "*/tests/*" "*/proto/*" \
            --skip-clean \
            --timeout 300 \
            --fail-under 65 \
            --out Json Html \
            --output-dir coverage
      # カバレッジ計測を実行する（workspace モード: -p でパッケージ指定）
      - name: カバレッジ計測 (workspace)
        if: ${{ !inputs.standalone }}
        run: |
          mkdir -p coverage
          cargo tarpaulin \
            --manifest-path ${{ inputs.workspace-path }}/Cargo.toml \
            --packages ${{ inputs.package-name }} \
            --exclude-files "*/tests/*" "*/proto/*" \
            --skip-clean \
            --timeout 300 \
            --fail-under 65 \
            --out Json Html \
            --output-dir coverage
      # カバレッジレポートを Artifact として保存し後から参照できるようにする
      - name: カバレッジレポートをアップロード
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-coverage-${{ inputs.package-name }}
          path: coverage/
          retention-days: 7

  # リリースビルド検証
  build:
    needs: test
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93
        with:
          toolchain: ${{ inputs.rust-version }}
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ inputs.workspace-path }}
      - name: Build (standalone)
        if: inputs.standalone
        run: cargo build --manifest-path ${{ inputs.service-path }}/Cargo.toml --all-targets
      - name: Build (workspace)
        if: ${{ !inputs.standalone }}
        run: cargo build --manifest-path ${{ inputs.workspace-path }}/Cargo.toml -p ${{ inputs.package-name }} --all-targets
