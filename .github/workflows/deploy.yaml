# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/deploy.yaml
name: Deploy

# 個別サービス Deploy ワークフロー (*-deploy.yaml) がカバーするパスを除外し、
# デプロイの重複実行を防止する
on:
  push:
    branches: [main]
    paths-ignore:
      # 個別 Deploy ワークフローがカバーするサービスパス（重複実行の回避）
      #
      # ========== paths-ignore 維持管理注意 ==========
      # 以下の6サービスは専用の *-deploy.yaml ワークフローが存在するため除外している。
      # このファイルの自動検出ロジック（detect-services ジョブ）はこれらを検出対象から
      # 外すことで同一コミットに対するデプロイの二重実行を防いでいる。
      #
      # 除外対象サービスと除外理由:
      #   auth         → auth-deploy.yaml が専用デプロイ（カナリアリリース戦略を使用）
      #   app-registry → app-registry-deploy.yaml が専用デプロイ
      #   config       → config-deploy.yaml が専用デプロイ（設定変更は段階的ロールアウト）
      #   saga         → saga-deploy.yaml が専用デプロイ（Saga 補償処理の安全な切替が必要）
      #   dlq-manager  → dlq-manager-deploy.yaml が専用デプロイ
      #   bff-proxy    → bff-proxy-deploy.yaml が専用デプロイ（Kong 設定同期を含む）
      #
      # 上記以外のすべてのサービスは detect-services ジョブが自動検出してデプロイする。
      # 新しい個別 *-deploy.yaml を追加した場合は、ここにも除外パスを追加すること。
      #
      # CICD-02: 将来タスク — paths-ignore の自動同期化
      #   現状は手動管理。scripts/sync-paths-ignore.sh 等で *-deploy.yaml の paths: を
      #   読み取り deploy.yaml の paths-ignore を自動生成する仕組みの導入を推奨する。
      # ================================================
      - 'regions/system/server/rust/auth/**'
      - 'regions/system/server/rust/app-registry/**'
      - 'regions/system/server/rust/config/**'
      - 'regions/system/server/rust/saga/**'
      - 'regions/system/server/rust/dlq-manager/**'
      - 'regions/system/server/go/bff-proxy/**'

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

# キャッシュ戦略:
# - GitHub Actions Cache (type=gha): Docker ビルドレイヤーキャッシュ（cache-from/cache-to で利用）
# - Cargo/Go キャッシュ: 各言語の依存関係は CI ワークフロー（ci.yaml）側で管理
# - Docker Registry Cache: Harbor レジストリ上の既存レイヤーを活用（push 済みイメージ）
env:
  # H-008 監査対応: REGISTRY は GitHub Secret から読み込む（プレースホルダー禁止）
  # リポジトリの Settings → Secrets and variables → Actions → New repository secret で
  # REGISTRY_URL を設定すること（例: harbor.prod.example.com, ghcr.io/your-org）
  REGISTRY: ${{ secrets.REGISTRY_URL }}

jobs:
  # 変更されたサービスの検出
  detect-services:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    outputs:
      services: ${{ steps.detect.outputs.services }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - id: detect
        name: Detect changed services
        run: |
          # CICD-02: 動的サービス検出ロジック
          #
          # 概要:
          #   このジョブは git diff でコミット間の変更ファイルを取得し、
          #   ディレクトリパスからデプロイ対象サービスを自動的に導出する。
          #   パスの除外（paths-ignore）は GitHub Actions が行うため、
          #   ここに到達する変更は自動デプロイ対象のサービスのみである。
          #
          # 対応するディレクトリ構造（docs/architecture/ディレクトリ構成図.md 準拠）:
          #   system tier:   regions/system/server/{lang}/{service}/...
          #                  → デプロイキー: system/server/{lang}/{service}
          #   business tier: regions/business/{domain}/server/{lang}/{service}/...
          #                  → デプロイキー: business/{domain}/server/{lang}/{service}
          #   service tier:  regions/service/{service}/server/{lang}/...
          #                  → デプロイキー: service/{service}/server/{lang}
          #
          # Helm chart 変更のサービス逆引きマッピング:
          #   infra/helm/services/system/{service}/**   → system/server/{service}
          #   infra/helm/services/business/{svc}/**    → business/{svc}/server
          #   infra/helm/services/service/{svc}/**     → service/{svc}/server
          #   （Helm chart のみ変更された場合もアプリコードと同一のデプロイフローを実行する）
          #
          # 除外サービス（paths-ignore で除外済み、専用 *-deploy.yaml が存在）:
          #   auth / app-registry / config / saga / dlq-manager / bff-proxy
          #
          # 自動検出対象サービス（paths-ignore 除外なし、このジョブが検出）:
          #   上記6サービス以外のすべての system/business/service tier サービス
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | \
            (grep -E '^(regions/|infra/helm/services/)' || true) | \
            sed 's|^infra/helm/services/||; s|^regions/||' | \
            while IFS= read -r path; do
              case "$path" in
                system/server/*/*/*)       echo "$path" | cut -d'/' -f1-4 ;;
                business/*/server/*/*/*)   echo "$path" | cut -d'/' -f1-5 ;;
                service/*/server/*/*/*)    echo "$path" | cut -d'/' -f1-5 ;;
                # infra/helm/services/{tier}/{service}/** → {tier}/server/ へのマッピング
                # Helm chart 変更は該当 tier のサービス名で検知する
                # L-008 監査対応: templates/ サブディレクトリ配下の YAML もマッチするようパターンを拡張する
                # 修正前: system/*/*.yaml のみで templates/*.yaml が漏れていた
                system/*/Chart.yaml|system/*/*.yaml|system/*/templates/*.yaml|system/*/templates/**/*.yaml)
                  echo "system/server/$(echo "$path" | cut -d'/' -f2)" ;;
                business/*/*/Chart.yaml|business/*/*.yaml|business/*/*/templates/*.yaml|business/*/*/templates/**/*.yaml)
                  echo "business/$(echo "$path" | cut -d'/' -f2)/server" ;;
                service/*/Chart.yaml|service/*/*.yaml|service/*/templates/*.yaml|service/*/templates/**/*.yaml)
                  echo "service/$(echo "$path" | cut -d'/' -f2)/server" ;;
              esac
            # head -20 の制限を撤廃: 共通ライブラリ変更時に21件以上が影響を受けても全サービスをデプロイする
            done | sort -u)
          echo "services=$(echo "$CHANGED" | jq -R -s -c 'split("\n") | map(select(. != ""))')" >> "$GITHUB_OUTPUT"

  # Docker イメージのビルド・プッシュ・署名
  build-and-push:
    needs: detect-services
    if: needs.detect-services.outputs.services != '[]'
    runs-on: ubuntu-latest
    # コードの読み取り、パッケージの書き込み（Docker push）、OIDC トークン（Cosign 署名）が必要
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      # H-008 監査対応: レジストリ URL がプレースホルダーでないことを確認する
      # secrets.REGISTRY_URL が未設定または example.com を含む場合はデプロイを中断する
      - name: Verify registry configuration
        run: |
          if [ -z "${{ env.REGISTRY }}" ] || echo "${{ env.REGISTRY }}" | grep -q "example\.com"; then
            echo "Error: REGISTRY が未設定またはプレースホルダーのままです。GitHub Secret 'REGISTRY_URL' を設定してください。"
            exit 1
          fi
      - name: Set short SHA
        id: sha
        # SHA は 12 文字以上を使用し、リポジトリ拡大時の衝突リスクを低減する（M-009）
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Set version
        id: version
        run: |
          # L-007 監査対応: git タグが未設定の場合はエラー終了（0.0.0 での上書きを防止）
          # 本番・staging ビルドでは必ず git tag v0.1.0 等でタグを作成してから実行すること
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//') || { echo "Error: git タグが設定されていません。'git tag v0.1.0' 等でタグを作成してください。"; exit 1; }
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Login to Harbor
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Determine image metadata
        id: image
        run: |
          # Tier を抽出してプロジェクト名を決定
          TIER=$(echo "${{ matrix.service }}" | cut -d'/' -f1)
          echo "project=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
          # Tier 別にサービス短縮名を導出
          case "$TIER" in
            system)   echo "service_name=$(echo "${{ matrix.service }}" | cut -d'/' -f4)" >> "$GITHUB_OUTPUT" ;;
            business) echo "service_name=$(echo "${{ matrix.service }}" | cut -d'/' -f5)" >> "$GITHUB_OUTPUT" ;;
            service)  echo "service_name=$(echo "${{ matrix.service }}" | cut -d'/' -f2)" >> "$GITHUB_OUTPUT" ;;
          esac
      # Tier ルートを Docker ビルドコンテキストとして導出（Dockerfile は regions/{tier} を前提としているため）
      - name: Determine build context
        id: build-ctx
        run: |
          TIER=$(echo "${{ matrix.service }}" | cut -d'/' -f1)
          case "$TIER" in
            # system tier: Cargo workspace ルートをコンテキストに使用
            system)   echo "context=regions/system" >> "$GITHUB_OUTPUT" ;;
            # business tier: ドメインルートをコンテキストに使用
            business) echo "context=regions/$(echo "${{ matrix.service }}" | cut -d'/' -f1-2)" >> "$GITHUB_OUTPUT" ;;
            # service tier: サービスルートをコンテキストに使用
            service)  echo "context=regions/$(echo "${{ matrix.service }}" | cut -d'/' -f1-2)" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "dockerfile=regions/${{ matrix.service }}/Dockerfile" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          # Dockerfile が依存するライブラリを含む tier ルートをコンテキストに指定
          context: ${{ steps.build-ctx.outputs.context }}
          file: ${{ steps.build-ctx.outputs.dockerfile }}
          push: true
          # :latest タグは廃止。バージョン + git SHA で一意に特定可能なタグのみ使用する
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.project }}/${{ steps.image.outputs.service_name }}:${{ steps.version.outputs.value }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.project }}/${{ steps.image.outputs.service_name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # コンテナイメージの脆弱性スキャン（ビルド後・プッシュ済みイメージに対して実行）
      # CRITICAL/HIGH の脆弱性が検出された場合、SARIF レポートを出力する
      - name: Run Trivy vulnerability scanner
        # H-009 監査対応: id を付与し、後続の Check Trivy scan results ステップで結果を参照可能にする
        id: trivy
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        # H-009 監査対応: continue-on-error で SARIF レポートを確実に生成してから CI ゲートを判定する
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.image.outputs.project }}/${{ steps.image.outputs.service_name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          # H-07監査対応: CRITICAL/HIGH 脆弱性を検出した際に CI を失敗させる。
          # SARIF レポートは exit-code 失敗後も `if: always()` で出力されるため、レポートの可視性は維持される。
          exit-code: '1'
      # H-009 監査対応: Trivy スキャン失敗を確実に CI ゲートとして機能させる
      # continue-on-error で SARIF を出力した後、ここで確定的にデプロイをブロックする
      - name: Check Trivy scan results
        if: always()
        run: |
          if [ "${{ steps.trivy.outcome }}" = "failure" ]; then
            echo "CRITICAL/HIGH 脆弱性が検出されました。デプロイをブロックします。"
            exit 1
          fi
      # SARIF レポートをアーティファクトとしてアップロードし、セキュリティ監査・追跡に利用する
      - name: Upload Trivy SARIF report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: trivy-sarif-${{ steps.image.outputs.service_name }}
          path: trivy-results.sarif
          if-no-files-found: warn
          # 監査証跡として1年分保持する（m-04対応: デフォルト90日では監査要件を満たせないため）
          retention-days: 365
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      # cosign v2+ では --yes フラグで keyless 署名が有効（COSIGN_EXPERIMENTAL は非推奨）
      - name: Sign image with Cosign
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.project }}/${{ steps.image.outputs.service_name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}

  # NOTE: デプロイジョブはクラスタネットワーク内の self-hosted ランナーで実行する。
  # 各環境のランナーはそれぞれのクラスタ内で動作し、Kubernetes API や
  # 内部サービスへの直接アクセスが可能となる。
  # dev 環境へのデプロイ
  deploy-dev:
    needs: [build-and-push, detect-services]
    runs-on: [self-hosted, dev]
    # コードの読み取りと OIDC トークン（Cosign 署名検証）が必要
    permissions:
      contents: read
      id-token: write
    environment: dev
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Set short SHA
        id: sha
        # SHA は 12 文字以上を使用し、リポジトリ拡大時の衝突リスクを低減する（M-009）
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Set version
        id: version
        run: |
          # L-007 監査対応: deploy-dev のみタグがない場合は "0.0.0-dev" をフォールバックとして使用
          # 開発環境ではタグなしブランチでも動作できるよう特例としてフォールバックを許可する
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0-dev")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Derive service metadata
        id: meta
        run: |
          # Tier 別のディレクトリ構成に基づきメタデータを導出:
          #   system/server/{lang}/{service}         → Helm: system/{service}
          #   business/{domain}/server/{lang}/{service} → Helm: business/{domain}/{service}
          #   service/{service}/server/{lang}        → Helm: service/{service}
          TIER=$(echo "${{ matrix.service }}" | cut -d'/' -f1)
          case "$TIER" in
            system)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f4)
              HELM_PATH="system/${SERVICE_NAME}"
              ;;
            business)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f5)
              HELM_PATH="business/${SERVICE_NAME}"
              ;;
            service)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f2)
              HELM_PATH="service/${SERVICE_NAME}"
              ;;
          esac
          echo "project=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
          echo "service_name=${SERVICE_NAME}" >> "$GITHUB_OUTPUT"
          echo "helm_path=${HELM_PATH}" >> "$GITHUB_OUTPUT"
          echo "namespace=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "^https://github\\.com/k1s0-org/k1s0/\\.github/workflows/.*" \
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.project }}/${{ steps.meta.outputs.service_name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "3.16"   # devcontainer設計.md の Helm バージョンと同期
      # --atomic: デプロイ失敗時に自動ロールバック、--wait: Pod Ready まで待機、--timeout: 最大待機時間
      # 注意（MEDIUM-8）: values-dev.yaml には SSL 無効化等の開発専用設定が含まれる。
      # このステップは dev 環境専用であり、staging/prod では絶対に values-dev.yaml を使用してはならない。
      # staging は values-staging.yaml、prod は values-prod.yaml を明示的に指定すること。
      - name: Deploy to dev
        run: |
          helm upgrade --install ${{ steps.meta.outputs.service_name }} \
            ./infra/helm/services/${{ steps.meta.outputs.helm_path }} \
            -n ${{ steps.meta.outputs.namespace }} \
            -f ./infra/helm/services/${{ steps.meta.outputs.helm_path }}/values-dev.yaml \
            --set image.tag=${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }} \
            --atomic --wait --timeout 5m

  # staging 環境へのデプロイ
  deploy-staging:
    needs: [deploy-dev, detect-services]
    runs-on: [self-hosted, staging]
    # コードの読み取りと OIDC トークン（Cosign 署名検証）が必要
    permissions:
      contents: read
      id-token: write
    environment: staging
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Set short SHA
        id: sha
        # SHA は 12 文字以上を使用し、リポジトリ拡大時の衝突リスクを低減する（M-009）
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Set version
        id: version
        run: |
          # L-007 監査対応: git タグが未設定の場合はエラー終了（0.0.0 での上書きを防止）
          # staging デプロイでは必ず git tag v0.1.0 等でタグを作成してから実行すること
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//') || { echo "Error: git タグが設定されていません。'git tag v0.1.0' 等でタグを作成してください。"; exit 1; }
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Derive service metadata
        id: meta
        run: |
          # Tier 別のディレクトリ構成に基づきメタデータを導出:
          #   system/server/{lang}/{service}         → Helm: system/{service}
          #   business/{domain}/server/{lang}/{service} → Helm: business/{domain}/{service}
          #   service/{service}/server/{lang}        → Helm: service/{service}
          TIER=$(echo "${{ matrix.service }}" | cut -d'/' -f1)
          case "$TIER" in
            system)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f4)
              HELM_PATH="system/${SERVICE_NAME}"
              ;;
            business)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f5)
              HELM_PATH="business/${SERVICE_NAME}"
              ;;
            service)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f2)
              HELM_PATH="service/${SERVICE_NAME}"
              ;;
          esac
          echo "project=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
          echo "service_name=${SERVICE_NAME}" >> "$GITHUB_OUTPUT"
          echo "helm_path=${HELM_PATH}" >> "$GITHUB_OUTPUT"
          echo "namespace=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "^https://github\\.com/k1s0-org/k1s0/\\.github/workflows/.*" \
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.project }}/${{ steps.meta.outputs.service_name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "3.16"   # devcontainer設計.md の Helm バージョンと同期
      # --atomic: デプロイ失敗時に自動ロールバック、--wait: Pod Ready まで待機、--timeout: 最大待機時間
      # 注意（MEDIUM-8）: staging 環境は values-staging.yaml を使用する。
      # values-dev.yaml（SSL無効化等の開発専用設定）をここで使用してはならない。
      - name: Deploy to staging
        run: |
          helm upgrade --install ${{ steps.meta.outputs.service_name }} \
            ./infra/helm/services/${{ steps.meta.outputs.helm_path }} \
            -n ${{ steps.meta.outputs.namespace }} \
            -f ./infra/helm/services/${{ steps.meta.outputs.helm_path }}/values-staging.yaml \
            --set image.tag=${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }} \
            --atomic --wait --timeout 5m

  # ---------- Deploy to prod (manual approval) ----------
  # IMPORTANT: GitHub リポジトリ設定で prod 環境に Required reviewers（最低2名）を設定すること。
  # Settings → Environments → prod → Required reviewers
  # prod 環境へのデプロイ（手動承認が必要）
  deploy-prod:
    needs: [deploy-staging, detect-services]
    runs-on: [self-hosted, prod]
    # コードの読み取りと OIDC トークン（Cosign 署名検証）が必要
    permissions:
      contents: read
      id-token: write
    environment:
      name: prod
      url: https://api.k1s0.internal.example.com
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: encryption-configプレースホルダー検出（MED-005 本番デプロイブロッカー）
        # 本番鍵が未設定のままデプロイされると etcd の Secrets/ConfigMaps が平文保存になる。
        # プレースホルダーが残存している場合は本番デプロイを中断し、Vault からの鍵注入を強制する。
        run: |
          if grep -r '<REPLACE_WITH_BASE64_32BYTE_KEY>' infra/kubernetes/security/ 2>/dev/null; then
            echo "ERROR: encryption-config.yaml にプレースホルダーが残存しています。"
            echo "       本番デプロイ前に Vault から暗号化キーを注入してください。"
            exit 1
          fi
          echo "encryption-config チェック: OK"
      - name: Set short SHA
        id: sha
        # SHA は 12 文字以上を使用し、リポジトリ拡大時の衝突リスクを低減する（M-009）
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Set version
        id: version
        run: |
          # L-007 監査対応: git タグが未設定の場合はエラー終了（0.0.0 での上書きを防止）
          # 本番デプロイでは必ず git tag v0.1.0 等でタグを作成してから実行すること
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//') || { echo "Error: git タグが設定されていません。'git tag v0.1.0' 等でタグを作成してください。"; exit 1; }
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Derive service metadata
        id: meta
        run: |
          # Tier 別のディレクトリ構成に基づきメタデータを導出:
          #   system/server/{lang}/{service}         → Helm: system/{service}
          #   business/{domain}/server/{lang}/{service} → Helm: business/{domain}/{service}
          #   service/{service}/server/{lang}        → Helm: service/{service}
          TIER=$(echo "${{ matrix.service }}" | cut -d'/' -f1)
          case "$TIER" in
            system)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f4)
              HELM_PATH="system/${SERVICE_NAME}"
              ;;
            business)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f5)
              HELM_PATH="business/${SERVICE_NAME}"
              ;;
            service)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f2)
              HELM_PATH="service/${SERVICE_NAME}"
              ;;
          esac
          echo "project=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
          echo "service_name=${SERVICE_NAME}" >> "$GITHUB_OUTPUT"
          echo "helm_path=${HELM_PATH}" >> "$GITHUB_OUTPUT"
          echo "namespace=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "^https://github\\.com/k1s0-org/k1s0/\\.github/workflows/.*" \
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.project }}/${{ steps.meta.outputs.service_name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "3.16"   # devcontainer設計.md の Helm バージョンと同期
      # --atomic: デプロイ失敗時に自動ロールバック、--wait: Pod Ready まで待機、--timeout: 最大待機時間
      # 注意（MEDIUM-8）: prod 環境は values-prod.yaml を使用する。
      # values-dev.yaml（SSL無効化等の開発専用設定）をここで使用してはならない。
      - name: Deploy to prod
        run: |
          helm upgrade --install ${{ steps.meta.outputs.service_name }} \
            ./infra/helm/services/${{ steps.meta.outputs.helm_path }} \
            -n ${{ steps.meta.outputs.namespace }} \
            -f ./infra/helm/services/${{ steps.meta.outputs.helm_path }}/values-prod.yaml \
            --set image.tag=${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }} \
            --atomic --wait --timeout 5m
      # スモークテスト失敗時はデプロイ失敗として扱い、ワークフローを中止する
      - name: デプロイ後スモークテスト
        run: |
          echo "Waiting for rollout to complete..."
          kubectl rollout status deployment/${{ steps.meta.outputs.service_name }} -n ${{ steps.meta.outputs.namespace }} --timeout=120s
          echo "Running health check..."
          # サービスの言語を matrix.service パスから判定する:
          # system/server/go/* は Go サービス（distroless のため /busybox が存在しない）
          # それ以外（rust 等）は busybox の wget を使用する
          # 注意（M-008）: matrix.service の値は deploy.yaml 内の detect-services ジョブが生成するため、
          # 外部入力による任意コマンド実行リスクは低い。ただし、外部 PR からのトリガーや
          # 信頼できないソースからの matrix 値が混入しないよう、トリガー条件（push to main 等）を維持すること。
          LANG=$(echo "${{ matrix.service }}" | awk -F'/' '{for(i=1;i<=NF;i++) if ($i=="server") {print $(i+1); exit}}')
          if [ "$LANG" = "go" ]; then
            # Go サービスは distroless イメージを使用するため busybox が存在しない。
            # kubectl port-forward 経由でホスト側から curl でヘルスチェックを実施する。
            kubectl port-forward deploy/${{ steps.meta.outputs.service_name }} 18080:8080 -n ${{ steps.meta.outputs.namespace }} &
            PF_PID=$!
            sleep 2
            curl -sf --max-time 5 http://127.0.0.1:18080/healthz
            kill $PF_PID
          else
            # Rust サービスは busybox の wget を使用してコンテナ内からヘルスチェックを実施する。
            # ヘルスチェックのタイムアウトを5秒に設定し、無限待機を防止する
            kubectl exec deploy/${{ steps.meta.outputs.service_name }} -n ${{ steps.meta.outputs.namespace }} -- /busybox wget -qO- --timeout=5 http://127.0.0.1:8080/healthz
          fi
