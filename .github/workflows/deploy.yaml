# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/deploy.yaml
name: Deploy

# 個別サービス Deploy ワークフロー (*-deploy.yaml) がカバーするパスを除外し、
# デプロイの重複実行を防止する
on:
  push:
    branches: [main]
    paths-ignore:
      # 個別 Deploy ワークフローがカバーするサービスパス（重複実行の回避）
      - 'regions/system/server/rust/auth/**'
      - 'regions/system/server/rust/app-registry/**'
      - 'regions/system/server/rust/config/**'
      - 'regions/system/server/rust/saga/**'
      - 'regions/system/server/rust/dlq-manager/**'
      - 'regions/system/server/go/bff-proxy/**'

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

# キャッシュ戦略:
# - GitHub Actions Cache (type=gha): Docker ビルドレイヤーキャッシュ（cache-from/cache-to で利用）
# - Cargo/Go キャッシュ: 各言語の依存関係は CI ワークフロー（ci.yaml）側で管理
# - Docker Registry Cache: Harbor レジストリ上の既存レイヤーを活用（push 済みイメージ）
env:
  REGISTRY: harbor.internal.example.com

jobs:
  # 変更されたサービスの検出
  detect-services:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    outputs:
      services: ${{ steps.detect.outputs.services }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - id: detect
        name: Detect changed services
        run: |
          # ディレクトリ構成図.md に基づくサービス検出:
          #   system:   regions/system/server/{lang}/{service}/...
          #   business: regions/business/{domain}/server/{lang}/{service}/...
          #   service:  regions/service/{service}/server/{lang}/...
          # infra/helm/services/ 変更時は対応するサービスを逆引きしてデプロイ対象に含める
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | \
            (grep -E '^(regions/|infra/helm/services/)' || true) | \
            sed 's|^infra/helm/services/||; s|^regions/||' | \
            while IFS= read -r path; do
              case "$path" in
                system/server/*/*/*)       echo "$path" | cut -d'/' -f1-4 ;;
                business/*/server/*/*/*)   echo "$path" | cut -d'/' -f1-5 ;;
                service/*/server/*/*/*)    echo "$path" | cut -d'/' -f1-5 ;;
                # infra/helm/services/{tier}/{service}/** → {tier}/server/ へのマッピング
                # Helm chart 変更は該当 tier のサービス名で検知する
                system/*/Chart.yaml|system/*/*.yaml)   echo "system/server/$(echo "$path" | cut -d'/' -f2)" ;;
                business/*/*/Chart.yaml|business/*/*.yaml) echo "business/$(echo "$path" | cut -d'/' -f2)/server" ;;
                service/*/Chart.yaml|service/*/*.yaml) echo "service/$(echo "$path" | cut -d'/' -f2)/server" ;;
              esac
            done | sort -u | head -20)
          echo "services=$(echo "$CHANGED" | jq -R -s -c 'split("\n") | map(select(. != ""))')" >> "$GITHUB_OUTPUT"

  # Docker イメージのビルド・プッシュ・署名
  build-and-push:
    needs: detect-services
    if: needs.detect-services.outputs.services != '[]'
    runs-on: ubuntu-latest
    # コードの読み取り、パッケージの書き込み（Docker push）、OIDC トークン（Cosign 署名）が必要
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Set short SHA
        id: sha
        # SHA は 12 文字以上を使用し、リポジトリ拡大時の衝突リスクを低減する（M-009）
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Set version
        id: version
        run: |
          # 直近の Git タグからバージョンを取得（例: v1.2.3 → 1.2.3）
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Login to Harbor
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Determine image metadata
        id: image
        run: |
          # Tier を抽出してプロジェクト名を決定
          TIER=$(echo "${{ matrix.service }}" | cut -d'/' -f1)
          echo "project=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
          # Tier 別にサービス短縮名を導出
          case "$TIER" in
            system)   echo "service_name=$(echo "${{ matrix.service }}" | cut -d'/' -f4)" >> "$GITHUB_OUTPUT" ;;
            business) echo "service_name=$(echo "${{ matrix.service }}" | cut -d'/' -f5)" >> "$GITHUB_OUTPUT" ;;
            service)  echo "service_name=$(echo "${{ matrix.service }}" | cut -d'/' -f2)" >> "$GITHUB_OUTPUT" ;;
          esac
      # Tier ルートを Docker ビルドコンテキストとして導出（Dockerfile は regions/{tier} を前提としているため）
      - name: Determine build context
        id: build-ctx
        run: |
          TIER=$(echo "${{ matrix.service }}" | cut -d'/' -f1)
          case "$TIER" in
            # system tier: Cargo workspace ルートをコンテキストに使用
            system)   echo "context=regions/system" >> "$GITHUB_OUTPUT" ;;
            # business tier: ドメインルートをコンテキストに使用
            business) echo "context=regions/$(echo "${{ matrix.service }}" | cut -d'/' -f1-2)" >> "$GITHUB_OUTPUT" ;;
            # service tier: サービスルートをコンテキストに使用
            service)  echo "context=regions/$(echo "${{ matrix.service }}" | cut -d'/' -f1-2)" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "dockerfile=regions/${{ matrix.service }}/Dockerfile" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          # Dockerfile が依存するライブラリを含む tier ルートをコンテキストに指定
          context: ${{ steps.build-ctx.outputs.context }}
          file: ${{ steps.build-ctx.outputs.dockerfile }}
          push: true
          # :latest タグは廃止。バージョン + git SHA で一意に特定可能なタグのみ使用する
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.project }}/${{ steps.image.outputs.service_name }}:${{ steps.version.outputs.value }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.project }}/${{ steps.image.outputs.service_name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # コンテナイメージの脆弱性スキャン（ビルド後・プッシュ済みイメージに対して実行）
      # CRITICAL/HIGH の脆弱性が検出された場合、SARIF レポートを出力する
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.image.outputs.project }}/${{ steps.image.outputs.service_name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      # SARIF レポートをアーティファクトとしてアップロードし、セキュリティ監査・追跡に利用する
      - name: Upload Trivy SARIF report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: trivy-sarif-${{ steps.image.outputs.service_name }}
          path: trivy-results.sarif
          if-no-files-found: warn
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      # cosign v2+ では --yes フラグで keyless 署名が有効（COSIGN_EXPERIMENTAL は非推奨）
      - name: Sign image with Cosign
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.project }}/${{ steps.image.outputs.service_name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}

  # NOTE: デプロイジョブはクラスタネットワーク内の self-hosted ランナーで実行する。
  # 各環境のランナーはそれぞれのクラスタ内で動作し、Kubernetes API や
  # 内部サービスへの直接アクセスが可能となる。
  # dev 環境へのデプロイ
  deploy-dev:
    needs: [build-and-push, detect-services]
    runs-on: [self-hosted, dev]
    # コードの読み取りと OIDC トークン（Cosign 署名検証）が必要
    permissions:
      contents: read
      id-token: write
    environment: dev
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Set short SHA
        id: sha
        # SHA は 12 文字以上を使用し、リポジトリ拡大時の衝突リスクを低減する（M-009）
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Set version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Derive service metadata
        id: meta
        run: |
          # Tier 別のディレクトリ構成に基づきメタデータを導出:
          #   system/server/{lang}/{service}         → Helm: system/{service}
          #   business/{domain}/server/{lang}/{service} → Helm: business/{domain}/{service}
          #   service/{service}/server/{lang}        → Helm: service/{service}
          TIER=$(echo "${{ matrix.service }}" | cut -d'/' -f1)
          case "$TIER" in
            system)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f4)
              HELM_PATH="system/${SERVICE_NAME}"
              ;;
            business)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f5)
              HELM_PATH="business/${SERVICE_NAME}"
              ;;
            service)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f2)
              HELM_PATH="service/${SERVICE_NAME}"
              ;;
          esac
          echo "project=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
          echo "service_name=${SERVICE_NAME}" >> "$GITHUB_OUTPUT"
          echo "helm_path=${HELM_PATH}" >> "$GITHUB_OUTPUT"
          echo "namespace=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "github.com/k1s0-org/k1s0" \
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.project }}/${{ steps.meta.outputs.service_name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: "3.16"   # devcontainer設計.md の Helm バージョンと同期
      # --atomic: デプロイ失敗時に自動ロールバック、--wait: Pod Ready まで待機、--timeout: 最大待機時間
      - name: Deploy to dev
        run: |
          helm upgrade --install ${{ steps.meta.outputs.service_name }} \
            ./infra/helm/services/${{ steps.meta.outputs.helm_path }} \
            -n ${{ steps.meta.outputs.namespace }} \
            -f ./infra/helm/services/${{ steps.meta.outputs.helm_path }}/values-dev.yaml \
            --set image.tag=${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }} \
            --atomic --wait --timeout 5m

  # staging 環境へのデプロイ
  deploy-staging:
    needs: [deploy-dev, detect-services]
    runs-on: [self-hosted, staging]
    # コードの読み取りと OIDC トークン（Cosign 署名検証）が必要
    permissions:
      contents: read
      id-token: write
    environment: staging
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Set short SHA
        id: sha
        # SHA は 12 文字以上を使用し、リポジトリ拡大時の衝突リスクを低減する（M-009）
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Set version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Derive service metadata
        id: meta
        run: |
          # Tier 別のディレクトリ構成に基づきメタデータを導出:
          #   system/server/{lang}/{service}         → Helm: system/{service}
          #   business/{domain}/server/{lang}/{service} → Helm: business/{domain}/{service}
          #   service/{service}/server/{lang}        → Helm: service/{service}
          TIER=$(echo "${{ matrix.service }}" | cut -d'/' -f1)
          case "$TIER" in
            system)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f4)
              HELM_PATH="system/${SERVICE_NAME}"
              ;;
            business)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f5)
              HELM_PATH="business/${SERVICE_NAME}"
              ;;
            service)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f2)
              HELM_PATH="service/${SERVICE_NAME}"
              ;;
          esac
          echo "project=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
          echo "service_name=${SERVICE_NAME}" >> "$GITHUB_OUTPUT"
          echo "helm_path=${HELM_PATH}" >> "$GITHUB_OUTPUT"
          echo "namespace=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "github.com/k1s0-org/k1s0" \
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.project }}/${{ steps.meta.outputs.service_name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: "3.16"   # devcontainer設計.md の Helm バージョンと同期
      # --atomic: デプロイ失敗時に自動ロールバック、--wait: Pod Ready まで待機、--timeout: 最大待機時間
      - name: Deploy to staging
        run: |
          helm upgrade --install ${{ steps.meta.outputs.service_name }} \
            ./infra/helm/services/${{ steps.meta.outputs.helm_path }} \
            -n ${{ steps.meta.outputs.namespace }} \
            -f ./infra/helm/services/${{ steps.meta.outputs.helm_path }}/values-staging.yaml \
            --set image.tag=${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }} \
            --atomic --wait --timeout 5m

  # ---------- Deploy to prod (manual approval) ----------
  # IMPORTANT: GitHub リポジトリ設定で prod 環境に Required reviewers（最低2名）を設定すること。
  # Settings → Environments → prod → Required reviewers
  # prod 環境へのデプロイ（手動承認が必要）
  deploy-prod:
    needs: [deploy-staging, detect-services]
    runs-on: [self-hosted, prod]
    # コードの読み取りと OIDC トークン（Cosign 署名検証）が必要
    permissions:
      contents: read
      id-token: write
    environment:
      name: prod
      url: https://api.k1s0.internal.example.com
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Set short SHA
        id: sha
        # SHA は 12 文字以上を使用し、リポジトリ拡大時の衝突リスクを低減する（M-009）
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Set version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Derive service metadata
        id: meta
        run: |
          # Tier 別のディレクトリ構成に基づきメタデータを導出:
          #   system/server/{lang}/{service}         → Helm: system/{service}
          #   business/{domain}/server/{lang}/{service} → Helm: business/{domain}/{service}
          #   service/{service}/server/{lang}        → Helm: service/{service}
          TIER=$(echo "${{ matrix.service }}" | cut -d'/' -f1)
          case "$TIER" in
            system)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f4)
              HELM_PATH="system/${SERVICE_NAME}"
              ;;
            business)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f5)
              HELM_PATH="business/${SERVICE_NAME}"
              ;;
            service)
              SERVICE_NAME=$(echo "${{ matrix.service }}" | cut -d'/' -f2)
              HELM_PATH="service/${SERVICE_NAME}"
              ;;
          esac
          echo "project=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
          echo "service_name=${SERVICE_NAME}" >> "$GITHUB_OUTPUT"
          echo "helm_path=${HELM_PATH}" >> "$GITHUB_OUTPUT"
          echo "namespace=k1s0-${TIER}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "github.com/k1s0-org/k1s0" \
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.project }}/${{ steps.meta.outputs.service_name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: "3.16"   # devcontainer設計.md の Helm バージョンと同期
      # --atomic: デプロイ失敗時に自動ロールバック、--wait: Pod Ready まで待機、--timeout: 最大待機時間
      - name: Deploy to prod
        run: |
          helm upgrade --install ${{ steps.meta.outputs.service_name }} \
            ./infra/helm/services/${{ steps.meta.outputs.helm_path }} \
            -n ${{ steps.meta.outputs.namespace }} \
            -f ./infra/helm/services/${{ steps.meta.outputs.helm_path }}/values-prod.yaml \
            --set image.tag=${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }} \
            --atomic --wait --timeout 5m
      # スモークテスト失敗時はデプロイ失敗として扱い、ワークフローを中止する
      - name: デプロイ後スモークテスト
        run: |
          echo "Waiting for rollout to complete..."
          kubectl rollout status deployment/${{ steps.meta.outputs.service_name }} -n ${{ steps.meta.outputs.namespace }} --timeout=120s
          echo "Running health check..."
          # サービスの言語を matrix.service パスから判定する:
          # system/server/go/* は Go サービス（distroless のため /busybox が存在しない）
          # それ以外（rust 等）は busybox の wget を使用する
          # 注意（M-008）: matrix.service の値は deploy.yaml 内の detect-services ジョブが生成するため、
          # 外部入力による任意コマンド実行リスクは低い。ただし、外部 PR からのトリガーや
          # 信頼できないソースからの matrix 値が混入しないよう、トリガー条件（push to main 等）を維持すること。
          LANG=$(echo "${{ matrix.service }}" | awk -F'/' '{for(i=1;i<=NF;i++) if ($i=="server") {print $(i+1); exit}}')
          if [ "$LANG" = "go" ]; then
            # Go サービスは distroless イメージを使用するため busybox が存在しない。
            # kubectl port-forward 経由でホスト側から curl でヘルスチェックを実施する。
            kubectl port-forward deploy/${{ steps.meta.outputs.service_name }} 18080:8080 -n ${{ steps.meta.outputs.namespace }} &
            PF_PID=$!
            sleep 2
            curl -sf --max-time 5 http://127.0.0.1:18080/healthz
            kill $PF_PID
          else
            # Rust サービスは busybox の wget を使用してコンテナ内からヘルスチェックを実施する。
            # ヘルスチェックのタイムアウトを5秒に設定し、無限待機を防止する
            kubectl exec deploy/${{ steps.meta.outputs.service_name }} -n ${{ steps.meta.outputs.namespace }} -- /busybox wget -qO- --timeout=5 http://127.0.0.1:8080/healthz
          fi
