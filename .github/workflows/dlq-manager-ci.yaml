# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/dlq-manager-ci.yaml
# Per-service CI pipeline for dlq-manager server（reusable workflow 経由）
name: dlq-manager-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'regions/system/server/rust/dlq-manager/**'

concurrency:
  group: dlq-manager-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_rust-service-ci.yaml
    with:
      service-path: regions/system/server/rust/dlq-manager
      package-name: k1s0-dlq-manager
      workspace-path: regions/system
