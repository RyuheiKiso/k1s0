# .github/workflows/api-lint.yaml
name: OpenAPI Lint

on:
  push:
    paths:
      - '**/api/openapi/**'

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

jobs:
  # OpenAPI 定義の検証
  openapi-validate:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Validate OpenAPI
        run: |
          npx @redocly/cli lint api/openapi/openapi.yaml

  # Go サーバーコード生成の検証
  openapi-codegen:
    needs: openapi-validate
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Generate Go server code
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
          oapi-codegen -config api/openapi/gen.yaml api/openapi/openapi.yaml
      - name: Verify no diff
        run: git diff --exit-code

  # TypeScript SDK 生成の検証
  sdk-generate-typescript:
    needs: openapi-validate
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Generate TypeScript SDK
        run: |
          npx @openapitools/openapi-generator-cli generate \
            -i api/openapi/openapi.yaml \
            -g typescript-axios \
            -o gen/ts-client \
            --additional-properties=supportsES6=true
      - name: Verify no diff
        run: git diff --exit-code gen/ts-client

  # Dart SDK 生成の検証
  sdk-generate-dart:
    needs: openapi-validate
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Generate Dart SDK
        run: |
          npx @openapitools/openapi-generator-cli generate \
            -i api/openapi/openapi.yaml \
            -g dart \
            -o gen/dart-client
      - name: Verify no diff
        run: git diff --exit-code gen/dart-client
