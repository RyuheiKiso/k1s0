# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/_lint.yaml
# 全言語の lint ジョブを集約した再利用可能ワークフロー
# ci.yaml から workflow_call で呼び出す
name: _lint

permissions: {}

on:
  workflow_call:
    inputs:
      # detect-changes の出力を受け取る（変更があった言語のみ lint を実行する）
      go:
        type: string
        required: false
        default: 'false'
      rust:
        type: string
        required: false
        default: 'false'
      ts:
        type: string
        required: false
        default: 'false'
      dart:
        type: string
        required: false
        default: 'false'
      proto:
        type: string
        required: false
        default: 'false'
      shell:
        type: string
        required: false
        default: 'false'
      # detect-modules の出力を受け取る（影響モジュールの絞り込みに使用する）
      go_modules:
        type: string
        required: false
        default: ''
      rust_modules:
        type: string
        required: false
        default: ''
      ts_modules:
        type: string
        required: false
        default: ''
      dart_modules:
        type: string
        required: false
        default: ''

jobs:
  # Go コードの静的解析
  lint-go:
    if: inputs.go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.24.4"
          cache-dependency-path: "go.work.sum"
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Lint Go modules
        shell: bash
        env:
          AFFECTED_MODULES: ${{ inputs.go_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#go:}"
              if [ -d "$dir" ] && [ -f "$dir/go.mod" ]; then
                echo "=== Linting $dir ==="
                (cd "$dir" && golangci-lint run ./... && go vet ./...)
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            mapfile -t modules < <(scripts/list-modules.sh --lang go --no-skip-ci)
            for dir in "${modules[@]}"; do
              echo "=== Linting $dir ==="
              (cd "$dir" && golangci-lint run ./... && go vet ./...)
            done
          fi

  # Rust コードの静的解析
  lint-rust:
    if: inputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93 — Dockerイメージ戦略.md / devcontainer設計.md と同期
        with:
          components: clippy, rustfmt
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            regions/system
            CLI
            regions/business/accounting/server/rust/domain-master
            regions/service/inventory/server/rust/inventory
            regions/service/order/server/rust/order
            regions/service/payment/server/rust/payment
      - name: Format check Rust crates
        shell: bash
        env:
          AFFECTED_MODULES: ${{ inputs.rust_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#rust:}"
              if [ -d "$dir" ] && [ -f "$dir/Cargo.toml" ]; then
                echo "=== fmt $dir ==="
                cargo fmt --manifest-path "$dir/Cargo.toml" --all -- --check
              fi
            done
          else
            echo "=== fmt regions/system ==="
            cargo fmt --all --manifest-path regions/system/Cargo.toml -- --check
            echo "=== fmt CLI ==="
            cargo fmt --all --manifest-path CLI/Cargo.toml -- --check
          fi
      - name: Clippy check Rust crates
        shell: bash
        env:
          AFFECTED_MODULES: ${{ inputs.rust_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#rust:}"
              if [ -d "$dir" ] && [ -f "$dir/Cargo.toml" ]; then
                echo "=== clippy $dir ==="
                cargo clippy --manifest-path "$dir/Cargo.toml" --all-targets -- -D warnings
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            excludes=""
            while IFS= read -r dir; do
              pkg_name=$(grep -m1 '^name' "$dir/Cargo.toml" | sed 's/.*"\(.*\)"/\1/')
              excludes="$excludes --exclude $pkg_name"
            done < <(scripts/list-modules.sh --lang rust --status experimental)
            ws_packages=$(grep -rh '^name' regions/system/*/Cargo.toml regions/system/*/*/Cargo.toml regions/system/*/*/*/Cargo.toml regions/system/*/*/*/*/Cargo.toml 2>/dev/null | sed 's/.*"\(.*\)"/\1/')
            for exc in $excludes; do
              if [ "$exc" = "--exclude" ]; then continue; fi
              if ! echo "$ws_packages" | grep -qx "$exc"; then
                echo "ERROR: excluded package '$exc' not found in workspace"
                exit 1
              fi
            done
            echo "=== clippy regions/system ==="
            cargo clippy --manifest-path regions/system/Cargo.toml --workspace $excludes --all-targets -- -D warnings
            echo "=== clippy CLI ==="
            cargo clippy --manifest-path CLI/Cargo.toml --workspace --exclude k1s0-gui --all-targets -- -D warnings
          fi
      - name: Compile check tests (no run)
        shell: bash
        env:
          AFFECTED_MODULES: ${{ inputs.rust_modules }}
        run: |
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#rust:}"
              if [ -d "$dir" ] && [ -f "$dir/Cargo.toml" ]; then
                echo "=== test --no-run $dir ==="
                cargo test --no-run --manifest-path "$dir/Cargo.toml" --all
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            excludes=""
            while IFS= read -r dir; do
              pkg_name=$(grep -m1 '^name' "$dir/Cargo.toml" | sed 's/.*"\(.*\)"/\1/')
              excludes="$excludes --exclude $pkg_name"
            done < <(scripts/list-modules.sh --lang rust --status experimental)
            echo "=== test --no-run regions/system ==="
            cargo test --no-run --manifest-path regions/system/Cargo.toml --workspace $excludes
            echo "=== test --no-run CLI ==="
            cargo test --no-run --manifest-path CLI/Cargo.toml --workspace --exclude k1s0-gui
          fi
      - name: Check for deprecated axum route syntax
        shell: bash
        run: |
          if grep -rn '/:[a-zA-Z_]' --include='*.rs' regions/*/server/rust/*/src/adapter/handler/ regions/*/server/rust/*/src/adapter/middleware/ regions/*/*/server/rust/*/src/adapter/handler/ 2>/dev/null; then
            echo "::error::axum 旧記法 :param が検出されました。{param} を使用してください。"
            exit 1
          fi

  # TypeScript コードの静的解析
  lint-ts:
    if: inputs.ts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: pnpm/action-setup@fe02b74ab4e416c4c7bab5f6b855b3dfcebc46e2 # v4
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: 'pnpm'
      - name: Lint TypeScript packages
        shell: bash
        env:
          AFFECTED_MODULES: ${{ inputs.ts_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#ts:}"
              if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
                echo "=== Linting $dir ==="
                (
                  cd "$dir"
                  pnpm install --frozen-lockfile
                  pnpm run lint
                  pnpm run typecheck
                )
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            mapfile -t packages < <(scripts/list-modules.sh --lang ts --no-skip-ci)
            for package_dir in "${packages[@]}"; do
              echo "=== Linting $package_dir ==="
              (
                cd "$package_dir"
                pnpm install --frozen-lockfile
                pnpm run lint
                pnpm run typecheck
              )
            done
          fi

  # Dart/Flutter コードの静的解析
  lint-dart:
    if: inputs.dart == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          flutter-version: "3.24.0"
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.pub-cache
          key: dart-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: dart-pub-
      - name: Lint Dart and Flutter packages
        shell: bash
        env:
          AFFECTED_MODULES: ${{ inputs.dart_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#dart:}"
              if [ -d "$dir" ] && [ -f "$dir/pubspec.yaml" ]; then
                echo "=== Linting $dir ==="
                if grep -q "sdk: flutter" "$dir/pubspec.yaml"; then
                  (cd "$dir" && flutter pub get && flutter analyze)
                else
                  (cd "$dir" && dart pub get && dart analyze)
                fi
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            mapfile -t packages < <(scripts/list-modules.sh --lang dart --no-skip-ci)
            for package_dir in "${packages[@]}"; do
              echo "=== Linting $package_dir ==="
              if grep -q "sdk: flutter" "$package_dir/pubspec.yaml"; then
                (cd "$package_dir" && flutter pub get && flutter analyze)
              else
                (cd "$package_dir" && dart pub get && dart analyze)
              fi
            done
          fi

  # シェルスクリプトの静的解析
  lint-shell:
    if: inputs.shell == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: shellcheck のインストール
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: シェルスクリプトの静的解析
        run: find scripts/ -name '*.sh' -exec shellcheck {} +

  # modules.yaml とファイルシステム・CI ワークフローの整合性検証
  check-modules-consistency:
    if: inputs.shell == 'true' || inputs.rust == 'true' || inputs.go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.12'
      - name: PyYAML インストール
        run: pip install pyyaml
      - name: modules.yaml 整合性チェック
        run: bash scripts/check-modules-consistency.sh

  # Protocol Buffers のリント・破壊的変更検出
  lint-proto:
    if: inputs.proto == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.47.2"
      - name: buf lint
        run: buf lint api/proto
      - name: buf breaking change detection
        run: buf breaking api/proto --against '.git#branch=main'
