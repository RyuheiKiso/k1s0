# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/policy-ci.yaml
# Per-service CI pipeline for policy server（H-02 監査対応: CI 未設定サービスに個別 CI を追加）
name: policy-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'regions/system/server/rust/policy/**'

concurrency:
  group: policy-ci-${{ github.ref }}
  cancel-in-progress: true

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

jobs:
  # 再利用可能ワークフローを呼び出してCI実行
  ci:
    # コードの読み取りのみ必要
    permissions:
      contents: read
    uses: ./.github/workflows/_rust-service-ci.yaml
    with:
      service-path: regions/system/server/rust/policy
      package-name: k1s0-policy-server
      workspace-path: regions/system
