# .github/workflows/ci.yaml
# CI オーケストレーター — detect → lint → test → build の順序で再利用可能ワークフローを呼び出す
# 各ステップの実装は _lint.yaml / _test.yaml / _build.yaml / _validate.yaml に分割されている
name: CI

# 個別サービス CI ワークフロー (*-ci.yaml) がカバーするパスを除外し、CI の重複実行を防止する
on:
  pull_request:
    branches: [main]
    paths-ignore:
      # C-06 対応: サブディレクトリを明示的に除外する（広すぎる除外は死角を生む）
      #
      # ========== paths-ignore 維持管理注意 ==========
      # 以下のパスを除外しているのは、それぞれ個別CI（*-ci.yaml）が存在するためである。
      # 個別CIのトリガーパス（paths:）を変更した場合は、このファイルの paths-ignore も
      # 必ず同時に更新すること（更新漏れはCI二重実行または検出漏れを引き起こす）。
      #
      # CICD-01 対応: paths-ignore の整合性は scripts/sync-paths-ignore.sh で機械的に検証する。
      # CI の check-paths-ignore ジョブが差異を自動検出するため、手動更新漏れは CI で検知される。
      #
      # 個別CI一覧とカバーパスの対応:
      #   activity-ci.yaml        → regions/service/activity/{server,client,database}/**
      #   api-registry-ci.yaml    → regions/system/server/rust/api-registry/**
      #   app-registry-ci.yaml    → regions/system/server/rust/app-registry/**
      #   auth-ci.yaml            → regions/system/server/rust/auth/**
      #   bff-proxy-ci.yaml       → regions/system/server/go/bff-proxy/**
      #   board-ci.yaml           → regions/service/board/{server,client,database}/**
      #   config-ci.yaml          → regions/system/server/rust/config/**
      #   dlq-manager-ci.yaml     → regions/system/server/rust/dlq-manager/**
      #   event-monitor-ci.yaml   → regions/system/server/rust/event-monitor/**
      #   event-store-ci.yaml     → regions/system/server/rust/event-store/**
      #   featureflag-ci.yaml     → regions/system/server/rust/featureflag/**
      #   file-ci.yaml            → regions/system/server/rust/file/**
      #   graphql-gateway-ci.yaml → regions/system/server/rust/graphql-gateway/**
      #   master-maintenance-ci.yaml → regions/system/server/rust/master-maintenance/**
      #   navigation-ci.yaml      → regions/system/server/rust/navigation/**
      #   notification-ci.yaml    → regions/system/server/rust/notification/**
      #   policy-ci.yaml          → regions/system/server/rust/policy/**
      #   project-master-ci.yaml  → regions/business/taskmanagement/**
      #   quota-ci.yaml           → regions/system/server/rust/quota/**
      #   ratelimit-ci.yaml       → regions/system/server/rust/ratelimit/**
      #   rule-engine-ci.yaml     → regions/system/server/rust/rule-engine/**
      #   saga-ci.yaml            → regions/system/server/rust/saga/**
      #   scheduler-ci.yaml       → regions/system/server/rust/scheduler/**
      #   search-ci.yaml          → regions/system/server/rust/search/**
      #   service-catalog-ci.yaml → regions/system/server/rust/service-catalog/**
      #   session-ci.yaml         → regions/system/server/rust/session/**
      #   task-ci.yaml            → regions/service/task/{server,client,database}/**
      #   tenant-ci.yaml          → regions/system/server/rust/tenant/**
      #   vault-ci.yaml           → regions/system/server/rust/vault/**
      #   workflow-ci.yaml        → regions/system/server/rust/workflow/**
      #
      # ---------- 更新手順 ----------
      # 新しいサービスの個別CIを追加する場合:
      #   1. 新しい {service}-ci.yaml に paths: トリガーを設定する
      #   2. このファイルの paths-ignore に同じパスを追加する
      #   3. deploy.yaml の paths-ignore にも同様の除外を追加する（デプロイ重複防止）
      #   4. bash scripts/sync-paths-ignore.sh で整合性を確認する
      # サービスを廃止する場合:
      #   1. {service}-ci.yaml を削除する
      #   2. このファイルの paths-ignore から対応するエントリを削除する
      #   3. deploy.yaml の paths-ignore からも対応エントリを削除する
      # ================================================
      - 'regions/service/activity/server/**'
      - 'regions/service/activity/client/**'
      - 'regions/service/activity/database/**'
      - 'regions/system/server/rust/api-registry/**'
      - 'regions/system/server/rust/app-registry/**'
      - 'regions/system/server/rust/auth/**'
      - 'regions/system/server/go/bff-proxy/**'
      - 'regions/service/board/server/**'
      - 'regions/service/board/client/**'
      - 'regions/service/board/database/**'
      - 'regions/system/server/rust/config/**'
      - 'regions/system/server/rust/dlq-manager/**'
      - 'regions/system/server/rust/event-monitor/**'
      - 'regions/system/server/rust/event-store/**'
      - 'regions/system/server/rust/featureflag/**'
      - 'regions/system/server/rust/file/**'
      - 'regions/system/server/rust/graphql-gateway/**'
      - 'regions/system/server/rust/master-maintenance/**'
      - 'regions/system/server/rust/navigation/**'
      - 'regions/system/server/rust/notification/**'
      - 'regions/system/server/rust/policy/**'
      - 'regions/business/taskmanagement/**'
      - 'regions/system/server/rust/quota/**'
      - 'regions/system/server/rust/ratelimit/**'
      - 'regions/system/server/rust/rule-engine/**'
      - 'regions/system/server/rust/saga/**'
      - 'regions/system/server/rust/scheduler/**'
      - 'regions/system/server/rust/search/**'
      - 'regions/system/server/rust/service-catalog/**'
      - 'regions/system/server/rust/session/**'
      - 'regions/service/task/server/**'
      - 'regions/service/task/client/**'
      - 'regions/service/task/database/**'
      - 'regions/system/server/rust/tenant/**'
      - 'regions/system/server/rust/vault/**'
      - 'regions/system/server/rust/workflow/**'
  schedule:
    # フラッキーテスト検知のため毎日 03:00 UTC に定期実行する（L-02 対応）
    # 統計的に不安定なテストを翌日以内に検知するため日次実行に変更
    - cron: '0 3 * * *'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

jobs:
  # CICD-01 監査対応: paths-ignore の整合性を自動検証する
  # サービス固有 CI (*-ci.yaml) の paths: と ci.yaml の paths-ignore の差異を検出する
  check-paths-ignore:
    name: Verify paths-ignore sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Check paths-ignore consistency
        run: bash scripts/sync-paths-ignore.sh

  # ---------- Step 1: 変更検出 ----------
  # ファイル変更の検出（言語ごとのフィルタリング）
  # schedule トリガー時は全言語を true にして全テストを実行する（変更検出をバイパス）
  detect-changes:
    runs-on: ubuntu-latest
    # コードの読み取りと PR 情報の読み取り（paths-filter）が必要
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # schedule 時は全言語を 'true' にして全テストを実行する
      go: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.go }}
      rust: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.rust }}
      ts: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.ts }}
      dart: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.dart }}
      proto: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.proto }}
      helm: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.helm }}
      docker: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.docker }}
      shell: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      # schedule トリガー時は paths-filter をスキップし、全言語を処理対象にする
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        if: github.event_name != 'schedule'
        with:
          filters: |
            go:
              - 'regions/**/go/**'
              - 'CLI/**/go/**'
            rust:
              - 'regions/**/rust/**'
              - 'CLI/**'
            ts:
              - 'regions/**/client/react/**'
              - 'regions/**/library/typescript/**'
              - 'CLI/**/package.json'
              - 'CLI/**/package-lock.json'
              - 'CLI/**/tsconfig*.json'
              - 'CLI/**/*.ts'
              - 'CLI/**/*.tsx'
            dart:
              - 'regions/**/client/flutter/**'
              - 'regions/**/library/dart/**'
            proto:
              - 'api/proto/**'
            helm:
              - 'infra/helm/**'
            docker:
              - 'regions/**/Dockerfile'
            shell:
              - 'scripts/**'
              - 'modules.yaml'
              - 'justfile'

  # モジュール単位の変更検出ジョブ（各言語ジョブで影響範囲を絞り込むために使用）
  # 検出失敗は即座に可視化されるべきため continue-on-error は設定しない
  detect-modules:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    outputs:
      go_modules: ${{ steps.modules.outputs.go_modules }}
      rust_modules: ${{ steps.modules.outputs.rust_modules }}
      ts_modules: ${{ steps.modules.outputs.ts_modules }}
      dart_modules: ${{ steps.modules.outputs.dart_modules }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Detect affected modules
        id: modules
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          # detect-affected-modules.sh を使って言語ごとの影響モジュールを検出
          # schedule トリガー時は go_modules 等を空文字列にして _test.yaml が全モジュールを処理する
          chmod +x scripts/detect-affected-modules.sh
          go_mods=$(scripts/detect-affected-modules.sh "$BASE_REF" go | paste -sd ',' - || echo "")
          rust_mods=$(scripts/detect-affected-modules.sh "$BASE_REF" rust | paste -sd ',' - || echo "")
          ts_mods=$(scripts/detect-affected-modules.sh "$BASE_REF" ts | paste -sd ',' - || echo "")
          dart_mods=$(scripts/detect-affected-modules.sh "$BASE_REF" dart | paste -sd ',' - || echo "")
          echo "go_modules=$go_mods" >> "$GITHUB_OUTPUT"
          echo "rust_modules=$rust_mods" >> "$GITHUB_OUTPUT"
          echo "ts_modules=$ts_mods" >> "$GITHUB_OUTPUT"
          echo "dart_modules=$dart_mods" >> "$GITHUB_OUTPUT"
          echo "Affected Go modules: $go_mods"
          echo "Affected Rust modules: $rust_mods"
          echo "Affected TS modules: $ts_mods"
          echo "Affected Dart modules: $dart_mods"

  # ---------- Step 2: Lint（検出結果を _lint.yaml へ渡す） ----------
  # lint は detect-changes/detect-modules の出力を inputs として受け取り、変更言語のみ処理する
  lint:
    needs: [detect-changes, detect-modules]
    uses: ./.github/workflows/_lint.yaml
    with:
      go: ${{ needs.detect-changes.outputs.go }}
      rust: ${{ needs.detect-changes.outputs.rust }}
      ts: ${{ needs.detect-changes.outputs.ts }}
      dart: ${{ needs.detect-changes.outputs.dart }}
      proto: ${{ needs.detect-changes.outputs.proto }}
      shell: ${{ needs.detect-changes.outputs.shell }}
      go_modules: ${{ needs.detect-modules.outputs.go_modules }}
      rust_modules: ${{ needs.detect-modules.outputs.rust_modules }}
      ts_modules: ${{ needs.detect-modules.outputs.ts_modules }}
      dart_modules: ${{ needs.detect-modules.outputs.dart_modules }}

  # ---------- Step 3: Test（lint 完了後に実行） ----------
  test:
    needs: [lint, detect-changes, detect-modules]
    uses: ./.github/workflows/_test.yaml
    with:
      go: ${{ needs.detect-changes.outputs.go }}
      rust: ${{ needs.detect-changes.outputs.rust }}
      ts: ${{ needs.detect-changes.outputs.ts }}
      dart: ${{ needs.detect-changes.outputs.dart }}
      go_modules: ${{ needs.detect-modules.outputs.go_modules }}
      rust_modules: ${{ needs.detect-modules.outputs.rust_modules }}
      ts_modules: ${{ needs.detect-modules.outputs.ts_modules }}
      dart_modules: ${{ needs.detect-modules.outputs.dart_modules }}

  # ---------- Step 4: Build（test 完了後に実行） ----------
  build:
    needs: [test, detect-changes]
    uses: ./.github/workflows/_build.yaml
    with:
      go: ${{ needs.detect-changes.outputs.go }}
      rust: ${{ needs.detect-changes.outputs.rust }}
      ts: ${{ needs.detect-changes.outputs.ts }}
      docker: ${{ needs.detect-changes.outputs.docker }}

  # ---------- Step 5: Validate（detect 完了後に lint/test/build と並行実行） ----------
  # セキュリティ・整合性・設定の検証は言語変更に依存しないため並行実行できる
  validate:
    needs: [detect-changes]
    uses: ./.github/workflows/_validate.yaml
    with:
      helm: ${{ needs.detect-changes.outputs.helm }}
