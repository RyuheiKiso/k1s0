# .github/workflows/ci.yaml
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      ts: ${{ steps.filter.outputs.ts }}
      dart: ${{ steps.filter.outputs.dart }}
      helm: ${{ steps.filter.outputs.helm }}
      docker: ${{ steps.filter.outputs.docker }}
      shell: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'regions/**/go/**'
              - 'CLI/**/go/**'
            rust:
              - 'regions/**/rust/**'
              - 'CLI/**'
            ts:
              - 'regions/**/client/react/**'
              - 'regions/**/library/typescript/**'
              - 'CLI/**/package.json'
              - 'CLI/**/package-lock.json'
              - 'CLI/**/tsconfig*.json'
              - 'CLI/**/*.ts'
              - 'CLI/**/*.tsx'
            dart:
              - 'regions/**/client/flutter/**'
              - 'regions/**/library/dart/**'
            helm:
              - 'infra/helm/**'
            docker:
              - 'regions/**/Dockerfile'
            shell:
              - 'scripts/**/*.sh'

  # モジュール単位の変更検出ジョブ（各言語ジョブで影響範囲を絞り込むために使用）
  # スクリプト失敗時は下流ジョブをブロックしないよう continue-on-error を設定
  detect-modules:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      go_modules: ${{ steps.modules.outputs.go_modules }}
      rust_modules: ${{ steps.modules.outputs.rust_modules }}
      ts_modules: ${{ steps.modules.outputs.ts_modules }}
      dart_modules: ${{ steps.modules.outputs.dart_modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect affected modules
        id: modules
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          # detect-affected-modules.sh を使って言語ごとの影響モジュールを検出
          chmod +x scripts/detect-affected-modules.sh
          go_mods=$(scripts/detect-affected-modules.sh "$BASE_REF" go | paste -sd ',' - || echo "")
          rust_mods=$(scripts/detect-affected-modules.sh "$BASE_REF" rust | paste -sd ',' - || echo "")
          ts_mods=$(scripts/detect-affected-modules.sh "$BASE_REF" ts | paste -sd ',' - || echo "")
          dart_mods=$(scripts/detect-affected-modules.sh "$BASE_REF" dart | paste -sd ',' - || echo "")
          echo "go_modules=$go_mods" >> "$GITHUB_OUTPUT"
          echo "rust_modules=$rust_mods" >> "$GITHUB_OUTPUT"
          echo "ts_modules=$ts_mods" >> "$GITHUB_OUTPUT"
          echo "dart_modules=$dart_mods" >> "$GITHUB_OUTPUT"
          echo "Affected Go modules: $go_mods"
          echo "Affected Rust modules: $rust_mods"
          echo "Affected TS modules: $ts_mods"
          echo "Affected Dart modules: $dart_mods"

  lint-go:
    needs: [detect-changes, detect-modules]
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Lint Go modules
        shell: bash
        env:
          AFFECTED_MODULES: ${{ needs.detect-modules.outputs.go_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#go:}"
              if [ -d "$dir" ] && [ -f "$dir/go.mod" ]; then
                echo "=== Linting $dir ==="
                (cd "$dir" && golangci-lint run ./... && go vet ./...)
              fi
            done
          else
            mapfile -t modules < <(rg --files -g 'go.mod' regions CLI | sort)
            for mod in "${modules[@]}"; do
              dir="$(dirname "$mod")"
              echo "=== Linting $dir ==="
              (cd "$dir" && golangci-lint run ./... && go vet ./...)
            done
          fi

  lint-rust:
    needs: [detect-changes, detect-modules]
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93       # Dockerイメージ戦略.md / devcontainer設計.md と同期
        with:
          components: clippy, rustfmt
      - name: Format check Rust crates
        shell: bash
        run: |
          mapfile -t manifests < <(rg --files -g 'Cargo.toml' regions CLI | sort)
          for manifest in "${manifests[@]}"; do
            case "$manifest" in
              CLI/Cargo.toml|regions/system/Cargo.toml|CLI/crates/k1s0-gui/Cargo.toml|regions/system/server/rust/ai-agent/Cargo.toml|regions/system/server/rust/ai-gateway/Cargo.toml)
                continue
                ;;
            esac
            echo "=== fmt $(dirname "$manifest") ==="
            cargo fmt --manifest-path "$manifest" --all -- --check
          done
      - name: Clippy check Rust crates
        shell: bash
        run: |
          mapfile -t manifests < <(rg --files -g 'Cargo.toml' regions CLI | sort)
          for manifest in "${manifests[@]}"; do
            case "$manifest" in
              CLI/Cargo.toml|regions/system/Cargo.toml|CLI/crates/k1s0-gui/Cargo.toml|regions/system/server/rust/ai-agent/Cargo.toml|regions/system/server/rust/ai-gateway/Cargo.toml)
                continue
                ;;
            esac
            echo "=== clippy $(dirname "$manifest") ==="
            cargo clippy --manifest-path "$manifest" --all-targets -- -D warnings
          done

  lint-ts:
    needs: [detect-changes, detect-modules]
    if: needs.detect-changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Lint TypeScript packages
        shell: bash
        run: |
          mapfile -t packages < <(rg --files -g 'package.json' regions CLI | sort | xargs -n1 dirname)
          for package_dir in "${packages[@]}"; do
            echo "=== Linting $package_dir ==="
            (
              cd "$package_dir"
              if [ -f package-lock.json ]; then
                npm ci
              else
                npm install --no-package-lock
              fi
              npm run lint --if-present
              npm run typecheck --if-present
            )
          done

  lint-dart:
    needs: [detect-changes, detect-modules]
    if: needs.detect-changes.outputs.dart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"              # devcontainer設計.md と同期
      - name: Lint Dart and Flutter packages
        shell: bash
        run: |
          mapfile -t packages < <(rg --files -g 'pubspec.yaml' regions CLI | sort | xargs -n1 dirname)
          for package_dir in "${packages[@]}"; do
            echo "=== Linting $package_dir ==="
            if grep -q "sdk: flutter" "$package_dir/pubspec.yaml"; then
              (
                cd "$package_dir"
                flutter pub get
                flutter analyze
              )
            else
              (
                cd "$package_dir"
                dart pub get
                dart analyze
              )
            fi
          done

  # シェルスクリプトの静的解析ジョブ
  lint-shell:
    needs: detect-changes
    if: needs.detect-changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck のインストール
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: シェルスクリプトの静的解析
        run: find scripts/ -name '*.sh' -exec shellcheck {} +

  test-go:
    needs: [lint-go, detect-modules]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Test Go modules
        shell: bash
        env:
          AFFECTED_MODULES: ${{ needs.detect-modules.outputs.go_modules }}
        run: |
          mkdir -p coverage
          # 影響モジュールが検出された場合はそのモジュールのみテストする
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#go:}"
              if [ -d "$dir" ] && [ -f "$dir/go.mod" ]; then
                modname="$(basename "$dir")"
                echo "=== Testing $dir ==="
                (cd "$dir" && go test ./... -race -count=1 -coverprofile="$GITHUB_WORKSPACE/coverage/${modname}.out")
              fi
            done
          else
            mapfile -t modules < <(rg --files -g 'go.mod' regions CLI | sort)
            for mod in "${modules[@]}"; do
              dir="$(dirname "$mod")"
              modname="$(basename "$dir")"
              echo "=== Testing $dir ==="
              (cd "$dir" && go test ./... -race -count=1 -coverprofile="$GITHUB_WORKSPACE/coverage/${modname}.out")
            done
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage
          path: coverage/

  test-rust:
    needs: lint-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93       # Dockerイメージ戦略.md / devcontainer設計.md と同期
      - name: Test Rust crates
        shell: bash
        run: |
          mapfile -t manifests < <(rg --files -g 'Cargo.toml' regions CLI | sort)
          for manifest in "${manifests[@]}"; do
            case "$manifest" in
              CLI/Cargo.toml|regions/system/Cargo.toml|CLI/crates/k1s0-gui/Cargo.toml|regions/system/server/rust/ai-agent/Cargo.toml|regions/system/server/rust/ai-gateway/Cargo.toml)
                continue
                ;;
            esac
            echo "=== Testing $(dirname "$manifest") ==="
            cargo test --manifest-path "$manifest" --all
          done

  # Rust テストカバレッジ計測ジョブ（cargo-tarpaulin を使用）
  coverage-rust:
    needs: lint-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
      - name: cargo-tarpaulin インストール（プリビルドバイナリ）
        run: |
          TARPAULIN_VERSION="0.31.2"
          curl -sL "https://github.com/xd009642/tarpaulin/releases/download/${TARPAULIN_VERSION}/cargo-tarpaulin-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C "$HOME/.cargo/bin"
          chmod +x "$HOME/.cargo/bin/cargo-tarpaulin"
      - name: Rust テストカバレッジ計測
        shell: bash
        run: |
          mkdir -p coverage
          # regions/system ワークスペースのカバレッジを計測する
          cargo tarpaulin \
            --manifest-path regions/system/Cargo.toml \
            --workspace \
            --exclude-files "*/tests/*" "*/proto/*" \
            --skip-clean \
            --timeout 300 \
            --out Json Html \
            --output-dir coverage/system \
            || echo "::warning::tarpaulin exited with non-zero (some crates may have failed)"
          # CLI ワークスペースのカバレッジを計測する（GUI クレートを除外）
          cargo tarpaulin \
            --manifest-path CLI/Cargo.toml \
            --workspace \
            --exclude k1s0-gui \
            --exclude-files "*/tests/*" \
            --skip-clean \
            --timeout 300 \
            --out Json Html \
            --output-dir coverage/cli \
            || echo "::warning::tarpaulin exited with non-zero (some crates may have failed)"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-coverage
          path: coverage/

  test-ts:
    needs: lint-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test TypeScript packages
        shell: bash
        run: |
          mapfile -t packages < <(rg --files -g 'package.json' regions CLI | sort | xargs -n1 dirname)
          for package_dir in "${packages[@]}"; do
            echo "=== Testing $package_dir ==="
            (
              cd "$package_dir"
              if [ -f package-lock.json ]; then
                npm ci
              else
                npm install --no-package-lock
              fi
              npm test --if-present
            )
          done

  test-dart:
    needs: lint-dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"              # devcontainer設計.md と同期
      - name: Test Dart and Flutter packages
        shell: bash
        run: |
          mapfile -t packages < <(rg --files -g 'pubspec.yaml' regions CLI | sort | xargs -n1 dirname)
          for package_dir in "${packages[@]}"; do
            echo "=== Testing $package_dir ==="
            if grep -q "sdk: flutter" "$package_dir/pubspec.yaml"; then
              (
                cd "$package_dir"
                flutter pub get
                flutter test
              )
            else
              (
                cd "$package_dir"
                dart pub get
                dart test
              )
            fi
          done

  build-go:
    needs: test-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build Go modules
        shell: bash
        run: |
          mapfile -t modules < <(rg --files -g 'go.mod' regions CLI | sort)
          for mod in "${modules[@]}"; do
            dir="$(dirname "$mod")"
            echo "=== Building $dir ==="
            (
              cd "$dir"
              go build ./...
            )
          done

  build-rust:
    needs: test-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
      - name: Build Rust crates
        shell: bash
        run: |
          mapfile -t manifests < <(rg --files -g 'Cargo.toml' regions CLI | sort)
          for manifest in "${manifests[@]}"; do
            case "$manifest" in
              CLI/Cargo.toml|regions/system/Cargo.toml|CLI/crates/k1s0-gui/Cargo.toml|regions/system/server/rust/ai-agent/Cargo.toml|regions/system/server/rust/ai-gateway/Cargo.toml)
                continue
                ;;
            esac
            echo "=== Building $(dirname "$manifest") ==="
            cargo build --manifest-path "$manifest" --all-targets
          done

  build-ts:
    needs: test-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build TypeScript packages
        shell: bash
        run: |
          mapfile -t packages < <(rg --files -g 'package.json' regions CLI | sort | xargs -n1 dirname)
          for package_dir in "${packages[@]}"; do
            echo "=== Building $package_dir ==="
            (
              cd "$package_dir"
              if [ -f package-lock.json ]; then
                npm ci
              else
                npm install --no-package-lock
              fi
              npm run build --if-present
            )
          done

  build-docker:
    needs:
      - detect-changes
      - build-go
      - build-rust
    if: always() && !contains(needs.*.result, 'failure') && (needs.detect-changes.outputs.docker == 'true' || needs.detect-changes.outputs.go == 'true' || needs.detect-changes.outputs.rust == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build service Docker images
        shell: bash
        run: |
          mapfile -t rust_dockerfiles < <(rg --files regions/system/server/rust -g 'Dockerfile' | sort)
          for dockerfile in "${rust_dockerfiles[@]}"; do
            server_name="$(basename "$(dirname "$dockerfile")")"
            tag="ci-${server_name}"
            echo "=== docker build $dockerfile ==="
            if [ "$server_name" = "graphql-gateway" ]; then
              # graphql-gateway needs repo root context for api/proto access
              docker build -f "$dockerfile" -t "$tag" .
            else
              docker build -f "regions/system/${dockerfile#regions/system/}" -t "$tag" regions/system
            fi
          done
          echo "=== docker build regions/system/server/go/bff-proxy/Dockerfile ==="
          docker build -t ci-bff-proxy regions/system/server/go/bff-proxy
          # Business tier
          if [ -f regions/business/accounting/server/rust/domain-master/Dockerfile ]; then
            echo "=== docker build domain-master ==="
            docker build -f regions/business/accounting/server/rust/domain-master/Dockerfile -t ci-domain-master .
          fi

  # --- 実験系 ai-* クレート（continue-on-error で可視性を維持） ---
  check-ai-experimental:
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
        with:
          components: clippy
      - name: Check ai-agent
        continue-on-error: true
        run: cargo check --manifest-path regions/system/server/rust/ai-agent/Cargo.toml --all-targets
      - name: Check ai-gateway
        continue-on-error: true
        run: cargo check --manifest-path regions/system/server/rust/ai-gateway/Cargo.toml --all-targets
      - name: Clippy ai-agent
        continue-on-error: true
        run: cargo clippy --manifest-path regions/system/server/rust/ai-agent/Cargo.toml --all-targets -- -D warnings
      - name: Clippy ai-gateway
        continue-on-error: true
        run: cargo clippy --manifest-path regions/system/server/rust/ai-gateway/Cargo.toml --all-targets -- -D warnings

  # NOTE: proto チェックは専用ワークフロー proto.yaml で実行する。
  # ci.yaml の detect-changes で proto 変更を検出し、proto.yaml が独立してトリガーされる。

  helm-lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "3.16"   # devcontainer設計.md の Helm バージョンと同期
      - run: |
          for chart in infra/helm/services/*/* infra/helm/services/*/*/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              helm lint "$chart"
            fi
          done

  build:
    needs:
      - build-go
      - build-rust
      - build-ts
      - test-dart
      - build-docker
    if: always() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build validation summary
        run: echo "All language and Docker builds passed"

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
