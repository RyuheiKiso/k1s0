# .github/workflows/ci.yaml
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      ts: ${{ steps.filter.outputs.ts }}
      dart: ${{ steps.filter.outputs.dart }}
      proto: ${{ steps.filter.outputs.proto }}
      helm: ${{ steps.filter.outputs.helm }}
      docker: ${{ steps.filter.outputs.docker }}
      shell: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - 'regions/**/go/**'
              - 'CLI/**/go/**'
            rust:
              - 'regions/**/rust/**'
              - 'CLI/**'
            ts:
              - 'regions/**/client/react/**'
              - 'regions/**/library/typescript/**'
              - 'CLI/**/package.json'
              - 'CLI/**/package-lock.json'
              - 'CLI/**/tsconfig*.json'
              - 'CLI/**/*.ts'
              - 'CLI/**/*.tsx'
            dart:
              - 'regions/**/client/flutter/**'
              - 'regions/**/library/dart/**'
            proto:
              - 'api/proto/**'
            helm:
              - 'infra/helm/**'
            docker:
              - 'regions/**/Dockerfile'
            shell:
              - 'scripts/**/*.sh'

  # モジュール単位の変更検出ジョブ（各言語ジョブで影響範囲を絞り込むために使用）
  # 検出失敗は即座に可視化されるべきため continue-on-error は設定しない
  detect-modules:
    runs-on: ubuntu-latest
    outputs:
      go_modules: ${{ steps.modules.outputs.go_modules }}
      rust_modules: ${{ steps.modules.outputs.rust_modules }}
      ts_modules: ${{ steps.modules.outputs.ts_modules }}
      dart_modules: ${{ steps.modules.outputs.dart_modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect affected modules
        id: modules
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          # detect-affected-modules.sh を使って言語ごとの影響モジュールを検出
          chmod +x scripts/detect-affected-modules.sh
          go_mods=$(scripts/detect-affected-modules.sh "$BASE_REF" go | paste -sd ',' - || echo "")
          rust_mods=$(scripts/detect-affected-modules.sh "$BASE_REF" rust | paste -sd ',' - || echo "")
          ts_mods=$(scripts/detect-affected-modules.sh "$BASE_REF" ts | paste -sd ',' - || echo "")
          dart_mods=$(scripts/detect-affected-modules.sh "$BASE_REF" dart | paste -sd ',' - || echo "")
          echo "go_modules=$go_mods" >> "$GITHUB_OUTPUT"
          echo "rust_modules=$rust_mods" >> "$GITHUB_OUTPUT"
          echo "ts_modules=$ts_mods" >> "$GITHUB_OUTPUT"
          echo "dart_modules=$dart_mods" >> "$GITHUB_OUTPUT"
          echo "Affected Go modules: $go_mods"
          echo "Affected Rust modules: $rust_mods"
          echo "Affected TS modules: $ts_mods"
          echo "Affected Dart modules: $dart_mods"

  lint-go:
    needs: [detect-changes, detect-modules]
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: "go.work.sum"
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Lint Go modules
        shell: bash
        env:
          AFFECTED_MODULES: ${{ needs.detect-modules.outputs.go_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#go:}"
              if [ -d "$dir" ] && [ -f "$dir/go.mod" ]; then
                echo "=== Linting $dir ==="
                (cd "$dir" && golangci-lint run ./... && go vet ./...)
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            mapfile -t modules < <(scripts/list-modules.sh --lang go --no-skip-ci)
            for dir in "${modules[@]}"; do
              echo "=== Linting $dir ==="
              (cd "$dir" && golangci-lint run ./... && go vet ./...)
            done
          fi

  lint-rust:
    needs: [detect-changes, detect-modules]
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93       # Dockerイメージ戦略.md / devcontainer設計.md と同期
        with:
          components: clippy, rustfmt
      # Rust 依存キャッシュ（regions/system, CLI, standalone サーバー）
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            regions/system
            CLI
            regions/business/accounting/server/rust/domain-master
            regions/service/inventory/server/rust/inventory
            regions/service/order/server/rust/order
            regions/service/payment/server/rust/payment
      - name: Format check Rust crates
        shell: bash
        env:
          AFFECTED_MODULES: ${{ needs.detect-modules.outputs.rust_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#rust:}"
              if [ -d "$dir" ] && [ -f "$dir/Cargo.toml" ]; then
                echo "=== fmt $dir ==="
                cargo fmt --manifest-path "$dir/Cargo.toml" --all -- --check
              fi
            done
          else
            # ワークスペース一括フォーマットチェック（O(n) → O(1)）
            echo "=== fmt regions/system ==="
            cargo fmt --all --manifest-path regions/system/Cargo.toml -- --check
            echo "=== fmt CLI ==="
            cargo fmt --all --manifest-path CLI/Cargo.toml -- --check
          fi
      - name: Clippy check Rust crates
        shell: bash
        env:
          AFFECTED_MODULES: ${{ needs.detect-modules.outputs.rust_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#rust:}"
              if [ -d "$dir" ] && [ -f "$dir/Cargo.toml" ]; then
                echo "=== clippy $dir ==="
                cargo clippy --manifest-path "$dir/Cargo.toml" --all-targets -- -D warnings
              fi
            done
          else
            # ワークスペース一括 Clippy（experimental クレートを除外）
            # modules.yaml から experimental モジュールを取得して --exclude に変換
            chmod +x scripts/list-modules.sh
            excludes=""
            while IFS= read -r dir; do
              # Cargo.toml から実際の package name を取得（basename と package name が異なる場合に対応）
              pkg_name=$(grep -m1 '^name' "$dir/Cargo.toml" | sed 's/.*"\(.*\)"/\1/')
              excludes="$excludes --exclude $pkg_name"
            done < <(scripts/list-modules.sh --lang rust --status experimental)
            # exclude 対象が workspace に存在するか検証
            ws_packages=$(grep -rh '^name' regions/system/*/Cargo.toml regions/system/*/*/Cargo.toml regions/system/*/*/*/Cargo.toml regions/system/*/*/*/*/Cargo.toml 2>/dev/null | sed 's/.*"\(.*\)"/\1/')
            for exc in $excludes; do
              if [ "$exc" = "--exclude" ]; then continue; fi
              if ! echo "$ws_packages" | grep -qx "$exc"; then
                echo "ERROR: excluded package '$exc' not found in workspace"
                exit 1
              fi
            done
            echo "=== clippy regions/system ==="
            cargo clippy --manifest-path regions/system/Cargo.toml --workspace $excludes --all-targets -- -D warnings
            echo "=== clippy CLI ==="
            cargo clippy --manifest-path CLI/Cargo.toml --workspace --exclude k1s0-gui --all-targets -- -D warnings
          fi
      # axum 旧記法 :param の検出（{param} を使用すること）
      - name: Check for deprecated axum route syntax
        shell: bash
        run: |
          if grep -rn '/:[a-zA-Z_]' --include='*.rs' regions/*/server/rust/*/src/adapter/handler/ regions/*/server/rust/*/src/adapter/middleware/ regions/*/*/server/rust/*/src/adapter/handler/ 2>/dev/null; then
            echo "::error::axum 旧記法 :param が検出されました。{param} を使用してください。"
            exit 1
          fi

  lint-ts:
    needs: [detect-changes, detect-modules]
    if: needs.detect-changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
      - name: Lint TypeScript packages
        shell: bash
        env:
          AFFECTED_MODULES: ${{ needs.detect-modules.outputs.ts_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#ts:}"
              if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
                echo "=== Linting $dir ==="
                (
                  cd "$dir"
                  # package-lock.json を使って依存関係をインストール
                  npm ci
                  npm run lint --if-present
                  npm run typecheck --if-present
                )
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            mapfile -t packages < <(scripts/list-modules.sh --lang ts --no-skip-ci)
            for package_dir in "${packages[@]}"; do
              echo "=== Linting $package_dir ==="
              (
                cd "$package_dir"
                # package-lock.json を使って依存関係をインストール
                npm ci
                npm run lint --if-present
                npm run typecheck --if-present
              )
            done
          fi

  lint-dart:
    needs: [detect-changes, detect-modules]
    if: needs.detect-changes.outputs.dart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"              # devcontainer設計.md と同期
      # Dart/Flutter パッケージキャッシュ
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: dart-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: dart-pub-
      - name: Lint Dart and Flutter packages
        shell: bash
        env:
          AFFECTED_MODULES: ${{ needs.detect-modules.outputs.dart_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#dart:}"
              if [ -d "$dir" ] && [ -f "$dir/pubspec.yaml" ]; then
                echo "=== Linting $dir ==="
                if grep -q "sdk: flutter" "$dir/pubspec.yaml"; then
                  (cd "$dir" && flutter pub get && flutter analyze)
                else
                  (cd "$dir" && dart pub get && dart analyze)
                fi
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            mapfile -t packages < <(scripts/list-modules.sh --lang dart --no-skip-ci)
            for package_dir in "${packages[@]}"; do
              echo "=== Linting $package_dir ==="
              if grep -q "sdk: flutter" "$package_dir/pubspec.yaml"; then
                (cd "$package_dir" && flutter pub get && flutter analyze)
              else
                (cd "$package_dir" && dart pub get && dart analyze)
              fi
            done
          fi

  # シェルスクリプトの静的解析ジョブ
  lint-shell:
    needs: detect-changes
    if: needs.detect-changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck のインストール
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: シェルスクリプトの静的解析
        run: find scripts/ -name '*.sh' -exec shellcheck {} +

  # Protocol Buffers のリント・破壊的変更検出ジョブ
  lint-proto:
    needs: detect-changes
    if: needs.detect-changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.47.2"              # devcontainer設計.md の BUF_VERSION と同期
      - name: buf lint
        run: buf lint api/proto
      - name: buf breaking change detection
        run: buf breaking api/proto --against '.git#branch=main'

  test-go:
    needs: [lint-go, detect-modules]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: "go.work.sum"
      - name: Test Go modules
        shell: bash
        env:
          AFFECTED_MODULES: ${{ needs.detect-modules.outputs.go_modules }}
        run: |
          mkdir -p coverage
          # 影響モジュールが検出された場合はそのモジュールのみテストする
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#go:}"
              if [ -d "$dir" ] && [ -f "$dir/go.mod" ]; then
                modname="$(basename "$dir")"
                echo "=== Testing $dir ==="
                (cd "$dir" && go test ./... -race -count=1 -coverprofile="$GITHUB_WORKSPACE/coverage/${modname}.out")
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            mapfile -t modules < <(scripts/list-modules.sh --lang go --no-skip-ci)
            for dir in "${modules[@]}"; do
              modname="$(basename "$dir")"
              echo "=== Testing $dir ==="
              (cd "$dir" && go test ./... -race -count=1 -coverprofile="$GITHUB_WORKSPACE/coverage/${modname}.out")
            done
          fi
      # Go カバレッジ閾値チェック: 各モジュールの合計カバレッジが閾値を下回った場合に CI を失敗させる
      - name: Go カバレッジ閾値チェック
        shell: bash
        run: |
          # カバレッジ閾値: 70%（Rust/Go は初期値として70%から開始し、段階的に引き上げる）
          # 理由: 新規プロジェクトでは自動生成コード等の影響でカバレッジが低くなりがちなため、
          #       現実的な初期値として70%を設定。CI が安定したら80%→90%へ段階的に引き上げる。
          GO_COVERAGE_THRESHOLD=70
          failed=0
          for covfile in coverage/*.out; do
            [ -f "$covfile" ] || continue
            modname="$(basename "$covfile" .out)"
            # go tool cover -func から合計カバレッジ率を抽出する
            total_line=$(go tool cover -func="$covfile" | tail -1)
            # "total:" 行からパーセンテージ数値を取得（例: "total:  (statements)  75.3%" → "75.3"）
            coverage=$(echo "$total_line" | grep -oP '[0-9]+\.[0-9]+(?=%)')
            if [ -z "$coverage" ]; then
              echo "::warning::$modname のカバレッジ率を取得できませんでした"
              continue
            fi
            echo "$modname: ${coverage}%"
            # 閾値との比較（浮動小数点対応）
            below=$(echo "$coverage < $GO_COVERAGE_THRESHOLD" | bc -l)
            if [ "$below" -eq 1 ]; then
              echo "::error::$modname のカバレッジ ${coverage}% が閾値 ${GO_COVERAGE_THRESHOLD}% を下回っています"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "全 Go モジュールのカバレッジが閾値 ${GO_COVERAGE_THRESHOLD}% を超えています"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage
          path: coverage/

  test-rust:
    needs: [lint-rust, detect-modules]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93       # Dockerイメージ戦略.md / devcontainer設計.md と同期
      # Rust 依存キャッシュ（regions/system, CLI, standalone サーバー）
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            regions/system
            CLI
            regions/business/accounting/server/rust/domain-master
            regions/service/inventory/server/rust/inventory
            regions/service/order/server/rust/order
            regions/service/payment/server/rust/payment
      - name: Test Rust crates
        shell: bash
        env:
          AFFECTED_MODULES: ${{ needs.detect-modules.outputs.rust_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみテストする
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#rust:}"
              if [ -d "$dir" ] && [ -f "$dir/Cargo.toml" ]; then
                echo "=== Testing $dir ==="
                cargo test --manifest-path "$dir/Cargo.toml" --all
              fi
            done
          else
            # ワークスペース一括テスト（O(n) → O(1)）
            chmod +x scripts/list-modules.sh
            excludes=""
            while IFS= read -r dir; do
              # Cargo.toml から実際の package name を取得（basename と package name が異なる場合に対応）
              pkg_name=$(grep -m1 '^name' "$dir/Cargo.toml" | sed 's/.*"\(.*\)"/\1/')
              excludes="$excludes --exclude $pkg_name"
            done < <(scripts/list-modules.sh --lang rust --status experimental)
            # exclude 対象が workspace に存在するか検証
            ws_packages=$(grep -rh '^name' regions/system/*/Cargo.toml regions/system/*/*/Cargo.toml regions/system/*/*/*/Cargo.toml regions/system/*/*/*/*/Cargo.toml 2>/dev/null | sed 's/.*"\(.*\)"/\1/')
            for exc in $excludes; do
              if [ "$exc" = "--exclude" ]; then continue; fi
              if ! echo "$ws_packages" | grep -qx "$exc"; then
                echo "ERROR: excluded package '$exc' not found in workspace"
                exit 1
              fi
            done
            echo "=== Testing regions/system ==="
            cargo test --manifest-path regions/system/Cargo.toml --workspace $excludes --features k1s0-tenant-server/test-utils
            echo "=== Testing CLI ==="
            cargo test --manifest-path CLI/Cargo.toml --workspace --exclude k1s0-gui
          fi

  # コード生成テンプレートのコンパイル検証ジョブ（golden path compile test）
  golden-path-compile:
    needs: [detect-changes, lint-rust]
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            regions/system
            CLI
      - name: Golden path compile tests
        run: cargo test --manifest-path CLI/Cargo.toml -p k1s0-cli -- --ignored --test-threads=1

  # Rust テストカバレッジ計測ジョブ（cargo-tarpaulin を使用）
  coverage-rust:
    needs: lint-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
      # Rust 依存キャッシュ（regions/system, CLI, standalone サーバー）
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            regions/system
            CLI
            regions/business/accounting/server/rust/domain-master
            regions/service/inventory/server/rust/inventory
            regions/service/order/server/rust/order
            regions/service/payment/server/rust/payment
      - name: cargo-tarpaulin インストール（プリビルドバイナリ）
        run: |
          TARPAULIN_VERSION="0.31.2"
          curl -sL "https://github.com/xd009642/tarpaulin/releases/download/${TARPAULIN_VERSION}/cargo-tarpaulin-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C "$HOME/.cargo/bin"
          chmod +x "$HOME/.cargo/bin/cargo-tarpaulin"
      - name: Rust テストカバレッジ計測・閾値チェック
        shell: bash
        run: |
          mkdir -p coverage
          # カバレッジ閾値: 70%（Rust/Go は初期値として70%から開始し、段階的に引き上げる）
          # 理由: 新規プロジェクトでは proto 自動生成コード等の影響でカバレッジが低くなりがちなため、
          #       現実的な初期値として70%を設定。CI が安定したら80%→90%へ段階的に引き上げる。
          RUST_COVERAGE_THRESHOLD=70

          # regions/system ワークスペースのカバレッジを計測する（閾値チェック付き）
          cargo tarpaulin \
            --manifest-path regions/system/Cargo.toml \
            --workspace \
            --exclude-files "*/tests/*" "*/proto/*" \
            --skip-clean \
            --timeout 300 \
            --fail-under "$RUST_COVERAGE_THRESHOLD" \
            --out Json Html \
            --output-dir coverage/system
          # CLI ワークスペースのカバレッジを計測する（GUI クレートを除外、閾値チェック付き）
          cargo tarpaulin \
            --manifest-path CLI/Cargo.toml \
            --workspace \
            --exclude k1s0-gui \
            --exclude-files "*/tests/*" \
            --skip-clean \
            --timeout 300 \
            --fail-under "$RUST_COVERAGE_THRESHOLD" \
            --out Json Html \
            --output-dir coverage/cli
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-coverage
          path: coverage/

  test-ts:
    needs: lint-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
      - name: Test TypeScript packages
        shell: bash
        run: |
          chmod +x scripts/list-modules.sh
          mapfile -t packages < <(scripts/list-modules.sh --lang ts --no-skip-ci)
          for package_dir in "${packages[@]}"; do
            echo "=== Testing $package_dir ==="
            (
              cd "$package_dir"
              # package-lock.json を使って依存関係をインストール
              npm ci
              npm test --if-present
            )
          done

  # TypeScript テストカバレッジ計測ジョブ
  coverage-ts:
    needs: lint-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
      - name: TypeScript テストカバレッジ計測・閾値チェック
        shell: bash
        run: |
          mkdir -p coverage
          chmod +x scripts/list-modules.sh
          mapfile -t packages < <(scripts/list-modules.sh --lang ts --no-skip-ci)
          # TypeScript カバレッジ閾値: 80%（TypeScript は型安全性が高くテストが書きやすいため、
          # Rust/Go より高い閾値を設定。vitest の --coverage.thresholds で行カバレッジを強制する。）
          TS_COVERAGE_THRESHOLD=80
          for package_dir in "${packages[@]}"; do
            echo "=== Coverage $package_dir ==="
            (
              cd "$package_dir"
              # package-lock.json を使って依存関係をインストール
              npm ci
              # vitest --coverage が利用可能な場合はカバレッジ計測する（閾値チェック付き）
              if npx --no-install vitest --help >/dev/null 2>&1; then
                npx vitest run --coverage \
                  --coverage.thresholds.lines="$TS_COVERAGE_THRESHOLD" \
                  --reporter=json \
                  --outputFile="$GITHUB_WORKSPACE/coverage/$(basename "$package_dir").json"
              elif npm run test:coverage --if-present 2>/dev/null; then
                true
              fi
            )
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ts-coverage
          path: coverage/

  test-dart:
    needs: lint-dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"              # devcontainer設計.md と同期
      # Dart/Flutter パッケージキャッシュ
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: dart-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: dart-pub-
      - name: Test Dart and Flutter packages
        shell: bash
        run: |
          chmod +x scripts/list-modules.sh
          mapfile -t packages < <(scripts/list-modules.sh --lang dart --no-skip-ci)
          for package_dir in "${packages[@]}"; do
            echo "=== Testing $package_dir ==="
            if grep -q "sdk: flutter" "$package_dir/pubspec.yaml"; then
              (
                cd "$package_dir"
                flutter pub get
                flutter test
              )
            else
              (
                cd "$package_dir"
                dart pub get
                dart test
              )
            fi
          done

  # Dart/Flutter テストカバレッジ計測ジョブ
  coverage-dart:
    needs: lint-dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"              # devcontainer設計.md と同期
      # Dart/Flutter パッケージキャッシュ
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: dart-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: dart-pub-
      - name: lcov インストール（Dart カバレッジ閾値チェック用）
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: Dart/Flutter テストカバレッジ計測・閾値チェック
        shell: bash
        run: |
          mkdir -p coverage
          chmod +x scripts/list-modules.sh
          mapfile -t packages < <(scripts/list-modules.sh --lang dart --no-skip-ci)
          # Dart/Flutter カバレッジ閾値: 80%（TypeScript と同様、型安全かつテストが書きやすいため
          # Rust/Go より高い閾値を設定。lcov の行カバレッジで判定する。）
          DART_COVERAGE_THRESHOLD=80
          failed=0
          for package_dir in "${packages[@]}"; do
            echo "=== Coverage $package_dir ==="
            pkgname="$(basename "$package_dir")"
            if grep -q "sdk: flutter" "$package_dir/pubspec.yaml"; then
              (
                cd "$package_dir"
                flutter pub get
                flutter test --coverage || true
                if [ -f coverage/lcov.info ]; then
                  cp coverage/lcov.info "$GITHUB_WORKSPACE/coverage/${pkgname}.lcov"
                fi
              )
            else
              (
                cd "$package_dir"
                dart pub get
                dart test --coverage=coverage || true
                if [ -d coverage ]; then
                  cp -r coverage "$GITHUB_WORKSPACE/coverage/${pkgname}"
                fi
              )
            fi
          done
      # Dart/Flutter カバレッジ閾値チェック: lcov.info から行カバレッジ率を算出して閾値と比較する
      - name: Dart/Flutter カバレッジ閾値チェック
        shell: bash
        run: |
          DART_COVERAGE_THRESHOLD=80
          failed=0
          for lcov_file in coverage/*.lcov; do
            [ -f "$lcov_file" ] || continue
            pkgname="$(basename "$lcov_file" .lcov)"
            # lcov --summary から行カバレッジ率を抽出する
            summary=$(lcov --summary "$lcov_file" 2>&1)
            coverage=$(echo "$summary" | grep -oP 'lines\.*:\s*\K[0-9]+\.[0-9]+(?=%)')
            if [ -z "$coverage" ]; then
              echo "::warning::$pkgname のカバレッジ率を取得できませんでした"
              continue
            fi
            echo "$pkgname: ${coverage}%"
            # 閾値との比較（浮動小数点対応）
            below=$(echo "$coverage < $DART_COVERAGE_THRESHOLD" | bc -l)
            if [ "$below" -eq 1 ]; then
              echo "::error::$pkgname のカバレッジ ${coverage}% が閾値 ${DART_COVERAGE_THRESHOLD}% を下回っています"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "全 Dart/Flutter パッケージのカバレッジが閾値 ${DART_COVERAGE_THRESHOLD}% を超えています"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dart-coverage
          path: coverage/

  build-go:
    needs: test-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: "go.work.sum"
      - name: Build Go modules
        shell: bash
        run: |
          # go.work 一括ビルド（O(n) → O(1)）
          echo "=== Building all Go modules via go.work ==="
          go build ./...

  build-rust:
    needs: test-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
      # Rust 依存キャッシュ（regions/system, CLI, standalone サーバー）
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            regions/system
            CLI
            regions/business/accounting/server/rust/domain-master
            regions/service/inventory/server/rust/inventory
            regions/service/order/server/rust/order
            regions/service/payment/server/rust/payment
      - name: Build Rust crates
        shell: bash
        run: |
          # ワークスペース一括ビルド（O(n) → O(1)）
          chmod +x scripts/list-modules.sh
          excludes=""
          while IFS= read -r dir; do
            # Cargo.toml から実際の package name を取得（basename と package name が異なる場合に対応）
            pkg_name=$(grep -m1 '^name' "$dir/Cargo.toml" | sed 's/.*"\(.*\)"/\1/')
            excludes="$excludes --exclude $pkg_name"
          done < <(scripts/list-modules.sh --lang rust --status experimental)
          # exclude 対象が workspace に存在するか検証
          ws_packages=$(grep -rh '^name' regions/system/*/Cargo.toml regions/system/*/*/Cargo.toml regions/system/*/*/*/Cargo.toml regions/system/*/*/*/*/Cargo.toml 2>/dev/null | sed 's/.*"\(.*\)"/\1/')
          for exc in $excludes; do
            if [ "$exc" = "--exclude" ]; then continue; fi
            if ! echo "$ws_packages" | grep -qx "$exc"; then
              echo "ERROR: excluded package '$exc' not found in workspace"
              exit 1
            fi
          done
          echo "=== Building regions/system ==="
          cargo build --manifest-path regions/system/Cargo.toml --workspace $excludes --all-targets
          echo "=== Building CLI ==="
          cargo build --manifest-path CLI/Cargo.toml --workspace --exclude k1s0-gui --all-targets
          # standalone Rust サーバー（business/service tier）
          for dir in regions/business/accounting/server/rust/domain-master regions/service/inventory/server/rust/inventory regions/service/order/server/rust/order regions/service/payment/server/rust/payment; do
              if [ -d "$dir" ] && [ -f "$dir/Cargo.toml" ]; then
                  echo "=== Building $dir ==="
                  cargo build --manifest-path "$dir/Cargo.toml" --all-targets
              fi
          done

  build-ts:
    needs: test-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
      - name: Build TypeScript packages
        shell: bash
        run: |
          chmod +x scripts/list-modules.sh
          mapfile -t packages < <(scripts/list-modules.sh --lang ts --no-skip-ci)
          for package_dir in "${packages[@]}"; do
            echo "=== Building $package_dir ==="
            (
              cd "$package_dir"
              # package-lock.json を使って依存関係をインストール
              npm ci
              npm run build --if-present
            )
          done

  build-docker:
    needs:
      - detect-changes
      - build-go
      - build-rust
    if: always() && !contains(needs.*.result, 'failure') && (needs.detect-changes.outputs.docker == 'true' || needs.detect-changes.outputs.go == 'true' || needs.detect-changes.outputs.rust == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build service Docker images
        shell: bash
        run: |
          mapfile -t rust_dockerfiles < <(rg --files regions/system/server/rust -g 'Dockerfile' | sort)
          for dockerfile in "${rust_dockerfiles[@]}"; do
            server_name="$(basename "$(dirname "$dockerfile")")"
            tag="ci-${server_name}"
            echo "=== docker build $dockerfile ==="
            if [ "$server_name" = "graphql-gateway" ]; then
              # graphql-gateway needs repo root context for api/proto access
              docker build -f "$dockerfile" -t "$tag" .
            else
              docker build -f "regions/system/${dockerfile#regions/system/}" -t "$tag" regions/system
            fi
          done
          echo "=== docker build regions/system/server/go/bff-proxy/Dockerfile ==="
          docker build -t ci-bff-proxy regions/system/server/go/bff-proxy
          # Business tier
          if [ -f regions/business/accounting/server/rust/domain-master/Dockerfile ]; then
            echo "=== docker build domain-master ==="
            docker build -f regions/business/accounting/server/rust/domain-master/Dockerfile -t ci-domain-master .
          fi

  # --- 実験系 ai-* クレート（continue-on-error で可視性を維持） ---
  check-ai-experimental:
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
        with:
          components: clippy
      - name: Check ai-agent
        continue-on-error: true
        run: cargo check --manifest-path regions/system/server/rust/ai-agent/Cargo.toml --all-targets
      - name: Check ai-gateway
        continue-on-error: true
        run: cargo check --manifest-path regions/system/server/rust/ai-gateway/Cargo.toml --all-targets
      - name: Clippy ai-agent
        continue-on-error: true
        run: cargo clippy --manifest-path regions/system/server/rust/ai-agent/Cargo.toml --all-targets -- -D warnings
      - name: Clippy ai-gateway
        continue-on-error: true
        run: cargo clippy --manifest-path regions/system/server/rust/ai-gateway/Cargo.toml --all-targets -- -D warnings

  # NOTE: proto チェック(buf lint / buf breaking)は ci.yaml の lint-proto ジョブと
  # 専用ワークフロー proto.yaml の両方で実行される。

  helm-lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "3.16"   # devcontainer設計.md の Helm バージョンと同期
      - run: |
          for chart in infra/helm/services/*/* infra/helm/services/*/*/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              helm lint "$chart"
            fi
          done

  build:
    needs:
      - build-go
      - build-rust
      - build-ts
      - test-dart
      - build-docker
    if: always() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build validation summary
        run: echo "All language and Docker builds passed"

  # modules.yaml とディスク上のマニフェストの整合性を検証するジョブ
  # 未登録のモジュールがあれば error で CI を失敗させる
  validate-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: modules.yaml とディスク上マニフェストの整合性チェック
        shell: bash
        run: |
          chmod +x scripts/list-modules.sh
          # modules.yaml に登録されているパスを取得
          registered=$(scripts/list-modules.sh | sort)
          # ディスク上の全マニフェストからモジュールパスを取得
          disk_modules=$(
            {
              # Rust マニフェスト
              find regions CLI -name 'Cargo.toml' -not -path '*/target/*' 2>/dev/null | while read -r f; do dirname "$f"; done
              # Go マニフェスト
              find regions CLI -name 'go.mod' -not -path '*/vendor/*' 2>/dev/null | while read -r f; do dirname "$f"; done
              # TypeScript マニフェスト
              find regions CLI -name 'package.json' -not -path '*/node_modules/*' 2>/dev/null | while read -r f; do dirname "$f"; done
              # Dart マニフェスト
              find regions CLI -name 'pubspec.yaml' 2>/dev/null | while read -r f; do dirname "$f"; done
            } | sort -u
          )
          # 差分を検出
          unregistered=$(comm -23 <(echo "$disk_modules") <(echo "$registered"))
          if [ -n "$unregistered" ]; then
            echo "::error::以下のモジュールが modules.yaml に未登録です:"
            echo "$unregistered" | while read -r path; do
              echo "::error::  - $path"
            done
            exit 1
          else
            echo "ディスク上の全モジュールが modules.yaml に登録されています"
          fi
          # 逆方向: modules.yaml に登録されているがディスクに存在しないモジュールを検出
          ghost=$(comm -13 <(echo "$disk_modules") <(echo "$registered"))
          if [ -n "$ghost" ]; then
            echo "::error::以下のモジュールが modules.yaml に登録されていますがディスクに存在しません:"
            echo "$ghost" | while read -r path; do
              echo "::error::  - $path"
            done
            exit 1
          else
            echo "modules.yaml とディスク上のマニフェストが双方向で一致しています"
          fi

  # Vault policy の広域 wildcard 検出
  validate-vault-policies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for overly broad Vault wildcards
        shell: bash
        run: |
          if grep -rn 'secret/data/k1s0/.*\*' infra/vault/policies/ 2>/dev/null | grep -v '/common/\*'; then
            echo "::error::Vault policy に広域 wildcard が検出されました。共通パス (common/*) のみ許可されています。"
            exit 1
          fi

  # TypeScript パッケージの lockfile 存在チェック
  validate-ts-lockfiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check package-lock.json exists for all TS packages
        shell: bash
        run: |
          missing=0
          for pkg in $(find regions CLI -name 'package.json' -not -path '*/node_modules/*' 2>/dev/null); do
            dir=$(dirname "$pkg")
            if [ ! -f "$dir/package-lock.json" ]; then
              echo "::error::$dir に package-lock.json がありません。npm install で生成してください。"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
