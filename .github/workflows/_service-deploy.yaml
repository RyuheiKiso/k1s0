# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/_service-deploy.yaml
# サービスデプロイ用の再利用可能ワークフロー
# build-and-push → deploy-dev → deploy-staging → deploy-prod のパイプラインを統一
name: _service-deploy

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

on:
  workflow_call:
    inputs:
      # サービス名（Helm リリース名として使用。例: auth, bff-proxy）
      service-name:
        required: true
        type: string
      # Docker ビルドコンテキストのパス（tier ルートを指定。例: regions/system）
      # Dockerfile がライブラリ等の依存を COPY するため、サービスディレクトリではなく tier ルートを渡す
      context-path:
        required: true
        type: string
      # Harbor レジストリ内のプロジェクト名（例: k1s0-system）
      registry-project:
        required: true
        type: string
      # Helm チャートのパス（infra/helm/services/ からの相対パス。例: system/auth）
      helm-chart-path:
        required: true
        type: string
      # Kubernetes namespace（例: k1s0-system）
      namespace:
        required: true
        type: string
      # prod 環境の URL（GitHub Environment に表示される）
      prod-url:
        required: false
        type: string
        default: "https://api.k1s0.internal.example.com"
      # Dockerfile パス（context-path 外に Dockerfile がある場合に指定。例: regions/system/server/rust/config/Dockerfile）
      dockerfile:
        required: false
        type: string
        default: ""
      # ヘルスチェック方式: "busybox" (Rust distroless+busybox) or "port-forward" (Go distroless)
      health-check-method:
        required: false
        type: string
        default: "busybox"
    secrets:
      HARBOR_USERNAME:
        required: true
      HARBOR_PASSWORD:
        required: true

env:
  REGISTRY: harbor.internal.example.com

jobs:
  # ---------- Docker イメージのビルド・プッシュ・署名・スキャン ----------
  build-and-push:
    runs-on: ubuntu-latest
    # コードの読み取り、パッケージの書き込み（Docker push）、OIDC トークン（Cosign 署名）が必要
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Set short SHA
        id: sha
        # SHA は 12 文字以上を使用し、リポジトリ拡大時の衝突リスクを低減する（M-009）
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Set version
        id: version
        run: |
          # 直近の Git タグからバージョンを取得（例: v1.2.3 → 1.2.3）
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Login to Harbor
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      # Dockerfile がコンテキスト内にある標準パターン
      - name: Build and push
        if: inputs.dockerfile == ''
        # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ inputs.context-path }}
          push: true
          # :latest タグは廃止。バージョン + git SHA で一意に特定可能なタグのみ使用する
          tags: |
            ${{ env.REGISTRY }}/${{ inputs.registry-project }}/${{ inputs.service-name }}:${{ steps.version.outputs.value }}
            ${{ env.REGISTRY }}/${{ inputs.registry-project }}/${{ inputs.service-name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Dockerfile がコンテキスト外にある場合（例: workspace root をコンテキストとして使用）
      - name: Build and push (custom Dockerfile)
        if: inputs.dockerfile != ''
        # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ inputs.context-path }}
          file: ${{ inputs.dockerfile }}
          push: true
          # :latest タグは廃止。バージョン + git SHA で一意に特定可能なタグのみ使用する
          tags: |
            ${{ env.REGISTRY }}/${{ inputs.registry-project }}/${{ inputs.service-name }}:${{ steps.version.outputs.value }}
            ${{ env.REGISTRY }}/${{ inputs.registry-project }}/${{ inputs.service-name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Install Cosign
        # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      # cosign v2+ では --yes フラグで keyless 署名が有効（COSIGN_EXPERIMENTAL は非推奨）
      - name: Sign image with Cosign
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ inputs.registry-project }}/${{ inputs.service-name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
      - name: Trivy image scan
        # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ inputs.registry-project }}/${{ inputs.service-name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
          severity: HIGH,CRITICAL
          exit-code: 1
      - name: Generate SBOM
        # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0
        with:
          image: ${{ env.REGISTRY }}/${{ inputs.registry-project }}/${{ inputs.service-name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
          output-file: sbom.spdx.json
      # SBOM をアーティファクトとしてアップロードし、監査・コンプライアンス目的で保存する
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ inputs.service-name || github.event.inputs.service-name }}
          path: sbom.spdx.json
          if-no-files-found: warn

  # ---------- Deploy to dev ----------
  deploy-dev:
    needs: build-and-push
    runs-on: [self-hosted, dev]
    # コードの読み取りと OIDC トークン（Cosign 署名検証）が必要
    permissions:
      contents: read
      id-token: write
    environment: dev
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Set short SHA
        id: sha
        # SHA は 12 文字以上を使用し、リポジトリ拡大時の衝突リスクを低減する（M-009）
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Set version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "^https://github\\.com/k1s0-org/k1s0/\\.github/workflows/.*" \
            ${{ env.REGISTRY }}/${{ inputs.registry-project }}/${{ inputs.service-name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: "3.16"
      # --atomic: デプロイ失敗時に自動ロールバック、--wait: Pod Ready まで待機、--timeout: 最大待機時間
      - name: Deploy to dev
        run: |
          helm upgrade --install ${{ inputs.service-name }} \
            ./infra/helm/services/${{ inputs.helm-chart-path }} \
            -n ${{ inputs.namespace }} \
            -f ./infra/helm/services/${{ inputs.helm-chart-path }}/values-dev.yaml \
            --set image.tag=${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }} \
            --atomic --wait --timeout 5m

  # ---------- Deploy to staging ----------
  deploy-staging:
    needs: deploy-dev
    runs-on: [self-hosted, staging]
    # コードの読み取りと OIDC トークン（Cosign 署名検証）が必要
    permissions:
      contents: read
      id-token: write
    environment: staging
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Set short SHA
        id: sha
        # SHA は 12 文字以上を使用し、リポジトリ拡大時の衝突リスクを低減する（M-009）
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Set version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "^https://github\\.com/k1s0-org/k1s0/\\.github/workflows/.*" \
            ${{ env.REGISTRY }}/${{ inputs.registry-project }}/${{ inputs.service-name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: "3.16"
      # --atomic: デプロイ失敗時に自動ロールバック、--wait: Pod Ready まで待機、--timeout: 最大待機時間
      - name: Deploy to staging
        run: |
          helm upgrade --install ${{ inputs.service-name }} \
            ./infra/helm/services/${{ inputs.helm-chart-path }} \
            -n ${{ inputs.namespace }} \
            -f ./infra/helm/services/${{ inputs.helm-chart-path }}/values-staging.yaml \
            --set image.tag=${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }} \
            --atomic --wait --timeout 5m

  # ---------- Deploy to prod (manual approval) ----------
  # IMPORTANT: GitHub リポジトリ設定で prod 環境に Required reviewers（最低2名）を設定すること。
  # Settings → Environments → prod → Required reviewers
  deploy-prod:
    needs: deploy-staging
    runs-on: [self-hosted, prod]
    # コードの読み取りと OIDC トークン（Cosign 署名検証）が必要
    permissions:
      contents: read
      id-token: write
    environment:
      name: prod
      url: ${{ inputs.prod-url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Set short SHA
        id: sha
        # SHA は 12 文字以上を使用し、リポジトリ拡大時の衝突リスクを低減する（M-009）
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Set version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "^https://github\\.com/k1s0-org/k1s0/\\.github/workflows/.*" \
            ${{ env.REGISTRY }}/${{ inputs.registry-project }}/${{ inputs.service-name }}:${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }}
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: "3.16"
      # --atomic: デプロイ失敗時に自動ロールバック、--wait: Pod Ready まで待機、--timeout: 最大待機時間
      - name: Deploy to prod
        run: |
          helm upgrade --install ${{ inputs.service-name }} \
            ./infra/helm/services/${{ inputs.helm-chart-path }} \
            -n ${{ inputs.namespace }} \
            -f ./infra/helm/services/${{ inputs.helm-chart-path }}/values-prod.yaml \
            --set image.tag=${{ steps.version.outputs.value }}-${{ steps.sha.outputs.short }} \
            --atomic --wait --timeout 5m
      # デプロイ後スモークテスト（busybox 方式: Rust distroless イメージ向け）
      # スモークテスト失敗時はデプロイを中止する（--atomic により自動ロールバックされる）
      - name: デプロイ後スモークテスト (busybox)
        if: inputs.health-check-method == 'busybox'
        run: |
          echo "Waiting for rollout to complete..."
          kubectl rollout status deployment/${{ inputs.service-name }} -n ${{ inputs.namespace }} --timeout=120s
          echo "Running health check..."
          kubectl exec deploy/${{ inputs.service-name }} -n ${{ inputs.namespace }} -- /busybox wget -qO- http://127.0.0.1:8080/healthz
      # デプロイ後スモークテスト（port-forward 方式: Go distroless イメージ向け）
      # スモークテスト失敗時はデプロイを中止する（--atomic により自動ロールバックされる）
      - name: デプロイ後スモークテスト (port-forward)
        if: inputs.health-check-method == 'port-forward'
        run: |
          echo "Waiting for rollout to complete..."
          kubectl rollout status deployment/${{ inputs.service-name }} -n ${{ inputs.namespace }} --timeout=120s
          echo "Running health check..."
          kubectl port-forward deploy/${{ inputs.service-name }} -n ${{ inputs.namespace }} 18080:8080 &
          # L-07 監査対応: sleep 3 の代わりに curl --retry でポートフォワード確立を確認する。
          # ポートフォワードの起動タイミングに依存した固定待機は不安定なため、
          # 実際に接続が確立されるまでリトライするパターンに変更する。
          for i in $(seq 1 10); do
            if curl -sf http://127.0.0.1:18080/healthz; then
              echo "ヘルスチェック成功"
              break
            fi
            echo "待機中... ($i/10)"
            sleep 1
          done
          kill %1 2>/dev/null || true
      # デプロイ結果を GitHub Deployment Status として記録
      - name: デプロイ結果通知
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            const env = '${{ inputs.namespace }}'.replace('k1s0-', '');
            const message = status === 'success'
              ? `${{ inputs.service-name }} を prod にデプロイしました (${process.env.GITHUB_SHA?.substring(0, 7)})`
              : `${{ inputs.service-name }} の prod デプロイが失敗しました`;
            core.summary.addHeading(`Deploy ${status}: ${{ inputs.service-name }}`, 2);
            core.summary.addRaw(message);
            await core.summary.write();
