# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/saga-ci.yaml
# Per-service CI pipeline for saga server（reusable workflow 経由）
name: saga-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'regions/system/server/rust/saga/**'

concurrency:
  group: saga-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_rust-service-ci.yaml
    with:
      service-path: regions/system/server/rust/saga
      package-name: k1s0-saga-server
      workspace-path: regions/system
