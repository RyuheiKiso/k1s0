# 可観測性設定のバリデーションワークフロー
# Prometheus アラートルール・Alertmanager 設定の構文チェックと
# runbook_url の存在確認を実施する
name: Observability Lint

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/observability/**'
      - 'infra/docker/prometheus/**'

concurrency:
  group: observability-lint-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  validate-prometheus-rules:
    name: Validate Prometheus Rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install prometheus tools
        run: |
          # promtool は prometheus バイナリに含まれる
          wget -q https://github.com/prometheus/prometheus/releases/download/v2.50.0/prometheus-2.50.0.linux-amd64.tar.gz
          tar -xzf prometheus-2.50.0.linux-amd64.tar.gz
          sudo mv prometheus-2.50.0.linux-amd64/promtool /usr/local/bin/

      - name: Validate K8s alert rules
        run: |
          promtool check rules \
            infra/observability/prometheus/alerts/system-tier-alerts.yaml \
            infra/observability/prometheus/alerts/business-service-tier-alerts.yaml \
            infra/observability/prometheus/alerts/infrastructure-alerts.yaml \
            infra/observability/prometheus/alerts/slo-burn-rate-alerts.yaml

      - name: Validate local dev alert rules
        run: |
          promtool check rules infra/docker/prometheus/alerting_rules.yaml

      - name: Check runbook_url in all alert rules
        # 全アラートルールに runbook_url が含まれているか確認する
        # runbook_url がない場合はエラーとして扱う
        run: |
          echo "Checking runbook_url in alert rule files..."
          failed=0

          check_file() {
            local file="$1"
            # alert: の行数と runbook_url: の行数を比較する
            alert_count=$(grep -c '^\s*- alert:' "$file" 2>/dev/null || echo 0)
            runbook_count=$(grep -c 'runbook_url:' "$file" 2>/dev/null || echo 0)

            if [ "$alert_count" -ne "$runbook_count" ]; then
              echo "FAIL: $file has $alert_count alerts but only $runbook_count runbook_url entries"
              return 1
            else
              echo "OK: $file ($alert_count alerts, $runbook_count runbook_urls)"
              return 0
            fi
          }

          check_file infra/observability/prometheus/alerts/system-tier-alerts.yaml || failed=1
          check_file infra/observability/prometheus/alerts/business-service-tier-alerts.yaml || failed=1
          check_file infra/observability/prometheus/alerts/infrastructure-alerts.yaml || failed=1
          check_file infra/observability/prometheus/alerts/slo-burn-rate-alerts.yaml || failed=1
          check_file infra/docker/prometheus/alerting_rules.yaml || failed=1

          # PrometheusRule (CRD) 形式のファイルを確認
          for f in infra/observability/auth/prometheusrule.yaml \
                   infra/observability/config/prometheusrule.yaml; do
            check_file "$f" || failed=1
          done

          if [ "$failed" -ne 0 ]; then
            echo ""
            echo "ERROR: Some alert rules are missing runbook_url."
            echo "Please add runbook_url annotation to all alerts."
            echo "See: docs/architecture/observability/runbooks/README.md"
            exit 1
          fi

          echo "All alert rules have runbook_url annotations."

  validate-alertmanager:
    name: Validate Alertmanager Config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install alertmanager tools
        run: |
          wget -q https://github.com/prometheus/alertmanager/releases/download/v0.27.0/alertmanager-0.27.0.linux-amd64.tar.gz
          tar -xzf alertmanager-0.27.0.linux-amd64.tar.gz
          sudo mv alertmanager-0.27.0.linux-amd64/amtool /usr/local/bin/

      - name: Validate Alertmanager config
        # Helm テンプレート変数が含まれる場合は構文チェックをスキップ
        # テンプレート変数を placeholder に置換してからチェックする
        run: |
          # Helm テンプレート変数を仮の値に置換してから構文チェック
          sed \
            -e "s|{{ .Values.alertmanager.webhookUrl | default \"http://prometheus-msteams:2000/default\" }}|http://localhost:2000/default|g" \
            -e "s|{{ .Values.alertmanager.criticalWebhookUrl | default \"http://prometheus-msteams:2000/critical\" }}|http://localhost:2000/critical|g" \
            -e "s|{{ .Values.alertmanager.warningWebhookUrl | default \"http://prometheus-msteams:2000/warning\" }}|http://localhost:2000/warning|g" \
            infra/observability/alertmanager/alertmanager-config.yaml \
            > /tmp/alertmanager-config-rendered.yaml

          amtool check-config /tmp/alertmanager-config-rendered.yaml
