# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/_test.yaml
# 全言語のテスト・カバレッジ・golden-path ジョブを集約した再利用可能ワークフロー
# ci.yaml から workflow_call で呼び出す（lint 完了後に実行する）
name: _test

permissions: {}

on:
  workflow_call:
    inputs:
      go:
        type: string
        required: false
        default: 'false'
      rust:
        type: string
        required: false
        default: 'false'
      ts:
        type: string
        required: false
        default: 'false'
      dart:
        type: string
        required: false
        default: 'false'
      go_modules:
        type: string
        required: false
        default: ''
      rust_modules:
        type: string
        required: false
        default: ''
      ts_modules:
        type: string
        required: false
        default: ''
      dart_modules:
        type: string
        required: false
        default: ''

jobs:
  # Go ユニットテスト
  test-go:
    if: inputs.go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version: "1.24.4"
          cache-dependency-path: "go.work.sum"
      - name: Test Go modules
        shell: bash
        env:
          AFFECTED_MODULES: ${{ inputs.go_modules }}
        run: |
          mkdir -p coverage
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#go:}"
              if [ -d "$dir" ] && [ -f "$dir/go.mod" ]; then
                modname="$(basename "$dir")"
                echo "=== Testing $dir ==="
                (cd "$dir" && go test ./... -race -count=1 -coverprofile="$GITHUB_WORKSPACE/coverage/${modname}.out")
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            mapfile -t modules < <(scripts/list-modules.sh --lang go --no-skip-ci)
            for dir in "${modules[@]}"; do
              modname="$(basename "$dir")"
              echo "=== Testing $dir ==="
              (cd "$dir" && go test ./... -race -count=1 -coverprofile="$GITHUB_WORKSPACE/coverage/${modname}.out")
            done
          fi
      - name: Go カバレッジ閾値チェック
        shell: bash
        run: |
          # カバレッジ閾値: 70%（Rust/Go は初期値として70%から開始し、段階的に引き上げる）
          GO_COVERAGE_THRESHOLD=70
          failed=0
          for covfile in coverage/*.out; do
            [ -f "$covfile" ] || continue
            modname="$(basename "$covfile" .out)"
            total_line=$(go tool cover -func="$covfile" | tail -1)
            coverage=$(echo "$total_line" | grep -oP '[0-9]+\.[0-9]+(?=%)')
            if [ -z "$coverage" ]; then
              echo "::warning::$modname のカバレッジ率を取得できませんでした"
              continue
            fi
            echo "$modname: ${coverage}%"
            below=$(echo "$coverage < $GO_COVERAGE_THRESHOLD" | bc -l)
            if [ "$below" -eq 1 ]; then
              echo "::error::$modname のカバレッジ ${coverage}% が閾値 ${GO_COVERAGE_THRESHOLD}% を下回っています"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "全 Go モジュールのカバレッジが閾値 ${GO_COVERAGE_THRESHOLD}% を超えています"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: go-coverage
          path: coverage/
      - name: Upload coverage
        uses: codecov/codecov-action@e28ff129e5465c2c0dcc6f003fc735cb6ae0c673 # v5
        with:
          # M-1対応: Codecov 障害時に CI 全体をブロックしない（外部サービス障害で開発が止まるリスクを排除する）
          # カバレッジはアーティファクトとして保存されるため、ローカルでの確認は引き続き可能
          fail_ci_if_error: false

  # Rust ユニットテスト
  test-rust:
    if: inputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            regions/system
            CLI
            regions/business/taskmanagement/server/rust/project-master
            regions/service/task/server/rust/task
            regions/service/board/server/rust/board
            regions/service/activity/server/rust/activity
      - name: Test Rust crates
        shell: bash
        env:
          AFFECTED_MODULES: ${{ inputs.rust_modules }}
        run: |
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#rust:}"
              if [ -d "$dir" ] && [ -f "$dir/Cargo.toml" ]; then
                echo "=== Testing $dir ==="
                cargo test --manifest-path "$dir/Cargo.toml" --all
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            excludes=""
            while IFS= read -r dir; do
              pkg_name=$(grep -m1 '^name' "$dir/Cargo.toml" | sed 's/.*"\(.*\)"/\1/')
              excludes="$excludes --exclude $pkg_name"
            done < <(scripts/list-modules.sh --lang rust --status experimental)
            ws_packages=$(grep -rh '^name' regions/system/*/Cargo.toml regions/system/*/*/Cargo.toml regions/system/*/*/*/Cargo.toml regions/system/*/*/*/*/Cargo.toml 2>/dev/null | sed 's/.*"\(.*\)"/\1/')
            for exc in $excludes; do
              if [ "$exc" = "--exclude" ]; then continue; fi
              if ! echo "$ws_packages" | grep -qx "$exc"; then
                echo "ERROR: excluded package '$exc' not found in workspace"
                exit 1
              fi
            done
            echo "=== Testing regions/system ==="
            cargo test --manifest-path regions/system/Cargo.toml --workspace $excludes --features k1s0-tenant-server/test-utils
            echo "=== Testing CLI ==="
            cargo test --manifest-path CLI/Cargo.toml --workspace --exclude k1s0-gui
          fi

  # Rust テストカバレッジ計測（cargo-tarpaulin）
  coverage-rust:
    if: inputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            regions/system
            CLI
            regions/business/taskmanagement/server/rust/project-master
            regions/service/task/server/rust/task
            regions/service/board/server/rust/board
            regions/service/activity/server/rust/activity
      - name: cargo-tarpaulin インストール（プリビルドバイナリ）
        run: |
          TARPAULIN_VERSION="0.31.2"
          curl -sL "https://github.com/xd009642/tarpaulin/releases/download/${TARPAULIN_VERSION}/cargo-tarpaulin-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C "$HOME/.cargo/bin"
          chmod +x "$HOME/.cargo/bin/cargo-tarpaulin"
      - name: Rust テストカバレッジ計測・閾値チェック
        shell: bash
        run: |
          mkdir -p coverage
          # カバレッジ閾値: 70%（業界標準 80% からの暫定値、段階的引き上げを予定）
          # M-04 対応: 実質的なビジネスロジックカバレッジ向上のために閾値を 80% に引き上げることを検討中
          RUST_COVERAGE_THRESHOLD=70
          # カバレッジ計測から以下を除外する:
          # - "*/tests/*": テストコード自体（カバレッジ対象外）
          # - "*/proto/*": Protocol Buffers 自動生成コード（品質評価対象外）
          # 除外理由: これらのファイルはビジネスロジックを含まないため
          cargo tarpaulin \
            --manifest-path regions/system/Cargo.toml \
            --workspace \
            --exclude-files "*/tests/*" "*/proto/*" \
            --skip-clean \
            --timeout 300 \
            --fail-under "$RUST_COVERAGE_THRESHOLD" \
            --out Json Html \
            --output-dir coverage/system
          cargo tarpaulin \
            --manifest-path CLI/Cargo.toml \
            --workspace \
            --exclude k1s0-gui \
            --exclude-files "*/tests/*" \
            --skip-clean \
            --timeout 300 \
            --fail-under "$RUST_COVERAGE_THRESHOLD" \
            --out Json Html \
            --output-dir coverage/cli
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: rust-coverage
          path: coverage/
      - name: Upload coverage
        uses: codecov/codecov-action@e28ff129e5465c2c0dcc6f003fc735cb6ae0c673 # v5
        with:
          # M-1対応: Codecov 障害時に CI 全体をブロックしない（外部サービス障害で開発が止まるリスクを排除する）
          # カバレッジはアーティファクトとして保存されるため、ローカルでの確認は引き続き可能
          fail_ci_if_error: false

  # コード生成テンプレートのコンパイル検証（golden path compile test）
  golden-path-compile:
    if: inputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            regions/system
            CLI
      - name: Golden path compile tests
        run: cargo test --manifest-path CLI/Cargo.toml -p k1s0-cli -- --ignored --test-threads=1

  # TypeScript ユニットテスト
  test-ts:
    if: inputs.ts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: pnpm/action-setup@fe02b74ab4e416c4c7bab5f6b855b3dfcebc46e2 # v4
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: 'pnpm'
      - name: Test TypeScript packages
        shell: bash
        env:
          AFFECTED_MODULES: ${{ inputs.ts_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#ts:}"
              if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
                echo "=== Testing $dir ==="
                (
                  cd "$dir"
                  pnpm install --frozen-lockfile
                  pnpm test --if-present
                )
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            mapfile -t packages < <(scripts/list-modules.sh --lang ts --no-skip-ci)
            for package_dir in "${packages[@]}"; do
              echo "=== Testing $package_dir ==="
              (
                cd "$package_dir"
                pnpm install --frozen-lockfile
                pnpm test --if-present
              )
            done
          fi

  # TypeScript テストカバレッジ計測
  coverage-ts:
    if: inputs.ts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: pnpm/action-setup@fe02b74ab4e416c4c7bab5f6b855b3dfcebc46e2 # v4
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: 'pnpm'
      - name: TypeScript テストカバレッジ計測・閾値チェック
        shell: bash
        run: |
          mkdir -p coverage
          chmod +x scripts/list-modules.sh
          mapfile -t packages < <(scripts/list-modules.sh --lang ts --no-skip-ci)
          # TypeScript カバレッジ閾値: 80%
          TS_COVERAGE_THRESHOLD=80
          for package_dir in "${packages[@]}"; do
            echo "=== Coverage $package_dir ==="
            (
              cd "$package_dir"
              pnpm install --frozen-lockfile
              if npx --no-install vitest --help >/dev/null 2>&1; then
                npx vitest run --coverage \
                  --coverage.thresholds.lines="$TS_COVERAGE_THRESHOLD" \
                  --reporter=json \
                  --outputFile="$GITHUB_WORKSPACE/coverage/$(basename "$package_dir").json"
              elif pnpm run test:coverage --if-present 2>/dev/null; then
                true
              fi
            )
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: ts-coverage
          path: coverage/
      - name: Upload coverage
        uses: codecov/codecov-action@e28ff129e5465c2c0dcc6f003fc735cb6ae0c673 # v5
        with:
          # M-1対応: Codecov 障害時に CI 全体をブロックしない（外部サービス障害で開発が止まるリスクを排除する）
          # カバレッジはアーティファクトとして保存されるため、ローカルでの確認は引き続き可能
          fail_ci_if_error: false

  # Dart/Flutter ユニットテスト + カバレッジ
  test-dart:
    if: inputs.dart == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          flutter-version: "3.24.0"
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.pub-cache
          key: dart-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: dart-pub-
      - name: lcov インストール（Dart カバレッジ閾値チェック用）
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: Test Dart and Flutter packages
        shell: bash
        env:
          AFFECTED_MODULES: ${{ inputs.dart_modules }}
        run: |
          # 影響モジュールが検出された場合はそのモジュールのみ処理する
          if [ -n "$AFFECTED_MODULES" ]; then
            IFS=',' read -ra entries <<< "$AFFECTED_MODULES"
            for entry in "${entries[@]}"; do
              dir="${entry#dart:}"
              if [ -d "$dir" ] && [ -f "$dir/pubspec.yaml" ]; then
                echo "=== Testing $dir ==="
                if grep -q "sdk: flutter" "$dir/pubspec.yaml"; then
                  (cd "$dir" && flutter pub get && flutter test)
                else
                  (cd "$dir" && dart pub get && dart test)
                fi
              fi
            done
          else
            chmod +x scripts/list-modules.sh
            mapfile -t packages < <(scripts/list-modules.sh --lang dart --no-skip-ci)
            for package_dir in "${packages[@]}"; do
              echo "=== Testing $package_dir ==="
              if grep -q "sdk: flutter" "$package_dir/pubspec.yaml"; then
                (cd "$package_dir" && flutter pub get && flutter test)
              else
                (cd "$package_dir" && dart pub get && dart test)
              fi
            done
          fi
      - name: Dart/Flutter テストカバレッジ計測・閾値チェック
        shell: bash
        run: |
          mkdir -p coverage
          chmod +x scripts/list-modules.sh
          mapfile -t packages < <(scripts/list-modules.sh --lang dart --no-skip-ci)
          # Dart/Flutter カバレッジ閾値: 80%
          DART_COVERAGE_THRESHOLD=80
          failed=0
          dart pub global activate coverage
          for package_dir in "${packages[@]}"; do
            echo "=== Coverage $package_dir ==="
            pkgname="$(basename "$package_dir")"
            if grep -q "sdk: flutter" "$package_dir/pubspec.yaml"; then
              (
                cd "$package_dir"
                flutter pub get
                flutter test --coverage
                if [ -f coverage/lcov.info ]; then
                  cp coverage/lcov.info "$GITHUB_WORKSPACE/coverage/${pkgname}.lcov"
                fi
              ) || { failed=1; echo "::error::$pkgname のテストが失敗しました"; }
            else
              (
                cd "$package_dir"
                dart pub get
                dart test --coverage=coverage
                dart pub global run coverage:format_coverage \
                  --packages=.dart_tool/package_config.json \
                  --report-on=lib \
                  --lcov \
                  --in=coverage \
                  --out=coverage/lcov.info
                if [ -f coverage/lcov.info ]; then
                  cp coverage/lcov.info "$GITHUB_WORKSPACE/coverage/${pkgname}.lcov"
                fi
              ) || { failed=1; echo "::error::$pkgname のテストが失敗しました"; }
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
      - name: Dart/Flutter カバレッジ閾値チェック
        shell: bash
        run: |
          DART_COVERAGE_THRESHOLD=80
          failed=0
          for lcov_file in coverage/*.lcov; do
            [ -f "$lcov_file" ] || continue
            pkgname="$(basename "$lcov_file" .lcov)"
            summary=$(lcov --summary "$lcov_file" 2>&1)
            coverage=$(echo "$summary" | grep -oP 'lines\.*:\s*\K[0-9]+\.[0-9]+(?=%)')
            if [ -z "$coverage" ]; then
              echo "::warning::$pkgname のカバレッジ率を取得できませんでした"
              continue
            fi
            echo "$pkgname: ${coverage}%"
            below=$(echo "$coverage < $DART_COVERAGE_THRESHOLD" | bc -l)
            if [ "$below" -eq 1 ]; then
              echo "::error::$pkgname のカバレッジ ${coverage}% が閾値 ${DART_COVERAGE_THRESHOLD}% を下回っています"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "全 Dart/Flutter パッケージのカバレッジが閾値 ${DART_COVERAGE_THRESHOLD}% を超えています"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: dart-coverage
          path: coverage/
      - name: Upload coverage
        uses: codecov/codecov-action@e28ff129e5465c2c0dcc6f003fc735cb6ae0c673 # v5
        with:
          # M-1対応: Codecov 障害時に CI 全体をブロックしない（外部サービス障害で開発が止まるリスクを排除する）
          # カバレッジはアーティファクトとして保存されるため、ローカルでの確認は引き続き可能
          fail_ci_if_error: false
