# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/_build.yaml
# 全言語のビルド検証ジョブを集約した再利用可能ワークフロー
# ci.yaml から workflow_call で呼び出す（test 完了後に実行する）
name: _build

permissions: {}

on:
  workflow_call:
    inputs:
      go:
        type: string
        required: false
        default: 'false'
      rust:
        type: string
        required: false
        default: 'false'
      ts:
        type: string
        required: false
        default: 'false'
      docker:
        type: string
        required: false
        default: 'false'

jobs:
  # Go ビルド検証
  build-go:
    if: inputs.go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.24.4"
          cache-dependency-path: "go.work.sum"
      - name: Build Go modules
        shell: bash
        run: |
          echo "=== Building all Go modules via go.work ==="
          go build ./...

  # Rust ビルド検証
  build-rust:
    if: inputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            regions/system
            CLI
            regions/business/accounting/server/rust/domain-master
            regions/service/inventory/server/rust/inventory
            regions/service/order/server/rust/order
            regions/service/payment/server/rust/payment
      - name: Build Rust crates
        shell: bash
        run: |
          chmod +x scripts/list-modules.sh
          excludes=""
          while IFS= read -r dir; do
            pkg_name=$(grep -m1 '^name' "$dir/Cargo.toml" | sed 's/.*"\(.*\)"/\1/')
            excludes="$excludes --exclude $pkg_name"
          done < <(scripts/list-modules.sh --lang rust --status experimental)
          ws_packages=$(grep -rh '^name' regions/system/*/Cargo.toml regions/system/*/*/Cargo.toml regions/system/*/*/*/Cargo.toml regions/system/*/*/*/*/Cargo.toml 2>/dev/null | sed 's/.*"\(.*\)"/\1/')
          for exc in $excludes; do
            if [ "$exc" = "--exclude" ]; then continue; fi
            if ! echo "$ws_packages" | grep -qx "$exc"; then
              echo "ERROR: excluded package '$exc' not found in workspace"
              exit 1
            fi
          done
          echo "=== Building regions/system ==="
          cargo build --manifest-path regions/system/Cargo.toml --workspace $excludes --all-targets
          echo "=== Building CLI ==="
          cargo build --manifest-path CLI/Cargo.toml --workspace --exclude k1s0-gui --all-targets
          for dir in regions/business/accounting/server/rust/domain-master regions/service/inventory/server/rust/inventory regions/service/order/server/rust/order regions/service/payment/server/rust/payment; do
            if [ -d "$dir" ] && [ -f "$dir/Cargo.toml" ]; then
              echo "=== Building $dir ==="
              cargo build --manifest-path "$dir/Cargo.toml" --all-targets
            fi
          done

  # TypeScript ビルド検証
  build-ts:
    if: inputs.ts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: pnpm/action-setup@fe02b74ab4e416c4c7bab5f6b855b3dfcebc46e2 # v4
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: 'pnpm'
      - name: Build TypeScript packages
        shell: bash
        run: |
          chmod +x scripts/list-modules.sh
          mapfile -t packages < <(scripts/list-modules.sh --lang ts --no-skip-ci)
          for package_dir in "${packages[@]}"; do
            echo "=== Building $package_dir ==="
            (
              cd "$package_dir"
              pnpm install --frozen-lockfile
              pnpm run build --if-present
            )
          done

  # GUI フロントエンドビルド検証（Windows）
  # Known Issue: Rolldown panic on Windows のため continue-on-error を設定する
  build-gui-windows:
    if: inputs.ts == 'true' || inputs.rust == 'true'
    runs-on: windows-latest
    permissions:
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
      - name: GUI フロントエンドビルド（Windows）
        working-directory: CLI/crates/k1s0-gui/ui
        run: |
          npm ci
          npm run build
      - name: Report Windows GUI build status
        if: always()
        run: |
          if [ "${{ job.status }}" = "failure" ]; then
            echo "::warning::Windows GUI build failed (Known Issue: Rolldown panic). See job logs for details."
          fi
        shell: bash

  # Docker イメージのビルド検証
  build-docker:
    if: inputs.docker == 'true' || inputs.go == 'true' || inputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Build service Docker images
        shell: bash
        run: |
          mapfile -t rust_dockerfiles < <(rg --files regions/system/server/rust -g 'Dockerfile' | sort)
          for dockerfile in "${rust_dockerfiles[@]}"; do
            server_name="$(basename "$(dirname "$dockerfile")")"
            tag="ci-${server_name}"
            echo "=== docker build $dockerfile ==="
            if [ "$server_name" = "graphql-gateway" ]; then
              docker build -f "$dockerfile" -t "$tag" .
            else
              docker build -f "regions/system/${dockerfile#regions/system/}" -t "$tag" regions/system
            fi
          done
          echo "=== docker build regions/system/server/go/bff-proxy/Dockerfile ==="
          docker build -t ci-bff-proxy regions/system/server/go/bff-proxy
          if [ -f regions/business/accounting/server/rust/domain-master/Dockerfile ]; then
            echo "=== docker build domain-master ==="
            docker build -f regions/business/accounting/server/rust/domain-master/Dockerfile -t ci-domain-master .
          fi

  # 全ビルドの集約ジョブ
  build:
    needs:
      - build-go
      - build-rust
      - build-ts
      - build-docker
    if: always() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Build validation summary
        run: echo "All language and Docker builds passed"
