# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/pin-docker-digests.yaml
# Docker ベースイメージの SHA256 ダイジェストを毎週自動更新し、PR を作成する
# サプライチェーンセキュリティの維持を自動化する
name: Pin Docker Digests

permissions: {}

on:
  schedule:
    # 毎週月曜日 09:00 UTC（日本時間 18:00）に実行する
    - cron: '0 9 * * 1'
  workflow_dispatch:
    # 手動実行も可能にする（テスト・緊急対応用）

jobs:
  pin-digests:
    runs-on: ubuntu-latest
    # コードの読み取りと PR 作成（write: contents + pull-requests）が必要
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Docker にログイン（レート制限回避のため）
        # Docker Hub のプルレート制限を回避するために認証する
        # 認証なしでは1時間に100プル制限があり、多数のイメージ確認で制限に達する可能性がある
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # シークレットが未設定の場合はスキップ（パブリックアクセスで代替）
        continue-on-error: true

      - name: Docker ダイジェストを固定する
        id: pin
        run: |
          # scripts/pin-docker-digests.sh で Dockerfile のベースイメージ SHA256 を更新する
          chmod +x scripts/pin-docker-digests.sh
          scripts/pin-docker-digests.sh

          # 変更があったかチェックする
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "変更なし: 全ての Docker ダイジェストは最新です"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "変更あり: 以下の Dockerfile が更新されました:"
            git diff --name-only
          fi

      - name: PR を作成する
        if: steps.pin.outputs.changed == 'true'
        # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: Docker ベースイメージの SHA256 ダイジェストを更新"
          title: "chore: Docker ベースイメージのダイジェスト自動更新"
          body: |
            ## 概要

            Docker ベースイメージの SHA256 ダイジェストを最新バージョンに更新しました。

            この PR は毎週月曜日に自動生成されます。

            ## 変更内容

            `scripts/pin-docker-digests.sh` によって更新された Dockerfile のダイジェスト値

            ## チェックリスト

            - [ ] Trivy イメージスキャンが PASS していること（CI で自動確認）
            - [ ] 変更された Dockerfile のベースイメージに既知の脆弱性がないこと

            ---
            *このPRは [pin-docker-digests.yaml](.github/workflows/pin-docker-digests.yaml) によって自動生成されました*
          branch: chore/pin-docker-digests
          labels: |
            security
            automated
          delete-branch: true
