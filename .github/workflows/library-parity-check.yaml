# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/library-parity-check.yaml
# マルチ言語ライブラリのパリティ（言語横断実装整合性）を検証するワークフロー
# modules.yaml の library_parity セクションに基づき、4言語の実装漏れを検出する
name: Library Parity Check

on:
  pull_request:
    branches: [main]
    paths:
      # ライブラリ追加・削除時にパリティを検証する
      - 'regions/system/library/**'
      # library_parity セクションの変更時にも検証する
      - 'modules.yaml'

concurrency:
  # 同一ブランチの重複実行をキャンセルして無駄なCI消費を防ぐ
  group: library-parity-${{ github.ref }}
  cancel-in-progress: true

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

jobs:
  # ライブラリ言語パリティチェックジョブ
  check-parity:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # check-library-parity.sh が PyYAML に依存するためインストールする
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.12'
      - name: PyYAML インストール
        run: pip install pyyaml
      # modules.yaml の library_parity 宣言と実装ディレクトリの整合性を検証する
      - name: ライブラリ言語パリティ検証
        run: bash scripts/check-library-parity.sh
