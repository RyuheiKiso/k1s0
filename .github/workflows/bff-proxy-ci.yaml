# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/bff-proxy-ci.yaml
# Per-service CI pipeline for bff-proxy server（reusable workflow 経由）
name: bff-proxy-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'regions/system/server/go/bff-proxy/**'

concurrency:
  group: bff-proxy-ci-${{ github.ref }}
  cancel-in-progress: true

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

jobs:
  # 再利用可能ワークフローを呼び出してCI実行
  ci:
    # コードの読み取りのみ必要
    permissions:
      contents: read
    uses: ./.github/workflows/_go-service-ci.yaml
    with:
      service-path: regions/system/server/go/bff-proxy
