# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/bff-proxy-ci.yaml
# Per-service CI pipeline for bff-proxy server (Go)
name: bff-proxy-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'regions/system/server/go/bff-proxy/**'

concurrency:
  group: bff-proxy-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: regions/system/server/go/bff-proxy/go.sum
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Vet
        run: go vet ./...
        working-directory: regions/system/server/go/bff-proxy
      - name: Lint
        run: golangci-lint run ./...
        working-directory: regions/system/server/go/bff-proxy

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: regions/system/server/go/bff-proxy/go.sum
      - name: Run tests
        run: go test ./... -race -count=1
        working-directory: regions/system/server/go/bff-proxy

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: regions/system/server/go/bff-proxy/go.sum
      - name: Build
        run: go build ./...
        working-directory: regions/system/server/go/bff-proxy
