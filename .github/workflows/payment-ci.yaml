# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/payment-ci.yaml
# Per-service CI pipeline for payment server（reusable workflow 経由）
# NOTE: payment は service tier のため独立した Cargo.toml を使用（standalone モード）
name: payment-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'regions/service/payment/server/**'
      # クライアントコード変更時もサーバーCIを起動し、契約整合性を確認する
      - 'regions/service/payment/client/**'
      # DB migration 変更はサーバーコードとの整合性確認が必要なため起動する
      - 'regions/service/payment/database/**'

concurrency:
  group: payment-ci-${{ github.ref }}
  cancel-in-progress: true

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

jobs:
  # 再利用可能ワークフローを呼び出してCI実行
  ci:
    # コードの読み取りのみ必要
    permissions:
      contents: read
    uses: ./.github/workflows/_rust-service-ci.yaml
    with:
      service-path: regions/service/payment/server/rust/payment
      package-name: k1s0-payment-server
      workspace-path: regions/service/payment/server/rust/payment
      standalone: true
