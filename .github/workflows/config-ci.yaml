# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/config-ci.yaml
# Per-service CI pipeline for config server（reusable workflow 経由）
name: config-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'regions/system/server/rust/config/**'

concurrency:
  group: config-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_rust-service-ci.yaml
    with:
      service-path: regions/system/server/rust/config
      package-name: k1s0-config-server
      workspace-path: regions/system
