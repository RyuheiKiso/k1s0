# .github/workflows/tauri-build.yaml
# CI pipeline for Tauri GUI application
# Triggered on PR with changes in CLI/crates/k1s0-gui paths
name: tauri-build

on:
  pull_request:
    branches: [main]
    paths:
      - 'CLI/crates/k1s0-gui/**'
      - 'CLI/crates/k1s0-core/**'
      - 'CLI/Cargo.toml'
      - 'CLI/Cargo.lock'
      - '.github/workflows/tauri-build.yaml'

concurrency:
  group: ci-${{ github.ref }}-tauri
  cancel-in-progress: true

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

jobs:
  # フロントエンドの lint とテスト
  lint:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: CLI/crates/k1s0-gui/ui/package-lock.json
      - run: npm ci
        working-directory: CLI/crates/k1s0-gui/ui
      - run: npm run lint
        working-directory: CLI/crates/k1s0-gui/ui
      - run: npx tsc --noEmit
        working-directory: CLI/crates/k1s0-gui/ui
      - run: npm test
        working-directory: CLI/crates/k1s0-gui/ui

  # クロスプラットフォーム Tauri アプリケーションのビルド
  build:
    needs: lint
    # コードの読み取りのみ必要
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: CLI/crates/k1s0-gui/ui/package-lock.json

      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93
        with:
          targets: ${{ matrix.target }}

      # Linux dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci
        working-directory: CLI/crates/k1s0-gui/ui

      - name: Build Tauri application
        id: tauri
        # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: CLI/crates/k1s0-gui
          args: --target ${{ matrix.target }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tauri-${{ matrix.platform }}
          path: ${{ steps.tauri.outputs.artifactPaths }}
          if-no-files-found: error
