# .github/workflows/tauri-build.yaml
# CI pipeline for Tauri GUI application
# Triggered on PR with changes in CLI/crates/k1s0-gui paths
name: tauri-build

on:
  pull_request:
    branches: [main]
    paths:
      - 'CLI/crates/k1s0-gui/**'
      - 'CLI/crates/k1s0-core/**'
      - 'CLI/Cargo.toml'
      - 'CLI/Cargo.lock'
      - '.github/workflows/tauri-build.yaml'

concurrency:
  group: ci-${{ github.ref }}-tauri
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: CLI/crates/k1s0-gui/ui/package-lock.json
      - run: npm ci
        working-directory: CLI/crates/k1s0-gui/ui
      - run: npm run lint
        working-directory: CLI/crates/k1s0-gui/ui
      - run: npx tsc --noEmit
        working-directory: CLI/crates/k1s0-gui/ui
      - run: npm test
        working-directory: CLI/crates/k1s0-gui/ui

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: CLI/crates/k1s0-gui/ui/package-lock.json

      - uses: dtolnay/rust-toolchain@1.100
        with:
          targets: ${{ matrix.target }}

      # Linux dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci
        working-directory: CLI/crates/k1s0-gui/ui

      - name: Build Tauri application
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: CLI/crates/k1s0-gui
          args: --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}
          path: ${{ steps.tauri.outputs.artifactPaths }}
          if-no-files-found: error
