# =============================================================================
# 本ファイルは nightly workflow（夜間バッチ E2E + 観測性 E2E）。
# 設計正典:
#   ADR-TEST-001（Test Pyramid: E2E は PR 時不実行、夜間バッチで全シナリオ）
#   ADR-TEST-002（E2E 自動化、cron 03:00 JST 起動）
#   ADR-TEST-006（観測性 E2E 5 検証を nightly で連動）
#
# 起動 trigger:
#   schedule: 03:00 JST（18:00 UTC）— 朝会前（07:00 JST）に完了する見込み
#   workflow_dispatch: 起案者 / 採用初期協力者の手動起動を許容
#
# 失敗時は actions/upload-artifact で screenshot / HAR / k6-summary / cluster-logs を
# 14 日保存し、翌朝のトリアージで参照する。
# =============================================================================
name: nightly

on:
  schedule:
    # 03:00 JST = 18:00 UTC（前日のコード変更を翌朝確認する設計）
    - cron: "0 18 * * *"
  workflow_dispatch:
    # 採用初期で workflow_dispatch から手動起動して role / 観測性 を切替可能にする
    inputs:
      role:
        description: "tools/local-stack/up.sh の --role 引数"
        required: false
        type: string
        default: "tier1-go-dev"
      run_observability:
        description: "観測性 E2E（5 検証）も実行するか"
        required: false
        type: boolean
        default: true

concurrency:
  # nightly が前回未完了で次の起動が来た場合は前回をキャンセルして最新で再走
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    # ADR-TEST-002 で約束した「nightly E2E + 観測性 E2E」を _reusable-e2e.yml に委譲
    uses: ./.github/workflows/_reusable-e2e.yml
    with:
      role: ${{ inputs.role || 'tier1-go-dev' }}
      timeout_minutes: 60
      # schedule 起動時は inputs.run_observability が空のため fallback で true
      run_observability: ${{ inputs.run_observability != false }}
