# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/cluster-etcd-encryption.yaml
#
# M-01 監査対応: etcd 保存データ暗号化設定（EncryptionConfiguration）のプロビジョニング
#
# このワークフローは手動トリガーのみ（workflow_dispatch）。
# kube-apiserver の --encryption-provider-config は1度設定すると全 Secret の
# re-encrypt が必要となるため、慎重に実行すること（ops/kubernetes-ops.md を参照）。
#
# 実行フロー:
#   1. Vault から etcd 暗号化キーを取得する
#   2. infra/kubernetes/security/encryption-config.yaml のプレースホルダーを実値に置換する
#   3. check-placeholder-secrets.sh でプレースホルダーが残存していないことを検証する
#   4. kubectl apply で kube-apiserver に適用する（self-hosted ランナー必須）
#
# 前提条件:
#   - Vault: secret/data/k1s0/infra/etcd-encryption に以下のキーを登録済みであること
#       secrets_key: <base64 エンコードされた 32 バイトのランダムキー>
#       configmaps_key: <base64 エンコードされた 32 バイトのランダムキー（secrets_key とは別値）>
#   - GitHub Secrets: VAULT_ADDR, VAULT_ROLE が設定済みであること
#   - self-hosted ランナー（prod ラベル）が対象クラスタへの kubectl アクセスを持つこと
name: Cluster etcd Encryption Provisioning

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "デプロイ対象環境 (staging / prod)"
        required: true
        type: choice
        options:
          - staging
          - prod
      dry_run:
        description: "ドライランモード (true: kubectl apply をスキップする)"
        required: false
        type: boolean
        default: true

# 最小権限の原則: 本ワークフローはシークレット読み取りと OIDC トークン取得のみ要求する
permissions: {}

jobs:
  provision-etcd-encryption:
    runs-on: [self-hosted, "${{ inputs.environment }}"]
    # GitHub Environments による承認ゲートと監査ログを利用する
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write  # Vault の OIDC 認証に必要

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # Vault から etcd 暗号化キーを取得する
      # キーは Vault の secret/data/k1s0/infra/etcd-encryption に保存されている
      - name: Vault から暗号化キーを取得
        id: vault
        uses: hashicorp/vault-action@d1720f055e0635fd932a1d2a48f87a666a57906c # v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: ${{ secrets.VAULT_ROLE }}
          secrets: |
            secret/data/k1s0/infra/etcd-encryption secrets_key | ETCD_SECRETS_KEY ;
            secret/data/k1s0/infra/etcd-encryption configmaps_key | ETCD_CONFIGMAPS_KEY

      # プレースホルダーを Vault から取得した実値に置換する
      # 元のテンプレートファイルは書き換えず、作業用コピーを生成する
      - name: 暗号化設定ファイルにキーを注入
        run: |
          cp infra/kubernetes/security/encryption-config.yaml /tmp/encryption-config.yaml
          sed -i "s|<REPLACE_WITH_BASE64_32BYTE_KEY>|${{ steps.vault.outputs.ETCD_SECRETS_KEY }}|1" /tmp/encryption-config.yaml
          sed -i "s|<REPLACE_WITH_BASE64_32BYTE_KEY>|${{ steps.vault.outputs.ETCD_CONFIGMAPS_KEY }}|1" /tmp/encryption-config.yaml

      # M-01 監査対応: プレースホルダーが残存していないことを検証する
      # check-placeholder-secrets.sh が残存を検知した場合はデプロイを阻止する
      - name: プレースホルダー残存チェック
        run: bash scripts/check-placeholder-secrets.sh /tmp/encryption-config.yaml

      # ドライランモードでは kubectl apply をスキップし、設定内容を確認のみ行う
      - name: 設定内容の確認（dry-run）
        if: inputs.dry_run == true
        run: |
          echo "=== 生成された EncryptionConfiguration ==="
          # キーの実値は表示しない（マスク）
          grep -v "secret:" /tmp/encryption-config.yaml
          echo "=== ドライランモード: kubectl apply はスキップされました ==="

      # kube-apiserver に暗号化設定を適用する（本番実行時のみ）
      # 注意: 適用後は全 Secrets の re-encrypt が必要となる場合がある
      - name: etcd 暗号化設定の適用
        if: inputs.dry_run == false
        run: |
          kubectl apply -f /tmp/encryption-config.yaml
          echo "etcd 暗号化設定を適用しました。kube-apiserver の再起動後に有効になります。"
          echo "適用後は kubectl get secrets --all-namespaces で re-encrypt の実施を確認してください。"

      # 作業用ファイル（実値を含む）を確実に削除する
      - name: 作業ファイルのクリーンアップ
        if: always()
        run: rm -f /tmp/encryption-config.yaml
