# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/publish-app.yaml
# Flutter クロスプラットフォーム ビルド + 署名 + アップロード パイプライン
# P1-9: publish ジョブに production 環境の承認ゲートを追加
name: publish-app

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'Application ID (e.g., task-client)'
        required: true
        type: string
      version:
        description: 'Version (e.g., 1.2.0)'
        required: true
        type: string
      flutter_project_path:
        description: 'Path to Flutter project'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''
      mandatory:
        description: 'Mandatory update'
        required: false
        type: boolean
        default: false

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

env:
  REGISTRY_URL: https://app-registry.internal.example.com

jobs:
  # ---------- ビルド・署名・SBOM 生成 ----------
  # ビルド成果物を GitHub Actions Artifact として保存し、後続の publish ジョブで使用する
  build:
    # コードの読み取りと OIDC トークン（Cosign 署名）が必要
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            extension: exe
          - os: ubuntu-latest
            platform: linux
            arch: x64
            extension: AppImage
          - os: macos-latest
            platform: macos
            arch: arm64
            extension: dmg
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable

      # Flutter の依存関係をインストール
      - name: Install dependencies
        run: flutter pub get
        working-directory: ${{ inputs.flutter_project_path }}

      # プラットフォーム別のリリースビルドを実行
      - name: Build
        run: flutter build ${{ matrix.platform == 'linux' && 'linux' || matrix.platform == 'macos' && 'macos' || 'windows' }} --release
        working-directory: ${{ inputs.flutter_project_path }}

      # パッケージスクリプトで配布用バイナリを作成
      - name: Package
        id: package
        run: |
          # Package script creates the distributable
          bash scripts/package.sh \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --input-dir ${{ inputs.flutter_project_path }}/build \
            --output-dir ./dist \
            --app-name ${{ inputs.app_id }} \
            --version ${{ inputs.version }}
          echo "artifact_path=./dist/${{ inputs.app_id }}.${{ matrix.extension }}" >> $GITHUB_OUTPUT

      # SHA-256 チェックサムを生成して改ざん検知に使用
      - name: Generate SHA-256 checksum
        id: checksum
        shell: bash
        run: |
          CHECKSUM=$(sha256sum ${{ steps.package.outputs.artifact_path }} | awk '{print $1}')
          echo "sha256=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "$CHECKSUM  ${{ inputs.app_id }}.${{ matrix.extension }}" > ${{ steps.package.outputs.artifact_path }}.sha256

      # Cosign でバイナリに署名し、真正性を保証
      - name: Sign with Cosign
        # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - run: |
          cosign sign-blob --yes \
            --output-signature ${{ steps.package.outputs.artifact_path }}.sig \
            ${{ steps.package.outputs.artifact_path }}

      # SBOM（ソフトウェア部品表）を生成してサプライチェーンの透明性を確保
      - name: Generate SBOM
        # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.flutter_project_path }}
          format: cyclonedx
          output: ./dist/${{ inputs.app_id }}.sbom.json

      # ビルド成果物を GitHub Actions Artifact にアップロードし、publish ジョブに引き継ぐ
      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: app-${{ matrix.platform }}-${{ matrix.arch }}
          path: ./dist/
          if-no-files-found: error

  # ---------- 承認ゲート付きパブリッシュ ----------
  # IMPORTANT: GitHub リポジトリ設定で production 環境に Required reviewers を設定すること。
  # Settings → Environments → production → Required reviewers
  # これにより、ビルド完了後に手動承認がなければ App Registry への登録が実行されないようになる。
  publish:
    needs: build
    # コードの読み取りのみ必要（App Registry は secrets 経由でアクセス）
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - platform: windows
            arch: x64
            extension: exe
          - platform: linux
            arch: x64
            extension: AppImage
          - platform: macos
            arch: arm64
            extension: dmg
    runs-on: ubuntu-latest
    # production 環境の承認ゲート: Required reviewers による手動承認が必要
    environment:
      name: production
      url: ${{ env.REGISTRY_URL }}/apps/${{ inputs.app_id }}

    steps:
      # ビルドジョブで保存した成果物をダウンロード
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: app-${{ matrix.platform }}-${{ matrix.arch }}
          path: ./dist

      # App Registry にビルド成果物をアップロードしてバージョン情報を登録する
      # app-registry サーバーが直接ファイルを保存・配信するため、外部ストレージは不要
      - name: Register version in App Registry
        shell: bash
        run: |
          ARTIFACT_PATH="./dist/${{ inputs.app_id }}.${{ matrix.extension }}"
          SIZE=$(stat -c%s "${ARTIFACT_PATH}" 2>/dev/null || stat -f%z "${ARTIFACT_PATH}")
          CHECKSUM=$(sha256sum "${ARTIFACT_PATH}" | awk '{print $1}')
          # storage_key: app-registry サーバー上のファイル保存パス
          STORAGE_KEY="${{ inputs.app_id }}/${{ inputs.version }}/${{ matrix.platform }}-${{ matrix.arch }}/${{ inputs.app_id }}.${{ matrix.extension }}"
          curl -sf -X POST "${{ env.REGISTRY_URL }}/api/v1/apps/${{ inputs.app_id }}/versions" \
            -H "Authorization: Bearer ${{ secrets.APP_REGISTRY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"version\": \"${{ inputs.version }}\",
              \"platform\": \"${{ matrix.platform }}\",
              \"arch\": \"${{ matrix.arch }}\",
              \"size_bytes\": $SIZE,
              \"checksum_sha256\": \"${CHECKSUM}\",
              \"storage_key\": \"${STORAGE_KEY}\",
              \"release_notes\": \"${{ inputs.release_notes }}\",
              \"mandatory\": ${{ inputs.mandatory }}
            }"
