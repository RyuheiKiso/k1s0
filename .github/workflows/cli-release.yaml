# .github/workflows/cli-release.yaml
# Build and release k1s0-cli binaries for Linux, macOS, Windows
name: cli-release

on:
  push:
    tags:
      - 'cli-v*'  # e.g. cli-v0.1.0

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

jobs:
  # クロスプラットフォームバイナリのビルド
  build:
    # コードの読み取りのみ必要
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - platform: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - platform: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - platform: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build CLI binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p k1s0-cli --manifest-path CLI/Cargo.toml
          else
            cargo build --release --target ${{ matrix.target }} -p k1s0-cli --manifest-path CLI/Cargo.toml
          fi

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN_NAME="k1s0"
          ARCHIVE_NAME="k1s0-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "CLI/target/${{ matrix.target }}/release/${BIN_NAME}" dist/
          cd dist && tar czf "../${ARCHIVE_NAME}" "${BIN_NAME}"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          BIN_NAME="k1s0.exe"
          ARCHIVE_NAME="k1s0-cli-${{ github.ref_name }}-${{ matrix.target }}.zip"
          mkdir -p dist
          cp "CLI/target/${{ matrix.target }}/release/${BIN_NAME}" dist/
          cd dist && 7z a "../${ARCHIVE_NAME}" "${BIN_NAME}"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: k1s0-cli-${{ matrix.target }}
          path: ${{ env.ARCHIVE_NAME }}

  # GitHub Release の作成とバイナリのアップロード
  release:
    needs: build
    runs-on: ubuntu-latest
    # リリース作成のためコンテンツの書き込み権限が必要
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
