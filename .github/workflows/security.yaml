# .github/workflows/security.yaml
name: Security Scan

on:
  schedule:
    - cron: '0 2 * * *'    # 毎日 AM 2:00 (UTC)
  pull_request:
    branches: [main]
  # main マージ後もイメージスキャンを実行する（push の後にイメージが存在するため）
  push:
    branches: [main]

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

jobs:
  # ファイルシステム全体の脆弱性スキャン（Trivy）
  trivy-scan:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        with:
          scan-type: fs
          scan-ref: .
          # MEDIUM も含めてスキャン: サプライチェーン攻撃は MEDIUM 脆弱性の悪用から始まることが多い（M-23対応）
          severity: MEDIUM,HIGH,CRITICAL
          format: table
          exit-code: 1

  # 各言語の依存関係脆弱性チェック
  dependency-check:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # Go ツールチェインのセットアップ（パッチバージョン固定で再現性を確保）
      - name: Go セットアップ
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.24.4'
      # govulncheck コマンドのインストール
      - name: Go vulncheck インストール
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Rust ツールチェインのセットアップ
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Rust セットアップ
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      # cargo-audit コマンドのインストール
      - name: cargo-audit インストール
        run: cargo install cargo-audit

      # Node.js ランタイムのセットアップ
      - name: Node.js セットアップ
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      # Flutter/Dart SDK のセットアップ
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Flutter セットアップ
        uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable

      # ファイル探索に必要な ripgrep のインストール
      - name: ripgrep インストール
        run: sudo apt-get install -y ripgrep

      # 各言語のスキャンは独立して実行する（途中失敗で後続がスキップされないように）
      # Go モジュールの脆弱性スキャン
      - name: Go 脆弱性スキャン
        id: go-vulncheck
        continue-on-error: true
        run: bash scripts/security/go-vulncheck.sh

      # Rust クレートの脆弱性監査
      - name: Rust 脆弱性監査
        id: cargo-audit
        # H-05 監査対応: continue-on-error: true は意図的な設計。
        # 全スキャナが並列実行された後、下の集約ステップ(スキャン結果の集約)で
        # いずれかのスキャナが失敗した場合にジョブ全体を失敗させる。
        # (fan-out → aggregate パターン: 各スキャナを独立して実行し、最後に一括評価する)
        continue-on-error: true
        run: bash scripts/security/cargo-audit.sh

      # npm パッケージの脆弱性監査
      - name: npm 脆弱性監査
        id: npm-audit
        continue-on-error: true
        run: bash scripts/security/npm-audit.sh

      # Dart/Flutter パッケージの古い依存チェック（advisory）
      - name: Dart 依存チェック
        id: dart-outdated
        continue-on-error: true
        run: bash scripts/security/dart-outdated.sh

      # いずれかのスキャンが失敗した場合にジョブ全体を失敗させる
      - name: スキャン結果の集約
        run: |
          echo "Go: ${{ steps.go-vulncheck.outcome }}"
          echo "Rust: ${{ steps.cargo-audit.outcome }}"
          echo "npm: ${{ steps.npm-audit.outcome }}"
          echo "Dart: ${{ steps.dart-outdated.outcome }}"
          if [ "${{ steps.go-vulncheck.outcome }}" = "failure" ] || \
             [ "${{ steps.cargo-audit.outcome }}" = "failure" ] || \
             [ "${{ steps.npm-audit.outcome }}" = "failure" ] || \
             [ "${{ steps.dart-outdated.outcome }}" = "failure" ]; then
            echo "::error::One or more security scans failed"
            exit 1
          fi

  # 全ティアのコンテナイメージ脆弱性スキャン（定期実行 + main マージ後）
  # マトリクス戦略で system / business / service ティアの全サービスイメージをスキャン
  image-scan:
    runs-on: ubuntu-latest
    # PR 時はイメージが存在しないためスキップ。スケジュール実行と main マージ後のみ実行する
    if: github.event_name == 'schedule' || github.event_name == 'push'
    # コンテナイメージの読み取りのみ必要
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- system ティア ---
          - tier: system
            service: auth
          - tier: system
            service: config
          - tier: system
            service: saga
          - tier: system
            service: bff-proxy
          - tier: system
            service: app-registry
          - tier: system
            service: dlq-manager
          - tier: system
            service: graphql-gateway
          - tier: system
            service: search
          - tier: system
            service: vault
          - tier: system
            service: tenant
          - tier: system
            service: session
          - tier: system
            service: notification
          - tier: system
            service: navigation
          - tier: system
            service: master-maintenance
          - tier: system
            service: file
          - tier: system
            service: featureflag
          - tier: system
            service: scheduler
          - tier: system
            service: workflow
          - tier: system
            service: rule-engine
          - tier: system
            service: policy
          - tier: system
            service: quota
          - tier: system
            service: ratelimit
          - tier: system
            service: event-store
          - tier: system
            service: event-monitor
          - tier: system
            service: api-registry
          # ai-gateway, ai-agent は試験中サービスのため image-scan 対象から除外（HIGH-010 監査対応）
          # renovate.json の excludePackagePatterns と統一する
          - tier: system
            service: service-catalog
          # --- business ティア ---
          - tier: business
            service: project-master
          # --- service ティア ---
          - tier: service
            service: task
          - tier: service
            service: activity
          - tier: service
            service: board
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      # 直近の Git タグからバージョンを取得（:latest タグに依存しないため）
      - name: Set version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: コンテナイメージの脆弱性スキャン (${{ matrix.tier }}/${{ matrix.service }})
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        with:
          scan-type: image
          # 最新のバージョンタグを動的に取得してスキャン（:latest は使用しない）
          image-ref: harbor.internal.example.com/k1s0-${{ matrix.tier }}/${{ matrix.service }}:${{ steps.version.outputs.value }}
          # MEDIUM も含めてスキャン: サプライチェーン攻撃は MEDIUM 脆弱性の悪用から始まることが多い（M-23対応）
          severity: MEDIUM,HIGH,CRITICAL
          format: table
          # HIGH/CRITICAL 脆弱性検出時にジョブを失敗させる（他のスキャンと統一）
          exit-code: 1

  # IaC（Infrastructure as Code）構成ミススキャン
  # Terraform / Kubernetes マニフェストの設定ミスを Trivy で検出
  iac-scan:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Trivy IaC 構成スキャン
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        with:
          scan-type: config
          scan-ref: infra/
          # MEDIUM も含めてスキャン: サプライチェーン攻撃は MEDIUM 脆弱性の悪用から始まることが多い（M-23対応）
          severity: MEDIUM,HIGH,CRITICAL
          format: table
          exit-code: 1

  # ライセンスコンプライアンスチェック
  # 依存関係のライセンスが許容範囲内かを Trivy で検証
  license-scan:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Trivy ライセンスコンプライアンススキャン
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: license
          # MEDIUM も含めてスキャン: サプライチェーン攻撃は MEDIUM 脆弱性の悪用から始まることが多い（M-23対応）
          severity: MEDIUM,HIGH,CRITICAL
          format: table
          exit-code: 1

  # SAST（静的アプリケーションセキュリティテスト）
  # HIGH-17 監査対応: Go/Rust に加え TypeScript/Dart の SAST カバレッジを追加
  # Go: gosec、Rust: clippy security lints、TypeScript: eslint-plugin-security、Dart: dart analyze
  sast:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # Go ツールチェインのセットアップ
      - name: Go セットアップ
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.24.4'

      # Rust ツールチェインのセットアップ
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Rust セットアップ
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy

      # Node.js ランタイムのセットアップ（TypeScript SAST で使用）
      - name: Node.js セットアップ
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      # Flutter/Dart SDK のセットアップ（Dart SAST で使用）
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Flutter セットアップ
        uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable

      # ripgrep のインストール（ファイル探索に使用）
      - name: ripgrep インストール
        run: sudo apt-get install -y ripgrep

      # Go の静的セキュリティ解析（gosec）
      - name: gosec インストール
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Go SAST スキャン
        id: gosec
        continue-on-error: true
        run: bash scripts/security/gosec-scan.sh

      # Rust の静的セキュリティ解析（clippy security lints）
      - name: Rust SAST スキャン
        id: clippy-security
        continue-on-error: true
        run: bash scripts/security/clippy-security.sh

      # TypeScript の静的セキュリティ解析（eslint-plugin-security）
      # object-injection / 非リテラル正規表現 / タイミング攻撃の可能性を検出する
      - name: TypeScript SAST (ESLint Security)
        id: ts-sast
        continue-on-error: true
        run: |
          cd regions/system/client/react/system-client
          npx --yes eslint --plugin security \
            --rule 'security/detect-object-injection: warn' \
            --rule 'security/detect-non-literal-regexp: warn' \
            --rule 'security/detect-possible-timing-attacks: warn' \
            src/ --format json --output-file /tmp/ts-sast-result.json || true
          cat /tmp/ts-sast-result.json

      # Dart の静的解析（dart analyze --fatal-infos）
      # auth ライブラリおよび Flutter クライアントの未使用変数・非推奨 API を検出する
      - name: Dart Static Analysis
        id: dart-sast
        continue-on-error: true
        run: |
          for dir in regions/system/library/dart/auth regions/system/client/flutter/system_client; do
            if [ -f "$dir/pubspec.yaml" ]; then
              echo "=== dart analyze: $dir ==="
              # M-05 監査対応: || true を除去し、dart analyze の失敗を CI で正しく検出する
              cd $dir && dart analyze --fatal-infos && cd -
            fi
          done

      # いずれかのスキャンが失敗した場合にジョブ全体を失敗させる
      - name: SAST 結果の集約
        run: |
          echo "Go gosec:          ${{ steps.gosec.outcome }}"
          echo "Rust clippy:       ${{ steps.clippy-security.outcome }}"
          echo "TypeScript ESLint: ${{ steps.ts-sast.outcome }}"
          echo "Dart analyze:      ${{ steps.dart-sast.outcome }}"
          if [ "${{ steps.gosec.outcome }}" = "failure" ] || \
             [ "${{ steps.clippy-security.outcome }}" = "failure" ] || \
             [ "${{ steps.ts-sast.outcome }}" = "failure" ] || \
             [ "${{ steps.dart-sast.outcome }}" = "failure" ]; then
            echo "::error::One or more SAST scans failed"
            exit 1
          fi

  # M-06 監査対応: コミット履歴内のシークレット漏洩を gitleaks で検出するジョブ
  # 認証情報・APIキー・パスワード等がリポジトリ履歴に混入していないことを確認する
  secret-scan:
    name: シークレットスキャン
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      # コミット履歴内の認証情報・シークレット漏洩を検出する（M-06 監査対応）
      - name: gitleaks シークレットスキャン
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc2580ac56f311897a37c4fc24a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

  # K8S-TF-002 / K8S-BACKUP-001 監査対応: 設定値の整合性チェックジョブ
  # - prod/backend.tf に example.com が残っている場合に失敗（未置換プレースホルダー検出）
  # - vault バックアップイメージバージョンが docker-compose.yaml と一致することを確認
  config-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # K8S-TF-002 監査対応: 本番 Terraform backend に example.com プレースホルダーが
      # 残っている場合は未設定のまま apply されるリスクがあるため CI で検出して失敗させる。
      - name: Terraform prod backend example.com チェック
        run: |
          if grep -q "rgw\.internal\.example\.com" infra/terraform/environments/prod/backend.tf; then
            echo "::error::infra/terraform/environments/prod/backend.tf に example.com エンドポイントが残っています。"
            echo "::error::本番デプロイ前に実際の Ceph RGW エンドポイント URL に変更してください。"
            exit 1
          fi
          echo "OK: prod backend.tf に example.com プレースホルダーは検出されませんでした"

      # K8S-BACKUP-001 監査対応: vault バックアップ CronJob のイメージバージョンが
      # docker-compose.yaml の vault イメージバージョンと一致することを確認する。
      # バージョン不一致は復旧手順の差異を引き起こし、障害時のリストアに失敗するリスクがある。
      - name: Vault バックアップイメージバージョン整合性チェック
        run: |
          COMPOSE_VERSION=$(grep 'image: hashicorp/vault:' docker-compose.yaml | head -1 | sed 's/.*hashicorp\/vault://' | tr -d ' ')
          BACKUP_VERSION=$(grep 'image: hashicorp/vault:' infra/kubernetes/backup/vault-backup-cronjob.yaml | head -1 | sed 's/.*hashicorp\/vault://' | tr -d ' ')
          echo "docker-compose.yaml vault version: ${COMPOSE_VERSION}"
          echo "vault-backup-cronjob.yaml vault version: ${BACKUP_VERSION}"
          if [ "${COMPOSE_VERSION}" != "${BACKUP_VERSION}" ]; then
            echo "::error::Vault イメージバージョンが不一致です: docker-compose=${COMPOSE_VERSION}, backup-cronjob=${BACKUP_VERSION}"
            echo "::error::infra/kubernetes/backup/vault-backup-cronjob.yaml のバージョンを ${COMPOSE_VERSION} に更新してください。"
            exit 1
          fi
          echo "OK: Vault バックアップイメージバージョンが一致しています: ${COMPOSE_VERSION}"

      # SEC-INFRA-001 監査対応: etcd 暗号化キーおよびインフラ機密値のプレースホルダー残存チェック
      # <REPLACE_WITH_BASE64_32BYTE_KEY> や <REPLACE_WITH_GRAFANA_API_KEY> のまま
      # kubectl apply されると etcd の Secrets が平文保存されるリスクがある。
      # scripts/check-placeholder-secrets.sh を使って以下のファイルを検査する:
      #   - infra/kubernetes/security/encryption-config.yaml   : etcd 暗号化キー
      #   - infra/kubernetes/ingress/kong-consumer-grafana.yaml : Grafana API キー（テンプレートファイル）
      #   - infra/observability/alertmanager/prometheus-msteams-webhook-secret.yaml : Webhook URL
      # 注意: これらのファイルはテンプレートとしてリポジトリ管理されており、
      #       本番デプロイ時には CI/CD パイプライン（cluster-etcd-encryption.yaml 等）が
      #       Vault から実値を注入してから apply する。
      #       本チェックはソースファイルにプレースホルダーが残存することが「意図的」であることを
      #       確認するためではなく、誤って実値がコミットされていないことを確認するためのものである。
      #       そのため、プレースホルダーが検出された場合は "OK"（期待どおり）として扱う。
      #       逆に、これらのファイルからプレースホルダーが消えていた場合は、
      #       実値がコミットされた可能性があるため gitleaks の secret-scan で検出される。
      - name: etcd・インフラ機密値のプレースホルダー残存チェック（SEC-INFRA-001）
        run: |
          # 検査対象: リポジトリ内のテンプレートファイルにプレースホルダーが正しく残存しているか確認する
          # プレースホルダーが「存在すること」が正常状態（実値がコミットされていないことの証明）
          ALL_OK=0
          for TARGET_FILE in \
            "infra/kubernetes/security/encryption-config.yaml" \
            "infra/kubernetes/ingress/kong-consumer-grafana.yaml" \
            "infra/observability/alertmanager/prometheus-msteams-webhook-secret.yaml"; do
            if [ ! -f "$TARGET_FILE" ]; then
              echo "INFO: $TARGET_FILE が見つかりません（テンプレートのみの環境では問題なし）"
              continue
            fi
            if grep -q '<REPLACE_' "$TARGET_FILE"; then
              echo "OK: $TARGET_FILE にプレースホルダーが正しく残存しています（実値はコミットされていません）"
            else
              echo "::error::$TARGET_FILE からプレースホルダーが消えています。"
              echo "::error::実値が誤ってコミットされた可能性があります。git diff HEAD で確認してください。"
              ALL_OK=1
            fi
          done
          exit $ALL_OK

      # LOW-005 監査対応: Helm values.yaml の example.com プレースホルダー残存チェック
      # harbor.internal.example.com 等は本番デプロイ時に実レジストリ URL に置換が必要
      # 現時点では INFO レベル（exit 0）で検出のみ行い、本番デプロイパイプラインで exit 1 に昇格予定
      - name: Helm values example.com プレースホルダー検出
        run: |
          echo "=== Helm values.yaml の example.com プレースホルダー確認 ==="
          FOUND=$(grep -rl "example\.com" infra/helm/ --include="*.yaml" 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "INFO: 以下のファイルに example.com プレースホルダーが残存しています"
            echo "INFO: 本番デプロイ前に実際のドメインに置換してください"
            echo "${FOUND}"
            COUNT=$(echo "${FOUND}" | wc -l)
            echo "::notice::${COUNT} ファイルに example.com プレースホルダーが残存しています（本番デプロイ前に要置換）"
          else
            echo "OK: infra/helm/ に example.com プレースホルダーは検出されませんでした"
          fi
              # INFO レベルのため exit 0（本番デプロイパイプラインでは exit 1 に昇格）

      # HIGH-005 監査対応: advisory-ignore-list.txt と deny.toml の整合性チェック
      # advisory-ignore-list.txt が SINGLE SOURCE OF TRUTH となるため、
      # deny.toml との差異がある場合は CI でブロックする（二重管理の乖離防止）
      - name: advisory-ignore-list.txt と deny.toml の整合性チェック
        run: |
          echo "=== advisory-ignore-list.txt ↔ deny.toml 整合性チェック ==="
          IGNORE_LIST="scripts/security/advisory-ignore-list.txt"
          failed=0

          # 方向1: advisory-ignore-list.txt → deny.toml（リストの全エントリが deny.toml に存在するか）
          while IFS= read -r line; do
            [[ "$line" =~ ^[[:space:]]*(#|$) ]] && continue
            advisory=$(echo "$line" | awk '{print $1}')
            [[ -z "$advisory" ]] && continue
            if ! grep -q "\"${advisory}\"" deny.toml; then
              echo "::error::${advisory} は advisory-ignore-list.txt にあるが deny.toml の ignore リストにありません"
              failed=1
            fi
          done < "${IGNORE_LIST}"

          # 方向2: deny.toml → advisory-ignore-list.txt（deny.toml の全エントリがリストに存在するか）
          while IFS= read -r line; do
            if [[ "$line" =~ \"(RUSTSEC-[0-9]{4}-[0-9]+)\" ]]; then
              advisory="${BASH_REMATCH[1]}"
              if ! grep -q "^${advisory}" "${IGNORE_LIST}"; then
                echo "::error::${advisory} は deny.toml にあるが advisory-ignore-list.txt にありません"
                failed=1
              fi
            fi
          done < deny.toml

          if [ "$failed" -eq 0 ]; then
            echo "OK: advisory-ignore-list.txt と deny.toml は同期されています"
          fi
          exit $failed

  # 全セキュリティジョブの集約ゲート
  # ブランチ保護ルールでこのジョブのみを必須化することで、全スキャンの合否を一元管理できる
  # MED-008 監査対応: image-scan を needs に追加し、失敗時にゲートをブロックする
  # image-scan は PR 時 skipped（イメージ未存在）、schedule/push 時に実行される
  # skipped および success は許容、failure のみゲートをブロックする
  security-gate:
    runs-on: ubuntu-latest
    # 全セキュリティジョブが完了（成功・失敗問わず）してから実行する
    needs:
      - trivy-scan
      - dependency-check
      - image-scan
      - iac-scan
      - license-scan
      - sast
      # M-06 監査対応: secret-scan ジョブをゲートに追加
      - secret-scan
      # K8S-TF-002 / K8S-BACKUP-001 監査対応: 設定値整合性チェックをゲートに追加
      - config-validation
    # always() を使って前段ジョブが失敗しても本ジョブは必ず実行する
    if: always()
    permissions: {}
    steps:
      # 全ジョブの結果を検査し、failure があればゲートを閉じる
      # MED-008: image-scan は skipped（PR 時）または success/failure のいずれかになる
      #          skipped は許容するが failure はブロックする
      - name: セキュリティスキャン全体の合否判定
        run: |
          echo "trivy-scan:        ${{ needs.trivy-scan.result }}"
          echo "dependency-check:  ${{ needs.dependency-check.result }}"
          echo "image-scan:        ${{ needs.image-scan.result }}"
          echo "iac-scan:          ${{ needs.iac-scan.result }}"
          echo "license-scan:      ${{ needs.license-scan.result }}"
          echo "sast:              ${{ needs.sast.result }}"
          echo "secret-scan:       ${{ needs.secret-scan.result }}"
          echo "config-validation: ${{ needs.config-validation.result }}"
          if [ "${{ needs.trivy-scan.result }}"        = "failure" ] || \
             [ "${{ needs.dependency-check.result }}"  = "failure" ] || \
             [ "${{ needs.image-scan.result }}"        = "failure" ] || \
             [ "${{ needs.iac-scan.result }}"          = "failure" ] || \
             [ "${{ needs.license-scan.result }}"      = "failure" ] || \
             [ "${{ needs.sast.result }}"              = "failure" ] || \
             [ "${{ needs.secret-scan.result }}"       = "failure" ] || \
             [ "${{ needs.config-validation.result }}" = "failure" ]; then
            echo "::error::セキュリティスキャンに失敗したジョブがあります"
            exit 1
          fi
          echo "OK: 全セキュリティスキャンがクリア（またはスキップ）されました"
      # INFRA-006 監査対応: セキュリティスキャン失敗時に GitHub Issues を自動作成して通知する
      - name: セキュリティスキャン失敗時に GitHub Issue を作成
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const title = `[Security] セキュリティスキャン失敗 - ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## セキュリティスキャン失敗通知',
              '',
              `**実行日時:** ${new Date().toISOString()}`,
              `**ワークフロー:** ${{ github.workflow }}`,
              `**実行 URL:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              '### 失敗したジョブ',
              `- trivy-scan: ${{ needs.trivy-scan.result }}`,
              `- dependency-check: ${{ needs.dependency-check.result }}`,
              `- image-scan: ${{ needs.image-scan.result }}`,
              `- iac-scan: ${{ needs.iac-scan.result }}`,
              `- license-scan: ${{ needs.license-scan.result }}`,
              `- sast: ${{ needs.sast.result }}`,
              `- secret-scan: ${{ needs.secret-scan.result }}`,
              '',
              '対応が必要なセキュリティ問題が検出されました。速やかに確認してください。',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'automated'],
            });
