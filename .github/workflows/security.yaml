# .github/workflows/security.yaml
name: Security Scan

on:
  schedule:
    - cron: '0 2 * * *'    # 毎日 AM 2:00 (UTC)
  pull_request:
    branches: [main]

# 最小権限の原則: ワークフロー全体のデフォルトを全拒否に設定
permissions: {}

jobs:
  # ファイルシステム全体の脆弱性スキャン（Trivy）
  trivy-scan:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1

  # 各言語の依存関係脆弱性チェック
  dependency-check:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Go ツールチェインのセットアップ
      - name: Go セットアップ
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      # govulncheck コマンドのインストール
      - name: Go vulncheck インストール
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Rust ツールチェインのセットアップ
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Rust セットアップ
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      # cargo-audit コマンドのインストール
      - name: cargo-audit インストール
        run: cargo install cargo-audit

      # Node.js ランタイムのセットアップ
      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Flutter/Dart SDK のセットアップ
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Flutter セットアップ
        uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable

      # ファイル探索に必要な ripgrep のインストール
      - name: ripgrep インストール
        run: sudo apt-get install -y ripgrep

      # 各言語のスキャンは独立して実行する（途中失敗で後続がスキップされないように）
      # Go モジュールの脆弱性スキャン
      - name: Go 脆弱性スキャン
        id: go-vulncheck
        continue-on-error: true
        run: bash scripts/security/go-vulncheck.sh

      # Rust クレートの脆弱性監査
      - name: Rust 脆弱性監査
        id: cargo-audit
        continue-on-error: true
        run: bash scripts/security/cargo-audit.sh

      # npm パッケージの脆弱性監査
      - name: npm 脆弱性監査
        id: npm-audit
        continue-on-error: true
        run: bash scripts/security/npm-audit.sh

      # Dart/Flutter パッケージの古い依存チェック（advisory）
      - name: Dart 依存チェック
        id: dart-outdated
        continue-on-error: true
        run: bash scripts/security/dart-outdated.sh

      # いずれかのスキャンが失敗した場合にジョブ全体を失敗させる
      - name: スキャン結果の集約
        run: |
          echo "Go: ${{ steps.go-vulncheck.outcome }}"
          echo "Rust: ${{ steps.cargo-audit.outcome }}"
          echo "npm: ${{ steps.npm-audit.outcome }}"
          echo "Dart: ${{ steps.dart-outdated.outcome }}"
          if [ "${{ steps.go-vulncheck.outcome }}" = "failure" ] || \
             [ "${{ steps.cargo-audit.outcome }}" = "failure" ] || \
             [ "${{ steps.npm-audit.outcome }}" = "failure" ]; then
            echo "::error::One or more security scans failed"
            exit 1
          fi

  # 全ティアのコンテナイメージ脆弱性スキャン（定期実行のみ）
  # マトリクス戦略で system / business / service ティアの全サービスイメージをスキャン
  image-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    # コンテナイメージの読み取りのみ必要
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- system ティア ---
          - tier: system
            service: auth
          - tier: system
            service: config
          - tier: system
            service: saga
          - tier: system
            service: bff-proxy
          - tier: system
            service: app-registry
          - tier: system
            service: dlq-manager
          - tier: system
            service: graphql-gateway
          # --- business ティア ---
          - tier: business
            service: domain-master
          # --- service ティア ---
          - tier: service
            service: order
          - tier: service
            service: payment
          - tier: service
            service: inventory
    steps:
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: コンテナイメージの脆弱性スキャン (${{ matrix.tier }}/${{ matrix.service }})
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        with:
          scan-type: image
          image-ref: harbor.internal.example.com/k1s0-${{ matrix.tier }}/${{ matrix.service }}:latest
          severity: HIGH,CRITICAL
          format: table

  # IaC（Infrastructure as Code）構成ミススキャン
  # Terraform / Kubernetes マニフェストの設定ミスを Trivy で検出
  iac-scan:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Trivy IaC 構成スキャン
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        with:
          scan-type: config
          scan-ref: infra/
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1

  # ライセンスコンプライアンスチェック
  # 依存関係のライセンスが許容範囲内かを Trivy で検証
  license-scan:
    runs-on: ubuntu-latest
    # コードの読み取りのみ必要
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # サードパーティアクションのSHAピン留め（サプライチェーン攻撃防止）
      - name: Trivy ライセンスコンプライアンススキャン
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6a132a02 # 0.29.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: license
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1
