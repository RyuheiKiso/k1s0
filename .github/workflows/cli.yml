name: CLI

on:
  push:
    branches: [main, develop]
    paths:
      - 'CLI/**'
      - '.github/workflows/cli.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'CLI/**'
      - '.github/workflows/cli.yml'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  # =============================================================================
  # Lint Job: Format check and Clippy
  # =============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: CLI -> target
          cache-on-failure: true

      - name: Check formatting
        working-directory: CLI
        run: cargo fmt --all -- --check

      - name: Run Clippy
        working-directory: CLI
        run: cargo clippy --all-targets --all-features -- -D warnings

  # =============================================================================
  # Test Job: Unit tests and coverage
  # =============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: CLI -> target
          cache-on-failure: true

      - name: Run tests
        working-directory: CLI
        run: cargo test --workspace --all-features

      - name: Install cargo-llvm-cov for coverage
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        working-directory: CLI
        run: |
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: CLI/lcov.info
          flags: cli
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # =============================================================================
  # Integration Test Job: CLI integration tests
  # =============================================================================
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: CLI -> target
          cache-on-failure: true

      - name: Run integration tests
        working-directory: CLI
        run: cargo test --package k1s0-cli --test cli_integration_tests -- --test-threads=1

      - name: Test template generation (React)
        working-directory: CLI
        run: |
          cargo build --release
          ./target/release/k1s0 --help
          # Test new-feature command with React template
          mkdir -p /tmp/test-react-app/src/pages
          ./target/release/k1s0 new-screen \
            -t react \
            -s test.screen \
            -T "Test Screen" \
            -f /tmp/test-react-app
          test -f /tmp/test-react-app/src/pages/TestScreenPage.tsx

      - name: Test template generation (Flutter)
        working-directory: CLI
        run: |
          mkdir -p /tmp/test-flutter-app/lib/src/presentation/pages
          ./target/release/k1s0 new-screen \
            -t flutter \
            -s test.screen \
            -T "Test Screen" \
            -f /tmp/test-flutter-app
          test -f /tmp/test-flutter-app/lib/src/presentation/pages/test_screen_page.dart

      - name: Test new-domain command (Rust)
        run: |
          cd CLI
          ./target/release/k1s0 new-domain \
            --type backend-rust \
            --name test-domain
          test -d domain/backend/rust/test-domain
          test -f domain/backend/rust/test-domain/.k1s0/manifest.json
          test -f domain/backend/rust/test-domain/Cargo.toml
          test -f domain/backend/rust/test-domain/src/lib.rs
          # Verify manifest.json contains layer: domain
          grep -q '"layer": "domain"' domain/backend/rust/test-domain/.k1s0/manifest.json
          # Verify manifest.json contains version field
          grep -q '"version":' domain/backend/rust/test-domain/.k1s0/manifest.json

      - name: Test new-feature with domain (Rust)
        run: |
          cd CLI
          ./target/release/k1s0 new-feature \
            --type backend-rust \
            --name test-feature \
            --domain test-domain
          test -d feature/backend/rust/test-feature
          test -f feature/backend/rust/test-feature/.k1s0/manifest.json
          # Verify manifest.json contains domain reference
          grep -q '"domain": "test-domain"' feature/backend/rust/test-feature/.k1s0/manifest.json
          grep -q '"domain_version":' feature/backend/rust/test-feature/.k1s0/manifest.json

      - name: Test domain list command
        run: |
          cd CLI
          ./target/release/k1s0 domain list
          # Verify test-domain appears in the list
          ./target/release/k1s0 domain list | grep -q "test-domain"

      - name: Test domain dependents command
        run: |
          cd CLI
          ./target/release/k1s0 domain dependents --name test-domain
          # Verify test-feature appears as dependent
          ./target/release/k1s0 domain dependents --name test-domain | grep -q "test-feature"

      - name: Cleanup test artifacts
        run: |
          rm -rf CLI/domain/backend/rust/test-domain
          rm -rf CLI/feature/backend/rust/test-feature

  # =============================================================================
  # Build Job: Multi-platform builds
  # =============================================================================
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [test, integration-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: k1s0-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: k1s0-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: k1s0-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: k1s0-windows-x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: CLI -> target
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Build release binary
        working-directory: CLI
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp CLI/target/${{ matrix.target }}/release/k1s0 artifacts/
          cp CLI/target/${{ matrix.target }}/release/k1s0-lsp artifacts/ || true
          cd artifacts && tar -czvf ../${{ matrix.artifact_name }}.tar.gz *

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item CLI/target/${{ matrix.target }}/release/k1s0.exe artifacts/
          if (Test-Path CLI/target/${{ matrix.target }}/release/k1s0-lsp.exe) {
            Copy-Item CLI/target/${{ matrix.target }}/release/k1s0-lsp.exe artifacts/
          }
          Compress-Archive -Path artifacts/* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload artifacts (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.tar.gz
          retention-days: 30

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 30

  # =============================================================================
  # Summary Job: Ensure all jobs pass
  # =============================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, test, integration-test, build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "Lint job failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test job failed"
            exit 1
          fi
          if [[ "${{ needs.integration-test.result }}" != "success" ]]; then
            echo "Integration test job failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build job failed"
            exit 1
          fi
          echo "All jobs passed successfully!"
