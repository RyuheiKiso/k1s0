  #                 "text": {
  #                   "type": "mrkdwn",
  #                   "text": "*New k1s0 CLI Release*\nVersion: `v${{ needs.validate.outputs.version }}`\n<${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.validate.outputs.version }}|View Release>"
  #                 }
  #               }
  #             ]
