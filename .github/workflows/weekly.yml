# =============================================================================
# 本ファイルは weekly workflow（@security タグ + L6 portability cluster Ready 検証）。
# 設計正典:
#   ADR-TEST-007（テスト属性タグ + CI 実行フェーズ分離、weekly = @security 実行枠）
#   ADR-TEST-001（DAST / Chaos は採用後の運用拡大時、@security タグ枠で起動）
#
# 起動 trigger:
#   schedule: 月曜 03:00 JST（毎週 月曜日 18:00 UTC）
#   workflow_dispatch: 起案者 / 採用初期協力者の手動起動を許容
#
# 現リリース時点では @security タグ付きの test がまだ無いため skeleton 配置に留め、
# 採用後の運用拡大時で OWASP ZAP / DAST 統合と連動して有効化する。
# =============================================================================
name: weekly

on:
  schedule:
    # 月曜 03:00 JST = 毎週月曜 18:00 UTC
    - cron: "0 18 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # @security タグ付き e2e test の実行枠（採用後の運用拡大時 で OWASP ZAP 等の DAST を統合）
  security_e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: tests/e2e/go.sum

      - name: run @security tagged tests
        # ADR-TEST-007 で確定した属性タグ実行フェーズ分離。-tags=security で build tag を有効化。
        # 現リリース時点では @security タグ付き test が空なので「実行対象なし」で exit 0 する。
        # 採用後の運用拡大時で OWASP ZAP / DAST 統合と連動。
        working-directory: tests/e2e
        run: go test -tags=security -v ./... -timeout=60m
