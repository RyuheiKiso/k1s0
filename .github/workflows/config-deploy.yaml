# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/config-deploy.yaml
# Deploy pipeline for config server（reusable workflow 経由）
# NOTE: config は workspace root をコンテキストに使用し、Dockerfile を明示指定
name: config-deploy

on:
  push:
    branches: [main]
    paths:
      - 'regions/system/server/rust/config/**'

jobs:
  deploy:
    uses: ./.github/workflows/_service-deploy.yaml
    with:
      service-name: config
      context-path: regions/system
      dockerfile: regions/system/server/rust/config/Dockerfile
      registry-project: k1s0-system
      helm-chart-path: system/config
      namespace: k1s0-system
    secrets:
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
