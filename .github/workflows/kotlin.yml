name: Kotlin Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'framework/backend/kotlin/**'
      - 'feature/backend/kotlin/**'
      - 'domain/backend/kotlin/**'
  pull_request:
    paths:
      - 'framework/backend/kotlin/**'
      - 'feature/backend/kotlin/**'
      - 'domain/backend/kotlin/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    timeout-minutes: 30
    defaults:
      run:
        working-directory: framework/backend/kotlin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint (ktlint)
        run: ./gradlew ktlintCheck

      - name: Static analysis (detekt)
        run: ./gradlew detekt

      - name: Build
        run: ./gradlew build

      - name: Test
        run: ./gradlew test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kotlin-test-results
          path: framework/backend/kotlin/**/build/reports/tests/
