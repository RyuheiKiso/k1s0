# M-014 監査対応: deprecated proto フィールドの移行期限（2026-06）を自動チェックする。
# 期限を過ぎた場合は CI を失敗させて強制的に対応を促す。
name: Proto Deprecation Check

on:
  push:
    branches: [main, work]
  pull_request:
    branches: [main]
  schedule:
    # 毎月1日の0時（UTC）に実行して期限切れを早期検知する
    - cron: '0 0 1 * *'

jobs:
  check-proto-deprecation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Check deprecated proto field deadlines
        run: |
          # M-014 監査対応: 移行期限（YYYY-MM）を過ぎていたら CI 失敗
          current_year_month=$(date +%Y-%m)

          # auth.proto の deprecated フィールド削除期限: 2026-06
          AUTH_DEADLINE="2026-06"

          echo "現在: ${current_year_month}, auth.proto 削除期限: ${AUTH_DEADLINE}"

          if [[ "${current_year_month}" > "${AUTH_DEADLINE}" ]]; then
            echo "ERROR: auth.proto の deprecated フィールド（event_type, result）の削除期限（${AUTH_DEADLINE}）が過ぎています。"
            echo "対象フィールド:"
            grep -n "deprecated = true" api/proto/k1s0/system/auth/v1/auth.proto || true
            echo ""
            echo "上記フィールドを削除し、reserved 宣言を追加してください（M-013 対応）。"
            exit 1
          fi

          # 期限まで30日以内の場合は警告を出す
          deadline_timestamp=$(date -d "${AUTH_DEADLINE}-01" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "${AUTH_DEADLINE}-01" +%s)
          current_timestamp=$(date +%s)
          days_until_deadline=$(( (deadline_timestamp - current_timestamp) / 86400 ))

          if [[ ${days_until_deadline} -le 30 ]]; then
            echo "WARNING: auth.proto deprecated フィールドの削除期限まで ${days_until_deadline} 日です。"
            grep -n "deprecated = true" api/proto/k1s0/system/auth/v1/auth.proto || true
          fi

          echo "Proto deprecation check passed."
