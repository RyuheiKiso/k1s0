# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# .github/workflows/auth-deploy.yaml
# Deploy pipeline for auth server（reusable workflow 経由）
name: auth-deploy

on:
  push:
    branches: [main]
    paths:
      - 'regions/system/server/rust/auth/**'

jobs:
  deploy:
    uses: ./.github/workflows/_service-deploy.yaml
    with:
      service-name: auth
      context-path: regions/system/server/rust/auth
      registry-project: k1s0-system
      helm-chart-path: system/auth
      namespace: k1s0-system
    secrets:
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
