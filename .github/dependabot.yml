# Dependabot 自動依存更新設定
# 各パッケージエコシステムに対して週次で依存関係の更新PRを作成する
# モノレポの全ディレクトリに対応するため directories フィールドで複数パスを指定
version: 2

updates:
  # Go モジュールの依存更新（go.work ルート + 個別モジュール）
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/regions/system/library/go/*"
      - "/regions/system/server/go/*"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "go"
    open-pull-requests-limit: 10

  # Rust (Cargo) の依存更新（ワークスペースルート + standalone サーバー）
  - package-ecosystem: "cargo"
    directories:
      - "/regions/system"
      - "/CLI"
      - "/regions/business/taskmanagement/server/rust/project-master"
      - "/regions/service/task/server/rust/task"
      - "/regions/service/board/server/rust/board"
      - "/regions/service/activity/server/rust/activity"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "rust"
    open-pull-requests-limit: 10

  # npm の依存更新（React クライアント + TypeScript ライブラリ）
  - package-ecosystem: "npm"
    directories:
      - "/regions/business/taskmanagement/client/react/project-master"
      - "/regions/service/task/client/react/task"
      - "/regions/service/board/client/react/board"
      - "/regions/service/activity/client/react/activity"
      - "/regions/system/client/react/app-catalog"
      - "/regions/system/client/react/system-client"
      - "/regions/system/library/typescript/*"
      - "/CLI/crates/k1s0-gui/ui"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "npm"
    open-pull-requests-limit: 10

  # Dart (pub) の依存更新（Flutter クライアント + Dart ライブラリ）
  - package-ecosystem: "pub"
    directories:
      - "/regions/business/taskmanagement/client/flutter/project_master"
      - "/regions/service/task/client/flutter/task"
      - "/regions/service/board/client/flutter/board"
      - "/regions/service/activity/client/flutter/activity"
      - "/regions/system/client/flutter/system_client"
      - "/regions/system/library/dart/*"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "dart"
    open-pull-requests-limit: 10

  # Docker イメージの依存更新（インフラ用 Dockerfile）
  - package-ecosystem: "docker"
    directory: "/infra/docker"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5

  # Terraform プロバイダーの依存更新
  - package-ecosystem: "terraform"
    directory: "/infra/terraform"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "terraform"
    open-pull-requests-limit: 5

  # GitHub Actions の依存更新（週次）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 10
