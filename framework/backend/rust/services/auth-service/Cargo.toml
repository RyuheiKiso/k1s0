[package]
name = "auth-service"
version = "0.1.0"
edition = "2021"
description = "k1s0 framework authentication and authorization service"
license = "MIT"

[dependencies]
# k1s0 framework crates
k1s0-observability = { path = "../../crates/k1s0-observability" }
k1s0-config = { path = "../../crates/k1s0-config" }
k1s0-error = { path = "../../crates/k1s0-error" }
k1s0-validation = { path = "../../crates/k1s0-validation" }
# k1s0-db = { path = "../../crates/k1s0-db", features = ["postgres"] }
# k1s0-grpc-server = { path = "../../crates/k1s0-grpc-server" }
# k1s0-health = { path = "../../crates/k1s0-health" }

# async runtime
tokio = { version = "1", features = ["full"] }

# gRPC
tonic = "0.12"
prost = "0.13"
tonic-health = "0.12"

# HTTP/REST
axum = "0.7"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

# database
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid", "chrono"] }

# configuration
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
opentelemetry = "0.24"

# error handling
thiserror = "1"
anyhow = "1"

# utilities
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive", "env"] }

[build-dependencies]
tonic-build = "0.12"

[[bin]]
name = "auth-service"
path = "src/main.rs"
