apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: k1s0-dev

resources:
  - ../../base

commonLabels:
  env: dev

replicas:
  - name: auth-service
    count: 1

images:
  - name: auth-service
    newTag: dev

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi
    target:
      kind: Deployment
      name: auth-service
