[package]
name = "k1s0-rate-limit"
version = "0.1.0"
edition = "2021"
description = "Rate limiting patterns (token bucket, sliding window) for k1s0 microservices"
license = "MIT"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
tokio = { version = "1.0", features = ["time", "sync"] }

[dev-dependencies]
serde_json = "1.0"
tokio = { version = "1.0", features = ["full", "test-util"] }

[lints]
workspace = true
