[package]
name = "k1s0-resilience"
version = "0.1.0"
edition = "2021"
description = "k1s0 resilience patterns for dependency calls"
license = "MIT"

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "1.0"

# Async runtime
tokio = { version = "1.0", features = ["time", "sync"] }

[dev-dependencies]
tokio = { version = "1.0", features = ["full", "test-util"] }
