[project]
name = "k1s0-auth"
version = "0.1.0"
description = "Authentication and authorization for k1s0 Python services"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "PyJWT>=2.8",
    "cryptography>=41.0",
    "httpx>=0.25",
]

[project.optional-dependencies]
redis-cache = ["k1s0-cache"]
postgres-policy = ["k1s0-db"]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-mock>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/k1s0_auth"]
