[project]
name = "k1s0-health"
version = "0.1.0"
description = "Health check endpoints for k1s0 Python services"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.100.0",
    "k1s0-error",
    "k1s0-config",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/k1s0_health"]
