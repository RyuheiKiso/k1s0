[project]
name = "k1s0-db"
version = "0.1.0"
description = "Async database utilities for k1s0 Python services"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29.0",
    "k1s0-error",
    "k1s0-config",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/k1s0_db"]
