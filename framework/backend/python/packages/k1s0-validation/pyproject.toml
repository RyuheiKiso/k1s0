[project]
name = "k1s0-validation"
version = "0.1.0"
description = "Input validation for k1s0 Python services"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/k1s0_validation"]
