[project]
name = "k1s0-cache"
version = "0.1.0"
description = "Redis caching utilities for k1s0 Python services"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
redis = ["redis[hiredis]>=5.0"]
health = ["k1s0-health"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/k1s0_cache"]
