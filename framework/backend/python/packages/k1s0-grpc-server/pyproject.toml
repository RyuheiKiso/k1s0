[project]
name = "k1s0-grpc-server"
version = "0.1.0"
description = "gRPC server foundation for k1s0 Python services"
requires-python = ">=3.12"
dependencies = [
    "grpcio>=1.60.0",
    "k1s0-error",
    "k1s0-observability",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/k1s0_grpc_server"]
