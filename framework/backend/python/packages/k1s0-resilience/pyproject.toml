[project]
name = "k1s0-resilience"
version = "0.1.0"
description = "Resilience patterns (retry, circuit breaker, timeout, bulkhead) for k1s0 Python services"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-mock",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/k1s0_resilience"]
