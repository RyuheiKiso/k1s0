[project]
name = "k1s0-rate-limit"
version = "0.1.0"
description = "Rate limiting patterns (token bucket, sliding window) for k1s0 Python services"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-mock",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/k1s0_rate_limit"]
