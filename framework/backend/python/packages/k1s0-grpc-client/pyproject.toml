[project]
name = "k1s0-grpc-client"
version = "0.1.0"
description = "gRPC client utilities for k1s0 Python services"
requires-python = ">=3.12"
dependencies = [
    "grpcio>=1.60.0",
    "k1s0-error",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/k1s0_grpc_client"]
