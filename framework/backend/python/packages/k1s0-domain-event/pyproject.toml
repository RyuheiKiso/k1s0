[project]
name = "k1s0-domain-event"
version = "0.1.0"
description = "Domain event publish/subscribe and outbox pattern for k1s0 Python services"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.0"]

[project.optional-dependencies]
outbox = ["asyncpg>=0.29", "sqlalchemy[asyncio]>=2.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "pytest-mock>=3.12"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/k1s0_domain_event"]
