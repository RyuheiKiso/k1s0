publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  freezed_annotation: ^2.4.0
  hive_flutter: ^1.1.0
  json_annotation: ^4.8.0
  riverpod_annotation: ^2.3.0
  shared_preferences: ^2.2.0

dev_dependencies:
