name: k1s0_auth
description: Authentication client for k1s0 Flutter applications with JWT/OIDC support
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  flutter_secure_storage: ^9.0.0
  freezed_annotation: ^2.4.0
  go_router: ^14.0.0
  json_annotation: ^4.8.1
  jwt_decoder: ^2.0.1
  meta: ^1.10.0
  riverpod_annotation: ^2.3.0

dev_dependencies:
  build_runner: ^2.4.0
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  mockito: ^5.4.0
  riverpod_generator: ^2.3.0
