name: k1s0_realtime
description: Real-time communication client for k1s0 Flutter applications with WebSocket and SSE support
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  connectivity_plus: ^6.0.0
  flutter:
    sdk: flutter
  http: ^1.2.0
  meta: ^1.10.0
  shared_preferences: ^2.2.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  fake_async: ^1.3.0
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
