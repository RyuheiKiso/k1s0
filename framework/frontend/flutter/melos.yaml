name: k1s0_flutter
repository: https://github.com/example/k1s0

packages:
  - packages/**

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  analyze:
    run: melos exec -- dart analyze .
    description: Run dart analyze in all packages

  format:
    run: melos exec -- dart format .
    description: Format all packages

  format:check:
    run: melos exec -- dart format --set-exit-if-changed .
    description: Check formatting in all packages

  test:
    run: melos exec -- flutter test
    description: Run tests in all packages
    packageFilters:
      dirExists: test

  test:coverage:
    run: melos exec -- flutter test --coverage
    description: Run tests with coverage in all packages
    packageFilters:
      dirExists: test

  build:runner:
    run: melos exec -- dart run build_runner build --delete-conflicting-outputs
    description: Run build_runner in all packages
    packageFilters:
      dependsOn: build_runner

  clean:
    run: melos exec -- flutter clean
    description: Clean all packages

  pub:get:
    run: melos exec -- flutter pub get
    description: Get dependencies for all packages

  outdated:
    run: melos exec -- flutter pub outdated
    description: Check for outdated dependencies

  upgrade:
    run: melos exec -- flutter pub upgrade
    description: Upgrade dependencies in all packages
