# tier3-web-app values（汎用テンプレート、portal / admin / docs-site が overlay で上書き）

service:
  name: example-tier3-web

image:
  registry: ghcr.io
  repository: k1s0/k1s0/tier3-example-web
  tag: latest
  pullPolicy: IfNotPresent

replicas: 2

ports:
  http: 8080
  metrics: 9090

podSecurityContext:
  runAsUser: 101
  runAsGroup: 101
  runAsNonRoot: true
  fsGroup: 101

containerSecurityContext:
  allowPrivilegeEscalation: false
  # nginx は /var/cache /var/run に書き込むため readOnlyRootFilesystem は false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# nginx の標準 health endpoint
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 2
  periodSeconds: 5

env: []

# BFF への reverse proxy 設定（nginx ConfigMap で /api/* → tier3-bff へ）
bffUpstream: "http://example-tier3-bff.tier3-bff.svc.cluster.local:8080"

serviceAccount:
  create: true
  name: ""
  annotations: {}

podLabels: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

# 外部公開は Istio Ambient Gateway 経由
ingress:
  enabled: false
  host: "portal.k1s0.example.com"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
