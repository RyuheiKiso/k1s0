# tier2-dotnet-service values（汎用テンプレート、各 service は overlay で上書き）

service:
  name: example-tier2-dotnet

image:
  registry: ghcr.io
  repository: k1s0/k1s0/tier2-example-dotnet
  tag: latest
  pullPolicy: IfNotPresent

replicas: 2

# ASP.NET Core の既定 listen ポート
ports:
  http: 8080
  metrics: 9090

dapr:
  enabled: true
  appId: "example-tier2-dotnet"
  appPort: 8080
  appProtocol: "http"

podSecurityContext:
  runAsUser: 1654
  runAsGroup: 1654
  runAsNonRoot: true
  fsGroup: 1654

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

# ASP.NET Core の標準 health endpoint
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

env:
  - name: ASPNETCORE_URLS
    value: "http://+:8080"
  - name: DOTNET_ENVIRONMENT
    value: "Production"
envFrom: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podLabels: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
