apiVersion: v1
kind: Service
metadata:
  name: {{ include "tier2-go-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tier2-go-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.ports.http }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.ports.metrics }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "tier2-go-service.selectorLabels" . | nindent 4 }}
