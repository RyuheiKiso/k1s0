# =============================================================================
# k1s0 tier1-rust-service Helm chart values（リリース時点最小骨格）
#
# 設計: docs/05_実装/70_リリース設計/
# 関連 ID: ADR-CICD-001 / ADR-CICD-002
# =============================================================================

image:
  registry: ghcr.io
  repositoryPrefix: k1s0/k1s0
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

podSecurityContext:
  runAsUser: 65532
  runAsGroup: 65532
  runAsNonRoot: true
  fsGroup: 65532

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Rust 3 Pod（decision / audit / pii）。各 Pod は独立した Deployment / Service。
pods:
  decision:
    enabled: true
    repositorySuffix: tier1-decision
    args: []
    replicas: 1
    grpcPort: 50001
    # HTTP/JSON gateway ポート。docs §共通規約「HTTP/JSON 互換」に従い
    # POST /k1s0/<api>/<rpc> の JSON 経路を提供する。0 で無効（gRPC のみ）。
    httpPort: 50080
    metricsPort: 9090
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  audit:
    enabled: true
    repositorySuffix: tier1-audit
    args: []
    # audit は WORM ストア書込で堅牢性が必要、リリース時点 1 / 採用初期 3 推奨
    replicas: 1
    grpcPort: 50001
    # HTTP/JSON gateway ポート。docs §共通規約「HTTP/JSON 互換」に従い
    # POST /k1s0/<api>/<rpc> の JSON 経路を提供する。0 で無効（gRPC のみ）。
    httpPort: 50080
    metricsPort: 9090
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  pii:
    enabled: true
    repositorySuffix: tier1-pii
    args: []
    # 純関数ステートレスのため HPA で容易に拡張可
    replicas: 1
    grpcPort: 50001
    # HTTP/JSON gateway ポート。docs §共通規約「HTTP/JSON 互換」に従い
    # POST /k1s0/<api>/<rpc> の JSON 経路を提供する。0 で無効（gRPC のみ）。
    httpPort: 50080
    metricsPort: 9090
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

config:
  otelExporterEndpoint: "otel-collector.observability.svc.cluster.local:4317"
  logLevel: "info"
  # docs §共通規約「認証認可」: off / hmac / jwks の 3 mode。
  # production は jwks（Keycloak 等）に上書き、dev は off。
  authMode: "off"
  # docs §共通規約「監査自動発火」: noop / log の 2 mode。
  # production は audit Pod への gRPC client モードを post-MVP で追加予定。
  auditMode: "log"

service:
  type: ClusterIP
  annotations: {}

podLabels: {}
podAnnotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
