{{/*
tier1-rust-service の ConfigMap（OTel endpoint / log level 等の env 配信）。
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tier1-rust-service.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tier1-rust-service.labels" . | nindent 4 }}
data:
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelExporterEndpoint | quote }}
  K1S0_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
