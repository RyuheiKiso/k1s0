{{/*
本ファイルは tier1-facade chart の ServiceAccount 生成テンプレート。

設計: docs/05_実装/70_リリース設計/
関連 ID: ADR-SEC-003（SPIFFE/SPIRE）
注: SPIRE workload identity 連携は採用初期で annotation を追加する。
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tier1-facade.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tier1-facade.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end -}}
