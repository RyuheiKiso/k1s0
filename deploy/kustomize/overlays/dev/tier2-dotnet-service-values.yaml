# dev 環境の tier2-dotnet-service values overlay。
image:
  tag: latest
  pullPolicy: Always

replicas: 1

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits: { cpu: 500m, memory: 512Mi }

autoscaling:
  enabled: false

env:
  - name: ASPNETCORE_URLS
    value: "http://+:8080"
  - name: DOTNET_ENVIRONMENT
    value: "Development"
  - name: Logging__LogLevel__Default
    value: "Debug"
