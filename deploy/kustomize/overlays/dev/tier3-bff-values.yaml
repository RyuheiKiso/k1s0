# dev 環境の tier3-bff values overlay。
image:
  tag: latest
  pullPolicy: Always

replicas: 1

resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits: { cpu: 500m, memory: 256Mi }

autoscaling:
  enabled: false

oidc:
  enabled: false

ingress:
  enabled: true
  host: "bff.dev.k1s0.local"

env:
  - name: LOG_LEVEL
    value: debug
