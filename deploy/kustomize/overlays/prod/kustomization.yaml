# deploy/kustomize/overlays/prod/ — 本番環境 overlay。
# HA 構成、image は semver pinning、Argo Rollouts 必須、mTLS STRICT 強制。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# kustomize v5 で `bases` は deprecated。`resources` に統合する。
resources:
  - ../../base

# kustomize v5 で `commonLabels` は deprecated。後継の `labels` を使う。
labels:
  - pairs:
      k1s0.io/env: prod
    includeSelectors: true
