# prod 環境の tier2-dotnet-service values overlay。
image:
  tag: 0.1.0
  pullPolicy: IfNotPresent

replicas: 3

resources:
  requests: { cpu: 500m, memory: 512Mi }
  limits: { cpu: 2000m, memory: 2Gi }

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

env:
  - name: ASPNETCORE_URLS
    value: "http://+:8080"
  - name: DOTNET_ENVIRONMENT
    value: "Production"
