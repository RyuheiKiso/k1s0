# prod 環境の tier2-go-service values overlay。
image:
  tag: 0.1.0
  pullPolicy: IfNotPresent

replicas: 3

resources:
  requests: { cpu: 200m, memory: 256Mi }
  limits: { cpu: 1000m, memory: 1Gi }

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

env:
  - name: LOG_LEVEL
    value: warn

# 本番では node 分散 + replica 分散
podAntiAffinity:
  enabled: true
