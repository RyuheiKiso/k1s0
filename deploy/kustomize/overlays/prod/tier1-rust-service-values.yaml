# prod 環境の tier1-rust-service values overlay。
image:
  tag: 0.1.0
  pullPolicy: IfNotPresent

config:
  logLevel: warn

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/part-of
              operator: In
              values: [k1s0]
        topologyKey: kubernetes.io/hostname

pods:
  decision:
    replicas: 3
    resources:
      requests: { cpu: 500m, memory: 512Mi }
      limits: { cpu: 3000m, memory: 2Gi }
  audit:
    # WORM ストア書込で堅牢性が必要、StatefulSet 想定の固定 3 replica。
    replicas: 3
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits: { cpu: 3000m, memory: 4Gi }
  pii:
    # 純関数ステートレス、HPA で容易に拡張可。
    replicas: 3
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits: { cpu: 2000m, memory: 1Gi }
