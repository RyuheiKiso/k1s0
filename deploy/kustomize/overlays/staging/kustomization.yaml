# deploy/kustomize/overlays/staging/ — ステージング環境 overlay。
# prod 構成の検証段階で、replica は中程度、TLS 強制、Argo Rollouts 有効。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# kustomize v5 で `bases` は deprecated。`resources` に統合する。
resources:
  - ../../base

# kustomize v5 で `commonLabels` は deprecated。後継の `labels` を使う。
labels:
  - pairs:
      k1s0.io/env: staging
    includeSelectors: true
