# staging 環境の tier3-web-app values overlay。
image:
  tag: rc

replicas: 2

resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits: { cpu: 500m, memory: 256Mi }

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

ingress:
  enabled: true
  host: "portal.staging.k1s0.example.com"

bffUpstream: "http://portal-bff.tier3-bff.svc.cluster.local:8080"
