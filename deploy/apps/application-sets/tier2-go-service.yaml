# =============================================================================
# k1s0 tier2-go-service Argo CD ApplicationSet（リファレンステンプレート）
#
# 設計: docs/05_実装/70_リリース設計/、docs/05_実装/00_ディレクトリ設計/30_tier2レイアウト/03_go_services配置.md
# 関連 ID: ADR-CICD-001 / ADR-DEV-001（Paved Road）
#
# scope: tier2 Go service の典型例（example-tier2-service）を環境別に配備する。
# 実 service（notification-hub / stock-reconciler 等）は本テンプレートを複製して
# service.name と image.repository を上書きする運用とする。
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tier2-go-service-example
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
            namespace: tier2-services
            valuesFile: deploy/kustomize/overlays/dev/tier2-go-service-values.yaml
          - env: staging
            namespace: tier2-services
            valuesFile: deploy/kustomize/overlays/staging/tier2-go-service-values.yaml
          - env: prod
            namespace: tier2-services
            valuesFile: deploy/kustomize/overlays/prod/tier2-go-service-values.yaml
  template:
    metadata:
      name: "tier2-go-service-example-{{env}}"
      labels:
        k1s0.io/tier: tier2
        k1s0.io/lang: go
        k1s0.io/env: "{{env}}"
      annotations:
        # 例として example-tier2-service の image を追跡する。実 service は別 ApplicationSet で個別管理。
        argocd-image-updater.argoproj.io/image-list: |
          tier2-example=ghcr.io/k1s0/k1s0/tier2-example
        argocd-image-updater.argoproj.io/tier2-example.update-strategy: semver
        argocd-image-updater.argoproj.io/tier2-example.allow-tags: "regexp:^[0-9]+\\.[0-9]+\\.[0-9]+$"
        argocd-image-updater.argoproj.io/write-back-method: git
        argocd-image-updater.argoproj.io/write-back-target: kustomization
        argocd-image-updater.argoproj.io/git-branch: main
    spec:
      project: k1s0-tier2
      source:
        repoURL: "https://github.com/k1s0/k1s0.git"
        targetRevision: main
        path: deploy/charts/tier2-go-service
        helm:
          valueFiles:
            - values.yaml
            - "$values/{{valuesFile}}"
      sources:
        - repoURL: "https://github.com/k1s0/k1s0.git"
          targetRevision: main
          ref: values
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
