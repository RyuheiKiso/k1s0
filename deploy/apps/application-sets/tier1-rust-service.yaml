# =============================================================================
# k1s0 tier1-rust-service Argo CD ApplicationSet
#
# 設計: docs/05_実装/70_リリース設計/
# 関連 ID: ADR-CICD-001 / ADR-CICD-002 / ADR-TIER1-001 /
#          DS-SW-COMP-008（t1-decision）/ 007（t1-audit）/ 009（t1-pii）
#
# scope: 環境別に tier1 Rust core 3 Pod（decision / audit / pii）を配備する。
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tier1-rust-service
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
            namespace: k1s0-tier1
            valuesFile: deploy/kustomize/overlays/dev/tier1-rust-service-values.yaml
          - env: staging
            namespace: k1s0-tier1
            valuesFile: deploy/kustomize/overlays/staging/tier1-rust-service-values.yaml
          - env: prod
            namespace: k1s0-tier1
            valuesFile: deploy/kustomize/overlays/prod/tier1-rust-service-values.yaml
  template:
    metadata:
      name: "tier1-rust-service-{{env}}"
      labels:
        k1s0.io/tier: tier1
        k1s0.io/lang: rust
        k1s0.io/env: "{{env}}"
      annotations:
        # Argo CD Image Updater 連携（3 Pod の image を semver で追跡）。
        argocd-image-updater.argoproj.io/image-list: |
          tier1-decision=ghcr.io/k1s0/k1s0/tier1-decision,
          tier1-audit=ghcr.io/k1s0/k1s0/tier1-audit,
          tier1-pii=ghcr.io/k1s0/k1s0/tier1-pii
        argocd-image-updater.argoproj.io/tier1-decision.update-strategy: semver
        argocd-image-updater.argoproj.io/tier1-decision.allow-tags: "regexp:^[0-9]+\\.[0-9]+\\.[0-9]+$"
        argocd-image-updater.argoproj.io/tier1-audit.update-strategy: semver
        argocd-image-updater.argoproj.io/tier1-audit.allow-tags: "regexp:^[0-9]+\\.[0-9]+\\.[0-9]+$"
        argocd-image-updater.argoproj.io/tier1-pii.update-strategy: semver
        argocd-image-updater.argoproj.io/tier1-pii.allow-tags: "regexp:^[0-9]+\\.[0-9]+\\.[0-9]+$"
        argocd-image-updater.argoproj.io/write-back-method: git
        argocd-image-updater.argoproj.io/write-back-target: kustomization
        argocd-image-updater.argoproj.io/git-branch: main
    spec:
      project: k1s0-tier1
      source:
        repoURL: "https://github.com/k1s0/k1s0.git"
        targetRevision: main
        path: deploy/charts/tier1-rust-service
        helm:
          valueFiles:
            - values.yaml
            - "$values/{{valuesFile}}"
      sources:
        - repoURL: "https://github.com/k1s0/k1s0.git"
          targetRevision: main
          ref: values
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
