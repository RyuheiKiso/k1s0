# 本ファイルは infra/environments/<env>/ 全体を Argo CD で配備する ApplicationSet。
# **dev 環境はリストから除外** — ADR-POL-002 で local kind cluster の infra layer は
# tools/local-stack/up.sh apply_* が SoT として配備する責務に固定したため、argocd の
# infra-dev Application が同じリソースを reconcile しようとすると dual ownership で
# OutOfSync Degraded になる（P4 後の検証で実証済み）。staging / prod のみを argocd
# 管理範囲とし、各々の remote cluster URL に sync する。
#
# Sync Wave -10〜0 で Operator + CRD と data backend を起動。tier1 以降は
# 別 ApplicationSet（tier1-facade.yaml 等）が Wave 10〜30 で起動する。
#
# 詳細設計: docs/05_実装/00_ディレクトリ設計/60_operationレイアウト/02_ArgoCD_ApplicationSet配置.md
# 関連 ADR: ADR-POL-002（local cluster 配備は up.sh が SoT）
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra
  namespace: argocd
  labels:
    k1s0.io/component: gitops-infra
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          # dev は ADR-POL-002 により up.sh apply_* が SoT のため argocd 管理対象外
          - env: staging
            cluster: https://staging.k1s0.internal
          - env: prod
            cluster: https://prod.k1s0.internal
  template:
    metadata:
      name: "infra-{{.env}}"
      labels:
        k1s0.io/component: infra
        k1s0.io/env: "{{.env}}"
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: k1s0-platform
      source:
        repoURL: https://github.com/k1s0/k1s0.git
        targetRevision: HEAD
        path: "infra/environments/{{.env}}"
      destination:
        server: "{{.cluster}}"
        namespace: ""
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
