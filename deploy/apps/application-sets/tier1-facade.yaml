# =============================================================================
# k1s0 tier1-facade Argo CD ApplicationSet（リリース時点最小骨格）
#
# 設計: docs/05_実装/70_リリース設計/
# 関連 ID: ADR-CICD-001（Argo CD 採用）/ ADR-CICD-002（Argo Rollouts）/
#          ADR-TIER1-001（Go + Rust ハイブリッド tier1）
#
# scope（リリース時点）:
#   - 環境別（dev / staging / prod）に tier1-facade Helm chart を配備する
#   - values は環境別 overlay（deploy/kustomize/overlays/<env>/values.yaml）から取得
#   - 自動同期 + selfHeal + pruneを有効化（GitOps の真実は Git）
#
# 採用初期で拡張:
#   - cluster generator で複数クラスタ展開
#   - SyncWindow / progressive delivery（Rollouts 連携）
#   - ImageUpdater 連携（GHCR digest pinning + Renovate）
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tier1-facade
  namespace: argocd
spec:
  # 環境別の generator。dev / staging / prod それぞれの Application を生成する。
  generators:
    - list:
        elements:
          - env: dev
            namespace: k1s0-tier1
            valuesFile: deploy/kustomize/overlays/dev/tier1-facade-values.yaml
          - env: staging
            namespace: k1s0-tier1
            valuesFile: deploy/kustomize/overlays/staging/tier1-facade-values.yaml
          - env: prod
            namespace: k1s0-tier1
            valuesFile: deploy/kustomize/overlays/prod/tier1-facade-values.yaml
  template:
    metadata:
      name: "tier1-facade-{{env}}"
      labels:
        k1s0.io/tier: tier1
        k1s0.io/env: "{{env}}"
    spec:
      project: k1s0-tier1
      source:
        repoURL: "https://github.com/k1s0/k1s0.git"
        # main 追従。production は採用初期で release branch 切り出しに変更する。
        targetRevision: main
        path: deploy/charts/tier1-facade
        helm:
          valueFiles:
            # base values.yaml（chart 内蔵）。
            - values.yaml
            # 環境別 overlay。$values は別 source の repoURL ルートを指す Argo CD multi-source 機構。
            - "$values/{{valuesFile}}"
      # values overlay 用の追加 source（Argo CD multi-source）。
      sources:
        - repoURL: "https://github.com/k1s0/k1s0.git"
          targetRevision: main
          ref: values
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          # namespace を ApplicationSet 配備時に自動作成する。
          - CreateNamespace=true
          # ServerSideApply で k8s 1.22+ の宣言的 conflict resolution を活用する。
          - ServerSideApply=true
          # 巨大 ConfigMap などで last-applied annotation サイズ問題を避ける。
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
