<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>

    <linearGradient id="featureGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>

    <linearGradient id="domainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>

    <linearGradient id="frameworkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>

    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="380" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="700" height="380" fill="url(#grid)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="600" cy="60" r="80" fill="#a855f7" opacity="0.06"/>
  <circle cx="80" cy="320" r="60" fill="#6366f1" opacity="0.05"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="18" fill="#e0e0ff" font-weight="600" letter-spacing="1">
    Three-Layer Architecture
  </text>

  <!-- Feature Layer (Top) -->
  <g transform="translate(50, 55)" filter="url(#shadow)">
    <rect x="0" y="0" width="600" height="85" rx="12" fill="#1e1e3f" stroke="url(#featureGradient)" stroke-width="2"/>
    <rect x="0" y="0" width="600" height="85" rx="12" fill="url(#featureGradient)" opacity="0.08"/>

    <!-- Layer badge -->
    <rect x="20" y="15" width="80" height="24" rx="12" fill="#a855f7" opacity="0.2"/>
    <text x="60" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c084fc" font-weight="600">
      FEATURE
    </text>

    <!-- Layer name -->
    <text x="130" y="32" font-family="system-ui, sans-serif" font-size="16" fill="#e0e0e8" font-weight="600">
      feature
    </text>
    <text x="210" y="32" font-family="system-ui, sans-serif" font-size="14" fill="#8888a0">
      / Individual Functions
    </text>

    <!-- Description -->
    <text x="30" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#a5a5c0">
      Each team implements concrete features here
    </text>
    <text x="30" y="72" font-family="system-ui, sans-serif" font-size="11" fill="#6b6b8a">
      Can depend on: domain, framework
    </text>
  </g>

  <!-- Domain Layer (Middle) -->
  <g transform="translate(50, 160)" filter="url(#shadow)">
    <rect x="0" y="0" width="600" height="85" rx="12" fill="#1e1e3f" stroke="url(#domainGradient)" stroke-width="2"/>
    <rect x="0" y="0" width="600" height="85" rx="12" fill="url(#domainGradient)" opacity="0.08"/>

    <!-- Layer badge -->
    <rect x="20" y="15" width="80" height="24" rx="12" fill="#8b5cf6" opacity="0.2"/>
    <text x="60" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a78bfa" font-weight="600">
      DOMAIN
    </text>

    <!-- Layer name -->
    <text x="130" y="32" font-family="system-ui, sans-serif" font-size="16" fill="#e0e0e8" font-weight="600">
      domain
    </text>
    <text x="220" y="32" font-family="system-ui, sans-serif" font-size="14" fill="#8888a0">
      / Business Domain
    </text>

    <!-- Description -->
    <text x="30" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#a5a5c0">
      Business logic shared across multiple features (with versioning)
    </text>
    <text x="30" y="72" font-family="system-ui, sans-serif" font-size="11" fill="#6b6b8a">
      Can depend on: framework only
    </text>
  </g>

  <!-- Framework Layer (Bottom) -->
  <g transform="translate(50, 265)" filter="url(#shadow)">
    <rect x="0" y="0" width="600" height="85" rx="12" fill="#1e1e3f" stroke="url(#frameworkGradient)" stroke-width="2"/>
    <rect x="0" y="0" width="600" height="85" rx="12" fill="url(#frameworkGradient)" opacity="0.08"/>

    <!-- Layer badge -->
    <rect x="20" y="15" width="100" height="24" rx="12" fill="#6366f1" opacity="0.2"/>
    <text x="70" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#818cf8" font-weight="600">
      FRAMEWORK
    </text>

    <!-- Layer name -->
    <text x="150" y="32" font-family="system-ui, sans-serif" font-size="16" fill="#e0e0e8" font-weight="600">
      framework
    </text>
    <text x="260" y="32" font-family="system-ui, sans-serif" font-size="14" fill="#8888a0">
      / Technical Foundation
    </text>

    <!-- Description -->
    <text x="30" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#a5a5c0">
      Common technical components for all services (base layer)
    </text>
    <text x="30" y="72" font-family="system-ui, sans-serif" font-size="11" fill="#6b6b8a">
      No dependencies on other layers
    </text>
  </g>

  <!-- Dependency Arrows (Right side) -->
  <g filter="url(#glow)">
    <!-- Arrow from feature to domain -->
    <line x1="670" y1="97" x2="670" y2="160" stroke="url(#arrowGradient)" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Arrow from domain to framework -->
    <line x1="670" y1="202" x2="670" y2="265" stroke="url(#arrowGradient)" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Arrow labels -->
    <text x="680" y="130" font-family="system-ui, sans-serif" font-size="9" fill="#8b5cf6" transform="rotate(90, 680, 130)">
      depends
    </text>
    <text x="680" y="235" font-family="system-ui, sans-serif" font-size="9" fill="#8b5cf6" transform="rotate(90, 680, 235)">
      depends
    </text>
  </g>

</svg>
