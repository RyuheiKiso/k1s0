app:
  name: k1s0-task-server
  version: "0.1.0"
  environment: development

server:
  host: "0.0.0.0"
  # docker-compose のヘルスチェックおよびポートマッピング（8311:8080）に合わせてコンテナ内ポートを8080に設定する
  port: 8080
  # H-005 監査対応: 非標準ポート (9310) から標準 gRPC ポート (50051) に統一し NetworkPolicy の許可ルールと整合させる
  grpc_port: 50051

database:
  host: "postgres"
  port: 5432
  name: k1s0_service
  schema: task_service
  user: k1s0
  # ローカル開発環境専用のパスワード（.env.dev の K1S0_DB_PASSWORD=dev-k1s0-local と一致させること）
  # 本番環境では DATABASE_URL 環境変数で上書きすること。（H-1 監査対応）
  password: "dev-k1s0-local"
  ssl_mode: disable
  max_connections: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

observability:
  log:
    level: info
    format: json
  trace:
    enabled: true
    endpoint: "http://jaeger:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: /metrics

kafka:
  brokers:
    - "kafka:9092"
  task_created_topic: "k1s0.service.task.created.v1"
  # TaskUpdated イベント送信先トピック（topics.yaml で定義済み）
  task_updated_topic: "k1s0.service.task.updated.v1"
  # TaskCancelled イベント送信先トピック（topics.yaml で定義済み）
  task_cancelled_topic: "k1s0.service.task.cancelled.v1"

# AuthConfig ネスト形式（ADR-0053 準拠）。jwt と jwks をサブキーに分離して Rust 構造体と整合させる。
auth:
  jwt:
    issuer: "http://keycloak:8080/realms/k1s0"
    audience: "k1s0-api"
  jwks:
    url: "http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs"
    cache_ttl_secs: 300
