[package]
name = "k1s0-board-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_board_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-board-server"
path = "src/main.rs"

[dependencies]
axum = { workspace = true, features = ["multipart"] }
tokio = { workspace = true }
# BSL-CRIT-001 監査対応: CancellationToken による graceful shutdown を追加する
tokio-util = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
# パスワード等の機密情報を Secret<T> でラップしてログ・デバッグ出力から隠蔽する
secrecy = { workspace = true }
sqlx = { workspace = true, features = ["migrate"] }
uuid = { workspace = true }
chrono = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true, features = ["rt-tokio"] }
opentelemetry-otlp = { workspace = true, features = ["grpc-tonic"] }
tracing-opentelemetry = { workspace = true }
prometheus = { workspace = true }
validator = { workspace = true }
k1s0-telemetry = { path = "../../../../../system/library/rust/telemetry", features = ["full"] }
k1s0-auth = { path = "../../../../../system/library/rust/auth" }
k1s0-server-common = { path = "../../../../../system/library/rust/server-common", features = ["auth", "grpc-auth", "shutdown"] }
k1s0-correlation = { path = "../../../../../system/library/rust/correlation", features = ["tower-layer"] }
# TODO: k1s0-outbox::OutboxEventPoller に移行する（ADR-0018 参照、MEDIUM-CODE-01 監査対応）
# 現在は各リポジトリ実装内で outbox テーブルへ直接書き込んでいる。
# k1s0-outbox::OutboxEventPoller / OutboxEventHandler を使用した統一的なポーリング機構へ移行すること。
k1s0-outbox = { path = "../../../../../system/library/rust/outbox" }
tonic = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }
rdkafka = { workspace = true }
# ARCH-HIGH-003 対応: outbox_poller の並行 Kafka 送信のために追加
futures = { workspace = true }

[build-dependencies]
k1s0-proto-build = { path = "../../../../../system/library/rust/proto-build" }

[features]
db-tests = []

[dev-dependencies]
mockall = { workspace = true }
tokio-test = { workspace = true }
tower = { workspace = true }
axum-test = { workspace = true }

# ワークスペース定義の Lint ルール（unwrap_used = "deny" 等）を継承する
[lints]
workspace = true
