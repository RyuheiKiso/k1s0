app:
  name: k1s0-board-server
  version: "0.1.0"
  environment: development

server:
  host: "0.0.0.0"
  # docker-compose のヘルスチェックおよびポートマッピング（8321:8080）に合わせてコンテナ内ポートを8080に設定する
  port: 8080
  grpc_port: 9320

database:
  host: "postgres"
  port: 5432
  name: k1s0_service
  schema: board_service
  user: k1s0
  # ローカル開発環境のパスワード（init-db/00-create-app-user.sql で設定。init-db の K1S0_DB_PASSWORD デフォルト値と一致させること）
  password: "dev-k1s0-local"
  ssl_mode: disable
  max_connections: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

observability:
  log:
    level: info
    format: json
  trace:
    enabled: true
    endpoint: "http://jaeger:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: /metrics

kafka:
  brokers:
    - "kafka:9092"
  # DOCS-003 監査対応: 実際のトピック名（topics.yaml / create-topics.sh）に合わせて .v1 接尾辞を追加
  board_column_updated_topic: "k1s0.service.board.column_updated.v1"

# AuthConfig ネスト形式（ADR-0053 準拠）。jwt と jwks をサブキーに分離して Rust 構造体と整合させる。
auth:
  jwt:
    issuer: "http://keycloak:8080/realms/k1s0"
    audience: "k1s0-api"
  jwks:
    url: "http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs"
    cache_ttl_secs: 300
