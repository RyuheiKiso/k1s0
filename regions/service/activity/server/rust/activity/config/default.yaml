app:
  name: k1s0-activity-server
  version: "0.1.0"
  environment: development

server:
  host: "0.0.0.0"
  port: 8330
  grpc_port: 9330

database:
  host: localhost
  port: 5432
  name: k1s0_activity
  schema: activity
  user: k1s0
  password: ""
  ssl_mode: disable
  max_connections: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

observability:
  log:
    level: info
    format: json
  trace:
    enabled: true
    endpoint: "http://jaeger:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: /metrics

kafka:
  brokers:
    - "kafka:9092"
  activity_created_topic: "k1s0.service.activity.created"
  activity_approved_topic: "k1s0.service.activity.approved"

auth:
  jwks_url: "http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs"
  issuer: "http://keycloak:8080/realms/k1s0"
  audience: "k1s0-api"
  jwks_cache_ttl_secs: 300
