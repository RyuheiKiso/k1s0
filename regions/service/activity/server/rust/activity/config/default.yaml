app:
  name: k1s0-activity-server
  version: "0.1.0"
  environment: development

server:
  host: "0.0.0.0"
  # docker-compose のヘルスチェックおよびポートマッピング（8331:8080）に合わせてコンテナ内ポートを8080に設定する
  port: 8080
  grpc_port: 9330

database:
  host: "postgres"
  port: 5432
  name: k1s0_service
  schema: activity_service
  user: k1s0
  # ローカル開発環境のパスワード（init-db/00-create-app-user.sql で設定。init-db の K1S0_DB_PASSWORD デフォルト値と一致させること）
  password: "dev-k1s0-local"
  ssl_mode: disable
  max_connections: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

observability:
  log:
    level: info
    format: json
  trace:
    enabled: true
    endpoint: "http://jaeger:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: /metrics

kafka:
  brokers:
    - "kafka:9092"
  activity_created_topic: "k1s0.service.activity.created.v1"
  activity_approved_topic: "k1s0.service.activity.approved.v1"

auth:
  jwks_url: "http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs"
  issuer: "http://keycloak:8080/realms/k1s0"
  audience: "k1s0-api"
  jwks_cache_ttl_secs: 300
