app:
  name: "k1s0-payment-server"
  version: "0.1.0"
  environment: "development"

server:
  host: "0.0.0.0"
  port: 8312
  grpc_port: 50073

database:
  host: "localhost"
  port: 5432
  name: "k1s0_payment"
  schema: "payment_service"
  user: "k1s0"
  password: "k1s0"
  ssl_mode: "disable"
  max_connections: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

kafka:
  brokers:
    - "localhost:9092"
  payment_initiated_topic: "k1s0.service.payment.initiated.v1"
  payment_completed_topic: "k1s0.service.payment.completed.v1"
  payment_failed_topic: "k1s0.service.payment.failed.v1"
  payment_refunded_topic: "k1s0.service.payment.refunded.v1"
  security_protocol: "PLAINTEXT"

auth:
  jwks_url: "http://localhost:8080/realms/k1s0/protocol/openid-connect/certs"
  issuer: "http://localhost:8080/realms/k1s0"
  audience: "k1s0-service"
  jwks_cache_ttl_secs: 300

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"
