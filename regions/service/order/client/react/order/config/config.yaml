# アプリケーション基本設定
app:
  name: "order"
  version: "0.1.0"
  env: "development"

# API接続設定: BFFサーバーへの接続情報
api:
  base_url: "http://localhost:8080"
  timeout: 30
  retry:
    max_attempts: 3
    backoff_ms: 1000

# プロキシ設定: 開発サーバーからBFFへのリクエスト転送
proxy:
  path: "/bff"
  target: "http://localhost:8080"

# フィーチャーフラグ: 機能の有効/無効を制御
features: {}
