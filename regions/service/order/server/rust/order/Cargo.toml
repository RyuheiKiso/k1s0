[package]
name = "k1s0-order-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_order_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-order-server"
path = "src/main.rs"

[dependencies]
# Web フレームワーク（multipart はワークスペース定義外の追加機能）
axum = { workspace = true, features = ["multipart"] }
tokio = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }

# シリアライズ / デシリアライズ
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }

# データベース接続（migrate はワークスペース定義外の追加機能）
sqlx = { workspace = true, features = ["migrate"] }

# ユーティリティ
uuid = { workspace = true }
chrono = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }

# ログ / トレーシング
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# オブザーバビリティ（rt-tokio はワークスペース定義外の追加機能）
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true, features = ["rt-tokio"] }
opentelemetry-otlp = { workspace = true, features = ["grpc-tonic"] }
tracing-opentelemetry = { workspace = true }
prometheus = { workspace = true }

# バリデーション
validator = { workspace = true }

# テレメトリライブラリ
k1s0-telemetry = { path = "../../../../../system/library/rust/telemetry", features = ["full"] }

# 認証ライブラリ
k1s0-auth = { path = "../../../../../system/library/rust/auth" }

# サーバー共通（エラーコード、認証ミドルウェア、RBAC）
k1s0-server-common = { path = "../../../../../system/library/rust/server-common", features = ["auth", "grpc-auth", "shutdown"] }

# Correlation ID ミドルウェア（REST サーバーの MetricsLayer/CorrelationLayer に必要）
k1s0-correlation = { path = "../../../../../system/library/rust/correlation", features = ["tower-layer"] }

# Outbox パターンライブラリ
k1s0-outbox = { path = "../../../../../system/library/rust/outbox" }

# gRPC 通信
tonic = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }

# Kafka メッセージング
rdkafka = { workspace = true }

[build-dependencies]
# gRPC プロトコルバッファのコード生成
k1s0-proto-build = { path = "../../../../../system/library/rust/proto-build" }
# クロスサービスイベント proto のコンパイル（Saga Consumer 用）
tonic-build = { workspace = true }

[features]
db-tests = []

[dev-dependencies]
# テスト用モックライブラリ
mockall = { workspace = true }
tokio-test = { workspace = true }
tower = { workspace = true }
axum-test = { workspace = true }
