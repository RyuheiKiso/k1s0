app:
  name: bff-proxy
  version: "0.1.0"
  tier: system
  environment: dev

server:
  host: "0.0.0.0"
  port: 8080
  # HIGH-GO-001 監査対応: /metrics 専用の内部サーバーポート（127.0.0.1 にバインド）。
  # Prometheus スクレイプは公開ポート（8080）ではなくこのポートを使用すること。
  # デフォルト: 9090
  internal_port: 9090
  read_timeout: "10s"
  write_timeout: "30s"
  shutdown_timeout: "15s"

observability:
  log:
    level: info
    format: json
  trace:
    enabled: false
    endpoint: ""
    sample_rate: 1.0
    # otlp_insecure: gRPC トレースエクスポーターを insecure モード（TLS なし）で接続するか（HIGH-11 対応）
    # 本番環境では false（デフォルト）を使用すること。
    # 開発環境でローカルの OTLP コレクターに接続する場合のみ true にすること。
    otlp_insecure: false
  metrics:
    enabled: true
    path: /metrics

auth:
  # L-019 監査対応: 開発環境のみ HTTP（非TLS）を使用する。
  # 本番環境では必ず HTTPS/TLS を使用し、OIDC Discovery URL と redirect_uri を
  # https:// スキームに変更すること。HTTP のままでは認証トークンが平文で送受信され
  # 中間者攻撃（MITM）のリスクがある。
  discovery_url: "http://keycloak:8080/realms/k1s0"
  client_id: "k1s0-bff"
  client_secret: ""
  redirect_uri: "http://localhost:8080/auth/callback"
  post_logout_redirect_uri: "http://localhost:3000"
  scopes:
    - openid
    - profile
    - email

session:
  redis:
    addr: "redis:6379"
    password: ""
    db: 0
    master_name: ""
  ttl: "30m"
  prefix: "bff:session:"
  sliding: true

csrf:
  enabled: true
  header_name: "X-CSRF-Token"

# CORS設定（H-1対応）: 明示的な Origin ホワイトリストで異オリジンリクエストを制御する
# 本番環境では allow_origins に実際のフロントエンドドメインを設定すること
cors:
  enabled: true
  allow_origins:
    # L-03 監査対応: 開発時に使用する一般的なポートを列挙する。
    # localhost:3000 - React (create-react-app)
    # localhost:5173 - Vite (React/Vue/Svelte)
    # localhost:4200 - Angular
    # localhost:8080 - BFF Proxy ローカル直接アクセス
    # localhost:3001 - Flutter Web (flutter run --web-port 3001)
    # 本番環境ではこのリストを実際のドメインに絞ること。
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:4200"
    - "http://localhost:3001"
  # H-13 監査対応: Access-Control-Allow-Credentials: true を返すパスプレフィックス。
  # 認証が不要な /healthz や /metrics には credentials を付与しない。
  # /auth/ - ログイン・コールバック・ログアウト・リフレッシュ等の認証エンドポイント
  # /api/  - 認証済みユーザー向けの API プロキシエンドポイント
  credentials_paths:
    - "/auth/"
    - "/api/"
  max_age_secs: 600

# レート制限設定（H-2対応）: IP ベースのトークンバケットで大量リクエストを遮断する
rate_limit:
  enabled: true
  rps: 100
  burst: 200

upstream:
  base_url: "http://auth-server:8080"
  timeout: "30s"
