app:
  environment: dev

server:
  host: "0.0.0.0"
  port: 8080

auth:
  discovery_url: "http://keycloak:8080/realms/k1s0"
  client_id: "k1s0-bff"
  # シークレットはハードコードせず環境変数から取得する
  client_secret: "${CLIENT_SECRET}"
  redirect_uri: "http://localhost:8080/auth/callback"

session:
  redis:
    addr: "redis-session:6379"
    # Redis 認証パスワードは環境変数から取得する
    password: "${REDIS_PASSWORD}"

upstream:
  base_url: "http://auth-rust:8080"
