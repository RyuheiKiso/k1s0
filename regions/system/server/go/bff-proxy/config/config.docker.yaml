# BFF Proxy Docker環境設定
# Docker Compose環境での設定値。開発環境専用。
app:
  name: "bff-proxy"
  version: "0.1.0"
  tier: "system"
  environment: dev

server:
  host: "0.0.0.0"
  port: 8080
  # HIGH-GO-001 監査対応: /metrics 専用の内部サーバーポート（127.0.0.1 にバインド）
  internal_port: 9090

observability:
  log:
    level: info
    format: json
  trace:
    enabled: false
    endpoint: "jaeger:4317"
    sample_rate: 1.0
    # 開発環境ではローカルの Jaeger に TLS なしで接続するため true にする（HIGH-11 対応）
    # gRPC エンドポイントは "host:port" 形式を使用し、スキームは含めないこと
    otlp_insecure: true
  metrics:
    enabled: true
    path: /metrics

auth:
  discovery_url: "http://keycloak:8080/realms/k1s0"
  client_id: "k1s0-bff"
  # 開発環境ではシークレットを空文字にする（Keycloakのパブリッククライアント設定と合わせること）
  client_secret: ""
  redirect_uri: "http://localhost:8082/auth/callback"

session:
  redis:
    addr: "redis-session:6379"
    # 開発環境専用の Redis パスワード（HIGH-SEC-05 監査対応）
    # 本番環境では Vault 参照パターンを使用すること:
    #   vault:secret/data/k1s0/system/redis-session#password
    # 詳細: docs/infrastructure/vault/vault設計.md
    password: "dev"

upstream:
  base_url: "http://auth-rust:8080"
