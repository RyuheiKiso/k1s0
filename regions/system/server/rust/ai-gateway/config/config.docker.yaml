app:
  name: k1s0-ai-gateway-server
  version: "0.1.0"
  environment: docker
server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 50061

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"

