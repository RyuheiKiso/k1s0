[package]
name = "k1s0-auth-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_auth_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-auth-server"
path = "src/main.rs"
test = false

[dependencies]
# gRPC / Protobuf
tonic = {workspace = true}
# gRPC Health Check Protocol サービスの実装に使用する
tonic-health = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}

# Web framework
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}

# Serialization
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}

# JWT
jsonwebtoken = "9"

# DB
sqlx = {workspace = true}

# Utilities
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
validator = { version = "0.20", features = ["derive"] }
async-trait = {workspace = true}
sha2 = {workspace = true}
hmac = "0.12"
# H-008 監査対応: ハッシュ比較を定数時間で行いタイミング攻撃を防止する
subtle = "2"

# Logging / Tracing
tracing = {workspace = true}
tracing-subscriber = {workspace = true}

# Cache
moka = {workspace = true}

# バックグラウンドタスクのキャンセル制御に使用する（CancellationToken はデフォルト機能で利用可能）
tokio-util = { version = "0.7" }

# 複合ロールの並列 HTTP フェッチに join_all を使用する
futures = "0.3"

# Kafka
rdkafka = { version = "0.39", features = ["cmake-build"] }

# パスワードなどの機密情報を Debug トレイト経由の漏洩から保護する（H-1 監査対応）
secrecy = {workspace = true}

# HTTP client (for Keycloak)
reqwest = {workspace = true, features = ["rustls-tls"]}

# URL エンコード（CRIT-07: Keycloak クエリパラメータのインジェクション防止）
urlencoding = "2"

# Auth library (JWKS verifier)
k1s0-auth = { path = "../../../library/rust/auth" }

# Circuit breaker (外部サービス障害時のレジリエンス確保)
k1s0-circuit-breaker = { path = "../../../library/rust/circuit-breaker" }

# Telemetry library
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }

# Server common (error codes)
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["axum", "utoipa", "shutdown"] }

# OpenAPI
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}

[build-dependencies]
tonic-build = {workspace = true}

[features]
db-tests = []

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "17"
tower = {workspace = true}
# workspace で一元管理するバージョンを参照する（H-2 監査対応: バージョン競合解消）
testcontainers = { workspace = true }
testcontainers-modules = { workspace = true }
wiremock = "0.6"

[lints]
workspace = true
