[package]
name = "k1s0-auth-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_auth_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-auth-server"
path = "src/main.rs"
test = false

[dependencies]
# gRPC / Protobuf
tonic = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}

# Web framework
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}

# Serialization
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}

# JWT
jsonwebtoken = "9"

# DB
sqlx = {workspace = true}

# Utilities
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
validator = { version = "0.20", features = ["derive"] }
async-trait = {workspace = true}
sha2 = "0.10"
hmac = "0.12"

# Logging / Tracing
tracing = {workspace = true}
tracing-subscriber = {workspace = true}

# Cache
moka = { version = "0.12", features = ["future"] }

# Kafka
rdkafka = { version = "0.37", features = ["cmake-build"] }

# HTTP client (for Keycloak)
reqwest = {workspace = true, features = ["rustls-tls"]}

# Auth library (JWKS verifier)
k1s0-auth = { path = "../../../library/rust/auth" }

# Circuit breaker (外部サービス障害時のレジリエンス確保)
k1s0-circuit-breaker = { path = "../../../library/rust/circuit-breaker" }

# Telemetry library
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }

# Server common (error codes)
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["axum", "utoipa", "shutdown"] }

# OpenAPI
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}

[build-dependencies]
tonic-build = {workspace = true}

[features]
db-tests = []

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "17"
tower = {workspace = true}
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["postgres"] }
wiremock = "0.6"

[lints]
workspace = true
