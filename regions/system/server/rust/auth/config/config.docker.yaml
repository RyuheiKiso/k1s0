app:
  name: "auth-server"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080

database:
  host: postgres
  port: 5432
  name: auth_db
  user: dev
  password: "${DB_PASSWORD:-dev}"
  ssl_mode: disable

auth:
  jwt:
    issuer: "http://localhost:8180/realms/k1s0"
    audience: "k1s0-api"
  jwks:
    url: "http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs"
    cache_ttl_secs: 300

kafka:
  brokers:
    - "kafka:9092"
  topic: "audit-events-dev"
  # Docker 環境: コンテナ内 Kafka は TLS なしのため PLAINTEXT を明示指定
  security_protocol: "PLAINTEXT"

permission_cache:
  ttl_secs: 60
  refresh_on_miss: true

audit:
  kafka_enabled: false
  retention_days: 30

keycloak:
  base_url: "http://keycloak:8080"
  realm: "k1s0"
  client_id: "k1s0-service"
  client_secret: "${KC_SERVICE_CLIENT_SECRET:-dev-service-secret}"
  admin_realm: "master"
  admin_client_id: "admin-cli"
  admin_username: "admin"
  admin_password: "${KC_ADMIN_PASSWORD:-dev}"

keycloak_admin:
  token_cache_ttl_secs: 60
