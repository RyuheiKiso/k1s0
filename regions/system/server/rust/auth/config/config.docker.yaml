app:
  name: "auth-server"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080
  # LOW-004 監査対応: gRPC サーバーポートを明示する（コンテナ内ポート; ホスト側は docker-compose.yaml で上書き可能）
  grpc_port: 50051

database:
  host: postgres
  port: 5432
  name: auth_db
  user: dev
  # LOW-021 監査対応（開発専用パスワード）:
  # このパスワードは Docker ローカル開発環境専用の固定値である。
  # 本番環境では Vault の dynamic secrets または Kubernetes Secret 経由で注入すること。
  # serde_yaml はシェル変数展開をしないため直値で設定する（本番は DATABASE_URL 環境変数で上書きされる）
  password: "dev"
  ssl_mode: disable

auth:
  jwt:
    # Docker ネットワーク内では Keycloak は keycloak:8080 でアクセスされ、JWT の iss クレームも同 URL となる。
    # localhost:8180 はホストからの外部アクセス用であり、コンテナ内 issuer 検証には使用不可（HIGH-6 監査対応）。
    issuer: "http://keycloak:8080/realms/k1s0"
    audience: "k1s0-api"
  jwks:
    url: "http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs"
    cache_ttl_secs: 300

kafka:
  brokers:
    - "kafka:9092"
  # create-topics.sh で作成されるトピック名と一致させる（LOW-3 監査対応）
  topic: "k1s0.system.auth.audit.v1"
  # Docker 環境: コンテナ内 Kafka は TLS なしのため PLAINTEXT を明示指定
  security_protocol: "PLAINTEXT"

permission_cache:
  ttl_secs: 60
  refresh_on_miss: true

audit:
  kafka_enabled: false
  retention_days: 30

# STATIC-MEDIUM-003 監査対応 (ADR-0061): ROPC（admin_username / admin_password）を廃止し、
# Client Credentials Grant のみを使用するよう統一した。
# Keycloak 側で auth-rust 専用 Service Account（auth-rust-admin クライアント）を作成し、
# realm-management ロールを付与した上で、client_secret を本番値に置き換えること。
keycloak:
  base_url: "http://keycloak:8080"
  realm: "k1s0"
  client_id: "auth-rust-admin"
  # !!!! ローカル開発専用の固定値 !!!!
  # 本番環境では Vault から注入した config ファイルまたは Kubernetes Secret で別途上書きすること。
  client_secret: "dev-service-secret"

keycloak_admin:
  token_cache_ttl_secs: 60

# ユーザーキャッシュ設定（L-15 監査対応: ハードコード値を設定ファイル化する）
cache:
  user_cache_max_entries: 5000
  user_cache_ttl_secs: 300

# LOW-13 監査対応: Tier 階層を設定ファイルから読み込む（ハードコード解消）。
# 上位から下位の順で列挙する。新しい Tier を追加する場合はこのリストに追記するだけでよい。
tier_hierarchy:
  tiers:
    - "system"
    - "business"
    - "service"
