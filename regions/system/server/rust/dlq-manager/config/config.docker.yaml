app:
  name: "dlq-manager"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 50051

database:
  host: postgres
  port: 5432
  name: dlq_db
  user: dev
  password: "${DB_PASSWORD:-dev}"
  ssl_mode: disable

kafka:
  brokers:
    - "kafka:9092"
  consumer_group: "dlq-manager.docker"
  # DLQトピックのマッチングパターン（*.v1.dlq 形式に統一）
  dlq_topic_pattern: "*.v1.dlq"
  security_protocol: "PLAINTEXT"
