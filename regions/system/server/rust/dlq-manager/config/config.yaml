app:
  name: "dlq-manager"
  version: "0.1.0"
  environment: "production"
server:
  host: "0.0.0.0"
  port: 8080
database:
  host: "postgres.k1s0-system.svc.cluster.local"
  port: 5432
  name: "k1s0_system"
  user: "app"
  password: ""
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"
kafka:
  brokers:
    - "kafka-0.messaging.svc.cluster.local:9092"
  consumer_group: "dlq-manager.default"
  security_protocol: "PLAINTEXT"
  dlq_topic_pattern: "*.dlq.v1"

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"

