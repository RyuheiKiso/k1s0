app:
  name: "dlq-manager"
  version: "0.1.0"
  environment: "staging"
server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 50051
database:
  host: "postgres.k1s0-system-staging.svc.cluster.local"
  port: 5432
  name: "k1s0_system"
  user: "app"
  password: ""
  ssl_mode: "require"
  max_open_conns: 15
  max_idle_conns: 3
  conn_max_lifetime: "5m"
kafka:
  brokers:
    - "kafka-0.messaging-staging.svc.cluster.local:9093"
  consumer_group: "dlq-manager.staging"
  security_protocol: "PLAINTEXT"
  # DLQトピックのマッチングパターン（*.v1.dlq 形式に統一）
  dlq_topic_pattern: "*.v1.dlq"
