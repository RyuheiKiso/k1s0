[package]
name = "k1s0-dlq-manager"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_dlq_manager"
path = "src/lib.rs"

[[bin]]
name = "k1s0-dlq-manager"
path = "src/main.rs"
test = false

[dependencies]
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}
sqlx = {workspace = true}
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
tracing = {workspace = true}
tracing-subscriber = {workspace = true}
rdkafka = { version = "0.39", features = ["cmake-build"] }

# パスワードなどの機密情報を Debug トレイト経由の漏洩から保護する（H-1 監査対応）
secrecy = {workspace = true}
k1s0-dlq-client = { path = "../../../library/rust/dlq-client" }
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["axum-layer"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }
k1s0-auth = { path = "../../../library/rust/auth" }

# Server common (error codes)
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["auth", "axum", "shutdown", "startup-auth", "grpc-auth"] }

# OpenAPI
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}

# gRPC
tonic = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}

[build-dependencies]
tonic-build = {workspace = true}

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "17"
tower = {workspace = true}

[lints]
workspace = true
