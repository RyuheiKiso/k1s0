app:
  name: k1s0-search-server
  version: "0.1.0"
  environment: dev
server:
  host: "0.0.0.0"
  port: 8094

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"

