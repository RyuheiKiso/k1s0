# Docker環境用設定ファイル
# ホスト名をDockerコンテナ名に変更し、ポートをコンテナ内部ポートに設定する
app:
  name: k1s0-search-server
  version: "0.1.0"
  environment: dev

server:
  host: "0.0.0.0"
  port: 8080
  # LOW-004 監査対応: gRPC サーバーポートを明示する（コンテナ内ポート; ホスト側は docker-compose.yaml で上書き可能）
  grpc_port: 50051

database:
  host: "postgres"
  port: 5432
  name: "search_db"
  user: "dev"
  # パスワードは環境変数から取得し、未設定時は開発用デフォルト値 "dev" を使用する
  password: "${DB_PASSWORD:-dev}"
  ssl_mode: "disable"

# Kafka設定: 検索インデックス更新イベントを受信する
kafka:
  brokers:
    - "kafka:9092"
  topic: "k1s0.system.search.index.v1"
  consumer_group: "search-server.dev"
  security_protocol: "PLAINTEXT"
