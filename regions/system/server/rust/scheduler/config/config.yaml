app:
  name: k1s0-scheduler-server
  version: "0.1.0"
  environment: dev
server:
  host: "0.0.0.0"
  port: 8095
  grpc_port: 50051

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0

# === Production configuration (uncomment as needed) ===
database:
  host: "localhost"
  port: 5432
  name: "scheduler_db"
  user: "app"
  password: ""
  ssl_mode: "require"
  max_open_conns: 25
