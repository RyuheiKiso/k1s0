[package]
name = "k1s0-file-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_file_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-file-server"
path = "src/main.rs"
test = false

[dependencies]
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
tracing = {workspace = true}
tracing-subscriber = {workspace = true}
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }
k1s0-auth = { path = "../../../library/rust/auth" }
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["auth", "shutdown", "grpc-auth"] }

# gRPC
tonic = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}

# Kafka
rdkafka = { version = "0.39", features = ["cmake-build"] }
sqlx = {workspace = true}

[build-dependencies]
tonic-build = {workspace = true}

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "17"
tower = {workspace = true}
# local_fs_storage.rs のテストで一時ディレクトリ作成に使用する（H-2 監査対応: 未宣言依存の追加）
tempfile = "3"

[lints]
workspace = true
