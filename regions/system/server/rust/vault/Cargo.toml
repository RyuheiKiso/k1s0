[package]
name = "k1s0-vault-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_vault_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-vault-server"
path = "src/main.rs"
test = false

# HIGH-RUST-001 Phase B: 旧形式（AAD なし）シークレットを新形式（AAD あり）に一括再暗号化する管理用バイナリ
[[bin]]
name = "migrate-secrets"
path = "src/bin/migrate_secrets.rs"
test = false

[dependencies]
tonic = {workspace = true}
# gRPC Health Check Protocol サービスの実装に使用する
tonic-health = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}
sqlx = {workspace = true}
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
tracing = {workspace = true}
tracing-subscriber = {workspace = true}
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }
k1s0-auth = { path = "../../../library/rust/auth" }
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["auth", "shutdown", "grpc-auth"] }
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}
rdkafka = { version = "0.39", features = ["cmake-build"] }
moka = {workspace = true}

# パスワードなどの機密情報を Debug トレイト経由の漏洩から保護する（H-1 監査対応）
secrecy = {workspace = true}
aes-gcm = "0.10"
hex = {workspace = true}
vaultrs = "0.7"

[build-dependencies]
tonic-build = {workspace = true}

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "17"
tower = {workspace = true}
tokio = {workspace = true}
axum = {workspace = true}
async-trait = {workspace = true}

[lints]
workspace = true
