app:
  name: "k1s0-vault-server"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080
  # LOW-004 監査対応: gRPC サーバーポートを明示する（コンテナ内ポート; ホスト側は docker-compose.yaml で上書き可能）
  grpc_port: 50051

# L-15 監査対応: Docker 開発環境用のキャッシュ設定
# 開発環境では短い TTL でシークレット変更を素早く反映できるようにする
cache:
  max_entries: 10000
  ttl_secs: 300
