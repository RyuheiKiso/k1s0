app:
  name: k1s0-vault-server
  version: "0.1.0"
  environment: dev
server:
  host: "0.0.0.0"
  port: 8090
  grpc_port: 50051

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"

# L-15 監査対応: シークレットキャッシュ設定（ハードコード値の設定ファイル化）
# max_entries: キャッシュに保持する最大エントリ数
# ttl_secs: キャッシュエントリの有効期間（秒）。本番環境ではシークレットローテーション周期に合わせること。
cache:
  max_entries: 10000
  ttl_secs: 2880

# --- Production configuration (uncomment as needed) ---
database:
  host: "postgres.k1s0-system.svc.cluster.local"
  port: 5432
  name: "vault_db"
  user: "app"
  password: ""
  ssl_mode: "require"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"
