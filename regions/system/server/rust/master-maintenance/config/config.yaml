app:
  name: "k1s0-master-maintenance-server"
  version: "0.1.0"
  environment: "development"

server:
  host: "0.0.0.0"
  port: 8110
  grpc_port: 50051

database:
  host: "localhost"
  port: 5432
  name: "k1s0"
  schema: "master_maintenance"
  user: "k1s0"
  password: "k1s0"
  ssl_mode: "disable"
  max_connections: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

kafka:
  brokers:
    - "localhost:9092"
  topic: "k1s0.system.mastermaintenance.data_changed.v1"

auth:
  jwks_url: "http://localhost:8080/realms/k1s0/protocol/openid-connect/certs"
  issuer: "http://localhost:8080/realms/k1s0"
  audience: "k1s0-system"
  jwks_cache_ttl_secs: 300

rule_engine:
  max_rules_per_table: 100
  evaluation_timeout_ms: 5000
  cache_ttl_seconds: 300

import:
  max_file_size_mb: 50
  max_rows_per_import: 100000
  batch_size: 500

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"

