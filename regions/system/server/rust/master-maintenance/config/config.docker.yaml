# Docker環境用設定ファイル
# ホスト名をDockerコンテナ名に変更し、ポートをコンテナ内部ポートに設定する
app:
  name: "k1s0-master-maintenance-server"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 50051

database:
  # CRIT-001 監査対応: k1s0_system から専用 DB に分離（_sqlx_migrations 競合解消）
  host: "postgres"
  port: 5432
  name: "k1s0_master_maintenance"
  schema: "master_maintenance"
  user: "dev"
  password: "${DB_PASSWORD:-dev}"
  ssl_mode: "disable"
  max_connections: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

kafka:
  brokers:
    - "kafka:9092"
  topic: "k1s0.system.mastermaintenance.data_changed.v1"

# CRIT-001 + MED-007: ADR-0053 AuthConfig ネスト形式移行
# issuer を localhost:8180（誤り）から keycloak:8080（正しい Docker コンテナ名）に修正する
# audience を k1s0-system から k1s0-api に統一する
auth:
  jwt:
    issuer: "http://keycloak:8080/realms/k1s0"
    audience: "k1s0-api"
  jwks:
    url: "http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs"
    cache_ttl_secs: 300

rule_engine:
  max_rules_per_table: 100
  evaluation_timeout_ms: 5000
  cache_ttl_seconds: 300

import:
  max_file_size_mb: 50
  max_rows_per_import: 100000
  batch_size: 500
