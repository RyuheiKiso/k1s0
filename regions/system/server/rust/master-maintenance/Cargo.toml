[package]
name = "k1s0-master-maintenance-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_master_maintenance_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-master-maintenance-server"
path = "src/main.rs"
test = false

[dependencies]
# Web framework
axum = {workspace = true, features = ["multipart"]}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}

# Serialization
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}

# DB
sqlx = {workspace = true, features = ["migrate"]}

# Rule Engine
zen-engine = "0.20"

# Utilities
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
regex = "1"

# CSV/Excel
csv = "1"
calamine = "0.26"
rust_xlsxwriter = "0.94"

# Logging / Tracing
tracing = {workspace = true}
tracing-subscriber = {workspace = true}

# Observability
opentelemetry = "0.27"
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.27", features = ["grpc-tonic"] }
tracing-opentelemetry = "0.28"
prometheus = "0.14"

# Validation
validator = { version = "0.20", features = ["derive"] }

# Telemetry library
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
# Correlation ID伝播ライブラリ
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }

# Auth library
k1s0-auth = { path = "../../../library/rust/auth" }

# Server common (error codes)
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["auth", "axum", "shutdown"] }

# OpenAPI
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}

# gRPC
tonic = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}

# Kafka
rdkafka = { version = "0.39", features = ["cmake-build"] }

[build-dependencies]
tonic-build = {workspace = true}

[features]
db-tests = []

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
tower = {workspace = true}
testcontainers = "0.24"
axum-test = "17"

[lints]
workspace = true
