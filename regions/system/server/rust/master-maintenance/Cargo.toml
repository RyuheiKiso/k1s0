[package]
name = "k1s0-master-maintenance-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_master_maintenance_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-master-maintenance-server"
path = "src/main.rs"
test = false

[dependencies]
# Web framework
axum = {workspace = true, features = ["multipart"]}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}

# Serialization
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}

# DB
sqlx = {workspace = true, features = ["migrate"]}

# Rule Engine
zen-engine = "0.20"

# Utilities
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
# 正規表現エンジン（バージョン一元管理: RUST-MED-003 対応）
regex = {workspace = true}

# CSV/Excel
csv = "1"
calamine = "0.26"
rust_xlsxwriter = "0.80"

# Logging / Tracing
tracing = {workspace = true}
tracing-subscriber = {workspace = true}

# Observability
# grpc/handler のコードが直接 opentelemetry / tracing_opentelemetry を参照するため、
# k1s0-telemetry と同じバージョンを明示的に依存追加する（H-10 監査対応）
opentelemetry = "0.27"
tracing-opentelemetry = "0.28"

# Validation
validator = { version = "0.20", features = ["derive"] }

# Telemetry library
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
# Correlation ID伝播ライブラリ
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }

# Auth library
k1s0-auth = { path = "../../../library/rust/auth" }

# Server common (error codes)
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["auth", "axum", "shutdown"] }

# OpenAPI
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}

# gRPC
tonic = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}

# Kafka
rdkafka = { version = "0.39", features = ["cmake-build"] }

# パスワードなどの機密情報を Debug トレイト経由の漏洩から保護する（H-1 監査対応）
secrecy = {workspace = true}

[build-dependencies]
tonic-build = {workspace = true}

[features]
db-tests = []

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
tower = {workspace = true}
testcontainers = "0.24"
axum-test = "17"

[lints]
workspace = true
