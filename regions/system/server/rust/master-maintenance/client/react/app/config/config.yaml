# アプリケーション基本設定
app:
  name: "master-maintenance"
  version: "0.1.0"
  env: "development"

# API接続設定: マスタメンテナンスサーバーへの接続情報
api:
  base_url: "http://127.0.0.1:8110"
  timeout: 30
  retry:
    max_attempts: 3
    backoff_ms: 1000

# プロキシ設定: 開発サーバーからAPIへのリクエスト転送
proxy:
  path: "/api"
  target: "http://127.0.0.1:8110"

# フィーチャーフラグ: 機能の有効/無効を制御
features: {}
