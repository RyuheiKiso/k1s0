app:
  name: k1s0-notification-server
  version: "0.1.0"
  environment: dev
server:
  host: "0.0.0.0"
  port: 8092

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"

# === Production configuration (uncomment as needed) ===
database:
  host: "localhost"
  port: 5432
  name: "notification_db"
  user: "app"
  password: ""
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"
