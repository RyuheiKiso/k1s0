[package]
name = "k1s0-quota-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_quota_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-quota-server"
path = "src/main.rs"
test = false

[dependencies]
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
tracing = {workspace = true}
tracing-subscriber = {workspace = true}
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }
k1s0-auth = { path = "../../../library/rust/auth" }
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["auth", "shutdown"] }
tonic = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}
sqlx = {workspace = true, features = ["migrate"]}
rdkafka = { version = "0.36", features = ["cmake-build"] }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }
croner = "2"

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "17"
tower = {workspace = true}

[build-dependencies]
tonic-build = {workspace = true}

[lints]
workspace = true
