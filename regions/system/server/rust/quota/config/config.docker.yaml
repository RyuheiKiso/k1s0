app:
  name: k1s0-quota-server
  version: "0.1.0"
  environment: dev
server:
  host: "0.0.0.0"
  port: 8080
  # LOW-004 監査対応: gRPC サーバーポートを明示する（コンテナ内ポート; ホスト側は docker-compose.yaml で上書き可能）
  grpc_port: 50051

# クォータDB接続設定
database:
  url: "postgres://dev:dev@postgres:5432/quota_db?sslmode=disable"
  max_connections: 10

# Kafka設定: クォータ超過・閾値到達イベントを発行する
kafka:
  brokers:
    - "kafka:9092"
  topic_exceeded: "k1s0.system.quota.exceeded.v1"
  topic_threshold: "k1s0.system.quota.threshold.v1"
  security_protocol: "PLAINTEXT"

# クォータリセットスケジュール設定（croner v2形式: 秒 分 時 日 月 曜日）
# H-006/M-005 監査対応: docker環境での明示的なスケジュール定義
# croner v2 は6フィールド形式を必須とする。5フィールド形式では find_next_occurrence が
# None を返し cron タスクが即終了する問題が発生するため、秒フィールドを先頭に記載する。
quota:
  reset_schedule:
    daily: "0 0 0 * * *"    # 毎日深夜0時（UTC）
    monthly: "0 0 0 1 * *"  # 毎月1日深夜0時（UTC）
