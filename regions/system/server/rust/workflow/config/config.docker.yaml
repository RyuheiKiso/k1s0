app:
  name: k1s0-workflow-server
  version: "0.1.0"
  # CRIT-08 監査対応: "docker" に設定することで scheduler_registration.rs が
  # http://workflow:{port} を使用する（"dev" のままでは 127.0.0.1 になり Docker Compose 内で動作不能）
  environment: docker

# CRIT-1 監査対応: JWT認証設定。他の全サービスと同様にKeycloakを発行者として設定する。
# 未設定の場合は JWT 検証が機能せず認証バイパスが可能になる。
auth:
  jwt:
    issuer: "http://keycloak:8080/realms/k1s0"
    audience: "k1s0-api"
  jwks:
    url: "http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs"
    cache_ttl_secs: 300

server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 50051

# ワークフローDB接続設定
database:
  host: "postgres"
  port: 5432
  name: "workflow_db"
  user: "dev"
  # パスワードは環境変数から取得し、未設定時は開発用デフォルト値 "dev" を使用する
  password: "${DB_PASSWORD:-dev}"
  ssl_mode: "disable"
  max_open_conns: 10

scheduler:
  internal_endpoint: "http://scheduler-rust:8080"

overdue_check:
  cron_expression: "*/15 * * * *"
  timezone: "UTC"

# Kafka設定: ワークフロー状態変化イベントと通知リクエストを発行する
kafka:
  brokers:
    - "kafka:9092"
  state_topic: "k1s0.system.workflow.state.v1"
  notification_topic: "k1s0.system.notification.requested.v1"
  security_protocol: "PLAINTEXT"
