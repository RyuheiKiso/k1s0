app:
  name: k1s0-workflow-server
  version: "0.1.0"
  environment: dev
server:
  host: "0.0.0.0"
  port: 8100
  grpc_port: 50051

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"

# === Production configuration (uncomment as needed) ===
database:
  host: "localhost"
  port: 5432
  name: "workflow_db"
  user: "app"
  password: ""
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"
# kafka:
#   brokers:
#     - "localhost:9092"
#   security_protocol: "PLAINTEXT"
# scheduler:
#   internal_endpoint: "http://scheduler-server:8080"
# overdue_check:
#   cron_expression: "*/15 * * * *"
#   timezone: "UTC"
# auth:
#   jwks_url: "http://localhost:8180/realms/k1s0/protocol/openid-connect/certs"
#   issuer: "http://localhost:8180/realms/k1s0"
#   audience: "k1s0-api"
#
# If you intentionally run without auth in local dev/test, set:
#   ALLOW_INSECURE_NO_AUTH=true
# NOTE: リリースビルドでは dev-auth-bypass フィーチャーが必要。
# デバッグビルド（cargo run）では自動的に有効。
# Docker 経由の場合は CARGO_FEATURES="k1s0-server-common/dev-auth-bypass" を指定する。
