[package]
name = "k1s0-ai-agent-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_ai_agent_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-ai-agent-server"
path = "src/main.rs"
test = false

[dependencies]
tonic = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}
axum = {workspace = true}
tokio = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}
# パスワード等の機密情報を Secret<T> でラップしてログ・デバッグ出力から隠蔽する
secrecy = {workspace = true}
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
tracing = {workspace = true}
tracing-subscriber = {workspace = true}
http = "1"
sqlx = {workspace = true, features = ["migrate"]}
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
# Correlation ID伝播ライブラリ
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }
k1s0-auth = { path = "../../../library/rust/auth" }
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["auth", "shutdown"] }
k1s0-bb-ai-client = { path = "../../../library/rust/bb-ai-client" }
tower = {workspace = true}
reqwest = {workspace = true}
tokio-stream = "0.1"

[build-dependencies]
tonic-build = {workspace = true}

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "17"

[lints]
workspace = true
