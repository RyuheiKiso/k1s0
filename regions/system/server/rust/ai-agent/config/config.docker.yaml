app:
  name: k1s0-ai-agent-server
  version: "0.1.0"
  environment: docker
server:
  host: "0.0.0.0"
  port: 8080
  # H-005 監査対応: 非標準ポート (50062) から標準 gRPC ポート (50051) に統一し NetworkPolicy の許可ルールと整合させる
  grpc_port: 50051

auth:
  jwt:
    issuer: "http://keycloak:8080/realms/k1s0"
    audience: "k1s0-api"
  jwks:
    url: "http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs"
    cache_ttl_secs: 300

ai_gateway:
  internal_endpoint: "http://ai-gateway-rust:8080"
