# Docker環境用設定ファイル
# ホスト名をDockerコンテナ名に変更し、ポートをコンテナ内部ポートに設定する
app:
  name: "rule-engine"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 50051

database:
  host: "postgres"
  port: 5432
  name: "rule_engine_db"
  user: "dev"
  # パスワードは環境変数から取得し、未設定時は開発用デフォルト値 "dev" を使用する
  password: "${DB_PASSWORD:-dev}"
  ssl_mode: "disable"

cache:
  max_entries: 100000
  ttl_seconds: 60

# H-011 監査対応: kafka セクションを追加してイベント発行を有効化する
# 未設定の場合は no-op publisher が使用されルールエンジンのイベント発行が無効になる
kafka:
  brokers: "${KAFKA_BROKERS:-kafka:9092}"
  topic: "k1s0.system.rule_engine.event.v1"
