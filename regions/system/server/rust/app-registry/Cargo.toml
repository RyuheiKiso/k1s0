[package]
name = "k1s0-app-registry"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_app_registry"
path = "src/lib.rs"

[[bin]]
name = "k1s0-app-registry"
path = "src/main.rs"
test = false

[dependencies]
# Web framework
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}

# Serialization
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}

# DB
sqlx = {workspace = true}

# S3 (Ceph RGW)
aws-sdk-s3 = "1"
aws-config = "1"
aws-credential-types = "1"
aws-smithy-types = "1"

# Utilities
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
sha2 = "0.10"

# Logging / Tracing
tracing = {workspace = true}
tracing-subscriber = {workspace = true}

# Auth library (JWKS verifier)
k1s0-auth = { path = "../../../library/rust/auth" }

# Telemetry library
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }

# Server common (error codes)
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["axum", "utoipa", "shutdown"] }

# OpenAPI
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}

[features]
db-tests = []

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "16"
tower = {workspace = true}
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["postgres"] }
wiremock = "0.6"
