[package]
name = "k1s0-app-registry"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_app_registry"
path = "src/lib.rs"

[[bin]]
name = "k1s0-app-registry"
path = "src/main.rs"
test = false

[dependencies]
# Web framework
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}

# Serialization
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}

# DB
sqlx = {workspace = true}

# Utilities
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
sha2 = {workspace = true}

# パスワードなどの機密情報を Debug トレイト経由の漏洩から保護する（H-1 監査対応）
secrecy = {workspace = true}

# Logging / Tracing
tracing = {workspace = true}
tracing-subscriber = {workspace = true}

# Auth library (JWKS verifier)
k1s0-auth = { path = "../../../library/rust/auth" }

# Telemetry library
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }

# Server common (error codes)
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["axum", "utoipa", "shutdown"] }

# OpenAPI
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}

[features]
db-tests = []

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "17"
tower = {workspace = true}
# L-12 監査対応: workspace と同一バージョンに統一（testcontainers-modules 0.12 は testcontainers ^0.24 を要求）
testcontainers = { workspace = true }
testcontainers-modules = { workspace = true }
wiremock = "0.6"

[lints]
workspace = true
