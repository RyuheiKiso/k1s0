app:
  name: k1s0-event-store-server
  version: "0.1.0"
  environment: dev
server:
  host: "0.0.0.0"
  port: 8080
  # LOW-004 監査対応: gRPC サーバーポートを明示する（コンテナ内ポート; ホスト側は docker-compose.yaml で上書き可能）
  grpc_port: 50051

# Kafka設定: イベント永続化後にパブリッシュする
kafka:
  brokers:
    - "kafka:9092"
  topic_published: "k1s0.system.eventstore.stored.v1"
  security_protocol: "PLAINTEXT"
