[package]
name = "k1s0-saga-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_saga_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-saga-server"
path = "src/main.rs"
test = false

[features]
# 外部サービス（PostgreSQL, Kafka）を必要とする統合テストを有効化するフィーチャー
integration-tests = []

[dependencies]
# gRPC / Protobuf
tonic = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}

# Web framework
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}

# Serialization
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}

# DB
sqlx = {workspace = true}

# gRPC codec
bytes = "1"
http = "1"

# Utilities
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
validator = { version = "0.18", features = ["derive"] }
async-trait = {workspace = true}

# Logging / Tracing
tracing = {workspace = true}
tracing-subscriber = {workspace = true}

# Kafka
rdkafka = { version = "0.36", features = ["cmake-build"] }

# Auth library
k1s0-auth = { path = "../../../library/rust/auth" }
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["auth", "axum", "shutdown", "startup-auth"] }

# Telemetry library
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }

# OpenAPI
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}

[build-dependencies]
tonic-build = {workspace = true}

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "17"
tower = {workspace = true}
tempfile = "3"

[lints]
workspace = true
