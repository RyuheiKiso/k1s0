app:
  name: "saga-server"
  version: "0.1.0"
  environment: "production"

server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 50051

database:
  host: "postgres.k1s0-system.svc.cluster.local"
  port: 5432
  name: "k1s0_system"
  user: "app"
  password: ""
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"

kafka:
  brokers:
    - "kafka-0.messaging.svc.cluster.local:9092"
  consumer_group: "saga-server.default"
  # セキュリティ: 本番環境では SASL_SSL で暗号化通信を強制する
  security_protocol: "SASL_SSL"
  topics:
    publish:
      - "k1s0.system.saga.state_changed.v1"
    subscribe: []

services:
  board-server:
    host: "board.k1s0-service.svc.cluster.local"
    port: 50051
  activity-server:
    host: "activity.k1s0-service.svc.cluster.local"
    port: 50051
  shipping-service:
    host: "shipping.k1s0-business.svc.cluster.local"
    port: 50051

saga:
  max_concurrent: 100
  workflow_dir: "workflows"

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"

# === Production configuration (uncomment as needed) ===
database:
  host: "localhost"
  port: 5432
  name: "k1s0_system"
  schema: "saga"
  user: "app"
  password: ""
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"
