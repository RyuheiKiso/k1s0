app:
  name: "saga-server"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 50051

database:
  host: "postgres"
  port: 5432
  # init-db/04-saga-schema.sql は k1s0_system データベースに saga スキーマを作成する（M-1 監査対応）
  # docker-compose.dev.yaml の DATABASE_URL オーバーライドも k1s0_system を指定している
  name: "k1s0_system"
  user: "dev"
  password: "${DB_PASSWORD:-dev}"
  ssl_mode: "disable"
  max_open_conns: 10

kafka:
  brokers:
    - "kafka:9092"
  consumer_group: "saga-server.dev"
  security_protocol: "PLAINTEXT"
  topics:
    publish:
      - "k1s0.system.saga.state_changed.v1"
    subscribe: []

services:
  board-server:
    host: "localhost"
    port: 50051
  activity-server:
    host: "localhost"
    port: 50052
  task-server:
    host: "localhost"
    port: 50053

saga:
  max_concurrent: 10
  workflow_dir: "workflows"
