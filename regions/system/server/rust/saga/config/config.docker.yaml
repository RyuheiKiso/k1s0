app:
  name: "saga-server"
  version: "0.1.0"
  environment: "dev"

# CRIT-1 監査対応: JWT認証設定。未設定の場合は JWT 検証が機能せず認証バイパスが可能になる。
# 他の全サービスと同様に Keycloak を発行者として設定する。
auth:
  jwt:
    issuer: "http://keycloak:8080/realms/k1s0"
    audience: "k1s0-api"
  jwks:
    url: "http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs"
    cache_ttl_secs: 300

server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 50051

database:
  host: "postgres"
  port: 5432
  # CRIT-09 監査対応: saga 専用 DB（k1s0_saga）に変更。
  # master-maintenance サービスとの k1s0_system 共有による _sqlx_migrations 競合を解消する。
  name: "k1s0_saga"
  user: "dev"
  password: "${DB_PASSWORD:-dev}"
  ssl_mode: "disable"
  max_open_conns: 10

kafka:
  brokers:
    - "kafka:9092"
  consumer_group: "saga-server.dev"
  security_protocol: "PLAINTEXT"
  topics:
    publish:
      - "k1s0.system.saga.state_changed.v1"
    subscribe: []

services:
  board-server:
    host: "localhost"
    port: 50051
  activity-server:
    host: "localhost"
    port: 50052
  task-server:
    host: "localhost"
    port: 50053

saga:
  max_concurrent: 10
  workflow_dir: "workflows"
