[package]
name = "k1s0-tenant-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_tenant_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-tenant-server"
path = "src/main.rs"
test = false

[dependencies]
tonic = {workspace = true}
tokio-stream = "0.1"
prost = {workspace = true}
prost-types = {workspace = true}
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}
sqlx = {workspace = true}
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
tracing = {workspace = true}
tracing-subscriber = {workspace = true}
mockall = {workspace = true, optional = true}
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }
k1s0-auth = { path = "../../../library/rust/auth" }
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["auth", "axum", "utoipa", "shutdown", "grpc-auth"] }
rdkafka = { version = "0.37", features = ["cmake-build"] }
moka = { version = "0.12", features = ["future"] }
reqwest = {workspace = true}
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}

[build-dependencies]
tonic-build = {workspace = true}

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "17"
tower = {workspace = true}
tokio = {workspace = true}
axum = {workspace = true}
reqwest = {workspace = true}
async-trait = {workspace = true}

[lints]
workspace = true

[features]
test-utils = ["dep:mockall"]

[[test]]
name = "integration_test"
required-features = ["test-utils"]
