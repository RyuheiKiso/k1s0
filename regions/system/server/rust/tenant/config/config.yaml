app:
  name: "tenant-server"
  version: "0.1.0"

server:
  http_port: 8089
  grpc_port: 50051

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"

# テナント検索結果のインメモリキャッシュ設定
cache:
  ttl_secs: 60        # キャッシュエントリの有効期限（秒）
  max_entries: 100     # キャッシュの最大エントリ数

# --- Production configuration (uncomment as needed) ---
database:
  host: "postgres.k1s0-system.svc.cluster.local"
  port: 5432
  name: "tenant_db"
  user: "app"
  password: ""
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"
