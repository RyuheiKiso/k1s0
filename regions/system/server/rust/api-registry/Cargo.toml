[package]
name = "k1s0-api-registry-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_api_registry_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-api-registry-server"
path = "src/main.rs"
test = false

[dependencies]
# Web framework
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}

# Serialization
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}

# DB
sqlx = {workspace = true, features = ["migrate"]}

# Utilities
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
sha2 = "0.10"
hex = "0.4"
regex = "1"
tempfile = "3"

# Logging / Tracing
tracing = {workspace = true}
tracing-subscriber = {workspace = true}

# Telemetry library
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }

# Auth library
k1s0-auth = { path = "../../../library/rust/auth" }

# Server common (error codes)
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["auth", "axum", "shutdown", "grpc-auth"] }

# OpenAPI
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}

# gRPC
tonic = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}

# Cache
moka = { version = "0.12", features = ["future"] }

# Kafka
rdkafka = { version = "0.37", features = ["cmake-build"] }

[build-dependencies]
tonic-build = {workspace = true}

[features]
db-tests = []

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
tower = {workspace = true}

[lints]
workspace = true
