# Docker環境用設定ファイル
# ホスト名をDockerコンテナ名に変更し、ポートをコンテナ内部ポートに設定する
app:
  name: k1s0-session-server
  version: "0.1.0"
  environment: dev

server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 50051

session:
  default_ttl_seconds: 3600
  max_ttl_seconds: 86400

# セッションDB接続: url フィールド形式を使用する
database:
  url: "postgres://dev:dev@postgres:5432/session_db?sslmode=disable"
  max_connections: 10

# H-019 監査対応: セッションデータは redis-session（セッション専用インスタンス）に保存する
# bff-proxy も redis-session を使用しており同一インスタンスで統一する（ポート 6379 内部）
redis:
  url: "redis://:dev@redis-session:6379"
  pool_size: 10
  connect_timeout_seconds: 3
