server:
  host: "0.0.0.0"
  port: 8102
  grpc_port: 50051
session:
  default_ttl_seconds: 3600
  max_ttl_seconds: 86400

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"

# --- Production configuration (uncomment as needed) ---
database:
  host: "postgres.k1s0-system.svc.cluster.local"
  port: 5432
  name: "session_db"
  user: "app"
  password: ""
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"
