[package]
name = "k1s0-session-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_session_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-session-server"
path = "src/main.rs"
test = false

[dependencies]
# gRPC / Protobuf
tonic = {workspace = true}
# gRPC Health Check Protocol サービスの実装に使用する
tonic-health = {workspace = true}
prost = {workspace = true}

# Web framework
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}

# Serialization
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}

# DB
sqlx = {workspace = true, features = ["migrate"]}

# Redis
redis = {workspace = true}

# Kafka
rdkafka = { version = "0.39", features = ["cmake-build"] }

# Utilities
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
# MED-12 監査対応: 256bit (32byte) のセキュアなランダムトークン生成に使用する
rand = "0.8"
# MED-12 監査対応: ランダムバイト列を URL-safe Base64 文字列にエンコードするために使用する
base64 = "0.22"

# Logging / Tracing
tracing = {workspace = true}
tracing-subscriber = {workspace = true}

# Telemetry library
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }

# Auth library
k1s0-auth = { path = "../../../library/rust/auth" }

# Server common (structured error codes)
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["auth", "axum", "shutdown", "grpc-auth"] }

[features]
db-tests = []

[build-dependencies]
tonic-build = {workspace = true}

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "17"
tower = {workspace = true}

[lints]
workspace = true
