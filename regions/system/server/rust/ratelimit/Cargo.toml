[package]
name = "k1s0-ratelimit-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_ratelimit_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-ratelimit-server"
path = "src/main.rs"
test = false

[dependencies]
# gRPC / Protobuf
tonic = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}

# Web framework
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}

# Serialization
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}

# DB
sqlx = {workspace = true}

# Cache
moka = { version = "0.12", features = ["future"] }

# Redis
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }

# Utilities
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}

# Logging / Tracing
tracing = {workspace = true}
tracing-subscriber = {workspace = true}

# Telemetry library
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }
k1s0-auth = { path = "../../../library/rust/auth" }
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["shutdown"] }

# OpenAPI
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}

[build-dependencies]
tonic-build = {workspace = true}

[features]
db-tests = []

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = "16"
tower = {workspace = true}
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["postgres"] }
