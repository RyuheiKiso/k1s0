app:
  name: "ratelimit-server"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080

database:
  host: localhost
  port: 5432
  name: ratelimit_db
  user: dev
  password: dev
  ssl_mode: disable

redis:
  url: "redis://localhost:6379"

observability:
  otlp_endpoint: "http://otel-collector.observability:4317"
  log_level: "info"
  log_format: "json"
  metrics_enabled: true
