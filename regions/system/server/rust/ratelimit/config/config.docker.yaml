app:
  name: "ratelimit-server"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080

database:
  host: postgres
  port: 5432
  name: ratelimit_db
  user: dev
  password: "dev"
  ssl_mode: disable

# Redis 接続設定: requirepass が有効なため認証情報を含む URL を使用する
redis:
  url: "redis://:dev@redis:6379"
