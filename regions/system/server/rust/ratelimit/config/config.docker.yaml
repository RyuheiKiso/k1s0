app:
  name: "ratelimit-server"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080
  # LOW-004 監査対応: gRPC サーバーポートを明示する（コンテナ内ポート; ホスト側は docker-compose.yaml で上書き可能）
  grpc_port: 50051

database:
  host: postgres
  port: 5432
  name: ratelimit_db
  user: dev
  # パスワードは環境変数から取得し、未設定時は開発用デフォルト値 "dev" を使用する
  password: "${DB_PASSWORD:-dev}"
  ssl_mode: disable

# Redis 接続設定: requirepass が有効なため認証情報を含む URL を使用する
# Redis パスワードは環境変数から取得し、未設定時は開発用デフォルト値 "dev" を使用する
redis:
  url: "redis://:${REDIS_PASSWORD:-dev}@redis:6379"
