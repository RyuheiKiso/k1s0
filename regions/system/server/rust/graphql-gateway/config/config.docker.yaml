app:
  name: "graphql-gateway"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080

graphql:
  introspection: true
  playground: true
  max_depth: 10
  max_complexity: 1000

auth:
  jwks_url: "http://auth-rust:8080/jwks"

backends:
  tenant:
    address: "http://tenant-rust:50051"
    timeout_ms: 3000
  featureflag:
    address: "http://featureflag-rust:50051"
    timeout_ms: 3000
  config:
    address: "http://config-rust:50051"
    timeout_ms: 3000
  # ナビゲーションサービスのgRPC接続先
  navigation:
    address: "http://navigation-rust:50051"
    timeout_ms: 3000
  # サービスカタログのgRPC接続先
  service-catalog:
    address: "http://service-catalog-rust:50051"
    timeout_ms: 3000
  # 認証サービスのgRPC接続先
  auth:
    address: "http://auth-rust:50051"
    timeout_ms: 3000
  # セッション管理サービスのgRPC接続先
  session:
    address: "http://session-rust:50051"
    timeout_ms: 3000
  # シークレット管理サービスのgRPC接続先
  vault:
    address: "http://vault-rust:50051"
    timeout_ms: 3000
  # スケジューラサービスのgRPC接続先
  scheduler:
    address: "http://scheduler-rust:50051"
    timeout_ms: 3000
  # 通知サービスのgRPC接続先
  notification:
    address: "http://notification-rust:50051"
    timeout_ms: 3000
  # ワークフローサービスのgRPC接続先
  workflow:
    address: "http://workflow-rust:50051"
    timeout_ms: 3000

# レート制限: ratelimit gRPC サービスと連携してリクエストレートを制御する
ratelimit:
  enabled: true
  server_url: "http://ratelimit-rust:50051"
  scope: "graphql-gateway"
  requests_per_window: 100
  window_secs: 60

observability:
  log:
    level: "debug"
    format: "text"
  trace:
    enabled: true
    endpoint: "jaeger:4317"
    sample_rate: 1.0
  metrics:
    enabled: false
    path: "/metrics"
