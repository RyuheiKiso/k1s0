app:
  name: "graphql-gateway"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080

graphql:
  # MED-03 監査対応: introspection と playground は開発環境専用で有効化する。
  # ステージング・本番環境では config.yaml（introspection: false, playground: false）を使用すること。
  introspection: true
  playground: true
  max_depth: 10
  max_complexity: 1000

auth:
  jwt:
    # JWT issuer 検証（M-01 監査対応: auth-rust の issuer と統一する）
    # Keycloak が発行する JWT の iss クレームは realm URL 形式のため、auth-rust と同じ値に合わせる
    issuer: "http://keycloak:8080/realms/k1s0"
    # JWT audience 検証（auth-rust が発行するトークンの aud クレームと一致させる）
    audience: "k1s0-api"
  jwks:
    url: "http://auth-rust:8080/jwks"
    cache_ttl_secs: 300

backends:
  # 認証クリティカルパス: タイムアウトを短めに設定してレイテンシ悪化を素早く検出する
  auth:
    address: "http://auth-rust:50051"
    timeout_ms: 2000
  # セッション確認はほぼ全リクエストで実行されるため短いタイムアウトを設定する
  session:
    address: "http://session-rust:50051"
    timeout_ms: 2000
  # テナント情報はキャッシュ効果が高いため標準タイムアウト
  tenant:
    address: "http://tenant-rust:50051"
    timeout_ms: 3000
  # フィーチャーフラグはキャッシュ効果が高いため標準タイムアウト
  featureflag:
    address: "http://featureflag-rust:50051"
    timeout_ms: 3000
  # 設定値はキャッシュ効果が高いため標準タイムアウト
  config:
    address: "http://config-rust:50051"
    timeout_ms: 3000
  # ナビゲーション: 静的データが多いため標準タイムアウト
  navigation:
    address: "http://navigation-rust:50051"
    timeout_ms: 3000
  # サービスカタログ: 静的データが多いため標準タイムアウト
  service-catalog:
    address: "http://service-catalog-rust:50051"
    timeout_ms: 3000
  # Vault: シークレット取得は暗号処理を伴うため長めのタイムアウト
  vault:
    address: "http://vault-rust:50051"
    timeout_ms: 5000
  # ワークフロー: DB 処理が重い場合があるため長めのタイムアウト
  workflow:
    address: "http://workflow-rust:50051"
    timeout_ms: 5000
  # スケジューラ: 非クリティカル、タイムアウトを短くして他クエリへの波及を防ぐ
  scheduler:
    address: "http://scheduler-rust:50051"
    timeout_ms: 2000
  # 通知: 非クリティカル、タイムアウトを短くして他クエリへの波及を防ぐ
  notification:
    address: "http://notification-rust:50051"
    timeout_ms: 2000

# レート制限: ratelimit gRPC サービスと連携してリクエストレートを制御する
ratelimit:
  enabled: true
  # ratelimit-rust の REST ポート（8080）を使用する。ポート 50051 は gRPC 専用であり HTTP では接続不可（MED-3 監査対応）。
  server_url: "http://ratelimit-rust:8080"
  scope: "graphql-gateway"
  requests_per_window: 100
  window_secs: 60

observability:
  log:
    level: "debug"
    format: "text"
  trace:
    enabled: true
    endpoint: "jaeger:4317"
    sample_rate: 1.0
  metrics:
    enabled: false
    path: "/metrics"
