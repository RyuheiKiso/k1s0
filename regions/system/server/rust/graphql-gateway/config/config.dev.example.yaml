app:
  name: "graphql-gateway"
  version: "0.1.0"
  environment: "development"

server:
  host: "0.0.0.0"
  port: 8095

graphql:
  introspection: true
  playground: true
  max_depth: 10
  max_complexity: 1000

auth:
  # HIGH-010: ADR-0053 AuthConfig ネスト形式（dev.yaml の example 版も同期更新）
  jwt:
    # JWT issuer 検証（ローカル auth サーバーの iss クレームと一致させる）
    issuer: "k1s0"
    # JWT audience 検証（ローカル auth サーバーの aud クレームと一致させる）
    audience: "k1s0-system"
  jwks:
    url: "http://localhost:8080/jwks"
    cache_ttl_secs: 300

backends:
  tenant:
    address: "http://localhost:9091"
    timeout_ms: 3000
  featureflag:
    address: "http://localhost:9092"
    timeout_ms: 3000
  config:
    address: "http://localhost:9093"
    timeout_ms: 3000

# レート制限: 開発環境では無効化
ratelimit:
  enabled: false
  server_url: "http://localhost:9094"
  scope: "graphql-gateway"
  requests_per_window: 100
  window_secs: 60

observability:
  log:
    level: "debug"
    format: "text"
  trace:
    enabled: false
    endpoint: "localhost:4317"
    sample_rate: 1.0
  metrics:
    enabled: false
    path: "/metrics"
