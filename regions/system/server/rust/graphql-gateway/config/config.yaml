app:
  name: "graphql-gateway"
  version: "0.1.0"
  environment: "production"

server:
  host: "0.0.0.0"
  port: 8080

graphql:
  introspection: false
  playground: false
  max_depth: 10
  max_complexity: 1000
  query_timeout_seconds: 30

auth:
  jwks_url: "http://auth-server.k1s0-system.svc.cluster.local/jwks"
  # JWT issuer 検証（省略時は検証をスキップ）
  issuer: "k1s0"
  # JWT audience 検証（省略時は検証をスキップ）
  audience: "k1s0-system"

backends:
  # 認証クリティカルパス: タイムアウトを短めに設定してレイテンシ悪化を素早く検出する
  auth:
    address: "http://auth-server.k1s0-system.svc.cluster.local:50051"
    timeout_ms: 2000
  # セッション確認はほぼ全リクエストで実行されるため短いタイムアウトを設定する
  session:
    address: "http://session-server.k1s0-system.svc.cluster.local:50051"
    timeout_ms: 2000
  # テナント情報はキャッシュ効果が高いため標準タイムアウト
  tenant:
    address: "http://tenant-server.k1s0-system.svc.cluster.local:50051"
    timeout_ms: 3000
  # フィーチャーフラグはキャッシュ効果が高いため標準タイムアウト
  featureflag:
    address: "http://featureflag-server.k1s0-system.svc.cluster.local:50051"
    timeout_ms: 3000
  # 設定値はキャッシュ効果が高いため標準タイムアウト
  config:
    address: "http://config-server.k1s0-system.svc.cluster.local:50051"
    timeout_ms: 3000
  # ナビゲーション: 静的データが多いため標準タイムアウト
  navigation:
    address: "http://navigation-server.k1s0-system.svc.cluster.local:50051"
    timeout_ms: 3000
  # サービスカタログ: 静的データが多いため標準タイムアウト
  service-catalog:
    address: "http://service-catalog-server.k1s0-system.svc.cluster.local:50051"
    timeout_ms: 3000
  # Vault: シークレット取得は暗号処理を伴うため長めのタイムアウト
  vault:
    address: "http://vault-server.k1s0-system.svc.cluster.local:50051"
    timeout_ms: 5000
  # ワークフロー: DB 処理が重い場合があるため長めのタイムアウト
  workflow:
    address: "http://workflow-server.k1s0-system.svc.cluster.local:50051"
    timeout_ms: 5000
  # スケジューラ: 非クリティカル、タイムアウトを短くして他クエリへの波及を防ぐ
  scheduler:
    address: "http://scheduler-server.k1s0-system.svc.cluster.local:50051"
    timeout_ms: 2000
  # 通知: 非クリティカル、タイムアウトを短くして他クエリへの波及を防ぐ
  notification:
    address: "http://notification-server.k1s0-system.svc.cluster.local:50051"
    timeout_ms: 2000

# レート制限: ratelimit gRPC サービスと連携してリクエストレートを制御する
ratelimit:
  enabled: true
  server_url: "http://ratelimit-server.k1s0-system.svc.cluster.local:50051"
  scope: "graphql-gateway"
  requests_per_window: 100
  window_secs: 60

# サーキットブレーカー: バックエンド gRPC サービスの障害伝播を防止する
circuit_breaker:
  failure_threshold: 5
  success_threshold: 3
  timeout_secs: 30

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"

