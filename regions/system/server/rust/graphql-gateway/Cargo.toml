[package]
name = "k1s0-graphql-gateway-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_graphql_gateway_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-graphql-gateway-server"
path = "src/main.rs"
test = false

[dependencies]
# Web フレームワーク
axum = {workspace = true, features = ["ws"]}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}

# gRPC
tonic = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}

# GraphQL
async-graphql = { version = "7", features = ["dataloader"] }
async-graphql-axum = "7"

# JWT 検証
jsonwebtoken = "9"
reqwest = {workspace = true, features = ["rustls-tls"]}

# シリアライゼーション
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}

# ユーティリティ
uuid = {workspace = true}
chrono = {workspace = true}
base64 = "0.22"
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
tracing = {workspace = true}
tracing-subscriber = {workspace = true}

# 内部ライブラリ
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
# auth フィーチャーで RBAC ロジック（Tier, check_permission）を利用可能にする（P2-24）
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["shutdown", "auth"] }
# Correlation ID伝播ライブラリ
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }
# サーキットブレーカー: 外部サービス呼び出しの障害伝播を防止する
k1s0-circuit-breaker = { path = "../../../library/rust/circuit-breaker" }
# レート制限クライアント: ratelimit gRPCサービスと連携してリクエストレートを制御する
k1s0-ratelimit-client = { path = "../../../library/rust/ratelimit-client", features = ["grpc"] }

[build-dependencies]
tonic-build = {workspace = true}

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
axum-test = { version = "17", default-features = false }

[lints]
workspace = true
