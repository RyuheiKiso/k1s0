[package]
name = "k1s0-navigation-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_navigation_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-navigation-server"
path = "src/main.rs"
test = false

[dependencies]
tonic = {workspace = true}
# gRPC Health Check Protocol サービスの実装に使用する
tonic-health = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}
tracing = {workspace = true}
tracing-subscriber = {workspace = true}
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }
k1s0-auth = { path = "../../../library/rust/auth" }
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["shutdown"] }

[build-dependencies]
tonic-build = {workspace = true}

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
tower = {workspace = true}

[lints]
workspace = true
