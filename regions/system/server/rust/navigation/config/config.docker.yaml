# Docker環境用設定ファイル
# ホスト名をDockerコンテナ名に変更し、ポートをコンテナ内部ポートに設定する
app:
  name: k1s0-navigation-server
  version: "0.1.0"
  environment: dev

server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 50051

database:
  host: "postgres"
  port: 5432
  name: "navigation_db"
  user: "dev"
  # パスワードは環境変数から取得し、未設定時は開発用デフォルト値 "dev" を使用する
  password: "${DB_PASSWORD:-dev}"
  ssl_mode: "disable"
