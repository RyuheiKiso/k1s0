# Docker環境用設定ファイル
# ホスト名をDockerコンテナ名に変更し、ポートをコンテナ内部ポートに設定する
app:
  name: k1s0-navigation-server
  version: "0.1.0"
  environment: dev

server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 50051

# database セクションは削除済み
# navigation サーバーは DB を使用しない（YAML ファイルから直接ルート設定を読み込む）
# 誤って DB 接続コードが追加された場合の serde_yaml 変数非展開バグを防ぐため削除する（M-2 監査対応）

# C-03 監査対応: Docker 環境での navigation ファイルパスを明示的に指定する。
# デフォルト値 "config/navigation.yaml" はカレントディレクトリ相対パスのため、
# Docker コンテナ内のワーキングディレクトリが "/" になると "/config/navigation.yaml" を
# 探して "No such file or directory" エラーが発生する。
# docker-compose.yaml でマウントされた実際のパス "/app/config/navigation.yaml" を指定する。
navigation:
  navigation_path: "/app/config/navigation.yaml"
