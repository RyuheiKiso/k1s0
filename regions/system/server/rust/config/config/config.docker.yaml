app:
  name: "k1s0-config-server"
  version: "0.1.0"
  environment: "dev"

server:
  host: "0.0.0.0"
  port: 8080
  # LOW-004 監査対応: gRPC サーバーポートを明示する（コンテナ内ポート; ホスト側は docker-compose.yaml で上書き可能）
  grpc_port: 50051

database:
  host: "postgres"
  port: 5432
  name: "config_db"
  user: "dev"
  # LOW-021 監査対応（開発専用パスワード）:
  # このパスワードは Docker ローカル開発環境専用の固定値である。
  # 本番環境では Vault の dynamic secrets または Kubernetes Secret 経由で注入すること。
  # DB_PASSWORD 環境変数が設定されている場合はそちらが優先される。
  password: "${DB_PASSWORD:-dev}"
  ssl_mode: "disable"
  max_open_conns: 10
  max_idle_conns: 2
  conn_max_lifetime: "5m"

kafka:
  brokers:
    - "kafka:9092"
  consumer_group: "config-server.dev"
  security_protocol: "PLAINTEXT"
  topics:
    publish:
      - "k1s0.system.config.changed.v1"
    subscribe: []

# STATIC-HIGH-002: 開発環境では暗号化を無効化（enabled: false がデフォルト）
config_server:
  encryption:
    enabled: false
