[package]
name = "k1s0-config-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "k1s0_config_server"
path = "src/lib.rs"

[[bin]]
name = "k1s0-config-server"
path = "src/main.rs"
test = false

[dependencies]
# gRPC / Protobuf
tonic = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}

# Web framework
axum = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
tower-http = {workspace = true}

# Serialization
serde = {workspace = true}
serde_json = {workspace = true}
serde_yaml = {workspace = true}

# DB
sqlx = {workspace = true, features = ["migrate"]}

# Utilities
uuid = {workspace = true}
chrono = {workspace = true}
anyhow = {workspace = true}
thiserror = {workspace = true}
async-trait = {workspace = true}

# Logging / Tracing
tracing = {workspace = true}
tracing-subscriber = {workspace = true}

# Cache
moka = {workspace = true}

# Streaming
tokio-stream = "0.1"

# Kafka
rdkafka = { version = "0.39", features = ["cmake-build"] }

# パスワードなどの機密情報を Debug トレイト経由の漏洩から保護する（H-1 監査対応）
secrecy = {workspace = true}

# STATIC-HIGH-002: 設定値の AES-256-GCM 暗号化ライブラリ
k1s0-encryption = { path = "../../../library/rust/encryption" }
# 暗号化鍵の base64 エンコード/デコード
base64 = "0.22"

# Auth library (JWKS verifier + middleware)
k1s0-auth = { path = "../../../library/rust/auth" }

# HTTP client (for JWKS)
reqwest = {workspace = true, features = ["rustls-tls"]}

# Telemetry library
k1s0-telemetry = { path = "../../../library/rust/telemetry", features = ["full"] }
k1s0-correlation = { path = "../../../library/rust/correlation", features = ["tower-layer"] }

# Server common (error codes + 共通 ErrorResponse)
k1s0-server-common = { path = "../../../library/rust/server-common", features = ["auth", "axum", "shutdown", "utoipa", "grpc-auth"] }

# OpenAPI
utoipa = {workspace = true}
utoipa-swagger-ui = {workspace = true}

[build-dependencies]
tonic-build = {workspace = true}

[features]
db-tests = []

[dev-dependencies]
mockall = {workspace = true}
tokio-test = {workspace = true}
tower = {workspace = true}

[lints]
workspace = true
