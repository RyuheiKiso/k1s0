[package]
name = "k1s0-websocket"
version = "0.1.0"
edition = "2021"

[features]
default = []
mock = ["dep:mockall"]
# native フィーチャーで tokio-tungstenite を使用した本番用 WebSocket クライアントを有効化する
native = ["dep:tokio-tungstenite", "dep:futures-util", "tokio/time", "tokio/rt", "tokio/macros"]

[dependencies]
async-trait = {workspace = true}
serde = {workspace = true}
thiserror = {workspace = true}
tokio = {workspace = true}
mockall = {workspace = true, optional = true}
tokio-tungstenite = { version = "0.26", optional = true, features = ["native-tls"] }
futures-util = { version = "0.3", optional = true }

[dev-dependencies]
tokio = {workspace = true}
