[package]
name = "k1s0-bb-secretstore"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"

[features]
default = []
mock = ["mockall"]
vault = ["k1s0-vault-client"]

[dependencies]
async-trait = "0.1"
k1s0-building-blocks = { path = "../building-blocks" }
k1s0-vault-client = { path = "../vault-client", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["sync"] }
tracing = "0.1"
mockall = { version = "0.13", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
