[package]
name = "k1s0-health"
version = "0.1.0"
edition = "2021"

[features]
default = []
postgres = ["sqlx"]
redis = ["deadpool-redis"]
http = ["reqwest"]
kafka = ["rdkafka"]
mock = ["mockall"]
full = ["postgres", "redis", "http", "kafka"]

[dependencies]
async-trait = {workspace = true}
# ARCH-004 監査対応: readyz/run_all のタイムスタンプを ISO 8601 形式で返すために追加
chrono = {workspace = true}
thiserror = {workspace = true}
tokio = {workspace = true}
serde = {workspace = true}
mockall = {workspace = true, optional = true}
sqlx = {workspace = true, optional = true}
deadpool-redis = { version = "0.18", optional = true }
reqwest = {workspace = true, optional = true}
rdkafka = { version = "0.39", features = ["cmake-build"], optional = true }

[dev-dependencies]
tokio = {workspace = true}
async-trait = {workspace = true}

[lints]
workspace = true
