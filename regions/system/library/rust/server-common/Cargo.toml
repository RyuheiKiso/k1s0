[package]
name = "k1s0-server-common"
version = "0.1.0"
edition = "2021"
description = "Shared server infrastructure: structured error codes, error response types"

[features]
default = []
# ローカル開発用: 認証バイパス（ALLOW_INSECURE_NO_AUTH）のコードパスを有効化する。
# リリースビルドでこのフィーチャーを無効にすると、バイパスロジックがバイナリから完全に除去される。
dev-auth-bypass = []
axum = ["dep:axum"]
utoipa = ["dep:utoipa"]
shutdown = ["dep:tokio"]
middleware = ["axum", "shutdown", "dep:tower", "dep:http", "dep:pin-project-lite", "dep:k1s0-telemetry", "dep:k1s0-correlation", "dep:k1s0-health"]
database = ["middleware", "dep:sqlx", "dep:k1s0-migration"]
auth = ["middleware", "dep:k1s0-auth"]
grpc-auth = ["auth", "dep:tonic"]
kafka-setup = ["middleware", "dep:k1s0-kafka"]
config-loader = ["dep:serde_yaml"]

[dependencies]
anyhow = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
thiserror = {workspace = true}
tracing = {workspace = true}
uuid = {workspace = true}
axum = {workspace = true, optional = true}
utoipa = {workspace = true, optional = true}
tower = {workspace = true, optional = true}
http = { version = "1", optional = true }
pin-project-lite = { version = "0.2", optional = true }
k1s0-telemetry = { path = "../telemetry", features = ["axum-layer"], optional = true }
k1s0-correlation = { path = "../correlation", features = ["tower-layer"], optional = true }
k1s0-health = { path = "../health", optional = true }
sqlx = {workspace = true, optional = true}
k1s0-migration = { path = "../migration", features = ["postgres"], optional = true }
k1s0-auth = { path = "../auth", optional = true }
k1s0-kafka = { path = "../kafka", optional = true }
serde_yaml = {workspace = true, optional = true}
tonic = {workspace = true, optional = true}
tokio = {workspace = true, optional = true}

[dev-dependencies]
async-trait = {workspace = true}
tokio = {workspace = true}
tower = {workspace = true}
http = "1"
pin-project-lite = "0.2"
k1s0-telemetry = { path = "../telemetry", features = ["axum-layer"] }
k1s0-correlation = { path = "../correlation", features = ["tower-layer"] }
k1s0-health = { path = "../health" }
axum = {workspace = true}

[lints]
workspace = true
