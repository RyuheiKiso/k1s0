[package]
name = "k1s0-building-blocks"
version = "0.1.0"
# TODO: edition統一 - プロジェクト全体の方針決定後に統一（大多数は edition = "2021"）
edition = "2024"
rust-version = "1.93"

[features]
default = []
mock = ["mockall"]

[dependencies]
k1s0-bb-core = { path = "../bb-core" }
k1s0-bb-binding = { path = "../bb-binding" }
k1s0-bb-pubsub = { path = "../bb-pubsub" }
k1s0-bb-secretstore = { path = "../bb-secretstore" }
k1s0-bb-statestore = { path = "../bb-statestore" }
mockall = {workspace = true, optional = true}

[dev-dependencies]
tokio = {workspace = true}
serde_json = {workspace = true}

[lints]
workspace = true
