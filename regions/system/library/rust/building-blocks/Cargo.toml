[package]
name = "k1s0-building-blocks"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"

[features]
default = []
mock = ["mockall"]

[dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
thiserror = "2"
tokio = { version = "1", features = ["sync"] }
tracing = "0.1"
mockall = { version = "0.13", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
