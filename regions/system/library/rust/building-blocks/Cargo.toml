[package]
name = "k1s0-building-blocks"
version = "0.1.0"
# このクレートは非推奨です。ADR-0018 に従い k1s0-messaging を使用してください。
description = "DEPRECATED: Use k1s0-messaging instead. See ADR-0018."
# ワークスペース全体の標準 edition に統一する
edition = "2021"
rust-version = "1.93"

[features]
default = []
mock = ["mockall"]

[dependencies]
k1s0-bb-core = { path = "../bb-core" }
k1s0-bb-binding = { path = "../bb-binding" }
k1s0-bb-pubsub = { path = "../bb-pubsub" }
k1s0-bb-secretstore = { path = "../bb-secretstore" }
k1s0-bb-statestore = { path = "../bb-statestore" }
mockall = {workspace = true, optional = true}

[dev-dependencies]
tokio = {workspace = true}
serde_json = {workspace = true}

[lints]
workspace = true
