[package]
name = "k1s0-codegen"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
tera = "1"
thiserror = "2"
regex = { version = "1", optional = true }
toml_edit = { version = "0.22", optional = true }
serde_yaml = { version = "0.9", optional = true }

[features]
proto = ["dep:regex"]
cargo-update = ["dep:toml_edit"]
client-sdk = []
event-codegen = ["dep:serde_yaml"]

[dev-dependencies]
tempfile = "3"
toml = "0.8"
serde_yaml = "0.9"
