[package]
name = "k1s0-distributed-lock"
version = "0.1.0"
edition = "2021"

[features]
mock = ["mockall"]
postgres = ["dep:sqlx"]
redis = ["dep:redis"]

[dependencies]
async-trait = {workspace = true}
thiserror = {workspace = true}
tokio = {workspace = true}
uuid = {workspace = true}
mockall = {workspace = true, optional = true}
sqlx = {workspace = true, features = ["runtime-tokio"], optional = true}
redis = { version = "1.1", features = ["tokio-comp", "connection-manager", "script"], optional = true }

[dev-dependencies]
tokio = {workspace = true}

[lints]
workspace = true
