[package]
name = "k1s0-bb-statestore"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"

[features]
default = []
mock = ["mockall"]
redis = ["k1s0-cache"]

[dependencies]
async-trait = "0.1"
k1s0-building-blocks = { path = "../building-blocks" }
k1s0-cache = { path = "../cache", optional = true }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
tokio = { version = "1", features = ["sync"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }
mockall = { version = "0.13", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
