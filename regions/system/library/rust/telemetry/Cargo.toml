[package]
name = "k1s0-telemetry"
version = "0.1.0"
edition = "2021"

[dependencies]
opentelemetry = "0.27"
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.27", features = ["tonic"] }
tracing = {workspace = true}
tracing-subscriber = {workspace = true}
tracing-opentelemetry = "0.32"
prometheus = "0.13"

# Instrumentation support (optional)
sqlx = {workspace = true, optional = true}
k1s0-telemetry-macros = { path = "../telemetry-macros", optional = true }

# Tower Layer support (optional)
axum = {workspace = true, optional = true}
http = { version = "1", optional = true }
tonic = {workspace = true, optional = true}
tower = {workspace = true, optional = true}
pin-project-lite = { version = "0.2", optional = true }

[features]
default = []
axum-layer = ["axum", "http", "tower", "pin-project-lite"]
grpc-layer = ["tonic", "http", "tower", "pin-project-lite"]
macros = ["dep:k1s0-telemetry-macros"]
sqlx-instrument = ["dep:sqlx"]
kafka-instrument = []
full = ["axum-layer", "grpc-layer"]

[dev-dependencies]
tokio = {workspace = true}
axum = {workspace = true}
http = "1"
tonic = {workspace = true}
tower = {workspace = true}
pin-project-lite = "0.2"

[lints]
workspace = true
