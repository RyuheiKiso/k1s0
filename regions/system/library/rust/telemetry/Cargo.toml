[package]
name = "k1s0-telemetry"
version = "0.1.0"
edition = "2021"

[dependencies]
opentelemetry = "0.27"
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.27", features = ["tonic"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
tracing-opentelemetry = "0.28"
prometheus = "0.13"

# Instrumentation support (optional)
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres"], optional = true }
k1s0-telemetry-macros = { path = "../telemetry-macros", optional = true }

# Tower Layer support (optional)
axum = { version = "0.7", optional = true }
http = { version = "1", optional = true }
tonic = { version = "0.12", optional = true }
tower = { version = "0.5", features = ["util"], optional = true }
pin-project-lite = { version = "0.2", optional = true }

[features]
default = []
axum-layer = ["axum", "http", "tower", "pin-project-lite"]
grpc-layer = ["tonic", "http", "tower", "pin-project-lite"]
macros = ["dep:k1s0-telemetry-macros"]
sqlx-instrument = ["dep:sqlx"]
kafka-instrument = []
full = ["axum-layer", "grpc-layer"]

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.7"
http = "1"
tonic = "0.12"
tower = { version = "0.5", features = ["util"] }
pin-project-lite = "0.2"
