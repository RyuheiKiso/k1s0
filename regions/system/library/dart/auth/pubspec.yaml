name: k1s0_auth
version: 0.1.0
description: k1s0 auth library for OAuth2 Authorization Code + PKCE flow (client-side).

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  http: ^1.2.0
  crypto: ^3.0.0
  # CRITICAL-FE-001 対応: JWT RS256 署名検証のために dart_jsonwebtoken を追加する。
  # JWKS エンドポイントから取得した RSA 公開鍵で id_token の署名を検証するために使用する。
  dart_jsonwebtoken: ^2.14.0
  # H-010 監査対応: flutter_secure_storage は直接依存から外し、TokenStorage 抽象インターフェース経由で使用する。
  # Flutter アプリでは FlutterTokenStorage を SecureTokenStore に注入すること。
  # Pure Dart 環境（CLI・テスト）では MemoryTokenStore を使用すること。
  # flutter_secure_storage は Flutter アプリ側の pubspec.yaml に直接追加すること。

dev_dependencies:
  test: ^1.25.0
  mocktail: ^1.0.0
  lints: ^6.1.0
  # H-010 監査対応: flutter_secure_storage はテスト用として dev_dependencies に残す
  # FlutterTokenStorage の統合テストで使用する（Flutter 環境下でのみ実行）
  flutter_secure_storage: ^9.2.0
