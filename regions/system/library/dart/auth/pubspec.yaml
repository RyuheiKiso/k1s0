name: k1s0_auth
version: 0.1.0
description: k1s0 auth library for OAuth2 Authorization Code + PKCE flow (client-side).

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  http: ^1.2.0
  crypto: ^3.0.0
  # S-06 対応: SecureTokenStore が flutter_secure_storage を使ってトークンを安全に永続化する。
  # Flutter アプリ（iOS/Android/macOS/Windows/Linux）で使用する。
  # Pure Dart CLI 環境では SecureTokenStore を使用せず MemoryTokenStore を使うこと。
  flutter_secure_storage: ">=9.2.0 <11.0.0"

dev_dependencies:
  test: ^1.25.0
  mocktail: ^1.0.0
  lints: ^6.1.0
