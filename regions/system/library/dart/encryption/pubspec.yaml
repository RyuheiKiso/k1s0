name: k1s0_encryption
description: Encryption utilities for k1s0 platform
version: 0.1.0

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  crypto: ^3.0.0
  # MED-027 監査対応: encrypt と pointycastle の使用目的を明確化。
  # encrypt: lib/src/aes.dart で AES-GCM 暗号化に使用（pointycastle のラッパー）。
  # pointycastle: lib/src/rsa.dart で RSA-OAEP 鍵生成・暗号化に直接使用。
  # 両パッケージはそれぞれ異なるファイルで独立して使用されており、重複依存ではない。
  # encrypt パッケージが pointycastle に依存しているため、バージョン固定が必要。
  encrypt: ^5.0.3
  hashlib: ^2.3.0
  pointycastle: ^3.9.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.24.0
