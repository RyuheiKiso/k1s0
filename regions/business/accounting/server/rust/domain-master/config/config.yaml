app:
  name: "k1s0-domain-master-server"
  version: "0.1.0"
  environment: "development"

server:
  host: "0.0.0.0"
  port: 8210
  grpc_port: 50061

database:
  host: "localhost"
  port: 5432
  name: "k1s0"
  schema: "domain_master"
  user: "k1s0"
  password: "${DB_PASSWORD}"
  ssl_mode: "disable"
  max_connections: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

kafka:
  brokers:
    - "localhost:9092"
  category_topic: "k1s0.business.accounting.domainmaster.category_changed.v1"
  item_topic: "k1s0.business.accounting.domainmaster.item_changed.v1"
  tenant_extension_topic: "k1s0.business.accounting.domainmaster.tenant_extension_changed.v1"

auth:
  jwks_url: "http://localhost:8080/realms/k1s0/protocol/openid-connect/certs"
  issuer: "http://localhost:8080/realms/k1s0"
  audience: "k1s0-business"
  jwks_cache_ttl_secs: 300

observability:
  log:
    level: "info"
    format: "json"
  trace:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
    sample_rate: 1.0
  metrics:
    enabled: true
    path: "/metrics"
