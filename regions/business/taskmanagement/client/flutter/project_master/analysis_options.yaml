# Flutter 静的解析設定（プロジェクト共通）
# 厳格な lint ルールを適用してコード品質を維持する
include: package:flutter_lints/flutter.yaml

# L-21 監査対応: Dart アナライザの strict モードを有効化する。
# strict-casts: 暗黙的な型キャストを禁止し、実行時型エラーを防止する
# strict-raw-types: ジェネリック型の型引数省略を禁止し、型安全性を強化する
# strict-inference: 型推論に失敗した場合をエラーとして報告し、dynamic の使用を抑制する
analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
    strict-inference: true

linter:
  rules:
    # コンストラクタ・リテラルの const 推奨（パフォーマンス最適化）
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables
    - prefer_const_declarations
    # フィールドの不変性推奨
    - prefer_final_fields
    - prefer_final_locals
    - prefer_final_in_for_each
    # ウィジェットの key 引数必須（再構築の正確性を保証）
    - use_key_in_widget_constructors
    # デバッグ出力の禁止（本番コードでの print 使用を防止）
    - avoid_print
    # 型安全性の強化
    - avoid_dynamic_calls
    - avoid_returning_null_for_void
    - prefer_void_to_null
    # コードスタイルの統一
    - prefer_single_quotes
    - sort_child_properties_last
    - use_full_hex_values_for_flutter_colors
    - sized_box_for_whitespace
    - prefer_is_empty
    - prefer_is_not_empty
