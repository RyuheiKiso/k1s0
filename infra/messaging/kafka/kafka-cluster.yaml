# Kafka クラスター設定
# 使用バージョン:
#   - Strimzi Operator: 0.38.0（Kafka 3.6.x をサポート）
#     インストール方法: helm install strimzi-kafka-operator strimzi/strimzi-kafka-operator --version 0.38.0
#     バージョンは infra/terraform/environments/*/variables.tf の strimzi_operator_version で管理している
#   - Kafka: 3.6.1（ZooKeeper モード）
# バージョン互換性: https://strimzi.io/downloads/ で確認すること
# L-06 対応: Strimzi Operator バージョンを明示的に記録
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: k1s0-kafka
  namespace: messaging
spec:
  kafka:
    version: 3.6.1
    replicas: 3
    listeners:
      # TLS リスナーのみ使用する（H-05: PLAINTEXT リスナー削除）
      # 全通信を TLS で暗号化し、通信傍受リスクを排除する
      # クライアント認証は mTLS（type: tls）で実施する
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      inter.broker.protocol.version: "3.6"
      log.retention.hours: 168          # 7 days default
      log.retention.check.interval.ms: 300000
      num.partitions: 3
    storage:
      type: persistent-claim
      size: 100Gi
      class: ceph-block-fast
      deleteClaim: false
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml
    resources:
      requests:
        memory: 2Gi
        cpu: "500m"
      limits:
        memory: 4Gi
        cpu: "2"

  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 20Gi
      class: ceph-block
      deleteClaim: false
    resources:
      requests:
        memory: 512Mi
        cpu: "250m"
      limits:
        memory: 1Gi
        cpu: "500m"

  entityOperator:
    topicOperator:
      resources:
        requests:
          memory: 256Mi
          cpu: "100m"
        limits:
          memory: 512Mi
          cpu: "500m"
    userOperator:
      resources:
        requests:
          memory: 256Mi
          cpu: "100m"
        limits:
          memory: 512Mi
          cpu: "500m"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-metrics
  namespace: messaging
data:
  kafka-metrics-config.yml: |
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          clientId: "$3"
          topic: "$4"
          partition: "$5"
      - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), brokerHost=(.+), brokerPort=(.+)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          clientId: "$3"
          broker: "$4:$5"
      - pattern: kafka.server<type=(.+), name=(.+)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
      - pattern: kafka.server<type=(.+), name=(.+)><>Count
        name: kafka_server_$1_$2_total
        type: COUNTER
      - pattern: kafka.log<type=(.+), name=(.+), topic=(.+), partition=(.+)><>Value
        name: kafka_log_$1_$2
        type: GAUGE
        labels:
          topic: "$3"
          partition: "$4"
