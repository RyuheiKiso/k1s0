# Kafka トピック設計方針（M-09 対応）:
# パーティション数の根拠:
#   - system tier (6パーティション): 高トラフィックイベント（認証、設定変更等）
#     最大 6 並列コンシューマーグループでスループットを確保する
#   - service/business tier (3パーティション): レプリカ数（3）に合わせた最小単位
#     各パーティションがレプリカの1つに割り当てられ、バランスの取れた分散を実現
#   - DLQ トピック (1パーティション): 低頻度・処理失敗イベントのみ
#     順序保証が不要なため単一パーティションで十分
#   - audit トピック (6パーティション): 監査ログの高スループット要件
#     長期保持（90日間）と高書き込み頻度を考慮
#
# レプリカ数は全トピック共通で 3（ブローカー数と一致させ可用性を確保）
# min.insync.replicas=2 により、1 ブローカー障害時も書き込みを継続可能
---
# --- System Tier Topics ---
# system tier: 認証・設定等の高頻度基盤イベント（6パーティション）
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: k1s0.system.auth.login.v1
  namespace: messaging
  labels:
    strimzi.io/cluster: k1s0-kafka
    tier: system
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 604800000        # 7 days
    cleanup.policy: delete
    min.insync.replicas: 2
---
