# Gitea Service (ローカル開発用)
# ADR-POL-002: up.sh apply_gitea から呼ばれる正規 Service マニフェスト。
# argocd-repo-secret の url は `http://gitea.k1s0-platform-tools.svc.cluster.local:3000` を参照する。
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: k1s0-platform-tools
  labels:
    app: gitea
    k1s0.io/component: gitops-server
spec:
  type: ClusterIP
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
