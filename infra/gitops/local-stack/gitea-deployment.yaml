# Gitea (ローカル開発用)
# ADR-POL-002 (local-stack SoT) に基づき up.sh apply_gitea から呼ばれる正規マニフェスト。
# 元設計の emptyDir を PVC に変更（pod 再起動時の data 喪失を防ぐ。
# kind cluster 破棄時の data 喪失は想定通り＝backup-cluster.sh で退避してから down.sh）。
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: gitops
  labels:
    app: gitea
    k1s0.io/component: gitops-server
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitops
  labels:
    app: gitea
    k1s0.io/component: gitops-server
spec:
  replicas: 1
  strategy:
    type: Recreate  # PVC RWO のため Recreate
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
        k1s0.io/component: gitops-server
    spec:
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: setup
          image: gitea/gitea:1.22-rootless
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /data/gitea/conf /data/gitea/log
              if [ ! -f /data/gitea/conf/app.ini ]; then
                cat > /data/gitea/conf/app.ini <<EOF
              [server]
              DOMAIN = gitea.gitops.svc.cluster.local
              ROOT_URL = http://gitea.gitops.svc.cluster.local:3000/
              HTTP_PORT = 3000
              DISABLE_SSH = true
              [database]
              DB_TYPE = sqlite3
              PATH = /data/gitea/gitea.db
              [security]
              INSTALL_LOCK = true
              [service]
              DISABLE_REGISTRATION = false
              [log]
              MODE = console
              EOF
              fi
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: gitea
          image: gitea/gitea:1.22-rootless
          imagePullPolicy: IfNotPresent
          # gitea-rootless の default config path は /etc/gitea/app.ini で固定されており、
          # GITEA_CUSTOM env だけでは config が読まれず install wizard が開きっぱなしになる
          # （ADR-POL-002 P4 で実証済み: "Prepare to run install page" log）。
          # --config を明示することで PVC 永続化された app.ini を使わせる。
          command:
            - /usr/local/bin/gitea
            - --config
            - /data/gitea/conf/app.ini
            - web
          env:
            - name: GITEA_WORK_DIR
              value: /data/gitea
            - name: GITEA_CUSTOM
              value: /data/gitea
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data
