# Fault injection: 500ms latency on 10% of requests
# Based on infra/istio/fault-injection/delay.yaml
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: task-server-fault
  namespace: k1s0-service
spec:
  hosts:
    - task-server
  http:
    - fault:
        delay:
          percentage:
            value: 10.0
          fixedDelay: 500ms
      route:
        - destination:
            host: task-server
