# Fault injection: 503 error on 5% of requests plus 500ms delay on 10%.
# Retries are intentionally omitted here so the failure is visible in Kiali.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: order-server
  namespace: k1s0-service
spec:
  hosts:
    - order-server.k1s0-service.svc.cluster.local
  http:
    - fault:
        abort:
          percentage:
            value: 5.0
          httpStatus: 503
        delay:
          percentage:
            value: 10.0
          fixedDelay: 500ms
      route:
        - destination:
            host: order-server.k1s0-service.svc.cluster.local
            subset: stable
      timeout: 10s
