# Fault injection: 503 error on 5% of requests
# Based on infra/istio/fault-injection/abort.yaml
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: order-server-fault
  namespace: k1s0-service
spec:
  hosts:
    - order-server
  http:
    - fault:
        abort:
          percentage:
            value: 5.0
          httpStatus: 503
        delay:
          percentage:
            value: 10.0
          fixedDelay: 500ms
      route:
        - destination:
            host: order-server
