# Kafka messaging flow scenario.
# Starts producer/consumer to demonstrate async event-driven architecture.
# order-server -> Kafka -> accounting-server flow visible in Kiali.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: kafka-flow
  namespace: messaging
spec:
  hosts:
    - kafka
  http:
    - route:
        - destination:
            host: kafka
            port:
              number: 9092
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: "5xx,reset,connect-failure"
