# Canary VirtualService: 90:10 weight split + header-based routing.
# Reuses the task-server baseline timeout/retry policy.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: task-server
  namespace: k1s0-service
spec:
  hosts:
    - task-server.k1s0-service.svc.cluster.local
  http:
    - match:
        - headers:
            x-canary:
              exact: "true"
      route:
        - destination:
            host: task-server.k1s0-service.svc.cluster.local
            subset: canary
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "5xx,reset,connect-failure,retriable-4xx"
        retryRemoteLocalities: true
    - route:
        - destination:
            host: task-server.k1s0-service.svc.cluster.local
            subset: stable
          weight: 90
        - destination:
            host: task-server.k1s0-service.svc.cluster.local
            subset: canary
          weight: 10
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "5xx,reset,connect-failure,retriable-4xx"
        retryRemoteLocalities: true
