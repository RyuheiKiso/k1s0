apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-ui
  namespace: observability
  labels:
    app: demo-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-ui
  template:
    metadata:
      labels:
        app: demo-ui
    spec:
      serviceAccountName: default
      containers:
        - name: demo-ui
          image: k1s0-demo-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3100
              name: http
          env:
            - name: NODE_ENV
              value: production
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: demo-ui
  namespace: observability
spec:
  type: NodePort
  selector:
    app: demo-ui
  ports:
    - port: 3100
      targetPort: 3100
      nodePort: 30173
      protocol: TCP
