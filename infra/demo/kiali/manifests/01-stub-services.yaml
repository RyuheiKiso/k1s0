# Stub services using nginx:alpine as lightweight HTTP responder.
# Each service returns 200 OK on any path, which is sufficient for
# Istio sidecar to generate metrics that Kiali visualizes.

##############################################################
# system Tier
##############################################################
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
  namespace: k1s0-system
  labels:
    app: auth-server
    version: stable
    tier: system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      labels:
        app: auth-server
        version: stable
        tier: system
    spec:
      containers:
        - name: stub
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-server
  namespace: k1s0-system
  labels:
    app: auth-server
spec:
  selector:
    app: auth-server
  ports:
    - name: http
      port: 80
      targetPort: 80
