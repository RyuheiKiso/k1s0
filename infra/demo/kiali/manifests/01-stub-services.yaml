# Demo services backed by a small Python app that emits JSON logs
# and triggers downstream calls so the mesh shows real traffic,
# logs, and traces.

##############################################################
# system Tier
##############################################################
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
  namespace: k1s0-system
  labels:
    app: auth-server
    version: stable
    tier: system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
        prometheus.istio.io/merge-metrics: "true"
      labels:
        app: auth-server
        version: stable
        tier: system
    spec:
      containers:
        - name: stub
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/server.py"]
          env:
            - name: SERVICE_NAME
              value: auth-server
            - name: NAMESPACE_NAME
              value: k1s0-system
            - name: VERSION
              value: stable
            - name: PORT
              value: "8080"
            - name: DOWNSTREAMS
              value: http://config-server.k1s0-system.svc.cluster.local/
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: demo-service-script
              mountPath: /app/server.py
              subPath: server.py
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: demo-service-script
          configMap:
            name: demo-service-script
---
apiVersion: v1
kind: Service
metadata:
  name: auth-server
  namespace: k1s0-system
  labels:
    app: auth-server
spec:
  selector:
    app: auth-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
