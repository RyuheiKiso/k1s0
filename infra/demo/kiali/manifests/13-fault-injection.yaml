# Scheduled fault injection assets.
# The CronJob keeps the weekly schedule from the design doc.
# The active fault window matches the service-mesh design doc.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fault-injection-runner
  namespace: k1s0-service
  labels:
    app.kubernetes.io/part-of: k1s0-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fault-injection-runner
  namespace: k1s0-service
  labels:
    app.kubernetes.io/part-of: k1s0-demo
rules:
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fault-injection-runner
  namespace: k1s0-service
  labels:
    app.kubernetes.io/part-of: k1s0-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fault-injection-runner
subjects:
  - kind: ServiceAccount
    name: fault-injection-runner
    namespace: k1s0-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fault-injection-config
  namespace: k1s0-service
  labels:
    app.kubernetes.io/part-of: k1s0-demo
data:
  fault-delay.yaml: |
    apiVersion: networking.istio.io/v1
    kind: VirtualService
    metadata:
      name: task-server-fault-delay
      namespace: k1s0-service
      labels:
        app.kubernetes.io/part-of: k1s0-demo
    spec:
      hosts:
        - task-server.k1s0-service.svc.cluster.local
      http:
        - fault:
            delay:
              percentage:
                value: 10.0
              fixedDelay: 500ms
          route:
            - destination:
                host: task-server.k1s0-service.svc.cluster.local
          timeout: 10s
  fault-abort.yaml: |
    apiVersion: networking.istio.io/v1
    kind: VirtualService
    metadata:
      name: task-server-fault-abort
      namespace: k1s0-service
      labels:
        app.kubernetes.io/part-of: k1s0-demo
    spec:
      hosts:
        - task-server.k1s0-service.svc.cluster.local
      http:
        - fault:
            abort:
              percentage:
                value: 5.0
              httpStatus: 503
          route:
            - destination:
                host: task-server.k1s0-service.svc.cluster.local
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fault-injection-test
  namespace: k1s0-service
  labels:
    app.kubernetes.io/part-of: k1s0-demo
spec:
  schedule: "0 1 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: k1s0-demo
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          serviceAccountName: fault-injection-runner
          restartPolicy: OnFailure
          containers:
            - name: fault-injection
              image: bitnami/kubectl:latest@sha256:6e2cdb22d6ab7264ea198c717f555e30536b54029d26c8781b9f25f78951b564
              command:
                - sh
                - -ceu
                - |
                  kubectl apply -f /config/fault-delay.yaml
                  kubectl apply -f /config/fault-abort.yaml
                  sleep 1800
                  kubectl delete -f /config/fault-delay.yaml --ignore-not-found=true
                  kubectl delete -f /config/fault-abort.yaml --ignore-not-found=true
              volumeMounts:
                - name: config
                  mountPath: /config
          volumes:
            - name: config
              configMap:
                name: fault-injection-config
