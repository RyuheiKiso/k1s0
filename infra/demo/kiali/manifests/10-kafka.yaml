# Kafka KRaft single broker for demo environment.
# No ZooKeeper dependency. In-memory log storage (ephemeral).
# Production config: infra/messaging/kafka/kafka-cluster.yaml
#
# K8S-CONFIG-001 監査対応: WARNING - このファイルはデモ・Kiali 可視化専用の設定です。
# PLAINTEXT プロトコルを使用しており、認証・暗号化が一切ありません。
# 本番環境では絶対に使用しないこと。
# 本番環境の Kafka は Strimzi Operator + SASL_SSL で構築すること:
#   infra/messaging/kafka/kafka-cluster.yaml を参照
---
apiVersion: v1
kind: Namespace
metadata:
  name: messaging
  labels:
    tier: infra
    # Intentionally meshed in the demo so Kiali can visualize TCP flows to Kafka.
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          command:
            - /bin/sh
            - -c
            - |
              export CLUSTER_ID="MkU3OEVBNTcwNTJENDM2Qk"
              /opt/kafka/bin/kafka-storage.sh format \
                --config /opt/kafka/config/kraft/server.properties \
                --cluster-id "$CLUSTER_ID" \
                --ignore-formatted
              exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/kraft/server.properties \
                --override node.id=1 \
                --override process.roles=broker,controller \
                --override listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093 \
                --override advertised.listeners=PLAINTEXT://kafka.messaging.svc.cluster.local:9092 \
                --override controller.listener.names=CONTROLLER \
                --override listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
                --override controller.quorum.voters=1@localhost:9093 \
                --override offsets.topic.replication.factor=1 \
                --override transaction.state.log.replication.factor=1 \
                --override transaction.state.log.min.isr=1 \
                --override num.partitions=3 \
                --override log.retention.hours=1
          ports:
            - containerPort: 9092
              name: plaintext
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: messaging
spec:
  selector:
    app: kafka
  ports:
    - name: tcp-kafka
      port: 9092
      targetPort: 9092
---
# Demo producer: sends task events every 5 seconds
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-demo-producer
  namespace: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-demo-producer
  template:
    metadata:
      labels:
        app: kafka-demo-producer
        role: producer
    spec:
      containers:
        - name: producer
          image: apache/kafka:3.7.0
          command:
            - /bin/sh
            - -c
            - |
              # Wait for Kafka to be ready
              sleep 30
              # Create topic
              /opt/kafka/bin/kafka-topics.sh --create \
                --topic task-events \
                --bootstrap-server kafka.messaging.svc.cluster.local:9092 \
                --partitions 3 \
                --replication-factor 1 \
                --if-not-exists
              # Produce messages continuously
              while true; do
                TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                TASK_ID=$((RANDOM % 10000))
                echo "{\"event\":\"task_created\",\"task_id\":${TASK_ID},\"timestamp\":\"${TIMESTAMP}\",\"service\":\"task-server\"}" | \
                  /opt/kafka/bin/kafka-console-producer.sh \
                    --topic task-events \
                    --bootstrap-server kafka.messaging.svc.cluster.local:9092
                sleep 5
              done
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
# Demo consumer: reads task events (simulates project-master-server processing)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-demo-consumer
  namespace: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-demo-consumer
  template:
    metadata:
      labels:
        app: kafka-demo-consumer
        role: consumer
    spec:
      containers:
        - name: consumer
          image: apache/kafka:3.7.0
          command:
            - /bin/sh
            - -c
            - |
              # Wait for Kafka and topic to be ready
              sleep 45
              /opt/kafka/bin/kafka-console-consumer.sh \
                --topic task-events \
                --bootstrap-server kafka.messaging.svc.cluster.local:9092 \
                --group project-master-processor \
                --from-beginning
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "9308"
        prometheus.io/scrape: "true"
        prometheus.istio.io/merge-metrics: "true"
      labels:
        app: kafka-exporter
        tier: infra
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:v1.8.0
          args:
            - --kafka.server=kafka.messaging.svc.cluster.local:9092
            - --web.listen-address=:9308
          ports:
            - containerPort: 9308
              name: metrics
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: messaging
spec:
  selector:
    app: kafka-exporter
  ports:
    - name: metrics
      port: 9308
      targetPort: 9308
