# Istio resources for demo environment
# Keeps the demo aligned with the platform's STRICT mTLS baseline.

##############################################################
# PeerAuthentication
##############################################################
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: service-mesh
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: allow-prometheus
  namespace: observability
spec:
  mtls:
    mode: PERMISSIVE
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: k1s0-system
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: k1s0-business
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: k1s0-service
spec:
  mtls:
    mode: STRICT

##############################################################
# AuthorizationPolicy
##############################################################
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-from-lower-tiers
  namespace: k1s0-system
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - observability
              - k1s0-system
              - k1s0-business
              - k1s0-service
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-from-service-tier
  namespace: k1s0-business
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - observability
              - k1s0-business
              - k1s0-service
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-from-same-tier-and-observability
  namespace: k1s0-service
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - observability
              - k1s0-service

##############################################################
# DestinationRule
##############################################################
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: auth-server
  namespace: k1s0-system
spec:
  host: auth-server.k1s0-system.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 200
      http:
        http1MaxPendingRequests: 200
        http2MaxRequests: 2000
    tls:
      mode: ISTIO_MUTUAL
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 30
