# Promtail DaemonSet for the demo environment.
# The demo targets a fixed set of pod log paths, so filesystem scraping is
# more reliable than Kubernetes SD on a single-node kind cluster.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: observability
data:
  promtail.yaml: |
    server:
      http_listen_port: 3101

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: demo-pod-logs
        static_configs:
          - targets: [localhost]
            labels:
              namespace: k1s0-system
              app: auth-server
              tier: system
              version: stable
              __path__: /var/log/pods/k1s0-system_auth-server-*/stub/*.log
          - targets: [localhost]
            labels:
              namespace: k1s0-system
              app: config-server
              tier: system
              version: stable
              __path__: /var/log/pods/k1s0-system_config-server-*/stub/*.log
          - targets: [localhost]
            labels:
              namespace: k1s0-system
              app: graphql-gateway
              tier: system
              version: stable
              __path__: /var/log/pods/k1s0-system_graphql-gateway-*/stub/*.log
          - targets: [localhost]
            labels:
              namespace: k1s0-system
              app: saga-server
              tier: system
              version: stable
              __path__: /var/log/pods/k1s0-system_saga-server-*/stub/*.log
          - targets: [localhost]
            labels:
              namespace: k1s0-business
              app: accounting-server
              tier: business
              version: stable
              __path__: /var/log/pods/k1s0-business_accounting-server-*/stub/*.log
          - targets: [localhost]
            labels:
              namespace: k1s0-service
              app: order-bff
              tier: service
              version: stable
              __path__: /var/log/pods/k1s0-service_order-bff-*/stub/*.log
          - targets: [localhost]
            labels:
              namespace: k1s0-service
              app: order-server
              tier: service
              version: stable
              __path__: /var/log/pods/k1s0-service_order-server-*/stub/*.log
          - targets: [localhost]
            labels:
              namespace: k1s0-service
              app: order-server
              tier: service
              version: canary
              __path__: /var/log/pods/k1s0-service_order-server-canary-*/stub/*.log
        pipeline_stages:
          - cri: {}
          - json:
              expressions:
                level: level
                trace_id: trace_id
                service: service
          - labels:
              level:
              trace_id:
              service:
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: observability
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: prometheus
      containers:
        - name: promtail
          image: grafana/promtail:2.9.0
          args: ["-config.file=/etc/promtail/promtail.yaml"]
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
