# Promtail DaemonSet for the demo environment.
# The demo targets a fixed set of pod log paths, so filesystem scraping is
# more reliable than Kubernetes SD on a single-node kind cluster.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: observability
data:
  promtail.yaml: |
    server:
      http_listen_port: 3100

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            regex: (k1s0-system|k1s0-business|k1s0-service|messaging)
            action: keep
          - source_labels: [__meta_kubernetes_pod_phase]
            regex: Running
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_name]
            regex: (stub|producer|consumer|kafka|kafka-exporter)
            action: keep
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_label_tier]
            target_label: tier
          - source_labels: [__meta_kubernetes_pod_label_version]
            target_label: version
          - target_label: environment
            replacement: dev
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/$2/*.log
        pipeline_stages:
          - cri: {}
          - json:
              expressions:
                level: level
                trace_id: trace_id
                span_id: span_id
                service: service
                request_id: request_id
          - labels:
              level:
              trace_id:
              span_id:
              service:
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: observability
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: prometheus
      containers:
        - name: promtail
          # INFRA-HIGH-004 対応: 2.9.0 (2023年, 非推奨) → 3.3.2 に更新
          image: grafana/promtail:3.3.2
          args: ["-config.file=/etc/promtail/promtail.yaml"]
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
