# task-server canary Deployment.
# Shares the same demo service implementation as stable, but exposes
# the canary version label so Kiali can split workloads correctly.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-server-canary
  namespace: k1s0-service
  labels:
    app: task-server
    version: canary
    tier: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-server
      version: canary
  template:
    metadata:
      labels:
        app: task-server
        version: canary
        tier: service
    spec:
      containers:
        - name: stub
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/server.py"]
          env:
            - name: SERVICE_NAME
              value: task-server
            - name: NAMESPACE_NAME
              value: k1s0-service
            - name: VERSION
              value: canary
            - name: PORT
              value: "8080"
            - name: DOWNSTREAMS
              value: http://auth-server.k1s0-system.svc.cluster.local/,http://config-server.k1s0-system.svc.cluster.local/,http://saga-server.k1s0-system.svc.cluster.local/,http://project-master-server.k1s0-business.svc.cluster.local/
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: demo-service-script
              mountPath: /app/server.py
              subPath: server.py
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: demo-service-script
          configMap:
            name: demo-service-script
