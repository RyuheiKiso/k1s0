# Flagger-managed canary for task-server.
# The rollout weights and rollback thresholds mirror the design doc.
# Analysis windows match the service-mesh design doc.
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: task-server
  namespace: k1s0-service
  labels:
    app.kubernetes.io/part-of: k1s0-demo
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: task-server
  service:
    port: 80
    targetPort: 8080
    hosts:
      - task-server.k1s0-service.svc.cluster.local
    gateways:
      - mesh
    timeout: 10s
    retries:
      attempts: 3
      perTryTimeout: 3s
      retryOn: "5xx,reset,connect-failure,retriable-4xx"
    trafficPolicy:
      connectionPool:
        http:
          h2UpgradePolicy: UPGRADE
          http1MaxPendingRequests: 100
          http2MaxRequests: 1000
      loadBalancer:
        simple: LEAST_REQUEST
      tls:
        mode: ISTIO_MUTUAL
      outlierDetection:
        consecutive5xxErrors: 5
        interval: 5m
        baseEjectionTime: 60s
        maxEjectionPercent: 50
  analysis:
    interval: 5m
    threshold: 2
    maxWeight: 80
    stepWeight: 20
    metrics:
      - name: request-success-rate
        thresholdRange:
          min: 99
        interval: 5m
      - name: request-duration
        thresholdRange:
          max: 500
        interval: 5m
    webhooks:
      - name: rollback-alert
        type: rollback
        url: http://alertmanager.observability.svc.cluster.local:9093/api/v1/alerts
        timeout: 5s
        retries: 2
