# Baseline VirtualServices aligned with docs/infrastructure/service-mesh.
# The demo uses explicit routes instead of wildcard destinations so the
# policies are both inspectable and actually routable inside the cluster.
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: default-system
  namespace: k1s0-system
spec:
  hosts:
    - auth-server.k1s0-system.svc.cluster.local
    - config-server.k1s0-system.svc.cluster.local
    - graphql-gateway.k1s0-system.svc.cluster.local
    - saga-server.k1s0-system.svc.cluster.local
  http:
    - match:
        - authority:
            exact: auth-server.k1s0-system.svc.cluster.local
      route:
        - destination:
            host: auth-server.k1s0-system.svc.cluster.local
      timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: "5xx,reset,connect-failure"
    - match:
        - authority:
            exact: config-server.k1s0-system.svc.cluster.local
      route:
        - destination:
            host: config-server.k1s0-system.svc.cluster.local
      timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: "5xx,reset,connect-failure"
    - match:
        - authority:
            exact: graphql-gateway.k1s0-system.svc.cluster.local
      route:
        - destination:
            host: graphql-gateway.k1s0-system.svc.cluster.local
      timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: "5xx,reset,connect-failure"
    - match:
        - authority:
            exact: saga-server.k1s0-system.svc.cluster.local
      route:
        - destination:
            host: saga-server.k1s0-system.svc.cluster.local
      timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: "5xx,reset,connect-failure"
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: default-business
  namespace: k1s0-business
spec:
  hosts:
    - accounting-server.k1s0-business.svc.cluster.local
  http:
    - match:
        - authority:
            exact: accounting-server.k1s0-business.svc.cluster.local
      route:
        - destination:
            host: accounting-server.k1s0-business.svc.cluster.local
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "5xx,reset,connect-failure"
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: default-service
  namespace: k1s0-service
spec:
  hosts:
    - order-bff.k1s0-service.svc.cluster.local
  http:
    - match:
        - authority:
            exact: order-bff.k1s0-service.svc.cluster.local
      route:
        - destination:
            host: order-bff.k1s0-service.svc.cluster.local
      timeout: 15s
      retries:
        attempts: 2
        perTryTimeout: 5s
        retryOn: "5xx,reset,connect-failure,retriable-4xx"
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: order-server
  namespace: k1s0-service
spec:
  hosts:
    - order-server.k1s0-service.svc.cluster.local
  http:
    - route:
        - destination:
            host: order-server.k1s0-service.svc.cluster.local
            subset: stable
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "5xx,reset,connect-failure,retriable-4xx"
        retryRemoteLocalities: true
