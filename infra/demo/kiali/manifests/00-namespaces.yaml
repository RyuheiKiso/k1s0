# Namespaces with Istio sidecar injection enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: k1s0-system
  labels:
    tier: system
    app.kubernetes.io/part-of: k1s0
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: k1s0-business
  labels:
    tier: business
    app.kubernetes.io/part-of: k1s0
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: k1s0-service
  labels:
    tier: service
    app.kubernetes.io/part-of: k1s0
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    tier: infra
    app.kubernetes.io/part-of: k1s0
---
apiVersion: v1
kind: Namespace
metadata:
  name: messaging
  labels:
    tier: infra
    app.kubernetes.io/part-of: k1s0
    # Intentionally meshed in the demo so Kiali can visualize TCP flows to Kafka.
    istio-injection: enabled
