# Kiali Helm values for local demo environment
# Based on infra/terraform/modules/service-mesh/values/kiali.yaml

auth:
  strategy: anonymous

deployment:
  accessible_namespaces:
    - "**"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  service_type: NodePort

server:
  port: 20001
  node_port: 30001
  web_root: /kiali
  web_fqdn: localhost
  web_port: 20001
  web_schema: http
  cors:
    allow_all: true

external_services:
  prometheus:
    url: http://prometheus.observability.svc.cluster.local:9090
  grafana:
    enabled: true
    internal_url: http://grafana.observability.svc.cluster.local:3000
    external_url: http://localhost:3200
  tracing:
    enabled: true
    internal_url: http://jaeger.observability.svc.cluster.local:16686
    external_url: http://localhost:16686
    use_grpc: false
  istio:
    root_namespace: service-mesh
