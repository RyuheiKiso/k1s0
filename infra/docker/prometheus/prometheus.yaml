  - job_name: activity-server-rust
    static_configs:
      - targets: ["activity-rust:8080"]
        labels:
          service: activity-server
          tier: service
          lang: rust
    metrics_path: /metrics

  # Kong API Gateway
  # H-01監査対応: Admin API（8001）ではなく Status API（8100）からメトリクスを収集する。
  # Status API はメトリクス・ヘルスチェックのみを提供し、設定変更機能を持たないため安全に全NICバインドが可能。
  - job_name: kong
    static_configs:
      - targets: ["kong:8100"]
    metrics_path: /metrics

  # Kafka メトリクス（JMX Exporter 経由）
  # LOW-002 監査対応: Kafka ブローカーポート 9092 ではなく JMX Exporter の HTTP ポート 9101 を使用する。
  # kafka-jmx-exporter サービスが Kafka の JMX ポート 9999 に接続してメトリクスを収集・変換する。
  - job_name: kafka
    static_configs:
      - targets: ["kafka-jmx-exporter:9101"]
        labels:
          service: kafka
          tier: infra
    metrics_path: /metrics
