# アラートルール設計方針 (SLO に基づく閾値設定):
# ローカル開発・CI 環境用のアラート定義（本番 SLO とは異なる緩い閾値）
#
# 参考 SLO（本番環境目標値）:
#   - 可用性 SLO: 99.9% (月間ダウンタイム 43.8分以下)
#   - レイテンシー SLO: P99 < 500ms
#   - エラー率 SLO: < 1%
#
# 本ファイルの閾値（開発環境用の警告レベル）:
#   - エラー率 > 5%: 開発中のデバッグ用（本番では > 1% で通知）
#   - P99 > 1s: 開発中のパフォーマンス警告（本番では > 500ms）
# L-04 対応: 閾値根拠の明記と本番用アラートルールファイルの分離を推奨
#
# MEDIUM-INFRA-002 監査対応: 本番環境への移行時の閾値調整ガイドライン
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 本ファイルは開発・CI 環境専用の緩い閾値で設定されている。
# 本番環境では以下のトラフィック・SLO に応じた閾値調整を強く推奨する。
#
# [本番環境への移行チェックリスト]
# 1. エラー率閾値の調整:
#    - 開発: 5% 超過でアラート
#    - 本番推奨: 1% 超過で warning、2% 超過で critical（SLO: < 1%）
#    - 高トラフィック環境では 0.1% 〜 0.5% に引き下げることを検討する
#
# 2. レイテンシー閾値の調整:
#    - 開発: P99 > 1s でアラート
#    - 本番推奨: P99 > 500ms で warning、P99 > 1s で critical（SLO: P99 < 500ms）
#    - 地理的分散環境ではリージョンごとに個別閾値を設定することを検討する
#
# 3. アラート持続時間の調整:
#    - 開発: 1m〜2m（素早くアラートを検知するため短縮）
#    - 本番推奨: 5m〜10m（一時的なスパイクによる誤報を防止する）
#
# 4. Kafka コンシューマーラグ閾値の調整:
#    - 開発: 1000 メッセージ超過でアラート
#    - 本番推奨: ピーク時のスループット（msg/s）× 許容遅延時間（s）で算出する
#    - 例: 500 msg/s × 60s = 30000 メッセージが合理的な閾値
#
# 5. DB コネクションプール閾値の調整:
#    - 開発: 90% 超過でアラート
#    - 本番推奨: 80% 超過で warning（テナント数増加でプール枯渇リスクが高まる）
#
# [本番用アラートルールファイルの管理方針]
# - 開発環境: infra/docker/prometheus/alerting_rules.yaml（本ファイル）
# - 本番環境: infra/k8s/prometheus/alerting_rules_prod.yaml（別ファイルで管理する）
# - Helm values.yaml でファイルパスを環境別に切り替えることを推奨する

groups:
  - name: local-dev-alerts
    rules:
      # サービス死活監視: up メトリクスが 0（到達不能）になったら発火
      # 可用性 SLO 99.9% の維持のため、1分以上の停止を即時検知する
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "{{ $labels.instance }} has been unreachable for more than 1 minute"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/service-down.md"

      # HTTP エラー率監視: 5分間のエラー率が 5% を超えたら発火
      # 開発環境用閾値: 0.05（5%）= 本番 SLO エラー率 1% の5倍（デバッグ優先のため緩く設定）
      - alert: HighErrorRate
        expr: service:http_errors:rate5m > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} error rate > 5%"
          description: "{{ $labels.service }} の 5xx エラー率が {{ $value | humanizePercentage }} です"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/high-error-rate.md"

      # レイテンシー監視: P99 レスポンスタイムが 1秒を超えたら発火
      # 開発環境用閾値: 1s = 本番 SLO P99 500ms の2倍（ローカル環境のオーバーヘッドを考慮）
      - alert: HighLatency
        expr: service:http_request_duration_seconds:p99 > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} P99 latency > 1s"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/high-latency.md"

      # gRPC エラー率が 5% を超えた場合にアラートを発火する
      # 開発環境用閾値: 0.05（5%）= HTTP エラー率と同一基準（本番 SLO では 1% 以下を目標）
      - alert: GrpcHighErrorRate
        expr: service:grpc_errors:rate5m > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }}/{{ $labels.grpc_service }} gRPC error rate > 5%"
          description: "{{ $labels.service }} の gRPC エラー率が {{ $value | humanizePercentage }} です"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/high-latency.md"

      # DB コネクションプールの使用率が 90% を超えた場合にアラートを発火する
      - alert: DbPoolExhaustion
        expr: |
          (db_pool_connections_in_use / db_pool_connections_max) > 0.9
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} DB pool usage > 90%"
          description: "{{ $labels.service }} の DB コネクションプール使用率が {{ $value | humanizePercentage }} です。プール枯渇の恐れがあります"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/db-pool-exhaustion.md"

      # Kafka コンシューマーラグが 1000 を超えた場合にアラートを発火する
      - alert: KafkaConsumerLagHigh
        expr: |
          kafka_consumergroup_lag_sum > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer group {{ $labels.consumergroup }} lag > 1000"
          description: "コンシューマーグループ {{ $labels.consumergroup }} のラグが {{ $value }} メッセージです"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/kafka-consumer-lag.md"

      # TLS 証明書の有効期限が 30 日以内に切れる場合にアラートを発火する（Blackbox Exporter 利用時）
      - alert: CertificateExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS certificate expiring in {{ $value | humanizeDuration }}"
          description: "{{ $labels.instance }} の TLS 証明書が {{ $value | humanizeDuration }} 以内に期限切れになります"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/certificate-expiring.md"

      # cert-manager が管理する証明書の有効期限が 30 日（2592000 秒）以内の場合にアラートを発火する
      - alert: CertManagerCertExpiringSoon
        expr: certmanager_certificate_expiration_timestamp_seconds - time() < 2592000
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "cert-manager certificate {{ $labels.name }} expiring soon"
          description: "cert-manager 管理の証明書 {{ $labels.name }}（namespace: {{ $labels.namespace }}）の有効期限が 30 日以内です"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/certificate-expiring.md"

      # M-09監査対応: Service tier（BFF・外部公開サービス）専用のアラートルールを追加する。
      # system/business tier と分けてアラートを管理することで、Tier 別の SLO 監視を実現する。

  - name: service-tier-alerts
    rules:
      - alert: BFFHighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job=~"bff.*"}[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
          tier: service
        annotations:
          summary: "BFF レスポンスタイム異常（P95 > 1s）"
          description: "{{ $labels.job }} の P95 レスポンスタイムが {{ $value | humanizeDuration }} を超えています。"

      - alert: ServiceTierHighErrorRate
        expr: sum(rate(http_requests_total{job=~"bff.*|task.*|board.*|activity.*", status=~"5.."}[5m])) by (job) / sum(rate(http_requests_total{job=~"bff.*|task.*|board.*|activity.*"}[5m])) by (job) > 0.05
        for: 5m
        labels:
          severity: critical
          tier: service
        annotations:
          summary: "Service tier エラーレート異常（> 5%）"
          description: "{{ $labels.job }} のエラーレートが {{ $value | humanizePercentage }} を超えています。"

      - alert: ServiceTierDown
        expr: up{job=~"bff.*|task.*|board.*|activity.*"} == 0
        for: 1m
        labels:
          severity: critical
          tier: service
        annotations:
          summary: "Service tier サービスが停止中"
          description: "{{ $labels.job }} が停止しています。"

  # M-04 監査対応: 主要サービスのアラートルールを追加する
  # system tier（auth, config, saga, graphql-gateway 等）と
  # infra tier（Kafka, Redis, Vault）の監視を強化する
  - name: system-tier-alerts
    rules:
      # system tier サービスの停止監視
      # auth/config/saga 等の停止は全テナントへの影響が大きいため critical とする
      - alert: SystemTierDown
        expr: up{job=~"auth.*|config.*|saga.*|graphql.*|bff-proxy.*|dlq.*"} == 0
        for: 1m
        labels:
          severity: critical
          tier: system
        annotations:
          summary: "System tier サービスが停止中: {{ $labels.job }}"
          description: "{{ $labels.job }} が 1 分以上停止しています。全テナントに影響します。"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/service-down.md"

      # system tier サービスのエラー率監視
      # 1% 超過で warning、5% 超過で critical とする（本番 SLO: < 1%）
      - alert: SystemTierHighErrorRate
        expr: |
          sum(rate(http_requests_total{job=~"auth.*|config.*|saga.*|graphql.*|bff-proxy.*", status=~"5.."}[5m])) by (job)
          /
          sum(rate(http_requests_total{job=~"auth.*|config.*|saga.*|graphql.*|bff-proxy.*"}[5m])) by (job)
          > 0.05
        for: 2m
        labels:
          severity: critical
          tier: system
        annotations:
          summary: "System tier エラーレート異常: {{ $labels.job }}"
          description: "{{ $labels.job }} のエラーレートが {{ $value | humanizePercentage }} を超えています。"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/high-error-rate.md"

  - name: infra-alerts
    rules:
      # Redis 停止監視: BFF-Proxy のセッションストアが停止するとログイン不可になる
      - alert: RedisDown
        expr: up{job=~"redis.*"} == 0
        for: 1m
        labels:
          severity: critical
          component: redis
        annotations:
          summary: "Redis が停止中"
          description: "Redis インスタンス {{ $labels.instance }} が停止しています。BFF-Proxy のセッション管理が機能しません。"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/service-down.md"

      # Vault 停止監視: シークレット取得が不可能になる
      - alert: VaultDown
        expr: up{job=~"vault.*"} == 0
        for: 2m
        labels:
          severity: critical
          component: vault
        annotations:
          summary: "Vault が停止中"
          description: "Vault インスタンス {{ $labels.instance }} が停止しています。シークレット取得が不可能です。"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/service-down.md"

      # PostgreSQL 停止監視: DB 停止は全サービスに影響する
      - alert: PostgreSQLDown
        expr: up{job=~"postgres.*"} == 0
        for: 1m
        labels:
          severity: critical
          component: postgresql
        annotations:
          summary: "PostgreSQL が停止中"
          description: "PostgreSQL インスタンス {{ $labels.instance }} が停止しています。全 DB 依存サービスが影響を受けます。"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/service-down.md"

      # Kong API Gateway 停止監視: 全外部 API が到達不能になる
      - alert: KongDown
        expr: up{job=~"kong.*"} == 0
        for: 1m
        labels:
          severity: critical
          component: kong
        annotations:
          summary: "Kong API Gateway が停止中"
          description: "Kong インスタンス {{ $labels.instance }} が停止しています。全外部 API リクエストが失敗します。"
          runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/service-down.md"
