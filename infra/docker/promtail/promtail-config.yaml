# Promtail サーバー設定
server:
  http_listen_port: 9080

# ログ読み取り位置の永続化
positions:
  filename: /tmp/positions.yaml

# Loki へのプッシュ先
clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker コンテナログをファイルベースで収集する
  # セキュリティ上の理由から Docker ソケットではなくログファイルを直接マウントする
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/log/containers/*.log
    pipeline_stages:
      # JSON ログのパース
      - json:
          expressions:
            level: level
            trace_id: trace_id
            span_id: span_id
            msg: msg
            service: service
            stream: stream
      # パースした値をラベルとして付与
      - labels:
          level:
          trace_id:
          service:
