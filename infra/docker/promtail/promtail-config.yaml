# Promtail サーバー設定
server:
  http_listen_port: 9080

# ログ読み取り位置の永続化
positions:
  filename: /tmp/positions.yaml

# Loki へのプッシュ先
# L-06 監査対応: Docker Compose ネットワーク内では短縮ホスト名（サービス名）がサービス間通信の FQDN となる。
# ここでの "loki" は docker-compose.yaml で定義された Loki サービス名であり、
# Docker の内部 DNS が解決するため、これが Docker Compose 環境における正しい表記となる。
# Kubernetes 環境では loki.k1s0-system.svc.cluster.local のような FQDN を使用すること（Helm values 参照）。
clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker コンテナログをファイルベースで収集する
  # /var/lib/docker/containers をマウントすることで docker.sock 不要で収集できる
  # docker.sock マウントは Docker デーモンへの完全アクセス権を持つため廃止する（SC-2/M-5 監査対応）
  # /var/lib/docker/containers は Docker Desktop on Windows（Linux VM 内）でも利用可能
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      # Docker JSON ファイル形式（{"log":"...","stream":"...","time":"..."}）をパースする
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      # ログ出力内の JSON をさらにパースしてアプリケーションフィールドを取得する
      - json:
          source: output
          expressions:
            level: level
            trace_id: trace_id
            span_id: span_id
            msg: msg
            service: service
      # パースした値をラベルとして付与する
      - labels:
          level:
          trace_id:
          service:
          stream:
      # output フィールドをログ本体として出力する
      - output:
          source: output
