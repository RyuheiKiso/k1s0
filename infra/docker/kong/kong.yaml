# infra/docker/kong/kong.yaml（ローカル開発用 declarative config）
# 本番環境の infra/kong/kong.yaml とは異なり、docker-compose サービス名で接続する
_format_version: "3.0"

services:
  - name: auth-v1
    url: http://auth-rust:8080
    routes:
      - name: auth-token-route
        paths:
          - /api/v1/auth
        strip_path: false
      - name: auth-users-route
        paths:
          - /api/v1/users
        strip_path: false
      - name: auth-audit-route
        paths:
          - /api/v1/audit
        strip_path: false

  - name: config-v1
    url: http://config-rust:8080
    routes:
      - name: config-route
        paths:
          - /api/v1/config
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID
      credentials: true

  - name: rate-limiting
    config:
      minute: 5000
      policy: local
      fault_tolerant: true

  # JWT Plugin - Keycloak JWKS 連携（Docker用）
  - name: jwt
    config:
      uri_param_names: []
      cookie_names: []
      key_claim_name: kid
      claims_to_verify:
        - exp
      maximum_expiration: 900
      header_names:
        - Authorization

  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true

# Consumers - Keycloak JWKS 連携
consumers:
  - username: keycloak
    jwt_secrets:
      # H-1 対応: RS256 アルゴリズム使用時は rsa_public_key フィールドが必須（Kong 3.9.1 DBless モード起動要件）
      # H-16 監査対応: PEM ブロック内にコメント行やプレースホルダーを含めない（正規 PEM 形式を維持する）
      # 実運用では infra/kong/setup-kong-jwt.sh で Keycloak JWKS から取得した RSA 公開鍵に自動置換される
      - algorithm: RS256
        key: "http://keycloak:8080/realms/k1s0"
        # PEM 行長は64文字/行が標準（RFC 7468）。Kong はこれを厳密に検証するため、
        # 非標準の行長やコメント行が含まれると "invalid key" エラーでworkerがcrashする
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAywC/vol/IN3sHwV5iVgE
          4iaQXZbJGq9EOLHu7Z4w71EVEjFECsaMZHP0tQZgBIbVNNacxkEInDkooGbMcVdb
          bUvmMghbhYAPr+WCUSKOUQVkJKa4b+PGd1RriwyOhmd2edusWxTFH/so7Vur9Hbc
          16h+AxsnXMLM+LsFx3b2dT2RU1JEVzglp/6kcBJK5SiJBikPVL+aay0gZKwML3On
          onZr0q6Lfro1xY1H3LfyEXtXX/Gp72aY6oxzkDNKjFj5cKDg0I4CBZbED7fBM0SR
          lNYK15HYpsvezvyZj1A6gxZYqlTxxGrUcpJ90H/BU+m69O0M2v4YmzFZ6RQihd4T
          +QIDAQAB
          -----END PUBLIC KEY-----
