# infra/docker/kong/kong.yaml（ローカル開発用 declarative config）
# 本番環境の infra/kong/kong.yaml とは異なり、docker-compose サービス名で接続する
_format_version: "3.0"

services:
  - name: auth-v1
    url: http://auth-rust:8080
    routes:
      - name: auth-token-route
        paths:
          - /api/v1/auth
        strip_path: false
      - name: auth-users-route
        paths:
          - /api/v1/users
        strip_path: false
      - name: auth-audit-route
        paths:
          - /api/v1/audit
        strip_path: false

  - name: config-v1
    url: http://config-rust:8080
    routes:
      - name: config-route
        paths:
          - /api/v1/config
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID
      credentials: true

  - name: rate-limiting
    config:
      minute: 5000
      policy: local
      fault_tolerant: true

  # JWT Plugin - Keycloak JWKS 連携（Docker用）
  - name: jwt
    config:
      uri_param_names: []
      cookie_names: []
      key_claim_name: kid
      claims_to_verify:
        - exp
      maximum_expiration: 900
      header_names:
        - Authorization

  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true

# Consumers - Keycloak JWKS 連携
consumers:
  - username: keycloak
    jwt_secrets:
      # H-1 対応: RS256 アルゴリズム使用時は rsa_public_key フィールドが必須（Kong 3.9.1 DBless モード起動要件）
      - algorithm: RS256
        key: "http://keycloak:8080/realms/k1s0"
        # ローカル開発では Keycloak の内部URL を使用
        # JWKS URL: http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs
        # 実運用では keycloak:8080/realms/k1s0/protocol/openid-connect/certs から取得した RSA 公開鍵に差し替えること
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          # 開発環境用: keycloak:8080/realms/k1s0/protocol/openid-connect/certs
          # から取得した RSA 公開鍵を設定すること（RS256アルゴリズム使用時の必須フィールド）
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA2a2rwplBQLzHPZe5TNJF
          dKNlJOxrGvgBNEaMHQSQBQGQR0ZMjPQFGktflANE6gLROHFGM1PNMT0/zplFNAm
          vJ3F5udDyJolRQMVFiGnvWkXGXKFUCEKEOXQCCTbMBtMDFqHMq6mFQJmN5WQMXE
          ....placeholder_replace_with_actual_keycloak_public_key....
          QIDAQAB
          -----END PUBLIC KEY-----
