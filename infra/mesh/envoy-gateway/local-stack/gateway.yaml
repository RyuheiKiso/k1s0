# Gateway API v1: GatewayClass + Gateway + HTTPRoute (ADR-MIG-002)
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: k1s0-eg
  namespace: envoy-gateway-system
spec:
  gatewayClassName: eg
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tier3-portal
  namespace: k1s0-tier3
spec:
  parentRefs:
  - name: k1s0-eg
    namespace: envoy-gateway-system
  hostnames:
  - portal.k1s0.local
  rules:
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: portal-web-example-tier3-web
      port: 8080
