# 本ファイルは k1s0-tier1 namespace に envoy-grpcweb プロキシを deploy する。
# tier3 web (TS SDK / connect-es) → envoy-grpcweb → tier1 facade の grpc-web 翻訳経路。
# 設計: docs/02_構想設計/01_アーキテクチャ/、SHIP_STATUS F2 検証で kind 環境向けに整備。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-grpcweb
  namespace: k1s0-tier1
  labels:
    app: envoy-grpcweb
    k1s0.io/component: grpcweb-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy-grpcweb
  template:
    metadata:
      labels:
        app: envoy-grpcweb
        k1s0.io/component: grpcweb-proxy
    spec:
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.32.1
        imagePullPolicy: IfNotPresent
        args:
        - -c
        - /etc/envoy/envoy.yaml
        - --log-level
        - warn
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 65532
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: cfg
          mountPath: /etc/envoy
          readOnly: true
      volumes:
      - name: cfg
        configMap:
          name: envoy-grpcweb-config
