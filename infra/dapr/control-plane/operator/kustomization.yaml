# Dapr operator: Component / Subscription / Configuration CRD の reconcile を担当。
# Helm value override は ../values.yaml の `dapr_operator:` セクション。
# 本 kustomization は Sync Wave -8 を固定（CRD の後、placement/sentry より先）。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources: []
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-8"
