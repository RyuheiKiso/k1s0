# =============================================================================
# tier1 Workflow API の backing engine（workflow.temporal）
#
# 設計正典:
#   docs/05_実装/00_ディレクトリ設計/50_infraレイアウト/04_Dapr_Component配置.md
#   docs/02_構想設計/adr/ADR-RULE-002-temporal.md
#
# Temporal Frontend は別 Application として infra/data/temporal/（plan 04-XX）配下
# に配置予定。本 Component は frontend gRPC エンドポイントを Dapr Workflow API か
# ら参照する。
# =============================================================================
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: workflow-temporal
  namespace: k1s0-tier1
  labels:
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/component: dapr-component
spec:
  type: workflow.temporal
  version: v1
  metadata:
    - name: hostPort
      value: temporal-frontend.k1s0-data.svc.cluster.local:7233
    - name: namespace
      value: k1s0
    # mTLS 連携は SPIRE 発行 SVID を使う（plan 04-06）
    - name: caCert
      secretKeyRef:
        name: temporal-mtls-ca
        key: ca.crt
    - name: clientCert
      secretKeyRef:
        name: temporal-mtls-client
        key: tls.crt
    - name: clientKey
      secretKeyRef:
        name: temporal-mtls-client
        key: tls.key
auth:
  secretStore: vault
scopes:
  - tier1-facade-workflow
