# =============================================================================
# tier1 Binding API の SMTP output binding（bindings.smtp）
#
# 設計正典:
#   docs/05_実装/00_ディレクトリ設計/50_infraレイアウト/04_Dapr_Component配置.md
#
# テナント通知 / アラート配信 / 監査レポート送付の用途。
# =============================================================================
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: smtp-outbound
  namespace: k1s0-tier1
  labels:
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/component: dapr-component
spec:
  type: bindings.smtp
  version: v1
  metadata:
    # SMTP relay（採用組織が用意。dev は MailHog コンテナ、prod は SES / SendGrid 等）
    - name: host
      value: smtp.k1s0.example.com
    - name: port
      value: "587"
    # 認証情報（OpenBao）
    - name: user
      secretKeyRef:
        name: smtp-credentials
        key: user
    - name: password
      secretKeyRef:
        name: smtp-credentials
        key: password
    # 送信元アドレス（テナント単位で metadata 上書き可能）
    - name: emailFrom
      value: noreply@k1s0.example.com
    # STARTTLS 強制
    - name: skipTLSVerify
      value: "false"
    # output 専用（receive 機能は無効）
    - name: directionsList
      value: output
auth:
  secretStore: vault
scopes:
  - tier1-facade-state
