# =============================================================================
# tier1 Secrets API の backing store（secretstores.hashicorp.vault / OpenBao）
#
# 設計正典:
#   docs/05_実装/00_ディレクトリ設計/50_infraレイアウト/04_Dapr_Component配置.md
#   docs/02_構想設計/adr/ADR-SEC-001-secret-management.md（OpenBao 採用根拠）
#
# OpenBao は HashiCorp Vault との互換性を維持しているため、Dapr の vault component を
# そのまま利用できる。
# =============================================================================
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  # 他 Component の auth.secretStore で参照される名前（"vault" 固定）
  name: vault
  namespace: k1s0-tier1
  labels:
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/component: dapr-component
spec:
  type: secretstores.hashicorp.vault
  version: v1
  metadata:
    # OpenBao Service エンドポイント（infra/security/openbao/values.yaml）
    - name: vaultAddr
      value: https://openbao.k1s0-security.svc.cluster.local:8200
    # k1s0 用 KV エンジン mount path
    - name: enginePath
      value: kv/k1s0
    # 認証 method = Kubernetes Service Account JWT（SPIRE 発行 SVID）
    - name: vaultKVUsePrefix
      value: "true"
    - name: vaultKVPrefix
      value: k1s0
    # OpenBao の TLS 検証用 CA（cert-manager 内部 CA）
    - name: caPem
      secretKeyRef:
        name: openbao-ca
        key: ca.crt
    # SPIRE 発行 SVID JWT の audience
    - name: vaultTokenMountPath
      value: /var/run/secrets/k1s0/vault/token
# secretStore の auth は ServiceAccount JWT（SPIRE）を Pod に mount する形で外部化
scopes:
  - tier1-facade-secret
  - tier1-facade-state
