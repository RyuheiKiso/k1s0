# カナリアリリース用 VirtualService
# ヘッダーベースルーティングとウェイトベースのトラフィック分割を統合
# - x-canary: "true" ヘッダーがある場合はカナリアへ直接ルーティング
# - それ以外はウェイトベースで段階的にカナリアへルーティング
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: task-server
  namespace: k1s0-service
spec:
  hosts:
    - task-server
  http:
    # テスト用: ヘッダーでカナリアへ直接ルーティング
    - match:
        - headers:
            x-canary:
              exact: "true"
      route:
        - destination:
            host: task-server
            subset: canary
    # デフォルト: ウェイトベースで段階的にトラフィックを分割
    - route:
        - destination:
            host: task-server
            subset: stable
          weight: 90
        - destination:
            host: task-server
            subset: canary
          weight: 10
