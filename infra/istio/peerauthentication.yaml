# Mesh-wide PeerAuthentication: STRICT mTLS as default for the entire mesh.
# Defined in the service-mesh Namespace (istiod's Namespace) to enforce mTLS globally.
# TLS 1.3 を最低バージョンとして強制する（M-6）
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: service-mesh
spec:
  mtls:
    mode: STRICT
    minProtocolVersion: TLSV1_3
---
# observability Namespace は Namespace レベルで STRICT mTLS を強制する（H-01 対応）
# PERMISSIVE ではメトリクス通信が平文で許可されるため盗聴リスクがある。
# Prometheus の scrape ポート（15020: Istio envoy sidecar の admin metrics 集約ポート）のみ
# portLevelMtls で PERMISSIVE を例外許可し、それ以外は STRICT を維持する。
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: observability-mtls
  namespace: observability
spec:
  mtls:
    # Namespace 全体は STRICT mTLS を強制し、盗聴リスクを排除する
    mode: STRICT
  portLevelMtls:
    # Prometheus が Istio envoy sidecar からメトリクスを scrape する標準ポート（15020）のみ例外許可
    # このポートは Istio が集約した Prometheus 形式のメトリクスを提供するため plain HTTP が必要
    15020:
      mode: PERMISSIVE
---
# Namespace-level PeerAuthentication for defense-in-depth (multi-layer protection).
# These complement the mesh-wide STRICT mTLS default defined in the service-mesh
# Namespace (see サービスメッシュ設計.md). Even if the mesh-wide setting is
# accidentally modified, these Namespace-level settings act as a defense layer.
# TLS 1.3 を最低バージョンとして強制する（M-6）
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: k1s0-system
spec:
  mtls:
    mode: STRICT
    minProtocolVersion: TLSV1_3
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: k1s0-business
spec:
  mtls:
    mode: STRICT
    minProtocolVersion: TLSV1_3
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: k1s0-service
spec:
  mtls:
    mode: STRICT
    minProtocolVersion: TLSV1_3
