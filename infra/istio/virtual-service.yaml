# VirtualService 個別定義
#
# CRITICAL-K8S-002 監査対応: ワイルドカード hosts (*.svc.cluster.local) を廃止し、
# 各サービスを個別 VirtualService として定義する。
# ワイルドカードによる意図しないトラフィックルーティングを防止し、
# サービスごとの設定（タイムアウト・リトライ）を明示的に管理する。
#
# このファイルはディレクトリ構成図.md で定義された infra/istio/virtual-service.yaml に対応する。
#
# ============================================================
# レートリミットに関する注意
# ============================================================
# レートリミットの単一ソースオブトゥルース（SoT）は Kong API Gateway です。
# このファイルにレートリミット設定を追加してはなりません。
# 詳細: docs/infrastructure/rate-limiting-strategy.md
# ============================================================
#
# 詳細な個別設定は以下のファイルを参照:
#   - virtualservices/default.yaml   基本ルーティング（task-server の例）
#   - virtualservices/canary.yaml    カナリアリリース + ヘッダーベースルーティング
#   - virtualservices/mirror.yaml    トラフィックミラーリング
#   - fault-injection/delay.yaml     レイテンシ注入（staging 環境テスト用）
#   - fault-injection/abort.yaml     HTTP フォルト注入（staging 環境テスト用）
#
# Tier 別 Timeout / Retry デフォルト値（サービスメッシュ設計.md 参照）:
#   system:   timeout=5s,  retry=3, perTryTimeout=2s
#   business: timeout=10s, retry=3, perTryTimeout=3s
#   service:  timeout=15s, retry=2, perTryTimeout=5s

# ============================================================
# system Tier VirtualService 個別定義 (timeout=5s, retry=3, perTryTimeout=2s)
# ============================================================

---
# api-registry サービスの個別 VirtualService
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: api-registry
  namespace: k1s0-system
spec:
  hosts:
    - api-registry.k1s0-system.svc.cluster.local
  http:
    - route:
        - destination:
            host: api-registry.k1s0-system.svc.cluster.local
            port:
              number: 80
      timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: "5xx,reset,connect-failure"

