# verify 環境専用の Keycloak 認証情報 Secret
# このファイルに含まれる値はテスト専用の固定値であり、本番環境では絶対に使用しないこと。
# 本番環境の Keycloak 認証情報は HashiCorp Vault または External Secrets Operator で管理すること。
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secrets
  namespace: k1s0-system
type: Opaque
stringData:
  # Keycloak ブートストラップ管理者パスワード（verify 環境テスト用固定値）
  admin-password: "admin"
  # テスト用管理者ユーザーパスワード（verify 環境テスト用固定値）
  test-admin-password: "admin123"
  # テスト用一般ユーザーパスワード（verify 環境テスト用固定値）
  test-user-password: "user123"
