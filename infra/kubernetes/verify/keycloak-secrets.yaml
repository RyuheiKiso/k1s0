# ================================================================
# H-17 監査対応: verify 環境の Keycloak シークレットを ExternalSecret に移行
#
# External Secrets Operator (ESO) を使用して HashiCorp Vault から
# 実行時にシークレットを取得する。平文パスワードをリポジトリにコミットしない。
#
# 【前提条件】
#   - verify クラスターに ESO (external-secrets.io) がインストールされていること
#   - ClusterSecretStore "vault-backend" が設定済みであること
#     (infra/kubernetes/security/external-secrets-store.yaml を参照)
#   - Vault の以下のパスにシークレットが設定済みであること:
#       vault kv put secret/k1s0/verify/keycloak \
#         admin-password="<strong-password>" \
#         test-admin-password="<test-password>" \
#         test-user-password="<test-password>"
#
# 【verify 環境のシークレット初期設定手順】
#   1. Vault を起動して以下のコマンドでシークレットを登録する:
#      vault kv put secret/k1s0/verify/keycloak \
#        admin-password="$(openssl rand -base64 24)" \
#        test-admin-password="$(openssl rand -base64 16)" \
#        test-user-password="$(openssl rand -base64 16)"
#   2. kubectl apply -f infra/kubernetes/verify/keycloak-secrets.yaml
#   3. ESO が ExternalSecret を検知して keycloak-secrets Secret を自動生成する
#
# 【本番環境】
#   本番環境でも同様に Vault パス secret/k1s0/production/keycloak を使用すること。
# ================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-secrets
  namespace: k1s0-system
  annotations:
    # verify 環境専用の ExternalSecret。本番環境では production 用のパスを使用すること。
    k1s0.io/environment: "verify"
spec:
  # シークレットの更新間隔（Vault の値が変更された場合に自動同期する）
  refreshInterval: 1h
  secretStoreRef:
    # ClusterSecretStore は infra/kubernetes/security/external-secrets-store.yaml で定義
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: keycloak-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: admin-password
      remoteRef:
        key: secret/data/k1s0/verify/keycloak
        property: admin-password
    - secretKey: test-admin-password
      remoteRef:
        key: secret/data/k1s0/verify/keycloak
        property: test-admin-password
    - secretKey: test-user-password
      remoteRef:
        key: secret/data/k1s0/verify/keycloak
        property: test-user-password
