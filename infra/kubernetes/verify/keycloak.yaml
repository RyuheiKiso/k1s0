# このファイルは verify（検証）環境専用の Keycloak 設定です。
# 含まれる資格情報はテスト用であり、本番環境では使用しないでください。
# 本番環境の Keycloak 設定は infra/kubernetes/production/ を参照。
#
# NOTE: Docker版 (infra/docker/keycloak/k1s0-realm.json) を正本とし、
# この設定はそれに同期して管理する。差分が出た場合はDocker版を基に更新する。
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: k1s0-system
data:
  k1s0-realm.json: |
    {
      "realm": "k1s0",
      "enabled": true,
      "displayName": "k1s0",
      "sslRequired": "external",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "bruteForceProtected": true,
      "permanentLockout": false,
      "maxFailureWaitSeconds": 900,
      "minimumQuickLoginWaitSeconds": 60,
      "waitIncrementSeconds": 60,
      "quickLoginCheckMilliSeconds": 1000,
      "maxDeltaTimeSeconds": 43200,
      "failureFactor": 5,
      "accessTokenLifespan": 900,
      "accessTokenLifespanForImplicitFlow": 900,
      "ssoSessionIdleTimeout": 1800,
      "ssoSessionMaxLifespan": 604800,
      "revokeRefreshToken": true,
      "refreshTokenMaxReuse": 0,
      "offlineSessionIdleTimeout": 2592000,
      "offlineSessionMaxLifespan": 5184000,
      "accessCodeLifespan": 60,
      "accessCodeLifespanUserAction": 300,
      "accessCodeLifespanLogin": 1800,
      "actionTokenGeneratedByAdminLifespan": 43200,
      "actionTokenGeneratedByUserLifespan": 300,
      "oauth2DeviceCodeLifespan": 600,
      "oauth2DevicePollingInterval": 5,
      "defaultSignatureAlgorithm": "RS256",
      "roles": {
        "realm": [
          { "name": "biz_admin",              "description": "Business tier full access",                       "composite": false },
          { "name": "biz_operator",           "description": "Business tier read/write access",                 "composite": false },
          { "name": "biz_auditor",            "description": "Business tier read-only access",                  "composite": false },
          { "name": "user",                   "description": "Default user role",                               "composite": false },
          { "name": "sys_admin",              "description": "System administrator - full access",              "composite": false },
          { "name": "sys_operator",           "description": "System operator - monitoring and configuration",  "composite": false },
          { "name": "sys_auditor",            "description": "System auditor - read-only access",               "composite": false },
          { "name": "biz_taskmanagement_admin",   "description": "Task management domain administrator",           "composite": false },
          { "name": "biz_taskmanagement_manager", "description": "Task management domain manager",               "composite": false },
          { "name": "biz_taskmanagement_viewer",  "description": "Task management domain viewer",                "composite": false },
          { "name": "svc_task_admin",          "description": "Task service administrator",                     "composite": false },
          { "name": "svc_task_user",           "description": "Task service user",                              "composite": false },
          { "name": "svc_task_viewer",         "description": "Task service viewer",                            "composite": false },
          { "name": "svc_board_admin",         "description": "Board service administrator",                    "composite": false },
          { "name": "svc_board_user",          "description": "Board service user",                             "composite": false },
          { "name": "svc_activity_admin",      "description": "Activity service administrator",                 "composite": false },
          { "name": "svc_activity_user",       "description": "Activity service user",                         "composite": false },
          { "name": "svc_activity_viewer",     "description": "Activity service viewer",                       "composite": false },
          { "name": "svc_internal",           "description": "Service-to-service internal role",                "composite": false }
        ]
      },
      "clients": [
        {
          "clientId": "react-spa",
          "name": "React SPA Client",
          "enabled": true,
          "publicClient": true,
          "directAccessGrantsEnabled": false,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "protocol": "openid-connect",
          "redirectUris": [
            "https://app.k1s0.internal.example.com/callback",
            "http://localhost:3000/callback",
            "http://localhost:5173/callback"
          ],
          "webOrigins": [
            "https://*.k1s0.internal.example.com",
            "http://localhost:3000",
            "http://localhost:5173"
          ],
          "attributes": { "pkce.code.challenge.method": "S256" },
          "defaultClientScopes": ["openid", "profile", "email"],
          "protocolMappers": [
            {
              "name": "tier-access-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-hardcoded-claim-mapper",
              "config": {
                "claim.name": "tier_access",
                "claim.value": "[\"system\", \"business\", \"service\"]",
                "jsonType.label": "JSON",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "realm-roles-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "config": {
                "claim.name": "realm_access.roles",
                "jsonType.label": "String",
                "multivalued": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "k1s0-api-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.custom.audience": "k1s0-api",
                "id.token.claim": "false",
                "access.token.claim": "true"
              }
            }
          ]
        },
        {
          "clientId": "flutter-mobile",
          "name": "Flutter Mobile Client",
          "enabled": true,
          "publicClient": true,
          "directAccessGrantsEnabled": false,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "protocol": "openid-connect",
          "redirectUris": ["com.example.k1s0://callback"],
          "attributes": { "pkce.code.challenge.method": "S256" },
          "defaultClientScopes": ["openid", "profile", "email"],
          "protocolMappers": [
            {
              "name": "tier-access-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-hardcoded-claim-mapper",
              "config": {
                "claim.name": "tier_access",
                "claim.value": "[\"system\", \"business\", \"service\"]",
                "jsonType.label": "JSON",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "k1s0-api-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.custom.audience": "k1s0-api",
                "id.token.claim": "false",
                "access.token.claim": "true"
              }
            }
          ]
        },
        {
          "clientId": "k1s0-cli",
          "name": "k1s0 CLI Client",
          "enabled": true,
          "publicClient": true,
          "directAccessGrantsEnabled": false,
          "standardFlowEnabled": false,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "protocol": "openid-connect",
          "attributes": {
            "oauth2.device.authorization.grant.enabled": "true",
            "oauth2.device.polling.interval": "5"
          },
          "defaultClientScopes": ["openid", "profile", "email"],
          "protocolMappers": [
            {
              "name": "tier-access-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-hardcoded-claim-mapper",
              "config": {
                "claim.name": "tier_access",
                "claim.value": "[\"system\", \"business\", \"service\"]",
                "jsonType.label": "JSON",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "k1s0-api-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.custom.audience": "k1s0-api",
                "id.token.claim": "false",
                "access.token.claim": "true"
              }
            }
          ]
        },
        {
          "clientId": "k1s0-bff",
          "name": "k1s0 BFF Proxy Client",
          "enabled": true,
          "publicClient": false,
          "directAccessGrantsEnabled": false,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "protocol": "openid-connect",
          "secret": "${KEYCLOAK_BFF_CLIENT_SECRET}",
          "redirectUris": [
            "https://app.k1s0.internal.example.com/callback",
            "http://localhost:3000/callback"
          ],
          "webOrigins": [
            "https://*.k1s0.internal.example.com",
            "http://localhost:3000"
          ],
          "attributes": { "pkce.code.challenge.method": "S256" },
          "defaultClientScopes": ["openid", "profile", "email"],
          "protocolMappers": [
            {
              "name": "tier-access-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-hardcoded-claim-mapper",
              "config": {
                "claim.name": "tier_access",
                "claim.value": "[\"system\", \"business\", \"service\"]",
                "jsonType.label": "JSON",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ]
        },
        {
          "clientId": "k1s0-service",
          "name": "k1s0 Service-to-Service Client",
          "enabled": true,
          "publicClient": false,
          "directAccessGrantsEnabled": false,
          "standardFlowEnabled": false,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": true,
          "protocol": "openid-connect",
          "secret": "${KEYCLOAK_SERVICE_CLIENT_SECRET}",
          "defaultClientScopes": ["openid"],
          "protocolMappers": [
            {
              "name": "tier-access-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-hardcoded-claim-mapper",
              "config": {
                "claim.name": "tier_access",
                "claim.value": "[\"system\", \"business\", \"service\"]",
                "jsonType.label": "JSON",
                "id.token.claim": "false",
                "access.token.claim": "true",
                "userinfo.token.claim": "false"
              }
            },
            {
              "name": "k1s0-api-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.custom.audience": "k1s0-api",
                "id.token.claim": "false",
                "access.token.claim": "true"
              }
            },
            {
              "name": "realm-roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "config": {
                "multivalued": "true",
                "claim.name": "realm_access.roles",
                "jsonType.label": "String",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ],
          "defaultRoles": ["svc_internal"]
        },
        {
          "clientId": "auth-server",
          "name": "AuthServer",
          "enabled": true,
          "protocol": "openid-connect",
          "bearerOnly": true,
          "publicClient": false,
          "directAccessGrantsEnabled": false,
          "standardFlowEnabled": false,
          "serviceAccountsEnabled": true,
          "defaultClientScopes": ["openid", "profile", "email"]
        },
        {
          "clientId": "config-server",
          "name": "ConfigServer",
          "enabled": true,
          "protocol": "openid-connect",
          "bearerOnly": true,
          "publicClient": false,
          "directAccessGrantsEnabled": false,
          "standardFlowEnabled": false,
          "serviceAccountsEnabled": true,
          "defaultClientScopes": ["openid", "profile", "email"]
        }
      ],
      "clientScopes": [
        {
          "name": "openid",
          "protocol": "openid-connect",
          "attributes": { "include.in.token.scope": "true" },
          "protocolMappers": [
            {
              "name": "sub",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-sub-mapper",
              "config": {
                "access.token.claim": "true",
                "id.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "k1s0-api-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.custom.audience": "k1s0-api",
                "id.token.claim": "false",
                "access.token.claim": "true"
              }
            }
          ]
        },
        {
          "name": "profile",
          "protocol": "openid-connect",
          "attributes": { "include.in.token.scope": "true" },
          "protocolMappers": [
            {
              "name": "username",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "config": {
                "user.attribute": "username",
                "claim.name": "preferred_username",
                "jsonType.label": "String",
                "access.token.claim": "true",
                "id.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ]
        },
        {
          "name": "email",
          "protocol": "openid-connect",
          "attributes": { "include.in.token.scope": "true" },
          "protocolMappers": [
            {
              "name": "email",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-property-mapper",
              "config": {
                "user.attribute": "email",
                "claim.name": "email",
                "jsonType.label": "String",
                "access.token.claim": "true",
                "id.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
      ],
      "users": [
        {
          "username": "test-admin",
          "email": "admin@k1s0.dev",
          "firstName": "Test",
          "lastName": "Admin",
          "enabled": true,
          "emailVerified": true,
          "credentials": [{ "type": "password", "value": "admin123", "temporary": false }],
          "realmRoles": ["user", "sys_admin"]
        },
        {
          "username": "test-user",
          "email": "user@k1s0.dev",
          "firstName": "Test",
          "lastName": "User",
          "enabled": true,
          "emailVerified": true,
          "credentials": [{ "type": "password", "value": "user123", "temporary": false }],
          "realmRoles": ["user"]
        },
      ],
      "components": {
        "org.keycloak.keys.KeyProvider": [
          {
            "name": "rsa-generated",
            "providerId": "rsa-generated",
            "config": {
              "keySize": ["2048"],
              "algorithm": ["RS256"],
              "priority": ["100"]
            }
          }
        ]
      },
      "browserSecurityHeaders": {
        "contentSecurityPolicyReportOnly": "",
        "xContentTypeOptions": "nosniff",
        "xRobotsTag": "none",
        "xFrameOptions": "SAMEORIGIN",
        "contentSecurityPolicy": "frame-src 'self'; frame-ancestors 'self'; object-src 'none';",
        "xXSSProtection": "1; mode=block",
        "strictTransportSecurity": "max-age=31536000; includeSubDomains"
      },
      "smtpServer": {},
      "eventsEnabled": true,
      "eventsListeners": ["jboss-logging"],
      "enabledEventTypes": [
        "LOGIN", "LOGIN_ERROR", "LOGOUT",
        "REGISTER", "REGISTER_ERROR",
        "CODE_TO_TOKEN", "CODE_TO_TOKEN_ERROR",
        "CLIENT_LOGIN", "CLIENT_LOGIN_ERROR",
        "REFRESH_TOKEN", "REFRESH_TOKEN_ERROR",
        "REVOKE_GRANT", "UPDATE_PROFILE", "UPDATE_PASSWORD",
        "SEND_RESET_PASSWORD", "RESET_PASSWORD"
      ],
      "adminEventsEnabled": true,
      "adminEventsDetailsEnabled": true
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: k1s0-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          args:
            - start-dev
            - --import-realm
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "admin"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: "admin"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /realms/k1s0
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: k1s0-system
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
