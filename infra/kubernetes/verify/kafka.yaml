apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: k1s0-system
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      securityContext:
        fsGroup: 1000
      # k8sサービス環境変数(KAFKA_PORT等)がKafka設定と衝突しうるため無効化
      enableServiceLinks: false
      containers:
        - name: kafka
          image: apache/kafka:3.8.0
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka-0.kafka.k1s0-system.svc.cluster.local:9093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.k1s0-system.svc.cluster.local:9092"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            # MED-14 監査対応: PLAINTEXT 通信は verify（テスト専用）環境のみで許容する。
            # 本番環境では KAFKA_LISTENER_SECURITY_PROTOCOL_MAP を
            # "CONTROLLER:PLAINTEXT,SSL:SSL" または "CONTROLLER:PLAINTEXT,SASL_SSL:SASL_SSL" に変更し、
            # ポート 9093（TLS）への移行が必要。
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: CLUSTER_ID
              value: "5L6g3nShT-eMCtK--X86sw"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
          ports:
            - containerPort: 9092
            - containerPort: 9093
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka
          # HIGH-13 監査対応: verify 環境のリソース制限を追加してスケジューラーへの適切なヒントを提供する
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "bash -lc 'kafka-broker-api-versions.sh --bootstrap-server localhost:9092'"
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
          # HIGH-12 監査対応: livenessProbe を追加してメインプロセス停止後のゾンビ状態を検出する
          # readinessProbe のみでは kafka プロセスがハングしても Kubernetes が再起動しない
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - "bash -lc 'kafka-broker-api-versions.sh --bootstrap-server localhost:9092'"
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: kafka-data
          # verify 環境はテスト後にクリーンな状態に戻すことが目的のため、
          # データの永続化は不要。emptyDir を使用してテスト間のデータ汚染を防ぐ。
          # 本番環境では PersistentVolumeClaim を使用すること。
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: k1s0-system
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
