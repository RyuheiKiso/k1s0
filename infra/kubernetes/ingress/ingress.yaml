# ExternalName サービス: ingress -> k1s0-system の Kong Proxy
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
  namespace: ingress
spec:
  type: ExternalName
  externalName: kong-proxy.k1s0-system.svc.cluster.local
---
# ExternalName サービス: ingress -> observability の Grafana
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: ingress
spec:
  type: ExternalName
  externalName: grafana.observability.svc.cluster.local
---
# Ingress リソース: 外部 HTTPS トラフィックを Kong Proxy および Grafana にルーティングする。
# cert-manager により TLS 証明書を自動発行・更新する（internal-ca ClusterIssuer を使用）。
# Grafana エンドポイントには Kong key-auth プラグインによる API キー認証を適用し、
# 認証なしでの Grafana UI へのアクセスを防止する（L-15 対応）。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k1s0-ingress
  namespace: ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "internal-ca"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "*.k1s0.internal.example.com"
      secretName: k1s0-tls
  rules:
    - host: api.k1s0.internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong-proxy          # ExternalName -> kong-proxy.k1s0-system
                port:
                  number: 80
    # Grafana ルール: Kong Ingress Controller の key-auth プラグインを適用して認証を強制する。
    # konghq.com/plugins アノテーションにより Kong プラグインを Ingress ルール単位で紐付ける（L-15 対応）。
    - host: grafana.k1s0.internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana             # ExternalName -> grafana.observability
                port:
                  number: 3000
---
# Grafana Ingress 専用リソース: Kong key-auth プラグインを annotation で適用するために分離する。
# nginx Ingress と Kong プラグインを同一 Ingress オブジェクトに混在させると
# ingressClassName: nginx が Kong アノテーションを無視するため、
# Kong プラグイン適用が必要なルートは Kong Ingress Controller 用に分離する（L-15 対応）。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k1s0-grafana-ingress
  namespace: ingress
  annotations:
    # Kong Ingress Controller に対して key-auth プラグインを適用する。
    # API キー認証を強制し、未認証アクセスを 401 で拒否する。
    konghq.com/plugins: key-auth
    cert-manager.io/cluster-issuer: "internal-ca"
spec:
  # Kong Ingress Controller 経由でルーティングし、プラグイン機能を有効化する
  ingressClassName: kong
  tls:
    - hosts:
        - "grafana.k1s0.internal.example.com"
      secretName: k1s0-grafana-tls
  rules:
    - host: grafana.k1s0.internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana             # ExternalName -> grafana.observability
                port:
                  number: 3000
