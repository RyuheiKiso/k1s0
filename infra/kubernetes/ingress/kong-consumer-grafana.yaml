# Grafana 用 KongConsumer リソース（MEDIUM-INFRA-02 監査対応）
# ingress.yaml の key-auth プラグインに対応するコンシューマー定義
# 本番環境では apiKey を Kubernetes Secret から参照し、Vault / SealedSecret で管理すること
---
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: grafana-consumer
  namespace: ingress
  annotations:
    kubernetes.io/ingress.class: kong
username: grafana-monitor
credentials:
  - grafana-key-auth-secret
---
# Grafana API キー Secret テンプレート
# L-012 監査対応: プレースホルダーが残ったままデプロイされることを防止する
# CI パイプラインで以下コマンドによりプレースホルダーが存在しないことを確認すること:
#   grep -r "DEPLOY_BLOCKED_PLACEHOLDER" infra/kubernetes/ && exit 1 || exit 0
# 本番環境では External Secrets Operator または Vault Agent Injector を使用して
# Kubernetes Secret を自動生成・注入すること。このファイルを直接 apply しないこと。
# 推奨: infra/kubernetes/ingress/kustomization.yaml で ExternalSecret リソースに置き換える
# 参照: docs/architecture/adr/0090-external-secrets.md
apiVersion: v1
kind: Secret
metadata:
  name: grafana-key-auth-secret
  namespace: ingress
  labels:
    konghq.com/credential: key-auth
  annotations:
    # L-012 監査対応: このアノテーションは本番デプロイ前に External Secrets Operator の
    # ExternalSecret リソースに置き換えること。プレースホルダーのまま apply 禁止。
    k1s0.io/secret-source: "vault:secret/data/k1s0/observability/grafana:api_key"
type: Opaque
stringData:
  # DEPLOY_BLOCKED_PLACEHOLDER: このファイルを直接 kubectl apply してはならない
  # CD パイプラインで Vault / External Secrets Operator により自動注入されること
  # ローカルテスト用に手動設定する場合: kubectl create secret generic grafana-key-auth-secret \
  #   --from-literal=key="<実際のAPIキー>" --namespace=ingress
  key: "DEPLOY_BLOCKED_PLACEHOLDER"
