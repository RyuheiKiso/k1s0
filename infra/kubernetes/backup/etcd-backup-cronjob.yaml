apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-backup
  namespace: k1s0-system
  labels:
    app: etcd-backup
    tier: system
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: etcd-backup
        spec:
          restartPolicy: OnFailure
          # L-07監査対応: 過剰権限集約を避けるため、etcd専用ServiceAccountを使用する
          serviceAccountName: etcd-backup-sa
          hostNetwork: true
          containers:
            - name: etcd-backup
              image: registry.k8s.io/etcd:3.5.12-0
              # セキュリティ強化: 非rootユーザーで実行し、特権昇格とLinuxケーパビリティを無効化
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR="/backup/etcd"
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="${BACKUP_DIR}/etcd-snapshot-${TIMESTAMP}.db"

                  mkdir -p "${BACKUP_DIR}"

                  # etcd スナップショット取得
                  etcdctl snapshot save "${BACKUP_FILE}" \
                    --endpoints=https://127.0.0.1:2379 \
                    --cacert=/etc/kubernetes/pki/etcd/ca.crt \
                    --cert=/etc/kubernetes/pki/etcd/healthcheck-client.crt \
                    --key=/etc/kubernetes/pki/etcd/healthcheck-client.key

                  # スナップショット検証
                  etcdctl snapshot status "${BACKUP_FILE}" --write-out=table

                  # 30日より古いバックアップを削除
                  find "${BACKUP_DIR}" -name "etcd-snapshot-*.db" -mtime +30 -delete

                  echo "etcd backup completed: ${BACKUP_FILE}"

                  # S3オフサイトバックアップ: 災害復旧のためリモートストレージにコピー
                  # --sse aws:kms: C-03監査対応。保存データをAWS KMSで暗号化し、
                  # etcdスナップショット（クラスタ全状態を含む高機密データ）の
                  # 機密性を保護する（平文保存禁止ポリシー準拠）
                  echo "Uploading etcd backup to S3..."
                  aws s3 cp "${BACKUP_FILE}" "s3://${S3_BUCKET}/etcd/etcd-snapshot-${TIMESTAMP}.db" \
                    --endpoint-url "${S3_ENDPOINT}" \
                    --no-progress \
                    --sse aws:kms
                  echo "S3 upload completed: s3://${S3_BUCKET}/etcd/etcd-snapshot-${TIMESTAMP}.db"
              env:
                - name: ETCDCTL_API
                  value: "3"
                # S3オフサイトバックアップ用の認証情報とエンドポイント設定
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-credentials
                      key: bucket
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-credentials
                      key: endpoint
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-credentials
                      key: access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-credentials
                      key: secret-access-key
              volumeMounts:
                - name: etcd-certs
                  mountPath: /etc/kubernetes/pki/etcd
                  readOnly: true
                - name: backup-volume
                  mountPath: /backup
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: etcd-certs
              hostPath:
                path: /etc/kubernetes/pki/etcd
                type: Directory
            - name: backup-volume
              persistentVolumeClaim:
                claimName: backup-pvc
