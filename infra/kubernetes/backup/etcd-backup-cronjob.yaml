# etcd スナップショットバックアップ用 CronJob
# 毎日 02:00 UTC に etcd のスナップショットを取得し、永続ボリュームに保存する。
# HIGH-2 監査対応: seccompProfile, readOnlyRootFilesystem, hostNetwork 除去によりセキュリティを強化する。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-backup
  namespace: k1s0-system
  labels:
    app: etcd-backup
    tier: system
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: etcd-backup
        spec:
          restartPolicy: OnFailure
          # L-07監査対応: 過剰権限集約を避けるため、etcd専用ServiceAccountを使用する
          serviceAccountName: etcd-backup-sa
          # HIGH-2 監査対応: hostNetwork を無効化し、コンテナが不必要にホストネットワークにアクセスしないようにする
          # etcd エンドポイント 127.0.0.1:2379 は hostPath 経由で証明書を使用するため hostNetwork は不要
          hostNetwork: false
          containers:
            - name: etcd-backup
              image: registry.k8s.io/etcd:3.5.12-0
              # HIGH-2 監査対応: seccompProfile を RuntimeDefault に設定してシステムコールを制限する
              # readOnlyRootFilesystem を有効化し、ルートファイルシステムへの書き込みを禁止する
              # バックアップスクリプトの書き込み先は emptyDir ボリューム（tmp-dir）を使用する
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop: ["ALL"]
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR="/backup/etcd"
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="${BACKUP_DIR}/etcd-snapshot-${TIMESTAMP}.db"

                  mkdir -p "${BACKUP_DIR}"

                  # etcd スナップショット取得
                  etcdctl snapshot save "${BACKUP_FILE}" \
                    --endpoints=https://127.0.0.1:2379 \
                    --cacert=/etc/kubernetes/pki/etcd/ca.crt \
                    --cert=/etc/kubernetes/pki/etcd/healthcheck-client.crt \
                    --key=/etc/kubernetes/pki/etcd/healthcheck-client.key

                  # スナップショット検証
                  etcdctl snapshot status "${BACKUP_FILE}" --write-out=table

                  # 30日より古いバックアップを削除
                  find "${BACKUP_DIR}" -name "etcd-snapshot-*.db" -mtime +30 -delete

                  echo "etcd backup completed: ${BACKUP_FILE}"
              env:
                - name: ETCDCTL_API
                  value: "3"
              volumeMounts:
                - name: etcd-certs
                  mountPath: /etc/kubernetes/pki/etcd
                  readOnly: true
                - name: backup-volume
                  mountPath: /backup
                # HIGH-2 監査対応: readOnlyRootFilesystem 有効化に伴い、
                # スクリプト実行時の一時ファイル書き込み先として emptyDir を提供する
                - name: tmp-dir
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: etcd-certs
              # etcd 証明書マウント（HIGH-SEC-01 監査対応）
              # hostPath マウントは etcd バックアップに必要。以下のハードニングを適用:
              # - readOnly: true で書き込み不可
              # - runAsNonRoot: true, readOnlyRootFilesystem: true
              # - capabilities: drop ALL
              # - seccompProfile: RuntimeDefault
              hostPath:
                path: /etc/kubernetes/pki/etcd
                type: Directory
            - name: backup-volume
              persistentVolumeClaim:
                claimName: backup-pvc
            # HIGH-2 監査対応: readOnlyRootFilesystem 有効時にスクリプトが /tmp に書き込めるよう emptyDir を追加する
            - name: tmp-dir
              emptyDir: {}
