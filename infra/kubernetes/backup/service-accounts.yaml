# バックアップ操作用の個別ServiceAccount定義（L-07監査対応）
# 目的: 最小権限の原則（Principle of Least Privilege）に基づき、
#       単一の backup-operator ServiceAccount に集約されていた権限を分離する。
#       各バックアップジョブは自身の操作に必要な最小限の権限のみを持つ専用SAを使用する。
# 関連: infra/kubernetes/backup/ 配下の各CronJobファイル
---
# K8S-MED-003 監査対応: バックアップ専用SAはKubernetes APIへのアクセスが不要なためautomountServiceAccountToken: false を設定する
# Vault バックアップ専用 ServiceAccount
# Vault Raft スナップショット取得操作（vault operator raft snapshot save）に必要な権限のみを付与する
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-backup-sa
  namespace: k1s0-system
  labels:
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # このSAの用途: Vault Raftスナップショットの定期取得（毎日01:00 UTC）
    k1s0.io/purpose: "vault-backup"
    k1s0.io/audit-ref: "L-07"
automountServiceAccountToken: false
---
# K8S-MED-003 監査対応: バックアップ専用SAはKubernetes APIへのアクセスが不要なためautomountServiceAccountToken: false を設定する
# PostgreSQL バックアップ専用 ServiceAccount
# dev/staging環境のPostgreSQL pg_dump操作に必要な権限のみを付与する
# 本番環境はinfra/terraform/modules/database/backup.tf で管理する
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-backup-sa
  namespace: k1s0-system
  labels:
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # このSAの用途: PostgreSQLダンプの定期取得（毎日03:00 UTC、dev/stagingのみ）
    k1s0.io/purpose: "postgres-backup"
    k1s0.io/audit-ref: "L-07"
automountServiceAccountToken: false
---
# K8S-MED-003 監査対応: バックアップ専用SAはKubernetes APIへのアクセスが不要なためautomountServiceAccountToken: false を設定する
# etcd バックアップ専用 ServiceAccount
# etcd スナップショット取得操作（etcdctl snapshot save）に必要な権限のみを付与する
# hostNetworkを使用するため、Podレベルのネットワーク権限に注意すること
apiVersion: v1
kind: ServiceAccount
metadata:
  name: etcd-backup-sa
  namespace: k1s0-system
  labels:
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # このSAの用途: etcdスナップショットの定期取得（毎日02:00 UTC）
    k1s0.io/purpose: "etcd-backup"
    k1s0.io/audit-ref: "L-07"
automountServiceAccountToken: false
---
# K8S-MED-003 監査対応: バックアップ専用SAはKubernetes APIへのアクセスが不要なためautomountServiceAccountToken: false を設定する
# Harbor バックアップ専用 ServiceAccount
# Harbor データベース（PostgreSQL）の pg_dump操作に必要な権限のみを付与する
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-backup-sa
  namespace: k1s0-system
  labels:
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # このSAの用途: Harbor DBダンプの定期取得（毎週日曜04:00 UTC）
    k1s0.io/purpose: "harbor-backup"
    k1s0.io/audit-ref: "L-07"
automountServiceAccountToken: false
---
# K8S-MED-003 監査対応: バックアップ専用SAはKubernetes APIへのアクセスが不要なためautomountServiceAccountToken: false を設定する
# Ceph RBD スナップショット専用 ServiceAccount
# Ceph RBD スナップショット作成・管理操作に必要な権限のみを付与する
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ceph-backup-sa
  namespace: k1s0-system
  labels:
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # このSAの用途: Ceph RBDスナップショットの定期作成（毎日01:00 UTC）
    k1s0.io/purpose: "ceph-backup"
    k1s0.io/audit-ref: "L-07"
automountServiceAccountToken: false
