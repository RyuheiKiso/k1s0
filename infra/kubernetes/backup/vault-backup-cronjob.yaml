apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-backup
  namespace: k1s0-system
  labels:
    app: vault-backup
    tier: system
spec:
  schedule: "0 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: vault-backup
        spec:
          restartPolicy: OnFailure
          # L-07監査対応: 過剰権限集約を避けるため、Vault専用ServiceAccountを使用する
          serviceAccountName: vault-backup-sa
          containers:
            - name: vault-backup
              # Vault Raft スナップショットを PVC（/backup）に保存する。S3 依存なし。
              # MED-11 監査対応: restore-test-cronjob と同一バージョン（1.19）に統一する。
              # バックアップと復元テストのバージョン不一致は復元テストが本番バックアップを正確に再現しないリスクがある。
              image: hashicorp/vault:1.19
              # セキュリティ強化: 非rootユーザーで実行し、特権昇格とLinuxケーパビリティを無効化
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR="/backup/vault"
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="${BACKUP_DIR}/vault-raft-${TIMESTAMP}.snap"

                  mkdir -p "${BACKUP_DIR}"

                  # Vault Raft スナップショット取得
                  echo "Taking Vault Raft snapshot..."
                  vault operator raft snapshot save "${BACKUP_FILE}"

                  # スナップショットサイズ確認
                  SNAP_SIZE=$(du -h "${BACKUP_FILE}" | cut -f1)
                  echo "Vault snapshot completed: ${BACKUP_FILE} (${SNAP_SIZE})"

                  # 30日より古いバックアップを削除
                  find "${BACKUP_DIR}" -name "vault-raft-*.snap" -mtime +30 -delete

                  echo "Vault backup completed."
              env:
                - name: VAULT_ADDR
                  value: "https://vault.k1s0-system.svc.cluster.local:8200"
                # L-02 監査対応: トークンの TTL は最小権限の原則に従い短く設定すること。
                # 推奨 TTL: 1h（バックアップジョブの最大実行時間 600s より十分長く、
                # かつ漏洩時のリスクを最小化する）。
                # トークンは Vault の token renewal ポリシーでローテーションし、
                # CronJob 実行ごとに新しいトークンを動的に発行する運用を推奨する。
                # 参考: Vault Token TTL — https://developer.hashicorp.com/vault/docs/concepts/tokens#token-time-to-live-periodic-tokens-and-explicit-max-ttls
                - name: VAULT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: vault-backup-credentials
                      key: token
                - name: VAULT_CACERT
                  value: "/vault/tls/ca.crt"
              volumeMounts:
                - name: backup-volume
                  mountPath: /backup
                - name: vault-tls
                  mountPath: /vault/tls
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: backup-volume
              persistentVolumeClaim:
                claimName: backup-pvc
            - name: vault-tls
              secret:
                secretName: vault-tls-cert
