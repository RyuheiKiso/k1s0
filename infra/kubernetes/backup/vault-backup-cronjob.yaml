apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-backup
  namespace: k1s0-system
  labels:
    app: vault-backup
    tier: system
spec:
  schedule: "0 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: vault-backup
        spec:
          restartPolicy: OnFailure
          # L-07監査対応: 過剰権限集約を避けるため、Vault専用ServiceAccountを使用する
          serviceAccountName: vault-backup-sa
          containers:
            - name: vault-backup
              # AWS CLI 付きイメージを使用: バックアップスクリプトで aws s3 cp を実行するため、
              # vault CLI と AWS CLI の両方が必要。hashicorp/vault には AWS CLI が含まれないため
              # amazon/aws-cli ベースのカスタムイメージに変更する
              image: k1s0/vault-backup:1.17-awscli
              # セキュリティ強化: 非rootユーザーで実行し、特権昇格とLinuxケーパビリティを無効化
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR="/backup/vault"
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="${BACKUP_DIR}/vault-raft-${TIMESTAMP}.snap"

                  mkdir -p "${BACKUP_DIR}"

                  # Vault Raft スナップショット取得
                  echo "Taking Vault Raft snapshot..."
                  vault operator raft snapshot save "${BACKUP_FILE}"

                  # スナップショットサイズ確認
                  SNAP_SIZE=$(du -h "${BACKUP_FILE}" | cut -f1)
                  echo "Vault snapshot completed: ${BACKUP_FILE} (${SNAP_SIZE})"

                  # 30日より古いバックアップを削除
                  find "${BACKUP_DIR}" -name "vault-raft-*.snap" -mtime +30 -delete

                  echo "Vault backup completed."

                  # S3オフサイトバックアップ: 災害復旧のためリモートストレージにコピー
                  # --sse aws:kms: C-03監査対応。保存データをAWS KMSで暗号化し、
                  # バックアップファイルの機密性を保護する（平文保存禁止ポリシー準拠）
                  echo "Uploading Vault backup to S3..."
                  aws s3 cp "${BACKUP_FILE}" "s3://${S3_BUCKET}/vault/vault-raft-${TIMESTAMP}.snap" \
                    --endpoint-url "${S3_ENDPOINT}" \
                    --no-progress \
                    --sse aws:kms
                  echo "S3 upload completed: s3://${S3_BUCKET}/vault/vault-raft-${TIMESTAMP}.snap"
              env:
                - name: VAULT_ADDR
                  value: "https://vault.k1s0-system.svc.cluster.local:8200"
                - name: VAULT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: vault-backup-credentials
                      key: token
                - name: VAULT_CACERT
                  value: "/vault/tls/ca.crt"
                # S3オフサイトバックアップ用の認証情報とエンドポイント設定
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-credentials
                      key: bucket
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-credentials
                      key: endpoint
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-credentials
                      key: access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-credentials
                      key: secret-access-key
              volumeMounts:
                - name: backup-volume
                  mountPath: /backup
                - name: vault-tls
                  mountPath: /vault/tls
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: backup-volume
              persistentVolumeClaim:
                claimName: backup-pvc
            - name: vault-tls
              secret:
                secretName: vault-tls-cert
