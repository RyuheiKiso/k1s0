apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# バックアップ関連リソース一覧
# etcd・PostgreSQL・Harbor・Vault の定期バックアップ CronJob とサービスアカウントを管理する。
# HIGH-004 監査対応: kustomization.yaml が欠落していたため prod overlay 適用不可だった問題を修正。
resources:
  - service-accounts.yaml
  - ceph-backup-config.yaml
  - etcd-backup-cronjob.yaml
  - postgres-backup-cronjob.yaml
  - harbor-backup-cronjob.yaml
  - vault-backup-cronjob.yaml
