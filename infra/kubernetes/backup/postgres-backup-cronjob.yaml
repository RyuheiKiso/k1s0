# このバックアップ CronJob は dev/staging 環境用です。
# 本番環境のバックアップは infra/terraform/modules/database/backup.tf で管理します。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: k1s0-system
  labels:
    app: postgres-backup
    tier: system
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          restartPolicy: OnFailure
          # L-07監査対応: 過剰権限集約を避けるため、PostgreSQL専用ServiceAccountを使用する
          serviceAccountName: postgres-backup-sa
          containers:
            - name: postgres-backup
              image: postgres:17-alpine
              # セキュリティ強化: 非rootユーザーで実行し、特権昇格とLinuxケーパビリティを無効化
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR="/backup/postgres"
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)

                  mkdir -p "${BACKUP_DIR}"

                  # 全データベースのバックアップ（L-11 監査対応: 重要 DB を網羅する）
                  # - k1s0_system: システム共通スキーマ（saga 等）
                  # - auth_db: 認証データ（ユーザー・セッション情報）
                  # - tenant_db: テナントデータ（マルチテナント構成の根幹）
                  # - session_db: セッション情報
                  # - config_db: サービス設定
                  # - featureflag_db: フィーチャーフラグ設定
                  # - event_store_db: イベントソーシングデータ
                  # - workflow_db: ワークフロー定義・実行状態
                  # - policy_db: アクセスポリシー定義
                  # - dlq_db: デッドレターキューのメタデータ
                  for DB in k1s0_system auth_db tenant_db session_db config_db featureflag_db event_store_db workflow_db policy_db dlq_db; do
                    BACKUP_FILE="${BACKUP_DIR}/${DB}-${TIMESTAMP}.dump"
                    echo "Backing up database: ${DB}"
                    pg_dump \
                      -h "${PGHOST}" \
                      -U "${PGUSER}" \
                      -d "${DB}" \
                      -Fc \
                      -f "${BACKUP_FILE}"
                    echo "Backup completed: ${BACKUP_FILE} ($(du -h ${BACKUP_FILE} | cut -f1))"
                  done

                  # BACKUP_RETENTION_DAYS 日より古いバックアップを削除する（デフォルト: 30日）
                  # 保持期間を変更する場合は BACKUP_RETENTION_DAYS 環境変数を設定する（L-006）
                  find "${BACKUP_DIR}" -name "*.dump" -mtime +"${BACKUP_RETENTION_DAYS:-30}" -delete

                  echo "All PostgreSQL backups completed."
              env:
                # バックアップ保持期間（日数）。ConfigMap または Helm values で上書き可能（L-006）
                - name: BACKUP_RETENTION_DAYS
                  value: "30"
                - name: PGHOST
                  value: "postgresql.k1s0-system.svc.cluster.local"
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-backup-credentials
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-backup-credentials
                      key: password
              volumeMounts:
                - name: backup-volume
                  mountPath: /backup
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
          volumes:
            - name: backup-volume
              persistentVolumeClaim:
                claimName: backup-pvc
