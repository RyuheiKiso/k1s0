# このバックアップ CronJob は dev/staging 環境用です。
# 本番環境のバックアップは infra/terraform/modules/database/backup.tf で管理します。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: k1s0-system
  labels:
    app: postgres-backup
    tier: system
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          restartPolicy: OnFailure
          # L-07監査対応: 過剰権限集約を避けるため、PostgreSQL専用ServiceAccountを使用する
          serviceAccountName: postgres-backup-sa
          containers:
            - name: postgres-backup
              image: postgres:17-alpine
              # INFRA-HIGH-001 対応: PSS restricted 準拠 - 読み取り専用ルートファイルシステム
              # 非rootユーザーで実行し、特権昇格とLinuxケーパビリティを無効化する
              # バックアップスクリプトの一時書き込み先は emptyDir ボリューム（tmp-dir）を使用する
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop: ["ALL"]
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR="/backup/postgres"
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)

                  mkdir -p "${BACKUP_DIR}"

                  # K8S-BACKUP-002 監査対応: pg_dump 失敗時に不完全なバックアップファイルを削除する。
                  # 部分的に書き込まれたダンプファイルが残ると、リストア時に破損バックアップを
                  # 使用してしまうリスクがある。trap でクリーンアップを保証する。
                  CURRENT_BACKUP_FILE=""
                  cleanup_on_error() {
                    if [ -n "${CURRENT_BACKUP_FILE}" ] && [ -f "${CURRENT_BACKUP_FILE}" ]; then
                      echo "ERROR: pg_dump 失敗。不完全なバックアップファイルを削除します: ${CURRENT_BACKUP_FILE}"
                      rm -f "${CURRENT_BACKUP_FILE}"
                    fi
                    exit 1
                  }
                  trap cleanup_on_error ERR

                  # M-012 監査対応: DB 一覧を PostgreSQL から動的に取得する
                  # ハードコードリストは新規 DB 追加時の手動更新忘れによるバックアップ漏れを引き起こすリスクがある。
                  # pg_database から動的に取得することで、新規 DB が自動的にバックアップ対象に含まれる。
                  # 除外対象: template0/template1（テンプレートDB）、postgres（運用メタデータのみ）
                  # 参照用（以前のハードコードリスト）:
                  # k1s0_system, auth_db, tenant_db, session_db, config_db, featureflag_db,
                  # file_db, ratelimit_db, vault_db, quota_db, rule_engine_db, scheduler_db,
                  # search_db, api_registry_db, app_registry_db, service_catalog_db,
                  # event_store_db, workflow_db, policy_db, dlq_db, k1s0_saga, k1s0_service,
                  # k1s0_business, notification_db, k1s0_event_monitor, k1s0_master_maintenance
                  DBS=$(PGPASSWORD="${PGPASSWORD}" psql -h "${PGHOST}" -U "${PGUSER}" -d postgres -tAc \
                    "SELECT datname FROM pg_database WHERE datistemplate = false AND datname NOT IN ('postgres') ORDER BY datname")
                  if [ -z "${DBS}" ]; then
                    echo "ERROR: バックアップ対象 DB の取得に失敗しました"
                    exit 1
                  fi
                  echo "バックアップ対象 DB: $(echo ${DBS} | tr '\n' ' ')"
                  for DB in ${DBS}; do
                    CURRENT_BACKUP_FILE="${BACKUP_DIR}/${DB}-${TIMESTAMP}.dump"
                    echo "Backing up database: ${DB}"
                    pg_dump \
                      -h "${PGHOST}" \
                      -U "${PGUSER}" \
                      -d "${DB}" \
                      -Fc \
                      -f "${CURRENT_BACKUP_FILE}"
                    echo "Backup completed: ${CURRENT_BACKUP_FILE} ($(du -h ${CURRENT_BACKUP_FILE} | cut -f1))"
                  done
                  CURRENT_BACKUP_FILE=""
                  trap - ERR

                  # BACKUP_RETENTION_DAYS 日より古いバックアップを削除する（デフォルト: 30日）
                  # 保持期間を変更する場合は BACKUP_RETENTION_DAYS 環境変数を設定する（L-006）
                  find "${BACKUP_DIR}" -name "*.dump" -mtime +"${BACKUP_RETENTION_DAYS:-30}" -delete

                  echo "All PostgreSQL backups completed."
              env:
                # バックアップ保持期間（日数）。ConfigMap または Helm values で上書き可能（L-006）
                - name: BACKUP_RETENTION_DAYS
                  value: "30"
                - name: PGHOST
                  value: "postgresql.k1s0-system.svc.cluster.local"
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-backup-credentials
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-backup-credentials
                      key: password
              volumeMounts:
                - name: backup-volume
                  mountPath: /backup
                # INFRA-HIGH-001 対応: readOnlyRootFilesystem 有効時にスクリプトが /tmp に書き込めるよう emptyDir を追加する
                - name: tmp-dir
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
          volumes:
            - name: backup-volume
              persistentVolumeClaim:
                claimName: backup-pvc
            # INFRA-HIGH-001 対応: readOnlyRootFilesystem 有効時にスクリプトが /tmp に書き込めるよう emptyDir を追加する
            - name: tmp-dir
              emptyDir: {}
