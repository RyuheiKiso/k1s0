# このバックアップ CronJob は dev/staging 環境用です。
# 本番環境のバックアップは infra/terraform/modules/database/backup.tf で管理します。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: k1s0-system
  labels:
    app: postgres-backup
    tier: system
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          restartPolicy: OnFailure
          # L-07監査対応: 過剰権限集約を避けるため、PostgreSQL専用ServiceAccountを使用する
          serviceAccountName: postgres-backup-sa
          containers:
            - name: postgres-backup
              image: postgres:17-alpine
              # セキュリティ強化: 非rootユーザーで実行し、特権昇格とLinuxケーパビリティを無効化
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR="/backup/postgres"
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)

                  mkdir -p "${BACKUP_DIR}"

                  # K8S-BACKUP-002 監査対応: pg_dump 失敗時に不完全なバックアップファイルを削除する。
                  # 部分的に書き込まれたダンプファイルが残ると、リストア時に破損バックアップを
                  # 使用してしまうリスクがある。trap でクリーンアップを保証する。
                  CURRENT_BACKUP_FILE=""
                  cleanup_on_error() {
                    if [ -n "${CURRENT_BACKUP_FILE}" ] && [ -f "${CURRENT_BACKUP_FILE}" ]; then
                      echo "ERROR: pg_dump 失敗。不完全なバックアップファイルを削除します: ${CURRENT_BACKUP_FILE}"
                      rm -f "${CURRENT_BACKUP_FILE}"
                    fi
                    exit 1
                  }
                  trap cleanup_on_error ERR

                  # 全データベースのバックアップ（K8S-BACKUP-002 監査対応: 全サービス DB を網羅する）
                  # system Tier DB:
                  # - k1s0_system: システム共通スキーマ（saga 等）
                  # - auth_db: 認証データ（ユーザー・セッション情報）
                  # - tenant_db: テナントデータ（マルチテナント構成の根幹）
                  # - session_db: セッション情報
                  # - config_db: サービス設定
                  # - featureflag_db: フィーチャーフラグ設定
                  # - file_db: ファイルメタデータ
                  # - ratelimit_db: レート制限設定
                  # - vault_db: Vault メタデータ
                  # - quota_db: クォータ管理
                  # - rule_engine_db: ルールエンジン定義
                  # - scheduler_db: スケジューラジョブ定義
                  # - search_db: 検索インデックスメタデータ
                  # - api_registry_db: API スキーマ
                  # - app_registry_db: アプリバージョン情報
                  # - service_catalog_db: サービスメタデータ
                  # - event_store_db: イベントソーシングデータ
                  # - workflow_db: ワークフロー定義・実行状態
                  # - policy_db: アクセスポリシー定義
                  # - dlq_db: デッドレターキューのメタデータ
                  # business/service Tier DB:
                  # - k1s0_saga: Saga 分散トランザクション（Rust saga サービス）
                  # - k1s0_service: service Tier 共通スキーマ
                  # - k1s0_business: business Tier 共通スキーマ
                  # - notification_db: 通知履歴・配信状態（MED-013 監査対応）
                  # - k1s0_event_monitor: イベント監視メタデータ（MED-013 監査対応）
                  # - k1s0_master_maintenance: マスターメンテナンス定義（MED-013 監査対応）
                  for DB in \
                    k1s0_system \
                    auth_db \
                    tenant_db \
                    session_db \
                    config_db \
                    featureflag_db \
                    file_db \
                    ratelimit_db \
                    vault_db \
                    quota_db \
                    rule_engine_db \
                    scheduler_db \
                    search_db \
                    api_registry_db \
                    app_registry_db \
                    service_catalog_db \
                    event_store_db \
                    workflow_db \
                    policy_db \
                    dlq_db \
                    k1s0_saga \
                    k1s0_service \
                    k1s0_business \
                    notification_db \
                    k1s0_event_monitor \
                    k1s0_master_maintenance; do
                    CURRENT_BACKUP_FILE="${BACKUP_DIR}/${DB}-${TIMESTAMP}.dump"
                    echo "Backing up database: ${DB}"
                    pg_dump \
                      -h "${PGHOST}" \
                      -U "${PGUSER}" \
                      -d "${DB}" \
                      -Fc \
                      -f "${CURRENT_BACKUP_FILE}"
                    echo "Backup completed: ${CURRENT_BACKUP_FILE} ($(du -h ${CURRENT_BACKUP_FILE} | cut -f1))"
                  done
                  CURRENT_BACKUP_FILE=""
                  trap - ERR

                  # BACKUP_RETENTION_DAYS 日より古いバックアップを削除する（デフォルト: 30日）
                  # 保持期間を変更する場合は BACKUP_RETENTION_DAYS 環境変数を設定する（L-006）
                  find "${BACKUP_DIR}" -name "*.dump" -mtime +"${BACKUP_RETENTION_DAYS:-30}" -delete

                  echo "All PostgreSQL backups completed."
              env:
                # バックアップ保持期間（日数）。ConfigMap または Helm values で上書き可能（L-006）
                - name: BACKUP_RETENTION_DAYS
                  value: "30"
                - name: PGHOST
                  value: "postgresql.k1s0-system.svc.cluster.local"
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-backup-credentials
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-backup-credentials
                      key: password
              volumeMounts:
                - name: backup-volume
                  mountPath: /backup
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
          volumes:
            - name: backup-volume
              persistentVolumeClaim:
                claimName: backup-pvc
