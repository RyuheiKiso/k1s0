apiVersion: v1
kind: Namespace
metadata:
  name: messaging
  labels:
    tier: infra
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: helm
    # Pod Security Standards: baseline モードを適用（L-14 監査対応: 理由を明記）
    # messaging (Kafka + Strimzi) が baseline である理由:
    #   Strimzi operator と Kafka broker は、ブローカー間通信・ZooKeeper 連携のために
    #   特定の Capabilities（CHOWN, FSETID 等）を内部で使用する。
    #   Strimzi の公式ドキュメントでは baseline PSS が推奨されている。
    #   Strimzi 側の restricted PSS サポートが確認できた時点で移行を検討する。
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
