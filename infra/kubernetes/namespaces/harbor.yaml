apiVersion: v1
kind: Namespace
metadata:
  name: harbor
  labels:
    tier: infra
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: helm
    # Pod Security Standards: baseline モードを適用（L-14 監査対応: 理由を明記）
    # Harbor が baseline である理由:
    #   Harbor の registry コンポーネント（registry, registryctl）は OCI イメージ操作のために
    #   特定の Capabilities が必要であり、restricted モードでは権限不足で動作しない。
    #   また Harbor の公式 Helm Chart が restricted PSS に未対応のため、
    #   Chart 側の対応を待って restricted 移行を検討する。
    #   audit: restricted により restricted 違反を継続監視する。
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
