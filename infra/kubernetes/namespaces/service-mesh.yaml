apiVersion: v1
kind: Namespace
metadata:
  name: service-mesh
  labels:
    tier: infra
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: helm
    # Pod Security Standards: baseline モードを適用（L-14 監査対応: 理由を明記）
    # service-mesh (Istio / Linkerd 等) が baseline である理由:
    #   サービスメッシュのデータプレーン (sidecar / envoy proxy) は NET_ADMIN Capability を
    #   必要とし、restricted モードでは禁止されている。
    #   Istio Ambient Mesh モードでは sidecar 不要となり restricted 対応が容易になるが、
    #   現在は Sidecar モードのため baseline を維持する。
    #   Ambient Mesh への移行評価後に restricted 適用を再検討する。
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
