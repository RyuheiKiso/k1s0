apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    tier: infra
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: helm
    # Pod Security Standards: baseline モードを適用（L-14 監査対応: 理由を明記）
    # cert-manager が baseline である理由:
    #   cert-manager の controller は証明書プロビジョニングのため特定の Linux Capabilities
    #   (NET_BIND_SERVICE) を必要とする場合があり、restricted モード（全 Capabilities 禁止）では
    #   起動失敗するリスクがある。
    #   audit: restricted / warn: restricted を維持することで、将来の restricted 移行を
    #   継続的に評価できる状態を保つ。
    #   restricted 移行は cert-manager の公式セキュリティガイドを確認後に検討する。
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
