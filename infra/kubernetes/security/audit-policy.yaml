# Kubernetes 監査ポリシー設定（AuditPolicy）
# API サーバーへのリクエストを監査ログとして記録するポリシーを定義する。
# セキュリティインシデントの追跡、コンプライアンス要件への対応、不審な操作の検出を目的とする。
#
# ===========================================================================
# kube-apiserver への適用手順（L-02 監査対応）:
#   セルフホスト Kubernetes の場合:
#     1. このファイルを全 Master ノードにコピーする
#        sudo cp audit-policy.yaml /etc/kubernetes/audit-policy.yaml
#
#     2. /etc/kubernetes/manifests/kube-apiserver.yaml に以下の起動オプションを追加する
#        --audit-policy-file=/etc/kubernetes/audit-policy.yaml
#        --audit-log-path=/var/log/kubernetes/audit.log
#        --audit-log-maxage=30
#        --audit-log-maxbackup=10
#        --audit-log-maxsize=100
#
#     3. kube-apiserver の自動再起動を確認する（静的 Pod は変更後自動で再起動される）
#        kubectl get pod -n kube-system kube-apiserver-<node-name>
#
#     4. 監査ログが出力されているか確認する
#        tail -f /var/log/kubernetes/audit.log
#
#   マネージド Kubernetes（EKS / GKE / AKS）の場合:
#     各プロバイダーの監査ログ機能を使用すること（このファイルの直接適用は不要）。
#     - EKS: CloudWatch Logs での Kubernetes 監査ログを有効化
#     - GKE: Cloud Audit Logs（Data Access 監査ログ）を有効化
#     - AKS: Azure Monitor の診断設定でクラスタ監査ログを有効化
#
# 詳細手順: docs/infrastructure/kubernetes/kubernetes設計.md（デプロイ前チェックリスト）
# ===========================================================================
#
# 監査レベルの定義:
#   None        - 記録しない
#   Metadata    - メタデータ（ユーザー・タイムスタンプ・リソース・操作）のみ記録
#   Request     - メタデータ + リクエストボディを記録
#   RequestResponse - メタデータ + リクエストボディ + レスポンスボディを記録
#
# 参考: https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/
apiVersion: audit.k8s.io/v1
kind: Policy
rules:
  # ルール1: Secrets への操作を Metadata レベルで記録する
  # M-04 監査対応: Secretsの内容を監査ログに記録するとシークレット値が平文で残存するため Metadata レベルに変更
  # RequestResponse では Secret の value がログに平文で記録されセキュリティリスクとなる
  - level: Metadata
    resources:
      - group: ""
        resources: ["secrets"]

  # ルール2: ConfigMaps への操作を最高レベル（RequestResponse）で記録する
  # 設定改ざんによるサービス影響を追跡するために全内容を記録する
  - level: RequestResponse
    resources:
      - group: ""
        resources: ["configmaps"]

  # ルール3: 認証失敗（401/403）をメタデータレベルで記録する
  # 不正アクセス試行の検出と分析のためにリクエスト元情報を保持する
  - level: Metadata
    omitStages:
      - RequestReceived
    users: ["system:anonymous"]

  # ルール4: RBAC（Role/ClusterRole/Binding）の変更を RequestResponse で記録する
  # 権限昇格・不正な権限付与を検出するために変更内容の完全な記録を保持する
  - level: RequestResponse
    resources:
      - group: "rbac.authorization.k8s.io"
        resources:
          - roles
          - rolebindings
          - clusterroles
          - clusterrolebindings

  # ルール5: Node の操作を Metadata レベルで記録する
  # クラスターインフラへの変更追跡のためメタデータのみ記録し、ボリュームを抑制する
  - level: Metadata
    resources:
      - group: ""
        resources: ["nodes"]

  # ルール6: kube-system 名前空間のシステムコンポーネントは Metadata レベルのみ記録する
  # システムコンポーネントの頻繁な操作によるログ肥大化を防ぎつつ、監査証跡は維持する
  - level: Metadata
    namespaces: ["kube-system"]

  # ルール7: 読み取り専用エンドポイント（healthz/readyz/livez）は記録しない
  # ヘルスチェックによるログノイズを排除し、本質的な操作ログへの集中を促す
  - level: None
    nonResourceURLs:
      - /healthz
      - /healthz/*
      - /readyz
      - /readyz/*
      - /livez
      - /livez/*

  # ルール8: system:masters グループによる操作は Request レベルで記録する（L-009 監査対応）
  # system:masters は Kubernetes の最高権限グループであり、クラスター管理操作・権限昇格などの
  # 高リスク操作を行う。Metadata レベルではリクエストボディが記録されず、
  # 不正操作の内容追跡ができないため Request レベルに引き上げる。
  # Request レベル: メタデータ + リクエストボディを記録（レスポンスボディは記録しない）。
  # 注意: Secrets リソースへのアクセスは上位ルール1で Metadata レベルに制限されるため、
  # system:masters が Secrets を操作しても内容は記録されない（安全性を維持）。
  - level: Request
    userGroups: ["system:masters"]

  # ルール9: system:nodes グループ（kubelet）の操作は Metadata レベルで記録する
  # ノードエージェントの定常的な操作のログ量を最小限に抑える
  - level: Metadata
    userGroups: ["system:nodes"]

  # ルール10: その他すべてのリクエストは Metadata レベルで記録する（デフォルト）
  # 上記ルールに該当しないすべての操作の最低限の監査証跡を確保する
  - level: Metadata
