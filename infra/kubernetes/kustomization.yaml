# H-004 監査対応: インフラ全体を統合的に管理するルート kustomization
# kubectl kustomize infra/kubernetes/ で全リソースをビルド可能にする
# kustomization.yaml を持つサブディレクトリのみ resources に含める
# （security, storage, backup, cert-manager, ingress, overlays, system, verify は
#   独自の kustomization を持たないためここには含めない）
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# kustomization.yaml が存在するサブディレクトリを参照する
resources:
  - namespaces/
  - rbac/
  - network-policies/
  - limit-ranges/
  - resource-quotas/
  # K8S-LOW-001 監査対応: storage-classes.yaml を CI/CD パイプラインで確実に適用するため追加する。
  # 手動 kubectl apply では漏れるリスクがあるため kustomization.yaml で一元管理する。
  - storage/
