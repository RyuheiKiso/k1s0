# cert-manager: デフォルト拒否ポリシー。
# 他のポリシーで明示的に許可されていないトラフィックを全て遮断する。
# H-14 監査対応: infra Namespace に NetworkPolicy を追加し、ゼロトラスト原則を適用する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# cert-manager: Ingress 許可ポリシー
# cert-manager の webhook サーバーへのアクセスを kube-system（API Server）から許可する。
# cert-manager は Kubernetes API Server からの Webhook 呼び出しを受け付ける必要がある。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-ingress
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # K8S-NP-001 監査対応: from セレクタを追加し、kube-system Namespace からの通信のみ許可する。
    # from セレクタなしでは全 Pod からの Webhook 呼び出しが許可されてしまうため、
    # Kubernetes API Server が存在する kube-system Namespace に限定して最小権限を実現する。
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 10250   # cert-manager webhook ポート
---
# cert-manager: Egress 許可ポリシー
# DNS 解決、Kubernetes API Server への通信、ACME チャレンジ用の外部通信を許可する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-egress
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS 解決を kube-system（CoreDNS）のみに許可する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API Server への通信を許可する（証明書リソースの管理に必要）
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 443     # Kubernetes API Server
        - protocol: TCP
          port: 6443    # Kubernetes API Server（代替ポート）
    # ACME (Let's Encrypt 等) チャレンジ用の外部 HTTPS 通信を許可する
    - ports:
        - protocol: TCP
          port: 443
