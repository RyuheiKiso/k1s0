# k1s0-business: service および同一 Namespace からのインバウンドを許可
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-service
  namespace: k1s0-business
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              tier: business
        - namespaceSelector:
            matchLabels:
              tier: service
      # I-1 対応: ポート制限を追加し、business Tier アプリケーションの許可ポートを明示的に制限
      ports:
        - protocol: TCP
          port: 8080    # HTTP REST API ポート
        - protocol: TCP
          port: 50051   # gRPC ポート
        - protocol: TCP
          port: 9090    # Prometheus メトリクスポート
---
# k1s0-business: Egress を必要な宛先に制限する
# DNS、同一 Namespace、system Tier（共通基盤）、messaging（Kafka）、observability のみ許可
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-egress
  namespace: k1s0-business
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # M-1 対応: DNS 通信を CoreDNS が存在する kube-system のみに制限する（system.yaml と統一）
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # 同一 Namespace 内の通信を許可
    - to:
        - namespaceSelector:
            matchLabels:
              tier: business
    # system Tier（認証・config 等の共通基盤）への通信を許可
    - to:
        - namespaceSelector:
            matchLabels:
              tier: system
    # messaging Namespace（Kafka ブローカー）への通信を許可
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: messaging
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
    # observability Namespace（メトリクス・トレース送信）への通信を許可
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
