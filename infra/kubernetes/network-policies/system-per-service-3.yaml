# K8S-MED-001 監査対応: system Namespace の残りサービスに対する個別 NetworkPolicy (Part 3)
# 本ファイルは workflow / saga / scheduler / event-store / event-monitor / dlq-manager を対象とする。
#
# ラベル形式: app.kubernetes.io/name: <chart名>（k1s0-common の selectorLabels に準拠）

---
# workflow-server への Ingress 制限
# workflow は graphql-gateway（ワークフロー起動・管理）と saga（補償トランザクション）から呼ばれる。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-workflow-server
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: workflow
  policyTypes:
    - Ingress
  ingress:
    # graphql-gateway: ワークフロー定義・起動・ステータス確認
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # saga: 補償トランザクション連携（gRPC のみ）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: saga
      ports:
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# saga-server への Ingress 制限
# saga は workflow（補償開始トリガー）から gRPC で呼ばれる。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-saga-server
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: saga
  policyTypes:
    - Ingress
  ingress:
    # workflow: Saga パターン開始・補償処理連携（gRPC のみ）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: workflow
      ports:
        - protocol: TCP
          port: 50051
    # graphql-gateway: Saga ステータス確認・管理（REST）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# scheduler-server への Ingress 制限
# scheduler は管理目的（graphql-gateway による設定変更）のみ ingress を受け付ける。
# スケジュール実行は内部 cron 起動のためインバウンド通信は最小限。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-scheduler-server
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: scheduler
  policyTypes:
    - Ingress
  ingress:
    # graphql-gateway: スケジュール定義・一時停止・削除（REST + gRPC）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# event-store への Ingress 制限
# event-store は全 tier のサービスからイベント発行・照会のために呼ばれる。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-event-store
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: event-store
  policyTypes:
    - Ingress
  ingress:
    # 全 tier のサービスからのイベント発行・照会を許可
    - from:
        - namespaceSelector:
            matchLabels:
              tier: system
        - namespaceSelector:
            matchLabels:
              tier: business
        - namespaceSelector:
            matchLabels:
              tier: service
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# event-monitor への Ingress 制限
# event-monitor はオペレーター管理 UI（graphql-gateway 経由）のみ ingress を受け付ける。
# イベント監視は Kafka Consumer として動作するため直接 ingress は少ない。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-event-monitor
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: event-monitor
  policyTypes:
    - Ingress
  ingress:
    # graphql-gateway: イベント一覧・詳細照会（REST）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# dlq-manager への Ingress 制限
# dlq-manager は event-store と graphql-gateway から呼ばれる。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-dlq-manager
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dlq-manager
  policyTypes:
    - Ingress
  ingress:
    # event-store: デッドレター転送（gRPC のみ）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: event-store
      ports:
        - protocol: TCP
          port: 50051
    # graphql-gateway: DLQ 一覧・リドライブ操作（REST + gRPC）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090
