# observability: 全 Tier からのインバウンドを許可（トレース送信・メトリクス取得）
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-all-tiers
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              tier: system
        - namespaceSelector:
            matchLabels:
              tier: business
        - namespaceSelector:
            matchLabels:
              tier: service
        - namespaceSelector:
            matchLabels:
              tier: infra
      # I-1 対応: ポート制限を追加し、observability 関連サービスへの不要なアクセスを遮断
      ports:
        - protocol: TCP
          port: 9090    # Prometheus メトリクスポート
        - protocol: TCP
          port: 3000    # Grafana ダッシュボードポート
        - protocol: TCP
          port: 4317    # OpenTelemetry gRPC エンドポイント
        - protocol: TCP
          port: 4318    # OpenTelemetry HTTP エンドポイント
        - protocol: TCP
          port: 16686   # Jaeger UI ポート
