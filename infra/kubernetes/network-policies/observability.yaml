# observability: デフォルト拒否ポリシー。
# 他のポリシーで明示的に許可されていないトラフィックを全て遮断する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# observability: 全 Tier からのインバウンドを許可（トレース送信・メトリクス取得）
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-all-tiers
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              tier: system
        - namespaceSelector:
            matchLabels:
              tier: business
        - namespaceSelector:
            matchLabels:
              tier: service
        - namespaceSelector:
            matchLabels:
              tier: infra
      # I-1 対応: ポート制限を追加し、observability 関連サービスへの不要なアクセスを遮断
      ports:
        - protocol: TCP
          port: 9090    # Prometheus メトリクスポート
        - protocol: TCP
          port: 3000    # Grafana ダッシュボードポート
        - protocol: TCP
          port: 4317    # OpenTelemetry gRPC エンドポイント
        - protocol: TCP
          port: 4318    # OpenTelemetry HTTP エンドポイント
        - protocol: TCP
          port: 16686   # Jaeger UI ポート
        # M-03 監査対応: Loki ログ集約サービスへのアクセスを許可するためポート 3100 を追加
        - protocol: TCP
          port: 3100    # Loki ログ集約ポート
---
# M-2 対応: observability namespace の Egress を必要最小限の宛先に制限する
# DNS(kube-system)、同一 Namespace 内、各 Tier（Prometheus scrape 対象）のみ許可
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-egress
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS 解決を kube-system（CoreDNS）のみに許可する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Grafana-Prometheus 等の同一 Namespace 内通信を許可する
    # INFRA-004 対応: podSelector: {} は同一 Namespace 内の全 Pod への egress を許可するため
    # 過剰許可になる。実際に通信が必要なコンポーネント（Prometheus/Loki/Jaeger/k1s0配下）
    # のラベルを明示的に列挙し、不要な通信経路を遮断する。
    # INFRA-MED-002 対応: part-of: k1s0 は全コンポーネントにマッチするため
    # prometheus/loki/jaeger への個別指定が優先される。
    # part-of: k1s0 は observability namespace 内の k1s0 管理コンポーネント（Grafana 等）への
    # 通信を許可するためのものであり、他 namespace への影響はない（namespaceSelector なし）。
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: k1s0
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: prometheus
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: loki
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: jaeger
    # Prometheus が各 Tier からメトリクスを scrape するために許可する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: k1s0-system
      ports:
        - protocol: TCP
          port: 9090    # M-03 対応: Prometheus メトリクス scrape ポートのみ許可
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: k1s0-business
      ports:
        - protocol: TCP
          port: 9090    # M-03 対応: Prometheus メトリクス scrape ポートのみ許可
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: k1s0-service
      ports:
        - protocol: TCP
          port: 9090    # M-03 対応: Prometheus メトリクス scrape ポートのみ許可
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: messaging
      ports:
        - protocol: TCP
          port: 9090    # M-03 対応: Prometheus メトリクス scrape ポートのみ許可
