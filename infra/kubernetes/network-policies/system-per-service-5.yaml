# K8S-MED-001 監査対応: system Namespace の残りサービスに対する個別 NetworkPolicy (Part 5)
# 本ファイルは rule-engine / service-catalog / policy / quota / ratelimit / ai-gateway / ai-agent を対象とする。
#
# ラベル形式: app.kubernetes.io/name: <chart名>（k1s0-common の selectorLabels に準拠）

---
# rule-engine への Ingress 制限
# rule-engine は workflow（ルール評価実行）と graphql-gateway（ルール管理）から呼ばれる。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-rule-engine
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rule-engine
  policyTypes:
    - Ingress
  ingress:
    # workflow: ルール評価リクエスト（gRPC のみ）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: workflow
      ports:
        - protocol: TCP
          port: 50051
    # saga: 補償ルール評価（gRPC のみ）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: saga
      ports:
        - protocol: TCP
          port: 50051
    # graphql-gateway: ルール定義・管理（REST + gRPC）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# service-catalog への Ingress 制限
# service-catalog は graphql-gateway（サービス一覧・詳細参照）からのみ呼ばれる。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-service-catalog
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: service-catalog
  policyTypes:
    - Ingress
  ingress:
    # graphql-gateway: サービスカタログ参照・管理（REST + gRPC）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# policy-server への Ingress 制限
# policy は auth（RBAC 評価）と graphql-gateway（ポリシー管理）から呼ばれる。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-policy-server
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: policy
  policyTypes:
    - Ingress
  ingress:
    # auth: RBAC ポリシー評価・パーミッション確認（gRPC のみ）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth
      ports:
        - protocol: TCP
          port: 50051
    # graphql-gateway: ポリシー定義・管理（REST + gRPC）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# quota-server への Ingress 制限
# quota は Kong プラグイン（レート確認）と graphql-gateway（クォータ管理）から呼ばれる。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-quota-server
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: quota
  policyTypes:
    - Ingress
  ingress:
    # Kong: リクエストごとのクォータチェック（REST）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kong
      ports:
        - protocol: TCP
          port: 8080
    # graphql-gateway: クォータ設定・使用量照会（REST + gRPC）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# ratelimit-server への Ingress 制限
# ratelimit は Kong プラグイン（レート制限チェック）と graphql-gateway（管理）から呼ばれる。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-ratelimit-server
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ratelimit
  policyTypes:
    - Ingress
  ingress:
    # Kong: リクエストごとのレート制限チェック（gRPC のみ: 低レイテンシー要件）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kong
      ports:
        - protocol: TCP
          port: 50051
    # graphql-gateway: レート制限ルール設定・統計照会（REST + gRPC）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# ai-gateway への Ingress 制限
# ai-gateway は graphql-gateway（AI 機能呼び出し）からのみアクセスを受け付ける。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-ai-gateway
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway
  policyTypes:
    - Ingress
  ingress:
    # graphql-gateway: AI 機能リクエスト転送（REST + gRPC）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# ai-agent への Ingress 制限
# ai-agent は ai-gateway（エージェント実行委譲）からのみアクセスを受け付ける。
# 直接外部公開せず ai-gateway を通じた多段構成でセキュリティを確保する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-ai-agent
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ai-agent
  policyTypes:
    - Ingress
  ingress:
    # ai-gateway: エージェント実行リクエスト（gRPC のみ）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ai-gateway
      ports:
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090
