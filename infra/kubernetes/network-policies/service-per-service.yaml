# K8S-MED-001 監査対応: service Namespace の各サービスに対する個別 NetworkPolicy
#
# namespace レベルのデフォルト拒否ポリシー（service.yaml）に加え、
# サービスごとに通信元 Pod を明示的に限定することで L4 横方向通信（lateral movement）を制御する。
#
# 通信パターン:
#   graphql-gateway → task/board/activity (REST 8080 / gRPC 50051)
#   workflow → task (gRPC 50051 のみ: ワークフロー連携)
#   task → board (gRPC 50051: ボードカラム増減)
#   task → activity (gRPC 50051: アクティビティ記録)
#   board → task からのコールバックは Kafka 経由（直接通信なし）
#
# ラベル形式: app.kubernetes.io/name: <chart名>（k1s0-common の selectorLabels に準拠）

---
# task-server への Ingress 制限
# task は graphql-gateway と workflow からのみ直接アクセスを受け付ける。
# board/activity は Kafka Outbox 経由でイベントを受信するため直接 ingress 不要。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-task-server
  namespace: k1s0-service
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: task
  policyTypes:
    - Ingress
  ingress:
    # graphql-gateway: タスク CRUD / 一覧照会
    - from:
        - namespaceSelector:
            matchLabels:
              tier: system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # workflow: ワークフロータスクステータス更新（gRPC のみ）
    - from:
        - namespaceSelector:
            matchLabels:
              tier: system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: workflow
      ports:
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ（observability namespace から）
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# board-server への Ingress 制限
# board は graphql-gateway と task（ボードカラム増減 gRPC）からのみアクセスを受け付ける。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-board-server
  namespace: k1s0-service
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: board
  policyTypes:
    - Ingress
  ingress:
    # graphql-gateway: ボード CRUD / WIP 管理
    - from:
        - namespaceSelector:
            matchLabels:
              tier: system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # task: ボードカラム在庫予約・解放（gRPC IncrementColumn / DecrementColumn）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: task
      ports:
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090

---
# activity-server への Ingress 制限
# activity は graphql-gateway と task（アクティビティ記録 gRPC）からのみアクセスを受け付ける。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-activity-server
  namespace: k1s0-service
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: activity
  policyTypes:
    - Ingress
  ingress:
    # graphql-gateway: アクティビティ CRUD / 承認フロー操作
    - from:
        - namespaceSelector:
            matchLabels:
              tier: system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    # task: タスク完了・ステータス変更時のアクティビティ記録（gRPC）
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: task
      ports:
        - protocol: TCP
          port: 50051
    # Prometheus: メトリクスのスクレイプ
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090
