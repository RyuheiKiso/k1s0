# messaging: デフォルト拒否ポリシー。
# 他のポリシーで明示的に許可されていないトラフィックを全て遮断する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: messaging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# messaging: 全 Tier からのインバウンドを許可（Kafka アクセス）
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-all-tiers
  namespace: messaging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              tier: system
        - namespaceSelector:
            matchLabels:
              tier: business
        - namespaceSelector:
            matchLabels:
              tier: service
      # I-1 対応: ポート制限を追加し、Kafka および Schema Registry 以外のポートへのアクセスを遮断
      ports:
        - protocol: TCP
          port: 9092    # Kafka ブローカーポート（プレーンテキスト）
        - protocol: TCP
          port: 9093    # Kafka ブローカーポート（TLS）
        - protocol: TCP
          port: 8081    # Schema Registry ポート
---
# M-2 対応: messaging namespace の Egress を必要最小限の宛先に制限する
# DNS(kube-system)、同一 Namespace 内（Kafka レプリカ間）、observability（メトリクス）のみ許可
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-egress
  namespace: messaging
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS 解決を kube-system（CoreDNS）のみに許可する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kafka ブローカー間レプリケーションのために同一 Namespace 内通信を許可する
    - to:
        - podSelector: {}
    # Prometheus へのメトリクス送信を許可する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
