# messaging: 全 Tier からのインバウンドを許可（Kafka アクセス）
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-all-tiers
  namespace: messaging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              tier: system
        - namespaceSelector:
            matchLabels:
              tier: business
        - namespaceSelector:
            matchLabels:
              tier: service
      # I-1 対応: ポート制限を追加し、Kafka および Schema Registry 以外のポートへのアクセスを遮断
      ports:
        - protocol: TCP
          port: 9092    # Kafka ブローカーポート（プレーンテキスト）
        - protocol: TCP
          port: 9093    # Kafka ブローカーポート（TLS）
        - protocol: TCP
          port: 8081    # Schema Registry ポート
