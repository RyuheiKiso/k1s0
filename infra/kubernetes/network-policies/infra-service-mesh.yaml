# service-mesh: デフォルト拒否ポリシー。
# 他のポリシーで明示的に許可されていないトラフィックを全て遮断する。
# H-14 監査対応: infra Namespace に NetworkPolicy を追加し、ゼロトラスト原則を適用する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: service-mesh
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# service-mesh: Ingress 許可ポリシー
# Istio コントロールプレーン（istiod）が全 Tier のサイドカーから xDS 設定リクエストを受け付ける。
# Envoy サイドカーは istiod に接続してサービスディスカバリ・ルーティング設定を取得する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-control-plane-ingress
  namespace: service-mesh
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # 全 Tier の Envoy サイドカーからの xDS 接続を許可する
    - from:
        - namespaceSelector:
            matchLabels:
              tier: system
        - namespaceSelector:
            matchLabels:
              tier: business
        - namespaceSelector:
            matchLabels:
              tier: service
      ports:
        - protocol: TCP
          port: 15010   # istiod xDS（平文、デバッグ用）
        - protocol: TCP
          port: 15012   # istiod xDS（mTLS）
        - protocol: TCP
          port: 15014   # istiod メトリクス
    # Kubernetes API Server からの Webhook 呼び出しを許可する
    - ports:
        - protocol: TCP
          port: 15017   # istiod Webhook ポート
---
# service-mesh: Egress 許可ポリシー
# DNS 解決、Kubernetes API Server への通信、observability への通信を許可する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-egress
  namespace: service-mesh
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS 解決を kube-system（CoreDNS）のみに許可する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API Server への通信を許可する（サービスディスカバリ、Webhook 登録に必要）
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 443     # Kubernetes API Server
        - protocol: TCP
          port: 6443    # Kubernetes API Server（代替ポート）
    # observability Namespace への通信を許可する（メトリクス・トレース送信）
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 4317    # OTEL Collector gRPC
        - protocol: TCP
          port: 9090    # Prometheus
