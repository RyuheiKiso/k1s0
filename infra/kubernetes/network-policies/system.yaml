# k1s0-system: デフォルト拒否ポリシー。
# 他のポリシーで明示的に許可されていないトラフィックを全て遮断する。
# 明示的な allow ルールをこのポリシーより後に定義することで許可リスト方式を実現する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: k1s0-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# k1s0-system: business および service からのインバウンドを許可
# service Tier から system Tier への直接通信を許可する
# （認証・config取得等の共通基盤へのアクセスは全 Tier から必要）
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-business-and-service
  namespace: k1s0-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              tier: system
        - namespaceSelector:
            matchLabels:
              tier: business
        - namespaceSelector:
            matchLabels:
              tier: service
      # I-1 対応: ポート制限を追加し、system Tier アプリケーションの許可ポートを明示的に制限
      # H-005 確認: ai-agent (50062→50051)、ai-gateway (50061→50051) を 50051 に統一済み。
      #             このポリシーの変更は不要。
      ports:
        - protocol: TCP
          port: 8080    # HTTP REST API ポート
        - protocol: TCP
          port: 50051   # gRPC ポート（ai-agent/ai-gateway を含む全 system Tier サービスは 50051 を使用）
        - protocol: TCP
          port: 9090    # Prometheus メトリクスポート
---
# k1s0-system: Egress を必要な宛先に制限する
# DNS、同一 Namespace、messaging（Kafka）、observability（メトリクス/トレース送信）のみ許可
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-egress
  namespace: k1s0-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS 解決を許可（CoreDNS が存在する kube-system ネームスペースのみに制限する）
    # namespaceSelector: {} は全 Namespace への egress を許可するため、kube-system 限定に絞ることで
    # DNS を装った意図しない通信経路を遮断する（M-07 対応）
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # 同一 Namespace 内の通信を許可（PostgreSQL: 5432, Redis: 6379/6380, Vault: 8200, Keycloak: 8080）
    - to:
        - namespaceSelector:
            matchLabels:
              tier: system
      # M-7 監査対応: 同一 Tier 内の通信に明示的なポート指定を追加し、不要なポートを遮断する
      ports:
        - protocol: TCP
          port: 5432    # PostgreSQL
        - protocol: TCP
          port: 6379    # Redis（プライマリ）
        - protocol: TCP
          port: 6380    # Redis（レプリカ/TLS）
        - protocol: TCP
          port: 8200    # Vault
        - protocol: TCP
          port: 8080    # Keycloak HTTP / サービス間 HTTP REST API
        # L-08 監査対応: Keycloak 管理ポート 9000 を追加する。
        # Keycloak 22+ では管理 API（/health, /metrics 等）が 9000 番ポートに分離されており、
        # ヘルスチェックやメトリクス収集のため同一 Tier からのアクセスを許可する必要がある。
        - protocol: TCP
          port: 9000    # Keycloak 管理ポート（/health, /metrics）
        - protocol: TCP
          port: 50051   # サービス間 gRPC
    # messaging Namespace（Kafka ブローカー）への通信を許可
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: messaging
      # M-7 監査対応: plain リスナー（9092）を廃止し TLS リスナー（9093）のみを許可する
      ports:
        - protocol: TCP
          port: 9093
    # observability Namespace（メトリクス・トレース送信）への通信を許可
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      # M-7 監査対応: OTEL Collector グRPC（4317）および HTTP（4318）ポートを明示的に指定する
      ports:
        - protocol: TCP
          port: 4317    # OTEL Collector gRPC（メトリクス・トレース送信）
        - protocol: TCP
          port: 4318    # OTEL Collector HTTP（メトリクス・トレース送信）
        - protocol: TCP
          port: 9090    # Prometheus スクレイプ
---
# HIGH-005 監査対応: Kong Admin API ポート(8001)へのインバウンドを制限する NetworkPolicy。
# デフォルト拒否ポリシー（default-deny-all）に対し、Kong Admin API へのアクセスを
# 明示的に許可された Pod からのみ受け付ける。
#
# INFRA-005 修正: app.kubernetes.io/component: kong-admin ラベルを持つ Pod は
# 実在しないことを確認した（infra/helm/services/system/kong/values.yaml に component 値なし）。
# Kong Admin API は運用者が kubectl exec または踏み台 Pod 経由で手動操作する設計であり、
# クラスタ内 Pod から恒常的に呼び出す構成は持たない（values.yaml: admin.http.enabled: false）。
#
# 代替制御として以下の対策を適用する:
#   1. ingress.from に podSelector を設定せず、ポートのみを指定することでクラスタ内通信を
#      デフォルト拒否ポリシーで遮断する（別途 allow ルールがなければ到達不可）。
#   2. 将来的に管理 Job/CronJob を追加する場合は、その Pod に
#      app.kubernetes.io/component: kong-admin-client ラベルを付与し
#      以下の podSelector にそのラベルを追加すること。
#
# 確認方法:
#   kubectl get pods -n k1s0-system -l app.kubernetes.io/name=kong -o jsonpath='{.items[*].metadata.labels}'
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kong-admin-api-restriction
  namespace: k1s0-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kong
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8001    # Kong Admin API ポート
      from:
        # k1s0-common の selectorLabels: app.kubernetes.io/name + app.kubernetes.io/instance
        # Kong Pod 自身のみが self-referential に到達可能（ヘルスチェック用）
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kong
        # 将来的な管理クライアント Pod 用プレースホルダー:
        # 管理 Job を追加する場合は以下のコメントを解除し、ラベルを付与すること
        # - podSelector:
        #     matchLabels:
        #       app.kubernetes.io/component: kong-admin-client
