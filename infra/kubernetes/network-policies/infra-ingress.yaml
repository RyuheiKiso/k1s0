# ingress: デフォルト拒否ポリシー。
# 他のポリシーで明示的に許可されていないトラフィックを全て遮断する。
# H-14 監査対応: infra Namespace に NetworkPolicy を追加し、ゼロトラスト原則を適用する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# ingress: Ingress 許可ポリシー
# 外部クライアントからの HTTP/HTTPS トラフィックを受け付ける。
# Ingress Controller はクラスタの入り口として外部トラフィックを処理する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-ingress
  namespace: ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # 外部クライアントからの HTTP/HTTPS トラフィックを許可する
    - ports:
        - protocol: TCP
          port: 80      # HTTP
        - protocol: TCP
          port: 443     # HTTPS
---
# ingress: Egress 許可ポリシー
# DNS 解決、各 Tier のバックエンドサービスへのルーティングを許可する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-egress
  namespace: ingress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS 解決を kube-system（CoreDNS）のみに許可する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # system Tier へのルーティングを許可する（Kong Gateway、BFF-Proxy 等）
    - to:
        - namespaceSelector:
            matchLabels:
              tier: system
      ports:
        - protocol: TCP
          port: 8080    # HTTP REST API
        - protocol: TCP
          port: 8000    # Kong Proxy ポート
    # business Tier へのルーティングを許可する（管理系 UI 等の直接 Ingress 対象）
    - to:
        - namespaceSelector:
            matchLabels:
              tier: business
      ports:
        - protocol: TCP
          port: 8080    # HTTP REST API
    # service Tier へのルーティングを許可する
    - to:
        - namespaceSelector:
            matchLabels:
              tier: service
      ports:
        - protocol: TCP
          port: 8080    # HTTP REST API
    # observability Namespace へのルーティングを許可する（Grafana ダッシュボード等）
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 3000    # Grafana
