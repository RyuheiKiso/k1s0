# k1s0-service: Ingress および同一 Namespace からのインバウンドを許可
# 注意: この NetworkPolicy は L3/L4 レベルで同一 Namespace（tier: service）内の
# 通信を許可しているが、tier-architecture.md で定義されている「service 層の BFF 間の
# 通信は原則禁止」ルールは Istio AuthorizationPolicy（L7）で制御する。
# BFF 間の直接通信の禁止については認証認可設計.md の AuthorizationPolicy を参照。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ingress
  namespace: k1s0-service
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              tier: service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      # I-1 対応: ポート制限を追加し、service Tier アプリケーションの許可ポートを明示的に制限
      ports:
        - protocol: TCP
          port: 8080    # HTTP REST API ポート
        - protocol: TCP
          port: 50051   # gRPC ポート
        - protocol: TCP
          port: 9090    # Prometheus メトリクスポート
---
# k1s0-service: Egress を必要な宛先に制限する
# DNS、system Tier（共通基盤）、business Tier、observability のみ許可
# service Tier 間の直接通信は Istio AuthorizationPolicy で制御するため L4 では許可
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-egress
  namespace: k1s0-service
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS 解決を許可（kube-dns / CoreDNS）
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # system Tier（認証・config 等の共通基盤）への通信を許可
    - to:
        - namespaceSelector:
            matchLabels:
              tier: system
    # business Tier への通信を許可
    - to:
        - namespaceSelector:
            matchLabels:
              tier: business
    # observability Namespace（メトリクス・トレース送信）への通信を許可
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
