# k1s0-service: デフォルト拒否ポリシー。
# 他のポリシーで明示的に許可されていないトラフィックを全て遮断する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: k1s0-service
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# k1s0-service: Ingress および同一 Namespace からのインバウンドを許可
# 注意: この NetworkPolicy は L3/L4 レベルで同一 Namespace（tier: service）内の
# 通信を許可しているが、tier-architecture.md で定義されている「service 層の BFF 間の
# 通信は原則禁止」ルールは Istio AuthorizationPolicy（L7）で制御する。
# BFF 間の直接通信の禁止については認証認可設計.md の AuthorizationPolicy を参照。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ingress
  namespace: k1s0-service
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              tier: service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      # I-1 対応: ポート制限を追加し、service Tier アプリケーションの許可ポートを明示的に制限
      ports:
        - protocol: TCP
          port: 8080    # HTTP REST API ポート
        - protocol: TCP
          port: 50051   # gRPC ポート
        - protocol: TCP
          port: 9090    # Prometheus メトリクスポート
---
# k1s0-service: Egress を必要な宛先に制限する
# DNS、system Tier（共通基盤）、business Tier、observability のみ許可
# service Tier 間の直接通信は Istio AuthorizationPolicy で制御するため L4 では許可
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-egress
  namespace: k1s0-service
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # M-1 対応: DNS 通信を CoreDNS が存在する kube-system のみに制限する（system.yaml と統一）
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # system Tier（認証・config 等の共通基盤）への通信を許可
    - to:
        - namespaceSelector:
            matchLabels:
              tier: system
      # M-7 監査対応: system Tier への通信に明示的なポート指定を追加する
      ports:
        - protocol: TCP
          port: 8080    # HTTP REST API（Keycloak 等）
        - protocol: TCP
          port: 50051   # gRPC（認証・設定取得）
        - protocol: TCP
          port: 8200    # Vault
    # business Tier への通信を許可
    - to:
        - namespaceSelector:
            matchLabels:
              tier: business
      # M-7 監査対応: business Tier への通信に明示的なポート指定を追加する
      ports:
        - protocol: TCP
          port: 8080    # HTTP REST API
        - protocol: TCP
          port: 50051   # gRPC
    # observability Namespace（メトリクス・トレース送信）への通信を許可
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      # M-7 監査対応: OTEL Collector gRPC（4317）および HTTP（4318）ポートを明示的に指定する
      ports:
        - protocol: TCP
          port: 4317    # OTEL Collector gRPC（メトリクス・トレース送信）
        - protocol: TCP
          port: 4318    # OTEL Collector HTTP（メトリクス・トレース送信）
        - protocol: TCP
          port: 9090    # Prometheus スクレイプ
    # messaging Namespace（Kafka ブローカー）への通信を許可（M-5 監査対応）
    # service Tier サービスも Kafka を使用するため egress ルールが必要（business.yaml と同様）
    # TLS リスナー（9093）のみ許可する（M-7 対応で plain リスナー 9092 は廃止）
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: messaging
      ports:
        - protocol: TCP
          port: 9093
