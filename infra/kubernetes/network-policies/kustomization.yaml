# Kustomize ベースリソース定義: Kubernetes ネットワークポリシーの管理
# kubectl apply -k infra/kubernetes/overlays/staging/ などで使用される
# 各名前空間のネットワークポリシーファイルを resources に列挙する
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - business.yaml
  # MED-006 監査対応: auth / config / vault サービスの個別 ingress 制限ポリシー
  - system-per-service.yaml
  # H-14 監査対応: infra Namespace の NetworkPolicy を追加（ゼロトラスト原則の適用）
  - infra-cert-manager.yaml
  - infra-harbor.yaml
  - infra-ingress.yaml
  - infra-service-mesh.yaml
  - messaging.yaml
  - observability.yaml
  - service.yaml
  - system.yaml
