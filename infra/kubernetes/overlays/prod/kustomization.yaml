# M-11 監査対応: prod 環境用 Kustomize overlay
# namespace-quotas.yaml のコメントアウト済みの prod(4x) 設定を overlay として分離した。
# base に対して ResourceQuota をパッチして prod 相当の値（dev の 4x）に上書きする。
#
# 適用方法:
#   kubectl apply -k infra/kubernetes/overlays/prod/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ベースリソース: 全 Namespace の共通設定（NetworkPolicy, RBAC 等）
# HIGH-15 監査対応: prod 環境では cert-manager/backup/ingress/limit-ranges も含める
# - cert-manager: TLS 証明書自動更新（prod は Let's Encrypt Cluster Issuer を使用）
# - backup: etcd/DB/Vault の定期バックアップ CronJob（障害復旧要件）
# - ingress: Kong Ingress / grafana consumer 設定
# - limit-ranges: コンテナごとのリソース上限強制（暴走コンテナによるノード枯渇防止）
#
# CRIT-005 対応: ../../security を resources から除外。
# security/ ディレクトリの audit-policy.yaml と encryption-config.yaml は
# kube-apiserver の設定ファイルであり Kubernetes API オブジェクトではない。
# これらは CI/CD パイプラインまたは手動で Master ノードに配置すること（各ファイルのコメント参照）。
resources:
  - ../../namespaces
  - ../../network-policies
  - ../../rbac
  - ../../resource-quotas
  - ../../cert-manager
  - ../../backup
  - ../../ingress
  - ../../limit-ranges

# prod 環境のリソースクォータを 4x に上書きする（dev の 4 倍スケール）
patches:
  - target:
      kind: ResourceQuota
      name: namespace-quota
      namespace: k1s0-system
    patch: |-
      - op: replace
        path: /spec/hard/requests.cpu
        value: "32"
      - op: replace
        path: /spec/hard/requests.memory
        value: 64Gi
      - op: replace
        path: /spec/hard/limits.cpu
        value: "64"
      - op: replace
        path: /spec/hard/limits.memory
        value: 128Gi
      - op: replace
        path: /spec/hard/pods
        value: "200"
      - op: replace
        path: /spec/hard/persistentvolumeclaims
        value: "80"
  - target:
      kind: ResourceQuota
      name: namespace-quota
      namespace: k1s0-business
    patch: |-
      - op: replace
        path: /spec/hard/requests.cpu
        value: "64"
      - op: replace
        path: /spec/hard/requests.memory
        value: 128Gi
      - op: replace
        path: /spec/hard/limits.cpu
        value: "128"
      - op: replace
        path: /spec/hard/limits.memory
        value: 256Gi
      - op: replace
        path: /spec/hard/pods
        value: "400"
      - op: replace
        path: /spec/hard/persistentvolumeclaims
        value: "160"
  - target:
      kind: ResourceQuota
      name: namespace-quota
      namespace: k1s0-service
    patch: |-
      - op: replace
        path: /spec/hard/requests.cpu
        value: "32"
      - op: replace
        path: /spec/hard/requests.memory
        value: 64Gi
      - op: replace
        path: /spec/hard/limits.cpu
        value: "64"
      - op: replace
        path: /spec/hard/limits.memory
        value: 128Gi
      - op: replace
        path: /spec/hard/pods
        value: "200"
      - op: replace
        path: /spec/hard/persistentvolumeclaims
        value: "80"
