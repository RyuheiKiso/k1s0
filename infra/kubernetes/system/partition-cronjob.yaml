apiVersion: batch/v1
kind: CronJob
metadata:
  name: audit-log-partition-maintenance
  namespace: k1s0-system
  labels:
    app: audit-log-maintenance
    tier: system
spec:
  # Run on the 1st of every month at 02:00 UTC
  schedule: "0 2 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: audit-log-maintenance
        spec:
          restartPolicy: OnFailure
          serviceAccountName: partition-maintenance
          containers:
            - name: partition-maintenance
              # MED-12 監査対応: postgres-backup-cronjob と同一バージョン（17-alpine）に統一する。
              # バージョン不一致はパーティション保守とバックアップ間の動作差異を引き起こす可能性がある。
              image: postgres:17-alpine
              # H-7 対応: 最小権限でコンテナを実行する（他のバックアップジョブと統一）
              # C-007 監査対応: PSS restricted 準拠のため seccompProfile と readOnlyRootFilesystem を追加
              # k1s0-system namespace は pod-security.kubernetes.io/enforce: restricted が設定されており必須
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop: ["ALL"]
              command:
                - /bin/sh
                - -c
                - |
                  psql "$DATABASE_URL" -c "SELECT public.run_maintenance('auth.audit_logs');"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: url
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
---
# K8S-MED-002 監査対応: partition-maintenance SA にautomountServiceAccountToken: false を設定する
# partition-maintenance ジョブは PostgreSQL の psql コマンドのみを実行し Kubernetes API へのアクセスは不要である
# デフォルトの自動マウントを無効化することでトークン漏洩リスクを低減する
apiVersion: v1
kind: ServiceAccount
metadata:
  name: partition-maintenance
  namespace: k1s0-system
  labels:
    app: audit-log-maintenance
automountServiceAccountToken: false
