# M-031 監査対応: HashiCorp Vault の監査ログを PVC に永続化する
# 問題: Pod 再起動時に /vault/logs/audit.log が消失し、コンプライアンス要件を満たせない
# 修正: vault-audit-log-pvc を作成し、Vault Helm chart の server.volumeMounts でマウントする
#
# このファイルを適用した後、Vault Helm chart の values に以下を追加すること:
#   server:
#     volumes:
#       - name: audit-log
#         persistentVolumeClaim:
#           claimName: vault-audit-log-pvc
#     volumeMounts:
#       - name: audit-log
#         mountPath: /vault/logs
#
# または Vault Helm chart の auditStorage オプションを使用する:
#   server:
#     auditStorage:
#       enabled: true
#       size: 10Gi
#       storageClass: standard
#       accessMode: ReadWriteOnce
#
# 参照: infra/terraform/modules/vault/values/vault-helm-overrides.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # Vault audit log 永続化用 PVC
  name: vault-audit-log-pvc
  namespace: k1s0-system
  labels:
    app: vault
    component: audit-log
    tier: system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # 監査ログは長期保存が必要なためコンプライアンス要件に応じてサイズを調整すること
      storage: 10Gi
  # M-031 監査対応: 本番環境の StorageClass は ceph-block を使用する（infra/kubernetes/storage/storage-classes.yaml 参照）
  # ceph-block は RWO（ReadWriteOnce）・Retain ポリシーで監査ログの長期保管に適している
  storageClassName: ceph-block
