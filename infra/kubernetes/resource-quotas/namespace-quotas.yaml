# Kubernetes ResourceQuota 環境別設定
# M-09対応: 環境（dev/staging/prod）ごとに異なるクォータを設定し、
# 環境間のリソース競合とコスト超過を防止する。
#
# スケール比率:
#   dev:     1x（基準値）
#   staging: 2x（本番相当の負荷試験を可能にする）
#   prod:    4x（本番の最大負荷・冗長性を考慮した上限）
#
# 適用方法:
#   kubectl apply -f namespace-quotas.yaml --namespace=<namespace>
#   または kustomize overlays/{dev,staging,prod} で環境別に適用すること。
#
# 現在適用中の設定: dev 相当（1x）
# staging/prod への適用は infra/kubernetes/overlays/{staging,prod}/ を参照すること。
#
# L-03 対応: ResourceQuota Pod 数の設計根拠
# Pod 数の算出方法: 想定サービス数 × 最大レプリカ数 + バッファ(20%)
#   k1s0-system (50 pods):
#     26サービス × 1.5レプリカ(平均) = 39 → バッファ含め 50 に設定
#     ※ dev 環境のためレプリカ数を抑制。prod は scale_factor で4倍（200 pods）
#   k1s0-business (10 pods):
#     L-04 監査対応: 現状 3〜4 サービス × 2 レプリカ + バッファ(20%) ≒ 10 に縮小
#     ※ タスク管理・ボード・アクティビティ等のビジネスドメインを含む
#   k1s0-service (50 pods):
#     3サービス × 3レプリカ + バッファ = 50
#     ※ dev 環境のためレプリカ数を抑制。prod は scale_factor で4倍（200 pods）

# ============================================================
# dev 環境 (1x) - 現在適用中
# ============================================================

apiVersion: v1
kind: ResourceQuota
metadata:
  # k1s0-system 名前空間: system tier の共通基盤サービス群
  name: namespace-quota
  namespace: k1s0-system
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    # M-006 監査対応: 26サービス × デフォルト1コア = 26コアに引き上げ（旧値 16 は8-16 Pod しかスケジューリングできなかった）
    limits.cpu: "26"
    limits.memory: 32Gi
    # 26サービス × 1.5レプリカ(平均) = 39 → バッファ20%含め 50 に設定（dev 1x）
    pods: "50"
    persistentvolumeclaims: "20"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  # k1s0-business 名前空間: business tier のドメインサービス群
  name: namespace-quota
  namespace: k1s0-business
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    # L-04 監査対応: 現状のサービス数（taskmanagement 等 3〜4 サービス）に合わせて縮小する。
    # 算出根拠: 最大 4 サービス × 2 レプリカ + バッファ(20%) ≒ 10（dev 1x）
    # 過剰な上限はリソースの見積もり誤りを隠蔽するため、実態に合わせた値に引き下げる。
    # ※ staging/prod への適用は overlays/{staging,prod}/ で scale_factor に合わせて調整すること。
    pods: "10"
    persistentvolumeclaims: "40"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  # k1s0-service 名前空間: service tier の個別サービス群
  name: namespace-quota
  namespace: k1s0-service
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    # 3サービス(task/board/activity) × 3レプリカ + バッファ20% = 50（dev 1x）
    pods: "50"
    persistentvolumeclaims: "20"

