  name: k1s0-business-role
  namespace: k1s0-business
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
# k1s0-business Namespace 用 RoleBinding
# MED-009 監査対応: business tier の個別サービス SA を追加する
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k1s0-business-role-binding
  namespace: k1s0-business
subjects:
  - kind: ServiceAccount
    name: k1s0-business-sa
    namespace: k1s0-business
  # 個別サービス SA
  - kind: ServiceAccount
    name: project-master-rust
    namespace: k1s0-business
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: k1s0-business-role
---
