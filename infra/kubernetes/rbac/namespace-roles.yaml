# Namespace スコープの Role/RoleBinding 定義
# 各 ServiceAccount に対して最小権限の原則に基づいたアクセス制御を設定する（I-3 対応）

# k1s0-system Namespace 用 Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k1s0-system-role
  namespace: k1s0-system
rules:
  # Pod・Service の参照のみ許可（ヘルスチェック・サービスディスカバリ用）
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  # ConfigMap の参照（設定マウント用）
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Secret の参照（Vault Agent Injector 連携用）
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
# k1s0-system Namespace 用 RoleBinding
# MED-009 監査対応: tier 単位 SA に加えて system tier の全サービス個別 SA を追加する
# 各サービスが自 namespace 内の Pod/Service/ConfigMap/Secret を参照できるようにする
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k1s0-system-role-binding
  namespace: k1s0-system
subjects:
  - kind: ServiceAccount
    name: k1s0-system-sa
    namespace: k1s0-system
  # 個別サービス SA（service-accounts.yaml と対応）
  - kind: ServiceAccount
    name: ai-gateway
    namespace: k1s0-system
  - kind: ServiceAccount
    name: ai-agent
    namespace: k1s0-system
  - kind: ServiceAccount
    name: auth-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: bff-proxy-sa
    namespace: k1s0-system
  - kind: ServiceAccount
    name: graphql-gateway
    namespace: k1s0-system
  - kind: ServiceAccount
    name: config-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: saga-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: dlq-manager
    namespace: k1s0-system
  - kind: ServiceAccount
    name: session-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: vault-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: scheduler-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: notification-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: workflow-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: featureflag-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: tenant-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: ratelimit-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: navigation-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: service-catalog
    namespace: k1s0-system
  - kind: ServiceAccount
    name: rule-engine-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: quota-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: search-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: file-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: event-store-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: event-monitor-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: app-registry
    namespace: k1s0-system
  - kind: ServiceAccount
    name: api-registry-rust
    namespace: k1s0-system
  - kind: ServiceAccount
    name: master-maintenance
    namespace: k1s0-system
  - kind: ServiceAccount
    name: policy-rust
    namespace: k1s0-system
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: k1s0-system-role
---
# k1s0-business Namespace 用 Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
