# 開発者用 Role
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k1s0-developer
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
# 運用者用 Role
# secrets は最小権限の原則により参照(get, list, watch)のみに限定する。
# 書き込み系操作（create, update, delete）は k1s0-admin ロールの権限とする。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k1s0-operator
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # secrets は参照のみ許可（最小権限の原則 - 書き込み操作は admin のみ）
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# インフラ管理者用 Role
# ワイルドカードを排除し、管理に必要なリソースとverbを明示的に列挙する
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k1s0-admin
rules:
  # コアリソース（Pod、Service、ConfigMap、Secret、Namespace、PersistentVolumeClaim等）の全操作
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "namespaces", "persistentvolumeclaims", "serviceaccounts", "events", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # apps グループ（Deployment、StatefulSet、DaemonSet、ReplicaSet）の全操作
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # batch グループ（Job、CronJob）の全操作
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ネットワークポリシーの管理
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC リソースの管理（K8S-RBAC-001 監査対応: APIGroup の制限理由を明確化）
  # k1s0-admin は Namespace スコープの roles/rolebindings のみ操作可能に限定する。
  # 理由: clusterroles/clusterrolebindings を操作できると、自身に任意のクラスタ権限を
  # 付与できる権限エスカレーション（privilege escalation）が発生するリスクがある。
  # clusterroles/clusterrolebindings の管理は k1s0-security-admin（セキュリティチーム専用）に分離し、
  # ADR-0038 の最小権限原則に準拠する。（H-6 監査対応）
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # オートスケーリングの管理
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ストレージの管理
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# セキュリティ管理者用 Role（H-6 監査対応: ADR-0038）
# ClusterRole/ClusterRoleBinding への操作権限を分離し、セキュリティチームのみに付与する。
# k1s0-admin と分離することで権限エスカレーションリスクを排除する。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k1s0-security-admin
rules:
  # RBAC クラスタリソースの管理（専用権限として k1s0-admin から分離）
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# 運用監視用 readonly Role
# 参照のみ(get, list, watch)を許可。secrets は機密情報のため除外する
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: readonly
rules:
  # コアリソースの参照（secrets を除外してセキュリティを確保）
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "namespaces", "persistentvolumeclaims", "serviceaccounts", "events", "endpoints"]
    verbs: ["get", "list", "watch"]
  # apps グループの参照
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  # batch グループの参照
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  # ネットワークリソースの参照
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  # オートスケーリングの参照
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
