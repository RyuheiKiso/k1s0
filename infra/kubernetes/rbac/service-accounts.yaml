# ============================================================
# Kubernetes ServiceAccount 定義
# tier 単位 SA（後方互換）および最小権限の原則に従いサービス単位で
# ServiceAccount を分離した個別 SA を管理する。
# 1サービスが侵害されても同 tier 内の他サービスへの権限流出を防ぐ。
# ============================================================

# ----------------------------------------------------------------
# tier 単位 ServiceAccount（後方互換のため残存）
# 新規デプロイは以下のサービス単位 SA を使用すること。
# ----------------------------------------------------------------

# k1s0-system namespace 共通 ServiceAccount（後方互換）
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k1s0-system-sa
  namespace: k1s0-system
  labels:
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: kubectl
    tier: system
---
# k1s0-business namespace 共通 ServiceAccount（後方互換）
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k1s0-business-sa
  namespace: k1s0-business
  labels:
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: kubectl
    tier: business
---
# k1s0-service namespace 共通 ServiceAccount（後方互換）
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k1s0-service-sa
  namespace: k1s0-service
  labels:
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: kubectl
    tier: service
---
# ================================================================
