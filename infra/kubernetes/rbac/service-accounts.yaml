# ============================================================
# Kubernetes ServiceAccount 定義
# HIGH-6 監査対応: ServiceAccount 名を Helm values.yaml の serviceAccount.name と統一する。
# RBAC の *-sa suffix → Helm 側の名前（-rust suffix または suffix なし）に合わせて変更する。
# Vault kubernetes auth role の bound_service_account_names とも一致させること。
# tier 単位 SA（後方互換）および最小権限の原則に従いサービス単位で
# ServiceAccount を分離した個別 SA を管理する。
# 1サービスが侵害されても同 tier 内の他サービスへの権限流出を防ぐ。
#
# INFRA-001 整合性確認済み（2026-04-03）:
# 本ファイルの全 SA 名は以下の 3 つの設定と完全に一致していることを確認済み。
# 変更は不要。命名規約の混在（-rust suffix / -sa suffix / suffix なし）は
# 意図的な設計であり、各 SA 名は権威情報（Terraform）に合わせて確定している。
#   1. infra/terraform/modules/vault/auth.tf の bound_service_account_names
#   2. 各サービスの infra/helm/services/**/values.yaml の serviceAccount.name
#   3. infra/vault/auth/*.yaml の bound_service_account_names（リファレンス設定）
#
# 命名規約の説明（混在は意図的）:
#   - "-rust" suffix  : Rust 製サービス（auth-rust, config-rust 等）
#   - "-sa" suffix    : bff-proxy-sa（H-1 監査対応で確定済み、変更不可）
#   - suffix なし     : Go/他言語サービスまたは歴史的経緯（dlq-manager, graphql-gateway 等）
#
# MED-005 監査対応（2026-04-04）: ai-gateway, ai-agent の SA を追加済み。
# auth.tf の vault_kubernetes_auth_backend_role も同時に追加した。
# ============================================================

# ----------------------------------------------------------------
# AI サービス用 ServiceAccount（MED-005 監査対応: 試験段階のため system namespace に配置）
# ----------------------------------------------------------------

# AI ゲートウェイサービス用 ServiceAccount（ai-gateway）
# Vault kubernetes auth ロール "ai-gateway" の bound_service_account_names と一致させる
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-gateway
  namespace: k1s0-system
  labels:
    app.kubernetes.io/part-of: k1s0
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/component: ai-gateway
    tier: system
# MEDIUM-9 対応: Kubernetes API へのトークン自動マウントを無効化し、不要なアクセス権を排除する
automountServiceAccountToken: false
---
# AI エージェントサービス用 ServiceAccount（ai-agent）
# Vault kubernetes auth ロール "ai-agent" の bound_service_account_names と一致させる
