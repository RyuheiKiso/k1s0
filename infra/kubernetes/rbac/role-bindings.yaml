# k1s0-admin RoleBinding - インフラチーム（H-6 監査対応: ADR-0038）
# ClusterRoleBinding から RoleBinding に変更し、k1s0 アプリケーション Namespace に権限を限定する。
# クラスタ全域への k1s0-admin 権限付与は過剰であるため、各 Namespace に個別に適用する。
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k1s0-admin-binding
  namespace: k1s0-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k1s0-admin
subjects:
  - kind: Group
    name: k1s0-admin
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k1s0-admin-binding
  namespace: k1s0-business
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k1s0-admin
subjects:
  - kind: Group
    name: k1s0-admin
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k1s0-admin-binding
  namespace: k1s0-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k1s0-admin
subjects:
  - kind: Group
    name: k1s0-admin
    apiGroup: rbac.authorization.k8s.io
---
# k1s0-operator RoleBinding - 運用チーム（H-6 監査対応: ADR-0038）
# ClusterRoleBinding から RoleBinding に変更し、k1s0 アプリケーション Namespace に権限を限定する。
# 全クラスタの secrets/deployments/statefulsets への操作権限を k1s0 Namespace に制限する。
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k1s0-operator-binding
  namespace: k1s0-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k1s0-operator
subjects:
  - kind: Group
    name: k1s0-operator
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k1s0-operator-binding
  namespace: k1s0-business
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k1s0-operator
subjects:
  - kind: Group
    name: k1s0-operator
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k1s0-operator-binding
  namespace: k1s0-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k1s0-operator
subjects:
  - kind: Group
    name: k1s0-operator
    apiGroup: rbac.authorization.k8s.io
---
# k1s0-security-admin ClusterRoleBinding - セキュリティチーム（H-6 監査対応: ADR-0038）
# RBAC クラスタリソース操作権限はセキュリティチームのみに付与する。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k1s0-security-admin-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k1s0-security-admin
subjects:
  - kind: Group
    name: k1s0-security-admin
    apiGroup: rbac.authorization.k8s.io
---
# k1s0-developer ClusterRoleBinding - 開発者
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k1s0-developer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k1s0-developer
subjects:
  - kind: Group
    name: k1s0-developer
    apiGroup: rbac.authorization.k8s.io
---
# readonly ClusterRoleBinding - 運用監視
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: readonly-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: readonly
subjects:
  - kind: Group
    name: readonly
    apiGroup: rbac.authorization.k8s.io
