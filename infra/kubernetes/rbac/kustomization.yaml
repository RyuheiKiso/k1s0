# Kustomize ベースリソース定義: Kubernetes RBAC（Role-Based Access Control）の管理
# kubectl apply -k infra/kubernetes/overlays/staging/ などで使用される
# ServiceAccount、ClusterRole、RoleBinding を resources に列挙する
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cluster-roles.yaml
  - namespace-roles.yaml
  - role-bindings.yaml
  - service-accounts.yaml
