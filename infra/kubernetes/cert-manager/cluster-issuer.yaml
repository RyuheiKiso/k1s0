# Step 1: Self-signed bootstrap issuer to generate the CA certificate
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
# Step 2: CA certificate (5 years) issued by the bootstrap issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: k1s0-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: k1s0-internal-ca
  secretName: k1s0-ca-secret
  # 3 years（LOW-5 対応: セキュリティベストプラクティスに従い 5 年から 3 年に短縮）
  # 前回の監査対応（L-2）で 10 年 → 5 年に短縮したが、今回の外部監査（LOW-5）で
  # ≤3 年への短縮が指摘された。26280h = 3 年 = 365 × 24 × 3
  duration: 26280h
  renewBefore: 8760h      # Renew 1 year before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
# Step 3: Internal CA issuer backed by the CA certificate
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-ca
spec:
  ca:
    secretName: k1s0-ca-secret
