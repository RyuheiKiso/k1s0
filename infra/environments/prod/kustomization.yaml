# =============================================================================
# infra/environments/prod/kustomization.yaml
#
# prod 環境用 overlay。`infra/` 直下の base がそのまま prod を表現するため、
# patches/ は原則空（DS-OPS-ENV-007）。env 識別ラベルと SOPS 復号 secret のみを
# 適用する。
#
# 設計正典:
#   docs/05_実装/00_ディレクトリ設計/50_infraレイアウト/08_環境別パッチ配置.md
#   docs/04_概要設計/55_運用ライフサイクル方式設計/03_環境構成管理方式.md
#
# 利用: Argo CD ApplicationSet が target として Sync（手動承認必須、DS-OPS-ENV-007）。
#
# 注: kustomize の load-restriction（外部ファイル直接参照禁止）に対応するため、
#     `resources:` は **ディレクトリ参照** で記述する（各 base に kustomization.yaml
#     を配置済）。
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# kustomize v5 で `commonLabels` は deprecated。後継の `labels` を使う。
labels:
  - pairs:
      app.kubernetes.io/part-of: k1s0
      k1s0.io/env: prod
    includeSelectors: true

resources:
  - ../../k8s/namespaces
  - ../../k8s/storage
  - ../../mesh/istio-ambient
  - ../../security/kyverno
  - ../../security/cert-manager
  - ../../data/cloudnativepg
  - ../../data/kafka
  - ../../feature-management/flagd

# prod は base がそのまま表現するため patches は空（必要時のみ追加）。
# patches: []
