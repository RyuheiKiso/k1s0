# =============================================================================
# infra/environments/prod/kustomization.yaml
#
# prod 環境用 overlay。`infra/` 直下の base がそのまま prod を表現するため、
# patches/ は原則空（DS-OPS-ENV-007）。env 識別ラベルと SOPS 復号 secret のみを
# 適用する。
#
# 設計正典:
#   docs/05_実装/00_ディレクトリ設計/50_infraレイアウト/08_環境別パッチ配置.md
#   docs/04_概要設計/55_運用ライフサイクル方式設計/03_環境構成管理方式.md
#
# 利用: Argo CD ApplicationSet が target として Sync（手動承認必須、DS-OPS-ENV-007）。
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonLabels:
  app.kubernetes.io/part-of: k1s0
  k1s0.io/env: prod

resources:
  - ../../k8s/namespaces/namespaces.yaml
  - ../../k8s/storage/storage-classes.yaml
  - ../../mesh/istio-ambient/peer-authentication.yaml
  - ../../security/kyverno/baseline-policies.yaml
  - ../../security/cert-manager/cluster-issuer.yaml
  - ../../data/cloudnativepg/cluster.yaml
  - ../../data/kafka/kafka-cluster.yaml
  - ../../feature-management/flagd/flagd-deployment.yaml

# prod は base がそのまま表現するため patches は空（必要時のみ追加）。
# patches: []
