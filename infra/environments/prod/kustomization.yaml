# =============================================================================
# infra/environments/prod/kustomization.yaml
#
# prod 環境用 overlay。`infra/` 直下の base がそのまま prod を表現するため、
# patches/ は原則空（DS-OPS-ENV-007）。env 識別ラベルと SOPS 復号 secret のみを
# 適用する。
#
# 設計正典:
#   docs/05_実装/00_ディレクトリ設計/50_infraレイアウト/08_環境別パッチ配置.md
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/part-of: k1s0
      k1s0.io/env: prod
    includeSelectors: true

resources:
  # k8s 基盤
  - ../../k8s/namespaces
  - ../../k8s/networking
  - ../../k8s/storage
  # mesh
  - ../../mesh/istio-ambient
  - ../../mesh/envoy-gateway
  # dapr
  - ../../dapr/control-plane
  - ../../dapr/subscriptions
  # data
  - ../../data/cloudnativepg
  - ../../data/kafka
  - ../../data/minio
  - ../../data/valkey
  # security
  - ../../security/cert-manager
  - ../../security/keycloak
  - ../../security/openbao
  - ../../security/spire
  - ../../security/kyverno
  # observability
  - ../../observability
  # scaling / feature management / platform
  - ../../scaling/keda
  - ../../feature-management/flagd
  # env 別 Dapr Component overlay（prod は base そのまま）
  - ./dapr-components-overlay

# prod は base がそのまま表現するため patches は空。
# patches: []
