# staging 用 CNPG Cluster patch: 3 Cluster を 2 instance + storage 半減で HA 維持
# つつコスト圧縮（DS-OPS-ENV-007 の本番同等性、staging→prod 構造ガード）。
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: tier1-state
  namespace: k1s0-data
spec:
  instances: 2
  storage:
    size: 50Gi
  walStorage:
    size: 25Gi
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: tier2-domain
  namespace: k1s0-data
spec:
  instances: 2
  storage:
    size: 50Gi
  walStorage:
    size: 25Gi
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: audit
  namespace: k1s0-data
spec:
  instances: 2
  storage:
    size: 250Gi
  walStorage:
    size: 50Gi
