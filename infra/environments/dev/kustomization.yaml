# =============================================================================
# infra/environments/dev/kustomization.yaml
#
# 開発者ローカル kind / k3d クラスタ向けの最小構成 overlay。
# CNPG 1 instance / Kafka 1 broker / Valkey standalone の単一ノード起動可能規模。
#
# 設計正典:
#   docs/05_実装/00_ディレクトリ設計/50_infraレイアウト/08_環境別パッチ配置.md
#   docs/04_概要設計/55_運用ライフサイクル方式設計/03_環境構成管理方式.md
#     - DS-OPS-ENV-007（本番同等性、staging→prod は同構成・規模差のみ）
#
# 利用:
#   kubectl apply -k infra/environments/dev/
#   または tools/local-stack/up.sh から呼出（推奨）
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 共通 namespace ラベル（Pod Security Standards / Istio Ambient 連携用）
labels:
  - pairs:
      app.kubernetes.io/part-of: k1s0
      k1s0.io/env: dev
    includeSelectors: true

# infra base の 19 サブ全て（spec IMP-DIR-INFRA-078）+ dapr-components-overlay
resources:
  # k8s 基盤
  - ../../k8s/namespaces
  - ../../k8s/networking
  - ../../k8s/storage
  # mesh
  - ../../mesh/istio-ambient
  - ../../mesh/envoy-gateway
  # dapr
  - ../../dapr/control-plane
  - ../../dapr/subscriptions
  # data
  - ../../data/cloudnativepg
  - ../../data/kafka
  - ../../data/minio
  - ../../data/valkey
  # security
  - ../../security/cert-manager
  - ../../security/keycloak
  - ../../security/openbao
  - ../../security/spire
  - ../../security/kyverno
  # observability
  - ../../observability
  # scaling / feature management / platform
  - ../../scaling/keda
  - ../../feature-management/flagd
  # env 別 Dapr Component overlay
  - ./dapr-components-overlay

# dev 用 kustomize strategic merge patch（CR が base に存在するもののみ）
patches:
  - path: patches/cloudnativepg-instances-1.yaml
  - path: patches/kafka-broker-1.yaml

# Helm values overlay 用 patch は `values/<component>/values.yaml` に配置し、
# Argo CD ApplicationSet / Helmfile 側で参照する。リリース時点ではドキュメント
# として patches/ 配下にも残し、kustomize build からは外す:
#   - patches/valkey-cluster-disabled.yaml      → values/valkey/ で適用
#   - patches/letsencrypt-staging.yaml          → values/cert-manager/ で適用
#   - patches/observability-retention-7d.yaml   → values/{loki,tempo,mimir}/ で適用
