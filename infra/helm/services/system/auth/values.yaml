# k1s0-common からのデフォルトを継承し、auth サービス固有の値のみ上書きする
# 共通デフォルト値は infra/helm/charts/k1s0-common/values.yaml を参照
# L-8 監査対応: image.registry, autoscaling, resources は k1s0-common のデフォルトを継承

image:
  repository: k1s0-system/auth

container:
  port: 8080
  grpcPort: 50051

service:
  grpcPort: 50051

# L-10 監査対応: gRPC サービスのヘルスチェックを有効化する。
# gRPC サービスは HTTP /healthz ではなく gRPC ヘルスチェックプロトコルを使用すること。
# Kubernetes の livenessProbe/readinessProbe が gRPC 経由でコンテナの健全性を確認する。
# CRITICAL-8 対応: grpcHealthCheck.enabled: true の場合、テンプレートが liveness/readiness/startup の
# 各フィールドを直接参照するため、nil pointer エラーを防ぐために明示的なデフォルト値を設定する。
probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
  startup:
    initialDelaySeconds: 10
    failureThreshold: 10
    periodSeconds: 5
  grpcHealthCheck:
    enabled: true

vault:
  enabled: true
  role: "system"
  secrets:
    - path: "secret/data/k1s0/system/auth/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  name: "auth-rust"

labels:
  tier: system

kafka:
  enabled: true

redis:
  enabled: false
