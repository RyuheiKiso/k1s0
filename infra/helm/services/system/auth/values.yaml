# H-002 監査対応: helm template 単体実行時にもイメージ参照が完全になるよう、必須デフォルト値を明示する
# k1s0-common/values.yaml との重複定義だが、standalone 実行時の安全性を優先する

image:
  registry: harbor.internal.example.com
  repository: k1s0-system/auth
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-pull-secret

container:
  port: 8080
  grpcPort: 50051

service:
  grpcPort: 50051

# L-10 監査対応: gRPC サービスのヘルスチェックを有効化する。
# gRPC サービスは HTTP /healthz ではなく gRPC ヘルスチェックプロトコルを使用すること。
# Kubernetes の livenessProbe/readinessProbe が gRPC 経由でコンテナの健全性を確認する。
# CRITICAL-8 対応: grpcHealthCheck.enabled: true の場合、テンプレートが liveness/readiness/startup の
# 各フィールドを直接参照するため、nil pointer エラーを防ぐために明示的なデフォルト値を設定する。
probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
  startup:
    initialDelaySeconds: 10
    failureThreshold: 10
    periodSeconds: 5
  grpcHealthCheck:
    enabled: true

# H-002 監査対応: SecurityContext を明示しないと k1s0-common なしでは PSS 違反になる
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  # PSS restricted 準拠: K8S-CRIT-001 対応
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# H-03 監査対応: 単一 "system" ロールから個別ロール "auth-rust" に変更する。
# 最小権限の原則に従い、auth サービスは自サービスのシークレットにのみアクセス可能とする（ADR-0045 参照）。
vault:
  enabled: true
  role: "auth-rust"
  secrets:
    - path: "secret/data/k1s0/system/auth-server/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  name: "auth-rust"

labels:
  tier: system

kafka:
  enabled: true

redis:
  enabled: false

# ConfigMap に注入する設定値（regions/system/server/rust/auth/config/config.yaml から引用）
# 機密情報（DB パスワード、Keycloak client_secret）は Vault 経由で /vault/secrets/ に注入される。
# SERVER_HOST / DATABASE_URL 等は環境変数で上書き可能。
config:
  mountPath: /etc/app
  data:
    config.yaml: |
      app:
        name: "auth-server"
        version: "0.1.0"
        environment: "production"

      server:
        host: "0.0.0.0"
        port: 8080
        grpc_port: 50051

      auth:
        jwt:
          issuer: "https://auth.k1s0.internal.example.com/realms/k1s0"
          audience: "k1s0-api"

      # DB パスワードは Vault 経由で /vault/secrets/db-password に注入される
      database:
        host: "postgres.k1s0-system.svc.cluster.local"
        port: 5432
        name: "k1s0_system"
        user: "app"
        password: ""
        ssl_mode: "require"
        max_open_conns: 25
        max_idle_conns: 5
        conn_max_lifetime: "5m"

      kafka:
        brokers:
          - "kafka-0.messaging.svc.cluster.local:9093"
        consumer_group: "auth-server.default"
        security_protocol: "SASL_SSL"
        topics:
          publish:
            - "k1s0.system.auth.login.v1"
            - "k1s0.system.auth.token_validate.v1"
            - "k1s0.system.auth.permission_denied.v1"
          subscribe: []

      # Keycloak client_secret は Vault 経由で注入される
      # LOW-008 監査対応: client_id の設計意図を明確化する。
      # keycloak.client_id は JWT 検証・トークン取得用の一般クライアント（auth-server）。
      # keycloak_admin.client_id は Keycloak 管理 API 用の専用クライアント（auth-rust-admin）。
      # この2つは別クライアントであり混同しないこと。
      # config.docker.yaml の keycloak.client_id は "auth-rust-admin" になっているが、
      # それは Docker 環境での開発用設定であり、本番は Client Credentials Grant で auth-server を使用する。
      keycloak:
        base_url: "https://auth.k1s0.internal.example.com"
        realm: "k1s0"
        client_id: "auth-server"
        client_secret: ""

      permission_cache:
        ttl_secs: 300
        refresh_on_miss: true

      audit:
        kafka_enabled: true
        retention_days: 365

      keycloak_admin:
        token_cache_ttl_secs: 300
        refresh_interval_secs: 300

      cache:
        user_cache_max_entries: 5000
        user_cache_ttl_secs: 300

      observability:
        log:
          level: "info"
          format: "json"
        trace:
          enabled: true
          endpoint: "http://otel-collector.observability:4317"
          sample_rate: 1.0
        metrics:
          enabled: true
          path: "/metrics"

      tier_hierarchy:
        tiers:
          - "system"
          - "business"
          - "service"
