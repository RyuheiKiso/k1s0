replicaCount: 2

# GraphQL Gateway はすべてのクライアントリクエストを処理するため、汎用サービスより多くのリソースが必要
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

config:
  data:
    config.yaml: |
      app:
        environment: staging
      graphql:
        introspection: false
        playground: false
      backends:
        tenant:
          address: "http://tenant.k1s0-system.svc.cluster.local:50051"
        featureflag:
          address: "http://featureflag.k1s0-system.svc.cluster.local:50051"
        config:
          address: "http://config.k1s0-system.svc.cluster.local:50051"
      observability:
        log:
          level: info
        trace:
          sample_rate: 0.5
