replicaCount: 1

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10

# H-08監査対応: replicaCount: 1 のため、Pod Anti-Affinity は無意味。
# 単一レプリカ構成ではスケジューリング制約が機能しないため、affinityセクションを削除する。
config:
  data:
    config.yaml: |
      app:
        environment: prod
      graphql:
        introspection: false
        playground: false
        max_depth: 8
        max_complexity: 500
      backends:
        tenant:
          address: "http://tenant.k1s0-system.svc.cluster.local:50051"
          timeout_ms: 2000
        featureflag:
          address: "http://featureflag.k1s0-system.svc.cluster.local:50051"
          timeout_ms: 2000
        config:
          address: "http://config.k1s0-system.svc.cluster.local:50051"
          timeout_ms: 2000
      observability:
        log:
          level: warn
        trace:
          sample_rate: 0.1

# H-06監査対応: DestinationRule（Circuit Breaker）を有効化する。
# mTLS・connectionPool・outlierDetection を全サービスに適用し、
# 障害のカスケードとサービス間の不正通信を防止する。
istio:
  enabled: true
  destinationRule:
    enabled: true
