replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false

pdb:
  enabled: false

vault:
  enabled: false

ceph:
  endpoint: http://ceph-rgw.k1s0-system.svc.cluster.local:8080
  bucket: app-registry-dev
  region: us-east-1

config:
  data:
    config.yaml: |
      app:
        environment: dev
      database:
        host: postgresql.k1s0-system.svc.cluster.local
        ssl_mode: disable
      ceph:
        endpoint: http://ceph-rgw.k1s0-system.svc.cluster.local:8080
        bucket: app-registry-dev
        region: us-east-1
      observability:
        log:
          level: debug
          format: text
        trace:
          sample_rate: 1.0
