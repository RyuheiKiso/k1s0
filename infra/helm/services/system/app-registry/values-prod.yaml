replicaCount: 3

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - app-registry
        topologyKey: kubernetes.io/hostname

ceph:
  endpoint: http://ceph-rgw.k1s0-system.svc.cluster.local:8080
  bucket: app-registry
  region: us-east-1

config:
  data:
    config.yaml: |
      app:
        environment: prod
      database:
        host: postgresql.k1s0-system.svc.cluster.local
        ssl_mode: verify-full
        max_open_conns: 50
      ceph:
        endpoint: http://ceph-rgw.k1s0-system.svc.cluster.local:8080
        bucket: app-registry
        region: us-east-1
      observability:
        log:
          level: warn
        trace:
          sample_rate: 0.1
