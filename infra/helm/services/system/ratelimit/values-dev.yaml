replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false

pdb:
  enabled: false

vault:
  enabled: false

config:
  data:
    config.yaml: |
      app:
        environment: dev
      database:
        host: postgresql.k1s0-system.svc.cluster.local
        ssl_mode: disable
      observability:
        log:
          level: debug
          format: text
        trace:
          sample_rate: 1.0

# MED-004 対応: 開発環境では alertmanager を必須としない（デフォルトが true に変更されたため明示的に false を設定する）
alertmanager:
  required: false
