# k1s0-common からのデフォルトを継承し、ratelimit サービス固有の値のみ上書きする
# 共通デフォルト値は infra/helm/charts/k1s0-common/values.yaml を参照

image:
  repository: k1s0-system/ratelimit

container:
  port: 8088
  grpcPort: 50057

service:
  grpcPort: 50057

vault:
  enabled: true
  role: "system"
  secrets:
    - path: "secret/data/k1s0/system/ratelimit/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  name: "ratelimit-rust"

labels:
  tier: system

kafka:
  enabled: true

redis:
  enabled: false
