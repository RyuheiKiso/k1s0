# H-002 監査対応: helm template 単体実行時にもイメージ参照が完全になるよう、必須デフォルト値を明示する
# k1s0-common/values.yaml との重複定義だが、standalone 実行時の安全性を優先する

image:
  registry: harbor.internal.example.com
  repository: k1s0-system/ratelimit
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-pull-secret

container:
  port: 8088
  # C-006 監査対応: アプリの grpc_port (config.yaml: 50051) と一致させる。旧値 50057 はアプリが実際にリッスンしない
  grpcPort: 50051

service:
  # C-006 監査対応: container.grpcPort と同値に統一
  grpcPort: 50051

# K8S-MED-002 対応: k1s0-common は library chart のためデフォルト値が親チャートに引き継がれない。
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# K8S-MED-003 対応: probes を明示的に設定する（HTTP ヘルスチェック）。
probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
  startup:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    failureThreshold: 10
    periodSeconds: 5
  grpcHealthCheck:
    enabled: false

# H-002 監査対応: SecurityContext を明示しないと k1s0-common なしでは PSS 違反になる
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  # PSS restricted 準拠: K8S-CRIT-001 対応
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# HIGH-005 監査対応: メモリ過負荷時の HPA スケーリングを有効化する（設計書定義: 60%）
# ratelimit サービスはレートカウンタ保持によりメモリ使用が増加しやすいため HPA メモリ閾値を設定する
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  # メモリ過負荷時の HPA スケーリングに使用する（設計書定義: 60%）
  targetMemoryUtilizationPercentage: 60

pdb:
  enabled: true
  minAvailable: "50%"

# H-03 監査対応: 単一 "system" ロールから個別ロール "ratelimit-rust" に変更する（ADR-0045 参照）。
vault:
  enabled: true
  role: "ratelimit-rust"
  secrets:
    - path: "secret/data/k1s0/system/ratelimit/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  name: "ratelimit-rust"

labels:
  tier: system

kafka:
  enabled: true

redis:
  enabled: false

# ConfigMap に注入する設定値（regions/system/server/rust/ratelimit/config/config.yaml から引用）
# 機密情報（DB パスワード）は Vault 経由で /vault/secrets/db-password に注入される。
# Redis URL は REDIS_URL 環境変数で上書き可能。
config:
  mountPath: /etc/app
  data:
    config.yaml: |
      app:
        name: "ratelimit-server"
        version: "0.1.0"
        environment: "production"

      server:
        host: "0.0.0.0"
        port: 8080
        grpc_port: 50051

      # DB パスワードは Vault 経由で /vault/secrets/db-password に注入される
      database:
        host: "postgres.k1s0-system.svc.cluster.local"
        port: 5432
        name: "ratelimit_db"
        user: "app"
        password: ""
        ssl_mode: "require"
        max_open_conns: 25
        max_idle_conns: 5
        conn_max_lifetime: "5m"

      # Redis URL は REDIS_URL 環境変数で上書き可能
      redis:
        url: "redis://redis.k1s0-system.svc.cluster.local:6379"

      observability:
        log:
          level: "info"
          format: "json"
        trace:
          enabled: true
          endpoint: "http://otel-collector.observability:4317"
          sample_rate: 1.0
        metrics:
          enabled: true
          path: "/metrics"
