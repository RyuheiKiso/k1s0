nameOverride: ""
fullnameOverride: ""

image:
  registry: harbor.internal.example.com
  repository: k1s0-system/config
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-pull-secret

replicaCount: 2

container:
  port: 8080
  grpcPort: 50051
  command: []
  args: []

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
  # H-023 監査対応: grpcHealthCheck.enabled: true の場合、テンプレートが startup セクションを参照する。
  # startup が未定義だと startupProbe が生成されず、コンテナ起動中に liveness が誤って失敗するリスクがある。
  # initialDelaySeconds を明示することで nil 参照エラーを防ぎ、Vault init コンテナ完了まで猶予を与える。
  startup:
    initialDelaySeconds: 10
    failureThreshold: 10
    periodSeconds: 5
  # L-10 監査対応: gRPC サービスのヘルスチェックを有効化する
  grpcHealthCheck:
    enabled: true

service:
  type: ClusterIP
  port: 80
  grpcPort: 50051

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  # M-4 監査対応: 絶対値から相対値に変更し、レプリカ数に依存しない可用性保証を実現する
  minAvailable: "50%"

ingress:
  enabled: false
  ingressClassName: nginx

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  # PSS restricted 準拠: K8S-CRIT-001 対応
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# ConfigMap に注入する設定値（regions/system/server/rust/config/config/config.yaml から引用）
# 機密情報（DB パスワード、Kafka SASL パスワード、暗号化キー）は Vault 経由で注入される。
config:
  mountPath: /etc/app
  data:
    config.yaml: |
      app:
        name: "k1s0-config-server"
        version: "0.1.0"
        environment: "prod"

      server:
        host: "0.0.0.0"
        port: 8082
        grpc_port: 50051
        read_timeout: "10s"
        write_timeout: "30s"
        shutdown_timeout: "15s"

      # DB パスワードは Vault 経由で /vault/secrets/db-password に注入される
      database:
        host: "postgres.k1s0-system.svc.cluster.local"
        port: 5432
        name: "k1s0_config"
        user: "app"
        password: ""
        ssl_mode: "require"
        max_open_conns: 25
        max_idle_conns: 5
        conn_max_lifetime: "5m"

      # Kafka SASL パスワードは Vault 経由で注入される
      kafka:
        brokers:
          - "kafka-0.messaging.svc.cluster.local:9093"
          - "kafka-1.messaging.svc.cluster.local:9093"
          - "kafka-2.messaging.svc.cluster.local:9093"
        consumer_group: "config-server.default"
        security_protocol: "SASL_SSL"
        sasl:
          mechanism: "SCRAM-SHA-512"
          username: ""
          password: ""
        topics:
          publish:
            - "k1s0.system.config.changed.v1"
          subscribe: []

      config_server:
        cache:
          max_entries: 10000
          ttl: "60s"
          refresh_on_miss: true
        audit:
          enabled: true
          retention_days: 365
          kafka_enabled: false
          kafka_topic: "k1s0.system.config.changed.v1"
        namespace:
          default_prefix: "system"
          allowed_tiers: ["system", "business", "service"]
          max_depth: 4
        # 暗号化キーは CONFIG_ENCRYPTION_KEY 環境変数または Vault から注入すること
        encryption:
          enabled: false
          sensitive_namespaces:
            - "system.auth"
            - "system.database"
          key_base64: ""

      observability:
        log:
          level: "info"
          format: "json"
        trace:
          enabled: true
          endpoint: "http://otel-collector.observability:4317"
          sample_rate: 1.0
        metrics:
          enabled: true
          path: "/metrics"

# H-03 監査対応: 単一 "system" ロールから個別ロール "config-rust" に変更する（ADR-0045 参照）。
vault:
  enabled: true
  role: "config-rust"
  secrets:
    - path: "secret/data/k1s0/system/config/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

nodeSelector: {}
tolerations: []
affinity: {}

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  create: true
  name: "config-rust"
  annotations: {}

podAnnotations: {}

labels:
  tier: system

kafka:
  enabled: false
  brokers: []

redis:
  enabled: false
  host: ""
