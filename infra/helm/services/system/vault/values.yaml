nameOverride: ""
fullnameOverride: ""

image:
  registry: harbor.internal.example.com
  repository: k1s0-system/vault
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-pull-secret

replicaCount: 2

container:
  port: 8091
  grpcPort: 50059
  command: []
  args: []

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

service:
  type: ClusterIP
  port: 80
  grpcPort: 50059

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  # M-4 監査対応: 絶対値から相対値に変更し、レプリカ数に依存しない可用性保証を実現する
  minAvailable: "50%"

ingress:
  enabled: false
  ingressClassName: nginx

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

config:
  mountPath: /etc/app
  data: {}

# H-03 監査対応: 単一 "system" ロールから個別ロール "vault-rust" に変更する（ADR-0045 参照）。
vault:
  enabled: true
  role: "vault-rust"
  secrets:
    - path: "secret/data/k1s0/system/vault/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

nodeSelector: {}
tolerations: []
affinity: {}

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  create: true
  name: "vault-rust"
  annotations: {}

podAnnotations: {}

labels:
  tier: system

kafka:
  enabled: false
  brokers: []

redis:
  enabled: false
  host: ""
