nameOverride: ""
fullnameOverride: ""

image:
  registry: harbor.internal.example.com
  repository: k1s0-system/navigation
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-pull-secret

replicaCount: 2

container:
  port: 8080
  grpcPort: 50051
  command: []
  args: []

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

service:
  type: ClusterIP
  port: 80
  grpcPort: 50051

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  # M-4 監査対応: 絶対値から相対値に変更し、レプリカ数に依存しない可用性保証を実現する
  minAvailable: "50%"

ingress:
  enabled: false
  ingressClassName: nginx

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# ConfigMap に注入する設定値（regions/system/server/rust/navigation/config/config.yaml から引用）
# navigation サービスは DB を使用せず、YAML 設定ファイルからルート定義を読み込む。
config:
  mountPath: /etc/app
  data:
    config.yaml: |
      app:
        name: k1s0-navigation-server
        version: "0.1.0"
        environment: production

      server:
        host: "0.0.0.0"
        port: 8095
        grpc_port: 50051

      observability:
        log:
          level: "info"
          format: "json"
        trace:
          enabled: true
          endpoint: "http://otel-collector.observability:4317"
          sample_rate: 1.0
        metrics:
          enabled: true
          path: "/metrics"

# H-03 監査対応: 単一 "system" ロールから個別ロール "navigation-rust" に変更する（ADR-0045 参照）。
vault:
  enabled: true
  role: "navigation-rust"
  secrets:
    - path: "secret/data/k1s0/system/navigation/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

nodeSelector: {}
tolerations: []
affinity: {}

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  create: true
  name: "navigation-rust"
  annotations: {}

podAnnotations: {}

labels:
  tier: system

kafka:
  enabled: false
  brokers: []

redis:
  enabled: false
  host: ""
