replicaCount: 2

# Event Store は高スループットのイベント取り込みとDB書き込みを行うため、汎用サービスより多くのリソースが必要
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

config:
  data:
    config.yaml: |
      app:
        environment: staging
      database:
        host: postgres.k1s0-system.svc.cluster.local
        ssl_mode: require
      observability:
        log:
          level: info
        trace:
          sample_rate: 0.5
