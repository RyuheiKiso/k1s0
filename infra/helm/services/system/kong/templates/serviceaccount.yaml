{{/* K8S-HIGH-002 対応: Kong 用 ServiceAccount を作成する。
     Vault kubernetes auth が bound_service_account_names で認証を行うため、
     Kong が専用 ServiceAccount を持つことで Vault シークレットアクセスを最小化する。 */}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k1s0-common.serviceAccountName" . }}
  labels:
    {{- include "k1s0-common.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
