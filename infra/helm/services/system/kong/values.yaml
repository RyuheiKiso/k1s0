# Kong Helm Chart Base Values
# Chart: kong/kong
# Kong version: 3.8
# Mode: DB-backed (PostgreSQL)

image:
  repository: kong
  tag: "3.8"

# env は k1s0-common の _deployment.tpl が toYaml で直接展開するため、
# Kubernetes の []EnvVar リスト形式で記述する必要がある（dict形式は不可）。
# Kong はデフォルトで KONG_ プレフィックス付きの環境変数から設定を読み込む。
env:
  - name: KONG_DATABASE
    value: postgres
  - name: KONG_PG_HOST
    value: postgresql.k1s0-system.svc.cluster.local
  - name: KONG_PG_PORT
    value: "5432"
  - name: KONG_PG_USER
    value: kong
  - name: KONG_PG_DATABASE
    value: kong
  - name: KONG_PG_PASSWORD
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: password

proxy:
  enabled: true
  type: ClusterIP
  http:
    enabled: true
    containerPort: 8000
  tls:
    enabled: false                  # TLS は Nginx Ingress Controller で終端するため Kong 側では無効化
    containerPort: 8443

admin:
  enabled: true
  type: ClusterIP
  # C-04監査対応: Admin APIへのHTTP平文アクセスを無効化し、TLSのみを許可する
  # Admin APIはクラスタ設定全体を管理する高権限エンドポイントであるため、
  # 通信経路の暗号化は必須。ClusterIP内通信であっても盗聴リスクを排除する
  http:
    enabled: false
    containerPort: 8001
  tls:
    enabled: true

ingressController:
  enabled: false    # Ingress Controller は使わず Admin API で管理

postgresql:
  enabled: false    # 外部 PostgreSQL を使用

# M-009 監査対応: Admin API の HTTP 無効化時にも liveness/readiness probe が動作するよう tcpSocket を使用する
# admin.http.enabled: false の場合、HTTP probe は失敗するため TCP ソケット確認に変更する
probes:
  liveness:
    # Admin API ポート（TLS 無効化時は 8001、TLS 有効時も同ポートで TCP 疎通可能）
    tcpSocket:
      port: 8001
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    tcpSocket:
      port: 8001
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

replicaCount: 2

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi
