# Kong Helm Chart Base Values
# Chart: kong/kong
# Kong version: 3.8
# Mode: DB-backed (PostgreSQL)

image:
  repository: kong
  tag: "3.8"

# env は k1s0-common の _deployment.tpl が toYaml で直接展開するため、
# Kubernetes の []EnvVar リスト形式で記述する必要がある（dict形式は不可）。
# Kong はデフォルトで KONG_ プレフィックス付きの環境変数から設定を読み込む。
env:
  - name: KONG_DATABASE
    value: postgres
  - name: KONG_PG_HOST
    value: postgresql.k1s0-system.svc.cluster.local
  - name: KONG_PG_PORT
    value: "5432"
  - name: KONG_PG_USER
    value: kong
  - name: KONG_PG_DATABASE
    value: kong
  # K8S-HIGH-002 修正: KONG_PG_PASSWORD は Vault Agent Injector が /vault/secrets/kong-pg-password に
  # 注入するため、container.command で env ファイルとして source する（kong-db-secret は廃止）。
  # HIGH-003 監査対応: readOnlyRootFilesystem: true に対応するため KONG_PREFIX を emptyDir に変更
  # Kong は起動時に KONG_PREFIX 配下に nginx.pid/nginx.conf/ssl/ 等の実行時ファイルを生成する。
  # デフォルトの /usr/local/kong はルートファイルシステムの一部であるため、
  # /tmp/kong に変更することで emptyDir の書き込み可能領域を使用できる。
  - name: KONG_PREFIX
    value: /tmp/kong

proxy:
  enabled: true
  type: ClusterIP
  http:
    enabled: true
    containerPort: 8000
  tls:
    enabled: false                  # TLS は Nginx Ingress Controller で終端するため Kong 側では無効化
    containerPort: 8443

admin:
  enabled: true
  type: ClusterIP
  # C-04監査対応: Admin APIへのHTTP平文アクセスを無効化し、TLSのみを許可する
  # Admin APIはクラスタ設定全体を管理する高権限エンドポイントであるため、
  # 通信経路の暗号化は必須。ClusterIP内通信であっても盗聴リスクを排除する
  http:
    enabled: false
    containerPort: 8001
  tls:
    enabled: true
    # HIGH-006 監査対応: Admin API TLS 証明書の設定方針
    # 本番環境では以下のいずれかの方法で TLS 証明書を設定すること:
    #
    # 方法1: cert-manager（推奨）- ClusterIssuer または Issuer を使用
    #   annotations:
    #     cert-manager.io/cluster-issuer: letsencrypt-prod
    #
    # 方法2: 既存の Kubernetes Secret を参照
    #   secretName: kong-admin-tls
    #   （Secret は tls.crt / tls.key キーを含む TLS Secret 形式とする）
    #
    # 方法3: Kong Helm Chart デフォルトの自己署名証明書（開発環境のみ）
    #   - secretName を指定しない場合、Kong は自己署名証明書を使用する
    #   - 本番環境では方法1または方法2を使用すること

ingressController:
  enabled: false    # Ingress Controller は使わず Admin API で管理

postgresql:
  enabled: false    # 外部 PostgreSQL を使用

# M-009 監査対応: Admin API の HTTP 無効化時にも liveness/readiness probe が動作するよう tcpSocket を使用する
# admin.http.enabled: false の場合、HTTP probe は失敗するため TCP ソケット確認に変更する
probes:
  liveness:
    # Admin API ポート（TLS 無効化時は 8001、TLS 有効時も同ポートで TCP 疎通可能）
    tcpSocket:
      port: 8001
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    tcpSocket:
      port: 8001
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# K8S-HIGH-002 対応: Vault Agent Injector を使用して kong-db-secret を廃止し、
# Vault から KONG_PG_PASSWORD を取得する。
# vault.secrets の template で env ファイルを生成し、container.command で source する。
vault:
  enabled: true
  role: "kong"
  secrets:
    - name: "kong-pg-password"
      path: "secret/data/k1s0/system/kong/database"
      template: |
        {{- with secret "secret/data/k1s0/system/kong/database" -}}
        KONG_PG_PASSWORD={{ .Data.data.password }}
        {{- end -}}

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  create: true
  name: "kong"

# K8S-HIGH-002 対応: Vault Agent が注入した env ファイルを起動前に source し
# KONG_PG_PASSWORD 環境変数を展開してから Kong を起動する。
# K8S-HIGH-001 対応: プロキシポートを 8000 として明示する。
container:
  port: 8000
  command:
    - /bin/sh
    - -c
    - "set -a && . /vault/secrets/kong-pg-password && set +a && exec kong docker-start"

# K8S-HIGH-001 対応: Kong の可用性確保のため HPA と PDB を設定する。
# メモリ使用率スケーリングを加えることでリクエスト急増時のメモリ圧迫に対応する。
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70

pdb:
  enabled: true
  # ローリングアップデート中も最低 1 レプリカを維持して可用性を保証する
  minAvailable: 1

replicaCount: 2

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# HIGH-003 監査対応: Pod/コンテナ SecurityContext を定義し、
# Namespace の pod-security.kubernetes.io/enforce: restricted ポリシーに準拠する
podSecurityContext:
  runAsNonRoot: true
  # Kong 公式イメージはユーザー ID 1000 (kong) で動作する
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  # HIGH-003 監査対応: readOnlyRootFilesystem: true を有効化
  # Kong は起動時に KONG_PREFIX 配下に nginx.pid/nginx.conf/ssl/ 等を生成するため、
  # KONG_PREFIX を /tmp/kong に変更し、emptyDir マウントで書き込みを許可する。
  readOnlyRootFilesystem: true

# HIGH-003 監査対応: readOnlyRootFilesystem: true のための emptyDir ボリューム定義
# KONG_PREFIX=/tmp/kong に対応した書き込み可能領域を提供する。
# /tmp を emptyDir でマウントすることで Kong の実行時ファイル生成を可能にする。
extraVolumes:
  - name: kong-tmp
    emptyDir: {}

extraVolumeMounts:
  - name: kong-tmp
    mountPath: /tmp

# k1s0-common テンプレートが .Values.redis.enabled を参照するため明示的に無効化する（nil pointer 防止）
redis:
  enabled: false
