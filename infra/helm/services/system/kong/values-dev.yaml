# Kong Helm Chart - Development Environment Overrides
# Environment: dev
# Kong replicas: 1
# PostgreSQL: Single node
# Rate Limiting multiplier: x10
# Admin API access: Basic auth + development token

replicaCount: 1

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Rate Limiting - 環境別倍率: dev=x10
# Tier別デフォルト値: system=3000, business=1000, service=500
# dev環境では各Tierの10倍を適用
rateLimiting:
  multiplier: 10
  tiers:
    system:
      minute: 30000
      second: 1000
    business:
      minute: 10000
      second: 400
    service:
      minute: 5000
      second: 200
  redis:
    # L-3 監査対応: local ポリシーは Kong インスタンス単位でカウントするため、
    # 複数レプリカ構成では各 Pod が独立してカウントし、正確なグローバルレート制限を提供しない。
    # dev 環境（replicaCount: 1）では問題ないが、staging/prod では必ず policy: redis を使用すること。
    # staging/prod の values.yaml では Redis ポリシーが設定済み（values-staging.yaml / values-prod.yaml 参照）。
    policy: local              # dev環境ではRedis不要（local policy）※本番では policy: redis を使用すること
    fault_tolerant: true
    hide_client_headers: false
