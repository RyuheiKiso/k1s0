# Kong Helm Chart - Production Environment Overrides
# Environment: prod
# Kong replicas: 3
# PostgreSQL: 3 nodes HA (Primary 1 + Replica 2, sync replication, Bitnami HA Chart)
# Rate Limiting multiplier: x1
# Admin API access: IP restriction + mTLS + audit log (infra team personal certificates)

replicaCount: 3

resources:
  requests:
    cpu: 1000m
    memory: 1Gi
  limits:
    cpu: 4000m
    memory: 4Gi

# ============================================================
# レートリミット設定 — 単一ソースオブトゥルース（SoT）
# このファイルが Kong レートリミットの唯一の管理主体です。
# Istio VirtualService にはレートリミット設定を追加しないこと。
# 詳細: docs/infrastructure/rate-limiting-strategy.md
# ============================================================
# Rate Limiting - 環境別倍率: prod=x1（ベースライン）
# Tier別デフォルト値: system=3000, business=1000, service=500
rateLimiting:
  multiplier: 1
  tiers:
    system:
      minute: 3000
      second: 100
    business:
      minute: 1000
      second: 40
    service:
      minute: 500
      second: 20
  redis:
    policy: redis
    host: redis.k1s0-system.svc.cluster.local
    port: 6379
    database: 1
    # Redis障害時にレート制限をバイパスさせないフェイルセーフ設定（C-07監査指摘対応）
    # falseにすることでRedis接続失敗時もリクエストを通過させず、意図しない上限解除を防ぐ
    fault_tolerant: false
    hide_client_headers: false

# H-06監査対応: DestinationRule（Circuit Breaker）を有効化する。
# mTLS・connectionPool・outlierDetection を全サービスに適用し、
# 障害のカスケードとサービス間の不正通信を防止する。
istio:
  enabled: true
  destinationRule:
    enabled: true
