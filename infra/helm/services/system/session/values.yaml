# k1s0-common からのデフォルトを継承し、session サービス固有の値のみ上書きする
# 共通デフォルト値は infra/helm/charts/k1s0-common/values.yaml を参照
# L-8 監査対応: image.registry, autoscaling, resources は k1s0-common のデフォルトを継承

image:
  repository: k1s0-system/session

container:
  port: 8080
  grpcPort: 50051

service:
  grpcPort: 50051

vault:
  enabled: true
  role: "system"
  secrets:
    - path: "secret/data/k1s0/system/session/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  name: "session-rust"

labels:
  tier: system

kafka:
  enabled: false

redis:
  enabled: true
