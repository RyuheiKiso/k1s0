# H-002 監査対応: helm template 単体実行時にもイメージ参照が完全になるよう、必須デフォルト値を明示する
# k1s0-common/values.yaml との重複定義だが、standalone 実行時の安全性を優先する

image:
  registry: harbor.internal.example.com
  repository: k1s0-system/session
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-pull-secret

container:
  port: 8080
  grpcPort: 50051

service:
  grpcPort: 50051

# L-10 監査対応: gRPC サービスのヘルスチェックを有効化する。
# gRPC サービスは HTTP /healthz ではなく gRPC ヘルスチェックプロトコルを使用すること。
# CRITICAL-8 対応: grpcHealthCheck.enabled: true の場合、テンプレートが liveness/readiness/startup の
# 各フィールドを直接参照するため、nil pointer エラーを防ぐために明示的なデフォルト値を設定する。
probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
  startup:
    initialDelaySeconds: 10
    failureThreshold: 10
    periodSeconds: 5
  grpcHealthCheck:
    enabled: true

# H-002 監査対応: SecurityContext を明示しないと k1s0-common なしでは PSS 違反になる
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# H-03 監査対応: 単一 "system" ロールから個別ロール "session-rust" に変更する（ADR-0045 参照）。
vault:
  enabled: true
  role: "session-rust"
  secrets:
    - path: "secret/data/k1s0/system/session/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  name: "session-rust"

labels:
  tier: system

kafka:
  enabled: false

redis:
  enabled: true
  # L-9 監査対応: redis.enabled=true の場合、redis.host は必須。
  # 環境変数 REDIS_HOST として REDIS_PORT と共にコンテナへ注入される。
  host: redis.k1s0-system.svc.cluster.local
