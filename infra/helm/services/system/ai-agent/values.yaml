nameOverride: ""
fullnameOverride: ""

image:
  registry: harbor.internal.example.com
  repository: k1s0-system/ai-agent
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-pull-secret

replicaCount: 2

container:
  port: 8121
  # H-005 監査対応: 非標準ポート (50062) から標準 gRPC ポート (50051) に統一し NetworkPolicy の許可ルールと整合させる
  grpcPort: 50051
  command: []
  args: []

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

service:
  type: ClusterIP
  port: 80
  # H-005 監査対応: container.grpcPort と同値に統一する
  grpcPort: 50051

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  # HIGH-005 監査対応: メモリ過負荷時の HPA スケーリングに使用する（設計書定義: 60%）
  targetMemoryUtilizationPercentage: 60

pdb:
  enabled: true
  # M-4 監査対応: 絶対値から相対値に変更し、レプリカ数に依存しない可用性保証を実現する
  minAvailable: "50%"

ingress:
  enabled: false
  ingressClassName: nginx

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  # PSS restricted 準拠: K8S-CRIT-001 対応
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

config:
  mountPath: /etc/app
  data: {}

vault:
  enabled: true
  # MED-005 監査対応: "system" 共有ロールから "ai-agent" 個別ロールに変更する
  role: "ai-agent"
  secrets:
    - path: "secret/data/k1s0/system/ai-agent/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

nodeSelector: {}
tolerations: []
affinity: {}

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
# MED-005 監査対応: auth.tf に vault_kubernetes_auth_backend_role.ai_agent を追加済み
serviceAccount:
  create: true
  name: "ai-agent"
  annotations: {}

podAnnotations: {}

labels:
  tier: system

kafka:
  enabled: true
  brokers: []

redis:
  enabled: false
  host: ""
