replicaCount: 3

# B-MEDIUM-01 監査対応: 本番環境では pullPolicy を Always に設定する。
# mutable タグ（latest 等）使用時にセキュリティパッチ適用済みの最新イメージを確実に取得するため。
image:
  pullPolicy: Always

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10

# H-08監査対応: required（ハード制約）から preferred（ソフト制約）に変更。
# ノード数 < replicaCount の場合でもスケジューリング可能にしつつ、可能な限り分散配置を促す。
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - bff-proxy
          topologyKey: kubernetes.io/hostname

config:
  data:
    config.yaml: |
      app:
        environment: prod
      session:
        redis:
          addr: redis-sentinel.k1s0-system.svc.cluster.local:26379
          master_name: mymaster
      observability:
        log:
          level: warn
        trace:
          sample_rate: 0.1

# H-06監査対応: DestinationRule（Circuit Breaker）を有効化する。
# mTLS・connectionPool・outlierDetection を全サービスに適用し、
# 障害のカスケードとサービス間の不正通信を防止する。
istio:
  enabled: true
  destinationRule:
    enabled: true
