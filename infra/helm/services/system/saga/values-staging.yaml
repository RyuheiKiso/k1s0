replicaCount: 2

# M-12 監査対応: 本番・ステージング環境では alertmanager を必須にする
alertmanager:
  required: true
  webhookUrl: ""  # CD パイプラインで Vault から注入する

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

config:
  data:
    config.yaml: |
      app:
        environment: staging
      database:
        host: postgresql.k1s0-system.svc.cluster.local
        ssl_mode: require
      observability:
        log:
          level: info
        trace:
          sample_rate: 0.5
