nameOverride: ""
fullnameOverride: ""

image:
  registry: harbor.internal.example.com
  repository: k1s0-system/scheduler
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-pull-secret

replicaCount: 2

# H-004 監査対応: アプリの grpc_port (50051) に合わせて K8s Service/container に gRPC ポートを追加
container:
  port: 8080
  grpcPort: 50051
  command: []
  args: []

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

service:
  type: ClusterIP
  port: 80
  grpcPort: 50051

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  # HIGH-005 監査対応: メモリ過負荷時の HPA スケーリングに使用する（設計書定義: 60%）
  targetMemoryUtilizationPercentage: 60

pdb:
  enabled: true
  # M-4 監査対応: 絶対値から相対値に変更し、レプリカ数に依存しない可用性保証を実現する
  minAvailable: "50%"

ingress:
  enabled: false
  ingressClassName: nginx

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  # PSS restricted 準拠: K8S-CRIT-001 対応
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# ConfigMap に注入する設定値（regions/system/server/rust/scheduler/config/config.yaml から引用）
# 機密情報（DB パスワード）は Vault 経由で /vault/secrets/db-password に注入される。
config:
  mountPath: /etc/app
  data:
    config.yaml: |
      app:
        name: k1s0-scheduler-server
        version: "0.1.0"
        environment: production

      server:
        host: "0.0.0.0"
        port: 8095
        grpc_port: 50051

      observability:
        log:
          level: "info"
          format: "json"
        trace:
          enabled: true
          endpoint: "http://otel-collector.observability:4317"
          sample_rate: 1.0

      # DB パスワードは Vault 経由で /vault/secrets/db-password に注入される
      database:
        host: "postgres.k1s0-system.svc.cluster.local"
        port: 5432
        name: "scheduler_db"
        user: "app"
        password: ""
        ssl_mode: "require"
        max_open_conns: 25

# H-03 監査対応: 単一 "system" ロールから個別ロール "scheduler-rust" に変更する（ADR-0045 参照）。
vault:
  enabled: true
  role: "scheduler-rust"
  secrets:
    - path: "secret/data/k1s0/system/scheduler/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

nodeSelector: {}
tolerations: []
affinity: {}

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  create: true
  name: "scheduler-rust"
  annotations: {}

podAnnotations: {}

labels:
  tier: system

kafka:
  enabled: true
  brokers: []

redis:
  enabled: false
  host: ""
