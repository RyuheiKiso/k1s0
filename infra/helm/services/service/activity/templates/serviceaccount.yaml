{{/* K8S-CRIT-002 対応: activity サービス用 ServiceAccount を作成する。
     Vault kubernetes auth が bound_service_account_names で認証を行うため、
     各サービスが専用 ServiceAccount を持つことでシークレットアクセス範囲を最小化する。
     serviceAccount.create が true の場合のみ作成し、false の場合は既存の SA を参照する。 */}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k1s0-common.serviceAccountName" . }}
  labels:
    {{- include "k1s0-common.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
