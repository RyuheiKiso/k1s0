# k1s0-common からのデフォルトを継承し、domain-master サービス固有の値のみ上書きする
# 共通デフォルト値は infra/helm/charts/k1s0-common/values.yaml を参照

image:
  repository: k1s0-business/domain-master

container:
  port: 8210
  grpcPort: 9210

service:
  grpcPort: 9210

vault:
  enabled: true
  role: "business"
  secrets:
    - path: "secret/data/k1s0/business/domain-master/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  name: "domain-master-go"

labels:
  tier: business

kafka:
  enabled: true

redis:
  enabled: false
