# H-002 監査対応: helm template 単体実行時にもイメージ参照が完全になるよう、必須デフォルト値を明示する
# k1s0-common/values.yaml との重複定義だが、standalone 実行時の安全性を優先する

image:
  registry: harbor.internal.example.com
  repository: k1s0-business/project-master
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-pull-secret

container:
  port: 8210
  # H-005 監査対応: 非標準ポート (9210) から標準 gRPC ポート (50051) に統一し NetworkPolicy の許可ルールと整合させる
  grpcPort: 50051

service:
  # H-005 監査対応: container.grpcPort と同値に統一する
  grpcPort: 50051

# K8S-MED-002 対応: k1s0-common は library chart のためデフォルト値が親チャートに引き継がれない。
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# K8S-MED-003 対応: probes を明示的に設定する（HTTP ヘルスチェック）。
probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
  startup:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    failureThreshold: 10
    periodSeconds: 5
  grpcHealthCheck:
    enabled: false

# H-002 監査対応: SecurityContext を明示しないと k1s0-common なしでは PSS 違反になる
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  # PSS restricted 準拠: K8S-CRIT-001 対応
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

vault:
  enabled: true
  # K8S-HIGH-002〜004 監査対応: ADR-0045に従いVaultロールをサービス単位に個別化する
  role: "project-master-rust"
  secrets:
    - path: "secret/data/k1s0/business/project-master/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

# Vault kubernetes auth role の bound_service_account_names と一致させるため明示的に指定
serviceAccount:
  name: "project-master-rust"

labels:
  tier: business

kafka:
  enabled: true

redis:
  enabled: false
