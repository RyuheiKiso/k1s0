# k1s0-common Library Chart default values
# These values serve as defaults and are typically overridden by service-specific values.yaml
# DOC-LOW-001: Helm values 同期方針
# このファイルはすべてのサービスの共通デフォルト値を定義する。
# 各サービス固有の値は infra/helm/services/<tier>/<service>/values.yaml で上書きする。
# ドキュメントとの同期は docs-check スキルで検証する（/docs-check コマンド参照）。

# 共通設定
nameOverride: ""
fullnameOverride: ""

# イメージ
image:
  registry: harbor.internal.example.com
  repository: k1s0-service/app
  tag: ""                              # CI/CD で上書き
  # B-MEDIUM-01 監査対応: IfNotPresent は開発・ステージング環境向けのデフォルト値。
  # 本番環境では values-prod.yaml で Always にオーバーライドすること。
  # （IfNotPresent はタグが不変な場合は効率的だが、mutable タグ使用時はセキュリティパッチが適用されないリスクがある）
  # LOW-002 監査対応: 本番環境では pullPolicy を Always に上書きすること。
  # 本番用 values-prod.yaml で pullPolicy: Always を設定し、セキュリティパッチ適用済みイメージへの更新を保証する。
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-pull-secret

# レプリカ
replicaCount: 2

# コンテナ設定
container:
  port: 8080
  grpcPort: null                       # gRPC 無効。gRPC 有効時は 50051 を設定
  command: []
  args: []
  env: []                              # 追加の環境変数リスト

# リソース
# NOTE(M-10): docker-compose.yaml では各サービスに mem_limit=512m〜1g, cpus=0.5〜1.0 を設定しているが、
# Helm のデフォルト値は本番ワークロード（複数レプリカ・HPA・ノードのオーバーコミット）を考慮した値を設定している。
# ローカル開発（docker-compose）は単一ホスト上でリソースを均等分割するため上限値を低めに設定している。
# 本番（Helm）は HPA によるスケールアウトと requests ベースのスケジューリングを前提としているため、
# requests を控えめに設定し limits で余裕を持たせる構成としており、差異は意図的なものである。
# サービス固有のリソース要件がある場合は各サービスの values.yaml で上書きすること。
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# ヘルスチェック
probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
  # startupProbe: コンテナ起動完了を確認するプローブ。
  # liveness/readiness より先に評価され、起動完了前に liveness が誤って失敗するのを防ぐ。
  # initialDelaySeconds: 10 — Vault Agent Injector の init コンテナ完了を待つための猶予時間（L-11 監査対応）。
  # failureThreshold × periodSeconds = 50秒の猶予期間を与える（合計最大60秒）。
  startup:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    failureThreshold: 10
    periodSeconds: 5
  grpcHealthCheck:
    enabled: false
    port: grpc

# Service
service:
  type: ClusterIP
  port: 80
  grpcPort: null                       # gRPC 無効（有効時は 50051 を設定）

# HPA
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  # INFRA-MED-001 対応: OOM Kill 前にスケールアウトする余裕を確保するため 70% に修正
  # L-13 監査対応: メモリ使用率閾値を 80% → 70% に引き下げ
  # メモリ使用率によるスケールアウトを追加（AVAIL-003 監査対応）
  # Kafka コンシューマや大量 JSON 処理サービスの OOM Kill を防止する
  targetMemoryUtilizationPercentage: 70

# PodDisruptionBudget
# MED-003 対応: replicaCount=1 の場合 "50%" は floor(0.5)=0 となり実質無効なため絶対値 1 に変更。
# 絶対値 1 とすることで replicaCount に関わらず常に最低 1 Pod の稼働を保証する。
# 例: replicaCount=2 なら 1Pod 保護 → ローリングアップデート時に同時停止可能な Pod は 1 つ
# prod 環境で高速ロールアウトが必要な場合は各サービスの values-prod.yaml で値を調整すること
pdb:
  enabled: true
  minAvailable: 1

# L-9 監査対応: Ingress はデフォルト無効。
# 外部トラフィックは原則として k1s0-system の Kong Gateway 経由でルーティングする。
# 直接 Ingress を使用する場合（管理系 UI 等）のみ enabled: true に設定すること。
# ingressClassName: nginx → nginx Ingress Controller 経由（Kubernetes 管理系 UI 向け）
# ingressClassName: kong  → Kong Ingress Controller 経由（API ゲートウェイ連携が必要な場合）
ingress:
  enabled: false
  ingressClassName: nginx       # 管理系UI は nginx、APIは原則 Kong Gateway 経由を使用すること
  annotations: {}
  hosts: []
  tls: []

# セキュリティコンテキスト
# CRITICAL-8 対応: PSS restricted プロファイルでは seccompProfile の明示的な指定が必須。
# RuntimeDefault を設定することで、ノードのデフォルト seccomp プロファイルを適用し
# PSS restricted 違反によるPod 起動不可問題を解消する。
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532              # distroless nonroot ユーザー
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault        # PSS restricted 準拠: seccompProfile 必須フィールド
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# config.yaml のマウント
config:
  mountPath: /etc/app
  data: {}                             # ConfigMap として作成

# Vault Agent Injector
# MED-004 監査対応: vault.role の共通デフォルト値は "service"。
# 各サービス固有のポリシーがある場合は、個別の values.yaml で role を上書きすること。
# ADR-0045 参照: per-service Vault ロール分離設計。
vault:
  enabled: true
  role: "service"
  secrets:
    - path: "secret/data/k1s0/service/app/database"
      key: "password"
      mountPath: "/vault/secrets/db-password"

# Pod 設定
nodeSelector: {}
tolerations: []
affinity: {}

# サービスアカウント
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ラベル（Kubernetes 設計のラベル規約に準拠）
labels:
  tier: service

# Kafka（有効時のみ）
kafka:
  enabled: false
  brokers: []

# Redis（有効時のみ）
redis:
  enabled: false
  host: ""

# Istio サービスメッシュ統合（有効時のみ）
istio:
  enabled: false
  sidecar:
    inject: true
    proxyConfig:
      holdApplicationUntilProxyStarts: true
  timeout: 30s
  virtualService:
    enabled: false
    timeout: ""                          # 未設定時は istio.timeout を使用
    retries:
      attempts: 3
      perTryTimeout: 10s
      # retryOn: 決済など冪等性が保証されないサービスでは、values.yaml で attempts: 0 に設定して
      # リトライを無効化すること（M-013）。自動リトライによる二重課金・二重処理を防止する。
      retryOn: "5xx,reset,connect-failure"
  destinationRule:
    enabled: false
    circuitBreaker:
      consecutiveGatewayErrors: 5
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    # H-06監査対応: connectionPool の設定を追加
    connectionPool:
      tcp:
        # サービスへの最大TCP接続数。超過した場合はバックプレッシャーで接続を拒否する。
        maxConnections: 100
      http:
        # 0 = 無制限（keep-alive）。1 = 毎リクエスト新規接続（HTTP/1.1 互換が必要な場合）
        maxRequestsPerConnection: 0

# Alertmanager 設定（H-03 対応: PagerDuty エスカレーション通知チャネルを追加）
# pagerdutyRoutingKey は本番環境では Vault 経由で注入し、空文字の場合は通知されない
# L-8 監査対応: 本番環境の values.yaml では required: true を設定すること。
# required=true かつ webhookUrl が空の場合、helm install/upgrade が失敗してデプロイを防止する。
alertmanager:
  required: false           # 本番環境では true に設定すること（L-8 監査対応: 障害通知欠落防止）
  webhookUrl: ""            # Microsoft Teams デフォルト Webhook URL（環境別に上書きすること）
  criticalWebhookUrl: ""    # Microsoft Teams critical Webhook URL（環境別に上書きすること）
  warningWebhookUrl: ""     # Microsoft Teams warning Webhook URL（環境別に上書きすること）
  pagerdutyRoutingKey: ""   # PagerDuty Routing Key（Vault パス: secret/data/k1s0/observability/pagerduty キー: routing_key）
