# tier2 ドメインイベント基盤トピック群。bounded context ごとに topic を分離。
# 命名規約: domain-events.<bounded-context>。
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: domain-events.identity
  namespace: k1s0-data
  labels:
    strimzi.io/cluster: k1s0-kafka
    k1s0.io/topic-role: domain-events
    k1s0.io/bounded-context: identity
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: 2592000000  # 30 days
    cleanup.policy: delete
    min.insync.replicas: 2
    compression.type: zstd
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: domain-events.payment
  namespace: k1s0-data
  labels:
    strimzi.io/cluster: k1s0-kafka
    k1s0.io/topic-role: domain-events
    k1s0.io/bounded-context: payment
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: 7776000000  # 90 days（決済は監査要件より長め）
    cleanup.policy: delete
    min.insync.replicas: 2
    compression.type: zstd
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: domain-events.workflow
  namespace: k1s0-data
  labels:
    strimzi.io/cluster: k1s0-kafka
    k1s0.io/topic-role: domain-events
    k1s0.io/bounded-context: workflow
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: 2592000000  # 30 days
    cleanup.policy: delete
    min.insync.replicas: 2
    compression.type: zstd
