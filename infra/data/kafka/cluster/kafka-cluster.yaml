# k1s0 production Kafka Cluster（ADR-DATA-002）
# KRaft、3 broker HA、PVC 100Gi、TLS mTLS listener、Cruise Control 有効。
# dev は tools/local-stack/manifests/65-kafka/k1s0-kafka.yaml（1 broker / 5Gi / plain）。
---
# KafkaNodePool（KRaft 構成、controller + broker dual-role 3 replica）
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: k1s0-data
  labels:
    strimzi.io/cluster: k1s0-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: 100Gi
    deleteClaim: false
    class: ""
  resources:
    requests:
      cpu: 1
      memory: 4Gi
    limits:
      cpu: 4
      memory: 8Gi
  template:
    pod:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  strimzi.io/cluster: k1s0-kafka
              topologyKey: kubernetes.io/hostname
---
# Kafka Cluster（TLS mTLS 必須、Cruise Control 有効、PrometheusMetrics 有効）
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: k1s0-kafka
  namespace: k1s0-data
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.9.0
    metadataVersion: 3.9-IV0
    listeners:
      # クラスタ内通信は TLS 必須
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls
      # 外部公開は cert-manager 連携の TLS terminator + Istio Ambient で実施（plan 05-XX）
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      auto.create.topics.enable: false
      log.retention.hours: 168
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
    userOperator:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
  cruiseControl:
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1
        memory: 2Gi
---
# JMX Exporter 用の metrics config（Prometheus が pickup する）
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-metrics
  namespace: k1s0-data
data:
  kafka-metrics-config.yml: |
    lowercaseOutputName: true
    rules:
      - pattern: "kafka.server<type=(.+), name=(.+)PerSec\\w*><>Count"
        name: kafka_server_$1_$2_total
      - pattern: "kafka.server<type=(.+), name=(.+)><>Value"
        name: kafka_server_$1_$2
