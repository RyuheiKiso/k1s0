# =============================================================================
# tier1 State API 用 PostgreSQL Cluster（IMP-DIR-INFRA-075、ADR-DATA-001）
#
# 用途: Dapr State API（state.postgresql）の永続化、tier1 facade のドメイン aggregate
#       状態保管。OLTP 系で max_connections と shared_buffers を厚めに取る。
#
# spec 通り 3 instance HA、独立 backup（s3://k1s0-pg-backup/tier1-state）、PodMonitor。
# dev は ../../environments/dev/patches/cloudnativepg-instances-1.yaml で 1 instance 化。
# =============================================================================
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: tier1-state
  namespace: k1s0-data
  labels:
    app.kubernetes.io/name: tier1-state
    app.kubernetes.io/part-of: k1s0
    k1s0.io/component: postgres-cluster
    k1s0.io/cluster-role: tier1-state
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  storage:
    size: 100Gi
    storageClass: longhorn-retain
  walStorage:
    size: 50Gi
    storageClass: longhorn-retain
  bootstrap:
    initdb:
      database: tier1_state
      owner: tier1_state
      secret:
        name: tier1-state-credentials
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "2GB"
      effective_cache_size: "6GB"
      maintenance_work_mem: "512MB"
      work_mem: "16MB"
      wal_compression: "on"
      log_min_duration_statement: "500"
  resources:
    requests:
      cpu: 1
      memory: 4Gi
    limits:
      cpu: 4
      memory: 8Gi
  backup:
    barmanObjectStore:
      destinationPath: s3://k1s0-pg-backup/tier1-state
      endpointURL: http://minio.k1s0-data.svc.cluster.local:9000
      s3Credentials:
        accessKeyId:
          name: cnpg-minio-credentials
          key: access-key
        secretAccessKey:
          name: cnpg-minio-credentials
          key: secret-key
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"
  monitoring:
    enablePodMonitor: true
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
