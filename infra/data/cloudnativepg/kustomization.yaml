# =============================================================================
# infra/data/cloudnativepg/kustomization.yaml
#
# 3 Cluster 分離（tier1-state / tier2-domain / audit）+ 操作系（operator / backup
# / monitoring）。CNPG operator 本体は Helm values（同階層 `values.yaml`）で別途
# デプロイされる前提。
#
# dev overlay は `patches/cloudnativepg-instances-1.yaml` で 3 Cluster 全体を
# 1 instance に縮退する。
#
# 関連設計:
#   docs/05_実装/00_ディレクトリ設計/50_infraレイアウト/05_データ層配置.md
#   docs/02_構想設計/adr/ADR-DATA-001-cnpg.md
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - operator
  - cluster
  - backup
  - monitoring
