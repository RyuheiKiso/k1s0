# k1s0 production PostgreSQL Cluster（ADR-DATA-001）
# 3 instance HA、PVC 100Gi、MinIO バックアップ、PodMonitor。
# dev は tools/local-stack/manifests/60-cnpg/k1s0-cluster.yaml（1 instance / 5Gi）。
---
# CNPG Cluster CRD（PostgreSQL 16）
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: k1s0-postgres
  namespace: cnpg-system
  labels:
    app.kubernetes.io/name: k1s0-postgres
    app.kubernetes.io/part-of: k1s0
spec:
  # primary 1 + standby 2 の HA 構成
  instances: 3
  # 主備切替戦略（プライマリ障害時に standby が自動昇格）
  primaryUpdateStrategy: unsupervised
  # PostgreSQL バージョン（CNPG 0.28 以降が PG 16 に正式対応）
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  # ストレージ。StorageClass は環境別 overlay で上書き。
  storage:
    size: 100Gi
    storageClass: ""
  # WAL を別 PVC に分離（disk IO 分散）
  walStorage:
    size: 50Gi
    storageClass: ""
  # 初期データベースとオーナー
  bootstrap:
    initdb:
      database: k1s0
      owner: k1s0
      # 認証情報は外部 Secret 参照（dev は平文、prod は OpenBao 動的シークレット plan 04-06）
      secret:
        name: k1s0-postgres-credentials
  # PostgreSQL パラメータ（prod 推奨値、容量別チューニングは ConfigMap overlay で）
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "1GB"
      effective_cache_size: "3GB"
      maintenance_work_mem: "256MB"
      work_mem: "16MB"
      wal_compression: "on"
      log_min_duration_statement: "500"
  # リソース要求（prod 平常時の負荷を想定）
  resources:
    requests:
      cpu: 1
      memory: 4Gi
    limits:
      cpu: 4
      memory: 8Gi
  # MinIO への WAL アーカイブ + ベースバックアップ
  backup:
    barmanObjectStore:
      destinationPath: s3://k1s0-postgres-backup/
      endpointURL: http://minio.minio.svc.cluster.local:9000
      s3Credentials:
        accessKeyId:
          name: k1s0-minio-credentials
          key: access-key
        secretAccessKey:
          name: k1s0-minio-credentials
          key: secret-key
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"
  # monitoring（PodMonitor が operator 側で自動生成）
  monitoring:
    enablePodMonitor: true
  # Pod Disruption Budget（k8s upgrade 時に最低 1 primary 残す）
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
---
# 認証情報 Secret（dev placeholder、prod は OpenBao 動的シークレットで上書き）
apiVersion: v1
kind: Secret
metadata:
  name: k1s0-postgres-credentials
  namespace: cnpg-system
  annotations:
    # OpenBao 動的シークレット移行時に削除する目印
    k1s0.io/managed-by: "infra/data/cloudnativepg/cluster.yaml (placeholder until plan 04-06)"
type: kubernetes.io/basic-auth
stringData:
  username: k1s0
  # !! placeholder !! prod では OpenBao の動的シークレットで上書き
  password: REPLACE_VIA_OPENBAO
---
# MinIO 接続情報 Secret（バックアップ用、dev placeholder）
apiVersion: v1
kind: Secret
metadata:
  name: k1s0-minio-credentials
  namespace: cnpg-system
  annotations:
    k1s0.io/managed-by: "infra/data/cloudnativepg/cluster.yaml (placeholder until plan 04-06)"
type: Opaque
stringData:
  access-key: REPLACE_VIA_OPENBAO
  secret-key: REPLACE_VIA_OPENBAO
