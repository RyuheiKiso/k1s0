# CNPG Cluster ごとの PodMonitor は spec.monitoring.enablePodMonitor:true で
# operator が auto-generate するが、操作上の集計が必要な extra metrics を
# 個別に PodMonitor として宣言する。
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cnpg-aggregate
  namespace: k1s0-data
  labels:
    app.kubernetes.io/part-of: k1s0
    prometheus: k1s0
spec:
  selector:
    matchLabels:
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
          targetLabel: cnpg_cluster
        - sourceLabels: [__meta_kubernetes_pod_label_k1s0_io_cluster_role]
          targetLabel: k1s0_cluster_role
