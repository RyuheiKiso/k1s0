# Prometheus scrape configuration for local development
# docker-compose の observability プロファイルで使用
#
# LOW-003 監査対応（本番環境セキュリティ注意）:
# このファイルはローカル開発環境専用であり認証設定が含まれていない。
# 本番環境では以下のいずれかの認証方式を必ず設定すること:
#   1. basic_auth_users: prometheus.yml の web セクションに bcrypt ハッシュで設定する
#   2. reverse proxy 認証: nginx/Kong 等のリバースプロキシで Basic Auth または OAuth2 を設定する
#   3. NetworkPolicy: Kubernetes 環境では /metrics エンドポイントへのアクセスを IP 制限する
# 参照: https://prometheus.io/docs/guides/basic-auth/

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus 自身のメトリクス
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # auth サーバー（system 層）のメトリクス
  # M-25 監査対応: docker-compose.yaml のサービス名 auth-rust・コンテナ内ポート 8080 に合わせて修正
  # 旧: auth-server:8083（ホストポートマッピングを誤って使用していた）
  - job_name: "auth-server"
    static_configs:
      - targets: ["auth-rust:8080"]
    metrics_path: /metrics

  # Kafka メトリクス（JMX Exporter 経由）
  # LOW-002 監査対応: kafka-jmx-exporter サービス（ghcr.io/prometheus/jmx-exporter:1.0.1）が
  # Kafka の JMX ポート 9999 に接続してブローカーメトリクスを収集し、ポート 9101 で公開する。
  # docker-compose.yaml の kafka サービスに KAFKA_JMX_HOSTNAME/PORT/OPTS を追加済み。
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-jmx-exporter:9101"]
    metrics_path: /metrics

  # Redis メトリクス
  # NOTE: redis-exporter を別途追加した場合に有効
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # BFF プロキシ（system 層）のメトリクス
  - job_name: "bff-proxy"
    static_configs:
      - targets: ["bff-proxy:8080"]
    metrics_path: /metrics

  # GraphQL ゲートウェイ（system 層）のメトリクス
  - job_name: "graphql-gateway-rust"
    static_configs:
      - targets: ["graphql-gateway-rust:8080"]
    metrics_path: /metrics

  # API レジストリ（system 層）のメトリクス
  - job_name: "api-registry-rust"
    static_configs:
      - targets: ["api-registry-rust:8080"]
    metrics_path: /metrics

  # アプリケーションレジストリ（system 層）のメトリクス
  - job_name: "app-registry-rust"
