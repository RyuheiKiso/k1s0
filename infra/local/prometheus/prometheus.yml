    metrics_path: /metrics

  # Keycloak メトリクス
  # MED-005 監査対応: Keycloak 23+ の Prometheus エンドポイントは管理ポート 9000 で提供される。
  # ポート 8080 はアプリケーションポートであり /metrics エンドポイントを持たない。
  # 参考: https://www.keycloak.org/server/configuration-metrics
  - job_name: "keycloak"
    static_configs:
      - targets: ["keycloak:9000"]
    metrics_path: /metrics
