# ========================================================================
# 本番環境用 Loki 設定ファイル
# ローカル開発用設定（loki-config.yaml）とは別に管理すること。
# このファイルを使用する場合は S3/GCS バケットと IAM 権限の設定が必須。
# ========================================================================

# マルチテナント認証を有効化（本番環境では必須）
auth_enabled: true

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  # 本番環境では replication_factor を 3 以上に設定してデータ冗長性を確保する
  replication_factor: 3
  ring:
    kvstore:
      # 本番環境では etcd または consul を使用してクラスター間の調整を行う
      store: etcd
      etcd:
        # H-21 監査対応: etcd との通信を TLS 化し、クラスター内通信の盗聴・改ざんを防止する
        # 旧設定 http:// は平文通信であり、Loki のリング状態（メンバーシップ情報）が傍受されるリスクがある
        endpoints:
          - https://etcd:2379
        # TLS 設定: cluster-internal CA 証明書を使用して etcd の証明書を検証する
        # 証明書は Kubernetes Secret（loki-etcd-tls）から Vault 経由で注入すること
        tls_config:
          ca_file: /etc/loki/certs/ca.crt
          cert_file: /etc/loki/certs/tls.crt
          key_file: /etc/loki/certs/tls.key
          # insecure_skip_verify: false（デフォルト false: 証明書検証を必ず行うこと）
          insecure_skip_verify: false

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      # 本番環境では S3/GCS の永続ストレージを使用する
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

# S3 ストレージ設定（本番環境では環境変数または Vault から認証情報を注入すること）
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
    cache_ttl: 24h
  aws:
    # S3 バケット名は環境変数 LOKI_S3_BUCKET_NAME で指定すること
    s3: s3://${LOKI_S3_REGION}/${LOKI_S3_BUCKET_NAME}
    s3forcepathstyle: false
    region: ${LOKI_S3_REGION}
    # アクセスキーは IAM ロール（IRSA）経由での認証を推奨する
    # access_key_id と secret_access_key は IAM ロールが利用できない場合のみ設定する

limits_config:
  # 本番環境のデータ保持期間: 90 日
  retention_period: 2160h
  # 古いサンプルを拒否してデータ整合性を保つ
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  # クエリ結果件数の上限（本番負荷を考慮した制限値）
  max_entries_limit_per_query: 10000
  # 本番環境では取り込みレート制限を適切に設定する
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  # 本番環境ではストリーム数の上限を明示的に設定する
  max_streams_per_user: 10000
  max_global_streams_per_user: 10000

# 監査ログ用テナントは保持期間を 1 年に延長する
overrides:
  audit:
    retention_period: 8760h  # 365 days

# コンパクター設定（本番環境ではデータ圧縮と保持期間管理に使用する）
compactor:
  working_directory: /loki/compactor
  # S3 バックエンドを使用してコンパクションを実行する
  shared_store: s3
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  # 削除リクエストを受け付けるかどうか（本番環境では慎重に設定する）
  delete_request_store: s3

# 本番環境では匿名の使用状況レポートを無効化する
analytics:
  reporting_enabled: false

# 本番環境ではキャッシュを有効化してクエリパフォーマンスを向上させる
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
