# ========================================================================
# ⚠️ 警告: このファイルはローカル開発・CI 環境専用の Loki 設定です
# 本番環境では auth_enabled: true に設定し、適切な認証を有効化すること
#
# 本番用設定への変更が必要な項目:
#   - auth_enabled: true（マルチテナント認証を有効化）
#   - ingester.chunk_encoding: snappy（本番向け圧縮）
#   - storage_config: S3/GCS への永続ストレージ変更
# ========================================================================
auth_enabled: false  # ローカル開発専用: 本番では true に変更すること

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 2160h  # 90 days (prod)
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_entries_limit_per_query: 5000

# 監査ログ用の別テナント設定
overrides:
  audit:
    retention_period: 8760h  # 1 year (365 days)

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

analytics:
  reporting_enabled: false
