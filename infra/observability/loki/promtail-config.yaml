server:
  http_listen_port: 3101

positions:
  # Pod 再起動後もログ読み取り位置を保持するため、永続ボリュームにポジションファイルを保存する
  # /tmp はコンテナ再起動時に消失し、ログの重複送信または欠損が発生するため使用禁止
  # Kubernetes デプロイ時は /var/promtail を PVC または emptyDir でマウントすること
  filename: /var/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        target_label: app
      - source_labels: [__meta_kubernetes_pod_label_tier]
        target_label: tier
    pipeline_stages:
      - json:
          expressions:
            level: level
            trace_id: trace_id
            service: service
      - labels:
          level:
          trace_id:
          service:
