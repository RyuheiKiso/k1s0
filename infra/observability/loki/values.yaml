# Loki（ADR-OBS-001、LGTM の L = Logs）の production-grade Helm values。
# helm repo add grafana https://grafana.github.io/helm-charts
# helm upgrade --install loki grafana/loki -n observability -f values.yaml
#
# dev は tools/local-stack/manifests/90-observability/values-loki.yaml（SingleBinary）。

# scalable モード（read / write / backend を分離した分散構成）。
deploymentMode: SimpleScalable

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 3
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h
  # MinIO への保管（S3 互換）
  storage:
    type: s3
    bucketNames:
      chunks: k1s0-events
      ruler: k1s0-events
      admin: k1s0-events
    s3:
      endpoint: http://minio.k1s0-data.svc.cluster.local:9000
      region: us-east-1
      accessKeyId: ${ACCESS_KEY_ID}
      secretAccessKey: ${SECRET_ACCESS_KEY}
      s3ForcePathStyle: true
      insecure: true
  # 保管ポリシー（コンプライアンス保管 7 年に対応する場合は 90d → 7y に拡張）
  limits_config:
    retention_period: 720h
  ruler:
    enable_api: true
    storage:
      type: s3
      s3:
        endpoint: http://minio.k1s0-data.svc.cluster.local:9000
        bucketnames: k1s0-events

# scalable 構成（read 3 / write 3 / backend 3 の HA）
read:
  replicas: 3
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi
write:
  replicas: 3
  persistence:
    size: 50Gi
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi
backend:
  replicas: 3
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 512Mi

# SingleBinary は無効化
singleBinary:
  replicas: 0

# キャッシュは Redis 連携にするのが prod 推奨
chunksCache:
  enabled: true
  allocatedMemory: 2048
resultsCache:
  enabled: true
  allocatedMemory: 1024

# nginx Gateway を有効化（read / write を 1 endpoint に集約）
gateway:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

# 監視（ServiceMonitor + PrometheusRule + Grafana Dashboard）
monitoring:
  serviceMonitor:
    enabled: true
  rules:
    enabled: true
  dashboards:
    enabled: true

# 認証情報の Secret 経由注入（OpenBao 動的シークレット plan 04-06）
extraEnv:
  - name: ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: k1s0-loki-s3-credentials
        key: access-key
  - name: SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: k1s0-loki-s3-credentials
        key: secret-key

# テストや canary は無効化
test:
  enabled: false
lokiCanary:
  enabled: false
