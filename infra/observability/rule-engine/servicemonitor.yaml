apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rule-engine-server
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: rule-engine-server
    tier: system
    service: rule-engine
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: rule-engine-server
  namespaceSelector:
    matchNames:
      - k1s0-system
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      metricRelabelings:
        # 不要なメトリクスを除外して Prometheus ストレージコストを削減する
        - sourceLabels: [__name__]
          regex: "go_.*"
          action: drop
        # プロセスメトリクスは Kubernetes レベルで取得可能なため除外する
        - sourceLabels: [__name__]
          regex: "process_.*"
          action: drop
        # HTTP 計装ライブラリ内部メトリクスは不要
        - sourceLabels: [__name__]
          regex: "promhttp_.*"
          action: drop
