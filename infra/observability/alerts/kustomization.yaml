# 本ファイルは k1s0 Prometheus alerting rules の Kustomize 入口。
#
# docs 正典:
#   ops/runbooks/daily/error-code-alert-policy.md
#   docs/03_要件定義/30_非機能要件/A_可用性.md（NFR-A-SLA-*）
#
# 適用方法:
#   kubectl kustomize infra/observability/alerts | kubectl apply -f -
#   または GitOps（Argo CD ApplicationSet `infra.yaml`）で自動同期。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prometheus operator CRD（monitoring.coreos.com/v1 PrometheusRule）を配置する。
# namespace は LGTM スタック（Mimir / Grafana / Loki / Tempo / Pyroscope / OTel Collector）と
# 統一した `observability`（infra/k8s/namespaces/namespaces.yaml）。Mimir ruler が
# storage_backend (S3 / MinIO) 経由で同期する想定で、Prometheus Operator controller
# 自体は不要（CRD 定義のみで Mimir 側が pickup）。
resources:
  - k1s0-tier1-alerts.yaml
  - k1s0-tier2-alerts.yaml
  - k1s0-tier3-alerts.yaml
  - k1s0-slo.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: k1s0
