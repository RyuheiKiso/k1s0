# =============================================================================
# OTel Collector の k8sattributes processor 設定（k8s メタデータ自動付与）
#
# 全 telemetry に namespace / pod / container / node label を自動添付する。
# tier 識別 / SLO 計算 / Grafana ダッシュボードのドリルダウンに必須。
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-processor-k8sattributes
  namespace: k1s0-obs
data:
  config.yaml: |
    processors:
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        filter:
          node_from_env_var: KUBE_NODE_NAME
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.node.name
          labels:
            - tag_name: k1s0.tier
              key: k1s0.io/tier
              from: pod
            - tag_name: k1s0.layer
              key: k1s0.io/layer
              from: pod
            - tag_name: k1s0.component
              key: k1s0.io/component
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
