apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: auth-server
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: auth-server
    tier: system
    service: auth
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-server
  namespaceSelector:
    matchNames:
      - k1s0-system
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      metricRelabelings:
        # LOW-003 監査対応: 不要なメトリクスを除外してPrometheus ストレージコストを削減する
        # auth-rust は Rust サーバーのため go_* メトリクスは通常存在しないが、
        # 将来の Go sidecar 追加時に備えてルールを残す
        - sourceLabels: [__name__]
          regex: "go_.*"
          action: drop
        # プロセスメトリクス（process_cpu_seconds_total 等）は Kubernetes レベルで取得可能なため除外
        - sourceLabels: [__name__]
          regex: "process_.*"
          action: drop
        # HTTP 計装ライブラリ内部メトリクスは不要
        - sourceLabels: [__name__]
          regex: "promhttp_.*"
          action: drop
