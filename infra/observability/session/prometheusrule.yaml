# session サービス用 PrometheusRule
# session-server のアラートルール定義（エラーレート、レイテンシ、Pod 再起動）
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: session-server-alerts
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: session-server
    tier: system
    service: session
spec:
  groups:
    - name: session_server.rules
      rules:
        # MED-006 監査対応: アラート閾値の SLO 根拠は docs/architecture/observability/SLO設計.md を参照
        # エラーレート閾値 1%（> 0.01） = 可用性 99% SLO の 1-availability 換算値
        # P99 レイテンシ閾値 500ms（> 0.5） = レイテンシ SLO の P99 目標値
        # エラーレートが 5 分間 5% を超えた場合に critical アラートを発火
        - alert: session_high_error_rate
          expr: |
            (
              sum(rate(http_requests_total{service="session-server", status=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{service="session-server"}[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: critical
            service: session-server
            tier: system
          annotations:
            summary: "High error rate on session-server"
            description: "Error rate is above 5% for session-server in k1s0-system"
            runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/high-error-rate.md"

        # P99 レイテンシが 5 分間 2 秒を超えた場合に warning アラートを発火
        - alert: session_high_latency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{service="session-server"}[5m])) by (le)
            ) > 2.0
          for: 5m
          labels:
            severity: warning
            service: session-server
            tier: system
          annotations:
            summary: "High P99 latency on session-server"
            description: "P99 latency is above 2s for session-server in k1s0-system"
            runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/high-latency.md"

        # 15 分間に 3 回以上の Pod 再起動が発生した場合に critical アラートを発火
        - alert: session_pod_restarts
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="k1s0-system", pod=~"session-server.*"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
            service: session-server
            tier: system
          annotations:
            summary: "Pod restarts detected for session-server"
            description: "Pod session-server in k1s0-system has restarted more than 3 times in the last 15 minutes"
            runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/pod-restart.md"
