# Kubernetes Secret（Alertmanager → Microsoft Teams Webhook URL の管理）
# prometheus-msteams が Alertmanager からの通知を Teams チャンネルに転送するための Webhook URL を保持する。
#
# ===========================================================================
# WARNING: このファイルにはプレースホルダー値が含まれている。
#          <REPLACE_WITH_ACTUAL_URL> のまま本番環境にデプロイしないこと（C-04 監査対応）。
#
# TODO (本番デプロイ前必須): 以下の URL を Vault から動的注入すること
# コマンド例: vault kv get -field=webhook_url secret/k1s0/alertmanager/msteams
# または External Secrets Operator を使用して Vault から自動同期する
#
# 本番デプロイ前に以下を必ず実施すること:
#   1. Teams チャンネルで受信 Webhook コネクタを作成し、URL を取得する
#   2. 取得した URL を Vault の secret/data/k1s0/alertmanager/msteams に保存する:
#      vault kv put secret/k1s0/alertmanager/msteams \
#        default_webhook_url="https://outlook.office.com/webhook/..." \
#        critical_webhook_url="https://outlook.office.com/webhook/..." \
#        warning_webhook_url="https://outlook.office.com/webhook/..."
#   3. CI/CD パイプラインで Vault からこのファイルを生成してデプロイする
#   4. 生成後のファイル（実 URL 入り）をリポジトリにコミットしないこと
# ===========================================================================
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-msteams-webhook
  namespace: observability
type: Opaque
stringData:
  # デフォルトチャンネル向け Webhook URL（未分類アラートの送信先）
  default_webhook_url: "https://outlook.office.com/webhook/<REPLACE_WITH_ACTUAL_URL>"    # プレースホルダー: デプロイ時に Vault 経由で置換
  # CRITICAL アラート専用チャンネル向け Webhook URL（即時対応が必要なアラートの送信先）
  critical_webhook_url: "https://outlook.office.com/webhook/<REPLACE_WITH_ACTUAL_URL>"   # プレースホルダー: デプロイ時に Vault 経由で置換
  # WARNING アラート専用チャンネル向け Webhook URL（監視・調査が必要なアラートの送信先）
  warning_webhook_url: "https://outlook.office.com/webhook/<REPLACE_WITH_ACTUAL_URL>"    # プレースホルダー: デプロイ時に Vault 経由で置換
