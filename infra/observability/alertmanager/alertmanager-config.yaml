# 開発環境用設定。本番では Helm values.yaml を使用すること。
# 本番環境への適用時は、各 url: と routing_key: を Helm の
# .Values.alertmanager.webhookUrl / pagerdutyRoutingKey に差し替えること。
#
# LOW-012 監査対応: TLS設定について
# 開発環境では Alertmanager ↔ Prometheus 間の通信は TLS なしで動作する。
# 本番環境では以下の TLS 設定を Helm values.yaml に追加すること:
#
#   global:
#     tls_config:
#       cert_file: /etc/alertmanager/tls/tls.crt
#       key_file: /etc/alertmanager/tls/tls.key
#       ca_file: /etc/alertmanager/tls/ca.crt
#       insecure_skip_verify: false
#
# Prometheus 側の Alertmanager 接続設定（prometheus.yml）にも TLS を追加すること:
#   alerting:
#     alertmanagers:
#       - static_configs:
#           - targets: ['alertmanager:9093']
#         scheme: https
#         tls_config:
#           ca_file: /etc/prometheus/tls/ca.crt
#           cert_file: /etc/prometheus/tls/tls.crt
#           key_file: /etc/prometheus/tls/tls.key
#
# 証明書は cert-manager（infra/kubernetes/cert-manager/）で管理することを推奨する。
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'namespace', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: teams-default
  routes:
    # SEV1 相当: SLO バーンレート critical は Teams と PagerDuty の両方に通知する
    # continue: true により teams-critical への通知後も pagerduty-critical へのルーティングを継続する（H-03/L-02 対応）
    - match:
        severity: critical
      receiver: teams-critical
      repeat_interval: 1h
      continue: true
    # critical アラートを PagerDuty にも転送してエスカレーション通知を確保する（H-03 対応）
    - match:
        severity: critical
      receiver: pagerduty-critical
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: teams-warning
      repeat_interval: 4h
    # staging 環境での warning 抑制
    - match:
        severity: warning
        environment: staging
      receiver: 'null'    # 通知しない

receivers:
  - name: teams-default
    webhook_configs:
      # 環境別 Webhook URL 設定:
      #   dev:     http://localhost:2000/default (または通知なし)
      #   staging: https://outlook.office.com/webhook/staging-xxxx/IncomingWebhook/default
      #   prod:    https://outlook.office.com/webhook/prod-xxxx/IncomingWebhook/default
      # 開発環境では prometheus-msteams のローカルエンドポイントに転送する
      # 本番では Helm values.yaml の alertmanager.webhookUrl を設定すること
      - url: 'http://prometheus-msteams:2000/default'
        send_resolved: true

  - name: teams-critical
    webhook_configs:
      # 環境別 Webhook URL 設定:
      #   dev:     http://prometheus-msteams:2000/critical（開発用固定値）
      #   staging: https://outlook.office.com/webhook/staging-xxxx/IncomingWebhook/critical
      #   prod:    https://outlook.office.com/webhook/prod-xxxx/IncomingWebhook/critical
      # 本番では Helm values.yaml の alertmanager.criticalWebhookUrl を設定すること
      - url: 'http://prometheus-msteams:2000/critical'
        send_resolved: true

  - name: teams-warning
    webhook_configs:
      # 環境別 Webhook URL 設定:
      #   dev:     http://prometheus-msteams:2000/warning（開発用固定値）
      #   staging: https://outlook.office.com/webhook/staging-xxxx/IncomingWebhook/warning
      #   prod:    https://outlook.office.com/webhook/prod-xxxx/IncomingWebhook/warning
      # 本番では Helm values.yaml の alertmanager.warningWebhookUrl を設定すること
      - url: 'http://prometheus-msteams:2000/warning'
        send_resolved: true

  # PagerDuty 受信者: 深夜帯の critical アラートを見逃さないためのエスカレーション通知チャネル（H-03 対応）
  # routing_key は Helm values の alertmanager.pagerdutyRoutingKey から注入する
  #
  # M-24 監査対応: routing_key の空文字・未設定を防止するため、以下を必ず実施すること:
  #   1. Helm install/upgrade 時に必ず --set alertmanager.pagerdutyRoutingKey=<KEY> を指定する
  #   2. CI/CD パイプラインでは PAGERDUTY_ROUTING_KEY 環境変数を Vault から取得して注入すること
  #   3. Helm values ファイル（values-prod.yaml 等）に pagerdutyRoutingKey の required 検証を追加すること
  #      例: {{ required "alertmanager.pagerdutyRoutingKey は必須です" .Values.alertmanager.pagerdutyRoutingKey }}
  #   4. routing_key が空文字の場合、PagerDuty API は 400 Bad Request を返し通知が届かないため
  #      デプロイ前チェックスクリプトで非空文字を検証すること
  - name: pagerduty-critical
    pagerduty_configs:
      # 開発環境用固定ルーティングキー（本番では必ず PagerDuty の実キーに変更すること）
      # 本番では Helm values.yaml の alertmanager.pagerdutyRoutingKey を設定すること
      # ⚠️ WARNING: この値は開発環境専用。本番環境では絶対に使用しないこと
      - routing_key: 'dev-routing-key'
        severity: critical
        description: '{{ template "pagerduty.default.description" . }}'

  - name: 'null'
    # 通知抑制用の空レシーバー
