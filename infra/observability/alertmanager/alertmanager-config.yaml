global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'namespace', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: teams-default
  routes:
    # SEV1 相当: SLO バーンレート critical は Teams と PagerDuty の両方に通知する
    # continue: true により teams-critical への通知後も pagerduty-critical へのルーティングを継続する（H-03/L-02 対応）
    - match:
        severity: critical
      receiver: teams-critical
      repeat_interval: 1h
      continue: true
    # critical アラートを PagerDuty にも転送してエスカレーション通知を確保する（H-03 対応）
    - match:
        severity: critical
      receiver: pagerduty-critical
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: teams-warning
      repeat_interval: 4h
    # staging 環境での warning 抑制
    - match:
        severity: warning
        environment: staging
      receiver: 'null'    # 通知しない

receivers:
  - name: teams-default
    webhook_configs:
      # 環境別 Webhook URL 設定:
      #   dev:     http://localhost:2000/default (または通知なし)
      #   staging: https://outlook.office.com/webhook/staging-xxxx/IncomingWebhook/default
      #   prod:    https://outlook.office.com/webhook/prod-xxxx/IncomingWebhook/default
      - url: '{{ .Values.alertmanager.webhookUrl | default "http://prometheus-msteams:2000/default" }}'
        send_resolved: true

  - name: teams-critical
    webhook_configs:
      # 環境別 Webhook URL 設定:
      #   dev:     http://localhost:2000/critical (または通知なし)
      #   staging: https://outlook.office.com/webhook/staging-xxxx/IncomingWebhook/critical
      #   prod:    https://outlook.office.com/webhook/prod-xxxx/IncomingWebhook/critical
      - url: '{{ .Values.alertmanager.criticalWebhookUrl | default "http://prometheus-msteams:2000/critical" }}'
        send_resolved: true

  - name: teams-warning
    webhook_configs:
      # 環境別 Webhook URL 設定:
      #   dev:     http://localhost:2000/warning (または通知なし)
      #   staging: https://outlook.office.com/webhook/staging-xxxx/IncomingWebhook/warning
      #   prod:    https://outlook.office.com/webhook/prod-xxxx/IncomingWebhook/warning
      - url: '{{ .Values.alertmanager.warningWebhookUrl | default "http://prometheus-msteams:2000/warning" }}'
        send_resolved: true

  # PagerDuty 受信者: 深夜帯の critical アラートを見逃さないためのエスカレーション通知チャネル（H-03 対応）
  # routing_key は Helm values の alertmanager.pagerdutyRoutingKey から注入する
  #
  # M-24 監査対応: routing_key の空文字・未設定を防止するため、以下を必ず実施すること:
  #   1. Helm install/upgrade 時に必ず --set alertmanager.pagerdutyRoutingKey=<KEY> を指定する
  #   2. CI/CD パイプラインでは PAGERDUTY_ROUTING_KEY 環境変数を Vault から取得して注入すること
  #   3. Helm values ファイル（values-prod.yaml 等）に pagerdutyRoutingKey の required 検証を追加すること
  #      例: {{ required "alertmanager.pagerdutyRoutingKey は必須です" .Values.alertmanager.pagerdutyRoutingKey }}
  #   4. routing_key が空文字の場合、PagerDuty API は 400 Bad Request を返し通知が届かないため
  #      デプロイ前チェックスクリプトで非空文字を検証すること
  - name: pagerduty-critical
    pagerduty_configs:
      # routing_key が空文字または未設定の場合は PagerDuty 通知が無効化される（M-24 監査対応）
      # Helm values の alertmanager.pagerdutyRoutingKey に 32文字の PagerDuty Integration Key を設定すること
      - routing_key: '{{ required "alertmanager.pagerdutyRoutingKey は必須です（空文字不可）" .Values.alertmanager.pagerdutyRoutingKey }}'
        severity: critical
        description: '{{ template "pagerduty.default.description" . }}'

  - name: 'null'
    # 通知抑制用の空レシーバー
