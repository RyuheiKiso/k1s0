# M-11 対応: selector・labels・image・replicas・resources・securityContext が欠落していたため
# 完全な Deployment マニフェストに補完する。env の内容は既存のまま維持する。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-msteams
  namespace: observability
  labels:
    app: prometheus-msteams
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-msteams
  template:
    metadata:
      labels:
        app: prometheus-msteams
    spec:
      containers:
        - name: prometheus-msteams
          image: quay.io/prometheusmsteams/prometheus-msteams:v1.5.5
          ports:
            - containerPort: 2000
              name: http
          # H-7 対応に準拠: 最小権限でコンテナを実行する
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          # リソース制限を設定し、ノードへの過剰な負荷を防ぐ
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          env:
            - name: TEAMS_DEFAULT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: prometheus-msteams-webhook
                  key: default_webhook_url
            - name: TEAMS_CRITICAL_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: prometheus-msteams-webhook
                  key: critical_webhook_url
            - name: TEAMS_WARNING_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: prometheus-msteams-webhook
                  key: warning_webhook_url
