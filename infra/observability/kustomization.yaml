#   docs/05_実装/00_ディレクトリ設計/50_infraレイアウト/07_観測性配置.md
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - alerts
  - alertmanager
  - otel-collector
  - grafana
