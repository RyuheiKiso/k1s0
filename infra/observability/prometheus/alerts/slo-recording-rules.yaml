groups:
  - name: slo-recording-rules
    rules:
      # 全ティア共通: 過去30日間の可用性比率（正常レスポンス / 全リクエスト）を計算する
      - record: slo:availability:ratio
        expr: |
          sum(rate(http_requests_total{status!~"5.."}[30d])) by (namespace, service)
          / sum(rate(http_requests_total[30d])) by (namespace, service)

      # System Tier (SLO 99.95%): エラーバジェット残量を計算する
      # error_budget = 1 - 0.9995 = 0.0005
      - record: slo:error_budget:remaining
        expr: |
          1 - (
            (1 - slo:availability:ratio{namespace="k1s0-system"})
            / 0.0005
          )
        labels:
          tier: system

      # Business / Service Tier (SLO 99.9%): エラーバジェット残量を計算する
      # error_budget = 1 - 0.999 = 0.001
      - record: slo:error_budget:remaining
        expr: |
          1 - (
            (1 - slo:availability:ratio{namespace=~"k1s0-business|k1s0-service"})
            / 0.001
          )
        labels:
          tier: service
