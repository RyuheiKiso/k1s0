# インフラストラクチャ関連のアラートルール
# TLS 証明書の期限切れ検知を含む
groups:
  - name: infrastructure-alerts
    rules:
      # TLS 証明書の有効期限が 30 日以内に切れる場合にアラートを発火する（Blackbox Exporter 利用時）
      - alert: CertificateExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS certificate expiring in {{ $value | humanizeDuration }}"
          description: "{{ $labels.instance }} の TLS 証明書が {{ $value | humanizeDuration }} 以内に期限切れになります"

      # TLS 証明書の有効期限が 7 日以内に切れる場合に critical アラートを発火する
      - alert: CertificateExpiringCritical
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 7
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "TLS certificate expiring in {{ $value | humanizeDuration }} (critical)"
          description: "{{ $labels.instance }} の TLS 証明書が {{ $value | humanizeDuration }} 以内に期限切れになります。早急に更新してください"

      # cert-manager が管理する証明書の有効期限が 30 日（2592000 秒）以内の場合にアラートを発火する
      - alert: CertManagerCertExpiringSoon
        expr: certmanager_certificate_expiration_timestamp_seconds - time() < 2592000
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "cert-manager certificate {{ $labels.name }} expiring soon"
          description: "cert-manager 管理の証明書 {{ $labels.name }}（namespace: {{ $labels.namespace }}）の有効期限が 30 日以内です"

      # cert-manager が管理する証明書の有効期限が 7 日以内の場合に critical アラートを発火する
      - alert: CertManagerCertExpiringCritical
        expr: certmanager_certificate_expiration_timestamp_seconds - time() < 604800
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "cert-manager certificate {{ $labels.name }} expiring in < 7 days (critical)"
          description: "cert-manager 管理の証明書 {{ $labels.name }}（namespace: {{ $labels.namespace }}）の有効期限が 7 日以内です。早急に確認してください"

      # cert-manager の証明書発行が Ready でない場合にアラートを発火する
      - alert: CertManagerCertNotReady
        expr: certmanager_certificate_ready_status{condition="False"} == 1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "cert-manager certificate {{ $labels.name }} is not ready"
          description: "cert-manager 管理の証明書 {{ $labels.name }}（namespace: {{ $labels.namespace }}）が Ready 状態ではありません"
