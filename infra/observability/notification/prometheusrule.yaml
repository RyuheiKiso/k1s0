# notification サービス用 PrometheusRule
# notification-server のアラートルール定義（エラーレート、レイテンシ、Pod 再起動）
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: notification-server-alerts
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: notification-server
    tier: system
    service: notification
spec:
  groups:
    - name: notification_server.rules
      rules:
        # エラーレートが 5 分間 5% を超えた場合に critical アラートを発火
        - alert: notification_high_error_rate
          expr: |
            (
              sum(rate(http_requests_total{service="notification-server", status=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{service="notification-server"}[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: critical
            service: notification-server
            tier: system
          annotations:
            summary: "High error rate on notification-server"
            description: "Error rate is above 5% for notification-server in k1s0-system"
            runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/high-error-rate.md"

        # P99 レイテンシが 5 分間 2 秒を超えた場合に warning アラートを発火
        - alert: notification_high_latency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{service="notification-server"}[5m])) by (le)
            ) > 2.0
          for: 5m
          labels:
            severity: warning
            service: notification-server
            tier: system
          annotations:
            summary: "High P99 latency on notification-server"
            description: "P99 latency is above 2s for notification-server in k1s0-system"
            runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/high-latency.md"

        # 15 分間に 3 回以上の Pod 再起動が発生した場合に critical アラートを発火
        - alert: notification_pod_restarts
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="k1s0-system", pod=~"notification-server.*"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
            service: notification-server
            tier: system
          annotations:
            summary: "Pod restarts detected for notification-server"
            description: "Pod notification-server in k1s0-system has restarted more than 3 times in the last 15 minutes"
            runbook_url: "https://github.com/k1s0/k1s0/blob/main/docs/architecture/observability/runbooks/common/pod-restart.md"
