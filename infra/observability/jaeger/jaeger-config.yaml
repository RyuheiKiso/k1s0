apiVersion: jaegertracing.io/v1
kind: Jaeger
metadata:
  name: jaeger
  namespace: observability
spec:
  strategy: production

  collector:
    replicas: 1
    options:
      collector:
        grpc-port: 14250
        http-port: 14268
        zipkin.http-port: 9411
        # OTel Collector からの OTLP プロトコルでトレースを受信するための設定
        otlp:
          enabled: true
          grpc:
            host-port: 4317
          http:
            host-port: 4318

  query:
    replicas: 1
    options:
      query:
        base-path: /jaeger

  agent:
    strategy: DaemonSet
    options:
      agent:
        tags: "cluster=k1s0"

  storage:
    type: elasticsearch
    options:
      es:
        # H-02 監査対応: Elasticsearch との通信を TLS 化し、盗聴・中間者攻撃を防止する
        # 旧設定 http:// は平文通信であり、トレースデータ（認証情報を含む可能性）が傍受されるリスクがある
        server-urls: https://elasticsearch.observability.svc.cluster.local:9200
        index-prefix: jaeger
        num-shards: 3
        num-replicas: 1
        # TLS 設定: cluster-internal CA 証明書を使用して Elasticsearch の証明書を検証する
        # CA 証明書は Kubernetes Secret（jaeger-es-tls）から Vault 経由で注入すること
        tls:
          ca: /etc/jaeger/certs/ca.crt
          # 相互TLS（mTLS）を使用する場合は以下のコメントを解除してクライアント証明書を設定すること
          # cert: /etc/jaeger/certs/tls.crt
          # key: /etc/jaeger/certs/tls.key
          # insecure-skip-verify: false（デフォルト false: 証明書検証を必ず行うこと）
    esIndexCleaner:
      enabled: true
      # トレース保持期間: 30日（ログの90日保持に揃えた合理的な範囲）
      # ログの trace_id からトレースを追跡できる期間を確保する
      numberOfDays: 30
      schedule: "55 23 * * *"

  sampling:
    options:
      default_strategy:
        type: probabilistic
        param: 0.1
      service_strategies:
        - service: "k1s0-system.*"
          type: probabilistic
          param: 0.5
        - service: "k1s0-business.*"
          type: probabilistic
          param: 0.1
        - service: "k1s0-service.*"
          type: probabilistic
          param: 0.1

  ingress:
    enabled: false
