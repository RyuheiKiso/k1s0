apiVersion: jaegertracing.io/v1
kind: Jaeger
metadata:
  name: jaeger
  namespace: observability
spec:
  strategy: production

  collector:
    replicas: 1
    options:
      collector:
        grpc-port: 14250
        http-port: 14268
        zipkin.http-port: 9411
        # OTel Collector からの OTLP プロトコルでトレースを受信するための設定
        otlp:
          enabled: true
          grpc:
            host-port: 4317
          http:
            host-port: 4318

  query:
    replicas: 1
    options:
      query:
        base-path: /jaeger

  agent:
    strategy: DaemonSet
    options:
      agent:
        tags: "cluster=k1s0"

  storage:
    type: elasticsearch
    options:
      es:
        server-urls: http://elasticsearch.observability.svc.cluster.local:9200
        index-prefix: jaeger
        num-shards: 3
        num-replicas: 1
    esIndexCleaner:
      enabled: true
      # トレース保持期間: 30日（ログの90日保持に揃えた合理的な範囲）
      # ログの trace_id からトレースを追跡できる期間を確保する
      numberOfDays: 30
      schedule: "55 23 * * *"

  sampling:
    options:
      default_strategy:
        type: probabilistic
        param: 0.1
      service_strategies:
        - service: "k1s0-system.*"
          type: probabilistic
          param: 0.5
        - service: "k1s0-business.*"
          type: probabilistic
          param: 0.1
        - service: "k1s0-service.*"
          type: probabilistic
          param: 0.1

  ingress:
    enabled: false
