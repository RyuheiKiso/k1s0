# vault サービス用 ServiceMonitor
# Prometheus が vault-server のメトリクスを収集するためのサービス監視設定
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vault-server
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: vault-server
    tier: system
    service: vault
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vault-server
  namespaceSelector:
    matchNames:
      - k1s0-system
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "go_.*"
          action: drop
