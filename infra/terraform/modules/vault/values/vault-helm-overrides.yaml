# M-031 監査対応: HashiCorp Vault Helm chart の追加設定（PVC マウント）
# 目的: 監査ログをコンテナ再起動後も永続化するため、vault-audit-log-pvc をマウントする
#
# 使用方法:
#   helm upgrade vault hashicorp/vault \
#     -f infra/terraform/modules/vault/values/vault-helm-overrides.yaml \
#     -n k1s0-system
#
# または Terraform の helm_release リソースで values として指定する:
#   resource "helm_release" "vault" {
#     values = [file("${path.module}/values/vault-helm-overrides.yaml")]
#   }
#
# 前提: infra/kubernetes/system/vault-audit-pvc.yaml を先に適用すること
#   kubectl apply -f infra/kubernetes/system/vault-audit-pvc.yaml

server:
  # 監査ログ用 PVC をコンテナにマウントする（M-031 監査対応）
  # vault_audit リソース（infra/terraform/modules/vault/main.tf）は
  # file_path = "/vault/logs/audit.log" に書き込むためこのマウントが必要
  volumes:
    - name: audit-log
      persistentVolumeClaim:
        # infra/kubernetes/system/vault-audit-pvc.yaml で定義された PVC を参照する
        claimName: vault-audit-log-pvc

  volumeMounts:
    - name: audit-log
      # Terraform vault_audit リソースの file_path と一致させること
      mountPath: /vault/logs

  # 監査ログのファイルローテーション設定（オプション）
  # Vault はデフォルトでローテーションしないため、外部ローテーション（logrotate等）が必要
  # あるいは audit sink の type を syslog に変更して外部ログ収集に委ねることを検討する

  # Kubernetes probe の設定（audit log マウント後も正常に動作するよう確認済み）
  readinessProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - vault status -tls-skip-verify | grep -E "^Initialized|^Sealed"
    initialDelaySeconds: 10
    periodSeconds: 10
