# infra/kong/kong.dev.yaml
# ローカル開発用 Kong Declarative Config (DB-less mode)
#
# 本番環境では kong.yaml を decK で管理し、Redis バックエンドの rate-limiting や
# JWT プラグインを有効にするが、ローカル開発環境では以下の点が異なる:
#   - サービス URL は docker-compose サービス名で参照
#   - rate-limiting は local policy（Redis 不要）
#   - JWT プラグインは有効（Keycloak JWKS 連携、ヘルスチェックエンドポイントは除外）
#   - CORS は localhost:3000 を許可
#
# ================================================================
# 【L-02 監査対応】rate-limiting policy: local の制限事項
# ================================================================
# このファイルの全 rate-limiting プラグインは `policy: local` を使用している。
#
# local ポリシーの特性と制限:
#   - 各 Kong ノードが独立してカウンターを管理する（メモリ内）
#   - Redis 等の共有ストアを使用しないため、Redis 依存をゼロにできる
#   - ただし、Kong が複数ノード（Horizontal Pod Autoscaler 等）で起動する場合、
#     ノード間でカウンターが共有されないため、実質的な制限値が緩くなる
#     （例: 3ノードなら 1ノード1000req/min × 3 = 最大3000req/min が通過する）
#
# 本番環境では必ず `policy: redis` を使用すること:
#   - infra/kong/kong.yaml（本番設定）を参照
#   - Redis クラスターを Kong の rate-limiting バックエンドとして設定する
#
# ローカル開発（単一ノード前提）では local ポリシーで十分な制限が機能する。
# ================================================================

_format_version: "3.0"

services:
