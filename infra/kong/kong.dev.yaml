# infra/kong/kong.dev.yaml
# ローカル開発用 Kong Declarative Config (DB-less mode)
#
# 本番環境では kong.yaml を decK で管理し、Redis バックエンドの rate-limiting や
# JWT プラグインを有効にするが、ローカル開発環境では以下の点が異なる:
#   - サービス URL は docker-compose サービス名で参照
#   - rate-limiting は local policy（Redis 不要）
#   - JWT プラグインは有効（Keycloak JWKS 連携、ヘルスチェックエンドポイントは除外）
#   - CORS は localhost:3000 を許可

_format_version: "3.0"

services:
  # ============================================================
  # Auth Service
  # ============================================================
  - name: auth-v1
    url: http://auth-rust:8080
    routes:
      - name: auth-token-route
        paths:
          - /api/v1/auth
        strip_path: false
      - name: auth-users-route
        paths:
          - /api/v1/users
        strip_path: false
      - name: auth-audit-route
        paths:
          - /api/v1/audit
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 1000
          policy: local
      - name: request-size-limiting
        config:
          allowed_payload_size: 10

  # ============================================================
  # Config Service
  # ============================================================
  - name: config-v1
    url: http://config-rust:8080
    routes:
      - name: config-route
        paths:
          - /api/v1/config
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 2000
          policy: local

  # ============================================================
  # Saga Service
  # ============================================================
  - name: saga-v1
    url: http://saga-rust:8080
    routes:
      - name: saga-route
        paths:
          - /api/v1/sagas
        strip_path: false
      - name: saga-workflow-route
        paths:
          - /api/v1/workflows
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 1000
          policy: local

  # ============================================================
  # DLQ Manager Service
  # ============================================================
  - name: dlq-manager-v1
    url: http://dlq-manager:8080
    routes:
      - name: dlq-route
        paths:
          - /api/v1/dlq
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 1000
          policy: local

  # ============================================================
  # Master Service
  # ============================================================
  - name: master-v1
    url: http://master-maintenance-rust:8080
    routes:
      - name: master-route
        paths:
          - /api/v1/master
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 2000
          policy: local

  # ============================================================
  # Dashboard Service (service Tier)
  # ※ dashboard-rust サービスは未実装のためコメントアウト
  # ============================================================
  # - name: dashboard-v1
  #   url: http://dashboard-rust:8080
  #   routes:
  #     - name: dashboard-route
  #       paths:
  #         - /api/v1/dashboard
  #       strip_path: false
  #   plugins:
  #     - name: rate-limiting
  #       config:
  #         minute: 1000
  #         policy: local

  # ============================================================
  # Health Endpoints (no auth required)
  # ============================================================
  - name: auth-health
    url: http://auth-rust:8080
    routes:
      - name: auth-health-check
        paths:
          - /healthz
          - /readyz
        strip_path: false
        plugins:
          - name: jwt
            enabled: false

  - name: config-health
    url: http://config-rust:8080
    routes:
      - name: config-health-check
        paths:
          - /healthz
          - /readyz
        strip_path: false
        plugins:
          - name: jwt
            enabled: false

  - name: saga-health
    url: http://saga-rust:8080
    routes:
      - name: saga-health-check
        paths:
          - /healthz
          - /readyz
        strip_path: false
        plugins:
          - name: jwt
            enabled: false

  - name: dlq-manager-health
    url: http://dlq-manager:8080
    routes:
      - name: dlq-manager-health-check
        paths:
          - /healthz
          - /readyz
        strip_path: false
        plugins:
          - name: jwt
            enabled: false

# ============================================================
# Global Plugins
# ============================================================
plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID
      exposed_headers:
        - X-RateLimit-Limit
        - X-RateLimit-Remaining
        - X-RateLimit-Reset
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 5000
      policy: local
      # ローカル開発環境: local policy のため Redis 障害は発生しないが、本番設定（false）に合わせて統一する
      fault_tolerant: false
      hide_client_headers: false

  # H-03監査対応: JWT iss/aud 検証（ローカル開発用）
  # 本番では infra/kong/plugins/auth.yaml で管理
  # key_claim_name: iss により jwt.claims.iss（"http://keycloak:8080/realms/k1s0"）と
  # consumer.jwt_secrets[].key（"http://keycloak:8080/realms/k1s0"）を照合する。
  # iss が一致しないトークンは 401 で拒否される。
  # aud 検証は post-function access フェーズで実施する（下記参照）。
  - name: jwt
    config:
      uri_param_names: []
      cookie_names: []
      key_claim_name: iss
      claims_to_verify:
        - exp
      header_names:
        - Authorization

  # H-03監査対応: JWT aud 検証 + バックエンドリクエストヘッダー転送（ローカル開発用）
  # access フェーズを使用する理由:
  #   1. kong.service.request.set_header() は access フェーズでのみ upstream へのヘッダー設定が有効
  #   2. post-function（priority -1000）は JWT プラグイン（priority 1006）より後に実行されるため
  #      access フェーズで authenticated_jwt_token が利用可能
  - name: post-function
    config:
      access:
        - |
          local jwt = kong.ctx.shared.authenticated_jwt_token
          if jwt then
            local aud = jwt.claims.aud
            local valid = false
            if type(aud) == "string" then
              valid = (aud == "k1s0-api")
            elseif type(aud) == "table" then
              for _, v in ipairs(aud) do
                if v == "k1s0-api" then valid = true; break end
              end
            end
            if not valid then
              return kong.response.exit(401, { message = "Unauthorized: invalid audience" })
            end
            kong.service.request.set_header("X-User-Id", jwt.claims.sub)
            local roles = ""
            local ra = jwt.claims.realm_access
            if ra and ra.roles then
              roles = table.concat(ra.roles, ",")
            end
            kong.service.request.set_header("X-User-Roles", roles)
            kong.service.request.set_header("X-User-Email", jwt.claims.email or "")
          end

  # セキュリティレスポンスヘッダー（開発環境でも本番と同一のヘッダーを確認できるようにする）
  - name: response-transformer
    config:
      add:
        headers:
          - X-Content-Type-Options:nosniff
          - X-Frame-Options:DENY
          - Strict-Transport-Security:max-age=31536000; includeSubDomains

  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true

# ============================================================
# Consumers - Keycloak JWKS 連携
# ============================================================
consumers:
  - username: keycloak
    jwt_secrets:
      # H-1 対応: RS256 アルゴリズム使用時は rsa_public_key フィールドが必須（Kong 3.9.1 DBless モード起動要件）
      - algorithm: RS256
        key: "http://keycloak:8080/realms/k1s0"
        # ローカル開発では Keycloak の内部URL を使用
        # JWKS URL: http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs
        # 実運用では keycloak:8080/realms/k1s0/protocol/openid-connect/certs から取得した RSA 公開鍵に差し替えること
        # このプレースホルダーは infra/kong/setup-kong-jwt.sh で自動置換される（C-2 対応）
        # 使用方法: ./infra/kong/setup-kong-jwt.sh
        # Keycloak 起動後に実行すると JWKS から公開鍵を取得して自動更新する
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA2a2rwplBQLzHPZe5TNJF
          dKNlJOxrGvgBNEaMHQSQBQGQR0ZMjPQFGktflANE6gLROHFGM1PNMT0/zplFNAm
          vJ3F5udDyJolRQMVFiGnvWkXGXKFUCEKEOXQCCTbMBtMDFqHMq6mFQJmN5WQMXE
          ....placeholder_replace_with_actual_keycloak_public_key....
          QIDAQAB
          -----END PUBLIC KEY-----
