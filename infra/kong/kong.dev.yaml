  # K8s liveness/readiness probe および Prometheus は各サービスの ClusterIP に直接アクセスする設計。
  # 本番環境: NetworkPolicy により kube-system / monitoring namespace からの直接アクセスのみ許可する。

# ============================================================
# Global Plugins
# ============================================================
plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID
      exposed_headers:
        - X-RateLimit-Limit
        - X-RateLimit-Remaining
        - X-RateLimit-Reset
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 5000
      policy: local
      # ローカル開発環境: local policy のため Redis 障害は発生しないが、本番設定（false）に合わせて統一する
      fault_tolerant: false
      hide_client_headers: false

  # H-03監査対応: JWT iss/aud 検証（ローカル開発用）
  # 本番では infra/kong/plugins/auth.yaml で管理
  # key_claim_name: iss により jwt.claims.iss（"http://keycloak:8080/realms/k1s0"）と
  # consumer.jwt_secrets[].key（"http://keycloak:8080/realms/k1s0"）を照合する。
  # iss が一致しないトークンは 401 で拒否される。
  # aud 検証は post-function access フェーズで実施する（下記参照）。
  - name: jwt
    config:
      uri_param_names: []
      cookie_names: []
      key_claim_name: iss
      claims_to_verify:
        - exp
      header_names:
        - Authorization

  # H-03監査対応: JWT aud 検証 + バックエンドリクエストヘッダー転送（ローカル開発用）
  # access フェーズを使用する理由:
  #   1. kong.service.request.set_header() は access フェーズでのみ upstream へのヘッダー設定が有効
  #   2. post-function（priority -1000）は JWT プラグイン（priority 1006）より後に実行されるため
  #      access フェーズで authenticated_jwt_token が利用可能
  - name: post-function
    config:
      access:
        - |
          local jwt = kong.ctx.shared.authenticated_jwt_token
          if jwt then
            local aud = jwt.claims.aud
            local valid = false
            if type(aud) == "string" then
              valid = (aud == "k1s0-api")
            elseif type(aud) == "table" then
              for _, v in ipairs(aud) do
                if v == "k1s0-api" then valid = true; break end
              end
            end
            if not valid then
              return kong.response.exit(401, { message = "Unauthorized: invalid audience" })
            end
            kong.service.request.set_header("X-User-Id", jwt.claims.sub)
            local roles = ""
            local ra = jwt.claims.realm_access
            if ra and ra.roles then
              roles = table.concat(ra.roles, ",")
            end
            kong.service.request.set_header("X-User-Roles", roles)
            kong.service.request.set_header("X-User-Email", jwt.claims.email or "")
          end

  # セキュリティレスポンスヘッダー（開発環境でも本番と同一のヘッダーを確認できるようにする）
  # M-16 監査対応: Content-Security-Policy を追加し、XSS・Clickjacking・オブジェクトインジェクションを防止する。
  # default-src 'self': デフォルトで同一オリジンのみ許可
  # script-src 'self': スクリプトは同一オリジンのみ許可（eval・inline script を禁止）
  # object-src 'none': Flash 等のプラグインコンテンツを全禁止
  # frame-ancestors 'none': 他ドメインからの iframe 埋め込みを全禁止（X-Frame-Options と二重防御）
  - name: response-transformer
    config:
      add:
        headers:
          - X-Content-Type-Options:nosniff
          - X-Frame-Options:DENY
          - Strict-Transport-Security:max-age=31536000; includeSubDomains
          - "Content-Security-Policy:default-src 'self'; script-src 'self'; object-src 'none'; frame-ancestors 'none'"

  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true

# ============================================================
# Consumers - Keycloak JWKS 連携
# ============================================================
consumers:
  - username: keycloak
    jwt_secrets:
      # H-1 対応: RS256 アルゴリズム使用時は rsa_public_key フィールドが必須（Kong 3.9.1 DBless モード起動要件）
      - algorithm: RS256
        key: "http://keycloak:8080/realms/k1s0"
        # ローカル開発では Keycloak の内部URL を使用
        # JWKS URL: http://keycloak:8080/realms/k1s0/protocol/openid-connect/certs
        # 実運用では keycloak:8080/realms/k1s0/protocol/openid-connect/certs から取得した RSA 公開鍵に差し替えること
        # このプレースホルダーは infra/kong/setup-kong-jwt.sh で自動置換される（C-2 対応）
        # 使用方法: ./infra/kong/setup-kong-jwt.sh
        # Keycloak 起動後に実行すると JWKS から公開鍵を取得して自動更新する
        # PEM 行長は64文字/行が標準（RFC 7468）。Kong はこれを厳密に検証するため、
        # 非標準の行長（80文字等）では "invalid key" エラーとなりworkerがcrashする
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAywC/vol/IN3sHwV5iVgE
          4iaQXZbJGq9EOLHu7Z4w71EVEjFECsaMZHP0tQZgBIbVNNacxkEInDkooGbMcVdb
          bUvmMghbhYAPr+WCUSKOUQVkJKa4b+PGd1RriwyOhmd2edusWxTFH/so7Vur9Hbc
          16h+AxsnXMLM+LsFx3b2dT2RU1JEVzglp/6kcBJK5SiJBikPVL+aay0gZKwML3On
          onZr0q6Lfro1xY1H3LfyEXtXX/Gp72aY6oxzkDNKjFj5cKDg0I4CBZbED7fBM0SR
          lNYK15HYpsvezvyZj1A6gxZYqlTxxGrUcpJ90H/BU+m69O0M2v4YmzFZ6RQihd4T
          +QIDAQAB
          -----END PUBLIC KEY-----
