# H-05 監査対応: dashboard-v1 サービスを Kong 設定から削除する
# 理由: dashboard は外部向け API エンドポイントとして不要であり、
#       意図しない公開エンドポイントの削減によりアタックサーフェスを縮小する

# ============================================================
# Global Plugins
# ============================================================
plugins:
  # Rate Limiting - グローバルデフォルト (service Tier: 500 req/min)
  # サービスレベルの rate-limiting はこのグローバル設定を上書きする（継承はしない）
  - name: rate-limiting
    config:
      minute: ${KONG_RATE_SERVICE_MINUTE}   # デフォルト（service Tier）
      second: ${KONG_RATE_SERVICE_SECOND}   # 秒あたりの上限（バースト制御）
      policy: ${KONG_RATE_REDIS_POLICY}     # Redis で共有状態を管理
      redis:
        host: redis.k1s0-system.svc.cluster.local
        database: 1
        password: ${KONG_REDIS_PASSWORD}
      # HIGH-003 監査対応: fault_tolerant: true に変更し、Redis 一時障害時も API が継続応答できるようにする
      fault_tolerant: true
      hide_client_headers: false            # X-RateLimit-* ヘッダーを返却

  # JWT - Keycloak JWKS 連携
  # H-03監査対応: JWT iss/aud 検証
  # key_claim_name: iss により jwt.claims.iss と consumer.jwt_secrets[].key（Keycloak レルム URL）を照合する。
  # iss が一致しないトークン（他システム発行）は 401 で拒否される。
  # aud 検証は post-function access フェーズで実施する（下記参照）。
  #
  # INFRA-CRIT-001 対応: Kong のグローバル JWT プラグインはルートレベルの `enabled: false` では上書きされない。
  # ヘルスチェックエンドポイント（/healthz, /readyz）を Kong 経由で認証なしにアクセスさせることはできない。
  # 内部監視システム（Prometheus / Kubernetes liveness/readiness probe）からは
  # Kong を経由せず直接サービスの ClusterIP にアクセスすること。
  # 本番環境では Kong にヘルスチェックルートを定義せず、K8s NetworkPolicy で
  # Prometheus / kube-system Pod からの直接アクセスのみを許可する設計とすること。
  - name: jwt
    config:
      uri_param_names: []
      cookie_names: []
      key_claim_name: iss
      claims_to_verify:
        - exp
      header_names:
        - Authorization

  # CORS - クロスオリジンリソース共有
  - name: cors
    config:
      origins:
        - "${KONG_CORS_ORIGINS}"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID
      exposed_headers:
        - X-RateLimit-Limit
        - X-RateLimit-Remaining
        - X-RateLimit-Reset
      credentials: true
      max_age: 3600

  # H-03監査対応: JWT aud 検証 + バックエンドリクエストヘッダー転送
  # access フェーズを使用する理由:
  #   1. kong.service.request.set_header() は access フェーズでのみ upstream へのヘッダー設定が有効
  #      （header_filter フェーズはレスポンス処理であり、upstream リクエストヘッダーは設定不可）
  #   2. post-function の priority は -1000 で JWT プラグイン（priority 1006）より後に実行されるため
  #      access フェーズで authenticated_jwt_token が利用可能
  # Keycloak の openid スコープ（k1s0-api-audience mapper）により全トークンに "k1s0-api" が付与される
  - name: post-function
    config:
      access:
        - |
          local jwt = kong.ctx.shared.authenticated_jwt_token
          if jwt then
            local aud = jwt.claims.aud
            local valid = false
            if type(aud) == "string" then
              valid = (aud == "k1s0-api")
            elseif type(aud) == "table" then
              for _, v in ipairs(aud) do
                if v == "k1s0-api" then valid = true; break end
              end
            end
            if not valid then
              return kong.response.exit(401, { message = "Unauthorized: invalid audience" })
            end
            kong.service.request.set_header("X-User-Id", jwt.claims.sub)
            local roles = ""
            local ra = jwt.claims.realm_access
            if ra and ra.roles then
              roles = table.concat(ra.roles, ",")
            end
            kong.service.request.set_header("X-User-Roles", roles)
            kong.service.request.set_header("X-User-Email", jwt.claims.email or "")
          end

  # Prometheus - メトリクス収集
  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true

  # File Log - アクセスログ出力
  - name: file-log
    config:
      path: /dev/stdout
      reopen: false

  # Response Transformer - レスポンスセキュリティヘッダー付与
  # M-16 監査対応: Content-Security-Policy を追加し、XSS・Clickjacking・オブジェクトインジェクションを防止する。
  # default-src 'self': デフォルトで同一オリジンのみ許可
  # script-src 'self': スクリプトは同一オリジンのみ許可（eval・inline script を禁止）
  # object-src 'none': Flash 等のプラグインコンテンツを全禁止
  # frame-ancestors 'none': 他ドメインからの iframe 埋め込みを全禁止（X-Frame-Options と二重防御）
  - name: response-transformer
    config:
      add:
        headers:
          - X-Content-Type-Options:nosniff
          - X-Frame-Options:DENY
          - Strict-Transport-Security:max-age=31536000; includeSubDomains
          - "Content-Security-Policy:default-src 'self'; script-src 'self'; object-src 'none'; frame-ancestors 'none'"

  # リクエストサイズ制限: DoS攻撃対策として大容量リクエストをブロック
  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes
      require_content_length: false

  # IP Restriction - Admin API 保護（サービス別に適用）
  # NOTE: Admin API (port 8001) への IP 制限は Kubernetes NetworkPolicy と
  # Istio PeerAuthentication で実装する。以下は Proxy 経由で管理系エンドポイントを
  # 公開する場合のテンプレート。環境別の許可 IP は Helm values で管理する。
  # INFRA-005: Admin API への不正アクセスを防止するため、内部ネットワークからのみアクセスを許可する
  # HIGH-008 監査対応確認: allow リストは ${KONG_ADMIN_ALLOWED_IPS:-127.0.0.1} で環境変数化済み。
  # デフォルトは 127.0.0.1 のみ。本番では KONG_ADMIN_ALLOWED_IPS に適切な CIDR を設定すること。
  # envsubst（CI/CD パイプライン）により実行時に展開されるため、設定ファイルへのハードコードは不要。
  #
  # LOW-013 監査対応: 本番環境での ip-restriction グローバル適用に関する警告
  # ⚠️ WARNING: ip-restriction プラグインをグローバル（plugins: の直下）に適用すると、
  # allow リストに含まれない全 IP からのアクセスが Kong Proxy 経由でブロックされる。
  # 本番環境での設定前に以下を必ず確認すること:
  #   1. KONG_ADMIN_ALLOWED_IPS に、全正当クライアントの IP/CIDR が網羅されているか確認する
  #   2. ロードバランサー経由の場合、実クライアント IP が X-Forwarded-For で正しく伝達されるか確認する
  #   3. Kubernetes Pod の CIDR（例: 10.244.0.0/16）を許可しない場合、クラスタ内サービス間通信がブロックされる
  #   4. 変更適用前に staging 環境で十分な動作確認を行うこと
  #   5. deny リストと allow リストは同時に設定しないこと（allow が優先されるが混在は危険）
  - name: ip-restriction
    config:
      # HIGH-005 監査対応: Kong Admin API へのアクセスを localhost のみに制限する。
      # 10.244.0.0/16（Kubernetes Pod CIDR 全体）はクラスタ内の全 Pod からのアクセスを許可するため過剰であった。
      # デフォルトを 127.0.0.1 に変更し、同一ホスト（Pod 内）からのアクセスのみを許可する。
      # 本番環境では KONG_ADMIN_ALLOWED_IPS 環境変数で NetworkPolicy と組み合わせた適切な CIDR を設定すること。
      # NetworkPolicy による保護も infra/kubernetes/network-policies/system.yaml に追加済み（HIGH-005）。
      allow:
        - ${KONG_ADMIN_ALLOWED_IPS:-127.0.0.1}

# ============================================================
# Consumers - Keycloak JWKS 連携 + サービス間認証
# H-01 監査対応: グローバル JWT（iss ベース・Keycloak ユーザー認証）と
# サービス間認証（sub ベース）を Consumer レベルで明示的に分離する。
# saga-v1 / dlq-manager-v1 は内部サービス呼び出し専用であり、
# Keycloak ユーザートークンではなくサービスアカウント JWT で認証する。
# ADR-0057 参照: docs/architecture/adr/0057-kong-jwt-istio-authz-separation.md
# ============================================================
consumers:
  # Keycloak ユーザー認証 Consumer（グローバル JWT プラグイン用）
  - username: keycloak
    jwt_secrets:
      - algorithm: RS256
        key: "${KONG_KEYCLOAK_ISSUER}"

  # サービス間認証専用 Consumer（saga-v1 / dlq-manager-v1 用）
  # key_claim_name: sub によりサービスアカウントの subject クレームで認証する。
  # グローバル JWT プラグインの iss ベース認証と衝突しないよう Consumer を分離する。
  # HIGH-013 監査対応: key を予測困難な UUID に変更する。
  # 旧値 "service-to-service" は文字列として推測・ブルートフォースされるリスクがあるため UUID に置換する。
  - username: service-to-service
    jwt_secrets:
      - algorithm: HS256
        key: "7f4e2b9a-3c8d-4f51-a6e7-2b9d8c5f4e73"
        secret: "${KONG_S2S_JWT_SECRET}"
