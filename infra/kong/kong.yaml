  - name: saga-v1
    url: http://saga-server.k1s0-system.svc.cluster.local:80
    routes:
      - name: saga-v1-sagas
        paths:
          - /api/v1/sagas
        strip_path: false
        methods: [GET, POST]
      - name: saga-v1-workflows
        paths:
          - /api/v1/workflows
        strip_path: false
        methods: [GET, POST]
    plugins:
      - name: rate-limiting
        config:
          minute: ${KONG_RATE_SYSTEM_MINUTE}
          second: ${KONG_RATE_SYSTEM_SECOND}
          policy: ${KONG_RATE_REDIS_POLICY}
          redis:
            host: redis.k1s0-system.svc.cluster.local
            database: 1
            password: ${KONG_REDIS_PASSWORD}
          fault_tolerant: true
      # H-01 監査対応: サービス間認証専用の JWT プラグイン設定
      # グローバル JWT（key_claim_name: iss）との混在を回避するため、
      # Consumer "service-to-service" にスコープを限定する。
      # 外部ユーザーが Keycloak トークンで saga エンドポイントにアクセスするのを防止する。
      - name: jwt
        config:
          secret_is_base64: false
          key_claim_name: sub           # サービス間認証（JWT subject ベース）
      - name: request-transformer
        config:
          add:
            headers:
              - X-Service-Name:saga-server

  - name: dlq-manager-v1
    url: http://dlq-manager.k1s0-system.svc.cluster.local:80
    routes:
      - name: dlq-manager-v1-route
        paths:
          - /api/v1/dlq
        strip_path: false
        methods: [GET, POST, DELETE]
    plugins:
      - name: rate-limiting
        config:
          minute: ${KONG_RATE_SYSTEM_MINUTE}
          second: ${KONG_RATE_SYSTEM_SECOND}
          policy: ${KONG_RATE_REDIS_POLICY}
          redis:
            host: redis.k1s0-system.svc.cluster.local
            database: 1
            password: ${KONG_REDIS_PASSWORD}
          fault_tolerant: true
      # H-01 監査対応: サービス間認証専用の JWT プラグイン設定
      # グローバル JWT（key_claim_name: iss）との混在を回避するため、
      # Consumer "service-to-service" にスコープを限定する。
      # dlq-manager は内部サービスのみが呼び出すエンドポイントであり、
      # 外部ユーザートークンによるアクセスを拒否する。
      - name: jwt
        config:
          secret_is_base64: false
          key_claim_name: sub           # サービス間認証（JWT subject ベース）
      - name: request-transformer
        config:
          add:
            headers:
              - X-Service-Name:dlq-manager

