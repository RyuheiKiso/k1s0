# Kong Declarative Configuration (decK)
# This is the authoritative configuration file synced by CI/CD.
# Split files in plugins/ and services/ are kept as reference documentation.
#
# Environment variables (resolved by envsubst in CI/CD pipeline):
#   KONG_RATE_SYSTEM_MINUTE / KONG_RATE_SYSTEM_SECOND   - system Tier rate limit
#   KONG_RATE_BUSINESS_MINUTE / KONG_RATE_BUSINESS_SECOND - business Tier rate limit
#   KONG_RATE_SERVICE_MINUTE / KONG_RATE_SERVICE_SECOND   - service Tier rate limit (also global default)
#   KONG_RATE_REDIS_POLICY - Redis policy (redis | local)
#   KONG_CORS_ORIGINS     - CORS allowed origins (comma-separated, quoted)
#   KONG_KEYCLOAK_ISSUER  - Keycloak realm issuer URL (JWT consumer key)
# Default values (prod): system=3000/100, business=1000/40, service=500/20, policy=redis
#   CORS: "https://*.k1s0.internal.example.com"
#   Keycloak: "https://auth.k1s0.internal.example.com/realms/k1s0"
# See: docs/architecture/api/APIゲートウェイ設計.md（環境別構成セクション）
#
# rate-limiting 共通設定（各サービスの rate-limiting config から継承できないため個別に記載）:
#   redis:
#     host: redis.k1s0-system.svc.cluster.local
#     database: 1          （デフォルト 0 から変更）
#     password: ${KONG_REDIS_PASSWORD}
#   fault_tolerant: true      （HIGH-003 監査対応: Redis が一時的に不安定になっても全 API が停止しないようフォールト許容に変更）
#                              （旧設定 false はレート制限バイパス防止のため意図的だったが、Redis HA 構成前提でサービス継続性を優先する）
_format_version: "3.0"

services:
  # ============================================================
  # system Tier (rate-limiting: 3000/min, 100/sec)
  # ============================================================
  - name: auth-v1
    url: http://auth-server.k1s0-system.svc.cluster.local:80
    plugins:
      - name: rate-limiting
        config:
          minute: ${KONG_RATE_SYSTEM_MINUTE}
          second: ${KONG_RATE_SYSTEM_SECOND}
          policy: ${KONG_RATE_REDIS_POLICY}
          redis:
            host: redis.k1s0-system.svc.cluster.local
            database: 1
            password: ${KONG_REDIS_PASSWORD}
          # HIGH-003 監査対応: fault_tolerant: true に変更し、Redis 一時障害時も API が継続応答できるようにする
          # Redis HA（Sentinel/Cluster）が前提だが、障害時のサービス継続性を優先する設計に変更する
          # レート制限がバイパスされるリスクはあるが、全 API 停止よりも可用性を重視する
          fault_tolerant: true
    routes:
      - name: auth-v1-route
        paths:
          - /api/v1/auth
        strip_path: false
      - name: auth-v1-login
        paths:
          - /api/v1/auth/login
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 30                  # ブルートフォース防止（REST-API設計.md 参照）
              policy: ${KONG_RATE_REDIS_POLICY}
              redis:
                host: redis.k1s0-system.svc.cluster.local
                database: 1
                password: ${KONG_REDIS_PASSWORD}
              fault_tolerant: true
      # CRIT-09: dev の auth-rust が処理する /users, /audit を prod にも追加
      - name: auth-v1-users
        paths:
          - /api/v1/users
        strip_path: false
      - name: auth-v1-audit
        paths:
          - /api/v1/audit
        strip_path: false

