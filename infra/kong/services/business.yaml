# business Tier のサービス定義
# Tier別レート制限: business=1000/min（グローバル500/minをサービスレベルで上書き）
services:
  # --- タスク管理 ---
  - name: project-master-v1
    url: http://project-master-rust.k1s0-business.svc.cluster.local:80
    plugins:
      - name: rate-limiting
        config:
          minute: 1000
          second: 40
          policy: redis
          redis:
            host: redis.k1s0-system.svc.cluster.local
            port: 6379
            database: 1
          # Redis 障害時もレート制限を強制する（fault_tolerant: false）。DDoS 耐性維持のため設計意図として false が必須
          fault_tolerant: false
          hide_client_headers: false
    routes:
      - name: project-master-v1-route
        paths:
          - /api/v1/taskmanagement/project-types
          - /api/v1/taskmanagement/status-definitions
          - /api/v1/taskmanagement/tenant-extensions
        strip_path: false

