# CoreDNS は kubeadm 標準で配置されるが、k1s0 では以下のカスタマイズを上書きする:
#   - cluster.local TTL を短く（30s）して migration / upgrade 時の DNS スティック回避
#   - Pod レベルの DNS キャッシュは NodeLocal DNSCache を併用（後段 plan 03-XX）
#   - k1s0.internal をローカル zone として宣言（SPIFFE trust domain と整合）
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - corefile-configmap.yaml
