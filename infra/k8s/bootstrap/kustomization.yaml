# =============================================================================
# infra/k8s/bootstrap — kubeadm 直後に必要な最小 stack
#
# kubeadm-init-config.yaml は kubeadm CLI 専用（`kubeadm init --config <file>`）で
# kubectl apply の対象ではないため、本 kustomization の resources から外す。
#
# 適用順:
#   0. kubeadm init --config kubeadm-init-config.yaml （手動 / ops/scripts/...）
#   1. cilium/      — CNI（kube-proxy 不在の状態を解消）
#   2. coredns/     — Corefile を k1s0 zone 対応に書き換え
#   3. cert-manager-crd/ — CRD のみ先行 install（本体は infra/security/cert-manager/）
#   4. cluster-api.yaml — Cluster API + KubeadmControlPlane（CAPI 経由 cluster 拡張時）
#
# Argo CD は CRD 揃った後でないと sync できないため、本 stage は
# ops/scripts/bootstrap-cluster.sh が `kubectl apply -k` で同期適用する。
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cluster-api.yaml
  - cilium
  - coredns
  - cert-manager-crd
