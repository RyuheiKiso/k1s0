# k1s0 production cluster の namespace 定義（17 layer 規約、IMP-DEV-POL-006 と整合）。
# Pod Security Standards は restricted を既定、特権が必要な infra 系（istio-system 等）は
# baseline / privileged に上書きする。
---
# tier 別 namespace（アプリ層）
apiVersion: v1
kind: Namespace
metadata:
  name: tier1-facade
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    k1s0.io/tier: tier1
    istio.io/dataplane-mode: ambient
---
apiVersion: v1
kind: Namespace
metadata:
  name: tier2-services
  labels:
    pod-security.kubernetes.io/enforce: restricted
    k1s0.io/tier: tier2
    istio.io/dataplane-mode: ambient
---
apiVersion: v1
kind: Namespace
metadata:
  name: tier3-bff
  labels:
    pod-security.kubernetes.io/enforce: restricted
    k1s0.io/tier: tier3
    istio.io/dataplane-mode: ambient
---
# infra 系 namespace（17 layer の番号順）
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
