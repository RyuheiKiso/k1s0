# k1s0 production StorageClass 定義。
# 環境別の CSI provisioner（vSphere CSI / AWS EBS / GCP PD / Azure Disk / 等）は
# infra/environments/<env>/k8s-overlay/storage-classes.yaml で provisioner を上書きする。
#
# 本ファイルは provisioner プレースホルダで型を定義。
---
# 既定 StorageClass（ReadWriteOnce ブロック、SSD 想定）
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: k1s0-default
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: PLACEHOLDER_csi_provisioner
parameters:
  type: ssd
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
# 高 IOPS（DB / etcd）
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: k1s0-high-iops
provisioner: PLACEHOLDER_csi_provisioner
parameters:
  type: io2
  iopsPerGB: "50"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
# RWX（共有ファイルシステム、CephFS / NFS / EFS 等）
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: k1s0-shared
provisioner: PLACEHOLDER_rwx_csi_provisioner
parameters:
  type: shared
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
mountOptions:
  - hard
  - intr
---
# Backup 用（低速 / 大容量）
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: k1s0-backup
provisioner: PLACEHOLDER_csi_provisioner
parameters:
  type: hdd
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
