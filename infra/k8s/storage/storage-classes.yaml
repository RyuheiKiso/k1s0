# =============================================================================
# k1s0 production StorageClass 定義（ADR-STOR-001 / Longhorn 前提）。
#
# 設計正典:
#   docs/05_実装/00_ディレクトリ設計/50_infraレイアウト/02_k8sブートストラップ.md:104
#     - 2 種固定: longhorn-retain（Prod 永続）/ longhorn-delete（一時/テスト/キャッシュ）
#
# 用途:
#   longhorn-retain: PG/Kafka/MinIO/Valkey 等の State store。PVC delete 時にも
#                    PV を保持し、誤削除からの復旧経路を残す。
#   longhorn-delete: テスト Pod / dev 環境 / キャッシュ用。PVC delete で PV も即削除。
# =============================================================================
---
# 既定 StorageClass: longhorn-retain（Prod 永続用）
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-retain
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "2880"
  fromBackup: ""
  fsType: ext4
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
# 一時/テスト用 StorageClass: longhorn-delete
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-delete
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "2"
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: ext4
reclaimPolicy: Delete
volumeBindingMode: Immediate
allowVolumeExpansion: true
