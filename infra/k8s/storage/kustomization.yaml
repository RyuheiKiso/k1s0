# =============================================================================
# infra/k8s/storage/kustomization.yaml
#
# 2 種 StorageClass（longhorn-retain / longhorn-delete）を Longhorn 配下に
# 投入する base。Longhorn 本体（CSI driver、UI、backup target）は longhorn/
# サブディレクトリで Helm values が管理される。
#
# 関連設計:
#   docs/05_実装/00_ディレクトリ設計/50_infraレイアウト/02_k8sブートストラップ.md:104
#     - 2 種固定: longhorn-retain（Prod 永続）/ longhorn-delete（一時/テスト/キャッシュ）
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - storage-classes.yaml
  - longhorn
