# Calico CNI（ADR-NET-001、prod CNI provider）の Helm values。
# helm repo add projectcalico https://docs.tigera.io/calico/charts
# helm upgrade --install calico projectcalico/tigera-operator -n tigera-operator -f calico-values.yaml --version v3.29.1
#
# Pod CIDR 192.168.0.0/16 と整合、Service CIDR 10.96.0.0/12。
# kind dev では kindnet を使うため本 values は prod のみ参照。

installation:
  kubernetesProvider: ""
  cni:
    type: Calico
  calicoNetwork:
    bgp: Enabled
    ipPools:
      - cidr: 192.168.0.0/16
        encapsulation: VXLAN
        natOutgoing: Enabled
        nodeSelector: all()
    nodeAddressAutodetectionV4:
      kubernetes: NodeInternalIP
  registry: quay.io/
  imagePath: calico
  controlPlaneTolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/control-plane
      operator: Exists

# Tigera Operator 自体のリソース要求
tigeraOperator:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
