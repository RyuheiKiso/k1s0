# L-16 監査対応: この ConfigMap は将来の個別サービスロール分割（ADR-0045）に向けた
# リファレンス設定として保持する。現在の実運用は infra/terraform/modules/vault/auth.tf の
# vault_kubernetes_auth_backend_role.system（単一ロール）が権威情報であり、
# bound_service_account_names に "dlq-manager" が含まれていることで認証が機能している。
# Phase 5 で個別ロール実装時にこの ConfigMap の内容を Terraform に反映する予定。
apiVersion: v1
kind: ConfigMap
metadata:
  name: dlq-manager-vault-auth
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: dlq-manager
    app.kubernetes.io/component: vault-auth
data:
  vault-auth-config.json: |
    {
      "role_name": "dlq-manager",
      "bound_service_account_names": ["dlq-manager"],
      "bound_service_account_namespaces": ["k1s0-system"],
      "token_policies": ["dlq-manager"],
      "token_ttl": "3600",
      "token_max_ttl": "86400"
    }
