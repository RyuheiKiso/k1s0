apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # INFRA-003 監査対応: ai-gateway サービスの SecretProviderClass を追加。
  # ai-gateway は experimental-ai プロファイルの試験運用サービスだが、
  # 将来の本番稼働に備えて Vault シークレット定義を整備する。
  name: ai-gateway-server-vault-secrets
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: ai-gateway-server
    tier: system
    profile: experimental-ai
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault.svc.cluster.local:8200"
    # B-HIGH-01 監査対応: Vault Kubernetes Auth ロール名を Terraform 定義と統一
    roleName: "ai-gateway-server"
    objects: |
      - objectName: "api-key"
        secretPath: "secret/data/k1s0/system/ai-gateway/api-key"
        secretKey: "key"
      - objectName: "db-password"
        secretPath: "secret/data/k1s0/system/ai-gateway/database"
        secretKey: "password"
      - objectName: "kafka-sasl-username"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "username"
      - objectName: "kafka-sasl-password"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "password"
