apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # graphql-gateway が Vault から取得するシークレット定義。
  # infra/vault/policies/graphql-gateway.hcl の権限ポリシーに対応する。
  name: graphql-gateway-server-vault-secrets
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: graphql-gateway-server
    tier: system
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault.svc.cluster.local:8200"
    # graphql-gateway 専用の Vault ロールを使用（ADR-0045: per-service role 分離）
    roleName: "graphql-gateway-server"
    objects: |
      - objectName: "api-key"
        secretPath: "secret/data/k1s0/system/graphql-gateway/api-key"
        secretKey: "key"
      - objectName: "db-password"
        secretPath: "secret/data/k1s0/system/database"
        secretKey: "password"
      - objectName: "kafka-sasl-username"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "username"
      - objectName: "kafka-sasl-password"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "password"
