apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # INFRA-003 監査対応: ai-agent サービスの SecretProviderClass を追加。
  # ai-agent は experimental-ai プロファイルの試験運用サービスだが、
  # 将来の本番稼働に備えて Vault シークレット定義を整備する。
  name: ai-agent-server-vault-secrets
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: ai-agent-server
    tier: system
    profile: experimental-ai
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault.svc.cluster.local:8200"
    # HIGH-004 監査対応: Vault Kubernetes Auth ロール名を Terraform auth.tf の role_name と統一する
    # auth.tf: vault_kubernetes_auth_backend_role.ai_agent { role_name = "ai-agent" }
    # 旧値 "ai-agent-server" は Terraform 定義と不一致のため認証に失敗していた
    roleName: "ai-agent"
    objects: |
      - objectName: "api-key"
        secretPath: "secret/data/k1s0/system/ai-agent/api-key"
        secretKey: "key"
      - objectName: "db-password"
        secretPath: "secret/data/k1s0/system/ai-agent/database"
        secretKey: "password"
      - objectName: "kafka-sasl-username"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "username"
      - objectName: "kafka-sasl-password"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "password"
