apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # K8S-HIGH-003 対応: project-master サービスが Vault から取得するシークレット定義。
  name: project-master-server-vault-secrets
  namespace: k1s0-business
  labels:
    app.kubernetes.io/name: project-master-server
    tier: business
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault.svc.cluster.local:8200"
    # B-HIGH-01 監査対応: Vault Kubernetes Auth ロール名を Terraform 定義と統一
    roleName: "project-master-rust"
    objects: |
      - objectName: "db-password"
        secretPath: "secret/data/k1s0/business/project-master/database"
        secretKey: "password"
      - objectName: "kafka-sasl-username"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "username"
      - objectName: "kafka-sasl-password"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "password"
