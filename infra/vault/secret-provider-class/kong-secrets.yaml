apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # K8S-HIGH-002 対応: Kong が Vault から取得するシークレット定義。
  # kong-db-secret（secretKeyRef）の代替として Vault CSI Driver 経由でシークレットを管理する。
  name: kong-vault-secrets
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: kong
    tier: system
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault.svc.cluster.local:8200"
    # B-HIGH-01 監査対応: Vault Kubernetes Auth ロール名を Terraform 定義と統一
    roleName: "kong"
    objects: |
      - objectName: "db-password"
        secretPath: "secret/data/k1s0/system/kong/database"
        secretKey: "password"
