# ratelimit サーバーの Vault SecretProviderClass（HIGH-13 監査対応）
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # ratelimit サーバーが Vault から取得するシークレット定義。
  name: ratelimit-server-vault-secrets
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: ratelimit-server
    tier: system
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault.svc.cluster.local:8200"
    roleName: "ratelimit-server"
    objects: |
      - objectName: "api-key"
        secretPath: "secret/data/k1s0/system/ratelimit/api-key"
        secretKey: "key"
      - objectName: "db-password"
        secretPath: "secret/data/k1s0/system/ratelimit/database"
        secretKey: "password"
      - objectName: "kafka-sasl-username"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "username"
      - objectName: "kafka-sasl-password"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "password"
