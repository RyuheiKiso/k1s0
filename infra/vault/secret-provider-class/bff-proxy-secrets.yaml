apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # bff-proxy が Vault から取得するシークレット定義。
  # infra/vault/policies/bff-proxy.hcl の権限ポリシーに対応する。
  name: bff-proxy-vault-secrets
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: bff-proxy
    tier: system
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault.svc.cluster.local:8200"
    # bff-proxy 専用の Vault ロールを使用（ADR-0045: per-service role 分離）
    roleName: "bff-proxy"
    objects: |
      - objectName: "api-key"
        secretPath: "secret/data/k1s0/system/bff-proxy/api-key"
        secretKey: "key"
      - objectName: "redis-password"
        secretPath: "secret/data/k1s0/system/redis/session"
        secretKey: "password"
      - objectName: "keycloak-oidc-client-id"
        secretPath: "secret/data/k1s0/system/keycloak/bff-proxy"
        secretKey: "client_id"
      - objectName: "keycloak-oidc-client-secret"
        secretPath: "secret/data/k1s0/system/keycloak/bff-proxy"
        secretKey: "client_secret"
      - objectName: "service-auth-token"
        secretPath: "secret/data/k1s0/system/service-auth/bff-proxy"
        secretKey: "token"
