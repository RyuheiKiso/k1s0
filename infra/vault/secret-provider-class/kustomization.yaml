# K8S-MED-004 監査対応: SecretProviderClass リソースの一元管理
#
# SecretProviderClass (SPC) は Secrets Store CSI Driver が使用する Kubernetes カスタムリソースであり、
# Vault のシークレットパスとマウント設定を定義する。
#
# 現在の本番デプロイは Vault Agent Injector アノテーション（k1s0-common._vault-annotations.tpl）を
# 使用しているが、SPC は Secrets Store CSI Driver への移行に備えた代替シークレット注入手段として維持する。
#
# 適用コマンド（CI/CD または初回セットアップ時）:
#   kubectl apply -k infra/vault/secret-provider-class/
#
# 前提条件:
#   - Secrets Store CSI Driver がクラスタにインストール済みであること
#     helm repo add secrets-store-csi-driver https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
#     helm install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver -n kube-system
#   - Vault CSI プロバイダーがインストール済みであること
#     helm install vault-csi-provider hashicorp/vault --set "csi.enabled=true" -n vault
#
# 注意: SPC を Deployment で使用するには secretProviderClass volumes/volumeMounts の追加が必要。
#       詳細は docs/infrastructure/vault-integration.md を参照すること。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # system tier (29 サービス)
  - activity-secrets.yaml
  - ai-agent-secrets.yaml
  - ai-gateway-secrets.yaml
  - api-registry-secrets.yaml
  - app-registry-secrets.yaml
  - auth-secrets.yaml
  - bff-proxy-secrets.yaml
  - config-secrets.yaml
  - dlq-manager-secrets.yaml
  - event-monitor-secrets.yaml
  - event-store-secrets.yaml
  - featureflag-secrets.yaml
  - file-secrets.yaml
  - graphql-gateway-secrets.yaml
  - kong-secrets.yaml
  - master-maintenance-secrets.yaml
  - navigation-secrets.yaml
  - notification-secrets.yaml
  - policy-secrets.yaml
  - quota-secrets.yaml
  - ratelimit-secrets.yaml
  - rule-engine-secrets.yaml
  - saga-secrets.yaml
  - scheduler-secrets.yaml
  - search-secrets.yaml
  - service-catalog-secrets.yaml
  - session-secrets.yaml
  - tenant-secrets.yaml
  - workflow-secrets.yaml
  # business tier (1 サービス)
  - project-master-secrets.yaml
  # service tier (3 サービス)
  - board-secrets.yaml
  - task-secrets.yaml
