# service-catalog サーバーの Vault SecretProviderClass（HIGH-13 監査対応）
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # service-catalog サーバーが Vault から取得するシークレット定義。
  name: service-catalog-server-vault-secrets
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: service-catalog-server
    tier: system
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault.svc.cluster.local:8200"
    # B-HIGH-01 監査対応: Vault Kubernetes Auth ロール名を Terraform 定義と統一
    roleName: "service-catalog"
    objects: |
      - objectName: "api-key"
        secretPath: "secret/data/k1s0/system/service-catalog/api-key"
        secretKey: "key"
      - objectName: "db-password"
        secretPath: "secret/data/k1s0/system/service-catalog/database"
        secretKey: "password"
      - objectName: "kafka-sasl-username"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "username"
      - objectName: "kafka-sasl-password"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "password"
