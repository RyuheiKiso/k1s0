apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # K8S-HIGH-003 対応: activity サービスが Vault から取得するシークレット定義。
  name: activity-server-vault-secrets
  namespace: k1s0-service
  labels:
    app.kubernetes.io/name: activity-server
    tier: service
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault.svc.cluster.local:8200"
    # B-HIGH-01 監査対応: Vault Kubernetes Auth ロール名を Terraform 定義と統一
    roleName: "activity-rust"
    objects: |
      - objectName: "db-password"
        secretPath: "secret/data/k1s0/service/activity/database"
        secretKey: "password"
      - objectName: "kafka-sasl-username"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "username"
      - objectName: "kafka-sasl-password"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "password"
