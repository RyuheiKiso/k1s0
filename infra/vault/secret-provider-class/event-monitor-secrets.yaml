# event-monitor サーバーの Vault SecretProviderClass（HIGH-13 監査対応）
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # event-monitor サーバーが Vault から取得するシークレット定義。
  name: event-monitor-server-vault-secrets
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: event-monitor-server
    tier: system
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault.svc.cluster.local:8200"
    # B-HIGH-01 監査対応: Vault Kubernetes Auth ロール名を Terraform 定義と統一
    roleName: "event-monitor-rust"
    objects: |
      - objectName: "api-key"
        secretPath: "secret/data/k1s0/system/event-monitor/api-key"
        secretKey: "key"
      - objectName: "db-password"
        secretPath: "secret/data/k1s0/system/event-monitor/database"
        secretKey: "password"
      - objectName: "kafka-sasl-username"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "username"
      - objectName: "kafka-sasl-password"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "password"
