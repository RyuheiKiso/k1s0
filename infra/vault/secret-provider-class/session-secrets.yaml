apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # session サーバーが Vault から取得するシークレット定義。
  # M-22 監査対応: 全サービス分の SecretProviderClass を生成する。
  name: session-server-vault-secrets
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: session-server
    tier: system
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault.svc.cluster.local:8200"
    # B-HIGH-01 監査対応: Vault Kubernetes Auth ロール名を Terraform 定義と統一
    roleName: "session-rust"
    objects: |
      - objectName: "api-key"
        secretPath: "secret/data/k1s0/system/session/api-key"
        secretKey: "key"
      - objectName: "db-password"
        secretPath: "secret/data/k1s0/system/session/database"
        secretKey: "password"
      - objectName: "redis-password"
        secretPath: "secret/data/k1s0/system/session/redis"
        secretKey: "password"
      - objectName: "kafka-sasl-username"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "username"
      - objectName: "kafka-sasl-password"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "password"
