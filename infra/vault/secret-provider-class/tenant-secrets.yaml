apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # tenant サーバーが Vault から取得するシークレット定義。
  # M-22 監査対応: 全サービス分の SecretProviderClass を生成する。
  name: tenant-server-vault-secrets
  namespace: k1s0-system
  labels:
    app.kubernetes.io/name: tenant-server
    tier: system
spec:
  provider: vault
  parameters:
    vaultAddress: "https://vault.vault.svc.cluster.local:8200"
    roleName: "tenant-server"
    objects: |
      - objectName: "api-key"
        secretPath: "secret/data/k1s0/system/tenant/api-key"
        secretKey: "key"
      - objectName: "db-password"
        secretPath: "secret/data/k1s0/system/tenant/database"
        secretKey: "password"
      - objectName: "kafka-sasl-username"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "username"
      - objectName: "kafka-sasl-password"
        secretPath: "secret/data/k1s0/system/kafka/sasl"
        secretKey: "password"
