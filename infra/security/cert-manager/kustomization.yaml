# =============================================================================
# infra/security/cert-manager/kustomization.yaml
#
# cert-manager の ClusterIssuer（Let's Encrypt prod / staging）を上位 overlay から
# 「ディレクトリ参照」可能にするための kustomize base。
#
# cert-manager 本体は Helm values（同階層 `values.yaml`）で別途デプロイされる前提。
# dev overlay は `patches/` で `letsencrypt-staging` を primary に切替える。
#
# 関連設計:
#   docs/02_構想設計/adr/ADR-SEC-001-keycloak.md
#   docs/02_構想設計/adr/ADR-SEC-002-openbao.md
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cluster-issuer.yaml
  - csi-driver
  - approvers
