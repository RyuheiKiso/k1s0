# OCI Registry (ローカル開発用)
# ADR-POL-002 (local-stack SoT) に基づき up.sh apply_registry から呼ばれる正規マニフェスト。
# 元設計の emptyDir を PVC に変更（image push 後 pod 再起動で消える事故を防ぐ。
# kind cluster 破棄時は image 全消失＝再 push 前提）。
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: k1s0-platform-tools
  labels:
    app: registry
    k1s0.io/component: registry
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: k1s0-platform-tools
  labels:
    app: registry
    k1s0.io/component: registry
spec:
  replicas: 1
  strategy:
    type: Recreate  # PVC RWO のため Recreate
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
        k1s0.io/component: registry
    spec:
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: registry
          image: registry:2.8.3
          imagePullPolicy: IfNotPresent
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
            - name: REGISTRY_HTTP_ADDR
              value: 0.0.0.0:5000
          ports:
            - name: http
              containerPort: 5000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
