# OCI Registry Service (ローカル開発用)
# ADR-POL-002: up.sh apply_registry から呼ばれる正規 Service マニフェスト。
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: k1s0-platform-tools
  labels:
    app: registry
    k1s0.io/component: registry
spec:
  type: ClusterIP
  selector:
    app: registry
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
