# cargo-deny 設定ファイル
# https://embarkstudios.github.io/cargo-deny/
# cargo deny check コマンドで Rust 依存関係の脆弱性・ライセンス・重複クレートを一括チェックする

[advisories]
# HIGH-005 監査対応: 脆弱性無視リストの唯一の管理場所は scripts/security/advisory-ignore-list.txt
# このセクションは advisory-ignore-list.txt と完全に一致している必要がある。
# CI の整合性チェック（security.yaml config-validation: advisory-sync-check ステップ）が
# 両ファイルの同期を自動検証する。
#
# ⚠️ Advisory の追加・削除は advisory-ignore-list.txt のみで行い、
#    このファイル（deny.toml）は advisory-ignore-list.txt に合わせて同期すること。
ignore = [
    # RUSTSEC-2025-0111: tokio-tar (testcontainers 経由、テスト専用依存)
    # テスト実行時のみ利用されるため本番環境への影響はない
    # LOW-004 監査対応: 解消目標日を明記する
    # 解消目標: 2026-06-30（四半期レビューで再評価、testcontainers アップデートで解消予定）
    # 追跡: https://rustsec.org/advisories/RUSTSEC-2025-0111.html
    "RUSTSEC-2025-0111",
]

[licenses]
# MIT/Apache-2.0 系のオープンソースライセンスを許可する
# GPL 系および商用制限ライセンスは明示的に許可しない
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]
