# =============================================================================
# k1s0 pre-commit 設定
#
# 設計: plan/02_開発環境整備/05_pre-commit_hooks有効化.md
# 関連 ID: IMP-CI-008（pre-commit / CI 二重防御）
#
# 配置:
#   - 自作 hook: tools/git-hooks/*.py / install.sh
#   - 既存スクリプト: tools/_link_check.py, tools/_export_svg.py
#
# 利用:
#   pip install pre-commit
#   tools/git-hooks/install.sh           # hook 配置
#   tools/git-hooks/install.sh --run-all # 配置 + 全ファイル走査
#   pre-commit run --files <file>...     # 個別実行
#   pre-commit run --all-files           # CI 用全件走査
# =============================================================================

# 全 hook 共通の最低 pre-commit version
minimum_pre_commit_version: "3.5.0"

# CI からも実行する場合の既定設定
default_install_hook_types: [pre-commit, commit-msg, pre-push]
default_stages: [pre-commit]

# 個別 hook が遅い場合は `stages: [manual]` に落として、CI のみで実行する戦略も可能
fail_fast: false

repos:
  # ---------------------------------------------------------------------------
  # 標準 hook 群（pre-commit-hooks）: 軽量で全リポジトリ向け
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # markdown の意図的な末尾 2 spaces（改行）は許容
        args: [--markdown-linebreak-ext=md]
        # protoc-gen-doc 生成物は ToC リスト区切りに「whitespace のみの行」を出力する。
        # trailing-whitespace はその行を空行に潰すが、buf generate が CI で同行を再生成するため
        # grpc-docs-check と相互に競合する。protoc 生成物は buf lint 側で品質担保するため除外。
        exclude: |
          (?x)^(
              docs/02_構想設計/02_tier1設計/grpc-reference/.*
          )$
      - id: end-of-file-fixer
        # 同上（grpc-reference/ は buf generate の生成物として常に EOF 形が固定される）
        exclude: |
          (?x)^(
              docs/02_構想設計/02_tier1設計/grpc-reference/.*
          )$
      - id: check-yaml
        # multi-document yaml を許容（Helm chart / k8s manifest で使われる）
        args: [--allow-multiple-documents]
        exclude: |
          (?x)^(
              tools/local-stack/manifests/.*\.yaml|
              .*helm.*templates/.*\.yaml
          )$
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: \.bat$

  # ---------------------------------------------------------------------------
  # markdownlint-cli2: docs/ の markdown 構文チェック
  # ---------------------------------------------------------------------------
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.13.0
    hooks:
      - id: markdownlint-cli2
        files: \.(md|markdown)$
        # docs 配下の規約を厳密にし、plan/ examples/ は緩める方針
        args: [--config, .markdownlint-cli2.jsonc]

  # ---------------------------------------------------------------------------
  # gitleaks: 秘密情報検出
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: [--config=.gitleaks.toml]

  # ---------------------------------------------------------------------------
  # shellcheck: シェルスクリプト静的解析
  # ---------------------------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning, --shell=bash]

  # ---------------------------------------------------------------------------
  # commitlint: コミットメッセージを Conventional Commits で検証（commit-msg stage）
  # 設定: commitlint.config.js / 詳細: CONTRIBUTING.md
  # ---------------------------------------------------------------------------
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.20.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - "@commitlint/config-conventional@19"

  # ---------------------------------------------------------------------------
  # 自作 hook: src/ 配下の日本語ヘッダコメント必須
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: japanese-header-guard
        name: src/ 配下のコードに日本語ヘッダコメントが存在するか
        entry: python3 tools/git-hooks/japanese-header-guard.py
        language: system
        # identify の tag 名（types_or）依存を避け、files 正規表現で対象拡張子を明示する。
        # cs / ts / tsx / jsx の identify tag 名は環境によって揺れる可能性があるため。
        files: ^src/.*\.(go|rs|cs|ts|tsx|js|jsx|proto|py|sh|bash)$
        # 自動生成パスは除外
        exclude: |
          (?x)^(
              src/.*/generated/.*|
              src/.*/.*\.pb\.go$|
              src/.*/.*\.pb\.cc$|
              src/.*/_generated/.*
          )$

      - id: file-length-guard
        name: 1 ファイル 500 行以内（src / infra / deploy / tools / tests）
        entry: python3 tools/git-hooks/file-length-guard.py --limit 500
        language: system
        types: [text]
        # docs / plan / examples / .github / third_party / 自動生成 / lock は除外
        exclude: |
          (?x)^(
              docs/|
              plan/|
              examples/|
              \.github/|
              third_party/|
              .*\.lock$|
              .*\.sum$|
              .*lock\.json$|
              .*lock\.ya?ml$
          )

      - id: link-check
        name: docs 配下の md 内部リンク検証
        entry: python3 tools/git-hooks/link-check-wrapper.py
        language: system
        types: [markdown]
        pass_filenames: true
        # link-check-wrapper.py が「docs/ 配下に変更がある場合のみ全件走査」を判定する
        require_serial: true

      - id: drawio-svg-staleness
        name: drawio に対応する SVG が同時に更新されているか
        entry: tools/git-hooks/drawio-svg-staleness.sh
        language: system
        files: \.drawio$
        # SVG 自動生成はせず、stale の場合に reject する方式（plan 02-05 主作業 5）

# 補足: 個別 hook を一時無効化したい場合は `SKIP=hook-id git commit` で skip 可能。
# CI 上では `pre-commit run --all-files` を再実行し、ローカル skip を許さない（02-07 で配線）。
