# .pre-commit-config.yaml
# モノレポのワークスペース構造に対応した pre-commit 設定
repos:
  # YAML/JSON 構文バリデーション（破損ファイルの早期検出）
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # YAML ファイルの構文チェック（マルチドキュメント対応）
      - id: check-yaml
        args: ['--allow-multiple-documents']
      # JSON ファイルの構文チェック
      - id: check-json
      # ファイル末尾の改行を統一
      - id: end-of-file-fixer
      # 行末の不要な空白を除去
      - id: trailing-whitespace

  # シークレット検出フック（gitleaks）
  # コミット時にシークレット（APIキー、パスワード等）の混入を防止する
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      # Go の静的解析（go.work ワークスペース全体を対象）
      - id: go-lint
        name: Go Lint
        entry: bash -c 'golangci-lint run ./...'
        language: system
        files: '\.go$'
        pass_filenames: false

      # Rust フォーマットチェック（regions/system ワークスペース）
      - id: rust-fmt-system
        name: Rust Format Check (system)
        entry: cargo fmt --manifest-path regions/system/Cargo.toml --all -- --check
        language: system
        files: 'regions/system/.*\.rs$'
        pass_filenames: false

      # Rust フォーマットチェック（CLI ワークスペース）
      - id: rust-fmt-cli
        name: Rust Format Check (CLI)
        entry: cargo fmt --manifest-path CLI/Cargo.toml --all -- --check
        language: system
        files: 'CLI/.*\.rs$'
        pass_filenames: false

      # Rust Clippy（regions/system ワークスペース）— experimental パッケージを除外
      - id: rust-clippy-system
        name: Rust Clippy (system)
        entry: bash -c 'excludes=$(bash scripts/list-experimental-excludes.sh) && cargo clippy --manifest-path regions/system/Cargo.toml --workspace $excludes --all-targets -- -D warnings'
        language: system
        files: 'regions/system/.*\.rs$'
        pass_filenames: false

      # Rust Clippy（CLI ワークスペース）
      - id: rust-clippy-cli
        name: Rust Clippy (CLI)
        entry: cargo clippy --manifest-path CLI/Cargo.toml --workspace --all-targets -- -D warnings
        language: system
        files: 'CLI/.*\.rs$'
        pass_filenames: false

      # TypeScript の依存インストール（package-lock.json 変更時のみ npm install を実行する）
      # L-05 対応: 毎回 npm install が走る問題を修正。
      # package-lock.json が変更されたときのみ実行し、node_modules が存在する場合はスキップする。
      # TypeScript/JSON ファイルのみ変更した場合はこのフックは実行されない。
      - id: ts-npm-install
        name: TypeScript npm install（変更時のみ）
        # node_modules が存在する場合はスキップし、package-lock.json 変更時のみ実行する
        entry: bash -c '
          for dir in $(find . -name "package.json" -not -path "*/node_modules/*" -not -path "*/.git/*" -exec dirname {} \;); do
            if [ ! -d "$dir/node_modules" ]; then
              echo "node_modules が存在しないため npm install を実行: $dir"
              (cd "$dir" && npm install --prefer-offline --no-audit --no-fund)
            fi
          done'
        language: system
        pass_filenames: false
        files: 'package-lock\.json$'

      # TypeScript ESLint（変更されたファイルのみ対象）
      - id: ts-lint
        name: TypeScript Lint
        entry: npx eslint
        language: system
        files: '\.[tj]sx?$'
        exclude: 'node_modules/'

      # Prettier フォーマットチェック（変更されたファイルのみ対象）
      - id: prettier
        name: Prettier
        entry: npx prettier --check
        language: system
        files: '\.(ts|tsx|js|jsx|json|yaml|yml)$'
        exclude: 'node_modules/|\.lock$'

      # Dart 静的解析（Flutter / pure Dart パッケージの両方に対応）
      - id: dart-analyze
        name: Dart Analyze
        entry: dart analyze --fatal-infos
        language: system
        files: '\.dart$'
        pass_filenames: false

      # Dart フォーマットチェック
      - id: dart-format
        name: Dart Format Check
        entry: dart format --set-exit-if-changed
        language: system
        files: '\.dart$'
        pass_filenames: false
