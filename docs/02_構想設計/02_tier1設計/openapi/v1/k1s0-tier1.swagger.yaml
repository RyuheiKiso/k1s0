        type: integer
        format: int32
        title: HTTP ステータス相当（成功 200、失敗時は詳細を Status に載せる）
    title: Invoke 応答
  v1K1s0ErrorCategory:
    type: string
    enum:
      - K1S0_ERROR_UNSPECIFIED
      - K1S0_ERROR_INVALID_ARGUMENT
      - K1S0_ERROR_UNAUTHENTICATED
      - K1S0_ERROR_PERMISSION_DENIED
      - K1S0_ERROR_NOT_FOUND
      - K1S0_ERROR_CONFLICT
      - K1S0_ERROR_RESOURCE_EXHAUSTED
      - K1S0_ERROR_UNAVAILABLE
      - K1S0_ERROR_INTERNAL
      - K1S0_ERROR_DEADLINE_EXCEEDED
    default: K1S0_ERROR_UNSPECIFIED
    description: |-
      - K1S0_ERROR_UNSPECIFIED: 未指定（既定値、クライアントは UNKNOWN として扱う）
       - K1S0_ERROR_INVALID_ARGUMENT: 呼出側入力誤り（リトライ不可）
       - K1S0_ERROR_UNAUTHENTICATED: JWT 不在・署名不正・期限切れ
       - K1S0_ERROR_PERMISSION_DENIED: RBAC 拒否・テナント越境・allowlist 外
       - K1S0_ERROR_NOT_FOUND: キー / バージョン / リソース未存在
       - K1S0_ERROR_CONFLICT: ETag 不一致・冪等性キー衝突
       - K1S0_ERROR_RESOURCE_EXHAUSTED: レート制限・クォータ超過（retry_after_ms 必須）
       - K1S0_ERROR_UNAVAILABLE: 一時的バックエンド不能（retry_after_ms 必須、指数バックオフ）
       - K1S0_ERROR_INTERNAL: tier1 バグ・未分類（Audit に Severity 2 で記録）
       - K1S0_ERROR_DEADLINE_EXCEEDED: gRPC Deadline 超過（副作用未発生扱い、再試行可）
    title: |-
      機械可読なエラーカテゴリ。docs `00_tier1_API共通規約.md` の 8 カテゴリ +
      UNSPECIFIED + DEADLINE_EXCEEDED の計 10 値。
      新規追加は MINOR 版で許可、既存値の削除・意味変更は禁止。
      未知カテゴリを受け取った tier2/tier3 SDK は UNSPECIFIED として扱う。
