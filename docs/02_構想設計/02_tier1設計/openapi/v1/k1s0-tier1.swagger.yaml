      parent_span_id:
        type: string
        title: 親 Span ID（ルート Span は空文字列）
      name:
        type: string
        title: 'Span 名（操作名、例: HTTP GET /api/v1/foo）'
      start_time:
        type: string
        format: date-time
        title: 開始時刻
      end_time:
        type: string
        format: date-time
        title: 終了時刻
      attributes:
        type: object
        additionalProperties:
          type: string
        title: 属性（http.method / db.system 等の OTel semantic conventions）
    title: 単一 Span
  v1StartRequest:
    type: object
    properties:
      workflow_type:
        type: string
        title: ワークフロー種別（tier2 で登録されたコード名）
      workflow_id:
        type: string
        title: 実行 ID（指定なければ tier1 が UUID を生成）
      input:
        type: string
        format: byte
        title: 初期入力（任意 bytes、エンコーディングは tier2 側合意）
      idempotent:
        type: boolean
        title: 冪等性（同一 workflow_id の重複開始は既存実行を返す）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
      backend:
        $ref: '#/definitions/v1WorkflowBackend'
        title: バックエンド hint（BACKEND_AUTO で tier1 が自動選択）。
      idempotency_key:
        type: string
        title: |-
          冪等性キー（共通規約 §「冪等性と再試行」: 24h TTL の dedup）
          同一キーでの再試行は副作用を重複させず初回 StartResponse を返す
    title: Start リクエスト
  v1StartResponse:
    type: object
    properties:
      workflow_id:
        type: string
        title: ワークフロー ID（リクエストの workflow_id か、tier1 採番の UUID）
      run_id:
        type: string
        title: 実行 ID（リトライや継続実行時に新しい値が割当）
      backend:
        $ref: '#/definitions/v1WorkflowBackend'
        title: 実際に選択された backend（AUTO で起動された場合の解決結果が入る）。
    title: Start 応答
  v1StringResponse:
    type: object
    properties:
      value:
        type: string
        title: 評価値
      metadata:
        $ref: '#/definitions/v1FlagMetadata'
        title: メタ情報
    title: String 評価応答
  v1TargetingRule:
    type: object
    properties:
      rule_id:
        type: string
        title: ルール ID（監査用、tenant+flag 内で一意）
      json_logic_expr:
        type: string
        format: byte
        title: JsonLogic 式（bytes で保持、登録時に schema validator 通過必須）
      variant_if_match:
        type: string
        title: 評価成立時に返す variant 名
      fractional:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1FractionalSplit'
        title: Fractional split（A/B テスト用、weights 合計 100 必須）
    title: |-
      targeting ルール（JsonLogic 互換、flagd 仕様準拠）。
      例: { "if": [ { "==": [{ "var": "userRole" }, "admin"] }, "blue-variant", "red-variant" ] }
  v1TenantContext:
    type: object
    properties:
      tenant_id:
        type: string
        title: テナント ID（UUID v4 文字列、tier1 が JWT クレームと突き合わせて検証）
      subject:
        type: string
        title: 呼出元の主体（workload_id または user_id、SPIFFE ID 互換）
      correlation_id:
        type: string
        title: 相関 ID（OTel traceparent と紐付けて全 tier 横断トレース）
    title: |-
      呼出元テナントを特定する識別子。gRPC メタデータヘッダ
      （x-tenant-id / x-correlation-id / x-subject）と Request 側 message の
      `context` フィールドの両方で伝搬し、interceptor で整合性を検証する。
  v1TerminateRequest:
    type: object
    properties:
      workflow_id:
        type: string
        title: 対象ワークフロー ID
      reason:
        type: string
        title: 強制終了理由（監査用、自由記述）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: Terminate リクエスト
  v1TerminateResponse:
    type: object
    title: Terminate 応答
  v1TransactOp:
    type: object
    properties:
      set:
        $ref: '#/definitions/v1SetRequest'
        title: Set 操作
      delete:
        $ref: '#/definitions/v1DeleteRequest'
        title: Delete 操作
    title: トランザクション内の 1 操作（Set / Delete のいずれか）
  v1TransactRequest:
    type: object
    properties:
      store:
        type: string
        title: Store 名（全操作で共通、複数 Store を跨ぐトランザクションは不可）
      operations:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1TransactOp'
        title: 操作列（記述順に実行、途中失敗で全ロールバック）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: Transact リクエスト
  v1TransactResponse:
    type: object
    properties:
      committed:
        type: boolean
        title: コミット成功可否（false の場合は全ロールバック済み）
    title: Transact 応答
  v1VerifyChainRequest:
    type: object
    properties:
      from:
        type: string
        format: date-time
        title: 範囲開始（任意）。未指定（zero）はテナント配下の全履歴を対象。
      to:
        type: string
        format: date-time
        title: 範囲終了（任意）。未指定（zero）は最新まで。
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト（テナント境界の検証に必須）
    title: VerifyChain リクエスト（FR-T1-AUDIT-002）
  v1VerifyChainResponse:
    type: object
    properties:
      valid:
        type: boolean
        title: チェーン全体の整合性が取れていれば true。
      checked_count:
        type: string
        format: int64
        title: 検証対象だったイベント件数（valid に関わらず set される）。
      first_bad_sequence:
        type: string
        format: int64
        title: |-
          valid=false 時のみ意味あり。最初に不整合を検出した sequence_number。
          valid=true 時は 0。
      reason:
        type: string
        title: |-
          不整合の理由（"prev_hash mismatch" / "event_hash mismatch" / "tenant boundary" 等）。
          valid=true 時は空文字。
    title: VerifyChain 応答
  v1WorkflowBackend:
    type: string
    enum:
      - BACKEND_AUTO
      - BACKEND_DAPR
      - BACKEND_TEMPORAL
    default: BACKEND_AUTO
    description: |-
      - BACKEND_AUTO: 既定値: tier1 が workflow_type / 期待実行時間に基づいて自動選択する。
       - BACKEND_DAPR: 短期ワークフロー向け（Dapr Workflow building block、上限 7 日）。
       - BACKEND_TEMPORAL: 長期ワークフロー向け（Temporal、上限なし）。
    title: |-
      バックエンド種別（FR-T1-WORKFLOW-001 の "短期は Dapr Workflow、長期実行は Temporal" 対応）。
      SDK の RunShort / RunLong は本 enum を BACKEND_DAPR / BACKEND_TEMPORAL に固定する。
      注: zero 値は AUTO（明示指定なし、tier1 が workflow_type / 期待実行時間で振り分け）。
      buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
  v1WorkflowStatus:
    type: string
    enum:
      - RUNNING
      - COMPLETED
      - FAILED
      - CANCELED
      - TERMINATED
      - CONTINUED_AS_NEW
    default: RUNNING
    description: |-
      - RUNNING: 実行中（既定値、Start 直後の状態）
       - COMPLETED: 正常完了
       - FAILED: 失敗終了
       - CANCELED: Cancel による正常停止
       - TERMINATED: Terminate による強制停止
       - CONTINUED_AS_NEW: Continue-as-New（長期ワークフローの履歴ローテーション）
    title: |-
      実行状態の列挙。
      注: 正典 IDL は本 enum の zero value を `RUNNING = 0` と定義しているため、
          buf STANDARD lint の ENUM_ZERO_VALUE_SUFFIX / ENUM_VALUE_PREFIX を ignore する。
      buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
      buf:lint:ignore ENUM_VALUE_PREFIX
