swagger: "2.0"
info:
  title: 'パッケージ命名規約: k1s0.tier1.<api>.v<n>'
  version: version not set
tags:
  - name: AuditService
  - name: BindingService
  - name: DecisionService
  - name: DecisionAdminService
  - name: FeatureService
  - name: FeatureAdminService
  - name: HealthService
  - name: LogService
  - name: PiiService
  - name: PubSubService
  - name: SecretsService
  - name: InvokeService
  - name: StateService
  - name: TelemetryService
  - name: WorkflowService
consumes:
  - application/json
produces:
  - application/json
paths:
  /k1s0/audit/query:
    post:
      summary: 監査イベント検索（範囲 + フィルタ、出力には PII Mask が自動適用）
      operationId: Query
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1QueryAuditResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1QueryAuditRequest'
      tags:
        - AuditService
  /k1s0/audit/record:
    post:
      summary: 監査イベント記録（成功時は audit_id を返す、改竄不可）
      operationId: Record
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1RecordAuditResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1RecordAuditRequest'
      tags:
        - AuditService
  /k1s0/audit/verifychain:
    post:
      summary: |-
        ハッシュチェーン整合性検証（FR-T1-AUDIT-002）。
        テナント配下の全イベントの prev_hash / event_hash の連鎖を検証する。
        改ざん検知時は valid=false で先頭の不整合 sequence_number と reason を返す。
      operationId: VerifyChain
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1VerifyChainResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1VerifyChainRequest'
      tags:
        - AuditService
  /k1s0/binding/invoke:
    post:
      summary: 出力バインディング呼出（tier1 → 外部システムへ送信）
      operationId: Invoke
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1InvokeBindingResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1InvokeBindingRequest'
      tags:
        - BindingService
  /k1s0/decision/batchevaluate:
    post:
      summary: バッチ評価（複数入力を一括評価、JIT 最適化対象）
      operationId: BatchEvaluate
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1BatchEvaluateResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1BatchEvaluateRequest'
      tags:
        - DecisionService
  /k1s0/decision/evaluate:
    post:
      summary: ルール評価（同期、非決定要素を含むルールは登録時に弾かれる）
      operationId: Evaluate
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1EvaluateResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/tier1decisionv1EvaluateRequest'
      tags:
        - DecisionService
  /k1s0/decision/getrule:
    post:
      summary: 特定バージョンの取得（レビュー用）
      operationId: GetRule
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1GetRuleResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1GetRuleRequest'
      tags:
        - DecisionAdminService
  /k1s0/decision/listversions:
    post:
      summary: バージョン一覧
      operationId: ListVersions
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1ListVersionsResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1ListVersionsRequest'
      tags:
        - DecisionAdminService
  /k1s0/decision/registerrule:
    post:
      summary: JDM 文書の登録（schema validator と非決定要素 linter を通過必須）
      operationId: RegisterRule
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1RegisterRuleResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1RegisterRuleRequest'
      tags:
        - DecisionAdminService
  /k1s0/feature/evaluateboolean:
    post:
      summary: Boolean Flag 評価
      operationId: EvaluateBoolean
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1BooleanResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/tier1featurev1EvaluateRequest'
      tags:
        - FeatureService
  /k1s0/feature/evaluatenumber:
    post:
      summary: 数値 Flag 評価
      operationId: EvaluateNumber
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1NumberResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/tier1featurev1EvaluateRequest'
      tags:
        - FeatureService
  /k1s0/feature/evaluateobject:
    post:
      summary: JSON オブジェクト Flag 評価
      operationId: EvaluateObject
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1ObjectResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/tier1featurev1EvaluateRequest'
      tags:
        - FeatureService
  /k1s0/feature/evaluatestring:
    post:
      summary: String Flag 評価（Variant）
      operationId: EvaluateString
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1StringResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/tier1featurev1EvaluateRequest'
      tags:
        - FeatureService
  /k1s0/feature/getflag:
    post:
      summary: Flag 定義の取得
      operationId: GetFlag
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1GetFlagResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1GetFlagRequest'
      tags:
        - FeatureAdminService
  /k1s0/feature/listflags:
    post:
      summary: Flag 定義の一覧
      operationId: ListFlags
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1ListFlagsResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1ListFlagsRequest'
      tags:
        - FeatureAdminService
  /k1s0/feature/registerflag:
    post:
      summary: Flag 定義の登録（permission 種別は approval_id 必須）
      operationId: RegisterFlag
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1RegisterFlagResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1RegisterFlagRequest'
      tags:
        - FeatureAdminService
  /k1s0/health/liveness:
    post:
      summary: 'Liveness probe: process が応答可能なら OK。依存 backend は見ない。'
      operationId: Liveness
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1LivenessResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1LivenessRequest'
      tags:
        - HealthService
  /k1s0/health/readiness:
    post:
      summary: |-
        Readiness probe: 依存 backend（Postgres / Kafka / OpenBao 等）が到達可能
        かどうかも含めて判定する。詳細仕様は plan 04-16。
      operationId: Readiness
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1ReadinessResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1ReadinessRequest'
      tags:
        - HealthService
  /k1s0/log/bulksend:
    post:
      summary: 一括送信（accepted / rejected で集計を返す）
      operationId: BulkSend
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1BulkSendLogResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1BulkSendLogRequest'
      tags:
        - LogService
  /k1s0/log/send:
    post:
      summary: 単一エントリ送信
      operationId: Send
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1SendLogResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1SendLogRequest'
      tags:
        - LogService
  /k1s0/pii/classify:
    post:
      summary: PII 種別の検出（テキスト → findings 列）
      operationId: Classify
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1ClassifyResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1ClassifyRequest'
      tags:
        - PiiService
  /k1s0/pii/mask:
    post:
      summary: マスキング（テキスト → 置換後テキスト + findings）
      operationId: Mask
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1MaskResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1MaskRequest'
      tags:
        - PiiService
  /k1s0/pubsub/bulkpublish:
    post:
      summary: バッチ Publish（個別エントリの成否を BulkPublishEntry で返す）
      operationId: BulkPublish
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1BulkPublishResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1BulkPublishRequest'
      tags:
        - PubSubService
  /k1s0/pubsub/publish:
    post:
      summary: 単発 Publish（idempotency_key で 24h 重複抑止）
      operationId: Publish
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1PublishResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1PublishRequest'
      tags:
        - PubSubService
  /k1s0/secrets/bulkget:
    post:
      summary: 一括取得（テナントに割当された全シークレット）
      operationId: BulkGet
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1BulkGetSecretResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1BulkGetSecretRequest'
      tags:
        - SecretsService
  /k1s0/secrets/get:
    post:
      summary: 単一シークレット取得（テナント越境参照は即 PermissionDenied、FR-T1-SECRETS-001）
      operationId: Get
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1GetSecretResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1GetSecretRequest'
      tags:
        - SecretsService
  /k1s0/secrets/getdynamic:
    post:
      summary: |-
        動的シークレット発行（FR-T1-SECRETS-002）。
        engine="postgres" 等の Database Engine から TTL 付き credential を都度発行する。
        TTL 経過後は OpenBao が backend ユーザを自動失効（drop）させる。
      operationId: GetDynamic
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1GetDynamicSecretResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1GetDynamicSecretRequest'
      tags:
        - SecretsService
  /k1s0/secrets/rotate:
    post:
      summary: |-
        ローテーション実行（FR-T1-SECRETS-004）
        成功時は new_version を返し、旧バージョンは grace_period_sec まで Get 可能。
        失敗時は K1s0Error を返し OpenBao 側は不変（トランザクショナル）。
      operationId: Rotate
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1RotateSecretResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1RotateSecretRequest'
      tags:
        - SecretsService
  /k1s0/serviceinvoke/invoke:
    post:
      summary: 任意サービスの任意メソッドを呼び出す（app_id は Dapr の app_id 概念と互換）
      operationId: Invoke
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1InvokeResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1InvokeRequest'
      tags:
        - InvokeService
  /k1s0/state/bulkget:
    post:
      summary: 複数キーの一括取得（部分的な未存在は not_found=true で表現、エラーにしない）
      operationId: BulkGet
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1BulkGetResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1BulkGetRequest'
      tags:
        - StateService
  /k1s0/state/delete:
    post:
      summary: キー単位の削除（ETag を expected_etag に渡せば楽観的排他で削除）
      operationId: Delete
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1DeleteResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1DeleteRequest'
      tags:
        - StateService
  /k1s0/state/get:
    post:
      summary: キー単位の取得（未存在時は not_found=true、エラーには非該当）
      operationId: Get
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1GetResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1GetRequest'
      tags:
        - StateService
  /k1s0/state/set:
    post:
      summary: キー単位の保存（ETag 不一致時は FAILED_PRECONDITION でエラー）
      operationId: Set
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1SetResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1SetRequest'
      tags:
        - StateService
  /k1s0/state/transact:
    post:
      summary: トランザクション境界付きの複数操作（全 Store で対応するわけではない）
      operationId: Transact
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1TransactResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1TransactRequest'
      tags:
        - StateService
  /k1s0/telemetry/emitmetric:
    post:
      summary: メトリクス送信（Counter / Gauge / Histogram の混在可）
      operationId: EmitMetric
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1EmitMetricResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1EmitMetricRequest'
      tags:
        - TelemetryService
  /k1s0/telemetry/emitspan:
    post:
      summary: Span 送信（既に終了済みの Span のみ受け付ける、開始 Span は OTel SDK で）
      operationId: EmitSpan
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1EmitSpanResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1EmitSpanRequest'
      tags:
        - TelemetryService
  /k1s0/workflow/cancel:
    post:
      summary: 正常終了の依頼（キャンセル）
      operationId: Cancel
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1CancelResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1CancelRequest'
      tags:
        - WorkflowService
  /k1s0/workflow/getstatus:
    post:
      summary: 状態取得
      operationId: GetStatus
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1GetStatusResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1GetStatusRequest'
      tags:
        - WorkflowService
  /k1s0/workflow/query:
    post:
      summary: クエリ（ワークフロー状態の読取り、副作用なし）
      operationId: Query
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1QueryResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1QueryRequest'
      tags:
        - WorkflowService
  /k1s0/workflow/signal:
    post:
      summary: シグナル送信（ワークフローへの入力イベント）
      operationId: Signal
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1SignalResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1SignalRequest'
      tags:
        - WorkflowService
  /k1s0/workflow/start:
    post:
      summary: ワークフロー開始
      operationId: Start
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1StartResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1StartRequest'
      tags:
        - WorkflowService
  /k1s0/workflow/terminate:
    post:
      summary: 強制終了
      operationId: Terminate
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/v1TerminateResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/rpcStatus'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/v1TerminateRequest'
      tags:
        - WorkflowService
definitions:
  protobufAny:
    type: object
    properties:
      '@type':
        type: string
    additionalProperties: {}
  protobufNullValue:
    type: string
    enum:
      - NULL_VALUE
    default: NULL_VALUE
    description: |-
      `NullValue` is a singleton enumeration to represent the null value for the
      `Value` type union.

      The JSON representation for `NullValue` is JSON `null`.

       - NULL_VALUE: Null value.
  rpcStatus:
    type: object
    properties:
      code:
        type: integer
        format: int32
      message:
        type: string
      details:
        type: array
        items:
          type: object
          $ref: '#/definitions/protobufAny'
  tier1decisionv1EvaluateRequest:
    type: object
    properties:
      rule_id:
        type: string
        title: ルール ID（tier2 で登録した JDM 文書の識別子）
      rule_version:
        type: string
        title: ルールバージョン（省略時は最新有効）
      input_json:
        type: string
        format: byte
        title: 入力（JDM の context に相当、任意 JSON）
      include_trace:
        type: boolean
        title: trace 情報を返すか（デバッグ用、PII を含む可能性あり）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: Evaluate リクエスト
  tier1featurev1EvaluateRequest:
    type: object
    properties:
      flag_key:
        type: string
        title: 'Flag キー（命名規則: <tenant>.<component>.<feature>）'
      evaluation_context:
        type: object
        additionalProperties:
          type: string
        title: 評価コンテキスト（targetingKey は subject と同一）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: Flag 評価の共通入力
  v1AuditEvent:
    type: object
    properties:
      timestamp:
        type: string
        format: date-time
        title: 発生時刻（UTC）
      actor:
        type: string
        title: 操作主体（user_id / workload_id）
      action:
        type: string
        title: 操作種別（CREATE / READ / UPDATE / DELETE / LOGIN / EXPORT）
      resource:
        type: string
        title: '対象リソース（URN 形式: k1s0:tenant:<tid>:resource:<type>/<id>）'
      outcome:
        type: string
        title: 操作結果（SUCCESS / DENIED / ERROR）
      attributes:
        type: object
        additionalProperties:
          type: string
        title: 追加コンテキスト（ip / user_agent / request_id 等）
    title: 監査イベント
  v1BatchEvaluateRequest:
    type: object
    properties:
      rule_id:
        type: string
        title: ルール ID（全入力で共通）
      rule_version:
        type: string
        title: ルールバージョン
      inputs_json:
        type: array
        items:
          type: string
          format: byte
        title: 入力 JSON 列（順序を保って評価される）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: BatchEvaluate リクエスト
  v1BatchEvaluateResponse:
    type: object
    properties:
      outputs_json:
        type: array
        items:
          type: string
          format: byte
        title: 出力 JSON 列（inputs_json と同じ順序）
    title: BatchEvaluate 応答
  v1BooleanResponse:
    type: object
    properties:
      value:
        type: boolean
        title: 評価値
      metadata:
        $ref: '#/definitions/v1FlagMetadata'
        title: メタ情報
    title: Boolean 評価応答
  v1BulkGetRequest:
    type: object
    properties:
      store:
        type: string
        title: Store 名（全キーで共通）
      keys:
        type: array
        items:
          type: string
        title: 取得するキー一覧
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: BulkGet リクエスト
  v1BulkGetResponse:
    type: object
    properties:
      results:
        type: object
        additionalProperties:
          $ref: '#/definitions/v1GetResponse'
        title: 結果マップ（キー → GetResponse、未存在キーも not_found=true で含める）
    title: BulkGet 応答
  v1BulkGetSecretRequest:
    type: object
    properties:
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: BulkGet リクエスト
  v1BulkGetSecretResponse:
    type: object
    properties:
      results:
        type: object
        additionalProperties:
          $ref: '#/definitions/v1GetSecretResponse'
        title: 結果マップ（シークレット名 → GetSecretResponse）
    title: BulkGet 応答
  v1BulkPublishEntry:
    type: object
    properties:
      entry_index:
        type: integer
        format: int32
        title: 入力 entries 配列内のインデックス（0 始まり）
      offset:
        type: string
        format: int64
        title: Kafka 側のオフセット（成功時のみ意味を持つ）
      error_code:
        type: string
        title: 失敗時のエラーコード（成功時は空文字列）
    title: BulkPublish の個別エントリ結果
  v1BulkPublishRequest:
    type: object
    properties:
      topic:
        type: string
        title: トピック名（全エントリで共通）
      entries:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1PublishRequest'
        title: 公開するエントリ列
    title: BulkPublish リクエスト
  v1BulkPublishResponse:
    type: object
    properties:
      results:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1BulkPublishEntry'
        title: 各エントリの結果（失敗時は error_code に詳細）
    title: BulkPublish 応答
  v1BulkSendLogRequest:
    type: object
    properties:
      entries:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1LogEntry'
        title: 送信エントリ列
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: BulkSend リクエスト
  v1BulkSendLogResponse:
    type: object
    properties:
      accepted:
        type: integer
        format: int32
        title: 受理件数（OTel パイプラインに渡された件数）
      rejected:
        type: integer
        format: int32
        title: 拒否件数（PII フィルタや schema 違反で却下された件数）
    title: BulkSend 応答
  v1CancelRequest:
    type: object
    properties:
      workflow_id:
        type: string
        title: 対象ワークフロー ID
      reason:
        type: string
        title: キャンセル理由（監査用、自由記述）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: Cancel リクエスト
  v1CancelResponse:
    type: object
    title: Cancel 応答
  v1ClassifyRequest:
    type: object
    properties:
      text:
        type: string
        title: 判定対象テキスト
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: Classify リクエスト
  v1ClassifyResponse:
    type: object
    properties:
      findings:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1PiiFinding'
        title: 検出された PII 一覧（位置順）
      contains_pii:
        type: boolean
        title: PII を含むか（findings が空でなければ true）
    title: Classify 応答
  v1DeleteRequest:
    type: object
    properties:
      store:
        type: string
        title: Store 名
      key:
        type: string
        title: キー
      expected_etag:
        type: string
        title: 期待 ETag（空は無条件削除、指定時は楽観的排他で削除）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: Delete リクエスト
  v1DeleteResponse:
    type: object
    properties:
      deleted:
        type: boolean
        title: 削除実行可否（未存在キーへの削除も deleted=true で返す）
    title: Delete 応答
  v1DependencyStatus:
    type: object
    properties:
      reachable:
        type: boolean
        title: 接続可能か
      error_message:
        type: string
        title: 直近のエラー（reachable=false の時のみ意味を持つ）
    title: 個別依存の状態
  v1EmitMetricRequest:
    type: object
    properties:
      metrics:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1Metric'
        title: メトリクス列
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: EmitMetric リクエスト
  v1EmitMetricResponse:
    type: object
    title: EmitMetric 応答
  v1EmitSpanRequest:
    type: object
    properties:
      spans:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1Span'
        title: Span 列
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: EmitSpan リクエスト
  v1EmitSpanResponse:
    type: object
    title: EmitSpan 応答
  v1ErrorDetail:
    type: object
    properties:
      code:
        type: string
        title: エラーコード（E-<CATEGORY>-<MODULE>-<NUMBER> 形式、文字列）
      category:
        $ref: '#/definitions/v1K1s0ErrorCategory'
        title: 機械可読カテゴリ（switch 分岐用、enum 追加時は後方互換維持）
      message:
        type: string
        title: 人間可読なメッセージ（テナント表示可、PII を含めてはならない）
      retryable:
        type: boolean
        title: 再試行可否（true の場合クライアントは指数バックオフで再試行）
      retry_after_ms:
        type: integer
        format: int32
        title: 再試行までの推奨待機時間（ミリ秒、retryable=true の時のみ意味を持つ）
    title: |-
      エラー詳細。tier1 は google.rpc.Status の `details` 配列に
      本メッセージを 1 つ埋め込んで返す。`code` で詳細検索、
      `category` で switch 分岐、`retryable` でクライアント側再試行判定。
  v1EvaluateResponse:
    type: object
    properties:
      output_json:
        type: string
        format: byte
        title: 出力（JDM 評価結果、任意 JSON）
      trace_json:
        type: string
        format: byte
        title: 評価されたノードのトレース（include_trace=true の時のみ、空 bytes）
      elapsed_us:
        type: string
        format: int64
        title: 評価にかかった時間（マイクロ秒）
    title: Evaluate 応答
  v1Event:
    type: object
    properties:
      topic:
        type: string
        title: トピック名（接頭辞除去済みのテナント内名）
      data:
        type: string
        format: byte
        title: イベント本文
      content_type:
        type: string
        title: Content-Type
      offset:
        type: string
        format: int64
        title: Kafka 側のオフセット
      metadata:
        type: object
        additionalProperties:
          type: string
        title: メタデータ（Publish 時に付与されたヘッダがそのまま伝わる）
    title: Event（Subscribe の stream 要素）
  v1ExportAuditChunk:
    type: object
    properties:
      data:
        type: string
        format: byte
        title: フォーマット済みデータの 1 部分（バイナリ透過、UTF-8 を想定）。
      sequence:
        type: string
        format: int64
        title: 0 起点のチャンク連番（再構成 / 監査時の参照用）。
      event_count:
        type: string
        format: int64
        title: この chunk に含まれる event 数（chunk_bytes ベースの場合は variable）。
      is_last:
        type: boolean
        title: ストリーム末尾の chunk なら true。最後の "]" や EOF newline を含む。
    title: Export 応答（server-streaming）の 1 チャンク
  v1ExportFormat:
    type: string
    enum:
      - EXPORT_FORMAT_UNSPECIFIED
      - EXPORT_FORMAT_CSV
      - EXPORT_FORMAT_NDJSON
      - EXPORT_FORMAT_JSON_ARRAY
    default: EXPORT_FORMAT_UNSPECIFIED
    description: |-
      - EXPORT_FORMAT_UNSPECIFIED: 既定（指定なし）。サーバが NDJSON にフォールバックする。
       - EXPORT_FORMAT_CSV: CSV（RFC 4180、ヘッダ行を最初の chunk に出力）。
       - EXPORT_FORMAT_NDJSON: 改行区切り JSON（1 行 = 1 event）。Splunk / fluentd 取り込み向け。
       - EXPORT_FORMAT_JSON_ARRAY: 単一 JSON 配列（小規模向け、最後の chunk で `]` を閉じる）。
    title: Export のフォーマット種別。
  v1FlagDefinition:
    type: object
    properties:
      flag_key:
        type: string
        title: 'Flag キー（命名規則: <tenant>.<component>.<feature>）'
      kind:
        $ref: '#/definitions/v1FlagKind'
        title: Flag 種別（RELEASE / EXPERIMENT / OPS / PERMISSION）
      value_type:
        $ref: '#/definitions/v1FlagValueType'
        title: 戻り値型（boolean / string / number / object）
      default_variant:
        type: string
        title: デフォルト variant の名前（下記 variants にキーが存在すること）
      variants:
        type: object
        additionalProperties: {}
        title: 'variants 定義: variant 名 → 値（value_type に応じた JSON literal）'
      targeting:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1TargetingRule'
        title: targeting ルール（先頭から評価、最初に match したもの採用）
      state:
        $ref: '#/definitions/v1FlagState'
        title: 状態（ENABLED / DISABLED / ARCHIVED）
      description:
        type: string
        title: 説明（監査・運用者向け）
    title: flagd 互換の Flag 定義。k1s0 は OpenFeature / flagd 仕様に準拠。
  v1FlagKind:
    type: string
    enum:
      - RELEASE
      - EXPERIMENT
      - OPS
      - PERMISSION
    default: RELEASE
    description: |-
      - RELEASE: リリース管理用（既定値、コード経路の段階公開）
       - EXPERIMENT: A/B テスト等の実験用
       - OPS: 運用上の緊急切替（Kill switch 含む）
       - PERMISSION: 権限制御（permission gate、Product Council 承認必須）
    title: |-
      Flag の種別（OpenFeature / k1s0 固有）。
      注: 正典 IDL は zero value を `RELEASE = 0` と定義しているため、
          buf STANDARD lint の ENUM_ZERO_VALUE_SUFFIX / ENUM_VALUE_PREFIX を ignore する。
      buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
      buf:lint:ignore ENUM_VALUE_PREFIX
  v1FlagMetadata:
    type: object
    properties:
      kind:
        $ref: '#/definitions/v1FlagKind'
        title: Flag 種別
      variant:
        type: string
        title: バリアント名（有効化理由の参考）
      reason:
        type: string
        title: 評価の理由（DEFAULT / TARGETING_MATCH / SPLIT / ERROR）
    title: Flag 評価のメタ情報（OpenFeature の EvaluationDetails と整合）
  v1FlagState:
    type: string
    enum:
      - FLAG_STATE_UNSPECIFIED
      - FLAG_STATE_ENABLED
      - FLAG_STATE_DISABLED
      - FLAG_STATE_ARCHIVED
    default: FLAG_STATE_UNSPECIFIED
    description: |-
      - FLAG_STATE_UNSPECIFIED: 未指定（既定値、登録時に弾かれる）
       - FLAG_STATE_ENABLED: 有効（評価可能）
       - FLAG_STATE_DISABLED: 無効（評価は default_variant 固定）
       - FLAG_STATE_ARCHIVED: 廃止（ListFlags から消える、Get は可能）
    title: Flag の状態
  v1FlagValueType:
    type: string
    enum:
      - FLAG_VALUE_UNSPECIFIED
      - FLAG_VALUE_BOOLEAN
      - FLAG_VALUE_STRING
      - FLAG_VALUE_NUMBER
      - FLAG_VALUE_OBJECT
    default: FLAG_VALUE_UNSPECIFIED
    description: |-
      - FLAG_VALUE_UNSPECIFIED: 未指定（既定値、登録時に弾かれる）
       - FLAG_VALUE_BOOLEAN: boolean 型
       - FLAG_VALUE_STRING: string 型
       - FLAG_VALUE_NUMBER: number 型
       - FLAG_VALUE_OBJECT: object 型（任意 JSON）
    title: Flag の戻り値型
  v1FractionalSplit:
    type: object
    properties:
      variant:
        type: string
        title: バリアント名
      weight:
        type: integer
        format: int32
        title: 重み（0〜100、全エントリ合計 100 必須）
    title: Experiment 種別の Flag で A/B 比率を指定
  v1GetDynamicSecretRequest:
    type: object
    properties:
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト（テナント境界の検証に必須）
      engine:
        type: string
        title: 発行エンジン名（"postgres" / "mysql" / "kafka" 等、OpenBao の database engine 種別）
      role:
        type: string
        title: OpenBao 側で予め定義されたロール名（tenant_id でスコープされた role）
      ttl_sec:
        type: integer
        format: int32
        title: TTL 秒数（0 = 既定 3600 秒 = 1 時間、最大 86400 秒 = 24 時間）
    title: GetDynamic リクエスト（FR-T1-SECRETS-002）
  v1GetDynamicSecretResponse:
    type: object
    properties:
      values:
        type: object
        additionalProperties:
          type: string
        title: 発行された credential 一式（"username" / "password" 等の key=value）
      lease_id:
        type: string
        title: OpenBao 側 lease ID（renewal / revoke 用、削除時に呼び返す）
      ttl_sec:
        type: integer
        format: int32
        title: 実際に付与された TTL 秒数（要求値が ceiling を超えたら短縮される）
      issued_at_ms:
        type: string
        format: int64
        title: 発効時刻（Unix epoch ミリ秒）
    title: GetDynamic 応答
  v1GetFlagRequest:
    type: object
    properties:
      flag_key:
        type: string
        title: 対象 Flag キー
      version:
        type: string
        format: int64
        title: バージョン（省略時は最新）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: GetFlag リクエスト
  v1GetFlagResponse:
    type: object
    properties:
      flag:
        $ref: '#/definitions/v1FlagDefinition'
        title: Flag 定義
      version:
        type: string
        format: int64
        title: バージョン
    title: GetFlag 応答
  v1GetRequest:
    type: object
    properties:
      store:
        type: string
        title: Store 名（valkey-default / postgres-tenant 等、運用側で設定）
      key:
        type: string
        title: キー（テナント境界は tier1 が自動付与、クライアントはテナント内キーのみ指定）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: Get リクエスト
  v1GetResponse:
    type: object
    properties:
      data:
        type: string
        format: byte
        title: 値本文（bytes で透過、encoding はクライアント責務）
      etag:
        type: string
        title: 楽観的排他のための ETag（Set / Delete 時に expected_etag に再送する）
      not_found:
        type: boolean
        title: キー未存在時は true（このとき data / etag は空、エラーではない）
    title: Get 応答
  v1GetRuleRequest:
    type: object
    properties:
      rule_id:
        type: string
        title: 対象ルール ID
      rule_version:
        type: string
        title: 取得バージョン
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: GetRule リクエスト
  v1GetRuleResponse:
    type: object
    properties:
      jdm_document:
        type: string
        format: byte
        title: JDM 文書本体
      meta:
        $ref: '#/definitions/v1RuleVersionMeta'
        title: メタ情報
    title: GetRule 応答
  v1GetSecretRequest:
    type: object
    properties:
      name:
        type: string
        title: シークレット名（テナント境界を超えた参照は即 PermissionDenied）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
      version:
        type: integer
        format: int32
        title: 省略時は最新、明示で旧バージョン取得可（grace_period 中のみ）
    title: Get リクエスト
  v1GetSecretResponse:
    type: object
    properties:
      values:
        type: object
        additionalProperties:
          type: string
        title: 値（Base64 エンコード必要時はクライアント側で判断、複数キーの key=value マップ）
      version:
        type: integer
        format: int32
        title: バージョン（ローテーション追跡用）
    title: Get 応答
  v1GetStatusRequest:
    type: object
    properties:
      workflow_id:
        type: string
        title: 対象ワークフロー ID
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: GetStatus リクエスト
