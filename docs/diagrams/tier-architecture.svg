<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="780" height="520" fill="none"/>

  <!-- Title -->
  <text x="390" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">3 Tier Architecture</text>

  <!-- ===== system tier ===== -->
  <rect x="30" y="50" width="720" height="130" rx="10" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="2"/>
  <text x="390" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a5276">system (最上位) - 全プロジェクト共通の基盤</text>
  <text x="390" y="96" text-anchor="middle" font-size="11" fill="#2c3e50">K8s Namespace: k1s0-system</text>

  <!-- system boxes -->
  <rect x="50"  y="110" width="145" height="55" rx="6" fill="#fff" stroke="#6C8EBF" stroke-width="1.5"/>
  <text x="122" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">server (22)</text>
  <text x="122" y="150" text-anchor="middle" font-size="10" fill="#555">認証 / API GW / Saga</text>

  <rect x="210" y="110" width="145" height="55" rx="6" fill="#fff" stroke="#6C8EBF" stroke-width="1.5"/>
  <text x="282" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">library (50+)</text>
  <text x="282" y="150" text-anchor="middle" font-size="10" fill="#555">4 言語共通ライブラリ</text>

  <rect x="370" y="110" width="145" height="55" rx="6" fill="#fff" stroke="#6C8EBF" stroke-width="1.5"/>
  <text x="442" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">client</text>
  <text x="442" y="150" text-anchor="middle" font-size="10" fill="#555">React / Flutter SDK</text>

  <rect x="530" y="110" width="145" height="55" rx="6" fill="#fff" stroke="#6C8EBF" stroke-width="1.5"/>
  <text x="602" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">database</text>
  <text x="602" y="150" text-anchor="middle" font-size="10" fill="#555">PostgreSQL スキーマ</text>

  <!-- ===== Dependency arrow 1 (business -> system) ===== -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>
  <line x1="390" y1="230" x2="390" y2="186" stroke="#666" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="365" y="198" width="50" height="18" rx="3" fill="#fff"/>
  <text x="390" y="212" text-anchor="middle" font-size="11" fill="#666">依存</text>

  <!-- ===== business tier ===== -->
  <rect x="30" y="230" width="720" height="130" rx="10" fill="#FFF2CC" stroke="#D6B656" stroke-width="2"/>
  <text x="390" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="#7d6608">business (中位) - 業務領域ごとの共有基盤</text>
  <text x="390" y="276" text-anchor="middle" font-size="11" fill="#2c3e50">K8s Namespace: k1s0-business</text>

  <!-- business boxes -->
  <rect x="50"  y="290" width="145" height="55" rx="6" fill="#fff" stroke="#D6B656" stroke-width="1.5"/>
  <text x="122" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d6608">server</text>
  <text x="122" y="330" text-anchor="middle" font-size="10" fill="#555">経理 / 財務 / 資産</text>

  <rect x="210" y="290" width="145" height="55" rx="6" fill="#fff" stroke="#D6B656" stroke-width="1.5"/>
  <text x="282" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d6608">client</text>
  <text x="282" y="330" text-anchor="middle" font-size="10" fill="#555">業務共通 UI</text>

  <rect x="370" y="290" width="145" height="55" rx="6" fill="#fff" stroke="#D6B656" stroke-width="1.5"/>
  <text x="442" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d6608">library</text>
  <text x="442" y="330" text-anchor="middle" font-size="10" fill="#555">領域固有ライブラリ</text>

  <rect x="530" y="290" width="145" height="55" rx="6" fill="#fff" stroke="#D6B656" stroke-width="1.5"/>
  <text x="602" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d6608">database</text>
  <text x="602" y="330" text-anchor="middle" font-size="10" fill="#555">業務 DB スキーマ</text>

  <!-- ===== Dependency arrow 2 (service -> business) ===== -->
  <line x1="390" y1="410" x2="390" y2="366" stroke="#666" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="365" y="378" width="50" height="18" rx="3" fill="#fff"/>
  <text x="390" y="392" text-anchor="middle" font-size="11" fill="#666">依存</text>

  <!-- ===== service tier ===== -->
  <rect x="30" y="410" width="720" height="100" rx="10" fill="#D5E8D4" stroke="#82B366" stroke-width="2"/>
  <text x="390" y="436" text-anchor="middle" font-size="14" font-weight="bold" fill="#276227">service (最下位) - 個別業務サービス</text>
  <text x="390" y="456" text-anchor="middle" font-size="11" fill="#2c3e50">K8s Namespace: k1s0-service</text>

  <!-- service boxes -->
  <rect x="50"  y="468" width="210" height="30" rx="6" fill="#fff" stroke="#82B366" stroke-width="1.5"/>
  <text x="155" y="488" text-anchor="middle" font-size="10" fill="#276227">server (Go / Rust)</text>

  <rect x="280" y="468" width="210" height="30" rx="6" fill="#fff" stroke="#82B366" stroke-width="1.5"/>
  <text x="385" y="488" text-anchor="middle" font-size="10" fill="#276227">client (React / Flutter)</text>

  <rect x="510" y="468" width="170" height="30" rx="6" fill="#fff" stroke="#82B366" stroke-width="1.5"/>
  <text x="595" y="488" text-anchor="middle" font-size="10" fill="#276227">database</text>

  <!-- Skip-level dependency arrow (service -> system) -->
  <path d="M 750 460 Q 770 460 770 280 Q 770 110 750 110" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <rect x="755" y="274" width="24" height="18" rx="3" fill="#fff"/>
  <text x="767" y="288" text-anchor="middle" font-size="10" fill="#999">依存</text>
</svg>
