# .gitleaks.toml
# MED-010 対応: gitleaks シークレットスキャナーの設定ファイル。
# .env.dev および .env.dev.example はローカル開発用の設定ファイルであり、
# 本番シークレットではないため allowlist に追加して誤検知を防止する。
# 実際の本番シークレットは Vault / K8s Secret / GitHub Secrets で管理すること（ADR-0045 参照）。

title = "k1s0 gitleaks configuration"

[extend]
# gitleaks 公式のデフォルトルールセットを継承する
useDefault = true

[[rules.allowlist]]
description = "ローカル開発用の .env ファイルは本番シークレットを含まないため除外する"
paths = [
  ".env.dev",
  ".env.dev.example",
]

[[rules.allowlist]]
description = "gitleaks 設定ファイル自体のコメントを除外する"
paths = [
  ".gitleaks.toml",
]

[allowlist]
description = "k1s0 プロジェクト全体の allowlist"
# テスト用の明示的なダミーシークレット（実際のシークレットではないことをコメントで明記済みのもの）
regexes = [
  # Keycloak realm インポートファイルのデフォルト値（dev 環境専用、環境変数で上書き可能）
  "\\$\\{KC_AUTH_ADMIN_SECRET:-dev-service-secret\\}",
  "dev-service-secret",
  # テストコードの固定シークレット（本番利用禁止の旨をコメントで明記済み）
  "test-secret",
  "test-token",
  "valid-csrf",
  "correct-token",
]
paths = [
  # テストファイルは本番シークレットを含まない
  "tests/",
  "test/",
  "_test.go",
  "spec/",
  # テンプレートの example ファイル
  "*.example",
  "*.sample",
]
