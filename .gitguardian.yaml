# GitGuardian (ggshield) 設定
# 本ファイルは既知の dev-only / local-only 認証情報を allowlist 化する。
# production の認証情報は引き続き完全検知対象。
#
# 設計判断: ローカル kind cluster の admin 用初期 password (ArgoCD123!) は
# `infra/gitops/local-stack/argocd-repo-secret.yaml` で平文 commit されており
# そこから派生した bootstrap_gitea_content / restore-cluster.sh / verify-cluster.sh
# が同じ password を参照する。これは "kind cluster 内のみで通用する dev credentials"
# でありリリース時点 production 環境では使われないため、ggshield の検知対象から外す。
#
# 規約: 本 allowlist には password 文字列リテラルを直書きする。新たな allowlist を
# 追加する場合、PR レビューで「production への意図せぬ流出が無いか」を確認すること。
#
# Schema: ggshield 公式 (https://docs.gitguardian.com/ggshield-docs/reference/config)
#   - paths-ignore はトップレベル（secret 配下ではない）
#   - matches-ignore はトップレベル（ignored-matches ではなく matches-ignore）

version: 2

# 文字列マッチで全 secret 検出から除外（dev-only credentials）
matches-ignore:
  - name: "argocd dev admin password (local kind only, ADR-POL-002)"
    match: "ArgoCD123!"
  - name: "k1s0 local-stack postgres dev password (CNPG cluster, kind only)"
    match: "k1s0-local-dev-password"

# パス単位で全 secret 検出から除外（local-stack の bootstrap が dev credentials を参照）
paths-ignore:
  - "tools/local-stack/lib/apply-layers.sh"
  - "tools/local-stack/restore-cluster.sh"
  - "tools/local-stack/verify-cluster.sh"
  - "tools/local-stack/up.sh"
  - "infra/gitops/local-stack/argocd-repo-secret.yaml"
  - "infra/gitops/local-stack/README.md"
  - "tools/local-stack/manifests/60-cnpg/k1s0-cluster.yaml"
  - "tools/local-stack/manifests/85-backstage/values.yaml"
