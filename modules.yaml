# モジュールレジストリ — リポジトリ内の全モジュールを一元管理する
# CI・justfile のスキップリストを廃止し、このファイルを唯一の情報源とする
#
# 命名規約:
# - Rust: snake_case (crate名は kebab-case)
# - Go: camelCase / PascalCase
# - TypeScript: camelCase / PascalCase
# - Dart: snake_case (パッケージ名) / camelCase (変数)
# - ディレクトリ名: kebab-case
# - Proto: snake_case (フィールド) / PascalCase (メッセージ)
#
# フィールド:
#   path:           モジュールのディレクトリパス
#   lang:           言語 (rust, go, ts, dart)
#   status:         stable | experimental | archived
#   type:           server | library | client | cli | workspace | proto | infra
#   workspace:      Cargo/Go ワークスペースルート（該当する場合）
#   skip-ci:        true の場合 CI のリント・テスト・ビルドをスキップ
#   language_scope: ライブラリが実装されている言語の一覧（library のみ）
#
# ステータス定義:
#   stable:       本番利用可能。CI で必ずリント・テスト・ビルドが実行される。
#                 インフラ設定（DB, Kafka 等）が未指定の場合は起動を拒否する。
#   experimental: 開発中・実験段階。CI では continue-on-error で実行され、
#                 失敗しても全体のビルドをブロックしない。
#   archived:     廃止済み。CI から完全に除外される。コード削除前の猶予期間に使用。

# ============================================================
# 層間の依存関係グラフ
# ============================================================
# service 層は business 層と system 層に依存可能
# business 層は system 層にのみ依存可能
# system 層は外部依存のみ（他の層に依存しない）
tier_dependencies:
  service:
    depends_on: [business, system]
  business:
    depends_on: [system]
  system:
    depends_on: []

# ============================================================
# ライブラリ言語パリティ表
# ============================================================
# 各ライブラリがどの言語で実装されているかを明示する。
# scope: all = 4言語全て (rust, go, ts, dart)
#        rust-only = Rust のみ（ビルドツールや Rust 固有の抽象）
#        server = サーバーサイド言語のみ (rust, go)
#        partial = 一部言語のみ（詳細は languages フィールドを参照）
library_parity:
  # 4言語全てで実装済み（43ライブラリ）
  all:
    - app-updater
    - audit-client
    - auth
    - bb-ai-client
    - building-blocks
    - bulkhead
    - cache
    - circuit-breaker
    - codegen
    - config
    - correlation
    - distributed-lock
    - dlq-client
    - encryption
    - event-bus
    - eventstore
    - featureflag
    - file-client
    - graphql-client
    - health
    - idempotency
    - kafka
    - messaging
    - migration
    - notification-client
    - outbox
    - pagination
    - quota-client
    - ratelimit-client
    - resiliency
    - retry
    - saga
    - scheduler-client
    - schemaregistry
    - search-client
    - server-common
    - serviceauth
    - session-client
    - telemetry
    - tenant-client
    - test-helper
    - tracing
    - validation
    - vault-client
    - webhook-client
    - websocket

  # Rust のみ（ビルドツール・Rust 固有の抽象層）
  rust_only:
    - proto-build        # tonic-build ラッパー（Rust ビルド専用）
    - bb-core            # Building Blocks コア抽象（Rust 専用）
    - telemetry-macros   # proc-macro による計装マクロ（Rust 専用）

  # サーバーサイド言語のみ (rust, go)
  server_only:
    # Rust では bb- prefix、Go では prefix なしの命名
    - binding            # rust: bb-binding, go: binding
    - pubsub             # rust: bb-pubsub, go: pubsub
    - secretstore        # rust: bb-secretstore, go: secret-store
    - statestore         # rust: bb-statestore, go: statestore

  # Go のみ
  go_only:
    - telemetry-macros   # Go 版テレメトリマクロ（go generate ベース）

