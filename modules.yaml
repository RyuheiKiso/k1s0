# モジュールレジストリ — リポジトリ内の全モジュールを一元管理する
# CI・justfile のスキップリストを廃止し、このファイルを唯一の情報源とする
#
# 命名規約:
# - Rust: snake_case (crate名は kebab-case)
# - Go: camelCase / PascalCase
# - TypeScript: camelCase / PascalCase
# - Dart: snake_case (パッケージ名) / camelCase (変数)
# - ディレクトリ名: kebab-case
# - Proto: snake_case (フィールド) / PascalCase (メッセージ)
#
# フィールド:
#   path:           モジュールのディレクトリパス
#   lang:           言語 (rust, go, ts, dart, yaml, hcl)
#   status:         stable | experimental | archived
#   type:           server | library | client | cli | workspace | proto | infra | database
#   workspace:      Cargo/Go ワークスペースルート（該当する場合）
#   skip-ci:        true の場合 CI のリント・テスト・ビルドをスキップ
#   language_scope: ライブラリが実装されている言語の一覧（library のみ）
#   maturity:       モジュールの成熟度 (production/beta/experimental/template-only)
#
# ステータス定義:
#   stable:       本番利用可能。CI で必ずリント・テスト・ビルドが実行される。
#                 インフラ設定（DB, Kafka 等）が未指定の場合は起動を拒否する。
#   experimental: 開発中・実験段階。CI では continue-on-error で実行され、
#                 失敗しても全体のビルドをブロックしない。
#   archived:     廃止済み。CI から完全に除外される。コード削除前の猶予期間に使用。

# ============================================================
# 層間の依存関係グラフ
# ============================================================
# service 層は business 層と system 層に依存可能
# business 層は system 層にのみ依存可能
# system 層は外部依存のみ（他の層に依存しない）
tier_dependencies:
  service:
    depends_on: [business, system]
  business:
    depends_on: [system]
  system:
    depends_on: []

# ============================================================
# ライブラリ言語パリティ表
# ============================================================
# 各ライブラリがどの言語で実装されているかを明示する。
# 3カテゴリ分類:
#   core   = 全言語 (rust, go, ts, dart) — 基盤的なクロスプラットフォームライブラリ
#   server = サーバーサイドのみ (rust, go) — バックエンド固有の実装
#   client = クライアントサイドのみ (ts, dart) — フロントエンド固有の実装
# 補足:
#   lang_specific = 特定言語固有（ビルドツール、proc-macro等）
library_parity:
  # Core: 4言語全てで実装済み（全プラットフォーム共通ライブラリ）
  core:
    - app-updater
    - audit-client
    - auth
    - bb-ai-client
    - building-blocks
    - bulkhead
    - cache
    - circuit-breaker
    - codegen
    - config
    - correlation
    - distributed-lock
    - dlq-client
    - encryption
    - event-bus
    - eventstore
    - featureflag
    - file-client
    - graphql-client
    - health
    - idempotency
    - kafka
    - messaging
    - migration
    - notification-client
    - outbox
    - pagination
    - quota-client
    - ratelimit-client
    - resiliency
    - retry
    - saga
    - scheduler-client
    - schemaregistry
    - search-client
    - server-common
    - serviceauth
    - session-client
    - telemetry
    - tenant-client
    - test-helper
    - tracing
    - validation
    - vault-client
    - webhook-client
    - websocket

  # Server: サーバーサイド言語のみ (rust, go)
  # 注意: Dart は binding/pubsub/secretstore/statestore を単一の
  # building_blocks パッケージに統合実装している（lang_specific.dart 参照）。
  server:
    # Rust では bb- prefix、Go では prefix なしの命名
    - binding            # rust: bb-binding, go: binding
    - pubsub             # rust: bb-pubsub, go: pubsub
    - secretstore        # rust: bb-secretstore, go: secret-store
    - statestore         # rust: bb-statestore, go: statestore

  # Client: クライアントサイドのみ (ts, dart) — 現在該当なし
  client: []

  # lang_specific: 特定言語固有のビルドツール・言語抽象（3分類外）
  lang_specific:
    rust:
      - proto-build        # tonic-build ラッパー（Rust ビルド専用）
      - bb-core            # Building Blocks コア抽象（Rust 専用）
      - telemetry-macros   # proc-macro による計装マクロ（Rust 専用）
    go:
      - telemetry-macros   # Go 版テレメトリマクロ（go generate ベース）
    dart:
      # Dart は server 層の binding/pubsub/secretstore/statestore を
      # 単一の building_blocks パッケージに統合している（A-04 対応）。
      # 各コンポーネントは building_blocks/lib/src/{binding,pubsub,secretstore,statestore}.dart で実装。
      - building_blocks    # binding + pubsub + secretstore + statestore の統合パッケージ

