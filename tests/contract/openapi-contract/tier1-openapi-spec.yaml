swagger: "2.0"
info:
  title: 'パッケージ命名規約: k1s0.tier1.<api>.v<n>'
  version: version not set
tags:
  - name: AuditService
  - name: BindingService
  - name: DecisionService
  - name: DecisionAdminService
  - name: FeatureService
  - name: FeatureAdminService
  - name: HealthService
  - name: LogService
  - name: PiiService
  - name: PubSubService
  - name: SecretsService
  - name: InvokeService
  - name: StateService
  - name: TelemetryService
  - name: WorkflowService
consumes:
  - application/json
produces:
  - application/json
paths: {}
definitions:
  protobufAny:
    type: object
    properties:
      '@type':
        type: string
    additionalProperties: {}
  protobufNullValue:
    type: string
    enum:
      - NULL_VALUE
    default: NULL_VALUE
    description: |-
      `NullValue` is a singleton enumeration to represent the null value for the
      `Value` type union.

      The JSON representation for `NullValue` is JSON `null`.

       - NULL_VALUE: Null value.
  rpcStatus:
    type: object
    properties:
      code:
        type: integer
        format: int32
      message:
        type: string
      details:
        type: array
        items:
          type: object
          $ref: '#/definitions/protobufAny'
  v1AuditEvent:
    type: object
    properties:
      timestamp:
        type: string
        format: date-time
        title: 発生時刻（UTC）
      actor:
        type: string
        title: 操作主体（user_id / workload_id）
      action:
        type: string
        title: 操作種別（CREATE / READ / UPDATE / DELETE / LOGIN / EXPORT）
      resource:
        type: string
        title: '対象リソース（URN 形式: k1s0:tenant:<tid>:resource:<type>/<id>）'
      outcome:
        type: string
        title: 操作結果（SUCCESS / DENIED / ERROR）
      attributes:
        type: object
        additionalProperties:
          type: string
        title: 追加コンテキスト（ip / user_agent / request_id 等）
    title: 監査イベント
  v1BatchEvaluateResponse:
    type: object
    properties:
      outputs_json:
        type: array
        items:
          type: string
          format: byte
        title: 出力 JSON 列（inputs_json と同じ順序）
    title: BatchEvaluate 応答
  v1BooleanResponse:
    type: object
    properties:
      value:
        type: boolean
        title: 評価値
      metadata:
        $ref: '#/definitions/v1FlagMetadata'
        title: メタ情報
    title: Boolean 評価応答
  v1BulkGetResponse:
    type: object
    properties:
      results:
        type: object
        additionalProperties:
          $ref: '#/definitions/v1GetResponse'
        title: 結果マップ（キー → GetResponse、未存在キーも not_found=true で含める）
    title: BulkGet 応答
  v1BulkGetSecretResponse:
    type: object
    properties:
      results:
        type: object
        additionalProperties:
          $ref: '#/definitions/v1GetSecretResponse'
        title: 結果マップ（シークレット名 → GetSecretResponse）
    title: BulkGet 応答
  v1BulkPublishEntry:
    type: object
    properties:
      entry_index:
        type: integer
        format: int32
        title: 入力 entries 配列内のインデックス（0 始まり）
      offset:
        type: string
        format: int64
        title: Kafka 側のオフセット（成功時のみ意味を持つ）
      error_code:
        type: string
        title: 失敗時のエラーコード（成功時は空文字列）
    title: BulkPublish の個別エントリ結果
  v1BulkPublishResponse:
    type: object
    properties:
      results:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1BulkPublishEntry'
        title: 各エントリの結果（失敗時は error_code に詳細）
    title: BulkPublish 応答
  v1BulkSendLogResponse:
    type: object
    properties:
      accepted:
        type: integer
        format: int32
        title: 受理件数（OTel パイプラインに渡された件数）
      rejected:
        type: integer
        format: int32
        title: 拒否件数（PII フィルタや schema 違反で却下された件数）
    title: BulkSend 応答
  v1CancelResponse:
    type: object
    title: Cancel 応答
  v1ClassifyResponse:
    type: object
    properties:
      findings:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1PiiFinding'
        title: 検出された PII 一覧（位置順）
      contains_pii:
        type: boolean
        title: PII を含むか（findings が空でなければ true）
    title: Classify 応答
  v1DeleteRequest:
    type: object
    properties:
      store:
        type: string
        title: Store 名
      key:
        type: string
        title: キー
      expected_etag:
        type: string
        title: 期待 ETag（空は無条件削除、指定時は楽観的排他で削除）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: Delete リクエスト
  v1DeleteResponse:
    type: object
    properties:
      deleted:
        type: boolean
        title: 削除実行可否（未存在キーへの削除も deleted=true で返す）
    title: Delete 応答
  v1DependencyStatus:
    type: object
    properties:
      reachable:
        type: boolean
        title: 接続可能か
      error_message:
        type: string
        title: 直近のエラー（reachable=false の時のみ意味を持つ）
    title: 個別依存の状態
  v1EmitMetricResponse:
    type: object
    title: EmitMetric 応答
  v1EmitSpanResponse:
    type: object
    title: EmitSpan 応答
  v1ErrorDetail:
    type: object
    properties:
      code:
        type: string
        title: エラーコード（E-<CATEGORY>-<MODULE>-<NUMBER> 形式、文字列）
      category:
        $ref: '#/definitions/v1K1s0ErrorCategory'
        title: 機械可読カテゴリ（switch 分岐用、enum 追加時は後方互換維持）
      message:
        type: string
        title: 人間可読なメッセージ（テナント表示可、PII を含めてはならない）
      retryable:
        type: boolean
        title: 再試行可否（true の場合クライアントは指数バックオフで再試行）
      retry_after_ms:
        type: integer
        format: int32
        title: 再試行までの推奨待機時間（ミリ秒、retryable=true の時のみ意味を持つ）
    title: |-
      エラー詳細。tier1 は google.rpc.Status の `details` 配列に
      本メッセージを 1 つ埋め込んで返す。`code` で詳細検索、
      `category` で switch 分岐、`retryable` でクライアント側再試行判定。
  v1EvaluateResponse:
    type: object
    properties:
      output_json:
        type: string
        format: byte
        title: 出力（JDM 評価結果、任意 JSON）
      trace_json:
        type: string
        format: byte
        title: 評価されたノードのトレース（include_trace=true の時のみ、空 bytes）
      elapsed_us:
        type: string
        format: int64
        title: 評価にかかった時間（マイクロ秒）
    title: Evaluate 応答
  v1Event:
    type: object
    properties:
      topic:
        type: string
        title: トピック名（接頭辞除去済みのテナント内名）
      data:
        type: string
        format: byte
        title: イベント本文
      content_type:
        type: string
        title: Content-Type
      offset:
        type: string
        format: int64
        title: Kafka 側のオフセット
      metadata:
        type: object
        additionalProperties:
          type: string
        title: メタデータ（Publish 時に付与されたヘッダがそのまま伝わる）
    title: Event（Subscribe の stream 要素）
  v1ExportAuditChunk:
    type: object
    properties:
      data:
        type: string
        format: byte
        title: フォーマット済みデータの 1 部分（バイナリ透過、UTF-8 を想定）。
      sequence:
        type: string
        format: int64
        title: 0 起点のチャンク連番（再構成 / 監査時の参照用）。
      event_count:
        type: string
        format: int64
        title: この chunk に含まれる event 数（chunk_bytes ベースの場合は variable）。
      is_last:
        type: boolean
        title: ストリーム末尾の chunk なら true。最後の "]" や EOF newline を含む。
    title: Export 応答（server-streaming）の 1 チャンク
  v1ExportFormat:
    type: string
    enum:
      - EXPORT_FORMAT_UNSPECIFIED
      - EXPORT_FORMAT_CSV
      - EXPORT_FORMAT_NDJSON
      - EXPORT_FORMAT_JSON_ARRAY
    default: EXPORT_FORMAT_UNSPECIFIED
    description: |-
      - EXPORT_FORMAT_UNSPECIFIED: 既定（指定なし）。サーバが NDJSON にフォールバックする。
       - EXPORT_FORMAT_CSV: CSV（RFC 4180、ヘッダ行を最初の chunk に出力）。
       - EXPORT_FORMAT_NDJSON: 改行区切り JSON（1 行 = 1 event）。Splunk / fluentd 取り込み向け。
       - EXPORT_FORMAT_JSON_ARRAY: 単一 JSON 配列（小規模向け、最後の chunk で `]` を閉じる）。
    title: Export のフォーマット種別。
  v1FlagDefinition:
    type: object
    properties:
      flag_key:
        type: string
        title: 'Flag キー（命名規則: <tenant>.<component>.<feature>）'
      kind:
        $ref: '#/definitions/v1FlagKind'
        title: Flag 種別（RELEASE / EXPERIMENT / OPS / PERMISSION）
      value_type:
        $ref: '#/definitions/v1FlagValueType'
        title: 戻り値型（boolean / string / number / object）
      default_variant:
        type: string
        title: デフォルト variant の名前（下記 variants にキーが存在すること）
      variants:
        type: object
        additionalProperties: {}
        title: 'variants 定義: variant 名 → 値（value_type に応じた JSON literal）'
      targeting:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1TargetingRule'
        title: targeting ルール（先頭から評価、最初に match したもの採用）
      state:
        $ref: '#/definitions/v1FlagState'
        title: 状態（ENABLED / DISABLED / ARCHIVED）
      description:
        type: string
        title: 説明（監査・運用者向け）
    title: flagd 互換の Flag 定義。k1s0 は OpenFeature / flagd 仕様に準拠。
  v1FlagKind:
    type: string
    enum:
      - RELEASE
      - EXPERIMENT
      - OPS
      - PERMISSION
    default: RELEASE
    description: |-
      - RELEASE: リリース管理用（既定値、コード経路の段階公開）
       - EXPERIMENT: A/B テスト等の実験用
       - OPS: 運用上の緊急切替（Kill switch 含む）
       - PERMISSION: 権限制御（permission gate、Product Council 承認必須）
    title: |-
      Flag の種別（OpenFeature / k1s0 固有）。
      注: 正典 IDL は zero value を `RELEASE = 0` と定義しているため、
          buf STANDARD lint の ENUM_ZERO_VALUE_SUFFIX / ENUM_VALUE_PREFIX を ignore する。
      buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
      buf:lint:ignore ENUM_VALUE_PREFIX
  v1FlagMetadata:
    type: object
    properties:
      kind:
        $ref: '#/definitions/v1FlagKind'
        title: Flag 種別
      variant:
        type: string
        title: バリアント名（有効化理由の参考）
      reason:
        type: string
        title: 評価の理由（DEFAULT / TARGETING_MATCH / SPLIT / ERROR）
    title: Flag 評価のメタ情報（OpenFeature の EvaluationDetails と整合）
  v1FlagState:
    type: string
    enum:
      - FLAG_STATE_UNSPECIFIED
      - FLAG_STATE_ENABLED
      - FLAG_STATE_DISABLED
      - FLAG_STATE_ARCHIVED
    default: FLAG_STATE_UNSPECIFIED
    description: |-
      - FLAG_STATE_UNSPECIFIED: 未指定（既定値、登録時に弾かれる）
       - FLAG_STATE_ENABLED: 有効（評価可能）
       - FLAG_STATE_DISABLED: 無効（評価は default_variant 固定）
       - FLAG_STATE_ARCHIVED: 廃止（ListFlags から消える、Get は可能）
    title: Flag の状態
  v1FlagValueType:
    type: string
    enum:
      - FLAG_VALUE_UNSPECIFIED
      - FLAG_VALUE_BOOLEAN
      - FLAG_VALUE_STRING
      - FLAG_VALUE_NUMBER
      - FLAG_VALUE_OBJECT
    default: FLAG_VALUE_UNSPECIFIED
    description: |-
      - FLAG_VALUE_UNSPECIFIED: 未指定（既定値、登録時に弾かれる）
       - FLAG_VALUE_BOOLEAN: boolean 型
       - FLAG_VALUE_STRING: string 型
       - FLAG_VALUE_NUMBER: number 型
       - FLAG_VALUE_OBJECT: object 型（任意 JSON）
    title: Flag の戻り値型
  v1FractionalSplit:
    type: object
    properties:
      variant:
        type: string
        title: バリアント名
      weight:
        type: integer
        format: int32
        title: 重み（0〜100、全エントリ合計 100 必須）
    title: Experiment 種別の Flag で A/B 比率を指定
  v1GetDynamicSecretResponse:
    type: object
    properties:
      values:
        type: object
        additionalProperties:
          type: string
        title: 発行された credential 一式（"username" / "password" 等の key=value）
      lease_id:
        type: string
        title: OpenBao 側 lease ID（renewal / revoke 用、削除時に呼び返す）
      ttl_sec:
        type: integer
        format: int32
        title: 実際に付与された TTL 秒数（要求値が ceiling を超えたら短縮される）
      issued_at_ms:
        type: string
        format: int64
        title: 発効時刻（Unix epoch ミリ秒）
    title: GetDynamic 応答
  v1GetFlagResponse:
    type: object
    properties:
      flag:
        $ref: '#/definitions/v1FlagDefinition'
        title: Flag 定義
      version:
        type: string
        format: int64
        title: バージョン
    title: GetFlag 応答
  v1GetResponse:
    type: object
    properties:
      data:
        type: string
        format: byte
        title: 値本文（bytes で透過、encoding はクライアント責務）
      etag:
        type: string
        title: 楽観的排他のための ETag（Set / Delete 時に expected_etag に再送する）
      not_found:
        type: boolean
        title: キー未存在時は true（このとき data / etag は空、エラーではない）
    title: Get 応答
  v1GetRuleResponse:
    type: object
    properties:
      jdm_document:
        type: string
        format: byte
        title: JDM 文書本体
      meta:
        $ref: '#/definitions/v1RuleVersionMeta'
        title: メタ情報
    title: GetRule 応答
  v1GetSecretResponse:
    type: object
    properties:
      values:
        type: object
        additionalProperties:
          type: string
        title: 値（Base64 エンコード必要時はクライアント側で判断、複数キーの key=value マップ）
      version:
        type: integer
        format: int32
        title: バージョン（ローテーション追跡用）
    title: Get 応答
  v1GetStatusResponse:
    type: object
    properties:
      status:
        $ref: '#/definitions/v1WorkflowStatus'
        title: 現在状態
      run_id:
        type: string
        title: 直近の実行 ID（Continue-as-New 後は新 run_id を返す）
      output:
        type: string
        format: byte
        title: 完了時の出力（status = COMPLETED の時のみ）
      error:
        $ref: '#/definitions/v1ErrorDetail'
        title: 失敗時のエラー詳細（status = FAILED の時のみ）
    title: GetStatus 応答
  v1InvokeBindingResponse:
    type: object
    properties:
      data:
        type: string
        format: byte
        title: 応答本文（操作種別とバインディング型に依存）
      metadata:
        type: object
        additionalProperties:
          type: string
        title: メタデータ（外部システムから返るヘッダ等）
    title: Invoke 応答
  v1InvokeChunk:
    type: object
    properties:
      data:
        type: string
        format: byte
        title: チャンク本文
      eof:
        type: boolean
        title: ストリーム終端フラグ（true の場合は本チャンクが最終）
    title: ストリーム応答のチャンク
  v1InvokeResponse:
    type: object
    properties:
      data:
        type: string
        format: byte
        title: 応答データ（bytes で透過伝搬、encoding は content_type で示す）
      content_type:
        type: string
        title: Content-Type（呼出先が決定）
      status:
        type: integer
        format: int32
        title: HTTP ステータス相当（成功 200、失敗時は詳細を Status に載せる）
    title: Invoke 応答
  v1K1s0ErrorCategory:
    type: string
    enum:
      - K1S0_ERROR_UNSPECIFIED
      - K1S0_ERROR_INVALID_ARGUMENT
      - K1S0_ERROR_UNAUTHENTICATED
      - K1S0_ERROR_PERMISSION_DENIED
      - K1S0_ERROR_NOT_FOUND
      - K1S0_ERROR_CONFLICT
      - K1S0_ERROR_RESOURCE_EXHAUSTED
      - K1S0_ERROR_UNAVAILABLE
      - K1S0_ERROR_INTERNAL
      - K1S0_ERROR_DEADLINE_EXCEEDED
    default: K1S0_ERROR_UNSPECIFIED
    description: |-
      - K1S0_ERROR_UNSPECIFIED: 未指定（既定値、クライアントは UNKNOWN として扱う）
       - K1S0_ERROR_INVALID_ARGUMENT: 呼出側入力誤り（リトライ不可）
       - K1S0_ERROR_UNAUTHENTICATED: JWT 不在・署名不正・期限切れ
       - K1S0_ERROR_PERMISSION_DENIED: RBAC 拒否・テナント越境・allowlist 外
       - K1S0_ERROR_NOT_FOUND: キー / バージョン / リソース未存在
       - K1S0_ERROR_CONFLICT: ETag 不一致・冪等性キー衝突
       - K1S0_ERROR_RESOURCE_EXHAUSTED: レート制限・クォータ超過（retry_after_ms 必須）
       - K1S0_ERROR_UNAVAILABLE: 一時的バックエンド不能（retry_after_ms 必須、指数バックオフ）
       - K1S0_ERROR_INTERNAL: tier1 バグ・未分類（Audit に Severity 2 で記録）
       - K1S0_ERROR_DEADLINE_EXCEEDED: gRPC Deadline 超過（副作用未発生扱い、再試行可）
    title: |-
      機械可読なエラーカテゴリ。docs `00_tier1_API共通規約.md` の 8 カテゴリ +
      UNSPECIFIED + DEADLINE_EXCEEDED の計 10 値。
      新規追加は MINOR 版で許可、既存値の削除・意味変更は禁止。
      未知カテゴリを受け取った tier2/tier3 SDK は UNSPECIFIED として扱う。
  v1ListFlagsResponse:
    type: object
    properties:
      flags:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1FlagDefinition'
        title: Flag 定義列
    title: ListFlags 応答
  v1ListVersionsResponse:
    type: object
    properties:
      versions:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1RuleVersionMeta'
        title: バージョン一覧（登録時刻昇順）
    title: ListVersions 応答
  v1LivenessResponse:
    type: object
    properties:
      version:
        type: string
        title: tier1 facade のビルドバージョン（SemVer）
      uptime_seconds:
        type: string
        format: int64
        title: 起動時刻からの経過時間（秒）
    title: 'Liveness response: process の生存と version 情報を返す。'
  v1LogEntry:
    type: object
    properties:
      timestamp:
        type: string
        format: date-time
        title: 発生時刻（UTC、tier2 側で OTel SDK 経由付与）
      severity:
        $ref: '#/definitions/v1Severity'
        title: 重大度
      body:
        type: string
        title: メッセージ本文（PII 自動検出対象、Pii API で Mask 推奨）
      attributes:
        type: object
        additionalProperties:
          type: string
        title: 属性（service.name / env / trace_id / span_id を含む）
      stack_trace:
        type: string
        title: 関連する例外スタック（オプション、マルチライン許容）
    title: LogEntry（OTel LogRecord と等価）
  v1MaskResponse:
    type: object
    properties:
      masked_text:
        type: string
        title: マスク後のテキスト（氏名 → [NAME]、メール → [EMAIL] 等）
      findings:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1PiiFinding'
        title: 検出された PII 一覧（マスキング前の位置情報）
    title: Mask 応答
  v1Metric:
    type: object
    properties:
      name:
        type: string
        title: 'メトリクス名（OTel 慣行に従いドット区切り、例: k1s0.tier1.invoke.duration_ms）'
      kind:
        $ref: '#/definitions/v1MetricKind'
        title: メトリクス種別
      value:
        type: number
        format: double
        title: 値（Counter は加算、Gauge は瞬時値、Histogram は観測値）
      labels:
        type: object
        additionalProperties:
          type: string
        title: ラベル（service.name / env / status_code 等の OTel attribute）
      timestamp:
        type: string
        format: date-time
        title: タイムスタンプ（観測時刻、UTC）
    title: 単一メトリクス
  v1MetricKind:
    type: string
    enum:
      - COUNTER
      - GAUGE
      - HISTOGRAM
    default: COUNTER
    description: |-
      - COUNTER: 単調増加カウンタ（Prometheus _total メトリクスに対応、既定値）
       - GAUGE: 上下する瞬時値ゲージ
       - HISTOGRAM: 分布ヒストグラム（quantile / bucket 計算用）
    title: |-
      メトリクス種別。
      注: 正典 IDL は zero value を `COUNTER = 0` と定義しているため、
          buf STANDARD lint の ENUM_ZERO_VALUE_SUFFIX / ENUM_VALUE_PREFIX を ignore する。
      buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
      buf:lint:ignore ENUM_VALUE_PREFIX
  v1NumberResponse:
    type: object
    properties:
      value:
        type: number
        format: double
        title: 評価値
      metadata:
        $ref: '#/definitions/v1FlagMetadata'
        title: メタ情報
    title: Number 評価応答
  v1ObjectResponse:
    type: object
    properties:
      value_json:
        type: string
        format: byte
        title: 評価値（JSON シリアライズ済み bytes）
      metadata:
        $ref: '#/definitions/v1FlagMetadata'
        title: メタ情報
    title: Object 評価応答
  v1PiiFinding:
    type: object
    properties:
      type:
        type: string
        title: 検出された PII 種別（NAME / EMAIL / PHONE / MYNUMBER / CREDITCARD 等）
      start:
        type: integer
        format: int32
        title: 文字列内の開始位置（0 始まり、UTF-8 byte 単位ではなく文字単位）
      end:
        type: integer
        format: int32
        title: 文字列内の終了位置（exclusive）
      confidence:
        type: number
        format: double
        title: 信頼度（0.0〜1.0）
    title: PII 検出結果の 1 件
  v1PublishRequest:
    type: object
    properties:
      topic:
        type: string
        title: トピック名（テナント接頭辞は tier1 が自動付与、クライアントはテナント内名のみ）
      data:
        type: string
        format: byte
        title: イベント本文（bytes で透過、encoding は content_type で示す）
      content_type:
        type: string
        title: Content-Type（application/json / application/protobuf 等）
      idempotency_key:
        type: string
        title: 冪等性キー（重複 Publish を抑止、TTL 24h）
      metadata:
        type: object
        additionalProperties:
          type: string
        title: メタデータ（partition_key / trace_id 等の Kafka メッセージヘッダ相当）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
    title: Publish リクエスト
  v1PublishResponse:
    type: object
    properties:
      offset:
        type: string
        format: int64
        title: Kafka 側のオフセット
    title: Publish 応答
  v1QueryAuditResponse:
    type: object
    properties:
      events:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1AuditEvent'
        title: 検索結果（時刻昇順、出力時に PII Mask 自動適用）
    title: Query 応答
  v1QueryResponse:
    type: object
    properties:
      result:
        type: string
        format: byte
        title: クエリ結果
    title: Query 応答
  v1ReadinessResponse:
    type: object
    properties:
      ready:
        type: boolean
        title: 全体としての ready 判定（依存すべて OK なら true）
      dependencies:
        type: object
        additionalProperties:
          $ref: '#/definitions/v1DependencyStatus'
        title: 各依存（postgres / kafka / openbao / keycloak / 等）の個別状態
    title: 'Readiness response: 各依存の状態を個別に返す。'
  v1RecordAuditResponse:
    type: object
    properties:
      audit_id:
        type: string
        title: WORM ストアでの固有 ID（再現性のあるハッシュ含む）
    title: Record 応答
  v1RegisterFlagResponse:
    type: object
    properties:
      version:
        type: string
        format: int64
        title: バージョン（flag_key 内で単調増加）
    title: RegisterFlag 応答
  v1RegisterRuleResponse:
    type: object
    properties:
      rule_version:
        type: string
        title: 採番されたバージョン（tenant + rule_id 内で一意、単調増加）
      effective_at_ms:
        type: string
        format: int64
        title: 発効可能となる時刻（即時なら registered_at と同じ、Unix epoch ミリ秒）
    title: RegisterRule 応答
  v1RotateSecretResponse:
    type: object
    properties:
      new_version:
        type: integer
        format: int32
        title: ローテーション後の新バージョン
      previous_version:
        type: integer
        format: int32
        title: 旧バージョン（grace_period_sec まで Get 可能）
      rotated_at_ms:
        type: string
        format: int64
        title: 新バージョン発効時刻（Unix epoch ミリ秒）
      ttl_sec:
        type: integer
        format: int32
        title: 動的シークレット時の TTL（静的シークレットでは 0）
    title: Rotate 応答
  v1RuleVersionMeta:
    type: object
    properties:
      rule_version:
        type: string
        title: バージョン文字列
      commit_hash:
        type: string
        title: Git commit hash
      registered_at_ms:
        type: string
        format: int64
        title: 登録時刻（Unix epoch ミリ秒）
      registered_by:
        type: string
        title: 登録者（subject 相当）
      deprecated:
        type: boolean
        title: DEPRECATED 状態（非推奨のみ true、廃止後は ListVersions から消える）
    title: ルールバージョンのメタ情報
  v1SendLogResponse:
    type: object
    title: Send 応答
  v1SetRequest:
    type: object
    properties:
      store:
        type: string
        title: Store 名
      key:
        type: string
        title: キー
      data:
        type: string
        format: byte
        title: 保存値本文
      expected_etag:
        type: string
        title: 期待 ETag（空は未存在前提、新規作成時は空文字列）
      ttl_sec:
        type: integer
        format: int32
        title: TTL（秒、0 は永続）
      context:
        $ref: '#/definitions/v1TenantContext'
        title: 呼出元コンテキスト
      idempotency_key:
        type: string
        title: |-
          冪等性キー（共通規約 §「冪等性と再試行」: 24h TTL の dedup）
          同一キーでの再試行は副作用を重複させず初回 SetResponse を返す
    title: Set リクエスト
  v1SetResponse:
    type: object
    properties:
      new_etag:
        type: string
        title: 保存後の新 ETag（次回 Set / Delete 時の expected_etag に渡す）
    title: Set 応答
  v1Severity:
    type: string
    enum:
      - TRACE
      - DEBUG
      - INFO
      - WARN
      - ERROR
      - FATAL
    default: TRACE
    description: |-
      - TRACE: OTel SeverityNumber TRACE（既定値）
       - DEBUG: OTel SeverityNumber DEBUG
       - INFO: OTel SeverityNumber INFO
       - WARN: OTel SeverityNumber WARN
       - ERROR: OTel SeverityNumber ERROR
       - FATAL: OTel SeverityNumber FATAL
    title: |-
      重大度（OpenTelemetry Log Severity の数値仕様と整合）。
      注: 数値タグは OTel 仕様（trace=0 / debug=5 / info=9 / warn=13 / error=17 / fatal=21）に
          固定されているため、buf STANDARD lint の ENUM_ZERO_VALUE_SUFFIX /
          ENUM_VALUE_PREFIX を ignore する。
      buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
      buf:lint:ignore ENUM_VALUE_PREFIX
  v1SignalResponse:
    type: object
    title: Signal 応答（フィールド無し、成功は OK gRPC ステータスで表現）
  v1Span:
    type: object
    properties:
      trace_id:
        type: string
        title: トレース ID（W3C Trace Context、16 byte 相当の 32 文字 hex）
      span_id:
        type: string
        title: Span ID（8 byte 相当の 16 文字 hex）
      parent_span_id:
        type: string
        title: 親 Span ID（ルート Span は空文字列）
      name:
        type: string
        title: 'Span 名（操作名、例: HTTP GET /api/v1/foo）'
      start_time:
        type: string
        format: date-time
        title: 開始時刻
      end_time:
        type: string
        format: date-time
        title: 終了時刻
      attributes:
        type: object
        additionalProperties:
          type: string
        title: 属性（http.method / db.system 等の OTel semantic conventions）
    title: 単一 Span
  v1StartResponse:
    type: object
    properties:
      workflow_id:
        type: string
        title: ワークフロー ID（リクエストの workflow_id か、tier1 採番の UUID）
      run_id:
        type: string
        title: 実行 ID（リトライや継続実行時に新しい値が割当）
      backend:
        $ref: '#/definitions/v1WorkflowBackend'
        title: 実際に選択された backend（AUTO で起動された場合の解決結果が入る）。
    title: Start 応答
  v1StringResponse:
    type: object
    properties:
      value:
        type: string
        title: 評価値
      metadata:
        $ref: '#/definitions/v1FlagMetadata'
        title: メタ情報
    title: String 評価応答
  v1TargetingRule:
    type: object
    properties:
      rule_id:
        type: string
        title: ルール ID（監査用、tenant+flag 内で一意）
      json_logic_expr:
        type: string
        format: byte
        title: JsonLogic 式（bytes で保持、登録時に schema validator 通過必須）
      variant_if_match:
        type: string
        title: 評価成立時に返す variant 名
      fractional:
        type: array
        items:
          type: object
          $ref: '#/definitions/v1FractionalSplit'
        title: Fractional split（A/B テスト用、weights 合計 100 必須）
    title: |-
      targeting ルール（JsonLogic 互換、flagd 仕様準拠）。
      例: { "if": [ { "==": [{ "var": "userRole" }, "admin"] }, "blue-variant", "red-variant" ] }
  v1TenantContext:
    type: object
    properties:
      tenant_id:
        type: string
        title: テナント ID（UUID v4 文字列、tier1 が JWT クレームと突き合わせて検証）
      subject:
        type: string
        title: 呼出元の主体（workload_id または user_id、SPIFFE ID 互換）
      correlation_id:
        type: string
        title: 相関 ID（OTel traceparent と紐付けて全 tier 横断トレース）
    title: |-
      呼出元テナントを特定する識別子。gRPC メタデータヘッダ
      （x-tenant-id / x-correlation-id / x-subject）と Request 側 message の
      `context` フィールドの両方で伝搬し、interceptor で整合性を検証する。
  v1TerminateResponse:
    type: object
    title: Terminate 応答
  v1TransactOp:
    type: object
    properties:
      set:
        $ref: '#/definitions/v1SetRequest'
        title: Set 操作
      delete:
        $ref: '#/definitions/v1DeleteRequest'
        title: Delete 操作
    title: トランザクション内の 1 操作（Set / Delete のいずれか）
  v1TransactResponse:
    type: object
    properties:
      committed:
        type: boolean
        title: コミット成功可否（false の場合は全ロールバック済み）
    title: Transact 応答
  v1VerifyChainResponse:
    type: object
    properties:
      valid:
        type: boolean
        title: チェーン全体の整合性が取れていれば true。
      checked_count:
        type: string
        format: int64
        title: 検証対象だったイベント件数（valid に関わらず set される）。
      first_bad_sequence:
        type: string
        format: int64
        title: |-
          valid=false 時のみ意味あり。最初に不整合を検出した sequence_number。
          valid=true 時は 0。
      reason:
        type: string
        title: |-
          不整合の理由（"prev_hash mismatch" / "event_hash mismatch" / "tenant boundary" 等）。
          valid=true 時は空文字。
    title: VerifyChain 応答
  v1WorkflowBackend:
    type: string
    enum:
      - BACKEND_AUTO
      - BACKEND_DAPR
      - BACKEND_TEMPORAL
    default: BACKEND_AUTO
    description: |-
      - BACKEND_AUTO: 既定値: tier1 が workflow_type / 期待実行時間に基づいて自動選択する。
       - BACKEND_DAPR: 短期ワークフロー向け（Dapr Workflow building block、上限 7 日）。
       - BACKEND_TEMPORAL: 長期ワークフロー向け（Temporal、上限なし）。
    title: |-
      バックエンド種別（FR-T1-WORKFLOW-001 の "短期は Dapr Workflow、長期実行は Temporal" 対応）。
      SDK の RunShort / RunLong は本 enum を BACKEND_DAPR / BACKEND_TEMPORAL に固定する。
      注: zero 値は AUTO（明示指定なし、tier1 が workflow_type / 期待実行時間で振り分け）。
      buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
  v1WorkflowStatus:
    type: string
    enum:
      - RUNNING
      - COMPLETED
      - FAILED
      - CANCELED
      - TERMINATED
      - CONTINUED_AS_NEW
    default: RUNNING
    description: |-
      - RUNNING: 実行中（既定値、Start 直後の状態）
       - COMPLETED: 正常完了
       - FAILED: 失敗終了
       - CANCELED: Cancel による正常停止
       - TERMINATED: Terminate による強制停止
       - CONTINUED_AS_NEW: Continue-as-New（長期ワークフローの履歴ローテーション）
    title: |-
      実行状態の列挙。
      注: 正典 IDL は本 enum の zero value を `RUNNING = 0` と定義しているため、
          buf STANDARD lint の ENUM_ZERO_VALUE_SUFFIX / ENUM_VALUE_PREFIX を ignore する。
      buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
      buf:lint:ignore ENUM_VALUE_PREFIX
