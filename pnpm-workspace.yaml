# pnpm ワークスペース設定
# モノリポ内の全 React クライアントパッケージを統一管理する
# workspace:* 依存が正しく解決されるようにパッケージパスを列挙する
packages:
  - 'regions/system/client/react/system-client'
  - 'regions/system/client/react/app-catalog'
  - 'regions/service/*/client/react/*'
  - 'regions/business/*/client/react/*'
  # TypeScript ライブラリを workspace に追加: workspace:* 依存解決と整合性チェックを有効にする（M-10対応）
  - 'regions/system/library/typescript/*'
